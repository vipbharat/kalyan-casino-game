<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Active Matches</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; padding: 15px; }
        .match-card { background: linear-gradient(135deg, #1e1e1e, #111); border: 2px solid #FFD700; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 4px 15px rgba(255,215,0,0.2); margin-bottom: 20px; }
        .vs-text { font-size: 24px; font-weight: 900; color: #ff3333; margin: 10px 0; }
        .timer-box { font-size: 30px; font-weight: bold; color: #00FF00; margin: 15px 0; display: none; text-shadow: 0 0 10px #00FF00; }
        .btn-row { display: flex; gap: 15px; margin-top: 20px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        .btn-win { background: #00FF00; color: #000; box-shadow: 0 4px 10px rgba(0,255,0,0.3); }
        .btn-loss { background: #ff3333; color: #fff; box-shadow: 0 4px 10px rgba(255,51,51,0.3); }
        .btn:disabled { background: #555; color: #888; cursor: not-allowed; box-shadow: none; }
        .warning-text { color: #ffae00; font-size: 12px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <h2 style="color: #FFD700;">🎮 MY LIVE MATCHES</h2>

    <div class="match-card" id="matchBox">
        <h3 style="margin: 0; color: #aaa;">Match ID: #FF-8899</h3>
        <div style="font-size: 18px; margin-top: 10px;">
            <span style="color: #00FF00;">YOU</span> 
            <span class="vs-text"> VS </span> 
            <span style="color: #FFD700;">VIP_RAHUL</span>
        </div>
        
        <div style="font-size: 20px; font-weight: bold; margin-top: 10px;">Prize: ₹200</div>

        <div class="timer-box" id="countdownTimer">05:00</div>
        <div class="warning-text" id="warningMsg">Opponent ne WIN claim kiya hai! Agar aapne action nahi liya toh 5 minute mein aap haar jayenge.</div>

        <div class="btn-row" id="actionButtons">
            <button class="btn btn-win" onclick="claimWin()">🏆 I WON</button>
            <button class="btn btn-loss" onclick="acceptLoss()">💀 I LOST</button>
        </div>
    </div>

    <script>
        let timerInterval;

        // 1. Agar saamne wale ne 'LOSS' daba diya (Sabse aasaan)
        function acceptLoss() {
            if(confirm("Are you sure you lost? Paise opponent ko mil jayenge.")) {
                document.getElementById('actionButtons').innerHTML = "<h3 style='color:#ff3333;'>You Lost The Match 😔</h3>";
                // Yahan Firebase mein status 'Completed' aur opponent ko paise chale jayenge
            }
        }

        // 2. Agar aapne 'WIN' dabaya (Timer Shuru)
        function claimWin() {
            if(confirm("Kya aap sach mein jeete hain? Fake claim par id ban hogi!")) {
                // Buttons disable kar do
                document.getElementById('actionButtons').innerHTML = "<h3 style='color:#00FF00;'>Win Claimed! Waiting for opponent...</h3>";
                
                // Yahan background (Firebase) mein flag set hoga ki isne win claim kar diya hai
                // Aur saamne wale (Opponent) ki screen par timer shuru ho jayega!
                
                // Simulating opponent's screen update:
                // startOpponentTimer(); <-- Yeh function opponent ki screen par chalega
            }
        }

        // 3. THE 5-MINUTE ENGINE (Yeh code opponent ki screen par trigger hoga jab dusra banda Win dabayega)
        function startOpponentTimer() {
            document.getElementById('countdownTimer').style.display = "block";
            document.getElementById('warningMsg').style.display = "block";
            
            let timeLeft = 300; // 5 minutes in seconds

            timerInterval = setInterval(() => {
                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                
                // 0 lagane ke liye (jaise 04:09)
                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;

                document.getElementById('countdownTimer').innerText = `${minutes}:${seconds}`;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    autoResolveMatch(); // Time khatam! Opponent jeet gaya
                }
                timeLeft--;
            }, 1000);
        }

        // 4. Auto Resolve (Jab 5 minute khatam ho jayein)
        function autoResolveMatch() {
            document.getElementById('countdownTimer').innerText = "00:00";
            document.getElementById('actionButtons').innerHTML = "<h3 style='color:#ff3333;'>Time Out! Match Auto-Lost ⌛</h3>";
            alert("Time limit over! The match has been automatically awarded to the opponent.");
            // Yahan Firebase update hoga aur opponent ko paise mil jayenge
        }

        // TEST KE LIYE: Is code ka jaadu dekhne ke liye is line ko hata kar test karein:
        // setTimeout(startOpponentTimer, 2000); // 2 second baad automatic timer chalu hoga
    </script>
</body>
</html>
