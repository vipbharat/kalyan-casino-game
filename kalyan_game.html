<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalyan Matka - VIP Final HD</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ffd700; }
        body { margin: 0; background: #000; font-family: 'Arial Narrow', sans-serif; overflow: hidden; color: white; user-select: none; height: 100vh; display: flex; flex-direction: column; }
        .top-bar { display: flex; justify-content: space-between; padding: 5px 10px; background: #111; border-bottom: 1.5px solid var(--gold); align-items: center; }
        .logo-hd { font-size: 15px; font-weight: 900; color: var(--gold); }
        .online-status { font-size: 10px; color: #0f0; font-weight: bold; padding: 2px 8px; border-radius: 10px; border: 0.5px solid #0f0; }
        .bal-box { background: #111; border: 1px solid var(--gold); padding: 3px 10px; border-radius: 15px; color: #0f0; font-size: 13px; font-weight: bold; }
        .timer-sec { font-size: 32px; color: #fff; text-align: center; margin: 5px 0; font-weight: 900; text-shadow: 0 0 15px red; }
        .joker-reveal { text-align: center; min-height: 85px; display: flex; align-items: center; justify-content: center; }
        .joker-pata { width: 60px; height: 80px; background: #fff; border: 2.5px solid var(--gold); border-radius: 8px; display: none; box-shadow: 0 0 25px gold; z-index: 100; }
        .joker-pata img { width: 100%; height: 100%; border-radius: 6px; }
        .cards-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 5px; justify-items: center; flex-grow: 1; }
        .card-bet-box { width: 78px; height: 105px; background: #fff; border: 2px solid #444; border-radius: 8px; position: relative; }
        .card-bet-box img { width: 100%; height: 100%; border-radius: 6px; }
        .guna-tag { position: absolute; bottom: 3px; right: 3px; background: rgba(0,0,0,0.9); color: gold; font-size: 10px; padding: 1px 4px; border-radius: 4px; font-weight: 900; border: 1px solid gold; z-index: 20; }
        .pool-on-card { position: absolute; top: -8px; left: 50%; transform: translateX(-50%); background: #0f0; color: #000; font-size: 10px; padding: 1px 6px; border-radius: 50px; font-weight: bold; z-index: 30; border: 1px solid #000; }
        .chip-animate { position: fixed; width: 22px; height: 22px; border-radius: 50%; border: 1px solid #fff; z-index: 50; font-size: 9px; font-weight: 900; color: white; display: flex; align-items: center; justify-content: center; pointer-events: none; transition: all 0.5s ease-out; }
        .bot-players-row { display: flex; justify-content: space-around; background: #111; padding: 8px 0; border-top: 1px solid #333; min-height: 45px; }
        .bot-p { text-align: center; width: 62px; font-size: 9px; }
        .chip-footer { display: flex; justify-content: center; gap: 8px; padding: 15px 0; border-top: 2.5px solid var(--gold); background: #000; }
        .c-btn { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid #fff; cursor: pointer; font-size: 11px; }
        .selected { border: 4px solid var(--gold) !important; transform: scale(1.1); }
        .game-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); border: 3px solid gold; color: gold; padding: 25px; border-radius: 20px; z-index: 2000; display: none; text-align: center; font-size: 24px; font-weight: 900; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo-hd">KALYAN MATKA VIP</div>
        <div class="online-status">🟢 ONLINE: <span id="online-count">750</span></div>
        <div class="bal-box">₹ <span id="balance">0.00</span></div>
    </div>

    <div class="timer-sec" id="timer">15</div>

    <div class="joker-reveal">
        <div id="joker-display" class="joker-pata"></div>
        <div id="status-msg" style="color:gold; font-size:12px; font-weight:bold; margin-top:5px;">BETTING START</div>
    </div>

    <div class="cards-grid" id="main-grid"></div>
    <div id="bot-row" class="bot-players-row"></div>

    <div class="chip-footer">
        <div class="c-btn" id="c10" style="background:#fff; color:#000" onclick="setChip(10, this)">10</div>
        <div class="c-btn" id="c50" style="background:orange; color:#000" onclick="setChip(50, this)">50</div>
        <div class="c-btn" id="c100" style="background:#2196f3; color:#fff" onclick="setChip(100, this)">100</div>
        <div class="c-btn" id="c500" style="background:#4caf50; color:#fff" onclick="setChip(500, this)">500</div>
        <div class="c-btn" id="c1000" style="background:#f44336; color:#fff" onclick="setChip(1000, this)">1K</div>
    </div>

    <div id="bet-stop-pop" class="game-popup">🚫 BET STOP 🚫</div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const phone = localStorage.getItem('userPhone') || "Guest";

        const cards = [
            {v:'A', g:2, i:'https://deckofcardsapi.com/static/img/AS.png'}, {v:'2', g:2, i:'https://deckofcardsapi.com/static/img/2H.png'},
            {v:'3', g:3, i:'https://deckofcardsapi.com/static/img/3D.png'}, {v:'4', g:4, i:'https://deckofcardsapi.com/static/img/4C.png'},
            {v:'5', g:5, i:'https://deckofcardsapi.com/static/img/5H.png'}, {v:'6', g:6, i:'https://deckofcardsapi.com/static/img/6S.png'},
            {v:'8', g:8, i:'https://deckofcardsapi.com/static/img/8C.png'}, {v:'J', g:11, i:'https://deckofcardsapi.com/static/img/JH.png'},
            {v:'Q', g:2, i:'https://deckofcardsapi.com/static/img/QD.png'}, {v:'K', g:25, i:'https://deckofcardsapi.com/static/img/KC.png'}
        ];

        let curChip = 10, chipBg="#fff", chipTxt="#000", isBetting = false, pool = {}, myBets = {}, timer = 15, bots = [];
        const chipColors = { 10: '#fff', 50: 'orange', 100: '#2196f3', 500: '#4caf50', 1000: '#f44336' };
        const chipTextColors = { 10: '#000', 50: '#000', 100: '#fff', 500: '#fff', 1000: '#fff' };

        function init() {
            const grid = document.getElementById('main-grid'); grid.innerHTML = "";
            cards.forEach(c => {
                pool[c.v] = 0; myBets[c.v] = 0;
                grid.innerHTML += `<div class="card-bet-box" id="box-${c.v}" onclick="userBet('${c.v}')"><span class="pool-on-card" id="pool-${c.v}">₹0</span><img src="${c.i}"><span class="guna-tag">${c.g}x</span></div>`;
            });
            document.getElementById('c10').classList.add('selected');
            createBots(); 
            engineLoop();
        }

        function createBots() {
            bots = []; 
            for(let i=0; i<5; i++) bots.push({ id: Math.floor(1000+Math.random()*9000), bal: Math.floor(50000+Math.random()*50000) });
            updateBotUI();
        }

        function updateBotUI() {
            const row = document.getElementById('bot-row'); row.innerHTML = "";
            bots.forEach(b => { row.innerHTML += `<div class="bot-p">ID:${b.id}<br><b style="color:#0f0">₹${b.bal.toLocaleString()}</b></div>`; });
        }

        function engineLoop() {
            isBetting = true; timer = 15;
            resetUI();
            let timerInt = setInterval(() => {
                if(timer > 0) {
                    timer--; document.getElementById('timer').innerText = timer;
                    botAction();
                } else {
                    clearInterval(timerInt);
                    isBetting = false;
                    handleResult();
                }
            }, 1000);
        }

        function botAction() {
            cards.forEach(c => {
                if(Math.random() > 0.3) {
                    const amtList = [10, 50, 100, 500, 1000];
                    const amt = amtList[Math.floor(Math.random()*5)];
                    const randomBot = bots[Math.floor(Math.random()*bots.length)];
                    
                    if(randomBot.bal >= amt) {
                        randomBot.bal -= amt; // Bot ka paisa kam hoga
                        pool[c.v] += amt;
                        document.getElementById(`pool-${c.v}`).innerText = "₹" + pool[c.v].toLocaleString();
                        flyChip('right', c.v, amt >= 1000 ? '1K' : amt, chipColors[amt], chipTextColors[amt]);
                    }
                }
            });
            updateBotUI();
        }

        async function handleResult() {
            document.getElementById('bet-stop-pop').style.display = 'block';
            await new Promise(r => setTimeout(r, 1500));
            document.getElementById('bet-stop-pop').style.display = 'none';

            let zeroBetCards = cards.filter(c => pool[c.v] === 0);
            let win = zeroBetCards.length > 0 ? zeroBetCards[Math.floor(Math.random() * zeroBetCards.length)] : cards.reduce((p, c) => (pool[p.v] < pool[c.v]) ? p : c);

            document.getElementById('joker-display').innerHTML = `<img src="${win.i}">`;
            document.getElementById('joker-display').style.display = 'block';
            document.getElementById('status-msg').innerText = "WINNER: " + win.v;

            if(myBets[win.v] > 0) {
                const winAmt = myBets[win.v] * win.g;
                db.ref('users/'+phone).once('value', s => {
                    db.ref('users/'+phone).update({balance: (parseFloat(s.val().balance||0) + winAmt)});
                });
            }

            await new Promise(r => setTimeout(r, 4000));
            createBots(); // Rotation: Next round naye bots
            engineLoop();
        }

        function flyChip(side, v, label, bg, col) {
            const box = document.getElementById(`box-${v}`).getBoundingClientRect();
            const chip = document.createElement('div');
            chip.className = 'chip-animate game-chip-stack';
            chip.innerText = label; chip.style.background = bg; chip.style.color = col;
            chip.style.left = (side === 'left' ? '-30px' : window.innerWidth + 'px');
            chip.style.top = (Math.random() * 400 + 100) + 'px';
            document.body.appendChild(chip);
            setTimeout(() => {
                const rx = (Math.random() * 30) + 15; const ry = (Math.random() * 50) + 20;
                chip.style.left = (box.left + rx) + 'px'; chip.style.top = (box.top + ry) + 'px';
                chip.style.transform = "scale(0.8)";
            }, 50);
        }

        function userBet(v) {
            if(!isBetting) return;
            db.ref('users/'+phone).once('value', s => {
                let b = parseFloat(s.val().balance || 0);
                if(b >= curChip) {
                    db.ref('users/'+phone).update({balance: (b - curChip)});
                    pool[v] += curChip; myBets[v] += curChip;
                    document.getElementById(`pool-${v}`).innerText = "₹" + pool[v].toLocaleString();
                    flyChip('left', v, curChip >= 1000 ? '1K' : curChip, chipBg, chipTxt);
                }
            });
        }

        function resetUI() {
            document.getElementById('joker-display').style.display = 'none';
            document.getElementById('status-msg').innerText = "BETTING START";
            document.querySelectorAll('.game-chip-stack').forEach(c => c.remove());
            cards.forEach(c => { pool[c.v]=0; myBets[c.v]=0; document.getElementById(`pool-${c.v}`).innerText = "₹0"; });
        }

        function setChip(v, el) { 
            curChip = v; chipBg = chipColors[v]; chipTxt = chipTextColors[v];
            document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('selected')); el.classList.add('selected'); 
        }

        db.ref('users/'+phone).on('value', s => { document.getElementById('balance').innerText = parseFloat(s.val().balance||0).toFixed(2); });
        init();
    </script>
</body>
</html>
