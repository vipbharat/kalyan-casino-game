<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalyan VIP - Live Flying Chips</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; user-select: none; }
        body { background: radial-gradient(circle at 50% 50%, #004d26 0%, #001a0d 100%); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; border-bottom: 2px solid #ffd700; background: rgba(0,0,0,0.9); height: 7vh; z-index: 1000;}
        .logo { font-size: 18px; font-weight: 900; color: #ffd700; }
        .online-box { background: rgba(57, 255, 20, 0.2); border: 1.5px solid #39ff14; color: #39ff14; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 800; position: relative; }

        .history-strip { width: 100%; height: 40px; background: rgba(0,0,0,0.8); display: flex; align-items: center; gap: 10px; padding: 0 15px; border-bottom: 1px solid #444; z-index: 900; }
        .h-tag { font-size: 10px; font-weight: 900; color: #ffd700; }
        .h-list { display: flex; gap: 6px; flex: 1; overflow: hidden; }
        .h-item { min-width: 28px; height: 28px; background: #fff; color: #000; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; border: 2px solid #ffd700; box-shadow: 0 0 5px rgba(255,215,0,0.5); }

        .sub-header { display: flex; justify-content: space-between; align-items: center; padding: 5px 15px; background: rgba(17, 17, 17, 0.9); font-size: 13px; border-bottom: 1px solid #333; z-index: 900; }
        .wallet-box { color: #ffd700; font-weight: 800; display: flex; align-items: center; gap: 5px; font-size: 15px;}

        /* GAME STATUS AREA */
        .game-status-area { 
            height: 120px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; width: 100%; margin-top: 5px;
        }
        #main-timer { font-size: 70px; font-weight: 900; color: #fff; text-shadow: 0 0 20px #39ff14; line-height: 1; }
        
        #result-container {
            display: none; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
        }
        #wait-timer { font-size: 16px; color: #ffd700; font-weight: bold; text-shadow: 0 2px 4px #000; }
        #result-card { 
            width: 70px; height: 95px; background: white; border-radius: 8px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            box-shadow: 0 0 30px #ffd700; border: 4px solid #ffd700; 
        }

        .my-bet-container { width: 100%; max-width: 480px; margin: 0 auto 5px; text-align: center; z-index: 20; }
        #my-bet-btn { display: inline-block; background: linear-gradient(to right, #e67e22, #d35400); color: white; padding: 5px 20px; border-radius: 20px; font-weight: 900; border: 2px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.5); font-size: 13px; }

        .matka-grid { width: 100%; max-width: 480px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 5px 10px; margin: 0 auto;}
        .card-box { background: linear-gradient(145deg, #fff, #ccc); border-radius: 8px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: space-around; border: 2.2px solid #333; position: relative; cursor: pointer;}
        .card-special { border-color: #ffd700; background: linear-gradient(135deg, #fff, #ffd700); }
        .c-val { font-size: 24px; font-weight: 900; color: #000; line-height: 1;}
        .c-red { color: #d32f2f; }
        .total-pool { position: absolute; top: 1px; right: 3px; font-size: 9px; color: #000; font-weight: 900; }

        .color-betting-area { width: 100%; max-width: 480px; display: flex; gap: 10px; padding: 5px 10px; margin: 0 auto;}
        .color-box { flex: 1; height: 60px; border-radius: 10px; border: 3px solid #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; box-shadow: 0 5px 10px rgba(0,0,0,0.5); }
        .box-red { background: linear-gradient(135deg, #ff3333, #800000); }
        .box-black { background: linear-gradient(135deg, #333, #000); }
        .color-name { font-weight: 900; font-size: 14px; }
        .color-multi { font-size: 10px; background: rgba(255,255,255,0.2); padding: 1px 8px; border-radius: 10px; margin-top: 2px;}

        .my-bet-tag { position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); background: #00e5ff; color: #000; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 900; display: none; z-index: 20; border: 1px solid #fff; white-space: nowrap; }

        .footer-chips { height: 12vh; background: rgba(0,0,0,0.9); border-top: 2.5px solid #ffd700; display: flex; justify-content: space-evenly; align-items: center; margin-top: auto; z-index: 1000;}
        .chip { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: white; cursor: pointer; border: 3px dashed rgba(255,255,255,0.4); font-size: 12px;}
        .chip.selected { transform: scale(1.1); border: 3px solid #fff; box-shadow: 0 0 15px #fff; }
        .c10 { background: #3498db; } .c50 { background: #9b59b6; } .c100 { background: #2ecc71; } .c500 { background: #e74c3c; } .c1000 { background: #f1c40f; color: #000; }
        
        /* 🔥 FIX: UPDATED CHIP STYLE (REAL CASINO RING) 🔥 */
        .placed-chip { 
            position: fixed; width: 22px; height: 22px; border-radius: 50%; 
            border: 3px dashed rgba(255,255,255,0.5); /* Casino Ring Style */
            pointer-events: none; z-index: 100; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 8px; font-weight: 900; color: white; 
            transition: all 0.4s ease-out; 
            box-shadow: 2px 2px 5px rgba(0,0,0,0.8);
        }

        .win-calc-alert { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(135deg, #111, #000); border: 2px solid #39ff14; padding: 20px; border-radius: 15px; text-align: center; display: none; z-index: 10000; box-shadow: 0 0 30px rgba(57,255,20,0.5); width: 85%; max-width: 300px; }
        .win-calc-alert h2 { color: #39ff14; margin-bottom: 10px; font-weight: 900;}
        .win-calc-alert p { color: #fff; font-size: 13px; margin: 5px 0; display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 5px;}
        .win-calc-alert .admin-fee { color: #e74c3c; font-weight: bold; }
        .win-calc-alert .net-win { color: #ffd700; font-size: 18px; font-weight: 900; margin-top: 10px; border-top: 2px dashed #444; padding-top: 10px; border-bottom: none;}

        .alert-box { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: #e74c3c; color: white; padding: 10px 20px; border-radius: 8px; font-weight: 900; z-index: 9999; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body onclick="initAudio()">
    <div class="alert-box" id="low-bal-alert">⚠️ Low Balance!</div>

    <div class="win-calc-alert" id="win-calc-alert">
        <h2>🎉 YOU WON! 🎉</h2>
        <p><span>Total Win:</span> <span id="w-gross">₹0</span></p>
        <p class="admin-fee"><span>Admin Fee (5%):</span> <span id="w-fee">-₹0</span></p>
        <p class="net-win"><span>Net Paid:</span> <span id="w-net">₹0</span></p>
        <button onclick="document.getElementById('win-calc-alert').style.display='none'" style="margin-top:15px; padding: 5px 20px; border-radius: 15px; border:none; background:#ffd700; font-weight:900; cursor:pointer;">OK</button>
    </div>

    <div class="header">
        <a href="dashboard.html" style="color:#ffd700; font-size:20px; text-decoration:none;"><i class="fa-solid fa-arrow-left"></i></a>
        <div class="logo">KALYAN ROYAL</div>
        <div class="online-box" id="online-origin">● <span id="online-count">500</span> Online</div>
    </div>

    <div class="history-strip">
        <span class="h-tag">RECORD:</span>
        <div class="h-list" id="history-list"></div>
    </div>

    <div class="sub-header">
        <div class="wallet-box">
            💰 ₹<span id="wallet-bal">0.00</span>
        </div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="game-status-area">
        <div id="main-timer">15</div>
        <div id="result-container">
            <div id="wait-timer">Next Round in: 6</div>
            <div id="result-card">
                <div id="res-val" style="font-size: 38px; font-weight: 900; color: #000; line-height: 1;">A</div>
                <div id="res-suit" style="font-size: 24px; line-height: 1;">♠️</div>
            </div>
        </div>
    </div>

    <div class="my-bet-container">
        <div id="my-bet-btn">Total Bet: ₹0</div>
    </div>

    <div class="matka-grid" id="grid-container"></div>

    <div class="color-betting-area">
        <div class="color-box box-red" id="box-RED" onclick="placeBet(this, 'RED', selectedChipVal, selectedChipColor, true)">
            <div class="total-pool">₹<span id="total-RED">0</span></div>
            <span class="color-name">RED</span>
            <span class="color-multi">1.95x</span>
            <div class="my-bet-tag" id="my-RED">₹<span>0</span></div>
        </div>
        <div class="color-box box-black" id="box-BLACK" onclick="placeBet(this, 'BLACK', selectedChipVal, selectedChipColor, true)">
            <div class="total-pool">₹<span id="total-BLACK">0</span></div>
            <span class="color-name">BLACK</span>
            <span class="color-multi">1.95x</span>
            <div class="my-bet-tag" id="my-BLACK">₹<span>0</span></div>
        </div>
    </div>

    <div class="footer-chips">
        <div class="chip selected c10" onclick="selectChip(10, this, '#3498db')">10</div>
        <div class="chip c50" onclick="selectChip(50, this, '#9b59b6')">50</div>
        <div class="chip c100" onclick="selectChip(100, this, '#2ecc71')">100</div>
        <div class="chip c500" onclick="selectChip(500, this, '#e74c3c')">500</div>
        <div class="chip c1000" onclick="selectChip(1000, this, '#f1c40f')">1K</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const currentUserId = localStorage.getItem('userPhone') || localStorage.getItem('phone');
        
        let userBalance = 0, depBal = 0, winBal = 0, bonBal = 0;
        let myTotalBet = 0; 
        let canBet = false; 
        let lastState = ''; 
        let selectedChipVal = 10; 
        let selectedChipColor = '#3498db';
        let onlineCount = 500;
        let userBets = {}; 

        const cardsData = [
            {v:'A', m:10, s:'♠️'}, {v:'2', m:10, s:'♥️', r:true}, {v:'3', m:10, s:'♣️'}, {v:'4', m:10, s:'♦️', r:true}, {v:'5', m:10, s:'♠️'},
            {v:'6', m:10, s:'♥️', r:true}, {v:'7', m:10, s:'♣️'}, {v:'8', m:10, s:'♦️', r:true}, {v:'9', m:10, s:'♠️'}, {v:'10', m:10, s:'♥️', r:true},
            {v:'J', m:11, s:'🃏', sp:true}, {v:'Q', m:12, s:'🃏', sp:true}, {v:'K', m:30, s:'🃏', sp:true}
        ];

        // 🔥 Chip Color/Style Map for Anim 🔥
        const chipConfig = {
            10: {c: '#3498db', tc: '#fff'},
            50: {c: '#9b59b6', tc: '#fff'},
            100: {c: '#2ecc71', tc: '#fff'},
            500: {c: '#e74c3c', tc: '#fff'},
            1000: {c: '#f1c40f', tc: '#000'}
        };

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function initAudio() { if(audioCtx.state === 'suspended') audioCtx.resume(); }

        function playCoinSound() {
            if(audioCtx.state === 'suspended') return;
            const n = audioCtx.currentTime;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = 'sine'; o.frequency.setValueAtTime(2500, n);
            o.frequency.exponentialRampToValueAtTime(600, n + 0.1);
            g.gain.setValueAtTime(0.08, n); g.gain.exponentialRampToValueAtTime(0.005, n + 0.1);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(n + 0.1);
        }

        const grid = document.getElementById('grid-container');
        cardsData.forEach(c => {
            const div = document.createElement('div');
            div.className = `card-box ${c.sp ? 'card-special' : ''}`;
            div.id = `box-${c.v}`;
            div.onclick = () => placeBet(div, c.v, selectedChipVal, selectedChipColor, true);
            div.innerHTML = `<div class="total-pool">₹<span id="total-${c.v}">0</span></div><div class="c-val ${c.r?'c-red':''}">${c.v}</div><div style="font-size:14px">${c.s}</div><div style="font-size:9px; background:#000; color:#ffd700; padding:1px 4px; border-radius:4px; font-weight:bold;">${c.m}x</div><div class="my-bet-tag" id="my-${c.v}">₹<span>0</span></div>`;
            grid.appendChild(div);
        });

        if (currentUserId) {
            db.ref(`users/${currentUserId}`).on('value', (s) => {
                const d = s.val() || {}; 
                depBal = parseFloat(d.balance||0); winBal = parseFloat(d.winning_balance||0); bonBal = parseFloat(d.bonus_balance||0);
                userBalance = depBal + winBal + bonBal; 
                document.getElementById('wallet-bal').innerText = userBalance.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            });
        }

        // 🔥 LIVE CHIP ANIMATION LOGIC 🔥
        let botBetsInterval;
        function startBotChipsAnimation() {
            if (botBetsInterval) clearInterval(botBetsInterval);
            
            // Dhada-dhad effect: creates 2-4 chips every 500ms
            botBetsInterval = setInterval(() => {
                if (!canBet) return;
                
                const boxes = [...document.querySelectorAll('.card-box'), ...document.querySelectorAll('.color-box')];
                const numChipsPerTick = Math.floor(Math.random() * 3) + 2; // 2 to 4 chips
                
                for (let i = 0; i < numChipsPerTick; i++) {
                    const target = boxes[Math.floor(Math.random() * boxes.length)];
                    const values = [10, 50, 100, 500];
                    const randVal = values[Math.floor(Math.random() * values.length)];
                    
                    // Call placeBet with isUser=false to trigger flying from Online point
                    placeBet(target, null, randVal, chipConfig[randVal].c, false);
                }
            }, 500); 
        }

        function stopBotChipsAnimation() {
            clearInterval(botBetsInterval);
        }

        // 🔥 GAME SERVER SYNC 🔥
        db.ref('Game/KalyanMatka/Status').on('value', (s) => {
            let data = s.val(); if(!data) return;
            
            if(data.state === 'betting') {
                document.getElementById('main-timer').style.display = 'block';
                document.getElementById('result-container').style.display = 'none'; 
                document.getElementById('main-timer').innerText = data.timer;
                canBet = true;
                
                if(lastState !== 'betting') {
                    resetGameUI();
                    startBotChipsAnimation(); // Start Anim
                }
                lastState = 'betting';
                
            } 
            else if(data.state === 'result') {
                canBet = false;
                stopBotChipsAnimation(); // Stop Anim
                document.getElementById('main-timer').style.display = 'none';
                document.getElementById('result-container').style.display = 'flex';
                document.getElementById('wait-timer').innerText = "Next Round in: " + (data.waitCount || 0);

                let winCard = cardsData.find(c => c.v == data.winner) || cardsData[0];
                document.getElementById('res-val').innerText = winCard.v;
                document.getElementById('res-val').style.color = winCard.r ? '#e74c3c' : '#000';
                document.getElementById('res-suit').innerText = winCard.s;

                if(lastState === 'betting') {
                    updateHistory(winCard);
                    processPayout(data.winner);
                    lastState = 'result';
                } else if (lastState === '') {
                    lastState = 'result';
                }
            }
        });

        function resetGameUI() {
            myTotalBet = 0; userBets = {}; 
            document.getElementById('my-bet-btn').innerText = "Total Bet: ₹0";
            document.querySelectorAll('.placed-chip').forEach(c => c.remove());
            document.querySelectorAll('.total-pool span').forEach(s => s.innerText = '0');
            document.querySelectorAll('.my-bet-tag').forEach(tag => { tag.style.display = 'none'; tag.querySelector('span').innerText = '0'; });
            document.getElementById('win-calc-alert').style.display = 'none';
        }

        function processPayout(winnerValue) {
            let winConfig = cardsData.find(c => c.v == winnerValue) || cardsData[0];
            let winColor = winConfig.r ? 'RED' : 'BLACK';
            
            let cardWin = (userBets[winnerValue] || 0) * winConfig.m;
            let colorWin = (userBets[winColor] || 0) * 1.95;
            let grossWin = cardWin + colorWin;
            
            if (grossWin > 0 && currentUserId) {
                let adminFee = grossWin * 0.05; 
                let netWin = grossWin - adminFee;
                db.ref(`users/${currentUserId}/winning_balance`).set(winBal + netWin);
                document.getElementById('w-gross').innerText = "₹" + grossWin.toLocaleString();
                document.getElementById('w-fee').innerText = "-₹" + adminFee.toLocaleString();
                document.getElementById('w-net').innerText = "₹" + netWin.toLocaleString();
                document.getElementById('win-calc-alert').style.display = 'block';
                playCoinSound(); setTimeout(playCoinSound, 200); setTimeout(playCoinSound, 400);
            }
        }

        function updateHistory(win) {
            const list = document.getElementById('history-list');
            const newItem = document.createElement('div');
            newItem.className = 'h-item';
            if(win.r) newItem.style.color = '#d32f2f';
            newItem.innerText = win.v;
            list.insertBefore(newItem, list.firstChild);
            if(list.children.length > 7) list.removeChild(list.lastChild);
        }

        function createChip(target, val, color, isUser) {
            const chip = document.createElement('div');
            chip.className = 'placed-chip';
            chip.style.backgroundColor = color;
            chip.innerText = val >= 1000 ? '1K' : val;
            
            // 🔥 Fix Text Color for Contrast 🔥
            const cConf = chipConfig[val];
            if(cConf) chip.style.color = cConf.tc;
            
            // 🔥 ORIGIN LOGIC 🔥
            let sX, sY;
            if(isUser) {
                // Flying from bottom center (user placed)
                sX = window.innerWidth/2;
                sY = window.innerHeight;
            } else {
                // 🔥 Flying from "Online" point in top corner 🔥
                const originRect = document.getElementById('online-origin').getBoundingClientRect();
                sX = originRect.left + (originRect.width / 2);
                sY = originRect.top + (originRect.height / 2);
            }
            
            chip.style.left = sX + 'px'; chip.style.top = sY + 'px';
            document.body.appendChild(chip);
            
            let dest = target.getBoundingClientRect();
            setTimeout(() => {
                chip.style.left = (dest.left + dest.width/2 + (Math.random()*30-15)) + 'px';
                chip.style.top = (dest.top + dest.height/2 + (Math.random()*20-10)) + 'px';
                if(isUser) playCoinSound(); // Only play sound for real user bets, too noisy otherwise
            }, 30);
        }

        function placeBet(el, betTarget, val, color, isUser) {
            if(!canBet) return;
            
            if(isUser) {
                if(!currentUserId) { alert("Login Error!"); return; } 
                if(userBalance < val) {
                    const alertBox = document.getElementById('low-bal-alert');
                    alertBox.style.display = 'block'; setTimeout(() => alertBox.style.display = 'none', 2000);
                    return; 
                }
                
                let nDep = depBal, nWin = winBal, rem = val;
                if(nDep >= rem) { nDep -= rem; } else { rem -= nDep; nDep = 0; nWin -= rem; }
                db.ref('users/'+currentUserId).update({ balance: Math.max(0, nDep), winning_balance: Math.max(0, nWin) });
                db.ref(`Game/KalyanMatka/Bets/${currentUserId}/${betTarget}`).set(firebase.database.ServerValue.increment(val));

                myTotalBet += val;
                userBets[betTarget] = (userBets[betTarget] || 0) + val;
                document.getElementById('my-bet-btn').innerText = "Total Bet: ₹" + myTotalBet.toLocaleString();

                let myTag = document.getElementById(`my-${betTarget}`);
                if(myTag) {
                    myTag.style.display = 'block';
                    myTag.querySelector('span').innerText = userBets[betTarget].toLocaleString();
                }
            }
            
            // Trigger animation
            createChip(el, val, color, isUser);
            
            // Overwrite visual pool immediately (fake chips add to visual total)
            let poolSpan = el.querySelector('.total-pool span');
            let currentPoolVal = parseInt(poolSpan.innerText.replace(/,/g, '')) || 0;
            poolSpan.innerText = (currentPoolVal + val).toLocaleString();
        }

        function selectChip(v, el, color) { 
            selectedChipVal = v; selectedChipColor = color;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected')); 
            el.classList.add('selected'); 
        }

        setInterval(() => {
            onlineCount += (Math.floor(Math.random() * 11) - 5);
            if(onlineCount < 450) onlineCount = 500;
            document.getElementById('online-count').innerText = onlineCount;
        }, 3000);

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
