<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalyan Matka - VIP Game</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ffd700; }
        body { margin: 0; background: #000; font-family: 'Arial Narrow', sans-serif; overflow: hidden; color: white; user-select: none; height: 100vh; display: flex; flex-direction: column; }
        
        /* ✅ TOP BAR: Date & Online Players */
        .top-bar { display: flex; justify-content: space-between; padding: 5px 10px; background: #111; border-bottom: 1.5px solid var(--gold); align-items: center; }
        .logo-area { display: flex; flex-direction: column; }
        .logo-hd { font-size: 15px; font-weight: 900; color: var(--gold); }
        .live-date { font-size: 9px; color: #bbb; font-weight: bold; }
        .online-status { font-size: 10px; color: #0f0; font-weight: bold; padding: 2px 8px; border-radius: 10px; border: 0.5px solid #0f0; }
        .bal-box { background: #111; border: 1px solid var(--gold); padding: 3px 10px; border-radius: 15px; color: #0f0; font-size: 13px; font-weight: bold; }
        
        .timer-sec { font-size: 32px; color: #fff; text-align: center; margin: 5px 0; font-weight: 900; text-shadow: 0 0 15px red; }
        
        .joker-reveal { text-align: center; min-height: 85px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .joker-pata { width: 60px; height: 80px; background: #fff; border: 2.5px solid var(--gold); border-radius: 8px; display: none; box-shadow: 0 0 25px gold; }
        .joker-pata img { width: 100%; height: 100%; border-radius: 6px; }

        .cards-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 5px; justify-items: center; flex-grow: 1; }
        .card-bet-box { width: 78px; height: 105px; background: #fff; border: 2px solid #444; border-radius: 8px; position: relative; }
        .card-bet-box img { width: 100%; height: 100%; border-radius: 6px; pointer-events: none; }
        .guna-tag { position: absolute; bottom: 3px; right: 3px; background: rgba(0,0,0,0.9); color: gold; font-size: 12px; padding: 2px 5px; border-radius: 4px; font-weight: 900; border: 1px solid gold; z-index: 20; }
        .pool-on-card { position: absolute; top: -8px; left: 50%; transform: translateX(-50%); background: #0f0; color: #000; font-size: 10px; padding: 1px 6px; border-radius: 50px; font-weight: bold; z-index: 10; border: 1px solid #000; }

        .chip-animate { position: fixed; width: 28px; height: 28px; border-radius: 50%; border: 1.5px dashed #fff; z-index: 9999; font-size: 10px; font-weight: 900; color: white; display: flex; align-items: center; justify-content: center; pointer-events: none; transition: all 0.4s ease-out; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .bot-players-row { display: flex; justify-content: space-around; background: #111; padding: 8px 0; border-top: 1px solid #333; min-height: 45px; }
        .bot-p { text-align: center; width: 62px; font-size: 9px; }

        .chip-footer { display: flex; justify-content: center; gap: 8px; padding: 15px 0; border-top: 2.5px solid var(--gold); }
        .c-btn { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid #fff; cursor: pointer; font-size: 11px; }
        .selected { border: 4px solid var(--gold) !important; transform: scale(1.15); box-shadow: 0 0 15px var(--gold); }
        .game-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); border: 4px solid gold; color: gold; padding: 30px; border-radius: 20px; z-index: 10000; display: none; text-align: center; font-size: 26px; font-weight: 900; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo-area">
            <div class="logo-hd">KALYAN MATKA</div>
            <div id="current-date" class="live-date"></div>
        </div>
        <div class="online-status">🟢 ONLINE: <span id="online-count">650</span></div>
        <div class="bal-box">₹ <span id="balance">0.00</span></div>
    </div>

    <div class="timer-sec" id="timer">15</div>

    <div class="joker-reveal">
        <div id="joker-display" class="joker-pata"></div>
        <div id="status-msg" style="color:gold; font-size:13px; font-weight:bold;">BETTING START</div>
    </div>

    <div class="cards-grid" id="main-grid"></div>
    <div id="bot-row" class="bot-players-row"></div>

    <div class="chip-footer">
        <div class="c-btn" id="chip10" style="background:#fff; color:#000" onclick="setChip(10, this)">10</div>
        <div class="c-btn" id="chip50" style="background:orange; color:#000" onclick="setChip(50, this)">50</div>
        <div class="c-btn" id="chip100" style="background:#2196f3; color:#fff" onclick="setChip(100, this)">100</div>
        <div class="c-btn" id="chip500" style="background:#4caf50; color:#000" onclick="setChip(500, this)">500</div>
        <div class="c-btn" id="chip1000" style="background:#f44336; color:#fff" onclick="setChip(1000, this)">1K</div>
    </div>

    <div id="bet-stop-pop" class="game-popup">🚫 BET STOP 🚫</div>
    <div id="wait-pop" class="game-popup">PLEASE WAIT...<br><span id="wait-count" style="font-size:45px;">3</span></div>

    <script>
        // ✅ Aapka Firebase Config Dashboard se liya gaya
        const firebaseConfig = { 
            apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", 
            databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", 
            projectId: "kalyan-casino" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const phone = localStorage.getItem('userPhone') || "Guest";

        const casinoCards = [
            {v:'A', g:2, i: 'https://deckofcardsapi.com/static/img/AS.png'}, {v:'2', g:2, i: 'https://deckofcardsapi.com/static/img/2H.png'}, 
            {v:'3', g:3, i: 'https://deckofcardsapi.com/static/img/3D.png'}, {v:'4', g:4, i: 'https://deckofcardsapi.com/static/img/4C.png'}, 
            {v:'5', g:5, i: 'https://deckofcardsapi.com/static/img/5H.png'}, {v:'6', g:6, i: 'https://deckofcardsapi.com/static/img/6S.png'}, 
            {v:'8', g:8, i: 'https://deckofcardsapi.com/static/img/8C.png'}, {v:'J', g:11, i: 'https://deckofcardsapi.com/static/img/JH.png'}, 
            {v:'Q', g:2, i: 'https://deckofcardsapi.com/static/img/QD.png'}, {v:'K', g:25, i: 'https://deckofcardsapi.com/static/img/KC.png'}
        ];

        let selectChip = 10, chipBg = "#fff", chipTxt = "#000", isBetting = false, poolVal = {}, myBetVal = {}, timerSec = 15, currentBots = [], currentOnline = 650;

        function updateHeader() {
            const d = new Date();
            document.getElementById('current-date').innerText = `${d.getDate()}-${d.getMonth()+1}-${d.getFullYear()}`;
            const change = Math.floor(Math.random() * 5) - 2;
            currentOnline += change;
            if(currentOnline < 520) currentOnline = 520;
            document.getElementById('online-count').innerText = currentOnline;
        }

        function initGrid() {
            const grid = document.getElementById('main-grid'); grid.innerHTML = "";
            casinoCards.forEach(c => {
                poolVal[c.v] = 0; myBetVal[c.v] = 0;
                grid.innerHTML += `<div class="card-bet-box" id="box-${c.v}" onclick="userBet('${c.v}')"><span class="pool-on-card" id="pool-${c.v}">₹0</span><img src="${c.i}"><span class="guna-tag">${c.g}x</span></div>`;
            });
            document.getElementById('chip10').classList.add('selected');
        }

        function startEngine() {
            isBetting = true; timerSec = 15;
            resetUI();
            generateBots();
            let betTimer = setInterval(() => {
                if(timerSec > 0) {
                    timerSec--;
                    document.getElementById('timer').innerText = timerSec;
                    botLoop();
                } else {
                    clearInterval(betTimer);
                    isBetting = false;
                    handleSequence();
                }
            }, 1000);
        }

        async function handleSequence() {
            document.getElementById('bet-stop-pop').style.display = 'block';
            await new Promise(r => setTimeout(r, 1500));
            document.getElementById('bet-stop-pop').style.display = 'none';
            const win = revealWinner();
            await new Promise(r => setTimeout(r, 2000));
            currentBots.forEach(bot => { if(bot.bets[win.v]) bot.bal += (bot.bets[win.v] * win.g); });
            renderBots();
            document.getElementById('wait-pop').style.display = 'block';
            for(let i=3; i>0; i--) { document.getElementById('wait-count').innerText = i; await new Promise(r => setTimeout(r, 1000)); }
            document.getElementById('wait-pop').style.display = 'none';
            startEngine();
        }

        function botLoop() {
            if(!isBetting) return;
            currentBots.forEach(bot => {
                if(Math.random() > 0.4) {
                    const card = casinoCards[Math.floor(Math.random() * 10)];
                    const opts = [{v:10, l:'10', c:'#fff', t:'#000'}, {v:50, l:'50', c:'orange', t:'#000'}, {v:100, l:'100', c:'#2196f3', t:'#fff'}, {v:500, l:'500', c:'#4caf50', t:'#000'}, {v:1000, l:'1K', c:'#f44336', t:'#fff'}];
                    const pick = opts[Math.floor(Math.random()*5)];
                    if(bot.bal >= pick.v) {
                        bot.bal -= pick.v; bot.bets[card.v] = (bot.bets[card.v]||0) + pick.v; poolVal[card.v] += pick.v;
                        flyChip(Math.random() > 0.5 ? 'left' : 'right', card.v, pick.l, pick.c, pick.t);
                        document.getElementById(`pool-${card.v}`).innerText = "₹" + poolVal[card.v].toLocaleString();
                    }
                }
            });
            renderBots();
        }

        function flyChip(side, val, label, bg, col) {
            const target = document.getElementById(`box-${val}`).getBoundingClientRect();
            const chip = document.createElement('div');
            chip.className = 'chip-animate game-chip';
            chip.innerText = label; chip.style.background = bg; chip.style.color = col;
            chip.style.left = (side === 'left' ? '-30px' : window.innerWidth + 'px');
            chip.style.top = (Math.random() * 400 + 100) + 'px';
            document.body.appendChild(chip);
            setTimeout(() => { chip.style.left = (target.left + 15) + 'px'; chip.style.top = (target.top + 25) + 'px'; chip.style.transform = "scale(0.85)"; }, 50);
        }

        function generateBots() {
            currentBots = [];
            for(let i=0; i<5; i++) currentBots.push({ id: Math.floor(1000+Math.random()*9000), bal: Math.floor(20000+Math.random()*40000), bets: {} });
            renderBots();
        }

        function renderBots() {
            const row = document.getElementById('bot-row'); row.innerHTML = "";
            currentBots.forEach(bot => { row.innerHTML += `<div class="bot-p">ID:${bot.id}<br><b style="color:#0f0">₹${Math.floor(bot.bal).toLocaleString()}</b></div>`; });
        }

        function revealWinner() {
            const win = casinoCards[Math.floor(Math.random()*10)];
            document.getElementById('status-msg').innerText = "RESULT";
            document.getElementById('joker-display').innerHTML = `<img src="${win.i}">`; 
            document.getElementById('joker-display').style.display = 'block';
            if(myBetVal[win.v]>0) {
                const winAmt = myBetVal[win.v]*win.g;
                db.ref('users/'+phone).once('value', s => { 
                    db.ref('users/'+phone).update({balance: (parseFloat(s.val().balance||0)+winAmt)}); 
                });
            }
            return win;
        }

        function resetUI() {
            document.getElementById('joker-display').style.display = 'none';
            document.querySelectorAll('.game-chip').forEach(c => c.remove());
            casinoCards.forEach(c => { poolVal[c.v]=0; myBetVal[c.v]=0; document.getElementById(`pool-${c.v}`).innerText = "₹0"; });
            updateHeader();
        }

        function userBet(val) {
            if(!isBetting) return;
            db.ref('users/'+phone).once('value', s => {
                let b = parseFloat(s.val().balance || 0);
                if(b >= selectChip) {
                    db.ref('users/'+phone).update({balance: b - selectChip});
                    myBetVal[val] += selectChip; poolVal[val] += selectChip;
                    document.getElementById(`pool-${val}`).innerText = "₹" + poolVal[val].toLocaleString();
                    flyChip('left', val, selectChip >= 1000 ? '1K' : selectChip, chipBg, chipTxt);
                }
            });
        }

        function setChip(v, el) { 
            selectChip = v; chipBg = window.getComputedStyle(el).backgroundColor; chipTxt = window.getComputedStyle(el).color;
            document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('selected')); el.classList.add('selected'); 
        }

        db.ref('users/' + phone).on('value', (snapshot) => {
            const data = snapshot.val() || {};
            document.getElementById('balance').innerText = parseFloat(data.balance||0).toFixed(2);
        });

        initGrid(); startEngine();
    </script>
</body>
</html>
