<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalyan VIP - Matka Play</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; user-select: none; }
        
        :root {
            --bg-dark: #0a0a0c; --gold: #ffd700; --gold-dark: #b8860b;
            --neon-green: #00ff88; --neon-red: #ff3333; --neon-blue: #00ddff;
            --panel-bg: rgba(20, 25, 30, 0.85);
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top, #1a1a24 0%, var(--bg-dark) 100%);
            color: white; height: 100vh; display: flex; flex-direction: column; overflow-y: auto;
        }

        /* --- HEADER --- */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(0,0,0,0.9);
            border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 100;
            box-shadow: 0 5px 15px rgba(255,215,0,0.15);
        }
        .back-btn { color: var(--gold); font-size: 20px; cursor: pointer; text-decoration: none; }
        .logo { font-size: 18px; font-weight: 900; color: white; letter-spacing: 1px; }
        .logo span { color: var(--gold); }
        .wallet-box { 
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(0,0,0,0.8)); 
            padding: 5px 12px; border-radius: 20px; border: 1px solid var(--gold); 
            color: var(--neon-green); font-weight: 900; font-size: 14px;
        }

        /* --- MARKET SELECTOR --- */
        .market-banner {
            margin: 15px; padding: 15px; border-radius: 12px; text-align: center;
            background: linear-gradient(135deg, #2a0800, #550000);
            border: 2px solid var(--neon-red); box-shadow: 0 0 15px rgba(255,51,51,0.3);
        }
        .market-banner h2 { margin: 0; color: var(--gold); font-size: 24px; text-shadow: 0 2px 5px #000; text-transform: uppercase; }
        .market-status { display: inline-block; margin-top: 5px; background: var(--neon-green); color: #000; padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 900; }

        /* --- GAME TYPE TABS --- */
        .tab-container { display: flex; justify-content: center; gap: 10px; margin: 0 15px 15px; }
        .tab-btn {
            flex: 1; padding: 10px 5px; background: #111; border: 1px solid #444;
            color: #aaa; font-weight: 800; font-size: 13px; border-radius: 8px; cursor: pointer;
            transition: 0.3s; text-align: center;
        }
        .tab-btn.active { background: linear-gradient(to bottom, #ffe066, #b8860b); color: #000; border-color: #fff; box-shadow: 0 4px 10px rgba(255,215,0,0.4); }

        /* --- BETTING PANEL --- */
        .bet-panel {
            background: var(--panel-bg); margin: 0 15px 20px; border-radius: 15px;
            padding: 20px; border: 1px solid rgba(255,215,0,0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: var(--gold); font-weight: 700; margin-bottom: 5px; }
        .input-box {
            width: 100%; padding: 12px; background: #050508; border: 2px solid #333;
            border-radius: 8px; color: #fff; font-size: 16px; font-weight: 900; text-align: center;
            outline: none; transition: 0.3s;
        }
        .input-box:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0,221,255,0.3); }
        
        /* Submit Button */
        .btn-submit {
            width: 100%; padding: 15px; background: linear-gradient(90deg, #00ff88, #009955);
            color: #000; font-size: 16px; font-weight: 900; border: 2px solid #fff;
            border-radius: 10px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0,255,136,0.4); transition: 0.2s; margin-top: 5px;
        }
        .btn-submit:active { transform: scale(0.95); }

        /* --- RECENT RESULTS --- */
        .result-section { margin: 0 15px 20px; }
        .result-title { color: white; font-size: 14px; font-weight: 900; border-left: 3px solid var(--gold); padding-left: 10px; margin-bottom: 10px; }
        .result-card {
            background: #111; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between;
            align-items: center; border: 1px solid #333; margin-bottom: 10px;
        }
        .r-market { color: #ccc; font-size: 13px; font-weight: 700; }
        .r-number { color: var(--gold); font-size: 22px; font-weight: 900; letter-spacing: 2px; }

        /* --- SUCCESS POPUP --- */
        .popup-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .popup-box {
            background: linear-gradient(135deg, #111, #000); border: 2px solid var(--neon-green);
            padding: 25px; border-radius: 15px; text-align: center; width: 85%; max-width: 350px;
            box-shadow: 0 0 20px rgba(0,255,136,0.4); animation: popIn 0.3s ease;
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .popup-box i { font-size: 50px; color: var(--neon-green); margin-bottom: 10px; }
        .popup-box h3 { color: white; margin-bottom: 5px; }
        .popup-box p { color: #aaa; font-size: 13px; margin-bottom: 15px; }
        .btn-close { background: var(--gold); color: #000; padding: 8px 20px; border: none; border-radius: 5px; font-weight: 900; cursor: pointer; }

    </style>
</head>
<body>

    <div class="header">
        <a href="javascript:history.back()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <div class="logo">KALYAN <span>MATKA</span></div>
        <div class="wallet-box">₹ <span id="wallet-bal">10000</span></div>
    </div>

    <div class="market-banner">
        <h2>KALYAN VIP</h2>
        <div class="market-status">● MARKET OPEN</div>
        <p style="font-size: 11px; color: #ccc; margin-top: 5px;">Closes at: 03:45 PM | Result: 04:00 PM</p>
    </div>

    <div class="tab-container">
        <div class="tab-btn active" onclick="switchTab('single', this)">SINGLE</div>
        <div class="tab-btn" onclick="switchTab('jodi', this)">JODI</div>
        <div class="tab-btn" onclick="switchTab('panna', this)">PANNA</div>
    </div>

    <div class="bet-panel">
        <div class="input-group">
            <label id="lbl-number">Enter Single Digit (0-9)</label>
            <input type="number" id="bet-number" class="input-box" placeholder="Example: 5" oninput="limitInput(this)">
        </div>
        
        <div class="input-group">
            <label>Enter Amount (Points)</label>
            <input type="number" id="bet-amount" class="input-box" placeholder="Min: 10">
        </div>

        <button class="btn-submit" onclick="placeBet()">PLACE BET</button>
    </div>

    <div class="result-section">
        <div class="result-title">LIVE RESULTS</div>
        <div class="result-card">
            <div class="r-market">TIME BAZAR<br><span style="color:#888; font-size:10px;">Today 01:00 PM</span></div>
            <div class="r-number">345-28-189</div>
        </div>
        <div class="result-card">
            <div class="r-market">MADHUR DAY<br><span style="color:#888; font-size:10px;">Today 01:30 PM</span></div>
            <div class="r-number">120-35-230</div>
        </div>
    </div>

    <div class="popup-overlay" id="success-popup">
        <div class="popup-box">
            <i class="fa-solid fa-circle-check"></i>
            <h3>Bet Successful!</h3>
            <p>Your bet has been placed securely.<br>Good Luck!</p>
            <button class="btn-close" onclick="closePopup()">OKAY</button>
        </div>
    </div>

    <script>
        // Default Settings
        let walletBalance = 10000;
        let currentGameType = 'single'; // single, jodi, panna
        const walletElem = document.getElementById('wallet-bal');

        // Update Wallet on Load
        walletElem.innerText = walletBalance.toLocaleString();

        // Switch Tabs (Single, Jodi, Panna)
        function switchTab(type, element) {
            currentGameType = type;
            
            // UI Update
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');

            // Change Input Label & Clear Input
            const lbl = document.getElementById('lbl-number');
            const numInput = document.getElementById('bet-number');
            numInput.value = '';

            if(type === 'single') {
                lbl.innerText = "Enter Single Digit (0-9)";
                numInput.placeholder = "Example: 5";
            } else if (type === 'jodi') {
                lbl.innerText = "Enter Jodi Digit (00-99)";
                numInput.placeholder = "Example: 45";
            } else if (type === 'panna') {
                lbl.innerText = "Enter Panna Digit (3 digits)";
                numInput.placeholder = "Example: 345";
            }
        }

        // Limit Input based on Game Type
        function limitInput(input) {
            let val = input.value;
            if (currentGameType === 'single' && val.length > 1) input.value = val.slice(0, 1);
            if (currentGameType === 'jodi' && val.length > 2) input.value = val.slice(0, 2);
            if (currentGameType === 'panna' && val.length > 3) input.value = val.slice(0, 3);
        }

        // Place Bet Logic
        function placeBet() {
            let num = document.getElementById('bet-number').value;
            let amt = parseInt(document.getElementById('bet-amount').value);

            if(!num) { alert("Please enter a number to bet on!"); return; }
            if(!amt || amt < 10) { alert("Minimum bet amount is 10 points!"); return; }
            
            // Format check
            if (currentGameType === 'single' && num.length !== 1) { alert("Single must be 1 digit!"); return; }
            if (currentGameType === 'jodi' && num.length !== 2) { alert("Jodi must be 2 digits!"); return; }
            if (currentGameType === 'panna' && num.length !== 3) { alert("Panna must be 3 digits!"); return; }

            if(amt > walletBalance) { alert("Insufficient Balance!"); return; }

            // Deduct Balance
            walletBalance -= amt;
            walletElem.innerText = walletBalance.toLocaleString();

            // Clear inputs
            document.getElementById('bet-number').value = '';
            document.getElementById('bet-amount').value = '';

            // Show Success Popup
            document.getElementById('success-popup').style.display = 'flex';
        }

        function closePopup() {
            document.getElementById('success-popup').style.display = 'none';
        }
    </script>
</body>
</html>
