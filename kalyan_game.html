<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalyan Matka - VIP Final HD</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ffd700; }
        body { margin: 0; background: #000; font-family: 'Arial Narrow', sans-serif; overflow: hidden; color: white; user-select: none; height: 100vh; display: flex; flex-direction: column; }
        .top-bar { display: flex; justify-content: space-between; padding: 5px 10px; background: #111; border-bottom: 1.5px solid var(--gold); align-items: center; }
        .logo-hd { font-size: 14px; font-weight: 900; color: var(--gold); }
        .online-status { font-size: 10px; color: #0f0; font-weight: bold; padding: 2px 8px; border-radius: 10px; border: 0.5px solid #0f0; min-width: 80px; text-align: center; }
        .stats-area { display: flex; gap: 5px; align-items: center; }
        .bal-box { background: #111; border: 1px solid var(--gold); padding: 3px 10px; border-radius: 15px; color: #0f0; font-size: 12px; font-weight: bold; }
        .my-bet-box { background: #111; border: 1px solid #f00; padding: 3px 10px; border-radius: 15px; color: #fff; font-size: 12px; font-weight: bold; }
        
        .timer-sec { font-size: 32px; color: #fff; text-align: center; margin: 5px 0; font-weight: 900; text-shadow: 0 0 15px red; }
        .joker-reveal { text-align: center; min-height: 85px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .joker-pata { width: 60px; height: 80px; background: #fff; border: 2.5px solid var(--gold); border-radius: 8px; display: none; box-shadow: 0 0 25px gold; z-index: 100; overflow: hidden; }
        .joker-pata img { width: 100%; height: 100%; border-radius: 6px; }
        
        .cards-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 5px; justify-items: center; flex-grow: 1; }
        .card-bet-box { width: 78px; height: 105px; background: #fff; border: 2px solid #444; border-radius: 8px; position: relative; cursor: pointer; transition: 0.2s; }
        .card-bet-box:active { transform: scale(0.95); }
        .card-bet-box img { width: 100%; height: 100%; border-radius: 6px; }
        .guna-tag { position: absolute; bottom: 3px; right: 3px; background: rgba(0,0,0,0.9); color: gold; font-size: 10px; padding: 1px 4px; border-radius: 4px; font-weight: 900; border: 1px solid gold; z-index: 20; }
        .pool-on-card { position: absolute; top: -8px; left: 50%; transform: translateX(-50%); background: #0f0; color: #000; font-size: 10px; padding: 1px 6px; border-radius: 50px; font-weight: bold; z-index: 30; border: 1px solid #000; }
        
        .chip-animate { position: fixed; width: 22px; height: 22px; border-radius: 50%; border: 1px solid #fff; z-index: 50; font-size: 9px; font-weight: 900; color: white; display: flex; align-items: center; justify-content: center; pointer-events: none; transition: all 0.5s ease-out; box-shadow: 0 2px 5px #000; }
        
        .bot-players-row { display: flex; justify-content: space-around; background: #111; padding: 8px 0; border-top: 1px solid #333; min-height: 45px; }
        .bot-p { text-align: center; width: 62px; font-size: 9px; }
        
        .chip-footer { display: flex; justify-content: center; gap: 8px; padding: 15px 0; border-top: 2.5px solid var(--gold); background: #000; }
        .c-btn { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid #fff; cursor: pointer; font-size: 11px; transition: 0.2s; }
        .selected { border: 4px solid var(--gold) !important; transform: scale(1.15); box-shadow: 0 0 10px var(--gold); }
        
        .game-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); border: 3px solid gold; color: gold; padding: 25px; border-radius: 20px; z-index: 2000; display: none; text-align: center; font-size: 24px; font-weight: 900; box-shadow: 0 0 30px #000; }
        .win-glow { box-shadow: 0 0 20px #0f0, inset 0 0 15px #0f0 !important; border: 3px solid #0f0 !important; transform: scale(1.05); }
    </style>
</head>
<body onload="initGame()">

    <div class="top-bar">
        <div class="logo-hd">VIP KALYAN</div>
        <div class="online-status">🟢 <span id="online-count">750</span></div>
        <div class="stats-area">
            <div class="my-bet-box">My Bet: ₹<span id="total-bet">0</span></div>
            <div class="bal-box">₹<span id="balance">0.00</span></div>
        </div>
    </div>

    <div class="timer-sec" id="timer">Wait</div>

    <div class="joker-reveal">
        <div id="joker-display" class="joker-pata"></div>
        <div id="status-msg" style="color:gold; font-size:12px; font-weight:bold; margin-top:5px;">CONNECTING...</div>
    </div>

    <div class="cards-grid" id="main-grid"></div>
    <div id="bot-row" class="bot-players-row"></div>

    <div class="chip-footer">
        <div class="c-btn" id="c10" style="background:#fff; color:#000" onclick="setChip(10, this)">10</div>
        <div class="c-btn" id="c50" style="background:orange; color:#000" onclick="setChip(50, this)">50</div>
        <div class="c-btn" id="c100" style="background:#2196f3; color:#fff" onclick="setChip(100, this)">100</div>
        <div class="c-btn" id="c500" style="background:#4caf50; color:#fff" onclick="setChip(500, this)">500</div>
        <div class="c-btn" id="c1000" style="background:#f44336; color:#fff" onclick="setChip(1000, this)">1K</div>
    </div>

    <div id="bet-stop-pop" class="game-popup">🚫 BET STOP 🚫</div>
    <div id="win-amt-pop" class="game-popup" style="color:#0f0; border-color:#0f0; font-size:35px;">+₹0</div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const phone = localStorage.getItem('userPhone') || localStorage.getItem('phone');
        let totalBal = 0, depBal = 0, winBal = 0, bonBal = 0;

        const cards = [
            {v:'A', g:2, i:'https://deckofcardsapi.com/static/img/AS.png'}, {v:'2', g:2, i:'https://deckofcardsapi.com/static/img/2H.png'},
            {v:'3', g:3, i:'https://deckofcardsapi.com/static/img/3D.png'}, {v:'4', g:4, i:'https://deckofcardsapi.com/static/img/4C.png'},
            {v:'5', g:5, i:'https://deckofcardsapi.com/static/img/5H.png'}, {v:'6', g:6, i:'https://deckofcardsapi.com/static/img/6S.png'},
            {v:'8', g:8, i:'https://deckofcardsapi.com/static/img/8C.png'}, {v:'J', g:11, i:'https://deckofcardsapi.com/static/img/JH.png'},
            {v:'Q', g:2, i:'https://deckofcardsapi.com/static/img/QD.png'}, {v:'K', g:25, i:'https://deckofcardsapi.com/static/img/KC.png'}
        ];

        let curChip = 10, chipBg="#fff", chipTxt="#000", isBettingOpen = false;
        let pool = {}, myBets = {}, totalUserBet = 0;
        
        const chipColors = { 10: '#fff', 50: 'orange', 100: '#2196f3', 500: '#4caf50', 1000: '#f44336' };
        const chipTextColors = { 10: '#000', 50: '#000', 100: '#fff', 500: '#fff', 1000: '#fff' };

        function initGame() {
            const grid = document.getElementById('main-grid'); grid.innerHTML = "";
            cards.forEach(c => {
                pool[c.v] = 0; myBets[c.v] = 0;
                grid.innerHTML += `<div class="card-bet-box" id="box-${c.v}" onclick="userBet('${c.v}')"><span class="pool-on-card" id="pool-${c.v}">₹0</span><img src="${c.i}"><span class="guna-tag">${c.g}x</span></div>`;
            });
            document.getElementById('c10').classList.add('selected');
            updateBotsVisuals(); 
            startOnlineCounter();
            syncWallet();
        }

        // SYNC WALLET (Deposit + Winning)
        function syncWallet() {
            if(!phone) return;
            db.ref(`users/${phone}`).on('value', s => { 
                let d = s.val() || {};
                depBal = parseFloat(d.balance || 0); winBal = parseFloat(d.winning_balance || 0); bonBal = parseFloat(d.bonus_balance || 0);
                totalBal = Math.max(0, depBal + winBal + bonBal);
                document.getElementById('balance').innerText = totalBal.toFixed(2); 
            });
        }

        function startOnlineCounter() {
            let count = 750;
            setInterval(() => {
                count += Math.floor(Math.random() * 9) - 4; 
                if(count < 730) count = 740; if(count > 800) count = 790;
                document.getElementById('online-count').innerText = count;
            }, 3500);
        }

        function updateBotsVisuals() {
            let h = "";
            for(let i=0; i<5; i++) {
                let id = Math.floor(1000+Math.random()*9000); let bal = Math.floor(50000+Math.random()*50000);
                h += `<div class="bot-p">ID:${id}<br><b style="color:#0f0">₹${bal.toLocaleString()}</b></div>`;
            }
            document.getElementById('bot-row').innerHTML = h;
        }
        setInterval(updateBotsVisuals, 20000);

        function flyChip(side, v, label, bg, col) {
            const box = document.getElementById(`box-${v}`).getBoundingClientRect();
            const chip = document.createElement('div');
            chip.className = 'chip-animate game-chip-stack';
            chip.innerText = label; chip.style.background = bg; chip.style.color = col;
            chip.style.left = (side === 'left' ? '-30px' : window.innerWidth + 'px');
            chip.style.top = (Math.random() * 400 + 100) + 'px';
            document.body.appendChild(chip);
            setTimeout(() => {
                chip.style.left = (box.left + (Math.random() * 30 + 15)) + 'px'; 
                chip.style.top = (box.top + (Math.random() * 50 + 20)) + 'px';
                chip.style.transform = "scale(0.8)";
            }, 50);
            setTimeout(() => chip.remove(), 2500); // cleanup
        }

        function setChip(v, el) { 
            curChip = v; chipBg = chipColors[v]; chipTxt = chipTextColors[v];
            document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('selected')); el.classList.add('selected'); 
        }

        // REAL USER BET PUSH TO FIREBASE
        window.userBet = function(v) {
            if(!isBettingOpen) return;
            if(!phone) { alert("Login Error!"); return; }
            if(totalBal < curChip) { alert("Insufficient Balance!"); return; }

            let nDep = depBal, nWin = winBal, rem = curChip;
            if(nDep >= rem) { nDep -= rem; } else { rem -= nDep; nDep = 0; nWin -= rem; }
            db.ref(`users/${phone}`).update({ balance: Math.max(0, nDep), winning_balance: Math.max(0, nWin) });

            db.ref(`Game/KalyanMatka/Bets/${phone}/${v}`).set(firebase.database.ServerValue.increment(curChip));
            
            pool[v] += curChip; myBets[v] += curChip; totalUserBet += curChip;
            document.getElementById('total-bet').innerText = totalUserBet.toLocaleString();
            document.getElementById(`pool-${v}`).innerText = "₹" + pool[v].toLocaleString();
            flyChip('left', v, curChip >= 1000 ? '1K' : curChip, chipBg, chipTxt);
        }

        // DUMB CLIENT: LISTENING TO MASTER ENGINE
        db.ref('Game/KalyanMatka/Status').on('value', snap => {
            let st = snap.val(); if(!st) return;

            if(st.state === 'betting') {
                isBettingOpen = true;
                document.getElementById('timer').innerText = st.timer;
                document.getElementById('timer').style.color = st.timer <= 5 ? "red" : "#fff";
                document.getElementById('status-msg').innerText = st.timer <= 5 ? "CLOSING..." : "BETTING START";

                if(st.timer === 15) resetUI();

                // VISUAL BOTS
                if(st.timer > 1 && Math.random() > 0.3) {
                    let randCard = cards[Math.floor(Math.random() * cards.length)];
                    let amt = [10, 50, 100, 500, 1000][Math.floor(Math.random()*5)];
                    pool[randCard.v] += amt;
                    document.getElementById(`pool-${randCard.v}`).innerText = "₹" + pool[randCard.v].toLocaleString();
                    flyChip('right', randCard.v, amt >= 1000 ? '1K' : amt, chipColors[amt], chipTextColors[amt]);
                }
            } 
            else if (st.state === 'result' && isBettingOpen) {
                isBettingOpen = false;
                document.getElementById('timer').innerText = "0";
                showResultAnim(st.winner);
            }
        });

        async function showResultAnim(winCardVal) {
            document.getElementById('bet-stop-pop').style.display = 'block';
            await new Promise(r => setTimeout(r, 1500));
            document.getElementById('bet-stop-pop').style.display = 'none';

            let winObj = cards.find(c => c.v === winCardVal);
            
            document.getElementById('joker-display').innerHTML = `<img src="${winObj.i}">`;
            document.getElementById('joker-display').style.display = 'block';
            document.getElementById('status-msg').innerText = "WINNER: " + winObj.v;
            document.getElementById(`box-${winObj.v}`).classList.add('win-glow');

            // Payout Logic (Only if user won)
            if(myBets[winObj.v] > 0 && phone) {
                let winAmt = myBets[winObj.v] * winObj.g;
                db.ref(`users/${phone}/winning_balance`).set(winBal + winAmt);
                
                let p = document.getElementById('win-amt-pop');
                p.innerText = "+₹" + winAmt.toLocaleString();
                p.style.display = 'block';
                setTimeout(() => p.style.display = 'none', 3000);
            }
        }

        function resetUI() {
            document.getElementById('joker-display').style.display = 'none';
            document.querySelectorAll('.game-chip-stack').forEach(c => c.remove());
            document.querySelectorAll('.card-bet-box').forEach(b => b.classList.remove('win-glow'));
            
            totalUserBet = 0; document.getElementById('total-bet').innerText = "0";
            cards.forEach(c => { pool[c.v]=0; myBets[c.v]=0; document.getElementById(`pool-${c.v}`).innerText = "₹0"; });
        }
    </script>
</body>
</html>
