        var rollInt = setInterval(function() { diceBtn.innerText = Math.floor(Math.random()*6)+1; }, 50);
        
        setTimeout(function() {
            clearInterval(rollInt);
            diceBtn.classList.remove('dice-rolling');
            
            currentDice = Math.floor(Math.random() * 6) + 1;
            diceBtn.innerText = currentDice;
            
            startTimer(); // Goti select karne ke liye waapas 15s timer chalu
            checkMoves('red');
        }, 400);
    }

    function checkMoves(player) {
        var movable = [];
        for(var i=0; i<4; i++) {
            var p = tokens[player][i];
            // EXACT LOGIC: 6 par bahar wali aur andar wali dono valid hain
            if(p === 0 && currentDice === 6) movable.push(i); 
            else if(p > 0 && p + currentDice <= 57) movable.push(i); 
        }

        if(movable.length === 0) {
            setTimeout(passTurn, 800);
        } else {
            if(player === 'red') {
                isWaitingForClick = true;
                document.getElementById('turn-msg').innerText = "TAP A GOTI!";
                
                // Jis par ungli rakhoge wahi chalegi (Highlight all valid options)
                movable.forEach(function(i) { 
                    var g = document.getElementById('red-'+i);
                    g.classList.add('highlight'); 
                    g.style.zIndex = "150"; 
                });
            } else {
                setTimeout(function() {
                    var choice = movable[0];
                    if(currentDice === 6) { for(var k=0; k<movable.length; k++) { if(tokens[player][movable[k]] === 0) choice = movable[k]; } }
                    moveToken(player, choice);
                }, 1000);
            }
        }
    }

    function moveToken(player, index) {
        if(player === 'red') {
            var g = document.getElementById('red-'+index);
            if(!isWaitingForClick || !g.classList.contains('highlight')) return; // Sirf chamakti goti chalegi
            
            // Sabki chamak (highlight) hatayein
            for(var i=0; i<4; i++) {
                document.getElementById('red-'+i).classList.remove('highlight');
                document.getElementById('red-'+i).style.zIndex = "50"; 
            }
            isWaitingForClick = false;
        }
        
        stopTimer(); // Chaal chal di, timer band
        playActionSound('move');

        if(tokens[player][index] === 0) tokens[player][index] = 1; 
        else tokens[player][index] += currentDice; 
        
        updateBoard();

        if(tokens[player][index] === 57) {
            if(player === 'red') triggerWin(activeWinAmt, true);
            else triggerWin(0, false);
            return;
        }

        if(currentDice === 6) {
            if(player === 'red') { 
                document.getElementById('turn-msg').innerText = "ROLL AGAIN!"; 
                isRolling = false;
                startTimer(); // Waapas timer shuru 6 aane par
            } 
            else { setTimeout(botTurn, 800); }
        } else {
            passTurn();
        }
    }

    function passTurn() {
        turnIndex = (turnIndex + 1) % turnOrder.length;
        turn = turnOrder[turnIndex];
        updateTurnUI();
    }

    function botTurn() {
        if(turn === 'red' || turn === 'none') return;
        var diceBtn = document.getElementById('dice');
        playActionSound('dice'); diceBtn.classList.add('dice-rolling');
        var rollInt = setInterval(function() { diceBtn.innerText = Math.floor(Math.random()*6)+1; }, 50);
        setTimeout(function() {
            clearInterval(rollInt); diceBtn.classList.remove('dice-rolling');
            var bias = currentMode == '4' ? 0.35 : 0.3;
            currentDice = (Math.random() < bias) ? 6 : Math.floor(Math.random() * 5) + 1;
            diceBtn.innerText = currentDice;
            checkMoves(turn);
        }, 400);
    }

    function triggerWin(amt, isPlayerWin) {
        turn = 'none'; stopTimer(); playActionSound('win');
        var modal = document.getElementById('win-modal'); var title = document.getElementById('win-title'); var cashText = document.getElementById('win-cash');
        modal.style.display = 'block';
        if(isPlayerWin) {
            title.innerText = "YOU WON! 🏆"; title.style.color = "var(--gold)"; cashText.innerText = "+ ₹" + amt.toFixed(0);
            db.ref('users/'+phone+'/balance').transaction(function(b) { return (b || 0) + amt; });
        } else {
            title.innerText = "OPPONENT WON! 😔"; title.style.color = "var(--red)"; cashText.innerText = "You Lost ₹" + entryFee; cashText.style.color = "var(--red)";
        }
    }
</script>
</body>
</html>
