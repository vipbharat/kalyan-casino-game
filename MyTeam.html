<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - Antique My Teams</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        /* ANTIQUE DARK & GOLD THEME */
        body { font-family: 'Georgia', 'Segoe UI', serif; background: #0c0804; color: #f5f5f5; margin: 0; padding-bottom: 90px;}
        
        .header { background: linear-gradient(180deg, #2a1b0a, #0c0804); padding: 15px; display: flex; align-items: center; border-bottom: 2px solid #d4af37; position: sticky; top:0; z-index:100; box-shadow: 0 4px 15px rgba(212,175,55,0.2); }
        .back-btn { font-size: 20px; margin-right: 15px; cursor: pointer; color: #d4af37; }
        .title { font-weight: 900; font-size: 16px; text-transform: uppercase; flex-grow: 1; letter-spacing: 2px; color: #d4af37; text-shadow: 1px 1px 2px #000;}
        
        .team-count-badge { background: #d4af37; color: #000; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; border: 1px solid #fff;}

        /* OVERFLOW FIXES APPLIED GLOBALLY */
        .teams-container { padding: 15px; }
        .adv-team-card { background: #1a1410; border: 1px solid #d4af37; border-radius: 10px; margin-bottom: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        
        .tc-header { background: linear-gradient(90deg, #2a1b0a, #1a1410); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #554422; }
        
        /* Fixed long names overlapping */
        .tc-name { font-size: 15px; font-weight: 900; color: #f9e596; display: flex; align-items: center; gap: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60%;}
        
        .tc-actions { display: flex; gap: 10px; flex-shrink: 0;}
        .btn-edit { background: transparent; color: #aaa; border: 1px solid #555; padding: 4px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s;}
        .btn-edit.active { border-color: #d4af37; color: #d4af37; background: rgba(212,175,55,0.1);}
        
        .tc-body { padding: 15px; cursor: pointer; }
        .tc-stats { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .stat-box { text-align: center; flex: 1; overflow: hidden;}
        .stat-val { font-size: 18px; font-weight: 900; color: #fff; }
        .stat-lbl { font-size: 10px; color: #d4af37; text-transform: uppercase; letter-spacing: 1px; }

        .cvc-display { display: flex; justify-content: space-around; background: #0c0804; padding: 10px; border-radius: 8px; border: 1px solid #3a2b18;}
        .cvc-item { text-align: center; width: 45%; overflow: hidden;}
        .cvc-role { font-size: 9px; font-weight: bold; margin-bottom: 4px; letter-spacing: 1px;}
        .c-color { color: #f9e596; } .vc-color { color: #c0c0c0; }
        .cvc-name { font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff;}

        /* EXPANDABLE PLAYER LIST */
        .player-list-wrap { display: none; background: #0c0804; padding: 10px; border-top: 1px solid #d4af37; }
        .p-row { background: #1a1410; padding: 10px; margin-bottom: 6px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid #d4af37;}
        
        /* Overflow fix for player names */
        .p-name { font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%; color: #eee;}
        .p-pts { color: #00ff88; font-weight: bold; font-size: 14px; flex-shrink: 0;}

        /* BACKUP SECTION */
        .backup-section { margin-top: 15px; background: #140d08; border: 1px solid #d4af37; border-radius: 8px; padding: 10px; }
        .backup-title { font-size: 10px; color: #d4af37; font-weight: bold; text-transform: uppercase; text-align: center; margin-bottom: 12px; letter-spacing: 1px;}
        .backup-grid { display: flex; justify-content: space-between; gap: 6px;}
        .b-slot { flex: 1; background: #0c0804; border: 1px solid #3a2b18; border-radius: 6px; text-align: center; padding: 10px 2px 6px; position: relative; overflow: hidden;}
        .b-badge { position: absolute; top: -2px; left: 50%; transform: translateX(-50%); background: #3a2b18; color: #d4af37; font-size: 8px; padding: 2px 5px; border-radius: 0 0 4px 4px; font-weight: bold;}
        .b-name { font-size: 9px; color: #888; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 2px;}
        .b-active { border-color: #d4af37; } .b-active .b-badge { background: #d4af37; color: #000; } .b-active .b-name { color: #fff; font-weight: bold;}

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0c0804; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #d4af37; z-index: 1000; }
        .nav-item { text-align: center; color: #888; font-size: 10px; cursor: pointer; flex: 1; font-weight: bold; text-transform: uppercase;}
        .nav-item i { font-size: 20px; margin-bottom: 5px; display: block; }
        .nav-item.active { color: #d4af37; }
        .loader { text-align: center; padding: 50px 20px; color: #d4af37; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <i class="fa-solid fa-arrow-left back-btn" onclick="window.location.href='Matches.html'"></i>
        <div class="title">My Teams</div>
        <div class="team-count-badge" id="teamCount">0/25</div>
    </div>

    <div class="teams-container" id="teamsContainer">
        <div class="loader"><i class="fa-solid fa-gem fa-spin fa-2x"></i><br><br>Loading Antique Vault...</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='Matches.html'"><i class="fa-solid fa-house"></i><span>Matches</span></div>
        <div class="nav-item active"><i class="fa-solid fa-users"></i><span>My Team</span></div>
        <div class="nav-item" id="btn-leaderboard"><i class="fa-solid fa-trophy"></i><span>Leaderboard</span></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        
        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('matchId');
        const userPhone = localStorage.getItem('userPhone') || localStorage.getItem('phone');

        document.getElementById('btn-leaderboard').onclick = function() {
            if(matchId) window.location.href = `leader.html?matchId=${matchId}`;
            else window.location.href = `Matches.html`;
        };

        if(!matchId || !userPhone) {
            document.getElementById('teamsContainer').innerHTML = "<div style='color:#ff004c; text-align:center; padding:30px; font-weight:bold;'>Match Details Missing!</div>";
        } else {
            let isMatchEditable = false;
            db.ref('Game/Kalyan11/VIPMatches/' + matchId).once('value', mSnap => {
                if(mSnap.exists()) {
                    let diff = mSnap.val().timestamp - Date.now();
                    if(diff > 0) isMatchEditable = true; 
                }
                fetchAllMyTeams(isMatchEditable);
            });
        }

        function fetchAllMyTeams(canEdit) {
            let container = document.getElementById('teamsContainer');
            
            db.ref('Game/Kalyan11/Contests/' + matchId + '/Teams').on('value', snap => {
                let myTeamsArray = [];
                if(snap.exists()) {
                    snap.forEach(child => {
                        if(child.key.includes(userPhone)) {
                            let tData = child.val();
                            tData.key = child.key;
                            myTeamsArray.push(tData);
                        }
                    });
                }

                if(myTeamsArray.length === 0) {
                    container.innerHTML = "<div style='text-align:center; color:#d4af37; margin-top:40px;'><i class='fa-solid fa-chess-knight fa-3x'></i><br><br>No teams forged yet.</div>";
                    document.getElementById('teamCount').innerText = `0/25`;
                    return;
                }

                document.getElementById('teamCount').innerText = `${myTeamsArray.length}/25`;
                
                db.ref('Game/Kalyan11/MatchPlayers/' + matchId).once('value', pSnap => {
                    let allPlayers = pSnap.val() || {};
                    container.innerHTML = ""; 

                    myTeamsArray.forEach((team, index) => {
                        let tNumber = index + 1;
                        let cName = getPlayerShortName(allPlayers, team.captain);
                        let vcName = getPlayerShortName(allPlayers, team.viceCaptain);
                        
                        // BASE 50 POINTS ADDED HERE
                        let totalPts = 50 + (parseFloat(team.total_points) || 0);
                        
                        let editBtnHtml = canEdit 
                            ? `<button class="btn-edit active" onclick="editSpecificTeam('${team.key}', event)"><i class="fa-solid fa-pen"></i> EDIT</button>` 
                            : `<button class="btn-edit" onclick="alert('Match Locked! 🔒')"><i class="fa-solid fa-lock"></i> LOCKED</button>`;

                        let playersListHtml = "";
                        if(team.players) {
                            team.players.forEach(pid => {
                                let pInfo = allPlayers[pid];
                                if(pInfo) {
                                    let isC = team.captain === pid;
                                    let isVC = team.viceCaptain === pid;
                                    let badge = isC ? "(C)" : isVC ? "(VC)" : "";
                                    let pts = parseFloat(pInfo.points || 0);
                                    if(isC) pts *= 2; if(isVC) pts *= 1.5;

                                    playersListHtml += `
                                    <div class="p-row">
                                        <div class="p-name">${getPlayerShortName(allPlayers, pid)} <span style="color:#d4af37; font-size:10px;">${badge}</span></div>
                                        <div class="p-pts">${pts.toFixed(1)}</div>
                                    </div>`;
                                }
                            });
                        }

                        let backups = team.backups || []; 
                        let b1 = backups[0] ? getPlayerShortName(allPlayers, backups[0]) : "Empty";
                        let b2 = backups[1] ? getPlayerShortName(allPlayers, backups[1]) : "Empty";
                        let b3 = backups[2] ? getPlayerShortName(allPlayers, backups[2]) : "Empty";
                        let b4 = backups[3] ? getPlayerShortName(allPlayers, backups[3]) : "Empty";

                        container.innerHTML += `
                        <div class="adv-team-card">
                            <div class="tc-header" onclick="toggleView('${team.key}')">
                                <div class="tc-name"><i class="fa-solid fa-chess-rook"></i> SQUAD ${tNumber}</div>
                                <div class="tc-actions">${editBtnHtml}</div>
                            </div>
                            
                            <div class="tc-body" onclick="toggleView('${team.key}')">
                                <div class="tc-stats">
                                    <div class="stat-box"><div class="stat-lbl">Points <span style="font-size:7px;">(+50)</span></div><div class="stat-val" style="color:#00ff88;">${totalPts.toFixed(1)}</div></div>
                                    <div class="stat-box"><div class="stat-lbl">Entry</div><div class="stat-val" style="font-size:14px; color:#d4af37;">₹${team.entry_paid || 0}</div></div>
                                </div>
                                
                                <div class="cvc-display">
                                    <div class="cvc-item">
                                        <div class="cvc-role c-color">CAPTAIN (2X)</div>
                                        <div class="cvc-name">${cName}</div>
                                    </div>
                                    <div style="width:1px; background:#3a2b18;"></div>
                                    <div class="cvc-item">
                                        <div class="cvc-role vc-color">V-CAPTAIN (1.5X)</div>
                                        <div class="cvc-name">${vcName}</div>
                                    </div>
                                </div>
                            </div>

                            <div class="player-list-wrap" id="view_${team.key}">
                                <div style="font-size:11px; color:#d4af37; margin-bottom:10px; text-align:center; letter-spacing:1px;">PLAYING 11</div>
                                ${playersListHtml}
                                
                                <div class="backup-section">
                                    <div class="backup-title"><i class="fa-solid fa-shield"></i> Backups</div>
                                    <div class="backup-grid">
                                        <div class="b-slot ${backups[0] ? 'b-active' : ''}"><div class="b-badge">B1</div><div class="b-name">${b1}</div></div>
                                        <div class="b-slot ${backups[1] ? 'b-active' : ''}"><div class="b-badge">B2</div><div class="b-name">${b2}</div></div>
                                        <div class="b-slot ${backups[2] ? 'b-active' : ''}"><div class="b-badge">B3</div><div class="b-name">${b3}</div></div>
                                        <div class="b-slot ${backups[3] ? 'b-active' : ''}"><div class="b-badge">B4</div><div class="b-name">${b4}</div></div>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                    });
                });
            });
        }

        function getPlayerShortName(allPlayers, pid) {
            if(!pid || !allPlayers[pid]) return "Not Selected";
            let nameParts = allPlayers[pid].name.split(' ');
            return nameParts.length > 1 ? nameParts[0][0] + ". " + nameParts[nameParts.length - 1] : allPlayers[pid].name;
        }

        function toggleView(teamKey) {
            let el = document.getElementById('view_' + teamKey);
            if(el.style.display === 'block') { el.style.display = 'none'; } 
            else { 
                document.querySelectorAll('.player-list-wrap').forEach(d => d.style.display = 'none');
                el.style.display = 'block'; 
            }
        }

        function editSpecificTeam(teamKey, event) {
            event.stopPropagation();
            window.location.href = `CreateTeam.html?matchId=${matchId}&editTeam=${teamKey}`;
        }
    </script>
</body>
</html>
