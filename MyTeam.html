<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - My Teams</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding: 0; padding-bottom: 80px; padding-top: 120px;}
        
        /* 🔥 TOP HEADER & TABS 🔥 */
        .top-header { position: fixed; top: 0; left: 0; width: 100%; background: #111; z-index: 1000; border-bottom: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5);}
        .app-title { text-align: center; font-size: 20px; font-weight: 900; color: #00ff88; padding: 15px 0; margin: 0; text-transform: uppercase; letter-spacing: 1px;}
        
        .top-tabs { display: flex; justify-content: space-around; background: #1a1a2e; padding: 0; margin: 0; list-style: none;}
        .tab-btn { flex: 1; text-align: center; padding: 12px 0; color: #aaa; font-size: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; border-bottom: 3px solid transparent;}
        .tab-btn.active { color: #00ff88; border-bottom: 3px solid #00ff88; background: rgba(0,255,136,0.1);}

        /* 🎴 Team Card */
        .team-container { padding: 15px; }
        .team-card { background: linear-gradient(145deg, #1a1a2e, #111); border: 1px solid #333; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); overflow: hidden; transition: 0.2s;}
        
        /* Match Name Strip */
        .t-match-strip { background: #222; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #444;}
        .t-match-name { font-size: 11px; color: #aaa; font-weight: bold; text-transform: uppercase;}
        .t-entry { font-size: 11px; background: rgba(0,255,136,0.1); color: #00ff88; padding: 3px 8px; border-radius: 4px; font-weight: 900; border: 1px solid #00ff88;}

        /* Team Core Info */
        .t-core { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer;}
        .t-core:active { opacity: 0.7; }
        .t-number { font-size: 20px; font-weight: 900; color: #fff;}
        .t-pts-box { text-align: right; }
        .t-pts-lbl { font-size: 10px; color: #aaa; text-transform: uppercase; margin-bottom: 2px;}
        .t-pts-val { font-size: 22px; font-weight: 900; color: #ffd700;}

        /* C & VC Area */
        .cvc-area { display: flex; background: #0a0a1a; padding: 10px 15px; gap: 15px; border-top: 1px solid #333;}
        .cvc-box { display: flex; align-items: center; gap: 8px; flex: 1;}
        .cvc-badge { width: 25px; height: 25px; border-radius: 50%; font-size: 10px; font-weight: 900; display: flex; justify-content: center; align-items: center; color: #000;}
        .c-badge { background: #00ff88; box-shadow: 0 0 8px rgba(0,255,136,0.5);}
        .vc-badge { background: #00b0ff; box-shadow: 0 0 8px rgba(0,176,255,0.5);}
        .cvc-name { font-size: 12px; font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}

        /* 🔥 ACTION BUTTONS STRIP 🔥 */
        .action-strip { display: flex; border-top: 1px solid #333; background: #000;}
        .action-btn { flex: 1; text-align: center; padding: 10px; font-size: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; color: #aaa; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 5px;}
        .action-btn:active { background: #222; }
        .btn-edit { color: #ffd700; border-right: 1px solid #333;}
        .btn-view { color: #00b0ff; border-right: 1px solid #333;}
        .btn-leader { color: #00ff88; }

        /* 🔥 BOTTOM NAVIGATION 🔥 */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; z-index: 1000;}
        .nav-item { text-align: center; color: #777; cursor: pointer; font-size: 12px; flex: 1; transition: 0.3s;}
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px;}
        .nav-item.active { color: #00ff88; }
        
        .loader { text-align: center; color: #00ff88; font-size: 16px; margin-top: 50px; font-weight: bold;}
        .empty-msg { text-align: center; color: #aaa; margin-top: 50px; font-size: 15px; display: flex; flex-direction: column; align-items: center; gap: 15px;}
        .btn-play { background: #00ff88; color: #000; padding: 10px 20px; border-radius: 20px; font-weight: 900; text-decoration: none; border: none; cursor: pointer;}

        /* 👁️ VIEW TEAM MODAL (POPUP) 👁️ */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center;}
        .modal-content { background: #111; width: 90%; max-width: 400px; max-height: 80vh; border-radius: 12px; border: 2px solid #00b0ff; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 20px rgba(0,176,255,0.3);}
        .modal-header { padding: 15px; background: #1a1a2e; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { margin: 0; color: #00b0ff; font-size: 16px; font-weight: 900;}
        .close-btn { color: #ff004c; font-size: 22px; font-weight: bold; cursor: pointer; }
        .modal-body { padding: 10px; overflow-y: auto; flex: 1; }
        
        .preview-player { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #222; background: #0a0a1a; margin-bottom: 5px; border-radius: 5px;}
        .pv-info { display: flex; align-items: center; gap: 10px; }
        .pv-role-badge { background: #333; color: #aaa; font-size: 9px; padding: 2px 5px; border-radius: 3px; font-weight: bold;}
        .pv-name { font-size: 13px; font-weight: 900; color: #fff;}
        .pv-points { font-size: 14px; font-weight: 900; color: #ffd700;}
    </style>
</head>
<body>

    <div class="top-header">
        <h1 class="app-title"><i class="fa-solid fa-users"></i> MY TEAMS</h1>
        <div class="top-tabs">
            <div class="tab-btn active" onclick="filterTeams('Upcoming', this)">Upcoming</div>
            <div class="tab-btn" onclick="filterTeams('Live', this)">Live</div>
            <div class="tab-btn" onclick="filterTeams('Completed', this)">Completed</div>
        </div>
    </div>

    <div class="team-container" id="my-teams-list">
        <div class="loader"><i class="fa-solid fa-spinner fa-spin fa-2x"></i><br><br>Finding your teams...</div>
    </div>

    <div id="viewTeamModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fa-solid fa-eye"></i> TEAM PREVIEW</h2>
                <div class="close-btn" onclick="closeViewModal()">&times;</div>
            </div>
            <div class="modal-body" id="modalPlayersList"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='Matches.html'">
            <i class="fa-solid fa-house"></i> Home
        </div>
        <div class="nav-item active" onclick="window.location.href='MyTeam.html'">
            <i class="fa-solid fa-users"></i> My Team
        </div>
        <div class="nav-item" onclick="window.location.href='leader.html'">
            <i class="fa-solid fa-trophy"></i> Leaderboard
        </div>
    </div>

    <script>
        // 🛠️ FIREBASE INITIALIZATION
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        let userPhone = localStorage.getItem('userPhone') || localStorage.getItem('phone');
        
        let allMyTeams = []; // User ki saari teams yahan store hongi
        let currentFilter = 'Upcoming'; // Default tab

        if(!userPhone) {
            document.getElementById('my-teams-list').innerHTML = `
                <div class="empty-msg">
                    <i class="fa-solid fa-user-lock" style="font-size: 40px; color:#ff004c;"></i>
                    Bhai, pehle app mein Login karein!
                </div>`;
        } else {
            loadMyAllTeams();
        }

        async function loadMyAllTeams() {
            try {
                let matchSnap = await db.ref('Game/Kalyan11/VIPMatches').once('value');
                let matchesData = matchSnap.val() || {};

                db.ref('Game/Kalyan11/Contests').on('value', contestSnap => {
                    allMyTeams = []; // Array reset karo
                    let now = new Date().getTime();

                    if(contestSnap.exists()) {
                        let allContests = contestSnap.val();
                        
                        for(let matchId in allContests) {
                            let matchInfo = matchesData[matchId] || { team1: "T1", team2: "T2", name: "Unknown Match", timestamp: 0, status: "Upcoming" };
                            
                            // 🔥 SMART STATUS CALCULATION 🔥
                            let calculatedStatus = matchInfo.status || "Upcoming";
                            if(calculatedStatus === "Upcoming" && matchInfo.timestamp <= now) {
                                calculatedStatus = "Live"; // Agar time nikal gaya toh Live maan lo
                            }

                            let teamsNode = allContests[matchId].Teams;
                            if(teamsNode) {
                                let teamCountForThisMatch = 0;
                                for(let teamKey in teamsNode) {
                                    let teamObj = teamsNode[teamKey];
                                    if(teamObj.phone === userPhone) {
                                        teamCountForThisMatch++;
                                        // Array mein team daal do
                                        allMyTeams.push({
                                            matchId: matchId,
                                            matchInfo: matchInfo,
                                            teamData: teamObj,
                                            teamKey: teamKey,
                                            teamNumber: teamCountForThisMatch,
                                            calculatedStatus: calculatedStatus
                                        });
                                    }
                                }
                            }
                        }
                    }
                    
                    // Teams ko time ke hisaab se sort karo (Jo match pehle hai wo upar)
                    allMyTeams.sort((a, b) => a.matchInfo.timestamp - b.matchInfo.timestamp);
                    renderTeams(); // UI update karo
                });

            } catch(e) {
                document.getElementById('my-teams-list').innerHTML = `<div class="empty-msg" style="color:red;">Error loading teams!</div>`;
            }
        }

        // 🔥 FILTER FUNCTION FOR TABS 🔥
        function filterTeams(status, element) {
            currentFilter = status;
            
            // Tab ka color change karna
            let tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(tab => tab.classList.remove('active'));
            element.classList.add('active');

            renderTeams(); // List update karna
        }

        // 🎴 RENDER CARDS ON SCREEN
        function renderTeams() {
            let container = document.getElementById('my-teams-list');
            container.innerHTML = "";

            // Sirf wahi teams filter karo jinka status current tab se match karta ho
            let filteredTeams = allMyTeams.filter(t => t.calculatedStatus.toLowerCase() === currentFilter.toLowerCase());

            if(filteredTeams.length === 0) {
                container.innerHTML = `
                    <div class="empty-msg">
                        <i class="fa-solid fa-ghost" style="font-size: 40px;"></i>
                        Aapke paas koi ${currentFilter} match ki team nahi hai.
                        <button class="btn-play" onclick="window.location.href='Matches.html'">PLAY NOW</button>
                    </div>`;
                return;
            }

            filteredTeams.forEach(t => {
                let isUpcoming = (t.calculatedStatus.toLowerCase() === "upcoming");
                container.innerHTML += createTeamCard(t.matchId, t.matchInfo, t.teamData, t.teamKey, t.teamNumber, isUpcoming);
            });
        }

        // HTML CARD GENERATOR
        function createTeamCard(matchId, matchInfo, teamData, teamKey, teamNumber, isUpcoming) {
            let matchName = `${matchInfo.team1} VS ${matchInfo.team2}`;
            let entryFeeText = teamData.entry_paid === 0 ? "FREE ENTRY" : `₹${teamData.entry_paid} CONTEST`;
            let totalPoints = teamData.total_points || 0;
            let cName = teamData.captain || "Not Set";
            let vcName = teamData.viceCaptain || teamData.vice_captain || "Not Set";

            // 🛑 Anti-Cheat: Agar match shuru (Live/Completed) ho gaya toh Edit gayab
            let editBtnHtml = "";
            if(isUpcoming) {
                editBtnHtml = `<div class="action-btn btn-edit" onclick="editMyTeam('${matchId}', '${teamKey}', ${teamData.entry_paid})"><i class="fa-solid fa-pencil"></i> Edit</div>`;
            }

            let safeTeamData = encodeURIComponent(JSON.stringify(teamData));

            return `
                <div class="team-card">
                    <div class="t-match-strip">
                        <div class="t-match-name">${matchName}</div>
                        <div class="t-entry">${entryFeeText}</div>
                    </div>
                    
                    <div class="t-core" onclick="viewMyTeam('${matchId}', '${safeTeamData}', 'Team ${teamNumber}')">
                        <div class="t-number">TEAM ${teamNumber}</div>
                        <div class="t-pts-box">
                            <div class="t-pts-lbl">Total Points</div>
                            <div class="t-pts-val">${totalPoints}</div>
                        </div>
                    </div>

                    <div class="cvc-area">
                        <div class="cvc-box">
                            <div class="cvc-badge c-badge">C</div>
                            <div class="cvc-name">${cName}</div>
                        </div>
                        <div class="cvc-box">
                            <div class="cvc-badge vc-badge">VC</div>
                            <div class="cvc-name">${vcName}</div>
                        </div>
                    </div>

                    <div class="action-strip">
                        ${editBtnHtml}
                        <div class="action-btn btn-view" onclick="viewMyTeam('${matchId}', '${safeTeamData}', 'Team ${teamNumber}')"><i class="fa-solid fa-eye"></i> View</div>
                        <div class="action-btn btn-leader" onclick="goToLeaderboard('${matchId}')"><i class="fa-solid fa-trophy"></i> Rank</div>
                    </div>
                </div>
            `;
        }

        function goToLeaderboard(matchId) { window.location.href = `leader.html?matchId=${matchId}`; }

        function editMyTeam(matchId, teamKey, fee) {
            window.location.href = `CreateTeam.html?matchId=${matchId}&fee=${fee}&editTeam=${teamKey}`;
        }

        async function viewMyTeam(matchId, encodedTeamData, teamTitle) {
            let teamData = JSON.parse(decodeURIComponent(encodedTeamData));
            let playerIds = teamData.players || [];
            
            document.getElementById('viewTeamModal').style.display = 'flex';
            let listContainer = document.getElementById('modalPlayersList');
            listContainer.innerHTML = `<div class="loader"><i class="fa-solid fa-spinner fa-spin"></i> Loading Squad...</div>`;
            document.querySelector('.modal-header h2').innerHTML = `<i class="fa-solid fa-eye"></i> ${teamTitle}`;

            try {
                let pSnap = await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).once('value');
                let allPlayers = pSnap.val() || {};
                
                listContainer.innerHTML = "";

                playerIds.forEach(id => {
                    let p = allPlayers[id];
                    if(p) {
                        let isC = (p.name === teamData.captain);
                        let isVC = (p.name === (teamData.viceCaptain || teamData.vice_captain));
                        
                        let badgeHtml = "";
                        let displayPoints = p.points || 0;
                        
                        if(isC) {
                            badgeHtml = `<div class="cvc-badge c-badge" style="width:20px; height:20px; font-size:8px;">C</div>`;
                            displayPoints = displayPoints * 2;
                        } else if(isVC) {
                            badgeHtml = `<div class="cvc-badge vc-badge" style="width:20px; height:20px; font-size:8px;">VC</div>`;
                            displayPoints = displayPoints * 1.5;
                        }

                        listContainer.innerHTML += `
                            <div class="preview-player">
                                <div class="pv-info">
                                    ${badgeHtml}
                                    <div>
                                        <div class="pv-name">${p.name}</div>
                                        <div class="pv-role-badge">${p.team || 'UNK'} | ${p.role || 'PLY'}</div>
                                    </div>
                                </div>
                                <div class="pv-points">${displayPoints} Pts</div>
                            </div>
                        `;
                    }
                });
            } catch(e) {
                listContainer.innerHTML = `<div style="color:red; text-align:center;">Error loading players!</div>`;
            }
        }

        function closeViewModal() { document.getElementById('viewTeamModal').style.display = 'none'; }
    </script>
</body>
</html>
