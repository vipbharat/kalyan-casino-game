            let amt = [10, 100, 500, 1000, 5000, 10000][Math.floor(Math.random()*6)];
            let randomBot = botsList[Math.floor(Math.random() * botsList.length)];
            if(randomBot.bal >= amt) { randomBot.bal -= amt; spawnChip(s, amt); botBetted = true; }
        });
        if(botBetted) playSound('coinSnd', 0.05); 
    }

    function createCardDesign(val, suit) {
        let displayVal = val === "0" ? "10" : val;
        let suitSym = suit === 'S' ? '♠' : suit === 'H' ? '♥' : suit === 'D' ? '♦' : '♣';
        let col = (suit === 'H' || suit === 'D') ? '#cc0000' : '#000';
        return `<div style="background:#fff; width:100%; height:100%; border-radius:6px; box-shadow:inset 0 0 10px rgba(0,0,0,0.3); display:flex; flex-direction:column; justify-content:space-between; padding:4px; box-sizing:border-box; color:${col}; font-family:'Montserrat', sans-serif;">
            <div style="font-size:16px; font-weight:900; line-height:1;">${displayVal}<br><span style="font-size:12px;">${suitSym}</span></div>
            <div style="font-size:36px; text-align:center; margin-top:-8px; text-shadow: 0 2px 2px rgba(0,0,0,0.2);">${suitSym}</div>
            <div style="font-size:16px; font-weight:900; line-height:1; text-align:left; transform:rotate(180deg); margin-top:-8px;">${displayVal}<br><span style="font-size:12px;">${suitSym}</span></div>
        </div>`;
    }

    db.ref('Game/AndarBahar/Status').on('value', snap => {
        let st = snap.val(); if(!st) return;
        let tEl = document.getElementById('timer');
        
        if(st.state === 'betting') {
            document.getElementById('joker-back').style.display = 'none';
            document.getElementById('joker-front').style.display = 'block';
            document.getElementById('joker-front').innerHTML = createCardDesign(st.jokerVal, st.jokerSuit);
            
            if(!isBettingOpen) {
                isBettingOpen = true;
                resetUI();
                speakAnnouncement(`${cardVoiceNames[st.jokerVal]} of ${suitVoiceNames[st.jokerSuit]}, Place your bets.`);
                document.getElementById('joker-slot').classList.add('deal-anim');
                setTimeout(() => document.getElementById('joker-slot').classList.remove('deal-anim'), 500);
                clearInterval(botInterval);
                botInterval = setInterval(botBetAction, 700); 
            }
            
            tEl.innerText = st.timer; tEl.style.color = (st.timer <= 5) ? "#ff3333" : "#fff";
        } 
        else if (st.state === 'dealing' && isBettingOpen) {
            isBettingOpen = false; clearInterval(botInterval); tEl.innerText = "STOP"; tEl.style.color = "#fff";
            speakAnnouncement("Stop Betting");
            showAnimation(st.winner, st.jokerVal);
        }
    });

    db.ref('Game/AndarBahar/Bets').on('value', snap => {
        let allB = snap.val() || {}; pool = {andar:0, bahar:0};
        for(let u in allB) { if(!u.includes('bot')) { pool.andar += (allB[u].andar || 0); pool.bahar += (allB[u].bahar || 0); } }
        document.getElementById('p-andar').innerText = pool.andar.toLocaleString(); document.getElementById('p-bahar').innerText = pool.bahar.toLocaleString();
    });

    async function showAnimation(win, jVal) {
        let steps = Math.floor(Math.random() * 5) + 6; 
        if(win === 'andar' && steps % 2 === 0) steps++; 
        if(win === 'bahar' && steps % 2 !== 0) steps++; 

        document.getElementById('back-a').style.display = 'none'; document.getElementById('back-b').style.display = 'none';
        
        let step = 0;
        for (let i = 0; i < steps; i++) {
            step++;
            let side = (step % 2 !== 0) ? 'andar' : 'bahar'; 
            let isLast = (i === steps - 1);
            let resVal, resSuit;
            if(isLast) { resVal = jVal; resSuit = cardSuits[Math.floor(Math.random()*4)]; } 
            else {
                do { resVal = cardValues[Math.floor(Math.random()*13)]; } while (resVal === jVal);
                resSuit = cardSuits[Math.floor(Math.random()*4)];
            }

            const slotImg = document.getElementById(side==='andar'?'img-a':'img-b');
            slotImg.innerHTML = createCardDesign(resVal, resSuit);
            slotImg.style.display = 'block';
            
            slotImg.classList.remove('deal-anim'); void slotImg.offsetWidth; slotImg.classList.add('deal-anim');
            playSound('cardSnd', 1.0); 
            speakAnnouncement(`${cardVoiceNames[resVal]} of ${suitVoiceNames[resSuit]}`);

            if(isLast) {
                setTimeout(() => {
                    const ov = document.getElementById('win-overlay');
                    ov.innerText = side.toUpperCase() + " WINS!"; ov.style.display = 'block';
                    speakAnnouncement(side === 'andar' ? "Andar Win!" : "Bahar Win!");

                    // Update History Panel Live
                    let hHtml = document.getElementById('record-board').innerHTML;
                    let cCol = side === 'andar' ? 'var(--andar)' : 'var(--bahar)';
                    let cDot = `<div class="record-dot" style="background:rgba(0,0,0,0.5); border-color:${cCol}; color:${cCol};">${side === 'andar' ? 'A' : 'B'}</div>`;
                    let tempDiv = document.createElement('div');
                    tempDiv.innerHTML = cDot + hHtml;
                    if(tempDiv.children.length > 10) tempDiv.removeChild(tempDiv.lastChild);
                    document.getElementById('record-board').innerHTML = tempDiv.innerHTML;

                    let winAmt = (side === 'andar') ? myBets.andar * 1.95 : myBets.bahar * 1.95;
                    if(winAmt > 0 && phone) { db.ref('users/'+phone+'/winning_balance').set(winBal + winAmt); }
                }, 800);
                return;
            }
            await new Promise(r => setTimeout(r, 1200)); 
        }
    }

    function resetUI() {
        document.getElementById('win-overlay').style.display = 'none';
        document.getElementById('img-a').innerHTML = ''; document.getElementById('img-b').innerHTML = '';
        document.getElementById('img-a').style.display = 'none'; document.getElementById('img-b').style.display = 'none';
        document.getElementById('back-a').style.display = 'block'; document.getElementById('back-b').style.display = 'block';
        document.querySelectorAll('.chip').forEach(c => c.remove());
        document.querySelectorAll('.my-box-bet').forEach(m => { m.style.display = 'none'; m.innerText = '₹0'; });
        pool = {andar:0, bahar:0}; myBets = {andar:0, bahar:0}; 
        document.getElementById('p-andar').innerText = "0"; document.getElementById('p-bahar').innerText = "0";
    }

    document.getElementById('chip500').style.boxShadow = "0 15px 0 auto, 0 25px 20px rgba(0,0,0,0.9), 0 0 20px #ffd700";
</script>
</body>
</html>
