<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANDAR BAHAR PRO VIP - 3D Casino Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@600;800&display=swap');

        :root { 
            --andar: #ff1a1a; 
            --bahar: #1a8cff; 
            --gold: #FFD700; 
            --dark-wood: #2c1604;
            --felt-green: #0b4a24;
            --felt-dark: #052611;
        }
        
        body { 
            margin: 0; font-family: 'Montserrat', sans-serif; overflow: hidden; color: white; user-select: none; 
            background: radial-gradient(circle at 50% -20%, #1a1a1a, #000); height: 100vh;
        }

        /* TOP BAR */
        .top-bar { 
            display: flex; justify-content: space-between; padding: 10px 20px; 
            background: linear-gradient(to bottom, #333, #111);
            border-bottom: 4px solid var(--dark-wood);
            box-shadow: 0 10px 20px rgba(0,0,0,0.8); 
            z-index: 1000; position: relative;
        }
        .top-left { font-size: 11px; color: var(--gold); font-family: 'Cinzel', serif; }
        .bal-box { 
            background: #000; border: 2px solid var(--gold); padding: 5px 15px; border-radius: 8px; 
            color: #0f0; font-size: 16px; font-weight: 800;
        }

        /* SCROLLING WINNERS LIST */
        .winner-scroll-container {
            position: fixed; left: 15px; bottom: 160px; height: 180px; width: 140px;
            overflow: hidden; z-index: 1050; background: rgba(0,0,0,0.8); 
            border: 1px solid var(--gold); border-radius: 10px; padding: 5px;
        }
        .winner-title {
            font-size: 10px; color: var(--gold); text-align: center; border-bottom: 1px solid var(--gold); padding-bottom: 5px; font-weight: 900;
        }
        .winner-list {
            animation: scrollUp 20s linear infinite; display: flex; flex-direction: column; gap: 10px;
        }
        .win-item {
            font-size: 10px; color: #fff; border-bottom: 1px solid rgba(255,215,0,0.2); padding-bottom: 2px;
        }
        .win-amt { color: #0f0; font-weight: bold; }
        @keyframes scrollUp { 0% { transform: translateY(100%); } 100% { transform: translateY(-100%); } }

        /* 3D TABLE SCENE */
        .scene {
            perspective: 1000px; height: calc(100vh - 200px); width: 100vw; display: flex; align-items: center; justify-content: center; position: relative;
        }

        .table-3d {
            width: 120%; height: 110%; background: radial-gradient(ellipse at center, var(--felt-green) 0%, var(--felt-dark) 100%);
            transform: rotateX(55deg) translateY(-50px); transform-style: preserve-3d; border: 20px solid var(--dark-wood);
            border-radius: 40% / 50%; box-shadow: 0 50px 50px rgba(0,0,0,0.9); position: relative; display: flex; flex-direction: column; align-items: center; padding-top: 60px;
        }

        /* CARDS */
        .card-slot { 
            width: 70px; height: 100px; background: rgba(0,0,0,0.3); border-radius: 6px; border: 2px dashed rgba(255,215,0,0.4); 
            position: relative; display: flex; align-items: center; justify-content: center; transform-style: preserve-3d;
        }
        .joker-card { width: 70px; height: 100px; background: #fff; border-radius: 6px; transform-style: preserve-3d; box-shadow: -5px 10px 15px rgba(0,0,0,0.5); }
        
        .timer-sec { 
            position: absolute; top: 38%; left: 50%; transform: translate(-50%, -50%) translateZ(40px) rotateX(-55deg);
            font-family: 'Cinzel', serif; font-size: 40px; color: #fff; font-weight: 900; text-shadow: 0 0 15px var(--gold); z-index: 50;
        }

        .table-top { display: flex; justify-content: center; gap: 80px; transform: translateZ(10px); transform-style: preserve-3d; }
        .slot-title { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 900; transform: translateZ(20px); margin-bottom: 5px; }

        .card-back, .card-front { position: absolute; width: 100%; height: 100%; top: 0; left: 0; border-radius: 6px; backface-visibility: hidden; }
        .card-back { background: url('https://deckofcardsapi.com/static/img/back.png') center/cover; }

        /* BETTING BOXES */
        .bet-grid { display: flex; justify-content: center; gap: 30px; margin-top: 40px; transform-style: preserve-3d; width: 85%; }
        .box { 
            flex: 1; height: 150px; border-radius: 12px; position: relative; background: rgba(0,0,0,0.6); border: 3px solid;
            transform-style: preserve-3d; cursor: pointer; transition: 0.2s;
        }
        .andar-box { border-color: var(--andar); } 
        .bahar-box { border-color: var(--bahar); }
        
        .pool-amt { display: block; color: var(--gold); text-align: center; font-size: 20px; margin-top: 10px; font-weight: 900; transform: translateZ(10px); }
        
        /* INTERNAL WIN TEXT & GLOW */
        .box-win-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) translateZ(30px);
            font-size: 18px; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--gold);
            display: none; text-transform: uppercase; animation: winPulse 0.5s infinite alternate;
        }
        @keyframes winPulse { from { transform: translate(-50%, -50%) translateZ(30px) scale(1); } to { transform: translate(-50%, -50%) translateZ(30px) scale(1.2); } }

        .glow-andar { animation: glowA 0.5s infinite alternate; border-color: #fff !important; }
        @keyframes glowA { from { box-shadow: 0 0 10px var(--andar); } to { box-shadow: 0 0 40px var(--andar); } }
        .glow-bahar { animation: glowB 0.5s infinite alternate; border-color: #fff !important; }
        @keyframes glowB { from { box-shadow: 0 0 10px var(--bahar); } to { box-shadow: 0 0 40px var(--bahar); } }

        /* CHIPS FOOTER */
        .chip-footer { 
            position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: center; gap: 8px; padding: 20px 0 30px; border-top: 3px solid var(--dark-wood); z-index: 1100;
        }
        .c-btn { 
            width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; border: 2px dashed rgba(255,255,255,0.4); font-size: 14px;
        }
        .c10 { background: #cd7f32; } .c100 { background: #c0c0c0; color: #000; } .c500 { background: #ffd700; color: #000; }
        .c1k { background: #ff4d4d; } .c5k { background: #9933ff; } .c10k { background: #000; color: var(--gold); border: 2px solid var(--gold); }
        
        .selected { transform: translateY(-8px); box-shadow: 0 0 15px var(--gold); border: 2px solid #fff; }

        .live-players { position: fixed; bottom: 115px; width: 100%; display: flex; justify-content: center; gap: 10px; pointer-events: none; }
        .player-3d { background: rgba(0,0,0,0.8); padding: 4px 10px; border-radius: 5px; border: 1px solid var(--gold); font-size: 11px; }

        .deal-anim { animation: flyIn 0.4s ease-out forwards; }
        @keyframes flyIn { 0% { transform: translateZ(150px) rotateY(180deg); opacity: 0; } 100% { transform: translateZ(5px) rotateY(0deg); opacity: 1; } }
    </style>
</head>
<body>

    <audio id="coinSnd" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="cardSnd" src="https://assets.mixkit.co/active_storage/sfx/3005/3005-preview.mp3"></audio>

<div class="top-bar">
    <div class="top-left"><div id="live-date">--/--/--</div></div>
    <div class="bal-box">₹ <span id="balance">0.00</span></div>
</div>

<div class="winner-scroll-container">
    <div class="winner-title">LIVE WINNERS</div>
    <div class="winner-list" id="scrolling-winners"></div>
</div>

<div class="scene">
    <div class="timer-sec" id="timer">WAITING</div>
    <div class="table-3d">
        <div class="joker-section" style="transform: translateZ(15px); text-align: center; margin-bottom: 20px;">
            <div class="joker-title" style="color:var(--gold); font-size: 14px; margin-bottom: 5px;">MASTER JOKER</div>
            <div class="joker-card" id="joker-slot">
                <div class="card-back" id="joker-back"></div>
                <div class="card-front" id="joker-front"></div>
            </div>
        </div>
        <div class="table-top">
            <div style="text-align:center; transform-style:preserve-3d;">
                <div class="slot-title" style="color:var(--andar);">ANDAR</div>
                <div class="card-slot" id="slot-andar">
                    <div class="card-back" id="back-a"></div>
                    <div class="card-front" id="img-a"></div>
                </div>
            </div>
            <div style="text-align:center; transform-style:preserve-3d;">
                <div class="slot-title" style="color:var(--bahar);">BAHAR</div>
                <div class="card-slot" id="slot-bahar">
                    <div class="card-back" id="back-b"></div>
                    <div class="card-front" id="img-b"></div>
                </div>
            </div>
        </div>
        <div class="bet-grid">
            <div class="box andar-box" id="box-andar" onclick="placeBet('andar')">
                <span class="pool-amt">₹<span id="p-andar">0</span></span>
                <div class="box-win-text" id="win-text-andar">WINNER</div>
                <div id="chips-andar" style="width:100%; height:100%; position:absolute;"></div>
            </div>
            <div class="box bahar-box" id="box-bahar" onclick="placeBet('bahar')">
                <span class="pool-amt">₹<span id="p-bahar">0</span></span>
                <div class="box-win-text" id="win-text-bahar">WINNER</div>
                <div id="chips-bahar" style="width:100%; height:100%; position:absolute;"></div>
            </div>
        </div>
    </div>
</div>

<div class="live-players" id="player-row"></div>

<div class="chip-footer">
    <div class="c-btn c10" onclick="setChip(10, this)">10</div>
    <div class="c-btn c100" onclick="setChip(100, this)">100</div>
    <div class="c-btn c500 selected" onclick="setChip(500, this)">500</div>
    <div class="c-btn c1k" onclick="setChip(1000, this)">1K</div>
    <div class="c-btn c5k" onclick="setChip(5000, this)">5K</div>
    <div class="c-btn c10k" onclick="setChip(10000, this)">10K</div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const phone = localStorage.getItem('userPhone') || localStorage.getItem('phone');

    const cardVoiceNames = {"A":"Ace", "2":"Two", "3":"Three", "4":"Four", "5":"Five", "6":"Six", "7":"Seven", "8":"Eight", "9":"Nine", "10":"Ten", "J":"Jack", "Q":"Queen", "K":"King"};
    const suitVoiceNames = {"S":"Spades", "H":"Hearts", "D":"Diamonds", "C":"Clubs"};

    function speak(text) {
        if('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            let msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1.2;
            window.speechSynthesis.speak(msg);
        }
    }

    let currentChip = 500, isBettingOpen = false, pool = {andar:0, bahar:0}, myBets = {andar:0, bahar:0};
    document.getElementById('live-date').innerText = new Date().toLocaleDateString();

    // Winners Scrolling List
    function updateScroller() {
        let list = document.getElementById('scrolling-winners');
        let html = "";
        for(let i=0; i<15; i++) {
            let id = Math.floor(Math.random()*8000)+1000;
            let amt = [1950, 480, 9500, 190, 3800][Math.floor(Math.random()*5)];
            html += `<div class="win-item">ID_${id} <span class="win-amt">+₹${amt}</span></div>`;
        }
        list.innerHTML = html;
    }
    updateScroller();
    setInterval(updateScroller, 15000);

    // Firebase Balance & Status
    if(phone) {
        db.ref('users/'+phone).on('value', s => { 
            let d = s.val() || {};
            let total = (parseFloat(d.balance)||0) + (parseFloat(d.winning_balance)||0);
            document.getElementById('balance').innerText = total.toFixed(2); 
        });
    }

    window.placeBet = function(side) {
        if(!isBettingOpen) return;
        db.ref(`Game/AndarBahar/Bets/${phone}/${side}`).set(firebase.database.ServerValue.increment(currentChip));
        myBets[side] += currentChip;
        spawnChip(side, currentChip);
        document.getElementById('coinSnd').cloneNode().play();
    }

    function spawnChip(side, amt) {
        const div = document.getElementById('chips-'+side);
        const c = document.createElement('div');
        c.style.cssText = `width:25px; height:25px; border-radius:50%; background:var(--gold); border:1px solid #fff; position:absolute; z-index:20; font-size:8px; display:flex; align-items:center; justify-content:center; color:#000; font-weight:900;`;
        c.innerText = amt >= 1000 ? (amt/1000)+'K' : amt;
        c.style.left = Math.random()*60+20 + "%"; c.style.top = Math.random()*50+20 + "%";
        div.appendChild(c);
        if(div.children.length > 25) div.firstChild.remove();
    }

    function createCard(val, suit) {
        let col = (suit==='H'||suit==='D') ? '#f00' : '#000';
        let sym = suit==='S'?'♠':suit==='H'?'♥':suit==='D'?'♦':'♣';
        return `<div style="background:#fff; width:100%; height:100%; border-radius:4px; color:${col}; padding:3px; box-sizing:border-box;">
            <div style="font-size:12px; font-weight:900;">${val==='0'?'10':val}${sym}</div>
            <div style="font-size:30px; text-align:center;">${sym}</div>
        </div>`;
    }

    db.ref('Game/AndarBahar/Status').on('value', snap => {
        let st = snap.val(); if(!st) return;
        let tEl = document.getElementById('timer');
        if(st.state === 'betting') {
            document.getElementById('joker-front').innerHTML = createCard(st.jokerVal, st.jokerSuit);
            document.getElementById('joker-back').style.display = 'none';
            document.getElementById('joker-front').style.display = 'block';
            if(!isBettingOpen) {
                isBettingOpen = true; resetUI();
                speak(`${cardVoiceNames[st.jokerVal]} is Joker. Start betting.`);
            }
            tEl.innerText = st.timer;
        } else if (st.state === 'dealing' && isBettingOpen) {
            isBettingOpen = false; tEl.innerText = "STOP";
            speak("Stop betting");
            showAnim(st.winner, st.jokerVal);
        }
    });

    db.ref('Game/AndarBahar/Bets').on('value', snap => {
        let all = snap.val() || {}; pool = {andar:0, bahar:0};
        for(let u in all) { pool.andar += (all[u].andar||0); pool.bahar += (all[u].bahar||0); }
        document.getElementById('p-andar').innerText = pool.andar.toLocaleString();
        document.getElementById('p-bahar').innerText = pool.bahar.toLocaleString();
    });

    async function showAnim(win, jVal) {
        let steps = Math.floor(Math.random()*4)+6;
        if(win==='andar' && steps%2===0) steps++;
        if(win==='bahar' && steps%2!==0) steps++;

        document.getElementById('back-a').style.display = 'none';
        document.getElementById('back-b').style.display = 'none';

        for(let i=0; i<steps; i++) {
            let side = ((i+1)%2!==0) ? 'andar' : 'bahar';
            let isLast = (i === steps-1);
            let val = isLast ? jVal : ["2","3","4","K","Q"][Math.floor(Math.random()*5)];
            let suit = ["S","H","D","C"][Math.floor(Math.random()*4)];

            let img = document.getElementById(side==='andar'?'img-a':'img-b');
            img.innerHTML = createCard(val, suit);
            img.style.display = 'block';
            img.classList.remove('deal-anim'); void img.offsetWidth; img.classList.add('deal-anim');
            
            document.getElementById('cardSnd').cloneNode().play();
            speak(cardVoiceNames[val]);

            if(isLast) {
                setTimeout(() => {
                    document.getElementById('box-'+side).classList.add('glow-'+side);
                    document.getElementById('win-text-'+side).style.display = 'block';
                    speak(side + " wins");
                }, 500);
                return;
            }
            await new Promise(r => setTimeout(r, 1200));
        }
    }

    function resetUI() {
        ['andar','bahar'].forEach(s => {
            document.getElementById('img-'+(s==='andar'?'a':'b')).style.display = 'none';
            document.getElementById('back-'+(s==='andar'?'a':'b')).style.display = 'block';
            document.getElementById('win-text-'+s).style.display = 'none';
            document.getElementById('box-'+s).classList.remove('glow-'+s);
            document.getElementById('chips-'+s).innerHTML = '';
        });
        myBets = {andar:0, bahar:0};
    }

    window.setChip = function(v, el) {
        currentChip = v;
        document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
    }
</script>
</body>
</html>
