<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANDAR BAHAR - Auto-Clean Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&display=swap');

        :root { 
            --andar-bg: linear-gradient(180deg, #ccffcc 0%, #e6ffe6 100%); 
            --andar-text: #0033cc; 
            --bahar-bg: linear-gradient(180deg, #ffcccc 0%, #ffe6e6 100%); 
            --bahar-text: #cc0000;
            --table-green: #00b33c; 
        }

        body { 
            margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; background: #000; 
            color: white; user-select: none; display: flex; flex-direction: column; 
            height: 100vh; width: 100vw; overflow: hidden;
        }

        .casino-table {
            width: 100%; height: 100%; 
            background: var(--table-green);
            position: relative; display: flex; flex-direction: column;
            box-sizing: border-box; padding-bottom: 65px;
        }

        .history-bar {
            width: 100%; background: #004d1a; padding: 6px 0; display: flex; justify-content: center; gap: 4px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.5); overflow: hidden; height: 20px; align-items: center;
        }
        .record-dot {
            width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 10px; font-weight: 900; color: #fff; flex-shrink: 0;
        }
        .dot-a { background: #0099cc; border: 1.5px solid #fff; }
        .dot-b { background: #cc0000; border: 1.5px solid #fff; }

        .status-container { display: flex; justify-content: center; margin-top: 10px; position: relative; z-index: 20;}
        .status-pill { 
            background: #000; color: #fff; font-size: 15px; padding: 6px 25px; 
            border-radius: 25px; border: 2px solid #fff; font-weight: 900; 
            text-transform: uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .joker-area { display: flex; justify-content: center; margin-top: 10px; }
        .joker-card { 
            width: 50px; height: 75px; background: #fff; border-radius: 5px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.6); padding: 3px; box-sizing: border-box;
        }
        .card-back { width: 100%; height: 100%; background: url('https://deckofcardsapi.com/static/img/back.png') center/cover; border-radius: 3px; }
        .card-front { width: 100%; height: 100%; display: none; }

        .card-track-wrapper {
            width: 95%; margin: 10px auto; background: rgba(0,0,0,0.2); 
            border-radius: 8px; padding: 5px; box-sizing: border-box; min-height: 80px;
        }
        .cards-track { 
            display: flex; flex-direction: row; flex-wrap: nowrap; overflow-x: auto; 
            align-items: center; padding: 5px 10px; scroll-behavior: smooth;
        }
        .cards-track::-webkit-scrollbar { display: none; } 
        
        .dealt-card {
            width: 45px; height: 65px; flex-shrink: 0; background: #fff; border-radius: 4px;
            box-shadow: -3px 0px 5px rgba(0,0,0,0.4); padding: 2px; box-sizing: border-box;
            margin-left: -30px; transition: transform 0.2s ease-out;
        }
        .dealt-card:first-child { margin-left: 0; }
        .win-pop { transform: translateY(-10px) scale(1.15); z-index: 100; box-shadow: 0 0 15px #00ff00; border: 2px solid #00ff00;}

        .betting-area { display: flex; justify-content: space-between; gap: 10px; padding: 0 10px; margin-top: 5px; }
        .box { flex: 1; height: 110px; border-radius: 12px; display: flex; flex-direction: column; cursor: pointer; box-shadow: 0 5px 10px rgba(0,0,0,0.4); position: relative;}
        .box:active { transform: scale(0.98); }
        .andar-box { background: var(--andar-bg); border: 2px solid #99ff99; }
        .bahar-box { background: var(--bahar-bg); border: 2px solid #ff9999; }
        
        .box-header { display: flex; justify-content: space-between; padding: 6px 10px; align-items: center;}
        .box-title { font-size: 16px; font-weight: 900; }
        .andar-box .box-title { color: var(--andar-text); }
        .bahar-box .box-title { color: var(--bahar-text); }
        .ratio { font-size: 11px; color: #333; font-weight: 900; }

        .chips-zone { flex: 1; position: relative; overflow: hidden; }
        .pool-amt { text-align: center; padding: 5px 0; font-size: 16px; font-weight: 900; color: #000; border-top: 1px solid rgba(0,0,0,0.1); }

        .side-bets { width: 95%; margin: 10px auto 0; background: #264d00; border-radius: 8px; overflow: hidden; border: 1px solid #4d9900; }
        .sb-title { background: #336600; font-size: 11px; text-align: center; padding: 5px; font-weight: bold; color: #fff;}
        .sb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #132600; }
        .sb-box { background: #1a3300; padding: 5px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; cursor: pointer; position: relative; min-height: 45px; }
        .sb-pool { font-size: 11px; font-weight: 900; color: #ffcc00; z-index: 2;}
        .sb-chips-zone { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;}

        .bottom-strip { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: #111; border-top: 2px solid #ffcc00; z-index: 200; height: 60px;}
        .user-info { display: flex; align-items: center; background: #4d0000; border: 1px solid #ffcc00; border-radius: 20px; padding: 2px 12px 2px 2px; }
        .u-bal { font-size: 12px; color: #fff; font-weight: 900; margin-left: 5px; }

        .chip-selector { display: flex; gap: 4px; }
        .c-btn { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; border: 2px dashed #fff; cursor: pointer; }
        .c10 { background: #ffcc00; color: #000; } .c1k { background: #ff3333; color: #fff; }
        .selected { transform: translateY(-6px); box-shadow: 0 0 12px #fff; border-style: solid;}

        .chip { width: 16px; height: 16px; border-radius: 50%; position: absolute; font-size: 6px; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 1px solid #fff; pointer-events: none;}
        
        /* GLOW EFFECT */
        .box-glow { animation: boxBlink 0.4s infinite alternate !important; }
        @keyframes boxBlink { from { box-shadow: 0 0 5px #00ff00; border-color: #00ff00;} to { box-shadow: 0 0 30px #00ff00; border-color: #fff;} }
    </style>
</head>
<body onclick="initAudio()">

    <audio id="coinSnd" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="cardSnd" src="https://assets.mixkit.co/active_storage/sfx/3005/3005-preview.mp3"></audio>

<div class="casino-table">
    <div class="history-bar" id="record-board"></div>
    <div class="status-container"><div class="status-pill" id="game-status">WAITING...</div></div>
    <div class="joker-area"><div class="joker-card"><div id="joker-front" class="card-front"></div><div id="joker-back" class="card-back"></div></div></div>
    <div class="card-track-wrapper"><div class="cards-track" id="dealt-cards-track"></div></div>

    <div class="betting-area">
        <div class="box andar-box" id="box-andar" onclick="placeBet('andar')">
            <div class="box-header"><span class="box-title">Andar</span><span class="ratio">1:1.95</span></div>
            <div class="chips-zone" id="chips-andar"></div>
            <div class="pool-amt">₹<span id="p-andar">0</span></div>
        </div>
        <div class="box bahar-box" id="box-bahar" onclick="placeBet('bahar')">
            <div class="box-header"><span class="box-title">Bahar</span><span class="ratio">1:1.95</span></div>
            <div class="chips-zone" id="chips-bahar"></div>
            <div class="pool-amt">₹<span id="p-bahar">0</span></div>
        </div>
    </div>

    <div class="side-bets">
        <div class="sb-title">Side Bets</div>
        <div class="sb-grid" id="sb-grid-area">
            <div class="sb-box" id="box-sb_1_5" onclick="placeBet('sb_1_5')"><span>1-5</span><div class="sb-pool">₹<span id="p-sb_1_5">0</span></div><div class="sb-chips-zone" id="chips-sb_1_5"></div></div>
            <div class="sb-box" id="box-sb_6_10" onclick="placeBet('sb_6_10')"><span>6-10</span><div class="sb-pool">₹<span id="p-sb_6_10">0</span></div><div class="sb-chips-zone" id="chips-sb_6_10"></div></div>
            <div class="sb-box" id="box-sb_11_15" onclick="placeBet('sb_11_15')"><span>11-15</span><div class="sb-pool">₹<span id="p-sb_11_15">0</span></div><div class="sb-chips-zone" id="chips-sb_11_15"></div></div>
            <div class="sb-box" id="box-sb_16_25" onclick="placeBet('sb_16_25')"><span>16-25</span><div class="sb-pool">₹<span id="p-sb_16_25">0</span></div><div class="sb-chips-zone" id="chips-sb_16_25"></div></div>
            <div class="sb-box" id="box-sb_26_35" onclick="placeBet('sb_26_35')"><span>26-35</span><div class="sb-pool">₹<span id="p-sb_26_35">0</span></div><div class="sb-chips-zone" id="chips-sb_26_35"></div></div>
            <div class="sb-box" id="box-sb_36_40" onclick="placeBet('sb_36_40')"><span>36-40</span><div class="sb-pool">₹<span id="p-sb_36_40">0</span></div><div class="sb-chips-zone" id="chips-sb_36_40"></div></div>
            <div class="sb-box" id="box-sb_41_52" onclick="placeBet('sb_41_52')"><span>41+</span><div class="sb-pool">₹<span id="p-sb_41_52">0</span></div><div class="sb-chips-zone" id="chips-sb_41_52"></div></div>
        </div>
    </div>

    <div class="bottom-strip">
        <div class="user-info"><div class="u-bal" id="balance">0.00</div></div>
        <div class="chip-selector">
            <div class="c-btn c10 selected" onclick="setChip(10, this)">10</div>
            <div class="c-btn c50" style="background:#3366ff" onclick="setChip(50, this)">50</div>
            <div class="c-btn c100" style="background:#00cc99" onclick="setChip(100, this)">100</div>
            <div class="c-btn c1k" onclick="setChip(1000, this)">1K</div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const phone = localStorage.getItem('userPhone') || localStorage.getItem('phone');

    let currentChip = 10, isBettingOpen = false, currentAnimId = 0;
    const sideBetMultipliers = { 'sb_1_5': 3.0, 'sb_6_10': 4.0, 'sb_11_15': 5.5, 'sb_16_25': 4.5, 'sb_26_35': 15.0, 'sb_36_40': 50.0, 'sb_41_52': 120.0 };

    function resetTable() {
        currentAnimId++; // Stop any ongoing async animation loop
        
        // 1. Clean Status
        const statusEl = document.getElementById('game-status');
        statusEl.innerText = "WAITING...";
        statusEl.style.color = "#fff";
        statusEl.style.borderColor = "#fff";

        // 2. Clean Boxes & Glow
        document.querySelectorAll('.box, .sb-box').forEach(el => {
            el.classList.remove('box-glow');
        });

        // 3. Clean Chips
        document.querySelectorAll('.chips-zone, .sb-chips-zone').forEach(el => el.innerHTML = '');

        // 4. Clean Track & Joker
        document.getElementById('dealt-cards-track').innerHTML = '';
        document.getElementById('joker-front').style.display = 'none';
        document.getElementById('joker-back').style.display = 'block';

        console.log("Table Cleared for New Round");
    }

    // Sync Betting State
    db.ref('Game/AndarBahar/Status').on('value', snap => {
        let st = snap.val(); if(!st) return;
        let statusEl = document.getElementById('game-status');
        
        if(st.state === 'betting') {
            if(!isBettingOpen) {
                resetTable(); // 🔥 FULL CLEAN BEFORE START 🔥
                isBettingOpen = true;
                document.getElementById('joker-front').innerHTML = createCardHtml(st.jokerVal, st.jokerSuit);
                document.getElementById('joker-back').style.display = 'none';
                document.getElementById('joker-front').style.display = 'block';
            }
            statusEl.innerText = "⏳ PLACE BETS: " + st.timer; 
            statusEl.style.color = (st.timer <= 5) ? "#ff4d4d" : "#fff";
        } else if (st.state === 'dealing' && isBettingOpen) {
            isBettingOpen = false;
            statusEl.innerText = "🛑 STOP BETTING"; 
            showAnim(st.winner, st.jokerVal, currentAnimId);
        }
    });

    async function showAnim(win, jVal, animId) {
        let totalSteps = Math.floor(Math.random() * 15) + 5; 
        if(win==='andar' && totalSteps%2===0) totalSteps++; 
        if(win==='bahar' && totalSteps%2!==0) totalSteps++; 

        const track = document.getElementById('dealt-cards-track');

        for(let i=0; i<totalSteps; i++) {
            if(animId !== currentAnimId) return; // KILL LOOP IF RESET HAPPENED

            let side = ((i+1)%2!==0) ? 'andar' : 'bahar';
            let isLast = (i === totalSteps-1);
            let val = isLast ? jVal : ["2","3","J","K","Q","7"][Math.floor(Math.random()*6)];
            let suit = ["S","H","D","C"][Math.floor(Math.random()*4)];
            
            const cardEl = document.createElement('div');
            cardEl.className = 'dealt-card';
            cardEl.innerHTML = createCardHtml(val, suit);
            track.appendChild(cardEl);
            track.scrollLeft = track.scrollWidth;

            try { document.getElementById('cardSnd').cloneNode().play(); } catch(e){}

            if(isLast) {
                cardEl.classList.add('win-pop');
                document.getElementById('box-'+side).classList.add('box-glow');
                document.getElementById('game-status').innerText = side.toUpperCase() + " WINS!";
                // Side Bet Winner logic
                let sbId = (totalSteps<=5)?'sb_1_5':(totalSteps<=10)?'sb_6_10':(totalSteps<=15)?'sb_11_15':(totalSteps<=25)?'sb_16_25':'sb_26_35';
                let sbBox = document.getElementById('box-'+sbId);
                if(sbBox) sbBox.classList.add('box-glow');
                return;
            }
            await new Promise(r => setTimeout(r, 500)); 
        }
    }

    function createCardHtml(val, suit) {
        let col = (suit==='H'||suit==='D') ? '#f00' : '#000'; let sym = suit==='S'?'♠':suit==='H'?'♥':suit==='D'?'♦':'♣';
        return `<div style="background:#fff; color:${col}; width:100%; height:100%; border-radius:3px; display:flex; flex-direction:column; justify-content:space-between; padding:2px; box-sizing:border-box;">
            <div style="font-size:12px; font-weight:900;">${val==='0'?'10':val}</div>
            <div style="font-size:28px; text-align:center;">${sym}</div>
            <div style="font-size:12px; font-weight:900; transform:rotate(180deg);">${val==='0'?'10':val}</div>
        </div>`;
    }

    window.placeBet = function(id) { if(isBettingOpen) spawnChip(id, currentChip); }
    function spawnChip(id, amt) {
        const div = document.getElementById('chips-'+id); if(!div) return;
        const c = document.createElement('div');
        c.className = 'chip'; c.style.background = '#ffcc00';
        c.innerText = amt; c.style.left = Math.random()*60+20+"%"; c.style.top = Math.random()*40+20+"%";
        div.appendChild(c);
    }
    window.setChip = function(v, el) { currentChip = v; document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('selected')); el.classList.add('selected'); }
    function initAudio() { }
</script>
</body>
</html>
