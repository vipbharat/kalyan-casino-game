<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANDAR BAHAR - Original Landscape Table</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap');

        :root { 
            --andar-bg: #e6f2ff; --andar-text: #0059b3; 
            --bahar-bg: #ffcccc; --bahar-text: #b30000;
            --table-green: #006622; --border-brown: #4d2600;
        }

        body { 
            margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; background: #000; 
            color: white; user-select: none; display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw; overflow: hidden;
        }

        /* MAIN TABLE WRAPPER - SAFE ROTATION */
        .casino-table {
            width: 100vw; height: 100vh; 
            background: radial-gradient(circle at center, #00802b, var(--table-green));
            border-bottom: 15px solid var(--border-brown); 
            border-bottom-left-radius: 40% 10%; border-bottom-right-radius: 40% 10%;
            position: relative; display: flex; flex-direction: column; align-items: center; 
            box-sizing: border-box; overflow: hidden;
        }

        /* AUTO ROTATE FOR PORTRAIT MODE (FIXED BLACK SCREEN BUG) */
        @media screen and (orientation: portrait) {
            .casino-table {
                transform: rotate(90deg);
                width: 100vh;
                height: 100vw;
            }
        }

        /* TOP HISTORY BAR */
        .history-bar {
            width: 100%; background: #003311; padding: 4px 0; display: flex; justify-content: center; gap: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .record-dot {
            width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: #fff;
        }
        .dot-a { background: #0099cc; border: 1px solid #fff; }
        .dot-b { background: #cc0000; border: 1px solid #fff; }

        /* SIDE PLAYERS (LEFT & RIGHT) */
        .side-players { position: absolute; top: 50px; display: flex; flex-direction: column; gap: 10px; }
        .left-players { left: 15px; } .right-players { right: 15px; }
        .player-avatar {
            width: 38px; height: 38px; background: #fff; border-radius: 50%; border: 3px solid #d98c21; display: flex; align-items: center; justify-content: center; margin: 0 auto; position: relative;
        }
        .player-bal { background: rgba(0,0,0,0.7); font-size: 9px; padding: 2px 8px; border-radius: 10px; border: 1px solid #d98c21; margin-top: -6px; position: relative; z-index: 2; text-align: center;}

        /* CENTER GAME AREA */
        .game-area { display: flex; align-items: stretch; justify-content: center; gap: 10px; width: 55%; margin-top: 20px; }
        
        .box { flex: 1; border-radius: 12px; position: relative; display: flex; flex-direction: column; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.6); }
        .box:active { transform: scale(0.98); }
        
        .andar-box { background: var(--andar-bg); border-top-right-radius: 0; border-bottom-right-radius: 0; }
        .bahar-box { background: var(--bahar-bg); border-top-left-radius: 0; border-bottom-left-radius: 0; }
        
        .box-header { text-align: center; padding: 6px 0; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .box-title { font-size: 15px; font-weight: 900; }
        .andar-box .box-title { color: var(--andar-text); }
        .bahar-box .box-title { color: var(--bahar-text); }
        .ratio { font-size: 10px; color: #555; font-weight: bold; }

        .chips-zone { flex: 1; position: relative; min-height: 60px; }
        .pool-amt { text-align: center; padding: 6px 0; font-size: 13px; font-weight: 900; color: #333; border-top: 1px solid rgba(0,0,0,0.1); }

        /* CENTER JOKER AREA */
        .center-joker { width: 80px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; gap: 5px; }
        .status-pill { background: #1a1a00; color: #ffff66; font-size: 10px; padding: 4px 8px; border-radius: 12px; border: 1px solid #ffff66; font-weight: bold; text-align: center; white-space: nowrap; width: 100%; box-sizing: border-box;}
        .card-slot { width: 55px; height: 80px; background: #fff; border-radius: 5px; box-shadow: 0 5px 10px rgba(0,0,0,0.5); display: flex; flex-direction: column; padding: 3px; box-sizing: border-box; }

        /* SIDE BETS TABLE */
        .side-bets { width: 55%; background: #3d3d5c; border-radius: 8px; margin-top: 10px; border: 2px solid #5c5c8a; overflow: hidden; }
        .sb-title { background: #5c5c8a; font-size: 9px; text-align: center; padding: 3px; font-weight: bold; }
        .sb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #29293d; }
        .sb-item { background: #3d3d5c; font-size: 9px; padding: 4px 6px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .sb-item:active { background: #5c5c8a; }
        .sb-ratio { color: #ffd700; font-weight: bold; }

        /* BOTTOM STRIP (USER & CHIPS) */
        .bottom-strip { position: absolute; bottom: 0; width: 100%; display: flex; justify-content: space-between; align-items: flex-end; padding: 8px 25px; box-sizing: border-box; }
        
        .user-info { display: flex; align-items: center; background: #4d0000; border: 1px solid #ffcc00; border-radius: 20px; padding: 2px 15px 2px 2px; margin-bottom: 5px;}
        .u-avatar { width: 28px; height: 28px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; margin-right: 8px; }
        .u-bal { font-size: 11px; color: #fff; font-weight: bold; }

        .chip-selector { display: flex; gap: 6px; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 25px; border: 2px solid #ffcc00; margin-bottom: 5px;}
        .c-btn { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; border: 2px dashed #fff; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.6); transition: 0.1s; }
        .c-btn:active { transform: scale(0.9); }
        .c10 { background: #ffcc00; color: #000; } .c50 { background: #3366ff; color: #fff; } .c100 { background: #00cc99; color: #fff; } .c500 { background: #cc33ff; color: #fff; } .c1k { background: #ff3333; color: #fff; } .c5k { background: #e6e600; color: #000; border: 2px solid #fff; }
        .selected { transform: translateY(-5px); border-style: solid; box-shadow: 0 0 10px #fff; }

        .players-btn { background: #004d00; border: 1px solid #00ff00; padding: 6px; border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; margin-bottom: 5px;}

        .chip { width: 18px; height: 18px; border-radius: 50%; position: absolute; font-size: 7px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #fff; box-shadow: 1px 1px 3px rgba(0,0,0,0.5); pointer-events: none;}
        
        .win-glow { animation: blink 0.5s infinite alternate; }
        @keyframes blink { from { box-shadow: inset 0 0 10px #ffff00; } to { box-shadow: inset 0 0 40px #ffff00; } }
    </style>
</head>
<body onclick="initAudio()">

    <audio id="coinSnd" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="cardSnd" src="https://assets.mixkit.co/active_storage/sfx/3005/3005-preview.mp3"></audio>

<div class="casino-table">
    
    <div class="history-bar" id="record-board"></div>

    <div class="side-players left-players" id="left-bots"></div>
    <div class="side-players right-players" id="right-bots"></div>

    <div class="game-area">
        <div class="box andar-box" id="box-andar" onclick="placeBet('andar')">
            <div class="box-header">
                <div class="box-title">Andar</div><div class="ratio">1:1.95</div>
            </div>
            <div class="chips-zone" id="chips-andar"></div>
            <div class="pool-amt" id="p-andar">0.00</div>
        </div>

        <div class="center-joker">
            <div class="status-pill" id="game-status">Waiting...</div>
            <div class="card-slot" id="joker-slot">
                <div id="joker-front" style="display:none; width:100%; height:100%;"></div>
                <div id="joker-back" style="width:100%; height:100%; background: url('https://deckofcardsapi.com/static/img/back.png') center/cover; border-radius:3px;"></div>
            </div>
        </div>

        <div class="box bahar-box" id="box-bahar" onclick="placeBet('bahar')">
            <div class="box-header">
                <div class="box-title">Bahar</div><div class="ratio">1:1.95</div>
            </div>
            <div class="chips-zone" id="chips-bahar"></div>
            <div class="pool-amt" id="p-bahar">0.00</div>
        </div>
    </div>

    <div class="side-bets">
        <div class="sb-title">Side Bets (Bet on number of cards dealt)</div>
        <div class="sb-grid">
            <div class="sb-item"><span>1-5</span><span class="sb-ratio">1:3</span></div>
            <div class="sb-item"><span>6-10</span><span class="sb-ratio">1:4</span></div>
            <div class="sb-item"><span>11-15</span><span class="sb-ratio">1:5</span></div>
            <div class="sb-item"><span>16-20</span><span class="sb-ratio">1:6</span></div>
            <div class="sb-item"><span>21-25</span><span class="sb-ratio">1:7</span></div>
            <div class="sb-item"><span>26-30</span><span class="sb-ratio">1:8</span></div>
        </div>
    </div>

    <div class="bottom-strip">
        <div class="user-info">
            <div class="u-avatar">👤</div>
            <div class="u-bal" id="balance">0.00</div>
        </div>

        <div class="chip-selector">
            <div class="c-btn c10 selected" onclick="setChip(10, this)">10</div>
            <div class="c-btn c50" onclick="setChip(50, this)">50</div>
            <div class="c-btn c100" onclick="setChip(100, this)">100</div>
            <div class="c-btn c500" onclick="setChip(500, this)">500</div>
            <div class="c-btn c1k" onclick="setChip(1000, this)">1K</div>
            <div class="c-btn c5k" onclick="setChip(5000, this)">5K</div>
        </div>

        <div class="players-btn">👥</div>
    </div>

</div>

<script>
    let audioInit = false;
    function initAudio() {
        if(!audioInit) {
            try { document.getElementById('coinSnd').play().catch(e=>{}); audioInit = true; } catch(e){}
        }
    }

    const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const phone = localStorage.getItem('userPhone') || localStorage.getItem('phone');

    const cardVoiceNames = {"A":"Ace", "2":"Two", "3":"Three", "4":"Four", "5":"Five", "6":"Six", "7":"Seven", "8":"Eight", "9":"Nine", "10":"Ten", "J":"Jack", "Q":"Queen", "K":"King"};
    const suitVoiceNames = {"S":"Spades", "H":"Hearts", "D":"Diamonds", "C":"Clubs"};

    function speak(text) { if('speechSynthesis' in window) { window.speechSynthesis.cancel(); let msg = new SpeechSynthesisUtterance(text); msg.rate = 1.1; window.speechSynthesis.speak(msg); } }

    let currentChip = 10, isBettingOpen = false, pool = {andar:0, bahar:0}, myBets = {andar:0, bahar:0};
    let botInterval;

    // GENERATE BOTS
    function renderBots() {
        let leftH = '', rightH = '';
        for(let i=0; i<6; i++) {
            let bal = (Math.random()*10000 + 1000).toFixed(2);
            let h = `<div style="text-align:center"><div class="player-avatar">🧑‍💼</div><div class="player-bal">${bal}</div></div>`;
            if(i<3) leftH += h; else rightH += h;
        }
        document.getElementById('left-bots').innerHTML = leftH; document.getElementById('right-bots').innerHTML = rightH;
    }
    renderBots(); setInterval(renderBots, 5000);

    // USER BALANCE
    if(phone) {
        db.ref('users/'+phone).on('value', s => { 
            let d = s.val() || {}; let total = (parseFloat(d.balance)||0) + (parseFloat(d.winning_balance)||0);
            document.getElementById('balance').innerText = total.toFixed(2); 
        });
    }

    // HISTORY
    db.ref('Game/AndarBahar/History').on('value', snap => {
        let hist = snap.val();
        if(hist && Array.isArray(hist)) {
            let hHtml = '';
            [...hist].reverse().slice(0, 25).forEach(win => {
                let char = win === 'andar' ? 'A' : 'B'; let cls = win === 'andar' ? 'dot-a' : 'dot-b';
                hHtml += `<div class="record-dot ${cls}">${char}</div>`;
            });
            document.getElementById('record-board').innerHTML = hHtml;
        }
    });

    window.placeBet = function(side) {
        if(!isBettingOpen) return;
        db.ref(`Game/AndarBahar/Bets/${phone}/${side}`).set(firebase.database.ServerValue.increment(currentChip));
        myBets[side] += currentChip;
        spawnChip(side, currentChip);
        try { document.getElementById('coinSnd').cloneNode().play(); } catch(e){}
    }

    function spawnChip(side, amt) {
        const div = document.getElementById('chips-'+side);
        const c = document.createElement('div');
        let bg = amt===10?'#ffcc00':amt===50?'#3366ff':amt===100?'#00cc99':amt===500?'#cc33ff':amt===1000?'#ff3333':'#e6e600';
        let col = (amt===10||amt===5000)?'#000':'#fff';
        c.className = 'chip'; c.style.background = bg; c.style.color = col;
        c.innerText = amt >= 1000 ? (amt/1000)+'K' : amt;
        c.style.left = Math.random()*80 + "%"; c.style.top = Math.random()*60 + "%";
        div.appendChild(c);
        if(div.children.length > 40) div.firstChild.remove();
    }

    function botBetAction() {
        if(!isBettingOpen) return;
        let botBetted = false;
        ['andar', 'bahar'].forEach(s => {
            if(Math.random() > 0.3) { 
                let amt = [10, 50, 100, 500, 1000][Math.floor(Math.random()*5)];
                spawnChip(s, amt); botBetted = true;
            }
        });
        if(botBetted) { try { let snd = document.getElementById('coinSnd').cloneNode(); snd.volume = 0.1; snd.play().catch(e=>{}); } catch(e){} }
    }

    function createCard(val, suit) {
        let col = (suit==='H'||suit==='D') ? '#f00' : '#000'; let sym = suit==='S'?'♠':suit==='H'?'♥':suit==='D'?'♦':'♣';
        return `<div style="color:${col}; width:100%; height:100%; display:flex; flex-direction:column; justify-content:space-between;">
            <div style="font-size:12px; font-weight:900;">${val==='0'?'10':val}</div>
            <div style="font-size:32px; text-align:center; margin-top:-8px;">${sym}</div>
            <div style="font-size:12px; font-weight:900; transform:rotate(180deg); margin-top:-8px;">${val==='0'?'10':val}</div>
        </div>`;
    }

    db.ref('Game/AndarBahar/Status').on('value', snap => {
        let st = snap.val(); if(!st) return;
        let statusEl = document.getElementById('game-status');
        
        if(st.state === 'betting') {
            document.getElementById('joker-front').innerHTML = createCard(st.jokerVal, st.jokerSuit);
            document.getElementById('joker-back').style.display = 'none'; document.getElementById('joker-front').style.display = 'block';
            
            if(!isBettingOpen) {
                isBettingOpen = true; resetUI();
                speak(`${cardVoiceNames[st.jokerVal]} is Joker. Place your bets.`);
                clearInterval(botInterval); botInterval = setInterval(botBetAction, 400); 
            }
            statusEl.innerText = "Place Bets: " + st.timer; statusEl.style.color = (st.timer <= 5) ? "#ff4d4d" : "#ffff66";
        } else if (st.state === 'dealing' && isBettingOpen) {
            isBettingOpen = false; statusEl.innerText = "Stop Betting"; statusEl.style.color = "#fff";
            clearInterval(botInterval); speak("Stop betting");
            showAnim(st.winner, st.jokerVal);
        }
    });

    db.ref('Game/AndarBahar/Bets').on('value', snap => {
        let all = snap.val() || {}; pool = {andar:0, bahar:0};
        for(let u in all) { pool.andar += (all[u].andar||0); pool.bahar += (all[u].bahar||0); }
        document.getElementById('p-andar').innerText = pool.andar.toLocaleString() + ".00";
        document.getElementById('p-bahar').innerText = pool.bahar.toLocaleString() + ".00";
    });

    async function showAnim(win, jVal) {
        let steps = Math.floor(Math.random()*4)+6;
        if(win==='andar' && steps%2===0) steps++; if(win==='bahar' && steps%2!==0) steps++;

        for(let i=0; i<steps; i++) {
            let side = ((i+1)%2!==0) ? 'andar' : 'bahar'; let isLast = (i === steps-1);
            let val = isLast ? jVal : ["2","3","4","5","J","K"][Math.floor(Math.random()*6)];
            let suit = ["S","H","D","C"][Math.floor(Math.random()*4)];
            
            let statusEl = document.getElementById('game-status');
            statusEl.innerText = `${side.toUpperCase()} : ${val==='0'?'10':val}`;
            
            try { document.getElementById('cardSnd').cloneNode().play(); } catch(e){}
            speak(cardVoiceNames[val]);

            if(isLast) {
                setTimeout(() => {
                    document.getElementById('box-'+side).classList.add('win-glow');
                    statusEl.innerText = side.toUpperCase() + " WINS!";
                    speak(side + " wins");
                }, 500);
                return;
            }
            await new Promise(r => setTimeout(r, 1000));
        }
    }

    function resetUI() {
        document.getElementById('joker-front').style.display = 'none'; document.getElementById('joker-back').style.display = 'block';
        ['andar','bahar'].forEach(s => { document.getElementById('box-'+s).classList.remove('win-glow'); document.getElementById('chips-'+s).innerHTML = ''; });
        myBets = {andar:0, bahar:0}; document.getElementById('p-andar').innerText = "0.00"; document.getElementById('p-bahar').innerText = "0.00";
    }

    window.setChip = function(v, el) { currentChip = v; document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('selected')); el.classList.add('selected'); }
</script>
</body>
</html>
