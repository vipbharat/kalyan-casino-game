<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANDAR BAHAR PRO VIP - Counter Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@600;800&display=swap');

        :root { 
            --andar: #ff3333; 
            --bahar: #3399ff; 
            --gold: #FFD700; 
            --counter-bg: #1a1c23;
        }
        
        body { 
            margin: 0; font-family: 'Montserrat', sans-serif; overflow: hidden; color: white; user-select: none; 
            background: radial-gradient(circle at 50% 0%, #202020, #000); height: 100vh;
        }

        .top-bar { 
            display: flex; justify-content: space-between; padding: 10px 20px; 
            background: #000; border-bottom: 2px solid var(--gold);
            box-shadow: 0 5px 15px rgba(255,215,0,0.2); 
            z-index: 1000; position: relative;
        }
        .top-left { font-size: 11px; color: var(--gold); font-family: 'Cinzel', serif; }
        .bal-box { 
            background: #111; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 5px; 
            color: #0f0; font-size: 15px; font-weight: 800;
        }

        /* FULL SCREEN FLASH OVERLAY */
        #flash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Cinzel', serif; opacity: 0; pointer-events: none;
        }
        .flash-text { font-size: 40px; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px var(--gold); text-align: center; text-transform: uppercase;}
        
        .run-flash { animation: flashAnim 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes flashAnim {
            0% { opacity: 0; transform: scale(0.5); }
            30% { opacity: 1; transform: scale(1.1); }
            70% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.5); }
        }

        /* COUNTER BOX SCENE */
        .scene {
            perspective: 1000px; height: calc(100vh - 180px); width: 100vw; display: flex; align-items: center; justify-content: center; position: relative;
        }

        .counter-3d {
            width: 90%; height: 70%; 
            background: linear-gradient(145deg, #2a2d34, #141518);
            transform: rotateX(40deg) translateY(-20px); transform-style: preserve-3d; 
            border: 3px solid #444; border-bottom: 8px solid #222; border-radius: 15px; 
            box-shadow: 0 30px 40px rgba(0,0,0,0.9), inset 0 5px 10px rgba(255,255,255,0.1); 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 30px;
        }

        /* CENTERED JOKER SECTION */
        .joker-section { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transform: translateZ(10px); margin-bottom: 20px; width: 100%;
        }
        .joker-title { font-family: 'Cinzel', serif; font-size: 14px; color: var(--gold); font-weight: 900; margin-bottom: 8px; letter-spacing: 2px; }
        
        .card-slot { 
            width: 65px; height: 95px; background: rgba(0,0,0,0.5); border-radius: 4px; border: 1px dashed rgba(255,215,0,0.3); 
            position: relative; display: flex; align-items: center; justify-content: center; transform-style: preserve-3d;
        }
        .joker-card { width: 65px; height: 95px; background: #fff; border-radius: 4px; box-shadow: 0 10px 20px rgba(0,0,0,0.6); }
        
        .timer-sec { 
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) translateZ(30px) rotateX(-40deg);
            font-family: 'Cinzel', serif; font-size: 50px; color: #fff; font-weight: 900; text-shadow: 0 0 15px var(--gold); z-index: 50;
        }

        .table-top { display: flex; justify-content: center; gap: 70px; transform: translateZ(5px); transform-style: preserve-3d; width: 100%; }
        .slot-title { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 900; margin-bottom: 5px; text-align: center; }

        .card-back, .card-front { position: absolute; width: 100%; height: 100%; top: 0; left: 0; border-radius: 4px; backface-visibility: hidden; }
        .card-back { background: url('https://deckofcardsapi.com/static/img/back.png') center/cover; }
        .card-front { display: none; background: white; }

        /* FLAT BETTING ZONES (CHIPS BOX REMOVED) */
        .bet-grid { display: flex; justify-content: center; gap: 20px; margin-top: 30px; width: 90%; transform-style: preserve-3d; }
        .box { 
            flex: 1; height: 120px; position: relative; cursor: pointer;
            background: rgba(0,0,0,0.3); border-radius: 10px;
            border-bottom: 4px solid; border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding-bottom: 10px;
        }
        .andar-box { border-bottom-color: var(--andar); } 
        .bahar-box { border-bottom-color: var(--bahar); }
        
        .pool-amt { display: block; color: var(--gold); font-size: 18px; font-weight: 900; margin-top: 5px; }
        
        /* INTERNAL WIN TEXT */
        .box-win-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 16px; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--gold);
            display: none; text-transform: uppercase; animation: winPulse 0.5s infinite alternate; z-index: 50;
        }
        @keyframes winPulse { from { transform: translate(-50%, -50%) scale(1); } to { transform: translate(-50%, -50%) scale(1.1); } }

        .glow-andar { animation: glowA 0.5s infinite alternate; background: rgba(255,51,51,0.2) !important; }
        @keyframes glowA { from { box-shadow: inset 0 0 10px var(--andar); } to { box-shadow: inset 0 0 30px var(--andar); } }
        
        .glow-bahar { animation: glowB 0.5s infinite alternate; background: rgba(51,153,255,0.2) !important; }
        @keyframes glowB { from { box-shadow: inset 0 0 10px var(--bahar); } to { box-shadow: inset 0 0 30px var(--bahar); } }

        /* CHIPS FOOTER */
        .chip-footer { 
            position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: center; gap: 8px; padding: 15px 0 25px; border-top: 2px solid var(--gold); z-index: 1100;
        }
        .c-btn { 
            width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; border: 2px dashed rgba(255,255,255,0.4); font-size: 13px;
        }
        .c10 { background: #cd7f32; } .c100 { background: #c0c0c0; color: #000; } .c500 { background: #ffd700; color: #000; }
        .c1k { background: #ff4d4d; } .c5k { background: #9933ff; } .c10k { background: #111; color: var(--gold); border: 2px solid var(--gold); }
        .selected { transform: translateY(-8px); box-shadow: 0 0 15px var(--gold); border: 2px solid #fff; }

        .deal-anim { animation: flyIn 0.3s ease-out forwards; }
        @keyframes flyIn { 0% { transform: translateZ(100px) scale(1.5) rotateY(180deg); opacity: 0; } 100% { transform: translateZ(0) scale(1) rotateY(0deg); opacity: 1; } }
    </style>
</head>
<body>

    <audio id="coinSnd" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="cardSnd" src="https://assets.mixkit.co/active_storage/sfx/3005/3005-preview.mp3"></audio>

<div class="top-bar">
    <div class="top-left"><div id="live-date">--/--/--</div></div>
    <div class="bal-box">₹ <span id="balance">0.00</span></div>
</div>

<div id="flash-screen">
    <div class="flash-text" id="flash-msg">PLACE YOUR BETS</div>
</div>

<div class="scene">
    <div class="timer-sec" id="timer">WAITING</div>
    <div class="counter-3d">
        <div class="joker-section">
            <div class="joker-title">MASTER JOKER</div>
            <div class="joker-card" id="joker-slot">
                <div class="card-back" id="joker-back"></div>
                <div class="card-front" id="joker-front"></div>
            </div>
        </div>

        <div class="table-top">
            <div>
                <div class="slot-title" style="color:var(--andar);">ANDAR</div>
                <div class="card-slot" id="slot-andar">
                    <div class="card-back" id="back-a"></div>
                    <div class="card-front" id="img-a"></div>
                </div>
            </div>
            <div>
                <div class="slot-title" style="color:var(--bahar);">BAHAR</div>
                <div class="card-slot" id="slot-bahar">
                    <div class="card-back" id="back-b"></div>
                    <div class="card-front" id="img-b"></div>
                </div>
            </div>
        </div>

        <div class="bet-grid">
            <div class="box andar-box" id="box-andar" onclick="placeBet('andar')">
                <span class="pool-amt">₹<span id="p-andar">0</span></span>
                <div class="box-win-text" id="win-text-andar">ANDAR WINS</div>
                <div id="chips-andar" style="width:100%; height:80%; position:absolute; bottom:0;"></div>
            </div>
            <div class="box bahar-box" id="box-bahar" onclick="placeBet('bahar')">
                <span class="pool-amt">₹<span id="p-bahar">0</span></span>
                <div class="box-win-text" id="win-text-bahar">BAHAR WINS</div>
                <div id="chips-bahar" style="width:100%; height:80%; position:absolute; bottom:0;"></div>
            </div>
        </div>
    </div>
</div>

<div class="chip-footer">
    <div class="c-btn c10" onclick="setChip(10, this)">10</div>
    <div class="c-btn c100" onclick="setChip(100, this)">100</div>
    <div class="c-btn c500 selected" onclick="setChip(500, this)">500</div>
    <div class="c-btn c1k" onclick="setChip(1000, this)">1K</div>
    <div class="c-btn c5k" onclick="setChip(5000, this)">5K</div>
    <div class="c-btn c10k" onclick="setChip(10000, this)">10K</div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const phone = localStorage.getItem('userPhone') || localStorage.getItem('phone');

    const cardVoiceNames = {"A":"Ace", "2":"Two", "3":"Three", "4":"Four", "5":"Five", "6":"Six", "7":"Seven", "8":"Eight", "9":"Nine", "10":"Ten", "J":"Jack", "Q":"Queen", "K":"King"};
    const suitVoiceNames = {"S":"Spades", "H":"Hearts", "D":"Diamonds", "C":"Clubs"};

    function speak(text) {
        if('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            let msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1.2;
            window.speechSynthesis.speak(msg);
        }
    }

    let currentChip = 500, isBettingOpen = false, pool = {andar:0, bahar:0}, myBets = {andar:0, bahar:0};
    let botInterval;
    document.getElementById('live-date').innerText = new Date().toLocaleDateString();

    if(phone) {
        db.ref('users/'+phone).on('value', s => { 
            let d = s.val() || {};
            let total = (parseFloat(d.balance)||0) + (parseFloat(d.winning_balance)||0);
            document.getElementById('balance').innerText = total.toFixed(2); 
        });
    }

    window.placeBet = function(side) {
        if(!isBettingOpen) return;
        db.ref(`Game/AndarBahar/Bets/${phone}/${side}`).set(firebase.database.ServerValue.increment(currentChip));
        myBets[side] += currentChip;
        spawnChip(side, currentChip);
        try { document.getElementById('coinSnd').cloneNode().play(); } catch(e){}
    }

    function spawnChip(side, amt) {
        const div = document.getElementById('chips-'+side);
        const c = document.createElement('div');
        let bg = amt===10?'#cd7f32':amt===100?'#c0c0c0':amt===500?'#ffd700':amt===1000?'#ff4d4d':amt===5000?'#9933ff':'#111';
        let col = (amt===100||amt===500)?'#000':amt===10000?'var(--gold)':'#fff';
        c.style.cssText = `width:22px; height:22px; border-radius:50%; background:${bg}; border:1px solid #fff; position:absolute; z-index:20; font-size:8px; display:flex; align-items:center; justify-content:center; color:${col}; font-weight:900; box-shadow:0 2px 5px rgba(0,0,0,0.8);`;
        c.innerText = amt >= 1000 ? (amt/1000)+'K' : amt;
        c.style.left = Math.random()*70+10 + "%"; c.style.top = Math.random()*60+20 + "%";
        div.appendChild(c);
        if(div.children.length > 30) div.firstChild.remove();
    }

    function botBetAction() {
        if(!isBettingOpen) return;
        let botBetted = false;
        ['andar', 'bahar'].forEach(s => {
            if(Math.random() > 0.4) { 
                let amt = [10, 100, 500, 1000, 5000, 10000][Math.floor(Math.random()*6)];
                spawnChip(s, amt);
                botBetted = true;
            }
        });
        if(botBetted) {
            try { let snd = document.getElementById('coinSnd').cloneNode(); snd.volume = 0.2; snd.play().catch(e=>{}); } catch(e){}
        }
    }

    function createCard(val, suit) {
        let col = (suit==='H'||suit==='D') ? '#f00' : '#000';
        let sym = suit==='S'?'♠':suit==='H'?'♥':suit==='D'?'♦':'♣';
        return `<div style="background:#fff; width:100%; height:100%; border-radius:4px; color:${col}; padding:3px; box-sizing:border-box;">
            <div style="font-size:14px; font-weight:900;">${val==='0'?'10':val}<br><span style="font-size:10px">${sym}</span></div>
            <div style="font-size:32px; text-align:center; margin-top:-5px;">${sym}</div>
        </div>`;
    }

    function showFlash(msg) {
        let flash = document.getElementById('flash-screen');
        document.getElementById('flash-msg').innerText = msg;
        flash.classList.remove('run-flash');
        void flash.offsetWidth;
        flash.classList.add('run-flash');
    }

    db.ref('Game/AndarBahar/Status').on('value', snap => {
        let st = snap.val(); if(!st) return;
        let tEl = document.getElementById('timer');
        
        if(st.state === 'betting') {
            document.getElementById('joker-front').innerHTML = createCard(st.jokerVal, st.jokerSuit);
            document.getElementById('joker-back').style.display = 'none';
            document.getElementById('joker-front').style.display = 'block';
            
            if(!isBettingOpen) {
                isBettingOpen = true; resetUI();
                showFlash("PLACE YOUR BETS!");
                speak(`${cardVoiceNames[st.jokerVal]} is Joker. Place your bets.`);
                clearInterval(botInterval);
                botInterval = setInterval(botBetAction, 600); // bots are back
            }
            tEl.innerText = st.timer;
        } else if (st.state === 'dealing' && isBettingOpen) {
            isBettingOpen = false; tEl.innerText = "STOP";
            clearInterval(botInterval);
            speak("Stop betting");
            showAnim(st.winner, st.jokerVal);
        }
    });

    db.ref('Game/AndarBahar/Bets').on('value', snap => {
        let all = snap.val() || {}; pool = {andar:0, bahar:0};
        for(let u in all) { pool.andar += (all[u].andar||0); pool.bahar += (all[u].bahar||0); }
        document.getElementById('p-andar').innerText = pool.andar.toLocaleString();
        document.getElementById('p-bahar').innerText = pool.bahar.toLocaleString();
    });

    async function showAnim(win, jVal) {
        let steps = Math.floor(Math.random()*4)+6;
        if(win==='andar' && steps%2===0) steps++;
        if(win==='bahar' && steps%2!==0) steps++;

        document.getElementById('back-a').style.display = 'none'; document.getElementById('back-b').style.display = 'none';

        for(let i=0; i<steps; i++) {
            let side = ((i+1)%2!==0) ? 'andar' : 'bahar';
            let isLast = (i === steps-1);
            let val = isLast ? jVal : ["2","3","4","5","J","K"][Math.floor(Math.random()*6)];
            let suit = ["S","H","D","C"][Math.floor(Math.random()*4)];

            let img = document.getElementById(side==='andar'?'img-a':'img-b');
            img.innerHTML = createCard(val, suit);
            img.style.display = 'block';
            img.classList.remove('deal-anim'); void img.offsetWidth; img.classList.add('deal-anim');
            
            try { document.getElementById('cardSnd').cloneNode().play(); } catch(e){}
            speak(cardVoiceNames[val]);

            if(isLast) {
                setTimeout(() => {
                    document.getElementById('box-'+side).classList.add('glow-'+side);
                    document.getElementById('win-text-'+side).style.display = 'block';
                    speak(side + " wins");
                }, 500);
                return;
            }
            await new Promise(r => setTimeout(r, 1000));
        }
    }

    function resetUI() {
        ['andar','bahar'].forEach(s => {
            document.getElementById('img-'+(s==='andar'?'a':'b')).style.display = 'none';
            document.getElementById('back-'+(s==='andar'?'a':'b')).style.display = 'block';
            document.getElementById('win-text-'+s).style.display = 'none';
            document.getElementById('box-'+s).classList.remove('glow-'+s);
            document.getElementById('chips-'+s).innerHTML = '';
        });
        myBets = {andar:0, bahar:0};
    }

    window.setChip = function(v, el) {
        currentChip = v;
        document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
    }
</script>
</body>
</html>
