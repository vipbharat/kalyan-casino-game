<div id="jackpot-toast" class="toast-hidden">
    <div class="jackpot-icon">🎰</div>
    <div class="jackpot-content">
        <div class="jackpot-header" id="game-name">DRAGON TIGER 🔴</div>
        <div id="jackpot-text">Loading...</div>
    </div>
</div>

<style>
    #jackpot-toast {
        position: fixed;
        bottom: 110px;
        left: -120%; /* Screen ke bahar se chalta hua aayega */
        background: linear-gradient(135deg, #050505, #1a1a2e);
        padding: 10px 20px;
        border-radius: 0 40px 40px 0;
        display: flex;
        align-items: center;
        gap: 12px;
        z-index: 10000;
        width: max-content;
        transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        
        /* 🔥 JALTI HUI BORDER (HIGH GLOW) 🔥 */
        border: 2.5px solid #ffd700;
        border-left: none;
        box-shadow: 10px 0 20px #ffd700, 10px 0 40px #ff00ff;
        animation: firePulse 1.2s infinite alternate;
    }

    .toast-visible { left: 0 !important; }

    @keyframes firePulse {
        from { box-shadow: 6px 0 15px #ffd700, 6px 0 25px #ff00ff; border-color: #ffd700; }
        to { box-shadow: 12px 0 35px #ffae00, 12px 0 55px #ff00de; border-color: #ffae00; }
    }

    .jackpot-header {
        font-size: 10px;
        font-weight: 900;
        color: #ff00ff;
        text-shadow: 0 0 10px #ff00ff;
        letter-spacing: 1.2px;
        text-transform: uppercase;
    }

    #jackpot-text { font-size: 14px; color: #fff; font-weight: bold; margin-top: 1px; }
    .win-amt { color: #00ff88; font-weight: 900; text-shadow: 0 0 5px #00ff88; }
    .user-id { color: #ffd700; } /* ID ko golden dikhane ke liye */
</style>

<script>
    // 1. Aapke 6 Games
    const gamesList = ["Dragon Tiger", "Andar Bahar", "Zoo Roulette", "Car Roulette", "Kalyan VIP", "7 Up Down"];

    // 2. ID Styles (Mix IDs banane ke liye)
    const idPrefix = ["User_", "VIP_", "Player_", "Gamer_", "ID_", "Bharat_", "Pro_"];

    const toast = document.getElementById("jackpot-toast");
    const gameLabel = document.getElementById("game-name");
    const toastTxt = document.getElementById("jackpot-text");

    function generateWinner() {
        // Random Game select karo
        let randomGame = gamesList[Math.floor(Math.random() * gamesList.length)];
        
        // 🔥 500 ID LOGIC: Random prefix + Random 3 digit number (0-500)
        let prefix = idPrefix[Math.floor(Math.random() * idPrefix.length)];
        let randomID = prefix + Math.floor(Math.random() * 500); 
        
        // ₹5,000 se ₹40,000 ka Jackpot
        let randomAmount = (Math.floor(Math.random() * 71) + 10) * 500; 

        // Update UI
        gameLabel.innerText = `${randomGame} 🔴`;
        toastTxt.innerHTML = `<span class="user-id">${randomID}</span> <span class="win-amt">₹${randomAmount.toLocaleString()}</span> win`;

        // 3. CHALTA HUA ANDAR AAYEGA
        toast.classList.add("toast-visible");

        // 4. 4.5 SECOND RUKNE KE BAAD BAHAR CHALA JAYEGA
        setTimeout(() => {
            toast.classList.remove("toast-visible");
        }, 4500);
    }

    // Har 8 second mein naya dhamaka
    setInterval(generateWinner, 8500);
    
    // Page load hone ke 2 sec baad shuru karein
    setTimeout(generateWinner, 2000);
</script>
