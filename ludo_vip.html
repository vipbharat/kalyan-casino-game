<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KALYAN LUDO VIP - MULTIPLAYER</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ffd700; --red: #ff4444; --green: #2ecc71; --blue: #3498db; --yellow: #f1c40f; }
        body { margin: 0; background: #050505; font-family: 'Arial Black', sans-serif; color: white; user-select: none; overflow-x: hidden; }
        
        .top-bar { display: flex; justify-content: space-between; padding: 15px; background: #111; border-bottom: 2px solid var(--gold); }
        .bal-box { background: #222; border: 1.5px solid var(--gold); padding: 5px 15px; border-radius: 20px; color: #0f0; font-weight: bold; }
        
        /* Tab Styling */
        .tab-container { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .tab-btn { padding: 10px 20px; border-radius: 10px; border: 1px solid var(--gold); background: #222; color: white; cursor: pointer; font-size: 14px; }
        .active-tab { background: var(--gold); color: black; font-weight: bold; }

        .entry-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
        .entry-btn { background: linear-gradient(145deg, #222, #000); border: 2px solid #333; border-radius: 15px; padding: 20px 10px; text-align: center; cursor: pointer; border-bottom: 5px solid #000; }
        .fee { font-size: 26px; color: var(--gold); margin: 0; }
        .win { font-size: 11px; color: #0f0; margin-top: 5px; }

        #game-page { display: none; padding: 10px; text-align: center; height: 100vh; background: #000; }
        .ludo-board { width: 300px; height: 300px; background: #fff; margin: 20px auto; border: 5px solid #333; position: relative; }
        .dice-btn { width: 70px; height: 70px; background: white; border-radius: 15px; border: 3px solid var(--gold); display: inline-flex; align-items: center; justify-content: center; font-size: 35px; color: #000; margin-top: 20px; }
        
        .win-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #000; border: 2px solid var(--gold); padding: 30px; border-radius: 20px; display: none; z-index: 100; text-align: center; width: 80%; }
    </style>
</head>
<body>

<div id="dash-page">
    <div class="top-bar">
        <div>
            <div style="color:var(--gold); font-size:20px;">KALYAN LUDO</div>
            <div style="font-size:10px; color:#0f0;">🟢 ONLINE</div>
        </div>
        <div class="bal-box">₹ <span id="balance">0.00</span></div>
    </div>

    <div class="tab-container">
        <button id="btn2p" class="tab-btn active-tab" onclick="switchMode(2)">2 PLAYERS</button>
        <button id="btn4p" class="tab-btn" onclick="switchMode(4)">4 PLAYERS</button>
    </div>

    <div class="entry-grid" id="entry-container"></div>
</div>

<div id="game-page">
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <button onclick="location.reload()" style="background:#444; color:white; border:none; padding:8px 15px; border-radius:10px;">EXIT</button>
        <div style="color:var(--gold); font-size: 14px;"><span id="p-mode">2</span> Player Table</div>
    </div>
    
    <h3 id="turn-msg" style="color:var(--gold); margin:20px 0;">Wait for your turn...</h3>
    
    <div class="ludo-board">
        <div style="position:absolute; top:0; left:0; width:40%; height:40%; background:var(--red);"></div>
        <div style="position:absolute; top:0; right:0; width:40%; height:40%; background:var(--green);"></div>
        <div style="position:absolute; bottom:0; left:0; width:40%; height:40%; background:var(--blue);"></div>
        <div style="position:absolute; bottom:0; right:0; width:40%; height:40%; background:var(--yellow);"></div>
    </div>

    <div class="dice-btn" id="dice" onclick="playerRoll()">🎲</div>
    <p style="color:#aaa; font-size: 12px; margin-top: 10px;">Winner Price: ₹<span id="active-win">0</span></p>
</div>

<div id="win-modal" class="win-modal">
    <h1 style="color:var(--gold);">WINNER!</h1>
    <p id="win-cash" style="font-size:22px; color:#0f0;"></p>
    <button onclick="location.reload()" style="background:var(--gold); padding:12px 30px; border-radius:10px; border:none; font-weight:bold;">COLLECT</button>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const phone = localStorage.getItem('userPhone') || "user_1";

    const fees = [10, 50, 100, 500, 1000, 2000];
    let userBal = 0, currentMode = 2, activeWinAmt = 0, rollCount = 0, isRolling = false;

    function speak(t) { let m = new SpeechSynthesisUtterance(t); m.lang='hi-IN'; window.speechSynthesis.speak(m); }

    // Switch between 2 Player and 4 Player UI
    function switchMode(m) {
        currentMode = m;
        document.getElementById('btn2p').classList.toggle('active-tab', m === 2);
        document.getElementById('btn4p').classList.toggle('active-tab', m === 4);
        renderDash();
    }

    function renderDash() {
        const cont = document.getElementById('entry-container');
        cont.innerHTML = "";
        fees.forEach(f => {
            // Winning Logic: 2 Player (1.9x), 4 Player (3.8x)
            let w = currentMode === 2 ? f * 1.9 : f * 3.7; 
            cont.innerHTML += `<div class="entry-btn" onclick="enterTable(${f}, ${w})">
                <p class="fee">₹${f}</p>
                <div class="win">WIN: ₹${w.toFixed(0)}</div>
            </div>`;
        });
    }

    function enterTable(fee, win) {
        if(userBal < fee) { speak("बैलेंस कम है"); return; }
        db.ref('users/'+phone+'/balance').transaction(b => (b || 0) - fee);
        activeWinAmt = win;
        document.getElementById('dash-page').style.display = 'none';
        document.getElementById('game-page').style.display = 'block';
        document.getElementById('p-mode').innerText = currentMode;
        document.getElementById('active-win').innerText = win.toFixed(0);
        
        let botText = currentMode === 2 ? "1 बोट जॉइन हुआ है" : "3 बोट्स जॉइन हुए हैं";
        speak(botText);
        setTimeout(() => { document.getElementById('turn-msg').innerText = "आपकी चाल है"; }, 2000);
    }

    function playerRoll() {
        if(isRolling || document.getElementById('turn-msg').innerText.includes("Wait")) return;
        isRolling = true;
        rollCount++;
        
        // Admin Profit Logic: Higher player mode = lower win probability
        let winChance = currentMode === 2 ? 0.4 : 0.2; 
        let n = (rollCount > 3 && Math.random() < winChance) ? 6 : Math.floor(Math.random() * 5) + 1;
        
        document.getElementById('dice').innerText = n;
        speak(n.toString());

        if(n === 6) { isRolling = false; speak("एक और चाल"); }
        else {
            // Check if player wins this round
            if(rollCount >= 5 && Math.random() < winChance) {
                triggerWin(activeWinAmt);
            } else {
                document.getElementById('turn-msg').innerText = "बोट की चाल...";
                setTimeout(() => { document.getElementById('turn-msg').innerText = "आपकी चाल है"; isRolling = false; }, 2000);
            }
        }
    }

    function triggerWin(amt) {
        document.getElementById('win-modal').style.display = 'block';
        document.getElementById('win-cash').innerText = "₹" + amt.toFixed(0);
        db.ref('users/'+phone+'/balance').transaction(b => (b || 0) + amt);
        speak("बधाई हो, आप जीत गए!");
    }

    db.ref('users/'+phone+'/balance').on('value', s => { 
        userBal = s.val() || 0; 
        document.getElementById('balance').innerText = userBal.toFixed(2); 
    });

    renderDash();
</script>
</body>
</html>
