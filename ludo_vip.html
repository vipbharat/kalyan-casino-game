<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUDO VIP HD MLA - DASHBOARD</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ffd700; --red: #ff4444; --green: #2ecc71; --blue: #3498db; --yellow: #f1c40f; }
        body { margin: 0; background: #050505; font-family: 'Arial Black', sans-serif; color: white; user-select: none; overflow-x: hidden; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 10px; background: #111; border-bottom: 2px solid var(--gold); }
        .bal-box { background: #222; border: 1.5px solid var(--gold); padding: 5px 12px; border-radius: 20px; color: #0f0; font-weight: bold; font-size: 14px;}
        
        .tab-container { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .tab-btn { padding: 10px 20px; border-radius: 10px; border: 1px solid var(--gold); background: #222; color: white; cursor: pointer; font-size: 14px; }
        .active-tab { background: var(--gold); color: black; font-weight: bold; }

        .entry-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
        .entry-btn { background: linear-gradient(145deg, #222, #000); border: 2px solid #333; border-radius: 15px; padding: 20px 10px; text-align: center; cursor: pointer; border-bottom: 5px solid #000; }
        .fee { font-size: 26px; color: var(--gold); margin: 0; }
        .win { font-size: 11px; color: #0f0; margin-top: 5px; }
    </style>
</head>
<body>

<div id="dash-page">
    <div class="top-bar">
        <button onclick="window.location.href='index.html'" style="background:transparent; border:none; color:white; font-size:20px; font-weight:bold; cursor:pointer;">◀</button>
        <div style="text-align: center;">
            <div style="color:var(--gold); font-size:16px; white-space:nowrap;">LUDO VIP HD MLA</div>
            <div style="font-size:10px; color:#0f0;">🟢 ONLINE</div>
        </div>
        <div class="bal-box">₹ <span id="balance">0.00</span></div>
    </div>

    <div class="tab-container">
        <button id="btn2p" class="tab-btn active-tab" onclick="switchMode(2)">2 PLAYERS</button>
        <button id="btn4p" class="tab-btn" onclick="switchMode(4)">4 PLAYERS</button>
    </div>

    <div class="entry-grid" id="entry-container"></div>
</div>

<script>
    // ES5 JavaScript taaki Acode mein koi crash na ho
    var firebaseConfig = { 
        apiKey: "AIzaSyCy2zsDDJeVTQEblCenkLILqJ_Pz0a0", 
        databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", 
        projectId: "kalyan-casino" 
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    var db = firebase.database();
    
    var phone = localStorage.getItem('userPhone') || "user_1";
    var fees = [10, 50, 100, 500, 1000, 2000, 5000, 10000];
    var userBal = 0;
    var currentMode = 2;

    // 2 Player aur 4 Player Switch karna
    function switchMode(m) {
        currentMode = m;
        var btn2 = document.getElementById('btn2p');
        var btn4 = document.getElementById('btn4p');
        
        if(m === 2) {
            btn2.className = "tab-btn active-tab";
            btn4.className = "tab-btn";
        } else {
            btn2.className = "tab-btn";
            btn4.className = "tab-btn active-tab";
        }
        renderDash();
    }

    // Entry Button Draw karna
    function renderDash() {
        var cont = document.getElementById('entry-container');
        cont.innerHTML = "";
        
        for(var i = 0; i < fees.length; i++) {
            var f = fees[i];
            // Win calculation: 2 Player = 1.9x, 4 Player = 3.7x
            var w = (currentMode === 2) ? (f * 1.9) : (f * 3.7); 
            
            var btnHtml = '<div class="entry-btn" onclick="enterTable(' + f + ', ' + w + ')">' +
                '<p class="fee">₹' + f + '</p>' +
                '<div class="win">WIN: ₹' + w.toFixed(0) + '</div>' +
            '</div>';
            
            cont.innerHTML += btnHtml;
        }
    }

    // Game Table mein entry lena
    function enterTable(fee, win) {
        if(userBal < fee) { 
            alert("Balance kam hai! Kripya recharge karein."); 
            return; 
        }
        
        // Single wallet se entry fee cut karna dashboard par hi
        db.ref('users/' + phone + '/balance').transaction(function(currentBalance) {
            return (currentBalance || 0) - fee;
        }, function(error, committed) {
            if(committed) {
                // Game mode ki detail save karna taaki dusri file ko pata chal sake
                localStorage.setItem('ludo_mode', currentMode);
                localStorage.setItem('ludo_fee', fee);
                localStorage.setItem('ludo_win', win);
                
                // Dusri file (Asli game table) par redirect karna
                window.location.href = 'ludo-table.html';
            }
        });
    }

    // Single Wallet Fetch - by default 0.00 dikhayega
    db.ref('users/' + phone + '/balance').on('value', function(snapshot) { 
        userBal = snapshot.val() || 0; 
        document.getElementById('balance').innerText = userBal.toFixed(2); 
    });

    // Pehli baar UI draw karna
    renderDash();
</script>
</body>
</html>
