<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALYAN PRO - MASTER ADMIN</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
        .main-wrapper { display: flex; width: 400vw; height: 100vh; transition: 0.4s ease; }
        .page { width: 100vw; height: 100vh; padding: 20px; box-sizing: border-box; overflow-y: auto; padding-bottom: 80px; }
        
        .nav-bar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 100; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 30px; border: 1px solid #333; }
        .dot { width: 12px; height: 12px; background: #333; border-radius: 50%; cursor: pointer; border: 1.5px solid gold; transition: 0.3s; }
        .dot.active { background: gold; box-shadow: 0 0 10px gold; transform: scale(1.3); }

        .card { background: #111; border: 1px solid #333; border-radius: 15px; padding: 15px; margin-bottom: 20px; border-left: 5px solid gold; }
        h2 { color: gold; font-size: 14px; text-transform: uppercase; margin: 0 0 10px 0; border-bottom: 1px solid #222; padding-bottom: 8px; }
        
        .btn { padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 11px; transition: 0.3s; }
        .btn-win { background: #2ecc71; color: #000; }
        .btn-lose { background: #e74c3c; color: #fff; }
        .btn-blue { background: #3498db; color: #fff; width: 100%; margin-top: 10px; }
        .btn-save { width: 100%; padding: 15px; background: #2ecc71; color: #000; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; }

        label { font-size: 12px; color: gold; display: block; margin-top: 10px; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; margin: 0 0 8px 0; background: #222; border: 1px solid #444; border-radius: 8px; color: #fff; box-sizing: border-box; }
        
        .switch { position: relative; display: inline-block; width: 45px; height: 22px; float: right; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2ecc71; }
        input:checked + .slider:before { transform: translateX(23px); }
        .qr-preview-img { width: 120px; height: 120px; object-fit: contain; background: #fff; border-radius: 5px; display: none; margin: 10px auto; }

        .req-card { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }
        .req-header { display: flex; justify-content: space-between; border-bottom: 1px dashed #444; padding-bottom: 10px; margin-bottom: 10px; }
        .req-amt { font-size: 20px; font-weight: bold; color: #00ff88; }
        .req-type { font-size: 12px; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
        .type-w { background: rgba(220, 53, 69, 0.2); border: 1px solid #dc3545; color: #dc3545; }
        .req-details p { margin: 5px 0; font-size: 13px; color: #ccc; }
        .req-details span { color: gold; font-weight: bold; }
        .req-actions { display: flex; gap: 10px; margin-top: 15px; }
        .req-actions button { flex: 1; padding: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-approve { background: #28a745; color: white; }
        .btn-reject { background: #dc3545; color: white; }

        /* Player Table */
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #222; color: gold; padding: 10px; text-align: left; }
        td { padding: 12px 10px; border-bottom: 1px solid #222; }
        .view-btn { background: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 11px; }

        /* PLAYER DETAILS MODAL (POPUP) - HIGHEST Z-INDEX */
        .modal { display: none; position: fixed; z-index: 99999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .modal-content { background: #111; margin: 20% auto; padding: 20px; border: 2px solid gold; border-radius: 15px; width: 85%; max-width: 400px; position: relative; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        .close-btn { color: #fff; position: absolute; top: -10px; right: -10px; font-size: 20px; font-weight: bold; cursor: pointer; background: #dc3545; width: 35px; height: 35px; line-height: 35px; text-align: center; border-radius: 50%; box-shadow: 0 0 10px #000; }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .detail-row span:first-child { color: #aaa; }
        .detail-row span:last-child { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <div class="dot active" onclick="gotoPage(0, this)"></div>
        <div class="dot" onclick="gotoPage(1, this)"></div>
        <div class="dot" onclick="gotoPage(2, this)"></div>
        <div class="dot" onclick="gotoPage(3, this)"></div>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></span>
            <h3 style="color: gold; border-bottom: 1px dashed #444; padding-bottom: 10px; margin-top: 0;"><i class="fa-solid fa-user-circle"></i> PLAYER PROFILE</h3>
            <div id="modal-body" style="margin-top: 15px;">
                <p style="text-align:center; color:gold;">Loading Details...</p>
            </div>
        </div>
    </div>

    <div class="main-wrapper" id="master-wrapper">
        
        <div class="page">
            <div class="card">
                <h2>🐉 DRAGON TIGER & TIE</h2>
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
                    <button class="btn btn-win" onclick="setRes('dragon_tiger','Dragon')">Dragon</button>
                    <button class="btn btn-lose" onclick="setRes('dragon_tiger','Tiger')">Tiger</button>
                    <button class="btn" style="background:#9b59b6; color:#fff;" onclick="setRes('dragon_tiger','Tie')">Tie</button>
                </div>
            </div>

            <div class="card" style="border-left-color: gold;">
                <h2>💰 QUICK ADD/CUT MONEY</h2>
                <input type="number" id="quick-phone" placeholder="Player Phone Number">
                <input type="number" id="quick-amount" placeholder="Amount (₹)">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:5px;">
                    <button class="btn btn-win" onclick="quickWallet('add')">+ ADD MONEY</button>
                    <button class="btn btn-lose" onclick="quickWallet('cut')">- CUT MONEY</button>
                </div>
            </div>
        </div>

        <div class="page">
            <div class="card" style="border-left-color: #3498db;">
                <h2>⚙️ APP GLOBAL SETUP</h2>
                <div style="margin-bottom: 15px; overflow: hidden; padding-bottom: 10px; border-bottom: 1px solid #333;">
                    <span style="font-size: 13px; color: gold; font-weight: bold;">Show QR Code to Players?</span>
                    <label class="switch"><input type="checkbox" id="qrStatus"><span class="slider"></span></label>
                </div>
                <label>Admin UPI ID</label><input type="text" id="upiId" placeholder="example@ybl">
                <label>Direct QR Photo Upload</label><input type="file" id="qrFile" accept="image/*" style="padding: 10px; background: #333;" onchange="previewAndConvert(this)">
                <img id="qrPreview" class="qr-preview-img">
                <label>WhatsApp Link</label><input type="text" id="waNo" placeholder="https://wa.me/91...">
                <label>Telegram Link</label><input type="text" id="tgLink" placeholder="https://t.me/...">
                <label>Notice Board Message</label><input type="text" id="notif" placeholder="Enter scrolling notice here...">
                <button class="btn-save" onclick="saveAll()">Save All Settings</button>
            </div>
        </div>

        <div class="page">
            <div class="card" style="border-left-color: #e67e22;">
                <h2>📩 PENDING REQUESTS</h2>
                <div id="new-req-list"><p style="text-align: center; color: #888;">Loading requests...</p></div>
            </div>
        </div>

        <div class="page">
            <div class="card" style="border-left-color: #2ecc71;">
                <h2>👥 PLAYERS LIST <span id="p-count" style="float:right; color:gold; background:#333; padding:2px 8px; border-radius:10px;">0</span></h2>
                <div style="max-height: 70vh; overflow-y: auto;">
                    <table id="p-table">
                        <thead><tr><th>Mobile No.</th><th>Balance</th><th>Action</th></tr></thead>
                        <tbody id="p-list-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", 
        databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", 
        projectId: "kalyan-casino" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function gotoPage(i, dot) {
        document.getElementById('master-wrapper').style.transform = `translateX(-${i * 100}vw)`;
        document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
        dot.classList.add('active');
    }

    function setRes(g, r) { 
        const mode = (r === 'Auto') ? 'AUTO' : 'MANUAL';
        db.ref('game_controls/'+g).set({next_result: r, mode: mode}); 
        alert(g + " set to " + r); 
    }

    // --- QR CODE CONVERTOR ---
    let base64Image = "";
    function previewAndConvert(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                base64Image = e.target.result; 
                document.getElementById('qrPreview').src = base64Image; 
                document.getElementById('qrPreview').style.display = "block"; 
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // --- SAVE & LOAD SETTINGS ---
    function saveAll() {
        db.ref('admin_settings/payment').update({ upi_id: document.getElementById('upiId').value, qr_url: base64Image, show_qr: document.getElementById('qrStatus').checked });
        db.ref('admin_settings/support').update({ whatsapp: document.getElementById('waNo').value, telegram: document.getElementById('tgLink').value });
        db.ref('admin_settings/notification').set(document.getElementById('notif').value);
        alert("✅ All App Settings Updated Successfully!");
    }

    db.ref('admin_settings/payment').on('value', snap => {
        const d = snap.val(); if(!d) return;
        document.getElementById('upiId').value = d.upi_id || ""; document.getElementById('qrStatus').checked = d.show_qr || false;
        if(d.qr_url) { base64Image = d.qr_url; document.getElementById('qrPreview').src = d.qr_url; document.getElementById('qrPreview').style.display = "block"; }
    });
    db.ref('admin_settings/support').on('value', snap => {
        const d = snap.val(); if(!d) return;
        document.getElementById('waNo').value = d.whatsapp || ""; document.getElementById('tgLink').value = d.telegram || "";
    });
    db.ref('admin_settings/notification').on('value', snap => document.getElementById('notif').value = snap.val() || "");

    // --- WITHDRAWAL SYSTEM ---
    db.ref('withdraw_requests').orderByChild('status').equalTo('Pending').on('value', snap => {
        const reqList = document.getElementById('new-req-list');
        reqList.innerHTML = "";
        if(!snap.exists()) { reqList.innerHTML = "<p style='text-align:center; color:#555;'>No Pending Requests</p>"; return; }

        snap.forEach(child => {
            const d = child.val(); const reqKey = child.key;
            reqList.innerHTML += `
            <div class="req-card">
                <div class="req-header">
                    <div><div style="color:#aaa; font-size:11px;">Player No.</div><div style="font-weight:bold; font-size:16px;">${d.id}</div></div>
                    <div style="text-align:right;"><span class="req-type type-w">WITHDRAW</span><div class="req-amt">₹${d.amount}</div></div>
                </div>
                <div class="req-details">
                    <p>Account No: <span>${d.accNo || 'N/A'}</span></p>
                    <p>IFSC Code: <span style="text-transform:uppercase;">${d.ifsc || 'N/A'}</span></p>
                    <p>UPI ID: <span>${d.upi || 'N/A'}</span></p>
                </div>
                <div class="req-actions">
                    <button class="btn-approve" onclick="handleWithdraw('${reqKey}', '${d.id}', 'Approve')">APPROVE</button>
                    <button class="btn-reject" onclick="handleWithdraw('${reqKey}', '${d.id}', 'Reject', ${d.amount})">REJECT</button>
                </div>
            </div>`;
        });
    });

    window.handleWithdraw = function(reqKey, phone, action, amount = 0) {
        if(!confirm(`Are you sure you want to ${action} this request?`)) return;
        if(action === 'Approve') {
            db.ref(`withdraw_requests/${reqKey}/status`).set("Approved");
            db.ref(`user_history/${phone}/${reqKey}/status`).set("Success").then(() => alert("Approved!"));
        } else {
            db.ref(`withdraw_requests/${reqKey}/status`).set("Rejected");
            db.ref(`user_history/${phone}/${reqKey}/status`).set("Cancelled");
            db.ref(`users/${phone}/winning_balance`).once('value', snap => {
                db.ref(`users/${phone}/winning_balance`).set(parseFloat(snap.val() || 0) + amount).then(() => alert("Rejected & Refunded!"));
            });
        }
    };

    // --- QUICK WALLET LOGIC ---
    window.quickWallet = function(type) {
        const phone = document.getElementById('quick-phone').value;
        const amt = parseFloat(document.getElementById('quick-amount').value);
        if(!phone || !amt) { alert("Fill all details!"); return; }
        db.ref(`users/${phone}/balance`).once('value', snap => {
            let newBal = type === 'add' ? parseFloat(snap.val() || 0) + amt : parseFloat(snap.val() || 0) - amt;
            db.ref(`users/${phone}/balance`).set(newBal).then(() => alert(`Successfully Updated!`));
        });
    };

    // --- PLAYERS FULL DETAILS LOGIC (VIEW BUTTON) ---
    db.ref('users').on('value', snap => {
        const body = document.getElementById('p-list-body');
        document.getElementById('p-count').innerText = snap.numChildren();
        body.innerHTML = "";
        snap.forEach(p => {
            const bal = (parseFloat(p.val().balance||0) + parseFloat(p.val().winning_balance||0)).toFixed(2);
            body.innerHTML += `
            <tr class="player-row">
                <td style="color:gold; font-weight:bold;">${p.key}</td>
                <td style="color:#2ecc71; font-weight:bold;">₹${bal}</td>
                <td><button class="view-btn" onclick="openModal('${p.key}')">VIEW</button></td>
            </tr>`;
        });
    });

    // OPEN POPUP
    window.openModal = function(phone) {
        document.getElementById('playerModal').style.display = "block";
        db.ref('users/' + phone).once('value', snap => {
            if(snap.exists()) {
                let d = snap.val();
                let depBal = parseFloat(d.balance || 0).toFixed(2);
                let winBal = parseFloat(d.winning_balance || 0).toFixed(2);
                let tBal = (parseFloat(depBal) + parseFloat(winBal)).toFixed(2);
                let pay = d.payment_details || {};
                
                document.getElementById('modal-body').innerHTML = `
                    <div class="detail-row"><span>Mobile Number:</span><span style="color:gold;">${phone}</span></div>
                    <div class="detail-row"><span>Password:</span><span>${d.password || 'N/A'}</span></div>
                    
                    <h4 style="color:#3498db; margin: 15px 0 5px 0;">💰 Wallet Data</h4>
                    <div class="detail-row"><span>Total Balance:</span><span style="color:#2ecc71;">₹${tBal}</span></div>
                    <div class="detail-row"><span>Deposit Balance:</span><span>₹${depBal}</span></div>
                    <div class="detail-row"><span>Winning Balance:</span><span>₹${winBal}</span></div>

                    <h4 style="color:#e67e22; margin: 15px 0 5px 0;">🏦 Locked Bank Info</h4>
                    <div class="detail-row"><span>Account No:</span><span>${pay.accNo || 'Not Saved'}</span></div>
                    <div class="detail-row"><span>IFSC Code:</span><span style="text-transform:uppercase;">${pay.ifsc || 'Not Saved'}</span></div>
                    <div class="detail-row"><span>UPI ID:</span><span>${pay.upi || 'Not Saved'}</span></div>
                    
                    <button onclick="resetBank('${phone}')" style="width:100%; padding:12px; background:#dc3545; color:#fff; border:none; border-radius:8px; font-weight:bold; margin-top:15px; cursor:pointer;">
                        <i class="fa-solid fa-trash"></i> DELETE BANK DETAILS
                    </button>
                `;
            } else {
                document.getElementById('modal-body').innerHTML = "<p style='color:red;'>Error Loading Player Info!</p>";
            }
        });
    };

    // CLOSE POPUP
    window.closeModal = function() { 
        document.getElementById('playerModal').style.display = "none"; 
        document.getElementById('modal-body').innerHTML = "<p style='text-align:center; color:gold;'>Loading Details...</p>";
    };

    // UNLOCK BANK FEATURE
    window.resetBank = function(phone) {
        if(confirm("Are you sure? This will delete the player's saved bank details.")) {
            db.ref('users/' + phone + '/payment_details').remove().then(() => {
                alert("Bank Details Deleted Successfully!");
                closeModal();
            });
        }
    };
</script>
</body>
</html>
