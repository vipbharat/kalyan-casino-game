<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KALYAN PRO - SECURE ADMIN</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #0a0a0a; --card: #141414; --green: #00ff88; --red: #ff3333; }
        body { background: var(--bg); color: #fff; font-family: 'Arial', sans-serif; margin: 0; padding-bottom: 70px; overflow-x: hidden; }
        
        .top-header { background: #000; padding: 15px; text-align: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .top-header h1 { margin: 0; font-size: 18px; color: var(--gold); letter-spacing: 2px; font-weight: 900; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; border-top: 2px solid var(--gold); display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
        .nav-item { text-align: center; color: #666; font-size: 11px; font-weight: bold; cursor: pointer; flex: 1; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--gold); }

        .page { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .card-title { color: var(--gold); font-size: 14px; text-transform: uppercase; margin: 0 0 15px 0; border-bottom: 1px dashed #444; padding-bottom: 8px; font-weight: 900; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #1a1a1a; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        .stat-box h3 { margin: 0; font-size: 24px; color: var(--green); }
        .stat-box p { margin: 5px 0 0 0; font-size: 11px; color: #aaa; text-transform: uppercase; }

        label { font-size: 11px; color: #aaa; display: block; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; background: #000; border: 1px solid #444; border-radius: 8px; color: #fff; box-sizing: border-box; font-size: 14px; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 13px; text-transform: uppercase; color: #fff; }
        .btn-add { background: #00b09b; }
        .btn-cut { background: #ff416c; }
        .btn-save { background: #f5af19; width: 100%; margin-top: 10px; color: #000; }

        .req-card { background: #000; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid var(--gold); }
        .req-amt { font-size: 22px; font-weight: 900; color: var(--gold); }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #222; color: var(--gold); padding: 10px; text-align: left; }
        td { padding: 12px 10px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <div id="main-content">
        <div class="top-header">
            <h1><i class="fa-solid fa-crown"></i> VIP DASHBOARD</h1>
        </div>

        <div id="page-home" class="page active">
            <div class="stats-grid">
                <div class="stat-box"><h3 id="stat-users">0</h3><p>Players</p></div>
                <div class="stat-box"><h3 id="stat-withdraws" style="color:var(--gold)">0</h3><p>Payouts</p></div>
            </div>
            <div class="card">
                <h2 class="card-title"><i class="fa-solid fa-wallet"></i> WALLET CONTROL</h2>
                <input type="number" id="quick-phone" placeholder="Mobile Number">
                <input type="number" id="quick-amount" placeholder="Amount (₹)">
                <div class="btn-grid">
                    <button class="btn btn-add" onclick="quickWallet('add')">ADD FUNDS</button>
                    <button class="btn btn-cut" onclick="quickWallet('cut')">CUT FUNDS</button>
                </div>
            </div>
        </div>

        <div id="page-payout" class="page">
            <div class="card">
                <h2 class="card-title"><i class="fa-solid fa-money-bill-transfer"></i> PENDING PAYOUTS</h2>
                <div id="new-req-list"></div>
            </div>
        </div>

        <div id="page-users" class="page">
            <div class="card">
                <h2 class="card-title"><i class="fa-solid fa-users"></i> PLAYER LIST</h2>
                <table id="p-table">
                    <thead><tr><th>Mobile</th><th>Balance</th><th>Action</th></tr></thead>
                    <tbody id="p-list-body"></tbody>
                </table>
            </div>
        </div>

        <div id="page-setup" class="page">
            <div class="card">
                <h2 class="card-title"><i class="fa-solid fa-gears"></i> APP SETTINGS</h2>
                <label>UPI ID</label><input type="text" id="upiId">
                <label>WhatsApp Link</label><input type="text" id="waNo">
                <label>Telegram Link</label><input type="text" id="tgLink">
                <label>Notice Message</label><input type="text" id="notif">
                <button class="btn btn-save" onclick="saveAll()">SAVE ALL</button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('page-home', this)"><i class="fa-solid fa-house"></i>Home</div>
            <div class="nav-item" onclick="switchTab('page-payout', this)"><i class="fa-solid fa-hand-holding-dollar"></i>Payout</div>
            <div class="nav-item" onclick="switchTab('page-users', this)"><i class="fa-solid fa-users"></i>Users</div>
            <div class="nav-item" onclick="switchTab('page-setup', this)"><i class="fa-solid fa-gear"></i>Setup</div>
        </div>
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", 
        databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", 
        projectId: "kalyan-casino" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Directly load data without waiting for login
    loadAdminData();

    function switchTab(pageId, element) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        element.classList.add('active');
    }

    function loadAdminData() {
        // Stats & Users
        db.ref('users').on('value', snap => {
            document.getElementById('stat-users').innerText = snap.numChildren();
            const body = document.getElementById('p-list-body');
            body.innerHTML = "";
            snap.forEach(p => {
                let d = p.val();
                body.innerHTML += `<tr><td>${p.key}</td><td style="color:var(--green); font-weight:bold;">₹${(d.balance||0)}</td><td><button style="background:#3498db; color:#fff; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;" onclick="alert('Phone: ${p.key}')">View</button></td></tr>`;
            });
        });

        // Payouts
        db.ref('withdraw_requests').orderByChild('status').equalTo('Pending').on('value', snap => {
            document.getElementById('stat-withdraws').innerText = snap.numChildren();
            const list = document.getElementById('new-req-list');
            list.innerHTML = "";
            snap.forEach(child => {
                let d = child.val();
                list.innerHTML += `<div class="req-card">
                    <div class="req-amt">₹${d.amount}</div>
                    <p style="color:#aaa; font-size:12px; margin:5px 0;">Phone: <span style="color:#fff; font-weight:bold;">${d.id}</span> | UPI: <span style="color:#fff; font-weight:bold;">${d.upi || 'Bank'}</span></p>
                    <div style="margin-top:10px;">
                        <button class="btn btn-add" style="padding:8px 12px;" onclick="handlePayout('${child.key}', 'Success')">Approve</button>
                        <button class="btn btn-cut" style="padding:8px 12px; margin-left:5px;" onclick="handlePayout('${child.key}', 'Rejected')">Reject</button>
                    </div>
                </div>`;
            });
        });

        // Load Settings
        db.ref('admin_settings').on('value', snap => {
            let d = snap.val(); if(!d) return;
            document.getElementById('upiId').value = d.upi_id || "";
            document.getElementById('waNo').value = d.whatsapp || "";
            document.getElementById('tgLink').value = d.telegram || "";
            document.getElementById('notif').value = d.notice || "";
        });
    }

    function quickWallet(type) {
        const phone = document.getElementById('quick-phone').value;
        const amt = parseFloat(document.getElementById('quick-amount').value);
        if(!phone || !amt) return alert("Fill all details!");

        db.ref(`users/${phone}`).once('value', snap => {
            if(!snap.exists()) return alert("User not found!");
            let newBal = type === 'add' ? (snap.val().balance || 0) + amt : (snap.val().balance || 0) - amt;
            db.ref(`users/${phone}/balance`).set(newBal).then(() => {
                alert("Done!");
                // Auto Approve Deposits if any
                if(type === 'add') {
                    db.ref(`user_history/${phone}`).limitToLast(5).once('value', hSnap => {
                        hSnap.forEach(h => {
                            if(h.val().status === "Pending" && h.val().type === "Deposit") {
                                db.ref(`user_history/${phone}/${h.key}/status`).set("Success");
                            }
                        });
                    });
                }
            });
        });
    }

    function handlePayout(key, status) {
        db.ref(`withdraw_requests/${key}/status`).set(status).then(() => alert("Payout Updated!"));
    }

    function saveAll() {
        const d = {
            upi_id: document.getElementById('upiId').value,
            whatsapp: document.getElementById('waNo').value,
            telegram: document.getElementById('tgLink').value,
            notice: document.getElementById('notif').value
        };
        db.ref('admin_settings').update(d).then(() => alert("Settings Saved!"));
    }
</script>
</body>
</html>
