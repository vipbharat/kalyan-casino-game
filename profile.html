<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Profile - Kalyan Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        
        /* 🔥 HEADER DESIGN 🔥 */
        .profile-header { 
            background: linear-gradient(180deg, #1a1a24, #000); 
            padding: 40px 20px 50px; text-align: center; border-bottom: 2px solid #ffd700; 
            position: relative; box-shadow: 0 5px 20px rgba(255,215,0,0.2);
        }
        
        .back-btn { position: absolute; left: 20px; top: 20px; color: #ffd700; font-size: 20px; text-decoration: none; }
        
        /* 📸 AVATAR & CAMERA UPLOAD */
        .avatar-wrapper { position: relative; width: 90px; height: 90px; margin: 0 auto 15px; }
        .avatar-wrapper img { 
            width: 100%; height: 100%; border-radius: 50%; border: 3px solid #ffd700; 
            object-fit: cover; box-shadow: 0 0 20px rgba(255,215,0,0.4); background: #222;
        }
        .camera-icon { 
            position: absolute; bottom: 0; right: -5px; background: #ffd700; color: #000; 
            width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-size: 15px; cursor: pointer; border: 2.5px solid #1a1a24; 
        }

        /* 📝 NAME EDITING */
        .name-input { 
            background: transparent; border: none; border-bottom: 1px dashed #ffd700; 
            color: #fff; font-size: 22px; font-weight: 900; text-align: center; width: 80%; 
            outline: none; margin-bottom: 5px; padding-bottom: 5px; text-transform: uppercase;
        }
        .name-input::placeholder { color: #666; font-size: 16px; }
        .user-id { font-size: 14px; font-weight: bold; color: #aaa; margin-bottom: 15px; }
        
        /* 💾 SAVE BUTTON (Hidden by default) */
        #save-btn { 
            display: none; background: linear-gradient(90deg, #ffd700, #ffae00); color: #000; 
            padding: 8px 25px; border-radius: 20px; font-weight: 900; border: none; 
            cursor: pointer; margin: 0 auto; box-shadow: 0 0 10px #ffd700; transition: 0.3s;
        }

        /* 📊 STATS BOX */
        .stats-container { 
            display: flex; justify-content: space-around; background: #111; padding: 15px; 
            margin: -30px 20px 20px; border-radius: 15px; border: 1px solid #333; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.8); position: relative; z-index: 10;
        }
        .stat-box { text-align: center; flex: 1; }
        .stat-box span { display: block; font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .stat-box b { font-size: 16px; color: #fff; }

        /* 📋 MENU LIST */
        .menu-section { padding: 10px 20px; }
        .menu-item { 
            background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 12px; 
            display: flex; align-items: center; text-decoration: none; color: #fff; border: 1px solid #222; 
        }
        .menu-item i { 
            width: 35px; height: 35px; background: #222; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; color: #ffd700; margin-right: 15px; 
        }
        .menu-text { flex: 1; font-size: 14px; font-weight: 600; }
        .arrow { color: #555; font-size: 12px; }

        .logout-btn { 
            margin: 20px; background: rgba(255, 0, 0, 0.1); border: 1px solid #ff4d4d; 
            color: #ff4d4d; padding: 15px; text-align: center; border-radius: 12px; 
            font-weight: 900; cursor: pointer; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="profile-header">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        
        <div class="avatar-wrapper">
            <img id="profile-img" src="https://via.placeholder.com/90?text=VIP" alt="Avatar">
            <label for="imageUpload" class="camera-icon"><i class="fa-solid fa-camera"></i></label>
            <input type='file' id="imageUpload" style="display:none;" accept=".png, .jpg, .jpeg" />
        </div>

        <input type="text" id="player-name" class="name-input" placeholder="APNA NAAM LIKHEIN" oninput="showSaveButton()">
        <div class="user-id" id="u-phone">Loading...</div>
        
        <button id="save-btn" onclick="saveProfile()">UPDATE PROFILE <i class="fa-solid fa-check"></i></button>

        <div style="font-size: 12px; color: #aaa; margin-top: 10px; font-weight: bold;">
            VIP Level: <span style="color: #ffd700; text-shadow: 0 0 5px #ffd700;">GOLD MEMBER</span>
        </div>
    </div>

    <div class="stats-container">
        <div class="stat-box">
            <span>Referrals</span>
            <b id="u-ref-count" style="color: #00d2d3;">0</b>
        </div>
        <div class="stat-box" style="border-left: 1px solid #333; border-right: 1px solid #333;">
            <span>Wallet</span>
            <b id="u-balance" style="color: #ffd700;">₹0.00</b>
        </div>
        <div class="stat-box">
            <span>Earnings</span>
            <b id="u-earn" style="color: #00ff88;">₹0.00</b>
        </div>
    </div>

    <div class="menu-section">
        <a href="history.html" class="menu-item">
            <i class="fa-solid fa-receipt"></i>
            <span class="menu-text">Transaction History</span>
            <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
        </a>
        <a href="refer.html" class="menu-item">
            <i class="fa-solid fa-gift" style="color: #ff9ff3;"></i>
            <span class="menu-text">Refer & Earn Program</span>
            <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
        </a>
        <a href="support.html" class="menu-item">
            <i class="fa-solid fa-headset" style="color: #feca57;"></i>
            <span class="menu-text">Customer Support</span>
            <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
        </a>
        <div class="menu-item" onclick="alert('App Version: 2.0.1 - Kalyan Pro VIP')">
            <i class="fa-solid fa-shield-halved" style="color: #48dbfb;"></i>
            <span class="menu-text">App Version</span>
            <span style="font-size: 11px; color: #777; font-weight: bold;">v2.0.1</span>
        </div>
    </div>

    <div class="logout-btn" onclick="logoutUser()"><i class="fa-solid fa-power-off"></i> LOGOUT ACCOUNT</div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo",
            databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com",
            projectId: "kalyan-casino"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const phone = localStorage.getItem('userPhone');

        if(!phone || phone === "Guest") {
            window.location.href = "index.html"; // Agar login nahi hai toh wapas bhej do
        } else {
            document.getElementById('u-phone').innerText = "+91 " + phone;
            
            // 🔥 REAL-TIME DATA LOAD
            db.ref('users/' + phone).on('value', (snap) => {
                const data = snap.val();
                if(data) {
                    // Balance set karna
                    const total = (parseFloat(data.balance||0) + parseFloat(data.winning_balance||0) + parseFloat(data.bonus_balance||0));
                    document.getElementById('u-balance').innerText = "₹" + total.toFixed(2);
                    
                    document.getElementById('u-ref-count').innerText = data.referral_count || 0;
                    document.getElementById('u-earn').innerText = "₹" + (parseFloat(data.referral_earnings || 0)).toFixed(2);

                    // Name aur DP set karna (Agar input mein type nahi kar raha tabhi update karo)
                    if(document.activeElement !== document.getElementById('player-name')) {
                        if(data.name) document.getElementById('player-name').value = data.name;
                    }
                    if(data.profilePic && !document.getElementById('save-btn').style.display) {
                        document.getElementById('profile-img').src = data.profilePic;
                    }
                }
            });
        }

        // 📸 PHOTO PREVIEW LOGIC
        document.getElementById('imageUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                document.getElementById('profile-img').src = reader.result;
                showSaveButton(); // Photo change hote hi save button dikhao
            }
            if (file) { reader.readAsDataURL(file); }
        });

        // 📝 SAVE BUTTON SHOW KARNE KA LOGIC
        function showSaveButton() {
            document.getElementById('save-btn').style.display = "block";
        }

        // 💾 DATA FIREBASE MEIN SAVE KAREIN
        function saveProfile() {
            const newName = document.getElementById('player-name').value.trim();
            const newPic = document.getElementById('profile-img').src;

            if(newName === "") { alert("Bhai, kam se kam naam toh likho!"); return; }

            document.getElementById('save-btn').innerText = "SAVING...";

            db.ref('users/' + phone).update({
                name: newName,
                profilePic: newPic
            }).then(() => {
                document.getElementById('save-btn').style.display = "none";
                document.getElementById('save-btn').innerHTML = 'UPDATE PROFILE <i class="fa-solid fa-check"></i>';
                alert("Profile Update Ho Gayi! 🔥");
            }).catch((err) => {
                alert("Error: " + err.message);
            });
        }

        // 🚪 LOGOUT LOGIC
        function logoutUser() {
            if(confirm("Bhai, kya aap waqai Logout karna chahte hain?")) {
                localStorage.removeItem('userPhone');
                window.location.href = "login.html"; // Login page par bhej dein
            }
        }
    </script>
</body>
</html>
