<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Active Matches - K-VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; padding-bottom: 80px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #1e1e1e; padding: 15px; border-radius: 10px; border-bottom: 2px solid #FFD700; margin-bottom: 20px; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; text-align: center; background: #333; border-radius: 8px; font-weight: bold; cursor: pointer; color: #888; text-decoration: none; font-size: 14px; }
        .tab.active { background: linear-gradient(90deg, #FFD700, #ffae00); color: #000; }
        
        .section-title { color: #FFD700; font-weight: 900; margin: 25px 0 10px; text-transform: uppercase; font-size: 14px; border-left: 3px solid #FFD700; padding-left: 10px; }
        
        .card { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 12px; border: 1px solid #333; position: relative; }
        .card.pending { border-left: 5px solid #ffae00; background: rgba(255, 174, 0, 0.05); }
        .card.active { border-left: 5px solid #00FF00; background: rgba(0, 255, 0, 0.05); }
        
        .flex-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .match-id { font-size: 11px; color: #888; font-family: monospace; }
        .amt { color: #FFD700; font-size: 16px; font-weight: bold; }
        
        .btn { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 13px; width: 100%; margin-top: 10px; }
        .btn-room { background: #00FF00; color: #000; box-shadow: 0 4px 10px rgba(0,255,0,0.3); font-weight: 900; }
        .btn-cancel { background: transparent; color: #ff3333; border: 1px solid #ff3333; }
        
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .badge-waiting { background: #ffae00; color: #000; }
        .badge-live { background: #00FF00; color: #000; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <div style="font-size: 18px; font-weight: 900; color: #FFD700;">MY ACTIVE BATTLES</div>
            <div id="player-id" style="font-size: 11px; color: #aaa;">ID: Loading...</div>
        </div>
        <i class="fas fa-gamepad" style="color:#FFD700; font-size: 20px;"></i>
    </div>

    <div class="tabs">
        <a href="Tournament.html" class="tab">Free Fire</a>
        <a href="Bgmip.html" class="tab">BGMI</a>
        <a href="ActiveMatches.html" class="tab active">My Matches</a>
    </div>

    <div class="section-title">🔴 Live Challenges</div>
    <div id="live-board">
        <div style="text-align:center; padding:30px; color:#555;">Checking Database...</div>
    </div>

    <div class="section-title">📜 Match History</div>
    <div id="history-board">
        <div style="text-align:center; padding:20px; color:#444;">No recent history found.</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // Trim aur String conversion taaki 100% match ho
        const phone = String(localStorage.getItem('userPhone') || "").trim();

        if(!phone || phone === "") {
            alert("Pehle login karein!");
            window.location.href="index.html";
        }

        // Player ID display
        db.ref('users/' + phone).on('value', snap => {
            const d = snap.val() || {};
            document.getElementById('player-id').innerText = "ID: " + (d.playerId || "KP" + phone.slice(-4));
        });

        // 🔥 MAIN ENGINE: HAR EK MATCH KO SCAN KARO 🔥
        db.ref('live_challenges').on('value', snap => {
            let html = "";
            let found = false;
            
            snap.forEach(child => {
                const val = child.val();
                const mId = child.key;
                
                // Compare Creator & Acceptor Phones (String Safe)
                const cPhone = String(val.creatorPhone || "").trim();
                const aPhone = String(val.acceptedByPhone || "").trim();
                
                if(cPhone === phone || aPhone === phone) {
                    found = true;
                    
                    if(val.status === "waiting") {
                        // Card for Pending Match
                        html += `
                        <div class="card pending">
                            <div class="flex-row">
                                <span class="match-id">#${mId.slice(-6).toUpperCase()}</span>
                                <span class="badge badge-waiting">WAITING FOR OPPONENT</span>
                            </div>
                            <div class="flex-row">
                                <b>${val.game} Match</b>
                                <span class="amt">₹${val.amount}</span>
                            </div>
                            <button class="btn btn-cancel" onclick="cancelMatch('${mId}', ${val.amount})">CANCEL & REFUND</button>
                        </div>`;
                    } 
                    else if(val.status === "accepted") {
                        // Card for Live Match
                        let opponent = (cPhone === phone) ? val.acceptedBy : val.creatorName;
                        html += `
                        <div class="card active">
                            <div class="flex-row">
                                <span class="match-id">#${mId.slice(-6).toUpperCase()}</span>
                                <span class="badge badge-live">MATCH IS LIVE!</span>
                            </div>
                            <div class="flex-row">
                                <b>VS ${opponent}</b>
                                <span class="amt">₹${val.amount}</span>
                            </div>
                            <button class="btn btn-room" onclick="window.location.href='MatchRoom.html#${mId}'">ENTER MATCH ROOM</button>
                        </div>`;
                    }
                }
            });
            
            document.getElementById('live-board').innerHTML = found ? html : "<div style='color:#777; text-align:center; padding:30px; border:1px dashed #333; border-radius:10px;'>Aapka koi active match nahi hai. Lobby se match banayein!</div>";
        });

        function cancelMatch(id, amt) {
            if(confirm("Challenge cancel karke ₹" + amt + " wapas lein?")) {
                db.ref('live_challenges/' + id).remove().then(() => {
                    db.ref('users/' + phone).update({ balance: firebase.database.ServerValue.increment(amt) });
                    alert("Cancelled! Refund added to wallet.");
                });
            }
        }

        // History Loader
        db.ref('match_history').orderByChild('playerPhone').equalTo(phone).limitToLast(5).on('value', snap => {
            let h = "";
            snap.forEach(c => {
                let v = c.val();
                let col = v.result === "WIN" ? "#00FF00" : "#ff3333";
                h += `<div class="card" style="opacity:0.7; padding:10px;">
                    <div class="flex-row"><small>${new Date(v.timestamp).toLocaleDateString()}</small> <b style="color:${col}">${v.result}</b></div>
                    <div class="flex-row"><span style="font-size:12px;">vs ${v.opponentName}</span> <span>₹${v.amount}</span></div>
                </div>`;
            });
            if(h !== "") document.getElementById('history-board').innerHTML = h;
        });
    </script>
</body>
</html>
