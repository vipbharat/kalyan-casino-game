<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGMI Pro Esports Tournament</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; padding-bottom: 80px; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; background: #1e1e1e; padding: 15px; border-radius: 10px; border-bottom: 2px solid #f39c12; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .wallet { color: #00FF00; font-weight: bold; font-size: 18px; }
        
        /* Game Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; text-align: center; background: #333; border-radius: 8px; font-weight: bold; cursor: pointer; color: #888; text-decoration: none; display: block; }
        .tab.active { background: linear-gradient(90deg, #f39c12, #d35400); color: #fff; box-shadow: 0 4px 10px rgba(243, 156, 18, 0.4); }

        /* Create Challenge Section */
        .create-box { background: linear-gradient(135deg, #1e1e1e, #2a2a2a); padding: 15px; border-radius: 10px; border: 1px solid #f39c12; margin-bottom: 20px; box-shadow: 0 0 15px rgba(243, 156, 18, 0.1); }
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .create-input { padding: 12px; border-radius: 5px; border: 1px solid #444; background: #111; color: white; font-size: 14px; flex: 1; }
        .btn-create { background: linear-gradient(90deg, #f39c12, #e67e22); color: #fff; padding: 12px; border: none; border-radius: 5px; font-weight: 900; cursor: pointer; width: 100%; font-size: 16px; text-transform: uppercase; box-shadow: 0 4px 10px rgba(243, 156, 18, 0.3); }
        .btn-create:active { transform: scale(0.98); }

        /* Leaderboard Cards */
        .section-title { font-size: 14px; color: #f39c12; margin-bottom: 10px; text-transform: uppercase; font-weight: bold; display: flex; justify-content: space-between; }
        .live-count { color: #00FF00; font-size: 12px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        .card { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 12px 15px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #333; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .card.real-player { border-left-color: #00FF00; background: #223322; }
        .card.my-challenge { border-left-color: #f39c12; background: #332200; }
        
        .name-row { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: bold; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: #00FF00; box-shadow: 0 0 5px #00FF00; }
        .stats { color: #888; font-size: 11px; margin-top: 3px; }
        .amount { color: #f39c12; font-size: 16px; font-weight: 900; display: block; margin-bottom: 5px; text-align: right; }
        
        .btn-action { padding: 6px 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .btn-accept { background: #00FF00; color: #000; }
        .btn-cancel { background: #ff3333; color: #fff; }
        .btn-bot { background: #444; color: #888; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <div style="font-size: 20px; font-weight: 900; color: #f39c12; text-shadow: 0 2px 5px #000;">BGMI BATTLE</div>
            <div id="player-id" style="font-size: 12px; color: #ccc; font-weight: bold;">ID: Loading...</div>
        </div>
        <div class="wallet">💰 ₹<span id="balance">0.00</span></div>
    </div>

    <div class="tabs">
        <a href="Tournament.html" class="tab">Free Fire</a>
        <a href="Bgmip.html" class="tab active">BGMI (PUBG)</a>
    </div>

    <div class="create-box">
        <h3 style="margin-top: 0; font-size: 15px; color: #fff;">Make a BGMI Challenge</h3>
        <div class="input-group">
            <input type="number" class="create-input" placeholder="Amount (₹)" id="amt" style="flex: 0.4;">
            <input type="text" class="create-input" placeholder="Opponent ID (Optional)" id="oppId" style="flex: 0.6;">
        </div>
        <button class="btn-create" onclick="createChallenge()">SEND CHALLENGE</button>
    </div>

    <div class="section-title">
        <span>🔴 BGMI Public Lobby</span>
        <span class="live-count" id="online-count">190 Players Online</span>
    </div>

    <div id="board">
        <div style="text-align:center; padding: 20px; color: #aaa;">Loading BGMI Matches...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo",
            databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com",
            projectId: "kalyan-casino"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const phone = localStorage.getItem('userPhone') || "Guest";
        let currentBalance = 0;
        let playerName = "Guest";

        if(phone === "Guest") {
            alert("Bhai, pehle login kijiye!");
            window.location.href = "index.html";
        }

        db.ref('users/' + phone).on('value', (snapshot) => {
            const data = snapshot.val() || {};
            playerName = data.playerId || "KP" + phone.slice(-4);
            document.getElementById('player-id').innerText = "ID: " + playerName;
            currentBalance = (parseFloat(data.balance||0) + parseFloat(data.winning_balance||0) + parseFloat(data.bonus_balance||0));
            document.getElementById('balance').innerText = currentBalance.toFixed(2);
        });

        // 1. CREATE BGMI CHALLENGE
        function createChallenge() {
            let amt = parseFloat(document.getElementById('amt').value);
            let oppId = document.getElementById('oppId').value.trim();
            
            if(isNaN(amt) || amt < 10) return alert("Minimum challenge amount is ₹10");
            if(currentBalance < amt) return alert("Wallet mein paise kam hain. ₹" + currentBalance + " available.");

            db.ref('users/' + phone).update({ balance: firebase.database.ServerValue.increment(-amt) });

            if(oppId === "") {
                db.ref('live_challenges').push({
                    creatorPhone: phone, creatorName: playerName, amount: amt, status: "waiting", type: "public", game: "BGMI", timestamp: Date.now()
                });
                alert("BGMI Public Challenge Created!");
            } else {
                let newCh = db.ref('live_challenges').push();
                newCh.set({ creatorPhone: phone, creatorName: playerName, targetId: oppId, amount: amt, status: "pending", type: "private", game: "BGMI", timestamp: Date.now() });
                alert(`Challenge sent to ${oppId}!`);
            }
            document.getElementById('amt').value = ""; document.getElementById('oppId').value = "";
        }

        // 2. CANCEL CHALLENGE
        function cancelChallenge(id, amount) {
            db.ref('live_challenges/' + id).remove();
            db.ref('users/' + phone).update({ balance: firebase.database.ServerValue.increment(amount) });
            alert("Challenge Cancelled! Paise wapas aa gaye.");
        }

        // 3. RENDER BGMI LOBBY
        let realChallenges = [];
        db.ref('live_challenges').orderByChild('type').equalTo('public').on('value', (snapshot) => {
            realChallenges = [];
            snapshot.forEach((child) => {
                let val = child.val();
                // Yahan Jaadu Hai: Sirf wahi match uthao jo waiting ho AUR jiska game BGMI ho
                if(val.status === "waiting" && val.game === "BGMI") { 
                    realChallenges.push({ id: child.key, ...val }); 
                }
            });
            renderBoard();
        });

        // BGMI wale bots ka nam thoda alag
        const bgmiBots = ["Mortal_Fan", "Scout_Op", "Dynamo_X", "Jonny_Gaming", "Noob_Killer", "BGMI_King"];
        let bots = [];
        for(let i=0; i<5; i++) { bots.push(generateBot()); }

        function generateBot() {
            return {
                name: bgmiBots[Math.floor(Math.random()*bgmiBots.length)] + Math.floor(Math.random()*99),
                amt: [50, 100, 200, 500][Math.floor(Math.random()*4)],
                matches: Math.floor(Math.random() * 300) + 50
            };
        }

        setInterval(() => {
            bots.shift(); bots.push(generateBot());
            document.getElementById('online-count').innerText = (Math.floor(Math.random() * 80) + 180) + " Players Online";
            renderBoard();
        }, 4000);

        function renderBoard() {
            let boardHTML = "";
            realChallenges.forEach(ch => {
                let isMine = (ch.creatorPhone === phone);
                let cssClass = isMine ? "my-challenge" : "real-player";
                let actionBtn = isMine 
                    ? `<button class="btn-action btn-cancel" onclick="cancelChallenge('${ch.id}', ${ch.amount})">CANCEL</button>`
                    : `<button class="btn-action btn-accept" onclick="acceptPublic('${ch.id}', ${ch.amount})">PLAY</button>`;

                boardHTML += `
                <div class="card ${cssClass}">
                    <div class="player-info">
                        <div class="name-row"><span class="status-dot"></span><span>${ch.creatorName}</span></div>
                        <div class="stats">${isMine ? 'Your Challenge' : 'Live Real Player'}</div>
                    </div>
                    <div class="action-area"><span class="amount">₹${ch.amount}</span>${actionBtn}</div>
                </div>`;
            });

            bots.forEach(bot => {
                boardHTML += `
                <div class="card">
                    <div class="player-info">
                        <div class="name-row"><span class="status-dot"></span><span>${bot.name}</span></div>
                        <div class="stats">Matches: ${bot.matches}</div>
                    </div>
                    <div class="action-area"><span class="amount">₹${bot.amt}</span><button class="btn-action btn-bot">MATCHING...</button></div>
                </div>`;
            });
            document.getElementById('board').innerHTML = boardHTML;
        }

        // Accept BGMI Match
        function acceptPublic(id, amount) {
            if(currentBalance < amount) return alert("Insufficient Balance!");
            if(confirm(`Play for ₹${amount}? Paise wallet se cut jayenge.`)) {
                db.ref('users/' + phone).update({ balance: firebase.database.ServerValue.increment(-amount) });
                db.ref('live_challenges/' + id).update({ status: "accepted", acceptedBy: playerName });
                alert("Match Fixed! Redirecting to Room...");
                window.location.href = "MatchRoom.html";
            }
        }
    </script>
</body>
</html>
