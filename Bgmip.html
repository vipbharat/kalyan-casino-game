<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGMI Pro Esports Tournament</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; padding-bottom: 80px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #1e1e1e; padding: 15px; border-radius: 10px; border-bottom: 2px solid #f39c12; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .wallet { color: #00FF00; font-weight: bold; font-size: 18px; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; text-align: center; background: #333; border-radius: 8px; font-weight: bold; cursor: pointer; color: #888; text-decoration: none; display: block; font-size: 14px;}
        .tab.active { background: linear-gradient(90deg, #f39c12, #d35400); color: #fff; box-shadow: 0 4px 10px rgba(243, 156, 18, 0.4); }

        .create-box { background: linear-gradient(135deg, #1e1e1e, #2a2a2a); padding: 15px; border-radius: 10px; border: 1px solid #f39c12; margin-bottom: 20px; box-shadow: 0 0 15px rgba(243, 156, 18, 0.1); }
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .create-input { padding: 12px; border-radius: 5px; border: 1px solid #444; background: #111; color: white; font-size: 14px; flex: 1; box-sizing: border-box; }
        .btn-create { background: linear-gradient(90deg, #f39c12, #e67e22); color: #fff; padding: 12px; border: none; border-radius: 5px; font-weight: 900; cursor: pointer; width: 100%; font-size: 16px; text-transform: uppercase; box-shadow: 0 4px 10px rgba(243, 156, 18, 0.3); }

        .section-title { font-size: 14px; color: #f39c12; margin-bottom: 10px; text-transform: uppercase; font-weight: bold; display: flex; justify-content: space-between; }
        .live-count { color: #00FF00; font-size: 12px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        .card { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 12px 15px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #333; }
        .card.real { border-left-color: #00FF00; background: #223322; }
        .amount { color: #f39c12; font-size: 16px; font-weight: 900; display: block; margin-bottom: 5px; text-align: right; }
        .btn-action { padding: 6px 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <div style="font-size: 20px; font-weight: 900; color: #f39c12; text-shadow: 0 2px 5px #000;">BGMI BATTLE</div>
            <div id="player-id" style="font-size: 12px; color: #ccc; font-weight: bold;">ID: Loading...</div>
        </div>
        <div class="wallet">💰 ₹<span id="balance">0.00</span></div>
    </div>

    <div class="tabs">
        <a href="Tournament.html" class="tab">Free Fire</a>
        <a href="Bgmip.html" class="tab active">BGMI</a>
        <a href="ActiveMatches.html" class="tab">My Matches</a>
    </div>

    <div class="create-box">
        <div class="input-group">
            <input type="number" class="create-input" placeholder="Amount (₹)" id="amt">
            <input type="text" class="create-input" placeholder="Opponent ID (Optional)" id="oppId">
        </div>
        <button class="btn-create" onclick="createCh()">SEND CHALLENGE</button>
    </div>

    <div class="section-title">
        <span>🔴 BGMI Public Lobby</span>
        <span class="live-count" id="online-count">190 Players Online</span>
    </div>

    <div id="board">
        <div style="text-align:center; padding: 20px; color: #aaa;">Loading BGMI Matches...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const phone = localStorage.getItem('userPhone') || "Guest";
        let currentBalance = 0;
        let playerName = "Guest";

        if(phone === "Guest") { alert("Login First!"); window.location.href = "index.html"; }

        db.ref('users/' + phone).on('value', (snap) => {
            const data = snap.val() || {};
            playerName = data.playerId || "KP" + phone.slice(-4);
            document.getElementById('player-id').innerText = "ID: " + playerName;
            currentBalance = (parseFloat(data.balance||0) + parseFloat(data.winning_balance||0) + parseFloat(data.bonus_balance||0));
            document.getElementById('balance').innerText = currentBalance.toFixed(2);
        });

        function createCh() {
            let amt = parseFloat(document.getElementById('amt').value);
            let oppId = document.getElementById('oppId').value.trim();
            
            if(isNaN(amt) || amt < 10) return alert("Minimum challenge amount is ₹10");
            if(currentBalance < amt) return alert("Wallet mein paise kam hain!");

            db.ref('users/' + phone).update({ balance: firebase.database.ServerValue.increment(-amt) }).then(() => {
                db.ref('live_challenges').push({
                    creatorPhone: phone, creatorName: playerName, amount: amt, status: "waiting", 
                    type: oppId === "" ? "public" : "private", targetId: oppId, game: "BGMI", timestamp: Date.now()
                }).then(() => {
                    alert("BGMI Match Created! Redirecting...");
                    // 🔥 REDIRECT UPDATE: ActiveMatches.html 🔥
                    window.location.href = "ActiveMatches.html"; 
                });
            });
        }

        function cancelCh(id, amount) {
            db.ref('live_challenges/' + id).remove();
            db.ref('users/' + phone).update({ balance: firebase.database.ServerValue.increment(amount) });
            alert("Challenge Cancelled! Paise wapas aa gaye.");
        }

        function acceptCh(id, amount) {
            if(currentBalance < amount) return alert("Insufficient Balance!");
            if(confirm(`Play for ₹${amount}? Paise wallet se cut jayenge.`)) {
                db.ref('users/' + phone).update({ balance: firebase.database.ServerValue.increment(-amount) });
                db.ref('live_challenges/' + id).update({ status: "accepted", acceptedBy: playerName, acceptedByPhone: phone }).then(() => {
                    alert("Match Fixed! Redirecting...");
                    // 🔥 REDIRECT UPDATE: ActiveMatches.html 🔥
                    window.location.href = "ActiveMatches.html"; 
                });
            }
        }

        const bgmiBots = ["Mortal_Fan", "Scout_Op", "Dynamo_X", "Jonny_Gaming", "Noob_Killer", "BGMI_King"];
        
        function renderBoard() {
            db.ref('live_challenges').orderByChild('game').equalTo('BGMI').on('value', (snap) => {
                let h = "";
                snap.forEach(c => {
                    let v = c.val();
                    if(v.status === "waiting") {
                        let btnHtml = (v.creatorPhone === phone) 
                            ? `<button class="btn-action" style="background:#ff3333;color:#fff" onclick="cancelCh('${c.key}', ${v.amount})">CANCEL</button>`
                            : `<button class="btn-action" style="background:#00FF00;color:#000" onclick="acceptCh('${c.key}', ${v.amount})">PLAY</button>`;

                        h += `<div class="card real">
                            <div><b>${v.creatorName}</b><br><span style="font-size:11px;color:#00FF00;">● Live Player</span></div>
                            <div style="text-align:right;"><span class="amount">₹${v.amount}</span><br>${btnHtml}</div>
                            </div>`;
                    }
                });

                for(let i=0; i<5; i++) { 
                    let bName = bgmiBots[Math.floor(Math.random()*bgmiBots.length)] + Math.floor(Math.random()*99);
                    let bAmt = [50, 100, 200, 500][Math.floor(Math.random()*4)];
                    h += `<div class="card">
                        <div><b>${bName}</b><br><span style="font-size:11px;color:#888;">Matches: ${Math.floor(Math.random() * 300) + 50}</span></div>
                        <div style="text-align:right;"><span class="amount">₹${bAmt}</span><br><button class="btn-action" style="background:#444;color:#888">MATCHING...</button></div>
                        </div>`;
                }
                document.getElementById('board').innerHTML = h;
            });
        }
        
        setInterval(() => {
            document.getElementById('online-count').innerText = (Math.floor(Math.random() * 80) + 180) + " Players Online";
        }, 4000);
        
        renderBoard();
    </script>
</body>
</html>
