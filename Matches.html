<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; color: #fff; margin: 0; background: #050510; user-select: none; padding-bottom: 70px; }
        
        /* Header */
        .head { padding: 12px 15px; background: linear-gradient(135deg, #1a0033, #4a00e0); border-bottom: 2px solid #ffd700; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .head-title { color: #fff; font-weight: 900; font-size: 22px; text-shadow: 0 0 10px rgba(255,215,0,0.8); letter-spacing: 1px; }
        .head-title span { color: #ffd700; }
        .wal { background: rgba(0,0,0,0.6); border: 1.5px solid #00ff88; color: #00ff88; padding: 6px 15px; border-radius: 20px; font-weight: 900; box-shadow: 0 0 10px rgba(0,255,136,0.3); }
        
        .view-container { padding: 15px; }
        
        /* Match Card */
        .match-card { background: linear-gradient(145deg, #1e1e2e, #111); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); cursor: pointer; position: relative; overflow: hidden; transition: 0.2s;}
        .match-card:active { transform: scale(0.98); border-color: #ffd700; }
        .tour-name { font-size: 11px; color: #aaa; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 10px; font-weight: bold; letter-spacing: 0.5px;}
        .teams-row { display: flex; justify-content: space-between; align-items: center; }
        .team-flag { width: 45px; height: 45px; border-radius: 50%; background: #222; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 14px; border: 2px solid #555; }
        .vs-text { color: #ff004c; font-weight: 900; font-style: italic; font-size: 18px; text-shadow: 0 0 10px rgba(255,0,76,0.5); }
        .time-badge { background: rgba(0,255,136,0.1); color: #00ff88; padding: 5px 12px; border-radius: 10px; font-size: 12px; font-weight: bold; margin-top: 15px; display: inline-block; border: 1px solid #00ff88; }
        
        /* Bottom Navigation Menu */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0a0a14; border-top: 1px solid #222; display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; box-shadow: 0 -5px 10px rgba(0,0,0,0.5); }
        .nav-item { text-align: center; color: #666; font-size: 11px; font-weight: bold; cursor: pointer; flex: 1; transition: 0.2s; }
        .nav-item i { font-size: 20px; margin-bottom: 5px; display: block; }
        .nav-item:active { transform: scale(0.9); }
        .nav-item.active { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
    </style>
</head>
<body>

    <div class="head">
        <div class="head-title">KALYAN <span>11</span></div>
        <div class="wal">🪙 ₹<span id="user-balance">0</span></div>
    </div>

    <div class="view-container">
        <h3 style="margin-top:5px; color:#ffd700; font-size: 18px; text-transform: uppercase; letter-spacing: 1px;"><i class="fa-solid fa-fire"></i> Hot Matches</h3>
        
        <div class="match-card" onclick="goToTeamPage()">
            <div class="tour-name">🏆 T20 WORLD CUP 2026 - FINAL</div>
            <div class="teams-row">
                <div style="display:flex; align-items:center; gap:10px;">
                    <div class="team-flag" style="border-color:#66b3ff; color:#66b3ff; box-shadow: 0 0 10px rgba(102, 179, 255, 0.4);">IND</div>
                    <b style="font-size:18px;">INDIA</b>
                </div>
                <div class="vs-text">VS</div>
                <div style="display:flex; align-items:center; gap:10px; flex-direction:row-reverse;">
                    <div class="team-flag" style="border-color:#85e085; color:#85e085; box-shadow: 0 0 10px rgba(133, 224, 133, 0.4);">PAK</div>
                    <b style="font-size:18px;">PAKISTAN</b>
                </div>
            </div>
            <div class="time-badge"><i class="fa-regular fa-clock"></i> Lineups Out • Starts in 45m</div>
        </div>

        <div class="match-card" onclick="goToTeamPage()">
            <div class="tour-name">🏆 KALYAN PREMIER LEAGUE</div>
            <div class="teams-row">
                <div style="display:flex; align-items:center; gap:10px;">
                    <div class="team-flag" style="border-color:#ffd700; color:#ffd700;">CSK</div>
                    <b style="font-size:18px;">CHENNAI</b>
                </div>
                <div class="vs-text">VS</div>
                <div style="display:flex; align-items:center; gap:10px; flex-direction:row-reverse;">
                    <div class="team-flag" style="border-color:#ff6666; color:#ff6666;">RCB</div>
                    <b style="font-size:18px;">BANGALORE</b>
                </div>
            </div>
            <div class="time-badge" style="color:#aaa; border-color:#555; background:rgba(255,255,255,0.05);"><i class="fa-regular fa-calendar"></i> Tomorrow, 7:30 PM</div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active"><i class="fa-solid fa-house"></i> Home</div>
        <div class="nav-item"><i class="fa-solid fa-trophy"></i> My Matches</div>
        <div class="nav-item"><i class="fa-solid fa-wallet"></i> Wallet</div>
        <div class="nav-item"><i class="fa-solid fa-user"></i> Profile</div>
    </div>

    <script>
        // Setup initial dummy balance (Offline Memory me save karega)
        if(!localStorage.getItem('k11_bal')) {
            localStorage.setItem('k11_bal', 10000);
        }
        
        // Update balance on screen
        document.getElementById('user-balance').innerText = Number(localStorage.getItem('k11_bal')).toLocaleString();

        // Page Change Function
        function goToTeamPage() {
            // Jaise hi kisi match par click hoga, ye 'CreateTeam.html' file ko open kar dega
            window.location.href = "CreateTeam.html";
        }
    </script>
</body>
</html>
