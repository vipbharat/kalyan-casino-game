<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; color: #fff; margin: 0; background: #050510; user-select: none; padding-bottom: 70px; }
        .head { padding: 12px 15px; background: linear-gradient(135deg, #1a0033, #4a00e0); border-bottom: 2px solid #ffd700; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .head-title { color: #fff; font-weight: 900; font-size: 22px; text-shadow: 0 0 10px rgba(255,215,0,0.8); letter-spacing: 1px; }
        .head-title span { color: #ffd700; }
        .wal { background: rgba(0,0,0,0.6); border: 1.5px solid #00ff88; color: #00ff88; padding: 6px 15px; border-radius: 20px; font-weight: 900; box-shadow: 0 0 10px rgba(0,255,136,0.3); }
        
        /* Views CSS (Home vs My Matches) */
        .view-section { display: none; padding: 15px; }
        .view-section.active-view { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .match-card { background: linear-gradient(145deg, #1e1e2e, #111); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); cursor: pointer; position: relative; overflow: hidden; transition: 0.2s;}
        .match-card:active { transform: scale(0.98); border-color: #ffd700; }
        .tour-name { font-size: 11px; color: #aaa; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 10px; font-weight: bold; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .teams-row { display: flex; justify-content: space-between; align-items: center; }
        .team-flag { width: 45px; height: 45px; border-radius: 50%; background: #222; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 14px; border: 2px solid #555; text-transform: uppercase;}
        .vs-text { color: #ff004c; font-weight: 900; font-style: italic; font-size: 18px; text-shadow: 0 0 10px rgba(255,0,76,0.5); }
        .time-badge { background: rgba(0,255,136,0.1); padding: 5px 12px; border-radius: 10px; font-size: 11px; font-weight: bold; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .team-name { font-size: 14px; font-weight: bold; max-width: 80px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; margin-top:5px;}
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0a0a14; border-top: 1px solid #222; display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; box-shadow: 0 -5px 10px rgba(0,0,0,0.5); }
        .nav-item { text-align: center; color: #666; font-size: 11px; font-weight: bold; cursor: pointer; flex: 1; transition: 0.2s; }
        .nav-item i { font-size: 20px; margin-bottom: 5px; display: block; }
        .nav-item.active { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .loader-text { text-align: center; color: #ffd700; font-weight: bold; margin-top: 30px; font-size: 14px; animation: blink 1s infinite; }
        
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="head">
        <div class="head-title">KALYAN <span>11</span></div>
        <div class="wal">🪙 ₹<span id="user-balance">0.00</span></div>
    </div>

    <div id="view-home" class="view-section active-view">
        <h3 style="margin-top:5px; color:#ffd700; font-size: 18px; text-transform: uppercase;"><i class="fa-solid fa-fire"></i> Live & Upcoming</h3>
        <div id="live-matches-container">
            <div class="loader-text"><i class="fa-solid fa-spinner fa-spin"></i> Fetching Live Matches...</div>
        </div>
    </div>

    <div id="view-my-matches" class="view-section">
        <h3 style="margin-top:5px; color:#ffd700; font-size: 18px; text-transform: uppercase;"><i class="fa-solid fa-trophy"></i> My Matches</h3>
        <div style="text-align:center; padding: 40px 10px; color:#666;">
            <i class="fa-solid fa-box-open" style="font-size:45px; margin-bottom:15px; color:#444;"></i>
            <h3 style="color:#aaa;">No Matches Joined Yet</h3>
            <p style="font-size:13px;">Go to Home and join a mega contest to see your teams here.</p>
            <button onclick="switchTab('view-home', document.getElementById('nav-home'))" style="margin-top:20px; background:linear-gradient(90deg, #ff007f, #ff8c00); color:#fff; border:none; padding:10px 25px; border-radius:20px; font-weight:bold; cursor:pointer;">View Upcoming Matches</button>
        </div>
    </div>

    <div id="view-wallet" class="view-section">
        <h3 style="margin-top:5px; color:#ffd700; font-size: 18px; text-transform: uppercase;"><i class="fa-solid fa-wallet"></i> My Wallet</h3>
        <div style="background:#111; padding:20px; border-radius:12px; border:1px solid #333; text-align:center;">
            <div style="font-size:12px; color:#888;">Total Balance</div>
            <div style="font-size:30px; font-weight:900; color:#00ff88; margin:10px 0;">₹<span id="big-balance">0.00</span></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="switchTab('view-home', this)"><i class="fa-solid fa-house"></i> Home</div>
        <div class="nav-item" onclick="switchTab('view-my-matches', this)"><i class="fa-solid fa-trophy"></i> My Matches</div>
        <div class="nav-item" onclick="switchTab('view-wallet', this)"><i class="fa-solid fa-wallet"></i> Wallet</div>
        <div class="nav-item"><i class="fa-solid fa-user"></i> Profile</div>
    </div>

    <script>
        // 🔥 Tab Switching Logic
        function switchTab(tabId, element) {
            // Remove active class from all buttons and views
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.view-section').forEach(view => view.classList.remove('active-view'));
            
            // Add active class to clicked button and target view
            element.classList.add('active');
            document.getElementById(tabId).classList.add('active-view');
            window.scrollTo(0,0);
        }

        // 🔥 Asli Firebase Connection
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const phone = localStorage.getItem('userPhone') || localStorage.getItem('phone');

        let totalBal = 0;

        // Balance Sync
        if(phone) {
            db.ref('users/'+phone).on('value', s => { 
                let d = s.val() || {};
                let depBal = parseFloat(d.balance || 0); let winBal = parseFloat(d.winning_balance || 0); let bonBal = parseFloat(d.bonus_balance || 0);
                totalBal = Math.max(0, depBal + winBal + bonBal);
                document.getElementById('user-balance').innerText = totalBal.toFixed(2); 
                document.getElementById('big-balance').innerText = totalBal.toFixed(2); 
            });
        }

        // 🔥 Asli Live & Upcoming Matches Filter
        db.ref('Game/Kalyan11/LiveMatches').on('value', snapshot => {
            const container = document.getElementById('live-matches-container');
            container.innerHTML = ""; 
            
            const matchesData = snapshot.val();

            if (!matchesData) {
                container.innerHTML = `<div style="text-align:center; color:#888; margin-top:20px; font-weight:bold;">No Matches Right Now!</div>`;
                return;
            }

            let validMatchCount = 0;

            Object.keys(matchesData).forEach(matchId => {
                let match = matchesData[matchId];
                let statusInfo = match.status ? match.status.toLowerCase() : "";
                
                // 🛑 FILTER LOGIC: Khatam ho chuke match (Won, Draw, Abandoned) ko chupa do
                let isFinished = statusInfo.includes('won') || statusInfo.includes('beat') || statusInfo.includes('drawn') || statusInfo.includes('abandoned') || statusInfo.includes('stump') || statusInfo.includes('result');
                
                if (isFinished) return; // Is match ko mat dikhao
                
                validMatchCount++;

                // Pata lagao Live hai ya Upcoming
                let isLive = statusInfo.includes('opt to') || statusInfo.includes('run') || statusInfo.includes('wicket') || statusInfo.includes('toss');
                let badgeHTML = isLive 
                    ? `<span style="color:#ff004c; font-weight:900;"><i class="fa-solid fa-circle blink"></i> LIVE</span>` 
                    : `<span style="color:#ffd700; font-weight:900;"><i class="fa-regular fa-clock"></i> UPCOMING</span>`;

                let t1Name = match.team1 || "TM1";
                let t2Name = match.team2 || "TM2";
                let t1Short = t1Name.substring(0, 3).toUpperCase();
                let t2Short = t2Name.substring(0, 3).toUpperCase();
                
                let cardHTML = `
                <div class="match-card" onclick="window.location.href='CreateTeam.html?matchId=${matchId}'">
                    <div class="tour-name">🏆 ${match.name}</div>
                    <div class="teams-row">
                        <div style="display:flex; align-items:center; gap:10px; flex-direction:column;">
                            <div class="team-flag" style="border-color:#66b3ff; color:#66b3ff;">${t1Short}</div>
                            <div class="team-name" style="color:#66b3ff;">${t1Name}</div>
                        </div>
                        <div class="vs-text">VS</div>
                        <div style="display:flex; align-items:center; gap:10px; flex-direction:column;">
                            <div class="team-flag" style="border-color:#85e085; color:#85e085;">${t2Short}</div>
                            <div class="team-name" style="color:#85e085;">${t2Name}</div>
                        </div>
                    </div>
                    <div class="time-badge">
                        <div>${badgeHTML}</div>
                        <div style="color:#888; font-size:10px; max-width:60%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                            ${match.status || 'Match not started'}
                        </div>
                    </div>
                </div>
                `;

                container.innerHTML += cardHTML;
            });

            // Agar sab matches khatam ho chuke hain aur API ne abhi naya match fetch nahi kiya
            if (validMatchCount === 0) {
                container.innerHTML = `<div style="text-align:center; color:#888; margin-top:20px; font-weight:bold;">Matches Over! Waiting for Upcoming Matches...</div>`;
            }
        });
    </script>
</body>
</html>
