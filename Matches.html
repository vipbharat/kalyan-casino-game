<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - Live Matches</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding-bottom: 70px; user-select: none; }
        .header { background: linear-gradient(135deg, #1a0033, #4a00e0); padding: 15px; text-align: center; font-weight: 900; font-size: 18px; color: #ffd700; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .match-card { background: #111; margin: 15px; border-radius: 10px; border: 1px solid #333; padding: 15px; text-align: center; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.5); border-left: 4px solid #00ff88; position: relative; overflow: hidden; }
        .series-name { font-size: 11px; color: #aaa; margin-bottom: 12px; border-bottom: 1px dashed #333; padding-bottom: 8px; }
        .teams { display: flex; justify-content: space-between; align-items: center; font-size: 20px; font-weight: 900; margin-bottom: 10px; }
        .vs { color: #ff004c; font-size: 12px; background: #222; padding: 4px 8px; border-radius: 50%; }
        .time-badge { font-size: 12px; font-weight: bold; padding: 6px 12px; border-radius: 4px; display: inline-block; border: 1px solid #00ff88; margin-bottom: 15px;}
        .live-badge { background: rgba(255, 0, 76, 0.1); color: #ff004c; border: 1px solid #ff004c; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.6; } }

        .btn-container { display: flex; gap: 10px; width: 100%; }
        .action-btn { flex: 1; padding: 12px 5px; border: none; border-radius: 6px; font-weight: 900; font-size: 13px; cursor: pointer; text-transform: uppercase; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-join { background: linear-gradient(90deg, #00ff88, #00d2d3); color: #000; }
        .btn-myteam { background: linear-gradient(90deg, #ffd700, #ff8c00); color: #000; display: none; } 
        .btn-leaderboard { background: linear-gradient(90deg, #ff004c, #ff8c00); color: #fff; width: 100%;}
        .loader { text-align: center; margin-top: 50px; color: #ffd700; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">🏏 KALYAN 11 MATCHES</div>
    <div id="matches-list"><div class="loader"><i class="fa-solid fa-spinner fa-spin"></i> Loading Matches...</div></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        let myPhone = localStorage.getItem('userPhone') || localStorage.getItem('phone');
        const container = document.getElementById('matches-list');

        db.ref('Game/Kalyan11/LiveMatches').on('value', snapshot => {
            if(!snapshot.exists()) {
                container.innerHTML = `<div style="text-align:center; padding:50px; color:#aaa;">Abhi koi naya match active nahi hai. Admin panel se match add karein!</div>`;
                return;
            }

            let htmlContent = "";
            let matchesArray = [];

            snapshot.forEach(child => {
                let m = child.val();
                m.id = child.key;
                
                // 🛡️ ANTI-KACHRA FILTER (Sirf Asli Match Andar Aayega)
                // Agar match mein aapka diya hua timestamp hai, tabhi usko screen par dikhayenge
                if(m.timestamp) {
                    matchesArray.push(m);
                }
            });

            matchesArray.sort((a, b) => a.timestamp - b.timestamp);

            if(matchesArray.length === 0) {
                 container.innerHTML = `<div style="text-align:center; padding:50px; color:#aaa;">Abhi koi naya match active nahi hai. Kripya Admin panel se link dalkar match add karein.</div>`;
                 return;
            }

            matchesArray.forEach(m => {
                htmlContent += `
                    <div class="match-card" id="card-${m.id}" data-time="${m.timestamp}" data-t1="${m.team1 || 'T1'}" data-t2="${m.team2 || 'T2'}">
                        <div class="series-name">${m.name || 'Live Cricket Match'}</div>
                        <div class="teams">
                            <div>${m.team1 || 'T1'}</div>
                            <div class="vs">V/S</div>
                            <div>${m.team2 || 'T2'}</div>
                        </div>
                        <div class="time-badge" id="timer-${m.id}">
                            <i class="fa-solid fa-spinner fa-spin"></i> Loading...
                        </div>
                        
                        <div class="btn-container" id="btn-group-${m.id}">
                            <button class="action-btn btn-join" id="btn-${m.id}">PLEASE WAIT...</button>
                            <button class="action-btn btn-myteam" id="myteam-btn-${m.id}" onclick="window.location.href='MyContests.html?matchId=${m.id}'">
                                <i class="fa-solid fa-eye"></i> MY TEAM
                            </button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = htmlContent;
            updateTimers(); 
            checkJoinedTeams(matchesArray);
        });

        function checkJoinedTeams(matches) {
            if(!myPhone) return;
            matches.forEach(m => {
                db.ref('Game/Kalyan11/Contests/' + m.id + '/Teams/' + myPhone).on('value', snap => {
                    let myTeamBtn = document.getElementById(`myteam-btn-${m.id}`);
                    if(snap.exists() && myTeamBtn) {
                        myTeamBtn.style.display = 'block';
                    } else if(myTeamBtn) {
                        myTeamBtn.style.display = 'none';
                    }
                });
            });
        }

        function updateTimers() {
            let cards = document.querySelectorAll('.match-card');
            let now = new Date().getTime();

            cards.forEach(card => {
                let matchId = card.id.replace('card-', '');
                let matchTime = parseInt(card.getAttribute('data-time')); 
                let t1 = card.getAttribute('data-t1');
                let t2 = card.getAttribute('data-t2');
                let timerBox = document.getElementById(`timer-${matchId}`);
                let actionBtn = document.getElementById(`btn-${matchId}`);
                let btnGroup = document.getElementById(`btn-group-${matchId}`);
                
                let diff = matchTime - now;

                if (diff > 0) {
                    let d = Math.floor(diff / (1000 * 60 * 60 * 24));
                    let h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    let m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    let s = Math.floor((diff % (1000 * 60)) / 1000);

                    h = (h < 10) ? "0" + h : h;
                    m = (m < 10) ? "0" + m : m;
                    s = (s < 10) ? "0" + s : s;

                    let timeText = (d > 0) ? `${d}d ${h}h ${m}m ${s}s` : `${h}h ${m}m ${s}s`;

                    timerBox.innerHTML = `<i class="fa-regular fa-clock"></i> Starts in: ${timeText}`;
                    timerBox.className = "time-badge"; 
                    timerBox.style.color = "#00ff88";
                    timerBox.style.borderColor = "#00ff88";
                    timerBox.style.background = "rgba(0,255,136,0.1)";
                    card.style.borderLeftColor = "#00ff88"; 

                    actionBtn.className = "action-btn btn-join";
                    actionBtn.innerHTML = "🏏 JOIN CONTESTS";
                    actionBtn.onclick = function() { window.location.href = `Contests.html?matchId=${matchId}&t1=${t1}&t2=${t2}`; };
                    
                } else { 
                    timerBox.innerHTML = `<i class="fa-solid fa-lock"></i> MATCH STARTED (LOCKED)`;
                    timerBox.className = "time-badge live-badge"; 
                    timerBox.style.color = "#ff004c";
                    timerBox.style.borderColor = "#ff004c";
                    timerBox.style.background = "rgba(255, 0, 76, 0.1)";
                    card.style.borderLeftColor = "#ff004c"; 
                    
                    if (document.getElementById(`myteam-btn-${matchId}`).style.display === 'block') {
                        btnGroup.innerHTML = `
                            <button class="action-btn btn-leaderboard" style="flex:1;" onclick="window.location.href='leader.html?matchId=${matchId}'">🏆 LEADERBOARD</button>
                            <button class="action-btn btn-myteam" style="display:block; flex:1;" onclick="window.location.href='MyContests.html?matchId=${matchId}'"><i class="fa-solid fa-eye"></i> MY TEAM</button>
                        `;
                    } else {
                        btnGroup.innerHTML = `<button class="action-btn btn-leaderboard" onclick="window.location.href='leader.html?matchId=${matchId}'">🏆 VIEW LEADERBOARD</button>`;
                    }
                }
            });
        }

        setInterval(updateTimers, 1000);
    </script>
</body>
</html>
