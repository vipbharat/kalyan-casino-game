<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - Live Matches</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding-bottom: 70px; user-select: none; }
        .header { background: linear-gradient(135deg, #1a0033, #4a00e0); padding: 15px; text-align: center; font-weight: 900; font-size: 18px; color: #ffd700; border-bottom: 2px solid #ffd700; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .match-card { background: #111; margin: 15px; border-radius: 10px; border: 1px solid #333; padding: 15px; text-align: center; cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .match-card:active { transform: scale(0.98); border-color: #ffd700; }
        
        .series-name { font-size: 11px; color: #aaa; margin-bottom: 12px; border-bottom: 1px dashed #333; padding-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .teams { display: flex; justify-content: space-between; align-items: center; font-size: 20px; font-weight: 900; margin-bottom: 10px; }
        .vs { color: #ff004c; font-size: 12px; background: #222; padding: 4px 8px; border-radius: 50%; }
        
        .time-badge { font-size: 11px; font-weight: bold; background: rgba(0,255,136,0.1); color: #00ff88; padding: 6px 12px; border-radius: 4px; display: inline-block; border: 1px solid #00ff88; }
        .time-badge.upcoming { background: rgba(255,215,0,0.1); color: #ffd700; border-color: #ffd700; }
        
        .loader { text-align: center; margin-top: 50px; color: #ffd700; font-weight: bold; }
        .error-msg { text-align: center; margin-top: 50px; color: #ff004c; font-size: 14px; padding: 20px; }
        .info-msg { text-align: center; margin-top: 50px; color: #aaa; font-size: 14px; padding: 20px; }
    </style>
</head>
<body>

    <div class="header">
        🏏 KALYAN 11 MATCHES
    </div>

    <div id="matches-list">
        <div class="loader"><i class="fa-solid fa-spinner fa-spin"></i> Loading Top Upcoming Matches...</div>
    </div>

    <script>
        // 🔥 AAPKI NAYI API KEY 🔥
        const CRICKET_API_KEY = "47946dec-cc2d-4959-95d7-4480d4af93e4"; 
        const container = document.getElementById('matches-list');

        function displayMatches(matchesArray) {
            const now = new Date().getTime();
            const pastLimit = now - (24 * 60 * 60 * 1000); // 24 ghante purane matches ignore karo
            
            let upcomingMatches = [];

            // 1. Saare future matches nikal lo
            matchesArray.forEach(m => {
                let matchTime = new Date(m.dateTimeGMT).getTime();
                
                // Agar match aage hone wala hai ya kal hi shuru hua hai
                if(matchTime >= pastLimit) {
                    let team1 = m.teams && m.teams[0] ? String(m.teams[0]).substring(0,3).toUpperCase() : (m.t1 ? String(m.t1).substring(0,3).toUpperCase() : "TM1");
                    let team2 = m.teams && m.teams[1] ? String(m.teams[1]).substring(0,3).toUpperCase() : (m.t2 ? String(m.t2).substring(0,3).toUpperCase() : "TM2");

                    upcomingMatches.push({
                        id: m.id, name: m.name || m.series || 'T20 Match',
                        t1: team1, t2: team2, status: m.status || "Upcoming",
                        timeObj: new Date(m.dateTimeGMT), timeNum: matchTime
                    });
                }
            });

            // 2. Matches ko Time ke hisaab se lagao (Jo jaldi hai wo upar)
            upcomingMatches.sort((a, b) => a.timeNum - b.timeNum);

            // 3. 🟢 MAGIC: Sirf top 15 matches lo taaki screen bhari lage par kachra na ho
            let finalMatches = upcomingMatches.slice(0, 15);

            if(finalMatches.length === 0) {
                container.innerHTML = `<div class="info-msg"><i class="fa-solid fa-calendar-xmark" style="font-size:30px; margin-bottom:10px;"></i><br>Abhi koi match nahi mila API mein.</div>`;
                return;
            }

            container.innerHTML = "";
            finalMatches.forEach(m => {
                let options = { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
                let displayTime = "Starts: " + m.timeObj.toLocaleString('en-IN', options);
                let badgeClass = m.status.toLowerCase().includes("upcoming") ? "upcoming" : "";
                let clickAction = `window.location.href='Contests.html?matchId=${m.id}'`;

                container.innerHTML += `
                    <div class="match-card" onclick="${clickAction}">
                        <div class="series-name">${m.name}</div>
                        <div class="teams">
                            <div>${m.t1}</div>
                            <div class="vs">V/S</div>
                            <div>${m.t2}</div>
                        </div>
                        <div class="time-badge ${badgeClass}"><i class="fa-solid fa-bolt"></i> ${displayTime}</div>
                    </div>
                `;
            });
        }

        async function fetchRealMatches() {
            // Smart Cache: Phone ki memory se data uthao (3 ghante tak valid)
            let cachedData = localStorage.getItem('kalyan_all_matches_data');
            let cacheTime = localStorage.getItem('kalyan_all_matches_time');
            let now = new Date().getTime();

            if (cachedData && cacheTime && (now - cacheTime < 10800000)) {
                console.log("Loading from Phone Cache...");
                displayMatches(JSON.parse(cachedData));
                return;
            }

            try {
                // 🟢 API ENDPOINT BADAL DIYA: Ab saare upcoming matches mangwa rahe hain
                const response = await fetch(`https://api.cricapi.com/v1/matches?apikey=${CRICKET_API_KEY}&offset=0`);
                const data = await response.json();
                
                if (data.status !== "success") {
                    if(cachedData) {
                        displayMatches(JSON.parse(cachedData));
                    } else {
                        container.innerHTML = `<div class="error-msg">⚠️ API Error: ${data.info || "Daily API Limit Reached."}</div>`;
                    }
                    return;
                }

                // Naya data cache mein save karo
                localStorage.setItem('kalyan_all_matches_data', JSON.stringify(data.data));
                localStorage.setItem('kalyan_all_matches_time', now);
                
                displayMatches(data.data);

            } catch (error) {
                if(cachedData) { displayMatches(JSON.parse(cachedData)); } 
                else { container.innerHTML = `<div class="error-msg">⚠️ Data lane mein problem aayi! Please check internet.</div>`; }
            }
        }

        fetchRealMatches();
    </script>
</body>
</html>
