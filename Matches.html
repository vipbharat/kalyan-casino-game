<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALYAN VIP - OFFLINE PASTE ENGINE 🚀</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050510; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .header { text-align: center; border-bottom: 2px solid #ff004c; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #ff004c; font-size: 24px; text-transform: uppercase; text-shadow: 0 0 15px rgba(255,0,76,0.5);}
        .box { background: #1a1a2e; padding: 15px; border-radius: 10px; border: 1px solid #444; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);}
        h3 { margin-top: 0; font-size: 14px; color: #00ff88; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 8px;}
        input[type="text"] { width: calc(100% - 22px); padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #555; color: #fff; border-radius: 5px; font-weight: bold; font-size: 14px;}
        textarea { width: calc(100% - 22px); height: 120px; padding: 12px; margin-bottom: 10px; background: #000; border: 1px dashed #00b0ff; color: #00b0ff; border-radius: 5px; font-family: monospace; resize: none;}
        .btn-load { width: 100%; padding: 12px; background: #00b0ff; color: #fff; font-weight: 900; border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase; margin-bottom: 10px;}
        .btn-scan { width: 100%; padding: 12px; background: #ffea00; color: #000; font-weight: 900; border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase; margin-bottom: 10px;}
        .btn-sync { width: 100%; padding: 15px; background: #00e676; color: #000; font-weight: 900; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 15px rgba(0,230,118,0.4);}
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: #000; border-radius: 5px; overflow: hidden;}
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #333; font-size: 13px;}
        th { background: #222; color: #00ff88;}
        .num-input { width: 50px; padding: 5px; background: #111; border: 1px solid #555; color: #fff; text-align: center; border-radius: 3px; font-weight: bold;}
        .num-input:focus { border-color: #00ff88; outline: none; background: #222;}
        
        .terminal { background: #000; border: 1px solid #ff004c; padding: 15px; border-radius: 5px; height: 150px; overflow-y: auto; font-family: monospace; font-size: 12px; margin-bottom: 20px;}
        .terminal p { margin: 4px 0; border-bottom: 1px dashed #222; padding-bottom: 4px;}
        .log-info { color: #00b0ff; } .log-success { color: #00e676; font-weight: bold;} .log-error { color: #ff1744;} 
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-clipboard-list"></i> KALYAN PASTE ENGINE</h1>
    </div>

    <div class="box">
        <h3><i class="fa-solid fa-1"></i> Step 1: Load Match Players</h3>
        <input type="text" id="m-id" placeholder="Match ID (e.g. 149673)">
        <button class="btn-load" onclick="loadPlayers()"><i class="fa-solid fa-download"></i> Fetch Players from DB</button>
    </div>

    <div class="box" id="paste-section" style="display:none;">
        <h3><i class="fa-solid fa-2"></i> Step 2: Paste Cricbuzz Scorecard Here</h3>
        <textarea id="paste-box" placeholder="Cricbuzz se poora Scorecard copy karke yahan paste karein..."></textarea>
        <button class="btn-scan" onclick="magicScan()"><i class="fa-solid fa-wand-magic-sparkles"></i> Magic Auto-Fill</button>
    </div>

    <div class="box" id="players-section" style="display:none;">
        <h3><i class="fa-solid fa-3"></i> Step 3: Verify & Sync Leaderboard</h3>
        <table>
            <thead>
                <tr>
                    <th>Player Name</th>
                    <th>Runs (1 Pt)</th>
                    <th>Wickets (25 Pts)</th>
                </tr>
            </thead>
            <tbody id="players-table-body">
                </tbody>
        </table>
        <button class="btn-sync" onclick="syncPoints()"><i class="fa-solid fa-bolt"></i> CALCULATE & UPDATE LEADERBOARD</button>
    </div>

    <div class="terminal" id="console-box">
        <p class="log-info">> Copy-Paste Engine Ready!</p>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();
    
    let loadedPlayers = {};
    let currentMatchId = "";

    function cLog(type, msg) {
        let box = document.getElementById('console-box');
        box.innerHTML += `<p class="log-${type}">[${new Date().toLocaleTimeString()}] ${msg}</p>`;
        box.scrollTop = box.scrollHeight; 
    }

    // 🔥 1. FETCH PLAYERS FROM FIREBASE 🔥
    async function loadPlayers() {
        let id = document.getElementById('m-id').value.trim();
        if(!id) return alert("Match ID daaliye!");
        
        try {
            cLog('info', `Loading Match ${id} from Database...`);
            let snap = await db.ref(`Game/Kalyan11/MatchPlayers/${id}`).once('value');
            if(!snap.exists()) {
                cLog('error', `❌ Is Match ID ke players Firebase mein nahi hain!`);
                return;
            }
            
            loadedPlayers = snap.val();
            currentMatchId = id;
            
            let tbody = document.getElementById('players-table-body');
            tbody.innerHTML = "";
            
            for(let key in loadedPlayers) {
                let p = loadedPlayers[key];
                // Table Row Banana
                tbody.innerHTML += `
                    <tr>
                        <td><b>${p.name}</b></td>
                        <td><input type="number" class="num-input" id="runs-${key}" value="${p.runs || 0}"></td>
                        <td><input type="number" class="num-input" id="wickets-${key}" value="${p.wickets || 0}"></td>
                    </tr>
                `;
            }
            
            document.getElementById('paste-section').style.display = "block";
            document.getElementById('players-section').style.display = "block";
            cLog('success', `✅ ${Object.keys(loadedPlayers).length} Players Loaded!`);
            
        } catch(e) { cLog('error', `Error loading data.`); }
    }

    // 🔥 2. MAGIC AUTO-FILL (READS PASTED TEXT) 🔥
    function magicScan() {
        let text = document.getElementById('paste-box').value.toLowerCase();
        if(!text) return alert("Pehle dabbe mein text paste karein!");
        
        let lines = text.split('\n');
        let fillCount = 0;

        for(let key in loadedPlayers) {
            let name = loadedPlayers[key].name.toLowerCase();
            let nameParts = name.split(' ');
            let lastName = nameParts[nameParts.length - 1];

            // Pata karo ki yeh line is khiladi ki hai kya
            let matchedLine = lines.find(l => l.includes(name) || (lastName.length > 3 && l.includes(lastName)));
            
            if(matchedLine) {
                // Line mein se saare Numbers nikal lo
                let nums = matchedLine.match(/\b\d+\b/g); 
                if(nums && nums.length > 0) {
                    
                    // Agar "c " ya "b " likha hai yani yeh Batsman hai
                    if(matchedLine.includes(' c ') || matchedLine.includes(' b ') || matchedLine.includes('not out')) {
                        document.getElementById(`runs-${key}`).value = nums[0]; // Pehla number runs hota hai
                        fillCount++;
                    } 
                    // Agar line mein 4 se zyada number hain (Over, Maiden, Run, Wicket) yani Bowler hai
                    else if (nums.length >= 4) {
                        document.getElementById(`wickets-${key}`).value = nums[3]; // 4th number wicket hota hai
                        fillCount++;
                    }
                }
            }
        }
        cLog('success', `✨ Magic Scan Done: ${fillCount} inputs auto-filled! (Ek baar check kar lijiye)`);
    }

    // 🔥 3. SYNC POINTS TO FIREBASE & LEADERBOARD 🔥
    async function syncPoints() {
        if(!currentMatchId) return;
        
        let updates = {};
        let updatedCount = 0;

        // Har table row se data padho
        for(let key in loadedPlayers) {
            let r = parseInt(document.getElementById(`runs-${key}`).value) || 0;
            let w = parseInt(document.getElementById(`wickets-${key}`).value) || 0;
            
            // 💰 POINT FORMULA: Runs(1) + Wickets(25) + Playing(4) 💰
            let p = (r * 1) + (w * 25) + 4; 

            updates[key + '/points'] = p;
            updates[key + '/runs'] = r;
            updates[key + '/wickets'] = w;
            updates[key + '/playingStatus'] = "playing";
            updatedCount++;
        }

        try {
            // Update Player Points
            await db.ref(`Game/Kalyan11/MatchPlayers/${currentMatchId}`).update(updates);
            cLog('success', `⚡ ${updatedCount} Players ke points DB mein save ho gaye!`);
            
            // Update Teams Leaderboard
            await updateTeamsLeaderboard(currentMatchId);
            
            document.getElementById('paste-box').value = ""; // Text box khali kar do
        } catch(e) { cLog('error', `Save karte waqt error aaya.`); }
    }

    // 🔥 4. UPDATE LEADERBOARD (C=2x, VC=1.5x) 🔥
    async function updateTeamsLeaderboard(matchId) {
        try {
            let pSnap = await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).once('value');
            let tSnap = await db.ref(`Game/Kalyan11/Contests/${matchId}/Teams`).once('value');
            if(!pSnap.exists() || !tSnap.exists()) {
                cLog('warn', `Leaderboard update nahi hua kyunki abhi tak koi team nahi bani hai.`);
                return;
            }

            let livePlayersData = pSnap.val();
            let updates = {};
            
            tSnap.forEach(child => {
                let team = child.val();
                let pts = 0;
                
                let vcName = team.viceCaptain || team.vice_captain; 
                let cName = team.captain;

                Object.values(team.players || {}).forEach(playerId => {
                    if(livePlayersData[playerId]) {
                        let pData = livePlayersData[playerId];
                        let pName = pData.name;
                        let livePoints = parseFloat(pData.points || 0);

                        if(pName === cName) { pts += (livePoints * 2); } 
                        else if(pName === vcName) { pts += (livePoints * 1.5); } 
                        else { pts += livePoints; }
                    }
                });

                updates[child.key + '/total_points'] = parseFloat(pts.toFixed(1));
            });

            await db.ref(`Game/Kalyan11/Contests/${matchId}/Teams`).update(updates);
            cLog('success', `🏆 FINAL LEADERBOARD UPDATED! Saare rank automatically set ho gaye.`);
            alert("Bhai! Leaderboard aur Points Ekdum Update Ho Gaye! 🔥");
            
        } catch(e) { cLog('error', `Leaderboard Crash: ` + e); }
    }
</script>
</body>
</html>
