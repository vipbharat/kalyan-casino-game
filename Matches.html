<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - Final Matches</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding-bottom: 80px; user-select: none; }
        .header { background: linear-gradient(135deg, #1a0033, #00ff88); padding: 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,255,136,0.3); color: #000; }
        .app-title { text-align: center; font-weight: 900; font-size: 18px; flex-grow: 1; text-transform: uppercase; letter-spacing: 2px;}
        
        .tabs-container { background: #111; display: flex; border-bottom: 2px solid #333; position: sticky; top: 54px; z-index: 99;}
        .tab { flex: 1; text-align: center; padding: 12px 5px; font-size: 11px; font-weight: 900; color: #aaa; cursor: pointer; border-bottom: 3px solid transparent; text-transform: uppercase; }
        .tab.active { color: #00ff88; border-bottom: 3px solid #00ff88; background: linear-gradient(to top, rgba(0,255,136,0.1), transparent); }

        .match-list { padding: 15px; }
        .match-card { background: linear-gradient(145deg, #1a1a2e, #111); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; cursor: pointer; position: relative; overflow: hidden; transition: 0.2s;}
        .match-card:active { transform: scale(0.98); }
        .match-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: #00ff88; }
        
        .tour-name { font-size: 10px; color: #aaa; margin-bottom: 12px; border-bottom: 1px dashed #333; padding-bottom: 5px; font-weight: bold; text-transform: uppercase; text-align: center;}
        .teams-row { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 10px;}
        .team { width: 32%; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        .team-flag { width: 42px; height: 42px; background: #222; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 11px; color: #fff; border: 2px solid #555; margin-bottom: 6px; text-transform: uppercase;}
        .team-name { font-size: 10px; font-weight: 900; color: #fff; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }

        .match-time { width: 34%; text-align: center; }
        .time-box { background: rgba(0,255,136,0.1); border: 1px solid #00ff88; color: #00ff88; padding: 5px 8px; border-radius: 15px; font-size: 10px; font-weight: bold; display: inline-block; min-width: 80px;}

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { text-align: center; color: #888; font-size: 10px; cursor: pointer; flex: 1; font-weight: bold; text-transform: uppercase; }
        .nav-item i { font-size: 18px; margin-bottom: 4px; display: block; }
        .nav-item.active { color: #00ff88; }
        
        .loader { text-align: center; padding: 50px 20px; color: #00ff88; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="app-title">KALYAN 11</div>
        <i class="fa-solid fa-wallet" onclick="alert('Wallet balance check...')"></i>
    </div>

    <div class="tabs-container">
        <div class="tab active" id="tab-upcoming" onclick="switchTab('upcoming')">Upcoming</div>
        <div class="tab" id="tab-live" onclick="switchTab('live')">Live</div>
        <div class="tab" id="tab-completed" onclick="switchTab('completed')">Completed</div>
    </div>

    <div class="match-list" id="match-container">
        <div class="loader">Scanning Matches...</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active"><i class="fa-solid fa-house"></i><span>Matches</span></div>
        <div class="nav-item" onclick="alert('Pehle match join karein!')"><i class="fa-solid fa-users"></i><span>My Team</span></div>
        <div class="nav-item" onclick="alert('Leaderboard match ke baad!')"><i class="fa-solid fa-trophy"></i><span>Leaderboard</span></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allMatches = [];
        let currentTab = 'upcoming';
        let timerInterval;

        // Admin Panel Time Fix (String ko number mein badalne ke liye)
        function getSafeTime(ts) {
            if (!ts) return 0;
            if (typeof ts === 'number') return ts;
            let parsed = new Date(ts).getTime();
            return isNaN(parsed) ? 0 : parsed;
        }

        db.ref('Game/Kalyan11/VIPMatches').on('value', snapshot => {
            allMatches = [];
            if (snapshot.exists()) {
                snapshot.forEach(child => {
                    let m = child.val();
                    m.id = child.key;
                    allMatches.push(m);
                });
            }
            renderMatches(currentTab);
        });

        function switchTab(tabName) {
            currentTab = tabName;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            renderMatches(tabName);
        }

        function renderMatches(tabName) {
            let container = document.getElementById('match-container');
            container.innerHTML = "";
            let now = Date.now();

            let filtered = allMatches.filter(m => {
                let matchTime = getSafeTime(m.timestamp);
                let diff = matchTime - now;
                if(tabName === 'live') return diff <= 0 && diff > -14400000;
                if(tabName === 'completed') return diff <= -14400000;
                return diff > 0;
            });

            if(filtered.length === 0) {
                container.innerHTML = "<div style='text-align:center; padding:50px; color:#555;'>No Matches Found</div>";
                return;
            }

            // Upcoming matches ko time ke hisaab se sort karein
            filtered.sort((a, b) => getSafeTime(a.timestamp) - getSafeTime(b.timestamp));

            filtered.forEach(m => {
                let statusBox = "";
                if (tabName === 'upcoming') {
                    statusBox = `<div class="time-box" id="timer-${m.id}">Loading...</div>`;
                } else if (tabName === 'live') {
                    statusBox = `<div class="time-box" style="color:#ff004c; border-color:#ff004c;">🔴 LIVE</div>`;
                } else {
                    statusBox = `<div class="time-box" style="color:#ffd700; border-color:#ffd700;">FINISHED</div>`;
                }

                let t1Name = m.team1 || "Team 1";
                let t2Name = m.team2 || "Team 2";

                let card = document.createElement('div');
                card.className = "match-card";
                card.innerHTML = `
                    <div class="tour-name">${m.name || 'CRICKET LEAGUE'}</div>
                    <div class="teams-row">
                        <div class="team">
                            <div class="team-flag">${t1Name.substring(0,3)}</div>
                            <div class="team-name">${t1Name}</div>
                        </div>
                        <div class="match-time">${statusBox}</div>
                        <div class="team">
                            <div class="team-flag">${t2Name.substring(0,3)}</div>
                            <div class="team-name">${t2Name}</div>
                        </div>
                    </div>
                `;
                
                card.onclick = function() {
                    if (tabName === 'upcoming') {
                        window.location.href = `Contests.html?matchId=${m.id}&t1=${encodeURIComponent(t1Name)}&t2=${encodeURIComponent(t2Name)}`;
                    } else {
                        window.location.href = `leader.html?matchId=${m.id}`;
                    }
                };
                
                container.appendChild(card);
            });

            if(tabName === 'upcoming') startCountdown(filtered);
        }

        function startCountdown(matches) {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let now = Date.now();
                matches.forEach(m => {
                    let el = document.getElementById(`timer-${m.id}`);
                    if (!el) return;

                    let diff = getSafeTime(m.timestamp) - now;
                    if (diff <= 0) {
                        el.innerText = "Started";
                        return;
                    }

                    let h = Math.floor(diff / 3600000);
                    let m_unit = Math.floor((diff % 3600000) / 60000);
                    let s = Math.floor((diff % 60000) / 1000);

                    el.innerText = `${h}h ${m_unit}m ${s}s`;
                });
            }, 1000);
        }
    </script>
</body>
</html>
