<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan VIP - Matches</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050510; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; padding-bottom: 70px; padding-top: 120px;}
        
        /* 🔥 TOP HEADER & TABS 🔥 */
        .top-header { position: fixed; top: 0; left: 0; width: 100%; background: #111; z-index: 1000; border-bottom: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5);}
        .app-title { text-align: center; font-size: 20px; font-weight: 900; color: #00ff88; padding: 15px 0; margin: 0; text-transform: uppercase; letter-spacing: 1px;}
        
        .top-tabs { display: flex; justify-content: space-around; background: #1a1a2e; padding: 0; margin: 0; list-style: none;}
        .tab-btn { flex: 1; text-align: center; padding: 12px 0; color: #aaa; font-size: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; border-bottom: 3px solid transparent;}
        .tab-btn.active { color: #00ff88; border-bottom: 3px solid #00ff88; background: rgba(0,255,136,0.1);}

        /* 🔥 MATCH CARDS 🔥 */
        .match-container { padding: 15px; }
        .match-card { background: #111; border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer;}
        .match-card.upcoming::before { content: ''; position: absolute; left: 0; top: 0; width: 4px; height: 100%; background: #00ff88; }
        .match-card.live::before { content: ''; position: absolute; left: 0; top: 0; width: 4px; height: 100%; background: #ff004c; }
        .match-card.completed::before { content: ''; position: absolute; left: 0; top: 0; width: 4px; height: 100%; background: #ffd700; }
        
        .tour-name { font-size: 11px; color: #aaa; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px dashed #333; padding-bottom: 5px; text-align: center;}
        .teams-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;}
        .team-box { text-align: center; width: 35%;}
        .team-name { font-size: 18px; font-weight: 900; color: #fff;}
        
        .vs-box { width: 30%; text-align: center; font-size: 12px; color: #ff004c; font-weight: bold; background: rgba(255,0,76,0.1); padding: 5px; border-radius: 20px;}
        
        .time-box { text-align: center; font-size: 13px; font-weight: bold; background: #222; padding: 8px; border-radius: 5px; margin-top: 10px;}
        .time-box.countdown { color: #ffd700; }
        .time-box.livenow { color: #fff; background: #ff004c; animation: pulse 1.5s infinite;}
        .time-box.done { color: #fff; background: #555;}
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        
        /* 🔥 BOTTOM NAVIGATION 🔥 */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; z-index: 1000;}
        .nav-item { text-align: center; color: #777; cursor: pointer; font-size: 12px; flex: 1; transition: 0.3s;}
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px;}
        .nav-item.active { color: #00ff88; }
        
        .loader { text-align: center; color: #00ff88; font-size: 16px; margin-top: 50px; font-weight: bold;}
        .empty-msg { text-align: center; color: #aaa; margin-top: 50px; font-size: 14px;}
    </style>
</head>
<body>

    <div class="top-header">
        <h1 class="app-title">KALYAN VIP</h1>
        <div class="top-tabs">
            <div class="tab-btn active" onclick="filterMatches('Upcoming', this)">Upcoming</div>
            <div class="tab-btn" onclick="filterMatches('Live', this)">Live</div>
            <div class="tab-btn" onclick="filterMatches('Completed', this)">Completed</div>
        </div>
    </div>

    <div class="match-container" id="matches-list">
        <div class="loader"><i class="fa-solid fa-spinner fa-spin"></i> Loading Matches...</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="window.location.href='Matches.html'">
            <i class="fa-solid fa-house"></i> Home
        </div>
        <div class="nav-item" onclick="window.location.href='MyTeam.html'">
            <i class="fa-solid fa-users"></i> My Team
        </div>
        <div class="nav-item" onclick="window.location.href='leader.html'">
            <i class="fa-solid fa-trophy"></i> Leaderboard
        </div>
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", 
        databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com" 
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    let allMatches = [];
    let currentFilter = 'Upcoming';
    let timerInterval;

    // DATABASE SE DATA FETCH KARNA
    db.ref('Game/Kalyan11/VIPMatches').on('value', (snapshot) => {
        allMatches = [];
        if (snapshot.exists()) {
            snapshot.forEach(child => {
                let match = child.val();
                match.id = child.key;
                
                // SMART AUTO-STATUS: Timer Check
                let now = new Date().getTime();
                if(match.status === "Upcoming" && match.timestamp <= now) {
                    match.calculatedStatus = "Live";
                } else {
                    match.calculatedStatus = match.status; 
                }
                
                allMatches.push(match);
            });
            allMatches.sort((a, b) => a.timestamp - b.timestamp);
        }
        renderMatches();
        startTimerEngine(); 
    });

    function filterMatches(status, element) {
        currentFilter = status;
        let tabs = document.querySelectorAll('.tab-btn');
        tabs.forEach(tab => tab.classList.remove('active'));
        element.classList.add('active');
        renderMatches();
    }

    function renderMatches() {
        let container = document.getElementById('matches-list');
        container.innerHTML = "";

        let filteredMatches = allMatches.filter(match => match.calculatedStatus.toLowerCase() === currentFilter.toLowerCase());

        if (filteredMatches.length === 0) {
            container.innerHTML = `<div class="empty-msg"><i class="fa-solid fa-box-open" style="font-size:30px; margin-bottom:10px;"></i><br>No ${currentFilter} matches found.</div>`;
            return;
        }

        filteredMatches.forEach(match => {
            let cardClass = match.calculatedStatus.toLowerCase();
            
            let timeBoxHtml = "";
            if (cardClass === "upcoming") {
                timeBoxHtml = `<div class="time-box countdown" data-time="${match.timestamp}"><i class="fa-solid fa-clock"></i> Calculating...</div>`;
            } else if (cardClass === "live") {
                timeBoxHtml = `<div class="time-box livenow"><i class="fa-solid fa-circle-play"></i> LIVE NOW</div>`;
            } else {
                timeBoxHtml = `<div class="time-box done"><i class="fa-solid fa-check-double"></i> COMPLETED</div>`;
            }

            container.innerHTML += `
                <div class="match-card ${cardClass}" onclick="handleMatchClick('${match.id}', '${cardClass}')">
                    <div class="tour-name">${match.name}</div>
                    <div class="teams-row">
                        <div class="team-box"><div class="team-name">${match.team1}</div></div>
                        <div class="vs-box">V/S</div>
                        <div class="team-box"><div class="team-name">${match.team2}</div></div>
                    </div>
                    ${timeBoxHtml}
                </div>
            `;
        });
    }

    // 🔥 LIVE TIMER ENGINE 🔥
    function startTimerEngine() {
        if(timerInterval) clearInterval(timerInterval);
        
        timerInterval = setInterval(() => {
            let now = new Date().getTime();
            let timerElements = document.querySelectorAll('.countdown');
            let needReRender = false;

            timerElements.forEach(el => {
                let matchTime = parseInt(el.getAttribute('data-time'));
                let diff = matchTime - now;

                if (diff <= 0) {
                    el.innerHTML = "🔴 MATCH STARTED!";
                    needReRender = true; 
                } else {
                    let hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    let minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    let seconds = Math.floor((diff % (1000 * 60)) / 1000);
                    
                    hours = (hours < 10) ? "0" + hours : hours;
                    minutes = (minutes < 10) ? "0" + minutes : minutes;
                    seconds = (seconds < 10) ? "0" + seconds : seconds;

                    el.innerHTML = `<i class="fa-solid fa-clock"></i> ${hours}h ${minutes}m ${seconds}s left`;
                }
            });

            if(needReRender) {
                allMatches.forEach(m => {
                    if (m.status === "Upcoming" && m.timestamp <= now) m.calculatedStatus = "Live";
                });
                renderMatches();
            }

        }, 1000);
    }

    // 🔥 MATCH CLICK MANAGER (EXACT FILE LINKS SET) 🔥
    function handleMatchClick(matchId, status) {
        let cleanStatus = status.toLowerCase(); 

        if (cleanStatus === 'upcoming') {
            // Bhai, user Contests par jayega
            console.log("Redirecting to: Contests.html?matchId=" + matchId);
            window.location.href = "Contests.html?matchId=" + matchId; 
        } 
        else if (cleanStatus === 'live') {
            // Time poora ho gaya, ab seedha leader.html
            alert("🔒 Match start ho chuka hai! Ab aap sirf Leaderboard dekh sakte hain.");
            window.location.href = "leader.html?matchId=" + matchId; 
        } 
        else if (cleanStatus === 'completed') {
            // Match khatam, seedha leader.html
            window.location.href = "leader.html?matchId=" + matchId;
        }
    }
</script>
</body>
</html>
