<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - Matches</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding-bottom: 20px; user-select: none; }
        
        /* 👑 VIP Header */
        .header { background: linear-gradient(135deg, #1a0033, #00ff88); padding: 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,255,136,0.3); color: #000; }
        .back-btn { font-size: 20px; cursor: pointer; font-weight: bold; }
        .app-title { text-align: center; font-weight: 900; font-size: 18px; flex-grow: 1; text-transform: uppercase; letter-spacing: 2px;}
        .wallet-icon { font-size: 18px; cursor: pointer; }

        /* 📑 TABS SYSTEM */
        .tabs-container { background: #111; display: flex; border-bottom: 2px solid #333; position: sticky; top: 54px; z-index: 99; }
        .tab { flex: 1; text-align: center; padding: 12px 0; font-size: 13px; font-weight: 900; color: #aaa; cursor: pointer; transition: 0.3s; border-bottom: 3px solid transparent; text-transform: uppercase; letter-spacing: 1px;}
        .tab.active { color: #00ff88; border-bottom: 3px solid #00ff88; background: linear-gradient(to top, rgba(0,255,136,0.1), transparent); }
        .tab-live { position: relative; }
        .live-dot { display: inline-block; width: 6px; height: 6px; background: #ff004c; border-radius: 50%; margin-left: 5px; margin-bottom: 2px; box-shadow: 0 0 5px #ff004c; animation: blink 1s infinite; display: none; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* 🏏 MATCH CARDS */
        .match-list { padding: 15px; }
        .match-card { background: linear-gradient(145deg, #1a1a2e, #111); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); cursor: pointer; position: relative; overflow: hidden; transition: 0.2s; }
        .match-card:active { transform: scale(0.98); }
        .match-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: #00ff88; }
        
        /* Specific borders based on status */
        .match-card.card-live::before { background: #ff004c; box-shadow: 0 0 10px #ff004c;}
        .match-card.card-completed::before { background: #ffd700; }

        .tour-name { font-size: 10px; color: #aaa; margin-bottom: 10px; border-bottom: 1px dashed #333; padding-bottom: 5px; font-weight: bold; text-transform: uppercase;}
        
        .teams-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .team { display: flex; align-items: center; gap: 10px; width: 35%; }
        .team-right { flex-direction: row-reverse; }
        .team-flag { width: 40px; height: 40px; background: #222; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 12px; color: #fff; border: 2px solid #555; }
        .team-name { font-size: 16px; font-weight: 900; color: #fff; }
        
        .match-time { flex: 1; text-align: center; }
        .time-box { background: rgba(0,255,136,0.1); border: 1px solid #00ff88; color: #00ff88; padding: 4px 10px; border-radius: 15px; font-size: 11px; font-weight: bold; display: inline-block; }
        .time-live { background: rgba(255,0,76,0.1); border-color: #ff004c; color: #ff004c; }
        .time-completed { background: rgba(255,215,0,0.1); border-color: #ffd700; color: #ffd700; }

        .footer-banner { background: #222; padding: 8px; border-radius: 6px; font-size: 10px; color: #ffd700; text-align: center; font-weight: bold; display: flex; justify-content: center; gap: 15px;}
        .footer-banner span { background: #111; padding: 3px 8px; border-radius: 4px; border: 1px solid #444;}

        .no-matches { text-align: center; padding: 40px 20px; color: #aaa; font-size: 14px; font-weight: bold; }
        .loader { text-align: center; padding: 50px 20px; color: #00ff88; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-arrow-left back-btn" onclick="history.back()"></i>
        <div class="app-title">KALYAN 11</div>
        <i class="fa-solid fa-wallet wallet-icon"></i>
    </div>

    <div class="tabs-container">
        <div class="tab active" id="tab-upcoming" onclick="switchTab('upcoming')">Upcoming</div>
        <div class="tab tab-live" id="tab-live" onclick="switchTab('live')">Live <span class="live-dot" id="live-indicator"></span></div>
        <div class="tab" id="tab-completed" onclick="switchTab('completed')">Completed</div>
    </div>

    <div class="match-list" id="match-container">
        <div class="loader"><i class="fa-solid fa-spinner fa-spin"></i> Loading Matches...</div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        let allMatches = [];
        let currentTab = 'upcoming'; // Default tab

        // 🔄 Real-time Listener for Matches
        db.ref('Game/Kalyan11/VIPMatches').on('value', snapshot => {
            allMatches = [];
            let hasLiveMatches = false;

            if (snapshot.exists()) {
                snapshot.forEach(child => {
                    let m = child.val();
                    m.id = child.key;
                    allMatches.push(m);
                    
                    // Check if there's any LIVE match to show the red blinking dot
                    let diff = m.timestamp - new Date().getTime();
                    if(diff <= 0 && diff > -14400000) { hasLiveMatches = true; }
                });
            }

            // Show/Hide Live Dot on the Tab
            document.getElementById('live-indicator').style.display = hasLiveMatches ? 'inline-block' : 'none';

            // Re-render based on selected tab
            renderMatches(currentTab);
        });

        // 🔘 Tab Switcher Logic
        function switchTab(tabName) {
            currentTab = tabName;
            
            // Update Active Class
            document.getElementById('tab-upcoming').classList.remove('active');
            document.getElementById('tab-live').classList.remove('active');
            document.getElementById('tab-completed').classList.remove('active');
            
            document.getElementById(`tab-${tabName}`).classList.add('active');
            
            renderMatches(tabName);
        }

        // 🖥️ Display Logic
        function renderMatches(tabName) {
            let container = document.getElementById('match-container');
            container.innerHTML = "";
            let now = new Date().getTime();

            // 🔍 Filter Matches Based on Time
            let filteredMatches = allMatches.filter(m => {
                let diff = m.timestamp - now;
                let isLive = diff <= 0 && diff > -14400000; // Match start ho gaya, aur 4 ghante poore nahi hue
                let isCompleted = diff <= -14400000;       // 4 Ghante se zyada ho gaya
                let isUpcoming = diff > 0;                 // Abhi start hona baaki hai

                if(tabName === 'live') return isLive;
                if(tabName === 'completed') return isCompleted;
                return isUpcoming;
            });

            // 📌 Sort Matches
            if(tabName === 'upcoming') {
                filteredMatches.sort((a, b) => a.timestamp - b.timestamp); // Jo jaldi hoga wo upar
            } else {
                filteredMatches.sort((a, b) => b.timestamp - a.timestamp); // Live/Completed mein naya wala upar
            }

            // ❌ No Matches Found
            if(filteredMatches.length === 0) {
                let msg = "No matches available.";
                if(tabName === 'live') msg = "Koi bhi match abhi LIVE nahi hai.";
                if(tabName === 'upcoming') msg = "Koi naya match schedule nahi hai.";
                if(tabName === 'completed') msg = "Koi completed match nahi hai.";
                
                container.innerHTML = `<div class="no-matches"><i class="fa-solid fa-ghost" style="font-size:30px; color:#333; margin-bottom:10px;"></i><br>${msg}</div>`;
                return;
            }

            // 📝 Generate HTML for each match
            filteredMatches.forEach(m => {
                let diff = m.timestamp - now;
                let statusHtml = "";
                let cardClass = "";

                // Time Box UI Logic
                if (tabName === 'live') {
                    statusHtml = `<div class="time-box time-live">🔴 LIVE NOW</div>`;
                    cardClass = "card-live";
                } else if (tabName === 'completed') {
                    statusHtml = `<div class="time-box time-completed">COMPLETED</div>`;
                    cardClass = "card-completed";
                } else {
                    statusHtml = `<div class="time-box" id="timer-${m.id}">Loading...</div>`;
                }

                container.innerHTML += `
                    <div class="match-card ${cardClass}" onclick="openMatch('${m.id}', '${m.team1}', '${m.team2}')">
                        <div class="tour-name">${m.name}</div>
                        
                        <div class="teams-row">
                            <div class="team">
                                <div class="team-flag">${m.team1.substring(0,3)}</div>
                                <div class="team-name">${m.team1.substring(0,3)}</div>
                            </div>
                            
                            <div class="match-time">
                                ${statusHtml}
                            </div>
                            
                            <div class="team team-right">
                                <div class="team-flag" style="border-color:#00ff88;">${m.team2.substring(0,3)}</div>
                                <div class="team-name">${m.team2.substring(0,3)}</div>
                            </div>
                        </div>

                        <div class="footer-banner">
                            <span>🏆 Mega Contests</span>
                            <span>⚡ Live Fantasy</span>
                        </div>
                    </div>
                `;
            });

            // Start Live Timers for Upcoming matches
            if(tabName === 'upcoming') { updateTimers(filteredMatches); }
        }

        // ⏱️ Countdown Timer Function (Only for Upcoming)
        let timerInterval;
        function updateTimers(matches) {
            clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                let now = new Date().getTime();
                
                matches.forEach(m => {
                    let el = document.getElementById(`timer-${m.id}`);
                    if(!el) return;

                    let diff = m.timestamp - now;
                    
                    if (diff <= 0) {
                        el.innerHTML = "🔴 MATCH STARTED";
                        el.className = "time-box time-live";
                        // Auto-refresh tabs to push it to LIVE section
                        setTimeout(() => { if(currentTab === 'upcoming') switchTab('upcoming'); }, 2000);
                        return;
                    }

                    let h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    let min = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    let sec = Math.floor((diff % (1000 * 60)) / 1000);
                    
                    if (diff > 86400000) {
                        let days = Math.floor(diff / (1000 * 60 * 60 * 24));
                        el.innerText = `${days} Days Left`;
                    } else if (h > 0) {
                        el.innerText = `${h}h ${min}m left`;
                    } else {
                        el.innerText = `${min}m ${sec}s left`;
                        el.style.color = "#ff004c"; 
                        el.style.borderColor = "#ff004c";
                        el.style.background = "rgba(255,0,76,0.1)";
                    }
                });
            }, 1000);
        }

        // 🔗 Redirect to Contests Page
        function openMatch(matchId, t1, t2) {
            window.location.href = `Contests.html?matchId=${matchId}&t1=${t1}&t2=${t2}`;
        }
    </script>
</body>
</html>
