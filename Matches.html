<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - Matches</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding-bottom: 80px; user-select: none; }
        .header { background: linear-gradient(135deg, #1a0033, #00ff88); padding: 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,255,136,0.3); color: #000; }
        .app-title { text-align: center; font-weight: 900; font-size: 18px; flex-grow: 1; text-transform: uppercase; letter-spacing: 2px;}
        
        .tabs-container { background: #111; display: flex; border-bottom: 2px solid #333; position: sticky; top: 54px; z-index: 99; overflow-x: auto; white-space: nowrap; }
        .tab { flex: 1; text-align: center; padding: 12px 15px; font-size: 13px; font-weight: 900; color: #aaa; cursor: pointer; border-bottom: 3px solid transparent; text-transform: uppercase; }
        .tab.active { color: #00ff88; border-bottom: 3px solid #00ff88; }

        .match-list { padding: 15px; }
        .match-card { background: linear-gradient(145deg, #1a1a2e, #111); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative; overflow: hidden; cursor: pointer; }
        .match-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: #00ff88; }
        
        .teams-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .team-flag { width: 40px; height: 40px; background: #222; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; color: #fff; border: 2px solid #555; }
        .time-box { background: rgba(0,255,136,0.1); border: 1px solid #00ff88; color: #00ff88; padding: 4px 10px; border-radius: 15px; font-size: 11px; font-weight: bold; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { text-align: center; color: #888; font-size: 11px; cursor: pointer; flex: 1; font-weight: bold; text-transform: uppercase; }
        .nav-item i { font-size: 20px; margin-bottom: 5px; display: block; }
        .nav-item.active { color: #00ff88; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-arrow-left" onclick="history.back()"></i>
        <div class="app-title">KALYAN 11</div>
        <i class="fa-solid fa-wallet"></i>
    </div>

    <div class="tabs-container">
        <div class="tab active" onclick="switchTab('upcoming')">Upcoming</div>
        <div class="tab" onclick="switchTab('live')">Live</div>
        <div class="tab" onclick="switchTab('completed')">Completed</div>
        <div class="tab" style="color: #ffd700;" onclick="window.location.href='MyContests.html'">My Matches</div>
    </div>

    <div class="match-list" id="match-container">
        <div style="text-align:center; padding:50px; color:#00ff88;">Loading Matches...</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active">
            <i class="fa-solid fa-house"></i>
            <span>Matches</span>
        </div>
        <div class="nav-item" onclick="window.location.href='MyContests.html'">
            <i class="fa-solid fa-trophy"></i>
            <span>My Contests</span>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        db.ref('Game/Kalyan11/VIPMatches').on('value', snap => {
            let container = document.getElementById('match-container');
            container.innerHTML = "";
            if(snap.exists()){
                snap.forEach(child => {
                    let m = child.val();
                    container.innerHTML += `
                        <div class="match-card" onclick="window.location.href='Contests.html?matchId=${child.key}'">
                            <div class="teams-row">
                                <div style="text-align:center"><div class="team-flag">${m.team1.substring(0,3)}</div><div>${m.team1}</div></div>
                                <div class="time-box">UPCOMING</div>
                                <div style="text-align:center"><div class="team-flag">${m.team2.substring(0,3)}</div><div>${m.team2}</div></div>
                            </div>
                        </div>`;
                });
            }
        });
    </script>
</body>
</html>
