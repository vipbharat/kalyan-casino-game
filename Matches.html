<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - Live Matches</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding-bottom: 70px; user-select: none; }
        .header { background: linear-gradient(135deg, #1a0033, #4a00e0); padding: 15px; text-align: center; font-weight: 900; font-size: 18px; color: #ffd700; border-bottom: 2px solid #ffd700; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .match-card { background: #111; margin: 15px; border-radius: 10px; border: 1px solid #333; padding: 15px; text-align: center; cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .match-card:active { transform: scale(0.98); border-color: #ffd700; }
        
        .series-name { font-size: 11px; color: #aaa; margin-bottom: 12px; border-bottom: 1px dashed #333; padding-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .teams { display: flex; justify-content: space-between; align-items: center; font-size: 20px; font-weight: 900; margin-bottom: 10px; }
        .vs { color: #ff004c; font-size: 12px; background: #222; padding: 4px 8px; border-radius: 50%; }
        
        .time-badge { font-size: 11px; font-weight: bold; background: rgba(0,255,136,0.1); color: #00ff88; padding: 6px 12px; border-radius: 4px; display: inline-block; border: 1px solid #00ff88; }
        .time-badge.upcoming { background: rgba(255,215,0,0.1); color: #ffd700; border-color: #ffd700; }
        
        .loader { text-align: center; margin-top: 50px; color: #ffd700; font-weight: bold; }
        .no-match { text-align: center; margin-top: 50px; color: #aaa; font-size: 14px; padding: 20px; }
    </style>
</head>
<body>

    <div class="header">
        🏏 KALYAN 11 MATCHES
    </div>

    <div id="matches-list">
        <div class="loader"><i class="fa-solid fa-spinner fa-spin"></i> Loading Matches...</div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        db.ref('Game/Kalyan11/LiveMatches').on('value', snapshot => {
            const container = document.getElementById('matches-list');
            container.innerHTML = "";
            const matches = snapshot.val();

            if(!matches) {
                container.innerHTML = "<div class='no-match'>⚠️ No Matches Available!</div>"; 
                return;
            }

            const now = new Date().getTime();
            const pastLimit = now - (24 * 60 * 60 * 1000); // 24 ghante purane matches hata do
            
            let matchesArray = [];

            // 1. Pehle saare matches ko ek Array mein daalo
            Object.entries(matches).forEach(([id, m]) => {
                let matchDateStr = m.date || m.dateTimeGMT;
                let matchTime = matchDateStr ? new Date(matchDateStr).getTime() : now;

                // Sirf wahi match lo jo nikal nahi gaye hain
                if (matchTime >= pastLimit) {
                    m.id = id;
                    m.matchTime = matchTime;
                    m.matchDateStr = matchDateStr;
                    matchesArray.push(m);
                }
            });

            // 2. 🟢 SMART SORTING: Jo sabse jaldi aane wala hai, use sabse upar rakho
            matchesArray.sort((a, b) => a.matchTime - b.matchTime);

            // Agar array khali hai
            if(matchesArray.length === 0) {
                container.innerHTML = `<div class="no-match">
                    <i class="fa-solid fa-calendar-xmark" style="font-size: 30px; color: #ff004c; margin-bottom: 10px;"></i><br>
                    Koi naya match nahi mila! API check karein.
                </div>`;
                return;
            }

            // 3. Screen par dikhao
            matchesArray.forEach(m => {
                let status = m.status || "Upcoming";
                let t1 = m.team1 ? String(m.team1).substring(0,3).toUpperCase() : "TM1";
                let t2 = m.team2 ? String(m.team2).substring(0,3).toUpperCase() : "TM2";
                
                let displayTime = "Time TBA";
                if(m.matchDateStr) {
                    let dateObj = new Date(m.matchDateStr);
                    let options = { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
                    displayTime = "Starts: " + dateObj.toLocaleString('en-IN', options);
                }

                let badgeClass = status.toLowerCase().includes("upcoming") ? "upcoming" : "";
                let clickAction = `window.location.href='Contests.html?matchId=${m.id}'`;

                container.innerHTML += `
                    <div class="match-card" onclick="${clickAction}">
                        <div class="series-name">${m.name || 'T20 Cricket Match'}</div>
                        <div class="teams">
                            <div>${t1}</div>
                            <div class="vs">V/S</div>
                            <div>${t2}</div>
                        </div>
                        <div class="time-badge ${badgeClass}"><i class="fa-solid fa-bolt"></i> ${displayTime}</div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
