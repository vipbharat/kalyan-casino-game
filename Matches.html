<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALYAN VIP - MATCHES MANAGER 🏏</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050510; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .header { text-align: center; border-bottom: 2px solid #00b0ff; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #00b0ff; font-size: 26px; text-transform: uppercase; text-shadow: 0 0 15px rgba(0, 176, 255, 0.5);}
        .box { background: #1a1a2e; padding: 20px; border-radius: 10px; border: 1px solid #444; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);}
        h3 { margin-top: 0; font-size: 16px; color: #00ff88; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 15px;}
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; text-transform: uppercase;}
        input, select { width: calc(100% - 24px); padding: 12px; background: #000; border: 1px solid #555; color: #fff; border-radius: 5px; font-weight: bold; font-size: 14px;}
        input:focus, select:focus { outline: none; border-color: #00b0ff; }
        
        .btn-add { width: 100%; padding: 14px; background: linear-gradient(90deg, #00b0ff, #00e676); color: #000; font-weight: 900; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase; transition: 0.3s; box-shadow: 0 4px 10px rgba(0, 230, 118, 0.3);}
        .btn-add:active { transform: scale(0.98); }
        
        .match-card { background: #000; border: 1px solid #555; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #00b0ff;}
        .match-info h4 { margin: 0 0 5px 0; color: #fff; font-size: 18px;}
        .match-info p { margin: 0; color: #aaa; font-size: 12px;}
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; margin-left: 10px;}
        .badge.upcoming { background: #ffea00; color: #000; }
        .badge.live { background: #ff004c; color: #fff; animation: blink 1.5s infinite;}
        .badge.completed { background: #00e676; color: #000; }
        
        @keyframes blink { 50% { opacity: 0.5; } }
        
        .btn-delete { background: #ff1744; color: #fff; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.3s;}
        .btn-delete:hover { background: #d50000; }
        
        #match-list-container { max-height: 500px; overflow-y: auto; padding-right: 5px;}
        #match-list-container::-webkit-scrollbar { width: 6px; }
        #match-list-container::-webkit-scrollbar-thumb { background: #00b0ff; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-trophy"></i> MATCHES MANAGER</h1>
    </div>

    <div class="box">
        <h3><i class="fa-solid fa-plus-circle"></i> Create New Match</h3>
        <div class="form-group">
            <label>Match ID (Same as Cricbuzz ID)</label>
            <input type="text" id="match-id" placeholder="e.g. 149673">
        </div>
        <div class="form-group">
            <label>Match Title (Teams)</label>
            <input type="text" id="match-title" placeholder="e.g. RCB vs CSK">
        </div>
        <div class="form-group">
            <label>Match Date & Time</label>
            <input type="datetime-local" id="match-time">
        </div>
        <div class="form-group">
            <label>Status</label>
            <select id="match-status">
                <option value="upcoming">Upcoming</option>
                <option value="live">Live</option>
                <option value="completed">Completed</option>
            </select>
        </div>
        <button class="btn-add" onclick="addMatch()"><i class="fa-solid fa-check"></i> Add Match to App</button>
    </div>

    <div class="box">
        <h3><i class="fa-solid fa-list"></i> All Matches</h3>
        <div id="match-list-container">
            </div>
    </div>

<script>
    // FIREBASE SETUP
    const firebaseConfig = { 
        apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", 
        databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com" 
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    // MATCH ADD KARNE KA FUNCTION
    function addMatch() {
        let id = document.getElementById('match-id').value.trim();
        let title = document.getElementById('match-title').value.trim();
        let time = document.getElementById('match-time').value;
        let status = document.getElementById('match-status').value;

        if(!id || !title || !time) {
            alert("Bhai, saari details bharna zaroori hai!");
            return;
        }

        let matchData = {
            matchId: id,
            title: title.toUpperCase(),
            dateTime: time,
            timestamp: new Date(time).getTime(),
            status: status
        };

        db.ref(`Game/Kalyan11/Matches/${id}`).set(matchData)
        .then(() => {
            alert("✅ Match Successfully Added!");
            document.getElementById('match-id').value = "";
            document.getElementById('match-title').value = "";
            document.getElementById('match-time').value = "";
        })
        .catch(err => {
            console.error(err);
            alert("❌ Error aagaya match add karne mein.");
        });
    }

    // MATCH DELETE KARNE KA FUNCTION
    function deleteMatch(id) {
        if(confirm(`Kya aap sach mein Match ID ${id} ko delete karna chahte hain?`)) {
            db.ref(`Game/Kalyan11/Matches/${id}`).remove()
            .then(() => alert("🗑️ Match Deleted!"))
            .catch(err => console.log(err));
        }
    }

    // MATCHES DISPLAY KARNE KA FUNCTION
    db.ref(`Game/Kalyan11/Matches`).orderByChild('timestamp').on('value', (snapshot) => {
        let listContainer = document.getElementById('match-list-container');
        listContainer.innerHTML = "";

        if(snapshot.exists()) {
            let matches = [];
            snapshot.forEach(child => {
                matches.push(child.val());
            });
            
            // Latest match upar dikhane ke liye reverse
            matches.reverse();

            matches.forEach(match => {
                let formattedTime = new Date(match.dateTime).toLocaleString('en-IN', {
                    day: '2-digit', month: 'short', year: 'numeric',
                    hour: '2-digit', minute: '2-digit', hour12: true
                });

                let statusBadge = `<span class="badge ${match.status}">${match.status}</span>`;

                listContainer.innerHTML += `
                    <div class="match-card">
                        <div class="match-info">
                            <h4>${match.title} ${statusBadge}</h4>
                            <p><i class="fa-solid fa-clock"></i> ${formattedTime} | ID: ${match.matchId}</p>
                        </div>
                        <button class="btn-delete" onclick="deleteMatch('${match.matchId}')"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
            });
        } else {
            listContainer.innerHTML = `<p style="color:#aaa; text-align:center;">Abhi tak koi match add nahi kiya gaya hai.</p>`;
        }
    });
</script>
</body>
</html>
