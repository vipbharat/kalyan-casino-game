    <script>
        // === FIREBASE LIVE SETUP ===
        const firebaseConfig = {
            apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", 
            databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com",
            projectId: "kalyan-casino"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let userID = localStorage.getItem('userPhone') || "user_1"; 
        let depBal = 0, winBal = 0, bonBal = 0, totalBal = 0;

        function syncWallet() {
            db.ref(`users/${userID}`).on('value', (snap) => {
                const data = snap.val() || {};
                depBal = parseFloat(data.balance || 0);
                winBal = parseFloat(data.winning_balance || 0);
                bonBal = parseFloat(data.bonus_balance || 0);
                totalBal = depBal + winBal + bonBal; 
                document.getElementById('user-balance').innerText = "₹" + totalBal.toFixed(2);
            });
        }

        // 3D Background
        const canvasBg = document.getElementById('bg-canvas');
        const ctxBg = canvasBg.getContext('2d');
        let w = canvasBg.width = window.innerWidth;
        let h = canvasBg.height = window.innerHeight;
        let particles = [];
        for(let i=0; i<150; i++) { particles.push({ x: (Math.random() - 0.5) * w * 2, y: (Math.random() - 0.5) * h * 2, z: Math.random() * 1000 }); }
        function animate3D() {
            ctxBg.fillStyle = 'rgba(5, 5, 15, 0.5)'; ctxBg.fillRect(0, 0, w, h);
            for(let p of particles) {
                p.z -= 4; 
                if(p.z <= 0) { p.z = 1000; p.x = (Math.random() - 0.5) * w * 2; p.y = (Math.random() - 0.5) * h * 2; }
                let sx = (p.x / p.z) * 400 + w/2; let sy = (p.y / p.z) * 400 + h/2; let size = 1500 / p.z; 
                ctxBg.fillStyle = (Math.random()>0.5)? '#FFD700' : '#FFF';
                ctxBg.beginPath(); ctxBg.arc(sx, sy, size, 0, Math.PI*2); ctxBg.fill();
            }
            requestAnimationFrame(animate3D);
        }
        animate3D();

        // Music & Sounds
        const bg_music = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
        bg_music.loop = true; bg_music.volume = 0.6; 
        const s_bet = new Audio('https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg');
        const s_spin = new Audio('https://actions.google.com/sounds/v1/mechanics/ratchet_wrench.ogg'); 
        const s_win = new Audio('https://actions.google.com/sounds/v1/cartoon/clown_horn.ogg');
        
        let gameStarted = false;
        function startGame() {
            if(gameStarted) return;
            gameStarted = true;
            document.getElementById('startScreen').style.display = 'none'; 
            bg_music.play().catch(e => console.log(e)); 
            syncWallet(); 
            
            listenServer(); 
            startBots();
        }

        setInterval(() => { document.getElementById('onlineCount').innerText = Math.floor(Math.random() * 201) + 400; }, 3000);

        let canBet=false, rot=0, isSpinning = false; 
        let yBets = {r:0,b:0,g:0,p:0,o:0}; 
        let tBets = {r:0,b:0,g:0,p:0,o:0}; 
        
        let currentChip = 100;
        let chipColors = {100: '#7f8c8d', 500: '#2980b9', 1000: '#8e44ad', 5000: '#f1c40f'};
        let colorIdMap = { "#C0392B": "r", "#2980B9": "b", "#27AE60": "g", "#8E44AD": "p", "#D35400": "o" };

        function setChip(amt) {
            currentChip = amt;
            s_bet.currentTime = 0; s_bet.play().catch(e=>{});
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            document.getElementById('ch-'+amt).classList.add('active');
        }

        // Draw Wheel Logic
        const ctx=document.getElementById('c').getContext('2d'), tmr=document.getElementById('t'), msg=document.getElementById('msg');
        const cols=["#C0392B","#2980B9","#27AE60","#8E44AD","#D35400"];
        let pr=[], bg=[], tc=[], m=200;
        for(let i=0;i<28;i++){
            if(i===0){ pr.push("00"); bg.push("#111"); tc.push("#FFF"); }
            else if(i===14){ pr.push("50% Minus"); bg.push("#FFD700"); tc.push("#000"); }
            else{ pr.push("100 Ka "+m); m+=200; bg.push(cols[(i-1)%5]); tc.push("#FFF"); }
        }
        
        function draw(){
            let cx=155, a=Math.PI*2/28;
            for(let i=0;i<28;i++){
                ctx.beginPath(); ctx.fillStyle=bg[i]; ctx.moveTo(cx,cx); ctx.arc(cx,cx,cx,i*a,(i+1)*a);
                ctx.fill(); ctx.strokeStyle="#222"; ctx.stroke(); ctx.save(); ctx.translate(cx,cx); ctx.rotate(i*a+a/2);
                ctx.textAlign="right"; ctx.fillStyle=tc[i]; ctx.font="bold 11px Arial";
                ctx.fillText(pr[i],cx-10,4); ctx.restore();
            }
        } draw();

        function dropVisualChip(c_id, amt) {
            let box = document.getElementById('box-'+c_id);
            let chip = document.createElement('div');
            chip.className = 'mini-chip';
            chip.style.background = chipColors[amt] || '#fff';
            if(amt >= 1000) { chip.innerText = (amt/1000) + 'K'; if(amt === 5000) chip.style.color = '#000'; } 
            else { chip.innerText = amt; }
            chip.style.left = Math.floor(Math.random() * 50 + 15) + '%';
            chip.style.top = Math.floor(Math.random() * 40 + 20) + '%';
            box.appendChild(chip);
        }

        function throwChip(c_id, amt, isPlayer) {
            let box = document.getElementById('box-'+c_id);
            let rect = box.getBoundingClientRect();
            let chip = document.createElement('div');
            chip.className = 'flying-chip';
            chip.style.background = chipColors[amt] || '#fff';
            if(amt >= 1000) { chip.innerText = (amt/1000) + 'K'; if(amt === 5000) chip.style.color = '#000'; } 
            else { chip.innerText = amt; }
            
            if (isPlayer) { chip.style.left = '50vw'; chip.style.top = '95vh'; } 
            else { chip.style.left = (Math.random() > 0.5) ? '-50px' : (window.innerWidth + 50) + 'px'; chip.style.top = (Math.random() * (window.innerHeight/2)) + 'px'; }
            
            document.body.appendChild(chip);
            
            setTimeout(() => {
                chip.style.left = (rect.left + Math.random() * (rect.width - 24)) + 'px';
                chip.style.top = (rect.top + Math.random() * (rect.height - 30) + 20) + 'px';
                chip.style.transform = `rotate(${Math.random()*360}deg)`; 
            }, 50);
            
            setTimeout(() => { chip.remove(); dropVisualChip(c_id, amt); }, 450);
        }

        function bet(c){
            if(!canBet) return;
            if(totalBal >= currentChip){ 
                
                let remain = currentChip;
                let newDep = depBal, newWin = winBal;
                if(newDep >= remain) { newDep -= remain; } 
                else { remain -= newDep; newDep = 0; newWin -= remain; }
                
                db.ref(`users/${userID}/balance`).set(newDep);
                db.ref(`users/${userID}/winning_balance`).set(newWin);
                
                db.ref(`Game/MegaSpin/Bets/${userID}`).child(c).set(firebase.database.ServerValue.increment(currentChip));
                
                yBets[c]+=currentChip; tBets[c]+=currentChip; 
                s_bet.currentTime = 0; s_bet.play().catch(e=>{}); 
                document.getElementById('y-'+c).innerText=yBets[c]; 
                document.getElementById('t-'+c).innerText=tBets[c]; 
                
                throwChip(c, currentChip, true); 
            } else alert("Balance kam hai! Recharge Karein.");
        }

        function startBots() {
            setInterval(() => {
                if(!canBet) return;
                let clrs = ['r','b','g','p','o']; let bAmt = [100, 100, 500, 500, 1000, 5000]; 
                let ranColor = clrs[Math.floor(Math.random() * clrs.length)]; let ranAmt = bAmt[Math.floor(Math.random() * bAmt.length)];
                tBets[ranColor] += ranAmt; document.getElementById('t-'+ranColor).innerText = tBets[ranColor];
                throwChip(ranColor, ranAmt, false); 
            }, 350); 
        }

        function startNewRound() {
            yBets = {r:0,b:0,g:0,p:0,o:0}; tBets = {r:0,b:0,g:0,p:0,o:0}; 
            ['r','b','g','p','o'].forEach(c => {
                document.getElementById('y-'+c).innerText = '0';
                document.getElementById('t-'+c).innerText = '0';
                document.getElementById('box-'+c).classList.remove('win-glow');
                document.getElementById('box-'+c).querySelectorAll('.mini-chip').forEach(e => e.remove());
            });
            msg.style.display = "none";
        }

        // 🔥 NAYA PAYOUT LOGIC: Ab ye 'snapshot' se amount lega 🔥
        function checkPayout(prizeIndex, betsSnapshot) {
            let wonPrize = pr[prizeIndex];
            let wonColor = bg[prizeIndex];
            let wonId = colorIdMap[wonColor];
            let finalWinAmt = 0;

            if (wonPrize === "00") {
                // Kuch nahi milega
            } else if (wonPrize === "50% Minus") {
                let totalUserBet = betsSnapshot.r + betsSnapshot.b + betsSnapshot.g + betsSnapshot.p + betsSnapshot.o;
                if (totalUserBet > 0) finalWinAmt = totalUserBet * 0.5;
            } else {
                if (wonId && betsSnapshot[wonId] > 0) {
                    let multiplier = parseInt(wonPrize.split("Ka ")[1]) / 100; 
                    finalWinAmt = betsSnapshot[wonId] * multiplier;
                }
            }

            if(finalWinAmt > 0) {
                // Seedha current winBal (live fetch) mein jode ga
                db.ref(`users/${userID}/winning_balance`).set(winBal + finalWinAmt);
                let p = document.getElementById('win-popup'); 
                p.innerText = "+₹" + finalWinAmt.toLocaleString(); 
                p.classList.add('show');
                setTimeout(() => p.classList.remove('show'), 2000);
            }
            if(wonId) document.getElementById('box-'+wonId).classList.add('win-glow'); 
        }

        function listenServer() {
            db.ref('Game/MegaSpin/Status').on('value', (snap) => {
                let status = snap.val();
                if (!status) return;

                let t = status.timer;
                let state = status.state; 

                if (state === 'betting') {
                    if (isSpinning) {
                        isSpinning = false;
                        startNewRound();
                    }
                    
                    canBet = true;
                    msg.style.display = "none";
                    tmr.innerText = t;
                    
                    if (t <= 5) {
                        tmr.style.color = "#F33";
                        tmr.style.textShadow = "0 0 10px red";
                    } else {
                        tmr.style.color = "#0f0";
                        tmr.style.textShadow = "none";
                    }
                } 
                else if (state === 'spinning' && !isSpinning) {
                    canBet = false;
                    isSpinning = true;
                    tmr.innerText = "00";
                    
                    // 🔥 SNAPSHOT: Wheel ghumte hi bets ki copy save ho jayegi 🔥
                    let snapshotBets = { ...yBets };
                    
                    msg.innerHTML="Bets Closed!<br><span style='font-size:18px;color:#ccc'>Spinning...</span>"; 
                    msg.style.display="block";
                    
                    s_spin.currentTime = 0; s_spin.play().catch(e=>{}); s_spin.loop = true; 
                    
                    let prizeIndex = status.winIndex;
                    if (prizeIndex === undefined || prizeIndex === null) prizeIndex = 0;
                    
                    const sliceAngle = 360 / 28;
                    const stopAngle = (360 - (prizeIndex * sliceAngle)) - (sliceAngle / 2) - 270;
                    
                    let d = rot + (360 * 5) + stopAngle; 
                    document.getElementById('c').style.transform = `rotate(${d}deg)`;
                    
                    setTimeout(()=>{
                        s_spin.pause(); s_win.play().catch(e=>{}); 
                        let won = pr[prizeIndex];
                        msg.innerHTML = "Result:<br><span style='color:#0f0;font-size:36px;'>" + won + "</span>";
                        rot = d;
                        
                        // Copy ki hui bets ka hisaab lagana
                        checkPayout(prizeIndex, snapshotBets); 
                    }, 4500); 
                }
            });
        }
    </script>
