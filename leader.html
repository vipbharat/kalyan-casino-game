<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Player Stats</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { background: #12122b; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .player-card { background: #1e1e38; padding: 15px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .name-box { flex: 1; }
        .p-name { font-size: 16px; font-weight: bold; margin: 0 0 5px 0; }
        .p-status { font-size: 11px; color: #00ff88; font-weight: bold; }
        .p-status.out { color: #ff004c; } /* Jo out ho gaya wo laal */
        .stats { font-size: 12px; color: #aaa; background: #111; padding: 3px 8px; border-radius: 5px; display: inline-block; margin-top: 5px;}
        .points-box { text-align: right; }
        .pts-number { font-size: 22px; color: #ffd700; font-weight: 900; margin: 0; }
        .pts-label { font-size: 10px; color: #888; }
    </style>
</head>
<body>

    <h2 style="color: #ffd700; text-align: center;">🔥 LIVE RANKING 🔥</h2>
    <div id="players-list">
        <p style="text-align: center; color: #aaa;">Loading Live Stats...</p>
    </div>

<script>
    // Apni API key daalein
    const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    // MATCH ID YAHAN DAALEIN
    const matchId = "149684"; 

    // Firebase .on() lagane se ye har second auto-refresh hoga
    db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).on('value', (snapshot) => {
        if(!snapshot.exists()) return;

        let playersObj = snapshot.val();
        let playersArray = [];

        // 1. Saare khiladiyon ko ek line (Array) mein lana
        for (let key in playersObj) {
            playersArray.push({
                name: playersObj[key].name,
                points: playersObj[key].points || 0,
                runs: playersObj[key].runs || 0,
                wickets: playersObj[key].wickets || 0,
                status: playersObj[key].playingStatus || 'waiting'
            });
        }

        // 🔥 2. ASLI JAADU (SORTING): Jiske point zyada, wo upar! 🔥
        playersArray.sort((a, b) => b.points - a.points);

        // 3. Screen par dikhana
        let listHtml = "";
        playersArray.forEach(p => {
            // Agar khiladi kuch nahi kar raha toh usko dim dikhayenge
            let statusClass = (p.points > 0) ? "p-status" : "p-status out";
            let statusText = (p.points > 0) ? "🏏 Active" : "Waiting/Out";

            listHtml += `
            <div class="player-card">
                <div class="name-box">
                    <p class="p-name">${p.name} <span class="${statusClass}">● ${statusText}</span></p>
                    <div class="stats">🏏 R: ${p.runs} | 🎯 W: ${p.wickets}</div>
                </div>
                <div class="points-box">
                    <p class="pts-number">${p.points}</p>
                    <p class="pts-label">PTS</p>
                </div>
            </div>`;
        });

        document.getElementById('players-list').innerHTML = listHtml;
    });
</script>
</body>
</html>
