<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - Live Leaderboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding-bottom: 20px; user-select: none; }
        .header { background: linear-gradient(135deg, #1a0033, #4a00e0); padding: 15px; display: flex; align-items: center; border-bottom: 2px solid #ffd700; position: sticky; top:0; z-index:100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .back-btn { font-size: 20px; margin-right: 15px; cursor: pointer; color: #ffd700; }
        .title { font-weight: 900; font-size: 18px; text-transform: uppercase; }
        .sub-title { font-size: 11px; color: #00ff88; font-weight: bold; margin-top: 3px; }
        
        .prize-pool-banner { background: #111; padding: 15px; border-bottom: 1px solid #333; }
        .pool-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;}
        .pool-flex h2 { margin: 0; color: #ffd700; font-size: 20px; }
        .pool-flex span { font-size: 12px; color: #aaa; border: 1px solid #444; padding: 3px 8px; border-radius: 4px; background: #222;}
        .progress-bar-bg { width: 100%; height: 6px; background: #333; border-radius: 10px; overflow: hidden; margin-bottom: 5px; }
        .progress-bar-fill { height: 100%; background: #ff004c; border-radius: 10px; transition: width 0.5s ease-in-out; }
        .spots-left { font-size: 11px; color: #aaa; display: flex; justify-content: space-between; }
        .spots-left span.red { color: #ff004c; font-weight: bold; }

        .leaderboard-container { padding: 15px; }
        
        .user-row { background: linear-gradient(145deg, #1e1e2e, #111); border: 1px solid #333; border-radius: 10px; padding: 12px 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        .user-row.my-team { border-left: 4px solid #00ff88; background: linear-gradient(145deg, #113322, #111); box-shadow: 0 0 15px rgba(0,255,136,0.2); }

        .rank-circle { width: 35px; height: 35px; background: #222; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 14px; color: #aaa; border: 2px solid #555; }
        .rank-1 .rank-circle { background: #ffd700; color: #000; border-color: #ffd700; }
        .rank-2 .rank-circle { background: #c0c0c0; color: #000; border-color: #c0c0c0; }
        .rank-3 .rank-circle { background: #cd7f32; color: #000; border-color: #cd7f32; }

        .user-details { flex: 1; margin-left: 15px; }
        .user-name { font-weight: bold; font-size: 15px; color: #fff; display: flex; align-items: center;}
        .my-tag { background: #00ff88; color: #000; font-size: 9px; padding: 2px 5px; border-radius: 3px; margin-left: 5px; font-weight: bold; }
        
        .cvc-info { font-size: 11px; color: #aaa; margin-top: 4px; display: flex; gap: 10px;}
        .cvc-info span { background: #222; padding: 2px 6px; border-radius: 4px; border: 1px solid #333;}
        .cvc-info span.c { color: #ffd700; border-color: #554800;}
        .cvc-info span.vc { color: #c0c0c0; border-color: #444;}

        .points-box { text-align: right; }
        .pts-value { font-size: 20px; font-weight: 900; color: #00ff88; }
        .pts-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

        .loading-text { text-align: center; color: #ffd700; font-weight: bold; margin-top: 30px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-arrow-left back-btn" onclick="history.back()"></i>
        <div>
            <div class="title">LEADERBOARD</div>
            <div class="sub-title" id="live-status"><i class="fa-solid fa-clock"></i> Waiting for Live Data...</div>
        </div>
    </div>

    <div class="prize-pool-banner" id="dynamic-banner">
        <div style="text-align:center; font-size:12px; color:#aaa;"><i class="fa-solid fa-spinner fa-spin"></i> Loading Contest...</div>
    </div>

    <div class="leaderboard-container" id="leaderboard-list">
        <div class="loading-text"><i class="fa-solid fa-spinner fa-spin"></i> Fetching Real Teams...</div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        
        const myPhone = localStorage.getItem('userPhone') || localStorage.getItem('phone');
        
        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('matchId');
        
        let entryFee = parseInt(localStorage.getItem('kalyan_entry_fee')) || parseInt(urlParams.get('entry')) || 49;
        let totalSpots = 150000; 
        let contestName = "🏆 Mega Contest";

        // Smart Logic for Contest Name and Spots based on Entry Fee
        if(entryFee <= 49) {
            totalSpots = 150000; contestName = "🏆 Mega Contest";
        } else if(entryFee == 99) {
            totalSpots = 50000; contestName = "🔥 Hot Contest";
        } else if(entryFee > 99 && entryFee <= 299) {
            totalSpots = 10000; contestName = "⚔️ Grand Battle";
        } else if(entryFee >= 575) {
            totalSpots = 2; contestName = "🤝 H2H Battle";
        }

        const listContainer = document.getElementById('leaderboard-list');

        function fetchLeaderboard() {
            // Step 1: Pehle saare players ka data uthao (Taaki C/VC ka asli naam nikal sake)
            db.ref('Game/Kalyan11/MatchPlayers/' + matchId).once('value', playerSnap => {
                let allPlayersData = playerSnap.val() || {};

                // Step 2: Ab teams uthao (Sirf Asli log)
                db.ref('Game/Kalyan11/Contests/' + matchId + '/Teams').on('value', teamSnap => {
                    let realTeamsArray = [];
                    
                    if (teamSnap.exists()) {
                        teamSnap.forEach(child => {
                            let teamInfo = child.val();
                            
                            // Sirf usi contest ke log dikhenge jiski fees match karti ho
                            if(parseInt(teamInfo.entry_paid || 49) === entryFee) {
                                
                                // Asli Khiladiyon ka naam nikalne ka Jadoo
                                let cName = "Unknown";
                                let vcName = "Unknown";
                                
                                if (allPlayersData[teamInfo.captain]) {
                                    let p = allPlayersData[teamInfo.captain].name;
                                    cName = p.split(' ')[0][0] + ". " + (p.split(' ')[1] || p);
                                }
                                if (allPlayersData[teamInfo.viceCaptain]) {
                                    let p = allPlayersData[teamInfo.viceCaptain].name;
                                    vcName = p.split(' ')[0][0] + ". " + (p.split(' ')[1] || p);
                                }

                                realTeamsArray.push({
                                    phone: teamInfo.phone,
                                    points: teamInfo.total_points || 0,
                                    cName: cName,
                                    vcName: vcName
                                });
                            }
                        });
                    }

                    // Sort by Points
                    realTeamsArray.sort((a, b) => b.points - a.points);

                    // 🎯 UPDATE DYNAMIC BANNER WITH REAL SPOTS
                    let realFilledSpots = realTeamsArray.length;
                    let fillPercent = (realFilledSpots / totalSpots) * 100;
                    
                    document.getElementById('dynamic-banner').innerHTML = `
                        <div class="pool-flex">
                            <h2>${contestName}</h2>
                            <span>Entry: ₹${entryFee}</span>
                        </div>
                        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${fillPercent}%"></div></div>
                        <div class="spots-left">
                            <span class="red">${realFilledSpots.toLocaleString('en-IN')} Spots filled</span>
                            <span>${totalSpots.toLocaleString('en-IN')} Spots</span>
                        </div>
                    `;

                    // DISPLAY TEAMS
                    listContainer.innerHTML = "";
                    if(realTeamsArray.length === 0) {
                        listContainer.innerHTML = `<div style="text-align:center; color:#aaa; margin-top:50px;">Koi team nahi mili. Sabse pehle aap join karein!</div>`;
                        return;
                    }

                    realTeamsArray.forEach((team, index) => {
                        let rank = index + 1; 
                        let isMyTeam = (team.phone === myPhone);
                        
                        // Privacy ke liye dusron ka number chupao
                        let hidePhone = team.phone.substring(0, 4) + "****" + team.phone.substring(8, 10);
                        let displayName = isMyTeam ? `You (${team.phone}) <span class="my-tag">MY TEAM</span>` : hidePhone;
                        
                        let highlightClass = isMyTeam ? "my-team" : "";
                        let rankClass = rank <= 3 ? "rank-" + rank : "";

                        listContainer.innerHTML += `
                            <div class="user-row ${rankClass} ${highlightClass}">
                                <div class="rank-circle">${rank}</div>
                                <div class="user-details">
                                    <div class="user-name">${displayName}</div>
                                    <div class="cvc-info">
                                        <span class="c">C: ${team.cName}</span>
                                        <span class="vc">VC: ${team.vcName}</span>
                                    </div>
                                </div>
                                <div class="points-box">
                                    <div class="pts-value">${team.points.toFixed(1)}</div>
                                    <div class="pts-label">Points</div>
                                </div>
                            </div>
                        `;
                    });
                });
            });
        }

        fetchLeaderboard();
    </script>
</body>
</html>
