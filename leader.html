<script>
    const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const matchId = urlParams.get('matchId');
    const userPhone = localStorage.getItem('userPhone') || localStorage.getItem('phone');

    document.getElementById('btn-myteam').onclick = function() {
        if(matchId) window.location.href = `MyTeam.html?matchId=${matchId}`;

    const indianNames = ["Rahul", "Amit", "Vikram", "Pooja", "Neha", "Suresh", "Ramesh", "Deepak", "Ravi", "Sunil", "Anjali", "Karan", "Rohit", "Mohit", "Sanjay", "Vijay", "Priya", "Raj", "Manoj"];

    // 🔥 CONTEST PRIZE DATA 🔥
    const allContests = [
        { cat: "Mega", fee: 99, pool: "₹5 Crore", spots: 500000, winners: 300000, topPrize: "₹1 Crore" },
        { cat: "Mega", fee: 39, pool: "₹25 Lakh", spots: 110000, winners: 45000, topPrize: "₹25 Lakh" },

        { cat: "H2H", fee: 25000, pool: "₹45,000", spots: 2, winners: 1, topPrize: "₹45,000" },
        { cat: "H2H", fee: 15000, pool: "₹27,000", spots: 2, winners: 1, topPrize: "₹27,000" },
        { cat: "H2H", fee: 10000, pool: "₹18,000", spots: 2, winners: 1, topPrize: "₹18,000" },
        { cat: "H2H", fee: 5750, pool: "₹10,000", spots: 2, winners: 1, topPrize: "₹10,000" },
        { cat: "H2H", fee: 2875, pool: "₹5,000", spots: 2, winners: 1, topPrize: "₹5,000" },
        { cat: "H2H", fee: 1749, pool: "₹3,000", spots: 2, winners: 1, topPrize: "₹3,000" },
        { cat: "H2H", fee: 1150, pool: "₹2,000", spots: 2, winners: 1, topPrize: "₹2,000" },
        { cat: "H2H", fee: 575, pool: "₹1,000", spots: 2, winners: 1, topPrize: "₹1,000" },
        { cat: "H2H", fee: 299, pool: "₹500", spots: 2, winners: 1, topPrize: "₹500" },
        { cat: "H2H", fee: 119, pool: "₹200", spots: 2, winners: 1, topPrize: "₹200" },
        { cat: "H2H", fee: 59, pool: "₹100", spots: 2, winners: 1, topPrize: "₹100" },
        { cat: "H2H", fee: 29, pool: "₹50", spots: 2, winners: 1, topPrize: "₹50" },
        { cat: "H2H", fee: 21, pool: "₹35", spots: 2, winners: 1, topPrize: "₹35" },
        { cat: "H2H", fee: 15, pool: "₹25", spots: 2, winners: 1, topPrize: "₹25" },

        { cat: "Winner", fee: 9999, pool: "₹30,000", spots: 3, winners: 1, topPrize: "₹30,000" },
        { cat: "Winner", fee: 2999, pool: "₹10,000", spots: 4, winners: 1, topPrize: "₹10,000" },
        { cat: "Winner", fee: 899, pool: "₹2,500", spots: 3, winners: 1, topPrize: "₹2,500" },
        { cat: "Winner", fee: 387, pool: "₹1,000", spots: 3, winners: 1, topPrize: "₹1,000" },
        { cat: "Winner", fee: 299, pool: "₹1,000", spots: 4, winners: 1, topPrize: "₹1,000" },
        { cat: "Winner", fee: 125, pool: "₹325", spots: 3, winners: 1, topPrize: "₹325" },
        { cat: "Winner", fee: 49, pool: "₹170", spots: 4, winners: 1, topPrize: "₹170" },
        { cat: "Winner", fee: 27, pool: "₹70", spots: 3, winners: 1, topPrize: "₹70" },
        { cat: "Winner", fee: 19, pool: "₹66", spots: 4, winners: 1, topPrize: "₹66" },
        { cat: "Winner", fee: 17, pool: "₹44", spots: 3, winners: 1, topPrize: "₹44" },

        { cat: "Small", fee: 4999, pool: "₹45,000", spots: 10, winners: 3, topPrize: "₹20,000" },
        { cat: "Small", fee: 999, pool: "₹18,000", spots: 20, winners: 5, topPrize: "₹8,000" },
        { cat: "Small", fee: 499, pool: "₹15,000", spots: 35, winners: 15, topPrize: "₹4,000" },
        { cat: "Small", fee: 299, pool: "₹10,000", spots: 40, winners: 15, topPrize: "₹3,000" },
        { cat: "Small", fee: 199, pool: "₹5,000", spots: 30, winners: 10, topPrize: "₹1,500" },
        { cat: "Small", fee: 125, pool: "₹3,000", spots: 28, winners: 10, topPrize: "₹1,000" },
        { cat: "Small", fee: 77, pool: "₹1,500", spots: 25, winners: 10, topPrize: "₹500" },
        { cat: "Small", fee: 35, pool: "₹1,000", spots: 35, winners: 15, topPrize: "₹300" },
        { cat: "Small", fee: 25, pool: "₹2,000", spots: 100, winners: 40, topPrize: "₹500" },
        { cat: "Small", fee: 15, pool: "₹500", spots: 40, winners: 20, topPrize: "₹100" }
    ];

    // 🏆 GET PRIZE LOGIC 🏆
    function getPrizeForRank(fee, rank) {
        let contest = allContests.find(c => c.fee === fee);
        if (!contest || rank > contest.winners) return 0;

        let topPrizeNum = parseFloat(contest.topPrize.replace(/[^0-9\.]/g, ''));
        if (contest.topPrize.includes("Crore")) topPrizeNum *= 10000000;
        else if (contest.topPrize.includes("Lakh")) topPrizeNum *= 100000;

        if (contest.cat === "H2H" || contest.cat === "Winner") {
            return rank === 1 ? topPrizeNum : 0;
        } else {
            if (rank === 1) return topPrizeNum;
            if (rank === 2) return topPrizeNum * 0.2; 
            if (rank === 3) return topPrizeNum * 0.1;
            if (rank <= 10) return topPrizeNum * 0.05;
            return fee * 1.5; 
        }
    }

    let allTeamsData = [];
    let currentSelectedFee = 0;
    let matchStartTime = 0; 
    window.currentLeaderboard = []; 

    function getContestDetails(fee) {
        let found = allContests.find(c => c.fee === fee);
        if (found) {
            let fill = found.cat === "Mega" ? 85 : 100;
            return { type: found.cat, spots: found.spots, fillPct: fill };
        }
        return { type: 'Unknown', spots: 2, fillPct: 100 };
    }

    if(!matchId) {
        document.getElementById('leaderboard-list').innerHTML = "<div class='loader-box'>Match Data Missing!</div>";
    } else {
        db.ref(`Game/Kalyan11/VIPMatches/${matchId}`).on('value', snap => {
            if(snap.exists() && snap.val().timestamp) {
                let ts = snap.val().timestamp;
                matchStartTime = (typeof ts === 'number') ? ts : new Date(ts).getTime();
            }
            if(allTeamsData.length > 0) renderLeaderboard(); 
        });

        db.ref(`Game/Kalyan11/Contests/${matchId}/Teams`).on('value', (snapshot) => {
            allTeamsData = [];
            let uniqueFees = new Set();
            let userJoinedFee = 0;

            if(snapshot.exists()) {
                snapshot.forEach(child => {
                    let t = child.val();
                    t.key = child.key;
                    let fee = parseInt(t.entry_paid) || 99;
                    uniqueFees.add(fee);
                    allTeamsData.push(t);

                    if(userPhone && child.key.includes(userPhone)) { userJoinedFee = fee; }
                });
            }

            let feeArray = Array.from(uniqueFees).sort((a, b) => b - a); 
            if (feeArray.length === 0) {
                document.getElementById('leaderboard-list').innerHTML = "<div class='loader-box' style='color:#888;'>Abhi tak koi team nahi aayi hai.</div>";
                return;
            }

            if (currentSelectedFee === 0) currentSelectedFee = userJoinedFee > 0 ? userJoinedFee : feeArray[0]; 

            let filterHtml = "";
            feeArray.forEach(fee => {
                let activeClass = (fee === currentSelectedFee) ? "active" : "";
                filterHtml += `<button class="fee-btn ${activeClass}" onclick="switchContestFee(${fee})">₹${fee} Contest</button>`;
            });
            document.getElementById('filter-container').innerHTML = filterHtml;
            document.getElementById('filter-container').style.display = 'flex';

            renderLeaderboard();
        });
    }

    function switchContestFee(fee) {
        currentSelectedFee = fee;
        document.querySelectorAll('.fee-btn').forEach(btn => {
            btn.classList.remove('active');
            if(btn.innerText.includes(`₹${fee} `)) btn.classList.add('active');
        });
        renderLeaderboard();
    }

    function formatNumber(num) {
        if (num >= 100000) return (num / 100000).toFixed(1).replace('.0','') + ' Lakh';
        if (num >= 1000) return (num / 1000).toFixed(1).replace('.0','') + 'K';
        return num;
    }

    function renderLeaderboard() {
        let listContainer = document.getElementById('leaderboard-list');
        listContainer.innerHTML = "";

        let isMatchStarted = false;
        if(matchStartTime > 0) {
            isMatchStarted = Date.now() >= matchStartTime;
        } else {
            isMatchStarted = true; 
        }

        let filteredTeams = allTeamsData.filter(t => (parseInt(t.entry_paid) || 99) === currentSelectedFee);
        let cDetails = getContestDetails(currentSelectedFee);
        let maxSpots = cDetails.spots;
        
        if(cDetails.type === 'Mega' || cDetails.type === 'Small') {
            document.getElementById('progress-container').style.display = 'block';
            let fakeJoined = Math.floor(maxSpots * (cDetails.fillPct / 100)) + filteredTeams.length;
            if(fakeJoined >= maxSpots) fakeJoined = maxSpots - 1;
            
            let spotsLeft = maxSpots - fakeJoined;
            let pct = (fakeJoined / maxSpots) * 100;
            document.getElementById('spots-left-text').innerText = `${formatNumber(spotsLeft)} Spots Left!`;
            document.getElementById('spots-total-text').innerText = `${formatNumber(maxSpots)} Spots`;
            document.getElementById('progress-fill-bar').style.width = `${pct}%`;
        } else {
            document.getElementById('progress-container').style.display = 'none';
        }

        let extraUIBots = [];

        if(cDetails.type === 'Mega') {
            let botAmount = Math.floor(Math.random() * 20) + 30; 
            for(let i=0; i<botAmount; i++) {
                let randomNum = Math.floor(100 + Math.random() * 899); 
                let fakeName = indianNames[Math.floor(Math.random() * indianNames.length)] + randomNum;
                extraUIBots.push({
                    teamName: fakeName,
                    total_points: isMatchStarted ? (40 + (Math.random() * 30)) : 0, 
                    is_bot: true, ui_only: true
                });
            }
        } 
        else if (cDetails.type === 'H2H' || cDetails.type === 'Winner') {
            let botsNeeded = maxSpots - filteredTeams.length;
            if(botsNeeded > 0) {
                let maxRealScore = 0;
                filteredTeams.forEach(t => {
                    if(parseFloat(t.total_points || 0) > maxRealScore) maxRealScore = parseFloat(t.total_points || 0);
                });
                for(let i=0; i<botsNeeded; i++) {
                    let botScore = 0;
                    if (!isMatchStarted) { botScore = 0; } 
                    else if (maxRealScore < 800 && maxRealScore > 0) { botScore = maxRealScore + Math.floor(Math.random() * 25) + 5; } 
                    else if (maxRealScore >= 800) { botScore = 750 + Math.floor(Math.random() * 60); } 
                    else { botScore = 50; }

                    let randomNum = Math.floor(100 + Math.random() * 899);
                    let fakeName = indianNames[Math.floor(Math.random() * indianNames.length)] + randomNum;

                    extraUIBots.push({
                        teamName: fakeName,
                        total_points: botScore,
                        is_bot: true, ui_only: true
                    });
                }
            }
        }

        let finalDisplayList = filteredTeams.concat(extraUIBots);
        finalDisplayList = finalDisplayList.map(t => {
            let safePoints = isMatchStarted ? parseFloat(t.total_points || 0) : 0.0;
            return { ...t, display_points: safePoints };
        });

        // 🔥 STEP 1: STRICT SORTING BY POINTS ONLY (Tie-Breaker Rule) 🔥
        finalDisplayList.sort((a, b) => b.display_points - a.display_points);

        // 🔥 STEP 2: DEAD HEAT TIE-BREAKER (Rank & Prize Splitting) 🔥
        let currentRank = 1;
        let index = 0;

        while(index < finalDisplayList.length) {
            let j = index;
            let tieGroup = [];
            let currentPoints = finalDisplayList[index].display_points;

            // Group all teams with the same points
            while(j < finalDisplayList.length && finalDisplayList[j].display_points === currentPoints) {
                tieGroup.push(finalDisplayList[j]);
                j++;
            }

            let tieCount = tieGroup.length;
            let totalPrizeForGroup = 0;

            // Match shuru ho gaya aur points 0 se zyada hain tabhi prize milega
            if (isMatchStarted && currentPoints > 0) {
                for(let r = 0; r < tieCount; r++) {
                    totalPrizeForGroup += getPrizeForRank(currentSelectedFee, currentRank + r);
                }
            } else if (!isMatchStarted) {
                totalPrizeForGroup = getPrizeForRank(currentSelectedFee, currentRank);
            }

            // Split the prize equally among tied players
            let splitPrize = tieCount > 0 ? (totalPrizeForGroup / tieCount) : 0;

            // Secondary sorting for display (My Team on top, then Admin Bots, then Name)
            tieGroup.sort((a, b) => {
                let isMineA = (!a.is_bot && !a.ui_only && userPhone && a.key && a.key.includes(userPhone)) ? 1 : 0;
                let isMineB = (!b.is_bot && !b.ui_only && userPhone && b.key && b.key.includes(userPhone)) ? 1 : 0;
                if (isMineA !== isMineB) return isMineB - isMineA;
                
                let isAdminBotA = (a.is_bot && !a.ui_only) ? 1 : 0;
                let isAdminBotB = (b.is_bot && !b.ui_only) ? 1 : 0;
                if (isAdminBotA !== isAdminBotB) return isAdminBotB - isAdminBotA;

                return (a.teamName || "").localeCompare(b.teamName || "", undefined, {numeric: true, sensitivity: 'base'});
            });

            // Assign identical rank and prize to everyone in the tie group
            tieGroup.forEach(team => {
                team.finalRank = currentRank;
                team.finalPrize = splitPrize;
            });

            currentRank += tieCount; // Skip ranks based on how many people tied
            index = j;
        }

        window.currentLeaderboard = finalDisplayList;

        let userTeamCounts = {};
        finalDisplayList.forEach(t => {
            let identifier = (t.is_bot || t.ui_only) ? t.teamName : (t.phone || "Unknown"); 
            if(userTeamCounts[identifier]) userTeamCounts[identifier]++;
            else userTeamCounts[identifier] = 1;
            t.teamSessionCount = userTeamCounts[identifier]; 
        });

        let htmlContent = "";
        finalDisplayList.forEach((team, index) => {
            let rank = team.finalRank; 
            let pts = team.display_points.toFixed(1); 
            let tName = team.teamName || team.userName || "Unknown";
            tName = tName.replace(/\s?XI$/i, '').trim();

            let isMyTeam = !team.is_bot && !team.ui_only && userPhone && team.phone === userPhone;
            
            if(!team.is_bot && !team.ui_only) {
                if(team.phone && team.phone.length >= 10 && /\d{10}/.test(team.phone)) {
                    let cleanNum = team.phone.replace(/\D/g, '');
                    tName = cleanNum.substring(0,2) + "******" + cleanNum.substring(cleanNum.length - 2); 
                } else if(team.phone) { tName = team.phone; }
            }

            if(team.teamSessionCount > 1 || userTeamCounts[(team.is_bot || team.ui_only) ? team.teamName : (team.phone || "Unknown")] > 1) {
                if(!tName.toLowerCase().includes("team")) {
                    tName = `${tName} (Team ${team.teamSessionCount})`;
                }
            }

            // 🔥 RANK HAMESHA DIKHEGI 🔥
            let showRankText = `Rank #${rank}`; 

            let isFirstRank = isMatchStarted && rank === 1 && pts > 0;
            let cardClass = "team-card";
            if(isFirstRank) cardClass += " rank-1"; 
            if(isMyTeam) cardClass += " my-team-highlight"; 
            let myTeamBadge = isMyTeam ? `<span style="background:#00ff88; color:#000; font-size:9px; padding:2px 4px; border-radius:3px; margin-left:5px;">YOUR TEAM</span>` : ``;

            // 🔥 SPLIT PRIZE DISPLAY 🔥
            let prizeText = "";
            if (team.finalPrize > 0 && isMatchStarted && pts > 0) {
                prizeText = `<span class="win-amt">Win ₹${team.finalPrize.toFixed(0)}</span>`;
            } else if (!isMatchStarted) {
                prizeText = `<span style="color:#aaa; margin-left:5px;">Prize Pool</span>`;
            }

            htmlContent += `
            <div class="${cardClass}" onclick="openTeamPreview(${index}, '${tName}')">
                <div class="team-info">
                    <div class="avatar" style="${isFirstRank ? 'background:#000; color:#ffd700;' : ''}">
                        ${isFirstRank ? '<i class="fa-solid fa-crown"></i>' : '<i class="fa-solid fa-user"></i>'}
                    </div>
                    <div class="name-box">
                        <h4>${tName.toUpperCase()} ${myTeamBadge}</h4>
                        <div class="winnings">${showRankText} ${prizeText}</div>
                    </div>
                </div>
                <div class="points-box">${pts}</div>
            </div>`;
        });

        listContainer.innerHTML = htmlContent;
    }

    async function openTeamPreview(index, displayName) {
        let team = window.currentLeaderboard[index];
        
        document.getElementById('viewTeamModal').style.display = 'flex';
        document.getElementById('modal-team-title').innerHTML = `<i class="fa-solid fa-eye"></i> ${displayName}`;
        let listContainer = document.getElementById('modalPlayersList');
        
        listContainer.innerHTML = `
            <div class="loader-box" style="margin-top:50px; color:#00ff88;">
                <i class="fa-solid fa-spinner fa-spin fa-2x"></i><br><br>
                Fetching Squad...<br>
                <span style="font-size:10px; color:#888;">Please wait</span>
            </div>`;

        if(team.ui_only || !team.players) {
            setTimeout(() => {
                let modal = document.getElementById('viewTeamModal');
                if(modal.style.display === 'flex') {
                    listContainer.innerHTML = `
                        <div class="loader-box" style="margin-top:50px; color:#aaa;">
                            <i class="fa-solid fa-server fa-2x" style="color:#ff004c; margin-bottom:10px;"></i><br>
                            Server Connection Timeout<br>
                            <span style="font-size:10px;">Network slow hone ke karan team open nahi ho pa rahi. Baad mein try karein.</span>
                        </div>`;
                }
            }, 3000); 
            return;
        }

        try {
            let pSnap = await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).once('value');
            let allPlayers = pSnap.val() || {};
            
            listContainer.innerHTML = "";
            let playerIds = team.players || [];

            playerIds.forEach(id => {
                let p = allPlayers[id];
                if(p) {
                    let isC = (p.name === team.captain);
                    let isVC = (p.name === (team.viceCaptain || team.vice_captain));
                    
                    let badgeHtml = "";
                    let displayPoints = p.points || 0;
                    
                    if(isC) {
                        badgeHtml = `<div class="cvc-badge c-badge">C</div>`;
                        displayPoints = displayPoints * 2;
                    } else if(isVC) {
                        badgeHtml = `<div class="cvc-badge vc-badge">VC</div>`;
                        displayPoints = displayPoints * 1.5;
                    }

                    listContainer.innerHTML += `
                        <div class="preview-player">
                            <div class="pv-info">
                                ${badgeHtml}
                                <div>
                                    <div class="pv-name">${p.name}</div>
                                    <div class="pv-role-badge">${p.team || 'UNK'} | ${p.role || 'PLY'}</div>
                                </div>
                            </div>
                            <div class="pv-points">${displayPoints} Pts</div>
                        </div>
                    `;
                }
            });
        } catch(e) {
            listContainer.innerHTML = `<div style="color:red; text-align:center;">Database connection failed!</div>`;
        }
    }

    function closeViewModal() {
        document.getElementById('viewTeamModal').style.display = 'none';
    }
</script>
