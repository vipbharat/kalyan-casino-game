<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - Live Leaderboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding-bottom: 20px; user-select: none; }
        .header { background: linear-gradient(135deg, #1a0033, #4a00e0); padding: 15px; display: flex; align-items: center; border-bottom: 2px solid #ffd700; position: sticky; top:0; z-index:100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .back-btn { font-size: 20px; margin-right: 15px; cursor: pointer; color: #ffd700; }
        .title { font-weight: 900; font-size: 18px; text-transform: uppercase; }
        .sub-title { font-size: 11px; color: #00ff88; font-weight: bold; margin-top: 3px; }
        
        .prize-pool-banner { background: #111; padding: 15px; border-bottom: 1px solid #333; }
        .pool-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;}
        .pool-flex h2 { margin: 0; color: #ffd700; font-size: 20px; }
        .pool-flex span { font-size: 12px; color: #aaa; border: 1px solid #444; padding: 3px 8px; border-radius: 4px; background: #222;}
        .progress-bar-bg { width: 100%; height: 6px; background: #333; border-radius: 10px; overflow: hidden; margin-bottom: 5px; }
        .progress-bar-fill { height: 100%; background: #ff004c; border-radius: 10px; }
        .spots-left { font-size: 11px; color: #aaa; display: flex; justify-content: space-between; }
        .spots-left span.red { color: #ff004c; font-weight: bold; }

        .leaderboard-container { padding: 15px; }
        
        .user-row { background: linear-gradient(145deg, #1e1e2e, #111); border: 1px solid #333; border-radius: 10px; padding: 12px 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.4); cursor: pointer; }
        .user-row:active { transform: scale(0.98); }
        
        .user-row.rank-1 { border-color: #ffd700; background: linear-gradient(145deg, #332b00, #111); box-shadow: 0 0 15px rgba(255,215,0,0.2); }
        .user-row.rank-2 { border-color: #c0c0c0; }
        .user-row.rank-3 { border-color: #cd7f32; }
        .user-row.my-team { border-left: 4px solid #00ff88; background: linear-gradient(145deg, #113322, #111); box-shadow: 0 0 15px rgba(0,255,136,0.2); }

        .rank-circle { width: 35px; height: 35px; background: #222; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 14px; color: #aaa; border: 2px solid #555; }
        .rank-1 .rank-circle { background: #ffd700; color: #000; border-color: #ffd700; }
        .rank-2 .rank-circle { background: #c0c0c0; color: #000; border-color: #c0c0c0; }
        .rank-3 .rank-circle { background: #cd7f32; color: #000; border-color: #cd7f32; }

        .user-details { flex: 1; margin-left: 15px; }
        .user-name { font-weight: bold; font-size: 15px; color: #fff; display: flex; align-items: center;}
        .my-tag { background: #00ff88; color: #000; font-size: 9px; padding: 2px 5px; border-radius: 3px; margin-left: 5px; font-weight: bold; }
        .lock-icon { color: #555; font-size: 12px; margin-left: 5px; }
        
        .cvc-info { font-size: 11px; color: #aaa; margin-top: 4px; display: flex; gap: 10px;}
        .cvc-info span { background: #222; padding: 2px 6px; border-radius: 4px; border: 1px solid #333;}
        .cvc-info span.c { color: #ffd700; border-color: #554800;}
        .cvc-info span.vc { color: #c0c0c0; border-color: #444;}

        .points-box { text-align: right; }
        .pts-value { font-size: 20px; font-weight: 900; color: #00ff88; }
        .pts-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        
        .view-btn { background: #00d2d3; color: #000; font-size: 10px; padding: 4px 8px; border-radius: 4px; font-weight: bold; margin-left: 8px; border: none; cursor: pointer; }

        .loading-text { text-align: center; color: #ffd700; font-weight: bold; margin-top: 30px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        #scroll-loader { text-align: center; color: #00ff88; font-weight: bold; padding: 15px; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-arrow-left back-btn" onclick="history.back()"></i>
        <div>
            <div class="title">LEADERBOARD</div>
            <div class="sub-title" id="live-status"><i class="fa-solid fa-clock"></i> Match not started yet</div>
        </div>
    </div>

    <div class="prize-pool-banner" id="dynamic-banner"></div>

    <div class="leaderboard-container" id="leaderboard-list">
        <div class="loading-text" id="main-loader"><i class="fa-solid fa-spinner fa-spin"></i> Loading Teams...</div>
    </div>
    
    <div id="scroll-loader"><i class="fa-solid fa-spinner fa-spin"></i> Searching more teams...</div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        
        const myPhone = localStorage.getItem('userPhone') || localStorage.getItem('phone') || "9876543210";
        
        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('matchId') || "DEMO_MATCH";
        
        // Dynamic Entry Fee System
        let entryFee = parseInt(localStorage.getItem('kalyan_entry_fee')) || parseInt(urlParams.get('entry')) || 49;
        let totalSpots = 150000; // Default mega
        let contestName = "🏆 Mega Contest";
        let isMatchLive = false; // Flag to check if points should be 0

        // Entry fee ke hisaab se spots aur naam change karo
        if(entryFee <= 49) {
            totalSpots = 150000;
            contestName = "🏆 Mega Contest";
        } else if(entryFee > 49 && entryFee <= 199) {
            totalSpots = 10000;
            contestName = "⚔️ Hot Contest";
        } else {
            totalSpots = 100;
            contestName = "💎 VIP Contest";
        }

        const listContainer = document.getElementById('leaderboard-list');
        const scrollLoader = document.getElementById('scroll-loader');

        let allCombinedTeams = [];
        let displayedCount = 0;
        const BATCH_SIZE = 50; 
        let isFetching = false;

        // Check if match is live (Agar live hai toh points dikhao, warna 0)
        db.ref('Game/Kalyan11/Matches/' + matchId).on('value', snap => {
            let matchData = snap.val();
            if(matchData && matchData.match_time) {
                let matchTime = new Date(matchData.match_time).getTime();
                let now = new Date().getTime();
                if(now > matchTime) {
                    isMatchLive = true;
                    document.getElementById('live-status').innerHTML = `<i class="fa-solid fa-circle-dot fa-beat"></i> Points Updating Live...`;
                }
            }
            fetchTeams(); // Match status pata chalne ke baad teams fetch karo
        });

        // Dynamic Banner Setup
        const bannerDiv = document.getElementById('dynamic-banner');
        let filled = totalSpots > 1000 ? totalSpots - 1068 : Math.floor(totalSpots * 0.8); 
        let fillPercent = (filled / totalSpots) * 100;
        
        bannerDiv.innerHTML = `
            <div class="pool-flex">
                <h2>${contestName}</h2>
                <span>Entry: ₹${entryFee}</span>
            </div>
            <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${fillPercent}%"></div></div>
            <div class="spots-left">
                <span class="red">${filled.toLocaleString('en-IN')} Spots filled</span>
                <span>${totalSpots.toLocaleString('en-IN')} Spots</span>
            </div>
        `;

        function createBot(points, playersArray) {
            let randomNum = "9" + Math.floor(10000000 + Math.random() * 90000000); 
            let cPlayer = playersArray[Math.floor(Math.random() * playersArray.length)] || {name: "Bot P1"};
            let vcPlayer = playersArray[Math.floor(Math.random() * playersArray.length)] || {name: "Bot P2"};
            let cName = cPlayer.name.split(' ')[0][0] + ". " + (cPlayer.name.split(' ')[1] || "");
            let vcName = vcPlayer.name.split(' ')[0][0] + ". " + (vcPlayer.name.split(' ')[1] || "");

            // Agar match live nahi hai, toh bots ke points bhi 0 honge
            let finalPoints = isMatchLive ? points : 0.0;

            return { phone: randomNum, points: finalPoints, cName: cName, vcName: vcName, isBot: true };
        }

        function fetchTeams() {
            db.ref('Game/Kalyan11/MatchPlayers/' + matchId).once('value', playerSnap => {
                let allPlayersObj = playerSnap.val() || {};
                let playersArray = Object.values(allPlayersObj); 

                db.ref('Game/Kalyan11/Contests/' + matchId + '/Teams').on('value', snapshot => {
                    let realTeamsArray = [];
                    let myTeamObj = null; // Meri team ko alag se nikalenge
                    
                    if (snapshot.exists()) {
                        snapshot.forEach(child => {
                            let userPhone = child.key;
                            let teamInfo = child.val();
                            
                            // Sirf wahi teams lo jinki entry fee is page wale contest se match karti hai
                            // (Agar teamInfo me entry_paid nahi hai, toh usko dikha do taaki purani teams gayab na hon)
                            if(teamInfo.entry_paid && parseInt(teamInfo.entry_paid) !== entryFee) return;

                            let pts = isMatchLive ? (teamInfo.total_points || 0) : 0.0;
                            
                            let cId = teamInfo.captain;
                            let vcId = teamInfo.viceCaptain;
                            let cName = allPlayersObj[cId] ? allPlayersObj[cId].name.split(' ')[0][0] + ". " + (allPlayersObj[cId].name.split(' ')[1] || "") : "Unknown";
                            let vcName = allPlayersObj[vcId] ? allPlayersObj[vcId].name.split(' ')[0][0] + ". " + (allPlayersObj[vcId].name.split(' ')[1] || "") : "Unknown";

                            let teamData = { phone: userPhone, points: pts, cName: cName, vcName: vcName, isBot: false };
                            
                            if(userPhone === myPhone) {
                                myTeamObj = teamData; // User ki team mil gayi
                            } else {
                                realTeamsArray.push(teamData);
                            }
                        });
                    }

                    let botTeams = [];
                    // Generate bots
                    let numBots = totalSpots > 1000 ? 300 : 20; // limit bots based on contest size
                    for(let i = 0; i < numBots; i++) {
                        let randomPts = Math.random() * 150; 
                        botTeams.push(createBot(randomPts, playersArray));
                    }

                    // Combine and Sort
                    allCombinedTeams = [...realTeamsArray, ...botTeams];
                    allCombinedTeams.sort((a, b) => b.points - a.points); // Sort by points (agar sab 0 hain, toh random rahenge)

                    // 🎯 VIP LOGIC: Meri team ko hamesha list me sabse upar (Rank 1 par) daal do!
                    if(myTeamObj) {
                        allCombinedTeams.unshift(myTeamObj); // Array ke start me jod do
                    }

                    listContainer.innerHTML = "";
                    displayedCount = 0;
                    loadMoreTeams(); 
                });
            });
        }

        function loadMoreTeams() {
            if(displayedCount >= allCombinedTeams.length) return; 
            
            isFetching = true;
            let end = displayedCount + BATCH_SIZE;
            let batch = allCombinedTeams.slice(displayedCount, end);

            batch.forEach((team, index) => {
                let rank = displayedCount + index + 1; 
                let hidePhone = team.isBot ? team.phone.substring(0, 4) + "****" + team.phone.substring(7, 9) : team.phone.substring(0, 4) + "****" + team.phone.substring(8, 10);
                
                let isMyTeam = (!team.isBot && team.phone === myPhone);
                let displayName = isMyTeam ? "You (" + team.phone + ")" : hidePhone;
                
                // 👁️ VIEW BUTTON SIRF USER KI TEAM PAR
                let myTagHTML = isMyTeam ? `<span class="my-tag">MY TEAM</span> <button class="view-btn" onclick="window.location.href='MyTeam.html?matchId=${matchId}'"><i class="fa-solid fa-eye"></i> VIEW</button>` : `<i class="fa-solid fa-lock lock-icon" onclick="alert('🔒 Privacy Lock: Aap sirf apni team khol kar dekh sakte hain!')"></i>`;
                
                let highlightClass = isMyTeam ? "my-team" : "";
                
                // Rank color class
                let rankClass = "rank-" + rank;
                if(rank > 3) rankClass = "";

                let cardHTML = `
                    <div class="user-row ${rankClass} ${highlightClass}">
                        <div class="rank-circle">${rank}</div>
                        <div class="user-details">
                            <div class="user-name">${displayName} ${myTagHTML}</div>
                            <div class="cvc-info">
                                <span class="c">C: ${team.cName}</span>
                                <span class="vc">VC: ${team.vcName}</span>
                            </div>
                        </div>
                        <div class="points-box">
                            <div class="pts-value">${team.points.toFixed(1)}</div>
                            <div class="pts-label">Points</div>
                        </div>
                    </div>
                `;
                listContainer.innerHTML += cardHTML;
            });

            displayedCount += BATCH_SIZE;
            isFetching = false;
            scrollLoader.style.display = "none";
        }

        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 50 && !isFetching && displayedCount < allCombinedTeams.length) {
                isFetching = true;
                scrollLoader.style.display = "block"; 
                setTimeout(() => { loadMoreTeams(); }, 1200); 
            }
        });
    </script>
</body>
</html>
