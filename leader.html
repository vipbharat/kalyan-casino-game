<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - Live Leaderboard & Payouts</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding-bottom: 90px; user-select: none; }
        .header { background: linear-gradient(135deg, #1a0033, #4a00e0); padding: 15px; display: flex; align-items: center; border-bottom: 2px solid #ffd700; position: sticky; top:0; z-index:100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .back-btn { font-size: 20px; margin-right: 15px; cursor: pointer; color: #ffd700; }
        .title { font-weight: 900; font-size: 18px; text-transform: uppercase; }
        .sub-title { font-size: 11px; color: #00ff88; font-weight: bold; margin-top: 3px; }
        
        .prize-pool-banner { background: #111; padding: 15px; border-bottom: 1px solid #333; position: relative;}
        .pool-flex { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;}
        .pool-flex h2 { margin: 0; color: #ffd700; font-size: 16px; font-weight: 900; text-transform: uppercase; margin-bottom: 5px;}
        .pool-flex span { font-size: 12px; color: #aaa; border: 1px solid #444; padding: 3px 8px; border-radius: 4px; background: #222;}
        .progress-bar-bg { width: 100%; height: 6px; background: #333; border-radius: 10px; overflow: hidden; margin-bottom: 5px; }
        .progress-bar-fill { height: 100%; background: #ff004c; border-radius: 10px; transition: width 0.5s ease-in-out; }
        .spots-left { font-size: 11px; color: #aaa; display: flex; justify-content: space-between; }
        .spots-left span.red { color: #ff004c; font-weight: bold; }

        .breakdown-btn { background: linear-gradient(90deg, #ff8c00, #ffd700); color: #000; font-size: 10px; font-weight: 900; padding: 4px 10px; border-radius: 12px; cursor: pointer; text-transform: uppercase; border: 1px solid #fff; box-shadow: 0 2px 8px rgba(255,215,0,0.4); display: inline-flex; align-items: center; gap: 5px; transition: 0.2s;}
        .breakdown-btn:active { transform: scale(0.95); }

        .leaderboard-container { padding: 15px; }
        .user-row { background: linear-gradient(145deg, #1e1e2e, #111); border: 1px solid #333; border-radius: 10px; padding: 12px 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        .user-row.my-team { border-left: 4px solid #00ff88; background: linear-gradient(145deg, #113322, #111); box-shadow: 0 0 15px rgba(0,255,136,0.2); }
        
        .rank-circle { width: 35px; height: 35px; background: #222; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 14px; color: #aaa; border: 2px solid #555; flex-shrink: 0;}
        .rank-1 .rank-circle { background: #ffd700; color: #000; border-color: #ffd700; }
        .rank-2 .rank-circle { background: #c0c0c0; color: #000; border-color: #c0c0c0; }
        .rank-3 .rank-circle { background: #cd7f32; color: #000; border-color: #cd7f32; }

        .user-details { flex: 1; margin-left: 15px; }
        .user-name { font-weight: bold; font-size: 14px; color: #fff; display: flex; align-items: center; gap: 5px;}
        .my-tag { background: #00ff88; color: #000; font-size: 9px; padding: 2px 5px; border-radius: 3px; font-weight: bold; }
        .cvc-info { font-size: 10.5px; color: #aaa; margin-top: 5px; display: flex; gap: 5px;}
        .cvc-info span { background: #222; padding: 2px 5px; border-radius: 3px; border: 1px solid #444;}
        .cvc-info span.c { color: #ffd700; border-color: #554800; }

        .points-box { text-align: right; }
        .pts-value { font-size: 18px; font-weight: 900; color: #00ff88; }
        .pts-label { font-size: 9px; color: #aaa; text-transform: uppercase; }
        
        .win-amt { font-size: 11px; color: #ffd700; font-weight: bold; margin-top: 5px; display: inline-block; border: 1px dashed #ffd700; padding: 2px 6px; border-radius: 4px; background: rgba(255, 215, 0, 0.1); }
        .paid-tag { font-size: 10px; color: #000; background: #00ff88; padding: 2px 6px; border-radius: 4px; font-weight: 900; margin-left: 5px; box-shadow: 0 0 5px #00ff88;}

        .my-rank-sticky { position: fixed; bottom: 0; left: 0; width: 100%; background: linear-gradient(90deg, #00ff88, #00c366); color: #000; padding: 12px 15px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,255,136,0.3); border-top-left-radius: 15px; border-top-right-radius: 15px;}
        .my-rank-sticky .r-circle { width: 35px; height: 35px; background: #000; color: #00ff88; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 15px; border: 2px solid #fff; }
        
        .loading-text { text-align: center; color: #ffd700; padding: 20px; font-weight: bold; }
        #scroll-loader { text-align: center; color: #00ff88; padding: 15px; font-weight: bold; display: none; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: flex-end; }
        .modal-content { background: #1a1a2e; width: 100%; max-height: 75vh; border-radius: 20px 20px 0 0; padding: 20px; box-sizing: border-box; overflow-y: auto; animation: slideUp 0.3s ease-out; border-top: 2px solid #ffd700; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        .modal-title { font-size: 18px; font-weight: 900; color: #fff; }
        .close-btn { color: #ff004c; font-size: 24px; font-weight: bold; cursor: pointer; }
        .rank-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #222; font-size: 14px; }
        .rank-col { display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-arrow-left back-btn" onclick="history.back()"></i>
        <div>
            <div class="title">LEADERBOARD</div>
            <div class="sub-title" id="live-status"><i class="fa-solid fa-clock"></i> Match Timer Loading...</div>
        </div>
    </div>

    <div class="prize-pool-banner" id="dynamic-banner">
        <div class="loading-text"><i class="fa-solid fa-spinner fa-spin"></i> Loading Details...</div>
    </div>

    <div class="leaderboard-container" id="leaderboard-list">
        <div class="loading-text"><i class="fa-solid fa-spinner fa-spin"></i> Syncing Live Teams...</div>
    </div>
    
    <div id="scroll-loader"><i class="fa-solid fa-spinner fa-spin"></i> Searching more teams...</div>

    <div id="my-rank-container"></div>

    <div id="prizeModalOverlay" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Winning Prizes</div>
                <div class="close-btn" onclick="closePrizeBreakdown()">&times;</div>
            </div>
            <div id="modal-ranks-container"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        
        const myPhone = localStorage.getItem('userPhone') || localStorage.getItem('phone');
        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('matchId') || "DUMMY";
        let entryFee = parseInt(urlParams.get('entry')) || parseInt(localStorage.getItem('kalyan_entry_fee')) || 99;

        const contestConfig = {
            99: { name: "Grand Mega Contest", spots: 150000 }, 49: { name: "Mega Contest", spots: 5000 }, 39: { name: "Mega Contest", spots: 3000 }, 25: { name: "Mega Contest", spots: 2000 },
            999: { name: "Small League", spots: 50 }, 499: { name: "Small League", spots: 35 }, 299: { name: "Small League", spots: 40 }, 199: { name: "Small League", spots: 30 }, 125: { name: "Small League", spots: 28 }, 75: { name: "Small League", spots: 30 }, 35: { name: "Small League", spots: 35 }, 15: { name: "Contest", spots: 40 },
            25000: { name: "VIP High Roller", spots: 2 }, 15000: { name: "VIP High Roller", spots: 3 }, 10000: { name: "VIP High Roller", spots: 5 }, 5000: { name: "VIP High Roller", spots: 6 },
            5750: { name: "H2H Battle", spots: 2 }, 2875: { name: "H2H Battle", spots: 2 }, 1150: { name: "H2H Battle", spots: 2 }, 575: { name: "H2H Battle", spots: 2 }, 299: { name: "H2H Battle", spots: 2 }, 119: { name: "H2H Battle", spots: 2 }, 59: { name: "H2H Battle", spots: 2 }, 29: { name: "H2H Battle", spots: 2 },
            0: { name: "Practice Contest", spots: 100000 }
        };

        let currentContest = contestConfig[entryFee] || { name: "Fantasy Contest", spots: 1000 };
        let totalSpots = currentContest.spots;
        let contestName = currentContest.name;

        const listContainer = document.getElementById('leaderboard-list');
        const scrollLoader = document.getElementById('scroll-loader');
        let isMatchLive = false;
        let isMatchCompleted = false;
        let matchTimeMs = 0;

        let allCombinedTeams = [];
        let displayedCount = 0;
        const BATCH_SIZE = 30; 
        let isFetching = false;

        function formatName(fullName) {
            if(!fullName) return "Player";
            let parts = fullName.split(' ');
            return parts[0][0] + ". " + (parts[1] || "");
        }

        function openPrizeBreakdown() {
            let html = '';
            if (entryFee === 0) {
                html = `<div class="rank-row" style="color:#00ff88; font-weight:bold;"><div class="rank-col">Rank 1</div><div>Glory (Practice)</div></div>`;
            } else if (totalSpots === 2) {
                let winAmt = Math.floor(entryFee * 1.8);
                html = `<div class="rank-row" style="color:#ffd700; font-weight:900;"><div class="rank-col"><i class="fa-solid fa-trophy"></i> Rank 1</div><div>₹${winAmt.toLocaleString('en-IN')}</div></div>`;
            } else if (entryFee === 99) {
                html = `
                    <div class="rank-row" style="color:#ffd700; font-weight:900;"><div class="rank-col"><i class="fa-solid fa-trophy"></i> Rank 1</div><div>₹50,00,000</div></div>
                    <div class="rank-row" style="color:#c0c0c0; font-weight:900;"><div class="rank-col"><i class="fa-solid fa-medal"></i> Rank 2</div><div>₹10,00,000</div></div>
                    <div class="rank-row" style="color:#cd7f32; font-weight:900;"><div class="rank-col"><i class="fa-solid fa-medal"></i> Rank 3</div><div>₹5,00,000</div></div>
                    <div class="rank-row" style="color:#fff;"><div class="rank-col">Rank 4 - 10</div><div>₹1,00,000</div></div>
                    <div class="rank-row" style="color:#00ff88; font-weight:bold;"><div class="rank-col"><i class="fa-solid fa-gift"></i> Rank 11 - 50,000</div><div>₹99 (Entry Back)</div></div>
                `;
            } else if (entryFee === 49) {
                html = `
                    <div class="rank-row" style="color:#ffd700; font-weight:900;"><div class="rank-col"><i class="fa-solid fa-trophy"></i> Rank 1</div><div>₹20,000</div></div>
                    <div class="rank-row" style="color:#c0c0c0; font-weight:900;"><div class="rank-col"><i class="fa-solid fa-medal"></i> Rank 2</div><div>₹10,000</div></div>
                    <div class="rank-row" style="color:#fff;"><div class="rank-col">Rank 3 - 20</div><div>₹1,000</div></div>
                    <div class="rank-row" style="color:#00ff88; font-weight:bold;"><div class="rank-col"><i class="fa-solid fa-gift"></i> Rank 21 - 700</div><div>₹49 (Entry Back)</div></div>
                `;
            } else {
                let r1 = Math.floor(entryFee * totalSpots * 0.4);
                let r2 = Math.floor(entryFee * totalSpots * 0.15);
                let entryBackRank = Math.floor(totalSpots * 0.4);
                
                html = `
                    <div class="rank-row" style="color:#ffd700; font-weight:900;"><div class="rank-col"><i class="fa-solid fa-trophy"></i> Rank 1</div><div>₹${r1.toLocaleString('en-IN')}</div></div>
                    <div class="rank-row" style="color:#c0c0c0; font-weight:900;"><div class="rank-col"><i class="fa-solid fa-medal"></i> Rank 2</div><div>₹${r2.toLocaleString('en-IN')}</div></div>
                    <div class="rank-row" style="color:#00ff88; font-weight:bold;"><div class="rank-col"><i class="fa-solid fa-gift"></i> Rank 3 - ${entryBackRank}</div><div>₹${entryFee} (Entry Back)</div></div>
                `;
            }
            document.getElementById('modal-ranks-container').innerHTML = html;
            document.getElementById('prizeModalOverlay').style.display = 'flex';
        }
        function closePrizeBreakdown() { document.getElementById('prizeModalOverlay').style.display = 'none'; }

        function calculatePrize(rank, entry) {
            if(entry === 0) return 0; 
            if(totalSpots === 2) { if(rank === 1) return Math.floor(entry * 1.8); return 0; }
            if(entry === 99) { if(rank === 1) return 5000000; if(rank === 2) return 1000000; if(rank <= 10) return 100000; if(rank <= 50000) return 99; }
            if(entry === 49) { if(rank === 1) return 20000; if(rank === 2) return 10000; if(rank <= 700) return 49; }
            
            if(rank === 1) return Math.floor(entry * totalSpots * 0.4); 
            if(rank === 2) return Math.floor(entry * totalSpots * 0.15); 
            if(rank <= Math.floor(totalSpots * 0.4)) return entry; 
            return 0; 
        }

        db.ref('Game/Kalyan11/VIPMatches/' + matchId).on('value', snap => {
            let mData = snap.val();
            matchTimeMs = mData && mData.timestamp ? mData.timestamp : (new Date().getTime() + 86400000);
            
            let diff = matchTimeMs - new Date().getTime();
            isMatchLive = diff <= 0;
            isMatchCompleted = diff < -14400000;

            setInterval(() => {
                let diff = matchTimeMs - new Date().getTime();
                isMatchLive = diff <= 0;
                isMatchCompleted = diff < -14400000;

                if (isMatchCompleted) {
                    document.getElementById('live-status').innerHTML = `<i class="fa-solid fa-flag-checkered" style="color:#00ff88;"></i> Match Completed`;
                } else if (isMatchLive) {
                    document.getElementById('live-status').innerHTML = `<i class="fa-solid fa-circle-dot fa-beat" style="color:#ff004c;"></i> Match is Live`;
                } else {
                    document.getElementById('live-status').innerHTML = `<i class="fa-solid fa-clock"></i> Upcoming Match`;
                }
            }, 1000);

            fetchRealLeaderboard();
        });

        function fetchRealLeaderboard() {
            // 1. Live Players ke Points uthao
            db.ref('Game/Kalyan11/MatchPlayers/' + matchId).once('value', pSnap => {
                let playersObj = pSnap.val() || {};
                let playersArray = Object.values(playersObj); 

                // 2. Ab Teams ko uthao aur calculation karo
                db.ref('Game/Kalyan11/Contests/' + matchId + '/Teams').on('value', tSnap => {
                    let realTeams = []; let myTeamsInThisContest = []; let maxRealPoints = 0; 

                    if (tSnap.exists()) {
                        tSnap.forEach(child => {
                            let t = child.val();
                            if (parseInt(t.entry_paid || 99) === entryFee) {
                                
                                // 🚀 VIP POINT CALCULATOR ENGINE 🚀
                                let calculatedPoints = 0;
                                let teamPlayers = t.players || {};
                                
                                Object.values(teamPlayers).forEach(pKey => {
                                    let livePt = (playersObj[pKey] && playersObj[pKey].points) ? parseFloat(playersObj[pKey].points) : 0;
                                    
                                    if(pKey === t.captain) calculatedPoints += (livePt * 2);        // Captain 2x
                                    else if(pKey === t.viceCaptain) calculatedPoints += (livePt * 1.5); // VC 1.5x
                                    else calculatedPoints += livePt;                                  // Normal 1x
                                });

                                let finalPts = (isMatchLive || isMatchCompleted) ? parseFloat(calculatedPoints.toFixed(1)) : 0;
                                
                                // 💾 Database Auto-Saver (Agar 0.0 hai toh usko permanent theek kar dega)
                                if((isMatchLive || isMatchCompleted) && Math.abs((t.total_points || 0) - finalPts) > 0.1) {
                                    db.ref(`Game/Kalyan11/Contests/${matchId}/Teams/${child.key}`).update({total_points: finalPts});
                                }

                                let cName = playersObj[t.captain] ? formatName(playersObj[t.captain].name) : "Player";
                                let vcName = playersObj[t.viceCaptain] ? formatName(playersObj[t.viceCaptain].name) : "Player";
                                
                                if(finalPts > maxRealPoints) maxRealPoints = finalPts; 
                                
                                let teamData = { 
                                    phone: t.phone || child.key.split('_')[0], 
                                    teamKey: child.key, 
                                    points: finalPts, cName: cName, vcName: vcName, isBot: false,
                                    payment_status: t.payment_status || "PENDING"
                                };
                                
                                if(teamData.phone === myPhone) myTeamsInThisContest.push(teamData);
                                else realTeams.push(teamData);
                            }
                        });
                    }

                    let realCount = realTeams.length + myTeamsInThisContest.length;
                    let diff = matchTimeMs - new Date().getTime();
                    let actualFilledSpotsForUI = 0; let targetBotsForList = 0;

                    if (totalSpots <= 2) {
                        if (realCount >= 1) { targetBotsForList = totalSpots - realCount; actualFilledSpotsForUI = totalSpots; } 
                        else { targetBotsForList = 1; actualFilledSpotsForUI = 1; }
                    } else {
                        let desiredPercent = 0;
                        if (diff <= 0) desiredPercent = 100; else if (diff <= 3600000) desiredPercent = 95; else if (diff <= 7200000) desiredPercent = 88; else desiredPercent = 50; 
                        let timeBasedSpots = Math.floor((desiredPercent / 100) * totalSpots);
                        if(timeBasedSpots < realCount) timeBasedSpots = realCount; 
                        actualFilledSpotsForUI = timeBasedSpots;
                        targetBotsForList = (totalSpots <= 100) ? actualFilledSpotsForUI - realCount : 300 - realCount; 
                        if(targetBotsForList < 0) targetBotsForList = 0;
                    }

                    let bots = [];
                    for(let i=0; i < targetBotsForList; i++){
                        let bPhone = "9" + Math.floor(10000000 + Math.random() * 90000000); 
                        let cp = playersArray.length > 0 ? formatName(playersArray[Math.floor(Math.random() * playersArray.length)].name) : "Bot C.";
                        let vcp = playersArray.length > 0 ? formatName(playersArray[Math.floor(Math.random() * playersArray.length)].name) : "Bot V.";
                        let bPoints = 0;
                        
                        // 🤖 BOT FREEZER: Bots ke points refresh karne par fluctuate nahi honge!
                        if(isMatchLive || isMatchCompleted) {
                            let isProBot = i < Math.max(2, targetBotsForList * 0.05); 
                            let pseudoRandom = (Math.sin(i * 9999) + 1) / 2; // Locked random based on index
                            bPoints = isProBot ? maxRealPoints + (pseudoRandom * 20) + 1 : pseudoRandom * (maxRealPoints + 5); 
                        }
                        bots.push({ phone: bPhone, points: parseFloat(bPoints.toFixed(1)), cName: cp, vcName: vcp, isBot: true });
                    }

                    allCombinedTeams = [...realTeams, ...myTeamsInThisContest, ...bots];
                    allCombinedTeams.sort((a,b) => b.points - a.points); 
                    
                    if(actualFilledSpotsForUI > totalSpots) actualFilledSpotsForUI = totalSpots; 
                    let fillPercent = (actualFilledSpotsForUI / totalSpots) * 100;

                    document.getElementById('dynamic-banner').innerHTML = `
                        <div class="pool-flex">
                            <div>
                                <h2>${contestName}</h2>
                                <button class="breakdown-btn" onclick="openPrizeBreakdown()"><i class="fa-solid fa-trophy"></i> WINNING RANKS</button>
                            </div>
                            <span>Entry: ₹${entryFee}</span>
                        </div>
                        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${fillPercent}%"></div></div>
                        <div class="spots-left"><span class="red">${actualFilledSpotsForUI.toLocaleString('en-IN')} Spots filled</span><span>${totalSpots.toLocaleString('en-IN')} Spots</span></div>
                    `;

                    listContainer.innerHTML = "";
                    displayedCount = 0;
                    loadMoreTeams();

                    if(myTeamsInThisContest.length > 0) {
                        let bestMyTeam = myTeamsInThisContest.sort((a,b) => b.points - a.points)[0];
                        let myRank = allCombinedTeams.findIndex(t => t.teamKey === bestMyTeam.teamKey) + 1;
                        let myPrize = calculatePrize(myRank, entryFee);
                        
                        let isPaid = bestMyTeam.payment_status === "PAID";
                        
                        let prizeDisplay = (isMatchCompleted && myPrize > 0) ? `<div style="font-size:11px; color:#ffd700; font-weight:bold;">🏆 Won: ₹${myPrize.toLocaleString('en-IN')} ${isPaid ? '<span class="paid-tag">PAID IN WALLET</span>' : ''}</div>` : ``;

                        document.getElementById('my-rank-container').innerHTML = `
                            <div class="my-rank-sticky">
                                <div style="display:flex; align-items:center; gap:12px;">
                                    <div class="r-circle">#${myRank}</div>
                                    <div><div style="font-weight:900; font-size:15px;">YOUR TEAM ${myTeamsInThisContest.length > 1 ? '(Best)' : ''}</div><div style="font-size:11px; font-weight:bold; color:#111;">C: ${bestMyTeam.cName} | VC: ${bestMyTeam.vcName}</div></div>
                                </div>
                                <div style="text-align:right;">
                                    <div style="font-weight:900; font-size:18px;">${bestMyTeam.points.toFixed(1)}</div>
                                    ${prizeDisplay}
                                </div>
                            </div>
                        `;

                        if (isMatchCompleted && myPrize > 0 && !isPaid) {
                            processWinnerPayout(bestMyTeam.teamKey, myPrize, myRank);
                        }
                    } else {
                        document.getElementById('my-rank-container').innerHTML = `<div class="my-rank-sticky" style="background:#222; color:#fff; border-top:1px solid #444;"><div style="font-size:13px; font-weight:bold;">Aapne yeh contest join nahi kiya hai.</div></div>`;
                    }
                });
            });
        }

        function processWinnerPayout(teamKey, prizeAmount, rank) {
            let teamRef = db.ref(`Game/Kalyan11/Contests/${matchId}/Teams/${teamKey}`);
            teamRef.once('value').then(snapshot => {
                let teamData = snapshot.val();
                if (teamData && teamData.payment_status !== "PAID") {
                    teamRef.update({ payment_status: "PAID" }).then(() => {
                        let userWalletRef = db.ref(`users/${myPhone}`);
                        userWalletRef.once('value').then(wSnap => {
                            let wData = wSnap.val() || {};
                            let currentWinningBal = parseFloat(wData.winning_balance || 0);
                            userWalletRef.update({ winning_balance: currentWinningBal + prizeAmount });

                            db.ref(`users/${myPhone}/Transactions`).push({
                                title: `🏆 Fantasy Winnings (Rank ${rank})`,
                                amount: prizeAmount,
                                type: "credit",
                                date: new Date().toLocaleString()
                            });
                        });
                    });
                }
            });
        }

        function loadMoreTeams() {
            if(displayedCount >= allCombinedTeams.length) return; 
            isFetching = true;
            let batch = allCombinedTeams.slice(displayedCount, displayedCount + BATCH_SIZE);

            batch.forEach((team, index) => {
                let rank = displayedCount + index + 1;
                let isMe = (!team.isBot && team.phone === myPhone);
                let displayPhone = isMe ? "You ("+team.phone+")" : team.phone.substring(0,4)+"****"+team.phone.substring(8,10);
                let rClass = rank <= 3 ? "rank-" + rank : "";
                let meClass = isMe ? "my-team" : "";
                let tag = isMe ? `<span class="my-tag">MY TEAM</span>` : ``;

                let prize = calculatePrize(rank, entryFee);
                let isPaid = team.payment_status === "PAID";
                
                let prizeHtml = (isMatchCompleted && prize > 0) ? `<br><span class="win-amt">🏆 ₹${prize.toLocaleString('en-IN')} ${isPaid && isMe ? '<span style="color:#00ff88; font-size:9px; border-left:1px solid #fff; margin-left:4px; padding-left:4px;">PAID</span>' : ''}</span>` : ``;

                listContainer.innerHTML += `
                    <div class="user-row ${rClass} ${meClass}">
                        <div class="rank-circle">${rank}</div>
                        <div class="user-details"><div class="user-name">${displayPhone} ${tag}</div><div class="cvc-info"><span class="c">C: ${team.cName}</span><span class="vc">VC: ${team.vcName}</span></div>${prizeHtml}</div>
                        <div class="points-box"><div class="pts-value">${team.points.toFixed(1)}</div><div class="pts-label">Points</div></div>
                    </div>
                `;
            });
            displayedCount += BATCH_SIZE;
            isFetching = false;
            scrollLoader.style.display = "none";
        }

        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 50 && !isFetching && displayedCount < allCombinedTeams.length) {
                isFetching = true;
                scrollLoader.style.display = "block"; 
                setTimeout(() => { loadMoreTeams(); }, 800); 
            }
        });
    </script>
</body>
</html>
