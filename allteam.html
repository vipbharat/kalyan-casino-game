<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan VIP - Team Database</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding: 20px; }
        .header { background: linear-gradient(135deg, #4a00e0, #8e2de2); padding: 15px; text-align: center; font-weight: 900; font-size: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 0 15px rgba(142, 45, 226, 0.5); }
        .box { background: #111; border: 1px solid #333; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #aaa; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; box-sizing: border-box; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; }
        textarea { height: 100px; resize: vertical; }
        .btn-save { background: #00ff88; color: #000; font-weight: 900; padding: 15px; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-size: 18px; }
        .team-card { background: #1a1a2e; border: 1px solid #444; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .team-name { font-weight: 900; color: #ffd700; font-size: 18px; margin-bottom: 5px; }
        .team-players { font-size: 12px; color: #aaa; line-height: 1.5; }
        .btn-delete { background: #ff004c; color: #fff; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; float: right; font-weight: bold;}
    </style>
</head>
<body>

    <div class="header">🗃️ ALL TEAMS DATABASE</div>
    
    <div style="text-align:center; margin-bottom:15px;">
        <button onclick="window.location.href='FantasyAdmin.html'" style="padding:10px 20px; background:#ffd700; color:#000; font-weight:bold; border:none; border-radius:5px; cursor:pointer;">
            <i class="fa-solid fa-arrow-left"></i> Back to Match Admin
        </button>
    </div>

    <div class="box">
        <h3 style="color:#00ff88; margin-top:0;">➕ Add New Team</h3>
        <p style="font-size:11px; color:#aaa; margin-top:-10px;">Free time me yahan teams save karke rakhein.</p>
        
        <div class="input-group">
            <label>Team Name (Short Name, e.g., IND, CSK)</label>
            <input type="text" id="tName" placeholder="Enter Team Name...">
        </div>
        <div class="input-group">
            <label>Players List (Comma Separated)</label>
            <textarea id="tPlayers" placeholder="Rohit Sharma, Virat Kohli, MS Dhoni..."></textarea>
        </div>
        <button class="btn-save" onclick="saveTeamToDB()"><i class="fa-solid fa-floppy-disk"></i> SAVE TEAM IN DATABASE</button>
        <div id="msg" style="color:#00ff88; font-weight:bold; text-align:center; margin-top:10px;"></div>
    </div>

    <div class="box">
        <h3 style="color:#ffd700; margin-top:0;">📚 Saved Teams List</h3>
        <div id="teamsList"><div style="text-align:center; color:#aaa;">Loading saved teams...</div></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        function saveTeamToDB() {
            let name = document.getElementById('tName').value.trim().toUpperCase();
            let players = document.getElementById('tPlayers').value.trim();
            if(!name || !players) { alert("Dono boxes bharna zaroori hai!"); return; }

            db.ref('Game/Kalyan11/SavedSquads/' + name).set(players).then(() => {
                document.getElementById('msg').innerText = "✅ Team Successfully Saved!";
                document.getElementById('tName').value = ""; document.getElementById('tPlayers').value = "";
                setTimeout(() => document.getElementById('msg').innerText = "", 3000);
            });
        }

        db.ref('Game/Kalyan11/SavedSquads').on('value', snap => {
            let list = document.getElementById('teamsList');
            list.innerHTML = snap.exists() ? "" : "<div style='text-align:center; color:#aaa;'>Koi team save nahi hai.</div>";
            snap.forEach(child => {
                list.innerHTML += `
                    <div class="team-card">
                        <button class="btn-delete" onclick="deleteTeam('${child.key}')"><i class="fa-solid fa-trash"></i></button>
                        <div class="team-name">${child.key}</div>
                        <div class="team-players">${child.val()}</div>
                    </div>`;
            });
        });

        function deleteTeam(name) { if(confirm("Delete team " + name + "?")) db.ref('Game/Kalyan11/SavedSquads/'+name).remove(); }
    </script>
</body>
</html>
