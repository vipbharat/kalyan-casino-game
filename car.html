<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Casino - Live Multiplayer</title>
    <style>
        :root { 
            --bg: #1a002b; 
            --panel: rgba(20, 20, 40, 0.8); 
            --gold: #ffcc00; 
            --neon-green: #00ff88; 
            --text: #ffffff; 
        }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #3d0066, #0a0014); color: var(--text); font-family: 'Arial', sans-serif; overflow: hidden; user-select: none; }
        
        audio { display: none; }

        .header { background: linear-gradient(90deg, #ff8c00, #ff0055, #9900ff); padding: 10px 15px; border-bottom: 3px solid var(--gold); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 5px 20px rgba(255, 0, 85, 0.5); z-index: 100; position: relative; }
        .balance-label { font-size: 1rem; color: #fff; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .balance-amount { font-size: 1.4rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 10px #000, 0 0 20px var(--gold); }

        .status-bar { text-align: center; margin-top: 15px; cursor: pointer; }
        .timer-text { font-size: 2.2rem; font-weight: 900; color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green); }
        .status-msg { font-size: 1rem; color: #ffcc00; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }

        .wheel-wrapper { position: relative; width: 230px; height: 230px; margin: 15px auto; background: radial-gradient(circle, #1a1a2e 40%, #000000 100%); border-radius: 50%; border: 6px solid #4a69bd; box-shadow: inset 0 0 40px rgba(0,0,0,0.9), 0 0 30px rgba(74, 105, 189, 0.6); }
        .wheel-icon { position: absolute; width: 30px; height: 30px; top: 50%; left: 50%; margin-top: -15px; margin-left: -15px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 900; transition: 0.3s; text-shadow: 0 0 5px currentColor; }
        
        .icon-porsche { color: #ff3333; } .icon-ferrari { color: #ff6b81; } .icon-lambo { color: #f1c40f; } .icon-maserati { color: #3742fa; }
        .icon-bmw { color: #00d2d3; } .icon-mercedes { color: #dfe4ea; } .icon-audi { color: #ffffff; } .icon-jaguar { color: #ff4757; }

        .spinner-ring { position: absolute; width: 100%; height: 100%; top: 0; left: 0; border-radius: 50%; transition: transform 4s cubic-bezier(0.15, 0.85, 0.2, 1); z-index: 10; }
        .glowing-dot { position: absolute; top: -3px; left: 50%; transform: translateX(-50%); width: 18px; height: 18px; background: #fff; border-radius: 50%; box-shadow: 0 0 20px 8px #fff, 0 0 40px var(--neon-green); border: 2px solid var(--neon-green); }

        .bet-table-wrapper { padding: 0 10px; margin-top: 10px; }
        .bet-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .bet-box { border-radius: 10px; padding: 6px 2px; text-align: center; position: relative; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; height: 85px; box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 4px 10px rgba(0,0,0,0.5); }
        .bet-box:active { transform: scale(0.92); }
        
        #porsche { background: linear-gradient(180deg, rgba(255,51,51,0.2), #000); border: 2px solid #ff3333; }
        #ferrari { background: linear-gradient(180deg, rgba(255,107,129,0.2), #000); border: 2px solid #ff6b81; }
        #lambo { background: linear-gradient(180deg, rgba(241,196,15,0.2), #000); border: 2px solid #f1c40f; }
        #maserati { background: linear-gradient(180deg, rgba(55,66,250,0.2), #000); border: 2px solid #3742fa; }
        #bmw { background: linear-gradient(180deg, rgba(0,210,211,0.2), #000); border: 2px solid #00d2d3; }
        #mercedes { background: linear-gradient(180deg, rgba(223,228,234,0.2), #000); border: 2px solid #dfe4ea; }
        #audi { background: linear-gradient(180deg, rgba(255,255,255,0.2), #000); border: 2px solid #ffffff; }
        #jaguar { background: linear-gradient(180deg, rgba(255,71,87,0.2), #000); border: 2px solid #ff4757; }

        #porsche .brand { color: #ff3333; text-shadow: 0 0 5px #ff3333; }
        #ferrari .brand { color: #ff6b81; text-shadow: 0 0 5px #ff6b81; }
        #lambo .brand { color: #f1c40f; text-shadow: 0 0 5px #f1c40f; }
        #maserati .brand { color: #3742fa; text-shadow: 0 0 5px #3742fa; }
        #bmw .brand { color: #00d2d3; text-shadow: 0 0 5px #00d2d3; }
        #mercedes .brand { color: #dfe4ea; text-shadow: 0 0 5px #dfe4ea; }
        #audi .brand { color: #ffffff; text-shadow: 0 0 5px #ffffff; }
        #jaguar .brand { color: #ff4757; text-shadow: 0 0 5px #ff4757; }

        .brand { font-size: 0.65rem; font-weight: 900; margin-bottom: 2px; text-transform: uppercase;}
        .logo { font-size: 1.5rem; line-height: 1.1; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.8)); }
        .multi { background: #000; color: var(--gold); font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-bottom: 2px; border: 1px solid var(--gold); }
        .my-bet-amt { color: #fff; font-size: 0.8rem; font-weight: bold; background: rgba(0,255,136,0.3); width: 90%; border-radius: 4px; border: 1px dashed var(--neon-green); padding: 1px 0; margin-top: auto; }

        .box-win { box-shadow: 0 0 25px var(--neon-green), inset 0 0 20px var(--neon-green) !important; border-color: var(--neon-green) !important; transform: scale(1.05); }
        .icon-win { filter: drop-shadow(0 0 15px var(--neon-green)); transform: scale(1.8); z-index: 20; color: var(--neon-green) !important; }

        .chip-rack { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .chip { width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 0.85rem; border: 3px dashed rgba(255,255,255,0.8); cursor: pointer; transition: 0.3s; color: white; text-shadow: 1px 1px 2px #000; box-shadow: inset 0 5px 10px rgba(255,255,255,0.4), inset 0 -5px 10px rgba(0,0,0,0.5), 0 5px 10px rgba(0,0,0,0.6); }
        .chip.active { transform: translateY(-10px) scale(1.15); border-style: solid; box-shadow: inset 0 5px 10px rgba(255,255,255,0.6), inset 0 -5px 10px rgba(0,0,0,0.5), 0 10px 20px var(--gold); border-color: var(--gold); }
        
        .c10 { background: radial-gradient(circle at 30% 30%, #1e90ff, #09407a); } 
        .c50 { background: radial-gradient(circle at 30% 30%, #eccc68, #b8860b); color: #333; text-shadow: none; } 
        .c100 { background: radial-gradient(circle at 30% 30%, #2ed573, #0a5f2a); } 
        .c500 { background: radial-gradient(circle at 30% 30%, #ff4757, #8b0000); } 
        .c1k { background: radial-gradient(circle at 30% 30%, #9b59b6, #4a1c5e); }

        .chip-fly { position: absolute; width: 22px; height: 22px; border-radius: 50%; border: 2px dashed #fff; z-index: 500; font-size: 8px; font-weight: bold; display: flex; justify-content: center; align-items: center; color: white; transition: all 0.4s ease-out; box-shadow: 0 5px 10px rgba(0,0,0,0.5); }
        
        .popup { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 4rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px var(--gold), 0 0 40px #ff3333; z-index: 1000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .popup.show { transform: translate(-50%, -50%) scale(1); }

    </style>
</head>
<body>

    <audio id="soundSpin" src="https://actions.google.com/sounds/v1/foley/mechanical_clock_ring.ogg"></audio>
    <audio id="soundWin" src="https://actions.google.com/sounds/v1/cartoon/clown_bicycle_horn.ogg"></audio>
    <audio id="soundBet" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg"></audio>

    <div class="header">
        <div>
            <div class="balance-label">Total Wallet</div>
            <div class="balance-amount" id="balanceDisplay">₹0</div>
        </div>
        <div style="font-weight:900; color:#fff; font-size:1.3rem; text-shadow: 0 0 10px #fff;">CASINO <span style="color:var(--gold)">PRO</span></div>
    </div>

    <div class="status-bar" id="startBtn">
        <div class="timer-text" id="timeText">Wait</div>
        <div class="status-msg" id="msgText">Connecting Server...</div>
    </div>

    <div class="wheel-wrapper" id="wheelWrapper">
        <div class="spinner-ring" id="spinnerRing">
            <div class="glowing-dot"></div>
        </div>
    </div>

    <div class="bet-table-wrapper">
        <div class="bet-grid" style="margin-bottom: 8px;">
            <div class="bet-box" id="porsche" onclick="placeBet('porsche', event)">
                <div class="brand">PORSCHE</div><div class="logo">🔴</div><div class="multi">40X</div><div class="my-bet-amt" id="bet-porsche">₹0</div>
            </div>
            <div class="bet-box" id="ferrari" onclick="placeBet('ferrari', event)">
                <div class="brand">FERRARI</div><div class="logo">🐎</div><div class="multi">30X</div><div class="my-bet-amt" id="bet-ferrari">₹0</div>
            </div>
            <div class="bet-box" id="lambo" onclick="placeBet('lambo', event)">
                <div class="brand">LAMBO</div><div class="logo">🐂</div><div class="multi">20X</div><div class="my-bet-amt" id="bet-lambo">₹0</div>
            </div>
            <div class="bet-box" id="maserati" onclick="placeBet('maserati', event)">
                <div class="brand">MASERATI</div><div class="logo">🔱</div><div class="multi">10X</div><div class="my-bet-amt" id="bet-maserati">₹0</div>
            </div>
        </div>
        <div class="bet-grid">
            <div class="bet-box" id="bmw" onclick="placeBet('bmw', event)">
                <div class="brand">BMW</div><div class="logo">🔵</div><div class="multi">5X</div><div class="my-bet-amt" id="bet-bmw">₹0</div>
            </div>
            <div class="bet-box" id="mercedes" onclick="placeBet('mercedes', event)">
                <div class="brand">BENZ</div><div class="logo">🌟</div><div class="multi">5X</div><div class="my-bet-amt" id="bet-mercedes">₹0</div>
            </div>
            <div class="bet-box" id="audi" onclick="placeBet('audi', event)">
                <div class="brand">AUDI</div><div class="logo">⭕</div><div class="multi">5X</div><div class="my-bet-amt" id="bet-audi">₹0</div>
            </div>
            <div class="bet-box" id="jaguar" onclick="placeBet('jaguar', event)">
                <div class="brand">JAGUAR</div><div class="logo">🐆</div><div class="multi">5X</div><div class="my-bet-amt" id="bet-jaguar">₹0</div>
            </div>
        </div>
    </div>

    <div class="chip-rack">
        <div class="chip c10" onclick="chooseChip(10, this)">10</div>
        <div class="chip c50" onclick="chooseChip(50, this)">50</div>
        <div class="chip c100 active" onclick="chooseChip(100, this)">100</div>
        <div class="chip c500" onclick="chooseChip(500, this)">500</div>
        <div class="chip c1k" onclick="chooseChip(1000, this)">1K</div>
    </div>

    <div class="popup" id="winMsg">+₹0</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, get, update, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // Yahan aapki exact details set kar di hain
    const firebaseConfig = {
        apiKey: "AIzaSyCy2zsDDJeVTQEblCenkLILqJ_Pz0a0", 
        authDomain: "kalyan-casino.firebaseapp.com",
        databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com",
        projectId: "kalyan-casino",
        storageBucket: "kalyan-casino.appspot.com",
        messagingSenderId: "805675620545",
        appId: "1:805675620545:web:6b49c99f325432a8249o40",
        measurementId: "G-Q6SFLD01YD"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let currentUserId = null;
    let userBalance = 0;
    let selectedChip = 100;
    let isBettingOpen = false;
    let currentRotation = 0;
    
    const carData = { porsche:40, ferrari:30, lambo:20, maserati:10, bmw:5, mercedes:5, audi:5, jaguar:5 };
    const carKeys = Object.keys(carData);
    let myBets = { porsche:0, ferrari:0, lambo:0, maserati:0, bmw:0, mercedes:0, audi:0, jaguar:0 };

    const wheelOrder = ['porsche', 'bmw', 'ferrari', 'mercedes', 'lambo', 'audi', 'maserati', 'jaguar', 'porsche', 'mercedes', 'ferrari', 'bmw', 'lambo', 'jaguar', 'maserati', 'audi'];
    const wheelIcons = { porsche:'P', ferrari:'F', lambo:'L', maserati:'M', bmw:'BMW', mercedes:'BENZ', audi:'A', jaguar:'JAG' };
    const wheelClasses = { porsche:'icon-porsche', ferrari:'icon-ferrari', lambo:'icon-lambo', maserati:'icon-maserati', bmw:'icon-bmw', mercedes:'icon-mercedes', audi:'icon-audi', jaguar:'icon-jaguar' };

    var audioSpin = document.getElementById('soundSpin');
    var audioWin = document.getElementById('soundWin');
    var audioBet = document.getElementById('soundBet');
    function playAudio(audioObj) { try { if(audioObj){ audioObj.currentTime=0; audioObj.play().catch(e=>{}); } } catch(e){} }

    function drawWheel() {
        var wrapper = document.getElementById('wheelWrapper');
        var radius = 100; 
        for(var i=0; i<wheelOrder.length; i++) {
            var carKey = wheelOrder[i];
            var angle = (i * (360 / 16) - 90) * (Math.PI / 180);
            var x = Math.round(radius * Math.cos(angle));
            var y = Math.round(radius * Math.sin(angle));

            var iconDiv = document.createElement('div');
            iconDiv.className = 'wheel-icon ' + wheelClasses[carKey];
            iconDiv.id = 'wheel-icon-' + i;
            iconDiv.innerText = wheelIcons[carKey];
            iconDiv.style.transform = 'translate(' + x + 'px, ' + y + 'px)';
            wrapper.appendChild(iconDiv);
        }
    }
    drawWheel();

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUserId = user.uid;
            document.getElementById('msgText').innerText = "Account Connected";
            
            onValue(ref(db, `Users/${currentUserId}/balance`), (snapshot) => {
                userBalance = snapshot.val() || 0;
                document.getElementById('balanceDisplay').innerText = "₹" + userBalance;
            });
        } else {
            document.getElementById('msgText').innerText = "Please Login First!";
        }
    });

    window.chooseChip = function(amt, elem) {
        selectedChip = amt; 
        var allChips = document.querySelectorAll('.chip');
        for(var i=0; i<allChips.length; i++) { allChips[i].classList.remove('active'); }
        elem.classList.add('active');
        playAudio(audioBet);
    };

    function getChipColor(amt) {
        if(amt == 10) return 'radial-gradient(circle at 30% 30%, #1e90ff, #09407a)'; 
        if(amt == 50) return 'radial-gradient(circle at 30% 30%, #eccc68, #b8860b)';
        if(amt == 100) return 'radial-gradient(circle at 30% 30%, #2ed573, #0a5f2a)'; 
        if(amt == 500) return 'radial-gradient(circle at 30% 30%, #ff4757, #8b0000)'; 
        return 'radial-gradient(circle at 30% 30%, #9b59b6, #4a1c5e)';
    }

    window.placeBet = function(carId, event) {
        if(!isBettingOpen) return;
        if(!currentUserId) { alert("Login Error! Please restart app."); return; }
        if(userBalance < selectedChip) { alert("Insufficient Balance!"); return; }

        playAudio(audioBet);

        update(ref(db, `Users/${currentUserId}`), { balance: userBalance - selectedChip });
        
        update(ref(db, `Game/CarRoulette/Bets/${currentUserId}`), { 
            [carId]: increment(selectedChip) 
        });

        myBets[carId] += selectedChip;
        document.getElementById('bet-' + carId).innerText = "₹" + myBets[carId];

        var fly = document.createElement('div');
        fly.className = 'chip-fly';
        fly.style.background = getChipColor(selectedChip);
        fly.innerText = selectedChip >= 1000 ? (selectedChip/1000)+'K' : selectedChip;
        fly.style.left = event.clientX + 'px';
        fly.style.top = event.clientY + 'px';
        document.body.appendChild(fly);

        var targetBox = document.getElementById(carId).getBoundingClientRect();
        setTimeout(() => {
            fly.style.left = (targetBox.left + 20 + Math.random() * 30) + 'px';
            fly.style.top = (targetBox.top + 20 + Math.random() * 30) + 'px';
            setTimeout(() => { fly.remove(); }, 400);
        }, 50);
    };

    let lastTimerTick = Date.now();
    let isMaster = false;

    onValue(ref(db, 'Game/CarRoulette/Status'), (snapshot) => {
        let status = snapshot.val();
        if(status) {
            lastTimerTick = Date.now();
            let timer = status.timer;

            if(status.state === 'betting') {
                isBettingOpen = true;
                document.getElementById('timeText').innerText = timer;
                document.getElementById('timeText').style.color = timer <= 5 ? "var(--neon-red)" : "var(--neon-green)";
                document.getElementById('msgText').innerText = timer <= 5 ? "CLOSING..." : "PLACE YOUR BETS";
                
                if(timer === 15) { resetTable(); } 
            } 
            else if (status.state === 'spinning' && isBettingOpen) {
                isBettingOpen = false;
                runWheelSpin(status.winner);
            }
        }
    });

    setInterval(() => {
        if(Date.now() - lastTimerTick > 3000) { isMaster = true; } 
        
        if(isMaster) {
            get(ref(db, 'Game/CarRoulette/Status/timer')).then((snap) => {
                let t = snap.val() || 15;
                if(t > 0) {
                    set(ref(db, 'Game/CarRoulette/Status'), { timer: t - 1, state: 'betting', winner: '' });
                } else {
                    get(ref(db, 'Game/CarRoulette/Bets')).then((betsSnap) => {
                        let allUserBets = betsSnap.val() || {};
                        let totalRealBets = { porsche:0, ferrari:0, lambo:0, maserati:0, bmw:0, mercedes:0, audi:0, jaguar:0 };

                        for(let uid in allUserBets) {
                            for(let car in allUserBets[uid]) {
                                totalRealBets[car] += allUserBets[uid][car];
                            }
                        }

                        let minLoss = 9999999999;
                        for(let car in totalRealBets) {
                            let loss = totalRealBets[car] * carData[car];
                            if(loss < minLoss) minLoss = loss;
                        }

                        let safeCars = [];
                        for(let car in totalRealBets) {
                            if(totalRealBets[car] * carData[car] === minLoss) safeCars.push(car);
                        }

                        let winningCar = safeCars[Math.floor(Math.random() * safeCars.length)];
                        
                        set(ref(db, 'Game/CarRoulette/Status'), { timer: 0, state: 'spinning', winner: winningCar });
                        
                        setTimeout(() => {
                            set(ref(db, 'Game/CarRoulette/Bets'), null);
                            set(ref(db, 'Game/CarRoulette/Status'), { timer: 15, state: 'betting', winner: '' });
                        }, 8000);
                    });
                    isMaster = false; 
                }
            });
        }
    }, 1000);

    function runWheelSpin(winnerCar) {
        document.getElementById('msgText').innerText = "SPINNING...";
        document.getElementById('timeText').innerText = "0";
        playAudio(audioSpin);
        
        var possibleIndexes = [];
        for(var i=0; i<wheelOrder.length; i++) {
            if(wheelOrder[i] === winnerCar) possibleIndexes.push(i);
        }
        
        var finalTargetIndex = possibleIndexes[Math.floor(Math.random() * possibleIndexes.length)];
        var targetAngle = finalTargetIndex * 22.5; 
        
        var extraSpins = 1800; 
        var baseRotation = Math.floor(currentRotation / 360) * 360; 
        var finalRotation = baseRotation + extraSpins + targetAngle;
        
        currentRotation = finalRotation;
        var spinner = document.getElementById('spinnerRing');
        spinner.style.transform = 'rotate(' + finalRotation + 'deg)';

        setTimeout(() => {
            if(audioSpin) audioSpin.pause();
            showWinner(winnerCar, finalTargetIndex);
        }, 4100);
    }

    function showWinner(winId, iconIndex) {
        playAudio(audioWin);
        document.getElementById('msgText').innerText = "WINNER!";
        document.getElementById('timeText').innerText = winId.toUpperCase();
        
        document.getElementById(winId).classList.add('box-win');
        document.getElementById('wheel-icon-' + iconIndex).classList.add('icon-win');

        if(myBets[winId] > 0 && currentUserId) {
            var wonAmt = myBets[winId] * carData[winId];
            update(ref(db, `Users/${currentUserId}`), { balance: increment(wonAmt) });

            var p = document.getElementById('winMsg');
            p.innerText = "+₹" + wonAmt.toLocaleString();
            p.classList.add('show');
            setTimeout(() => { p.classList.remove('show'); }, 3000);
        }
    }

    function resetTable() {
        for(var key in carData) {
            myBets[key] = 0;
            document.getElementById('bet-' + key).innerText = "₹0";
            document.getElementById(key).classList.remove('box-win');
        }
        for(var i=0; i<16; i++){
            document.getElementById('wheel-icon-' + i).classList.remove('icon-win');
        }
    }
</script>
</body>
</html>
