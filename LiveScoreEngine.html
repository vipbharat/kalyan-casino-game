<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALYAN VIP - SMART AUTO ENGINE 🚀</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050510; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .header { text-align: center; border-bottom: 2px solid #00ff88; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #00ff88; font-size: 24px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0,255,136,0.3);}
        .terminal { background: #000; border: 1px solid #00ff88; padding: 15px; border-radius: 5px; height: 350px; overflow-y: auto; font-family: monospace; font-size: 12px; margin-bottom: 20px;}
        .terminal p { margin: 4px 0; border-bottom: 1px dashed #111; padding-bottom: 4px;}
        .log-info { color: #00d2d3; } .log-success { color: #00ff88; } .log-error { color: #ff004c; } .log-warn { color: #ff9f43; }
        .status-badge { display: inline-block; padding: 8px 15px; border-radius: 15px; font-size: 12px; font-weight: bold; background: #333; color: #aaa; margin-top: 10px;}
        .status-badge.active { background: #00ff88; color: #000; box-shadow: 0 0 10px rgba(0,255,136,0.5); animation: pulse 2s infinite;}
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-satellite-dish"></i> VIP AUTO ENGINE</h1>
        <p style="color:#aaa; font-size:12px;">Admin Panel ke Command ka wait kar raha hai...</p>
    </div>

    <div style="text-align: center; margin-bottom: 20px;">
        <div class="status-badge" id="sync-status">Status: WAITING FOR ADMIN 📱</div>
    </div>

    <div class="terminal" id="console-box">
        <p class="log-info">> Engine Started. Database se connect ho raha hai...</p>
    </div>

<script>
    // Firebase Setup
    const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    // Aapki Google API
    const API_URL = "https://script.google.com/macros/s/AKfycbyCsBcyJ7HIIBQPULR1RNQs5FU1QIzmNRKDQQ54s61c1Ni4cH_1EtFqaOlSrzLMBj0yfA/exec";
    
    let activeMatchesList = {};

    function cLog(type, msg) {
        let box = document.getElementById('console-box');
        let time = new Date().toLocaleTimeString();
        box.innerHTML += `<p class="log-${type}">[${time}] ${msg}</p>`;
        box.scrollTop = box.scrollHeight; 
    }

    // --- 📡 ADMIN PANEL KI COMMAND SUNO ---
    db.ref(`Game/Kalyan11/LiveEngine`).on('value', (snapshot) => {
        if(snapshot.exists()) {
            activeMatchesList = snapshot.val();
            let count = Object.keys(activeMatchesList).length;
            document.getElementById('sync-status').innerText = `Status: ${count} MATCHES RECEIVED 📱`;
            document.getElementById('sync-status').classList.add("active");
            cLog('success', `📱 Admin Panel se ${count} active match(es) ka data mila.`);
        } else {
            activeMatchesList = {};
            document.getElementById('sync-status').innerText = "Status: WAITING FOR ADMIN 📱";
            document.getElementById('sync-status').classList.remove("active");
        }
    });

    // --- ⏱️ HAR 3 MINUTE MEIN CHECK KARO ---
    setInterval(async () => {
        let now = Date.now();
        let matchIds = Object.keys(activeMatchesList);

        if(matchIds.length === 0) return; // Koi match nahi hai toh ruko

        for (let i = 0; i < matchIds.length; i++) {
            let match = activeMatchesList[matchIds[i]];
            
            // ⏰ TIME CHECK: Kya toss ka time (Match - 20 mins) ho gaya hai?
            if (now >= match.wakeUpTime) {
                cLog('info', `🔥 Waking up for Match: ${match.matchId}`);
                await fetchAndSync(match.matchId, match.cricbuzzLink);
            } else {
                let minsLeft = Math.floor((match.wakeUpTime - now) / 60000);
                cLog('warn', `⏳ ${match.matchId}: Toss hone mein ${minsLeft} minute baaki hain. Sleeping...`);
            }
        }
    }, 180000); // Har 3 Minute (180000 ms)

    // --- 🔥 FULL FETCH AUR UPDATE LOGIC ---
    async function fetchAndSync(matchId, currentMatchLink) {
        if(!matchId || !currentMatchLink) return;

        try {
            cLog('info', `[${matchId}] Scorecard Fetch kar raha hoon...`);
            
            let finalUrl = API_URL + "?url=" + encodeURIComponent(currentMatchLink);
            let response = await fetch(finalUrl);
            let htmlText = await response.text();
            
            if(!htmlText || htmlText.length < 500) throw new Error("Google API ne HTML block kar diya ya galat link hai.");

            let parser = new DOMParser();
            let doc = parser.parseFromString(htmlText, "text/html");

            // --- 🏁 MATCH KHATAM CHECK ---
            let statusText = doc.querySelector('.cb-scrd-status')?.innerText || "";
            if (statusText.toLowerCase().includes("won by") || statusText.toLowerCase().includes("result")) {
                cLog('error', `🏁 [${matchId}] MATCH KHATAM HO GAYA HAI! Status: ${statusText}`);
                cLog('info', `Engine list se match ko hata raha hoon...`);
                // Match khatam hone par Firebase se link hata do taaki engine baar-baar scan na kare
                await db.ref(`Game/Kalyan11/LiveEngine/${matchId}`).remove();
                return;
            }

            let rows = doc.querySelectorAll('.cb-scrd-itms');
            if(rows.length === 0) {
                cLog('warn', `[${matchId}] Lineup abhi tak nahi aayi hai.`);
                return;
            }

            // Firebase se existing players laao
            let dbSnap = await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).once('value');
            if(!dbSnap.exists()) throw new Error("Players DB mein nahi mile!");
            let dbPlayers = dbSnap.val();
            let playerIdMap = {}; 
            
            Object.keys(dbPlayers).forEach(key => {
                let cleanName = dbPlayers[key].name.toLowerCase().replace(/[^a-z0-9]/g, '');
                playerIdMap[cleanName] = key; 
            });

            let playerUpdates = {}; 
            
            rows.forEach(row => {
                let nameElement = row.querySelector('a.cb-text-link');
                if(!nameElement) return; 
                
                let cleanScrapedName = nameElement.innerText.toLowerCase().replace(/\(c\)/ig, '').replace(/\(wk\)/ig, '').replace(/[^a-z0-9]/g, '');

                let matchedFirebaseKey = null;
                for (let dbName in playerIdMap) {
                    if (cleanScrapedName.includes(dbName) || dbName.includes(cleanScrapedName)) {
                        matchedFirebaseKey = playerIdMap[dbName]; break;
                    }
                }

                if(!matchedFirebaseKey) return; 

                // Runs aur Wickets nikalne ka logic
                let cols = row.querySelectorAll('.cb-col');
                let runs = 0, wickets = 0;
                let isBowling = row.innerText.toUpperCase().includes('ECO') || cols.length >= 8;

                if (isBowling) { 
                    wickets = cols[4] ? parseInt(cols[4].innerText) || 0 : 0; 
                } else { 
                    runs = cols[2] ? parseInt(cols[2].innerText) || 0 : 0; 
                }

                if (!playerUpdates[matchedFirebaseKey]) { 
                    playerUpdates[matchedFirebaseKey] = { runs: 0, wickets: 0 }; 
                }
                
                playerUpdates[matchedFirebaseKey].runs += runs;
                playerUpdates[matchedFirebaseKey].wickets += wickets;
                
                // POINTS FORMULA: 1 Run = 1 Pt, 1 Wicket = 25 Pt
                playerUpdates[matchedFirebaseKey].points = (playerUpdates[matchedFirebaseKey].runs * 1) + (playerUpdates[matchedFirebaseKey].wickets * 25);
            });

            // Firebase me Update karo (Runs, Wickets, Points, aur Playing Status)
            let keysToUpdate = Object.keys(playerUpdates);
            if(keysToUpdate.length > 0) {
                let firebasePayload = {};
                keysToUpdate.forEach(key => { 
                    firebasePayload[key + '/points'] = playerUpdates[key].points; 
                    firebasePayload[key + '/runs'] = playerUpdates[key].runs; 
                    firebasePayload[key + '/wickets'] = playerUpdates[key].wickets; 
                    firebasePayload[key + '/playingStatus'] = "playing"; // Toss hote hi player ko Playing list me daal dega
                });
                
                await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).update(firebasePayload);
                cLog('success', `✅ BOOM! [${matchId}] ${keysToUpdate.length} Players Updated!`);
            } else {
                cLog('error', `Data mila par naam match nahi hue.`);
            }

        } catch(e) { 
            cLog('error', `[${matchId}] Sync Failed: ${e.message}`);
        }
    }
</script>
</body>
</html>
