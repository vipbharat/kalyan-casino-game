<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALYAN VIP - GHOST ENGINE 👻</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050510; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .header { text-align: center; border-bottom: 2px solid #8a2be2; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #8a2be2; font-size: 24px; text-transform: uppercase; text-shadow: 0 0 10px rgba(138,43,226,0.5);}
        .add-box { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);}
        input { width: calc(100% - 20px); padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; }
        .btn { width: 100%; padding: 12px; background: #8a2be2; color: #fff; border: none; border-radius: 5px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; box-shadow: 0 0 15px rgba(138,43,226,0.4);}
        
        .terminal { background: #000; border: 1px solid #8a2be2; padding: 10px; border-radius: 5px; height: 180px; overflow-y: auto; font-family: monospace; font-size: 11px; margin-bottom: 20px;}
        .terminal p { margin: 2px 0; border-bottom: 1px dashed #111; padding-bottom: 2px;}
        .log-info { color: #00d2d3; } .log-success { color: #00ff88; } .log-error { color: #ff004c; } .log-warn { color: #ffd700; }

        .match-card { background: #111; border: 1px solid #8a2be2; padding: 15px; border-radius: 10px; margin-bottom: 15px; position: relative;}
        .match-id { font-size: 16px; font-weight: 900; color: #ffd700; margin-bottom: 5px; }
        .delete-btn { position: absolute; top: 15px; right: 15px; color: #ff004c; cursor: pointer; font-size: 18px; }
        .player-log { font-size: 11px; color: #fff; margin-top: 10px; padding: 10px; background: #000; border-radius: 5px; border: 1px dashed #333;}
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-ghost fa-fade"></i> GHOST ENGINE</h1>
        <p style="color:#aaa; font-size:12px;">Bypassing Security via Weak Mobile Endpoints</p>
    </div>

    <div class="terminal" id="console-box">
        <p class="log-info">> Ghost Engine Initialized...</p>
        <p class="log-info">> Target: Mobile (Low-Security) Sites</p>
    </div>

    <div class="add-box">
        <input type="text" id="m-id" placeholder="Firebase Match ID (e.g., MATCH_1711...)">
        <input type="text" id="m-link" placeholder="Paste ANY Cricbuzz Link Here">
        <button class="btn" onclick="addMatch()">ADD MATCH</button>
        <button class="btn" style="background:#00ff88; color:#000;" onclick="syncAllMatches()">GHOST SYNC NOW</button>
    </div>

    <div id="matches-container"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    let activeMatches = JSON.parse(localStorage.getItem('kalyan_ghost_matches')) || [];

    function cLog(type, msg) {
        let box = document.getElementById('console-box');
        let time = new Date().toLocaleTimeString();
        box.innerHTML += `<p class="log-${type}">[${time}] ${msg}</p>`;
        box.scrollTop = box.scrollHeight; 
    }

    function saveMatches() { localStorage.setItem('kalyan_ghost_matches', JSON.stringify(activeMatches)); renderMatches(); }

    function addMatch() {
        let id = document.getElementById('m-id').value.trim();
        let link = document.getElementById('m-link').value.trim();
        if(!id || !link) return alert("Details missing!");
        
        // 🚨 HACKER JUGAAD: Convert www.cricbuzz.com to m.cricbuzz.com (Low Security)
        let ghostLink = link.replace('www.cricbuzz.com', 'm.cricbuzz.com');
        if(!ghostLink.includes('scorecard')) { ghostLink += "/scorecard"; }
        
        activeMatches.push({ id: id, link: ghostLink, lastSync: "Waiting...", logDetails: "" });
        document.getElementById('m-id').value = ""; document.getElementById('m-link').value = "";
        cLog('success', `Ghost Target Locked: ${id}`);
        saveMatches();
    }

    function removeMatch(id) {
        if(confirm("Hata dein?")) { activeMatches = activeMatches.filter(m => m.id !== id); saveMatches(); cLog('error', `Match Removed.`);}
    }

    function renderMatches() {
        const container = document.getElementById('matches-container'); container.innerHTML = "";
        activeMatches.forEach(m => {
            container.innerHTML += `
                <div class="match-card">
                    <i class="fa-solid fa-trash delete-btn" onclick="removeMatch('${m.id}')"></i>
                    <div class="match-id">${m.id}</div>
                    <div style="font-size:10px; color:#aaa; margin-bottom:10px;">Target: ${m.link.substring(0, 45)}...</div>
                    <div style="font-size:12px; color:#00ff88; font-weight:bold;">Last Sync: ${m.lastSync}</div>
                    <div class="player-log" id="plog-${m.id}">${m.logDetails || "Waiting for data..."}</div>
                </div>
            `;
        });
    }

    async function syncMatchData(matchObj) {
        let pLogEl = document.getElementById(`plog-${matchObj.id}`);
        
        try {
            cLog('info', `Infiltrating Match: ${matchObj.id}...`);
            
            // 1. Get Firebase Players
            cLog('warn', `Loading DB Squad...`);
            let dbSnap = await db.ref(`Game/Kalyan11/MatchPlayers/${matchObj.id}`).once('value');
            if(!dbSnap.exists()) throw new Error("Match ID nahi mili DB mein!");
            
            let dbPlayers = dbSnap.val();
            let playerIdMap = {}; 
            
            Object.keys(dbPlayers).forEach(key => {
                let cleanName = dbPlayers[key].name.toLowerCase().replace(/[^a-z]/g, '');
                playerIdMap[cleanName] = key; 
            });

            // 2. Fetch Low-Security Mobile Site via AllOrigins
            cLog('warn', `Bypassing via Ghost Protocol...`);
            let proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(matchObj.link)}`;
            
            let response = await fetch(proxyUrl);
            let data = await response.json();
            
            if(!data.contents) throw new Error("Proxy Blocked! Target site changed security.");
            
            // 3. PURE REGEX SCRAPER (Doesn't care about HTML structure)
            cLog('info', `Scanning Raw Code for Stats...`);
            
            // Remove scripts and styles to clean HTML
            let cleanHtml = data.contents.replace(/<script[^>]*>([\s\S]*?)<\/script>/gi, '').replace(/<style[^>]*>([\s\S]*?)<\/style>/gi, '');
            
            let parser = new DOMParser();
            let doc = parser.parseFromString(cleanHtml, "text/html");
            let plainText = doc.body.innerText.replace(/\n+/g, ' '); // Convert whole page to plain text

            let playerUpdates = {}; 
            
            // Loop through our database players and search them in the plain text
            Object.keys(playerIdMap).forEach(cleanName => {
                let dbKey = playerIdMap[cleanName];
                let realName = dbPlayers[dbKey].name;
                
                // Taking last name for better search (e.g. "Kohli")
                let nameParts = realName.split(' ');
                let lastName = nameParts[nameParts.length - 1];
                
                // Advanced Text Scanning (Looking for Numbers near the Name)
                // Since mobile sites print names followed by Runs (Batting) or Wickets (Bowling)
                let regexBatting = new RegExp(`${lastName}.*?(\\d+)\\s+(\\d+)\\s+(\\d+)\\s+(\\d+)`, 'i');
                let matchBat = plainText.match(regexBatting);
                
                let runs = 0, wickets = 0;

                if(matchBat && matchBat[1]) {
                    runs = parseInt(matchBat[1]); // First number after name is usually runs
                }

                // If no runs found, maybe it's a bowler. Let's look for Wickets.
                // Bowler format: Name O M R W
                let regexBowling = new RegExp(`${lastName}.*?(\\d+\\.?\\d*)\\s+(\\d+)\\s+(\\d+)\\s+(\\d+)`, 'i');
                let matchBowl = plainText.match(regexBowling);

                if(matchBowl && matchBowl[4]) {
                    wickets = parseInt(matchBowl[4]); // Fourth number is usually Wickets
                }

                // If we found either runs or wickets, save it!
                if(runs > 0 || wickets > 0) {
                    playerUpdates[dbKey] = {
                        name: realName,
                        runs: runs,
                        wickets: wickets,
                        points: (runs * 1) + (wickets * 25)
                    };
                }
            });

            // 4. Update Firebase
            let keysToUpdate = Object.keys(playerUpdates);
            if(keysToUpdate.length > 0) {
                let firebasePayload = {};
                let logTextStr = "";

                keysToUpdate.forEach(key => {
                    let p = playerUpdates[key];
                    firebasePayload[key + '/points'] = p.points;
                    logTextStr += `<span style="color:#00ff88;">✔ ${p.name}</span>: ${p.points} Pts (R:${p.runs}, W:${p.wickets})<br>`;
                });

                await db.ref(`Game/Kalyan11/MatchPlayers/${matchObj.id}`).update(firebasePayload);
                
                let timeNow = new Date().toLocaleTimeString();
                cLog('success', `✅ GHOST SYNC SUCCESSFUL!`);
                pLogEl.innerHTML = logTextStr;
                
                let idx = activeMatches.findIndex(m => m.id === matchObj.id);
                if(idx > -1) { activeMatches[idx].lastSync = timeNow; activeMatches[idx].logDetails = logTextStr; saveMatches(); }
            } else {
                cLog('error', `⚠️ Data scanned but no matching players with scores found. Match might not be started.`);
            }

        } catch(e) { 
            cLog('error', e.message);
            pLogEl.innerHTML = `<span style="color:#ff004c;">Error: ${e.message}</span>`;
        }
    }

    async function syncAllMatches() {
        if(activeMatches.length === 0) { cLog('info', 'No Ghost Targets Locked.'); return; }
        for(let match of activeMatches) { await syncMatchData(match); await new Promise(r => setTimeout(r, 2000)); }
    }

    renderMatches();
</script>
</body>
</html>
