<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALYAN VIP - ULTIMATE ENGINE 🚀</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050510; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .header { text-align: center; border-bottom: 2px solid #00ff88; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #00ff88; font-size: 24px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0,255,136,0.3);}
        .box { background: #1a1a2e; padding: 15px; border-radius: 10px; border: 1px solid #444; margin-bottom: 20px; }
        h3 { margin-top: 0; font-size: 14px; color: #00d2d3; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 8px;}
        input { width: calc(100% - 22px); padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; font-weight: bold;}
        .btn-start { width: 100%; padding: 12px; background: #00ff88; color: #000; font-weight: 900; border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase;}
        .terminal { background: #000; border: 1px solid #00ff88; padding: 15px; border-radius: 5px; height: 300px; overflow-y: auto; font-family: monospace; font-size: 11px; margin-bottom: 20px;}
        .terminal p { margin: 4px 0; border-bottom: 1px dashed #111; padding-bottom: 4px;}
        .log-info { color: #00d2d3; } .log-success { color: #00ff88; } .log-error { color: #ff004c; } .log-warn { color: #ffd700; }
        .status-badge { display: inline-block; padding: 8px 15px; border-radius: 15px; font-size: 12px; font-weight: bold; background: #333; color: #aaa; margin-top: 10px;}
        .status-badge.active { background: #00ff88; color: #000; box-shadow: 0 0 10px rgba(0,255,136,0.5); }
        .match-card { background: #000; border: 1px solid #00ff88; padding: 10px; border-radius: 5px; margin-bottom: 10px; position: relative; }
        .btn-stop { background: #ff004c; color: #fff; border: none; padding: 6px 12px; border-radius: 3px; cursor: pointer; font-size: 10px; font-weight: bold; text-transform: uppercase; float: right;}
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-brands fa-python"></i> PYTHON VIP ENGINE</h1>
        <div class="status-badge" id="sync-status">Status: CONNECTING...</div>
    </div>

    <div class="box">
        <h3><i class="fa-solid fa-server"></i> Add Match</h3>
        
        <input type="hidden" id="api-url" value="https://kalyan-point-enginee-2.onrender.com">
        
        <input type="text" id="m-id" placeholder="Match ID yahan daalein (e.g. 149673)">
        <input type="datetime-local" id="m-time">
        <button class="btn-start" onclick="saveMatchToDatabase()">SAVE & START SYNC</button>
    </div>

    <div class="box" id="active-matches-container" style="display: none;">
        <h3><i class="fa-solid fa-list"></i> Running Matches</h3>
        <div id="active-matches-list"></div>
    </div>

    <div class="terminal" id="console-box">
        <p class="log-info">> Ultimate Python Engine Ready! 🚀</p>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();
    
    let activeMatches = {};

    function cLog(type, msg) {
        let box = document.getElementById('console-box');
        box.innerHTML += `<p class="log-${type}">[${new Date().toLocaleTimeString()}] ${msg}</p>`;
        box.scrollTop = box.scrollHeight; 
    }

    function saveMatchToDatabase() {
        let id = document.getElementById('m-id').value.trim();
        let time = document.getElementById('m-time').value;

        if(!id || !time) return alert("Sari details bhariye!");
        
        let wakeTime = new Date(time).getTime() - 1200000; 
        db.ref(`Game/Kalyan11/LiveEngine/${id}`).set({ matchId: id, wakeUpTime: wakeTime })
        .then(() => {
            document.getElementById('m-id').value = ""; 
            cLog('success', `Match ${id} Added! Data aapke Python server se aayega.`);
        });
    }

    function stopMatch(id) {
        if(confirm(`Kya aap sach mein Match ${id} rokna chahte hain?`)) {
            db.ref(`Game/Kalyan11/LiveEngine/${id}`).remove();
            cLog('error', `🛑 Engine Stopped for Match: ${id}`);
        }
    }

    db.ref(`Game/Kalyan11/LiveEngine`).on('value', (snapshot) => {
        activeMatches = snapshot.exists() ? snapshot.val() : {};
        let count = Object.keys(activeMatches).length;
        document.getElementById('sync-status').innerText = `Status: SYNCING ${count} MATCHES 🔥`;
        document.getElementById('sync-status').className = count > 0 ? "status-badge active" : "status-badge";

        let listDiv = document.getElementById('active-matches-list');
        let container = document.getElementById('active-matches-container');
        
        if (count > 0) {
            container.style.display = "block";
            let html = "";
            for (let id in activeMatches) {
                html += `
                <div class="match-card">
                    <strong>Match ID: ${id}</strong>
                    <button class="btn-stop" onclick="stopMatch('${id}')"><i class="fa-solid fa-trash"></i></button>
                </div>`;
            }
            listDiv.innerHTML = html;
        } else {
            container.style.display = "none"; listDiv.innerHTML = "";
        }
    });

    setInterval(async () => {
        let now = Date.now();
        let ids = Object.keys(activeMatches);
        for (let id of ids) {
            let m = activeMatches[id];
            if (now >= m.wakeUpTime) { await runPythonSync(id); }
        }
    }, 25000); 

    // 🌐 PYTHON SERVER API CALL
    async function runPythonSync(matchId) {
        try {
            cLog('info', `🌐 Aapke Server se data laa rahe hain (Match: ${matchId})...`);
            
            let baseUrl = document.getElementById('api-url').value;
            let finalUrl = `${baseUrl}/get-scorecard?id=${matchId}`;
            
            let res = await fetch(finalUrl);
            let html = await res.text();

            if (!html || html.includes("Exception:") || html.includes("Error:") || html.includes("Cloudflare")) {
                cLog('error', `❌ API Error: Data fetch nahi hua. Thoda rukiye...`);
                return; 
            }

            let doc = new DOMParser().parseFromString(html, "text/html");
            await parseCricbuzz(doc, matchId);
            
        } catch (e) { cLog('warn', `Server thoda busy hai ya start ho raha hai, wait karein...`); }
    }

    async function updateLiveLeaderboard(matchId) {
        try {
            let pSnap = await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).once('value');
            let tSnap = await db.ref(`Game/Kalyan11/Contests/${matchId}/Teams`).once('value');
            if(!pSnap.exists() || !tSnap.exists()) return;

            let playersObj = pSnap.val();
            let updates = {};
            let maxScore = 0;

            tSnap.forEach(child => {
                let t = child.val();
                let calculatedPoints = 0;
                let teamPlayers = t.players || {};
                
                Object.values(teamPlayers).forEach(pKey => {
                    let livePt = (playersObj[pKey] && playersObj[pKey].points) ? parseFloat(playersObj[pKey].points) : 0;
                    if(pKey === t.captain) calculatedPoints += (livePt * 2);
                    else if(pKey === t.viceCaptain) calculatedPoints += (livePt * 1.5);
                    else calculatedPoints += livePt;
                });

                let finalPts = parseFloat(calculatedPoints.toFixed(1));
                if(finalPts > maxScore) maxScore = finalPts;
                updates[child.key + '/total_points'] = finalPts;
            });

            if(Object.keys(updates).length > 0) {
                await db.ref(`Game/Kalyan11/Contests/${matchId}/Teams`).update(updates);
                cLog('success', `🏆 LEADERBOARD UPDATED (Highest: ${maxScore} Pts)`);
            }
        } catch(e) { cLog('error', `Leaderboard Error: ${e.message}`); }
    }

    // 🔥 THE BRAHMASTRA PARSER (ULTIMATE FIX) 🔥
    async function parseCricbuzz(doc, matchId) {
        let dbSnap = await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).once('value');
        if(!dbSnap.exists() || !dbSnap.val()) {
            cLog('error', `❌ Database mein Match ${matchId} ke khiladi nahi mile!`);
            return;
        }

        let players = dbSnap.val();
        let updates = {};
        let scrapedData = {};

        // Cricbuzz ki har table row ko scan karega
        let rows = doc.querySelectorAll('.cb-scrd-itms');
        let validRowsCount = 0;

        rows.forEach(row => {
            // Asli Brahmastra: 'textContent' ka use kiya hai jo hidden HTML bhi padh leta hai
            let nameEl = row.querySelector('a');
            
            // Sirf wahi link uthayega jisme khiladi ki profile ho
            if(!nameEl || !nameEl.getAttribute('href') || !nameEl.getAttribute('href').includes('profiles')) return;

            validRowsCount++;
            let nameText = nameEl.textContent; // <--- Hidden text ko padhne ka tareeka

            let webClean = nameText.toLowerCase().replace(/\(c\)/g,'').replace(/\(wk\)/g,'').replace(/[^a-z]/g, ' ').replace(/\s+/g, ' ').trim();
            if(!webClean || webClean.length < 3) return;

            if(!scrapedData[webClean]) scrapedData[webClean] = { runs: 0, wickets: 0 };

            // BATSMAN HAI YA BOWLER?
            let isBowler = row.querySelector('.cb-col-38') !== null; 
            
            // RUNS AUR WICKETS NIKALNE KA SUPER TRICK
            let boldTextEl = row.querySelector('.text-bold'); 

            if(boldTextEl) {
                let boldValue = parseInt(boldTextEl.textContent.trim());
                if(!isNaN(boldValue)) {
                    if(isBowler) {
                        scrapedData[webClean].wickets = boldValue; 
                    } else {
                        scrapedData[webClean].runs = boldValue; 
                    }
                }
            } else {
                // Backup Plan
                let cols = Array.from(row.querySelectorAll('.text-right, .cb-col-8')).map(c => c.textContent.trim());
                if (isBowler && cols.length >= 4) {
                    scrapedData[webClean].wickets = parseInt(cols[3]) || 0; 
                } else if (!isBowler && cols.length >= 1) {
                    scrapedData[webClean].runs = parseInt(cols[0]) || 0; 
                }
            }
        });

        cLog('info', `🔥 BRAHMASTRA ne ${validRowsCount} khiladiyo ki marksheet padh li.`);

        let totalMatchPoints = 0;
        let matchedCount = 0;

        for (let key in players) {
            let fbClean = players[key].name.toLowerCase().replace(/[^a-z]/g, ' ').replace(/\s+/g, ' ').trim();
            let fbParts = fbClean.split(' ');
            let fbLast = fbParts[fbParts.length - 1]; // Sirf surname

            let r = 0, w = 0, isPlaying = false;

            for (let scrapedName in scrapedData) {
                // Matching system
                if (scrapedName.includes(fbLast) || fbClean.includes(scrapedName)) {
                    r = scrapedData[scrapedName].runs || 0;
                    w = scrapedData[scrapedName].wickets || 0;
                    isPlaying = true;
                    matchedCount++;
                    break;
                }
            }

            let currentStatus = isPlaying ? "playing" : (players[key].playingStatus || "unannounced");
            let totalPoints = (r * 1) + (w * 25) + (isPlaying ? 4 : 0);

            totalMatchPoints += totalPoints;

            updates[key + '/points'] = totalPoints;
            updates[key + '/runs'] = r;
            updates[key + '/wickets'] = w;
            updates[key + '/playingStatus'] = currentStatus;
        }

        if(Object.keys(updates).length > 0) {
            await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).update(updates);
            cLog('success', `✅ MISSION SUCCESSFUL! ${matchedCount} khiladiyo ke ${totalMatchPoints} Pts jode gaye!`);
            await updateLiveLeaderboard(matchId);
        } else {
            cLog('error', `⚠️ Brahmastra ne data padha par database se kisi ka naam match nahi hua.`);
        }
    }
</script>
</body>
</html>
