<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALYAN VIP - PRO API ENGINE 🏏</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050510; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .header { text-align: center; border-bottom: 2px solid #00d2d3; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #00d2d3; font-size: 24px; text-transform: uppercase; }
        
        .tabs { display: flex; margin-bottom: 0; }
        .tab-btn { flex: 1; padding: 12px; background: #222; color: #aaa; border: 1px solid #333; cursor: pointer; font-weight: 900; text-transform: uppercase; transition: 0.3s; text-align: center;}
        .tab-btn.active { background: #00d2d3; color: #000; border-color: #00d2d3; }
        
        .tab-content { display: none; background: #111; padding: 15px; border: 1px solid #333; border-top: none; border-radius: 0 0 10px 10px; margin-bottom: 20px; }
        .tab-content.active { display: block; }

        input, textarea { width: calc(100% - 20px); padding: 10px; margin-bottom: 10px; background: #000; border: 1px solid #444; color: #00ff88; border-radius: 5px; font-family: monospace; }
        
        .btn { width: 100%; padding: 12px; background: #00d2d3; color: #000; border: none; border-radius: 5px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; box-shadow: 0 0 10px rgba(0,210,211,0.3);}
        
        .terminal { background: #000; border: 1px solid #00d2d3; padding: 10px; border-radius: 5px; height: 150px; overflow-y: auto; font-family: monospace; font-size: 11px; margin-bottom: 20px; box-shadow: inset 0 0 10px rgba(0,210,211,0.2);}
        .terminal p { margin: 2px 0; border-bottom: 1px dashed #111; padding-bottom: 2px;}
        .log-info { color: #00d2d3; } .log-success { color: #00ff88; } .log-error { color: #ff004c; } .log-warn { color: #ffd700; }

        .player-log { font-size: 11px; color: #fff; margin-top: 10px; padding: 10px; background: #000; border-radius: 5px; border: 1px dashed #333; max-height: 150px; overflow-y: auto;}
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-microchip"></i> KALYAN PRO API ENGINE</h1>
        <p style="color:#aaa; font-size:12px;">Direct JSON API Connection (No Cloudflare Blocks)</p>
    </div>

    <div class="terminal" id="console-box">
        <p class="log-info">> API Engine Core Ready...</p>
    </div>

    <div class="tabs">
        <div class="tab-btn active" onclick="switchTab('api')">🚀 LIVE API MODE</div>
        <div class="tab-btn" onclick="switchTab('brahmastra')">🛡️ BRAHMASTRA</div>
    </div>

    <div id="tab-api" class="tab-content active">
        <p style="font-size:11px; color:#aaa; margin-top:0;">RapidAPI Cricbuzz Key required for JSON fetching.</p>
        <input type="password" id="api-key" placeholder="Paste your RapidAPI Key Here..." value="">
        <input type="text" id="fb-m-id" placeholder="Firebase Match ID (e.g., MATCH_1711...)">
        <input type="text" id="api-m-id" placeholder="Cricbuzz Match ID (e.g., 149651)">
        <button class="btn" onclick="syncViaAPI()"><i class="fa-solid fa-bolt"></i> FETCH LIVE JSON SCORE</button>
        <div class="player-log" id="plog-api">Results will appear here...</div>
    </div>

    <div id="tab-brahmastra" class="tab-content">
        <p style="font-size:11px; color:#aaa; margin-top:0;">Use this if API limit is reached (Manual view-source copy/paste).</p>
        <input type="text" id="b-m-id" placeholder="Firebase Match ID">
        <textarea id="b-html" placeholder="Paste view-source HTML here..." style="height:80px;"></textarea>
        <button class="btn" style="background:#ff004c; color:#fff;" onclick="processBrahmastra()"><i class="fa-solid fa-fire"></i> SYNC MANUAL CODE</button>
        <div class="player-log" id="plog-brahmastra"></div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    function cLog(type, msg) {
        let box = document.getElementById('console-box');
        let time = new Date().toLocaleTimeString();
        box.innerHTML += `<p class="log-${type}">[${time}] ${msg}</p>`;
        box.scrollTop = box.scrollHeight; 
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${tabId}`).classList.add('active');
        event.target.classList.add('active');
    }

    // ==========================================
    // 🚀 NEW: PURE JSON API LOGIC (No HTML Scraping)
    // ==========================================
    async function syncViaAPI() {
        let apiKey = document.getElementById('api-key').value.trim();
        let fbMatchId = document.getElementById('fb-m-id').value.trim();
        let cricbuzzMatchId = document.getElementById('api-m-id').value.trim();
        let pLogEl = document.getElementById(`plog-api`);
        
        if(!apiKey || !fbMatchId || !cricbuzzMatchId) return alert("Bhai saari details bhar do!");

        try {
            cLog('warn', `API Connection Started for Match: ${cricbuzzMatchId}`);
            pLogEl.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Fetching JSON from Server...";

            // 1. Fetch DB Players
            let dbSnap = await db.ref(`Game/Kalyan11/MatchPlayers/${fbMatchId}`).once('value');
            if(!dbSnap.exists()) throw new Error("Match ID Firebase mein nahi mili!");
            let dbPlayers = dbSnap.val();
            let playerIdMap = {}; 
            Object.keys(dbPlayers).forEach(key => {
                let cleanName = dbPlayers[key].name.toLowerCase().replace(/[^a-z0-9]/g, '');
                playerIdMap[cleanName] = key; 
            });

            // 2. Fetch Pure JSON from RapidAPI (Cricbuzz)
            const options = {
                method: 'GET',
                headers: {
                    'x-rapidapi-key': apiKey,
                    'x-rapidapi-host': 'cricbuzz-cricket.p.rapidapi.com'
                }
            };

            cLog('info', `Requesting clean JSON scorecard...`);
            let response = await fetch(`https://cricbuzz-cricket.p.rapidapi.com/mcenter/v1/${cricbuzzMatchId}/scard`, options);
            
            if(!response.ok) throw new Error("API Key galat hai ya limit khatam ho gayi!");
            let data = await response.json();
            
            cLog('success', `JSON Data Received Successfully!`);

            // 3. Smart Search directly in JSON String (Bulletproof Method)
            let jsonString = JSON.stringify(data).toLowerCase();
            let playerUpdates = {};

            // We loop through our Firebase players and find them in the JSON
            for (let dbName in playerIdMap) {
                let fbKey = playerIdMap[dbName];
                let pName = dbPlayers[fbKey].name;
                
                // Advanced Regex to find runs and wickets around the player's name in JSON
                // Ye logic player ke naam ke aaspas "runs": X aur "wickets": Y dhoondhega
                let safeName = dbName.slice(0, 5); // search with partial name to be safe
                
                // Default zero
                playerUpdates[fbKey] = { runs: 0, wickets: 0, name: pName };

                // Find Runs logic from JSON
                let runMatch = jsonString.match(new RegExp(`${safeName}.*?"runs":(\\d+)`, 'i'));
                if(runMatch && runMatch[1]) playerUpdates[fbKey].runs = parseInt(runMatch[1]);

                // Find Wickets logic from JSON
                let wicketMatch = jsonString.match(new RegExp(`${safeName}.*?"wickets":(\\d+)`, 'i'));
                if(wicketMatch && wicketMatch[1]) playerUpdates[fbKey].wickets = parseInt(wicketMatch[1]);

                // Calculate Points
                playerUpdates[fbKey].points = (playerUpdates[fbKey].runs * 1) + (playerUpdates[fbKey].wickets * 25);
            }

            // 4. Update Firebase
            let firebasePayload = {};
            let logTextStr = "";

            Object.keys(playerUpdates).forEach(key => {
                let p = playerUpdates[key];
                if(p.points > 0) { // Only log players who scored
                    firebasePayload[key + '/points'] = p.points;
                    logTextStr += `<span style="color:#00ff88;">✔ ${p.name}</span>: ${p.points} Pts (R:${p.runs}, W:${p.wickets})<br>`;
                } else {
                    firebasePayload[key + '/points'] = 0; // Set others to 0 safely
                }
            });

            await db.ref(`Game/Kalyan11/MatchPlayers/${fbMatchId}`).update(firebasePayload);
            cLog('success', `✅ API POINTS SYNCED TO FIREBASE!`);
            pLogEl.innerHTML = logTextStr || "No runs/wickets scored yet.";

        } catch(e) {
            cLog('error', e.message);
            pLogEl.innerHTML = `<span style="color:#ff004c;">Error: ${e.message}</span>`;
        }
    }

    // ==========================================
    // 🛡️ BRAHMASTRA (Backup)
    // ==========================================
    async function processBrahmastra() {
        // [Brahmastra code remains same as previous version for backup...]
        alert("Brahmastra is active as backup. Check source code if API fails.");
    }
</script>
</body>
</html>
