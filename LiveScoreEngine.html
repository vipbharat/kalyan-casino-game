<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALYAN VIP - X-RAY ENGINE 🏏</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050510; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .header { text-align: center; border-bottom: 2px solid #00a83f; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #00a83f; font-size: 24px; text-transform: uppercase; }
        .add-box { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; }
        input { width: calc(100% - 20px); padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; }
        .btn { width: 100%; padding: 12px; background: #ffd700; color: #000; border: none; border-radius: 5px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-bottom: 10px;}
        .btn-sync { background: #00a83f; color: #fff; box-shadow: 0 0 15px rgba(0,168,63,0.3); }
        
        /* Hacker Console Terminal */
        .terminal { background: #000; border: 1px solid #00ff88; padding: 10px; border-radius: 5px; height: 180px; overflow-y: auto; font-family: monospace; font-size: 11px; margin-bottom: 20px; box-shadow: inset 0 0 10px rgba(0,255,136,0.2);}
        .terminal p { margin: 2px 0; }
        .log-info { color: #aaa; } .log-success { color: #00ff88; } .log-error { color: #ff004c; } .log-warn { color: #ffd700; }

        .match-card { background: #111; border: 1px solid #00a83f; padding: 15px; border-radius: 10px; margin-bottom: 15px; position: relative;}
        .match-id { font-size: 16px; font-weight: 900; color: #ffd700; margin-bottom: 5px; }
        .delete-btn { position: absolute; top: 15px; right: 15px; color: #ff004c; cursor: pointer; font-size: 18px; }
        .player-log { font-size: 11px; color: #fff; margin-top: 10px; padding: 10px; background: #000; border-radius: 5px; border: 1px dashed #333;}
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-bug"></i> KALYAN X-RAY ENGINE</h1>
        <p style="color:#aaa; font-size:12px;">Diagnostic Mode - AllOrigins Proxy Enabled</p>
    </div>

    <div class="terminal" id="console-box">
        <p class="log-info">> Engine Initialized & Ready...</p>
    </div>

    <div class="add-box">
        <input type="text" id="m-id" placeholder="Match ID (e.g., MATCH_1711...)">
        <input type="text" id="m-link" placeholder="Cricbuzz Scorecard Link">
        <button class="btn" onclick="addMatch()">ADD MATCH</button>
        <button class="btn btn-sync" onclick="syncAllMatches()">FORCE SYNC NOW</button>
    </div>

    <div id="matches-container"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    let activeMatches = JSON.parse(localStorage.getItem('kalyan_live_matches')) || [];

    function cLog(type, msg) {
        let box = document.getElementById('console-box');
        let time = new Date().toLocaleTimeString();
        box.innerHTML += `<p class="log-${type}">[${time}] ${msg}</p>`;
        box.scrollTop = box.scrollHeight; 
    }

    function saveMatches() { localStorage.setItem('kalyan_live_matches', JSON.stringify(activeMatches)); renderMatches(); }

    function addMatch() {
        let id = document.getElementById('m-id').value.trim();
        let link = document.getElementById('m-link').value.trim();
        if(!id || !link) return alert("Details missing!");
        
        if(link.includes('cricket-scores')) { link = link.replace('cricket-scores', 'live-cricket-scorecard'); }
        
        activeMatches.push({ id: id, link: link, lastSync: "Waiting...", logDetails: "" });
        document.getElementById('m-id').value = ""; document.getElementById('m-link').value = "";
        cLog('success', `Added new Match: ${id}`);
        saveMatches();
    }

    function removeMatch(id) {
        if(confirm("Hata dein?")) { activeMatches = activeMatches.filter(m => m.id !== id); saveMatches(); cLog('error', `Removed Match: ${id}`);}
    }

    function renderMatches() {
        const container = document.getElementById('matches-container'); container.innerHTML = "";
        activeMatches.forEach(m => {
            container.innerHTML += `
                <div class="match-card">
                    <i class="fa-solid fa-trash delete-btn" onclick="removeMatch('${m.id}')"></i>
                    <div class="match-id">${m.id}</div>
                    <div style="font-size:10px; color:#aaa; margin-bottom:10px;">${m.link.substring(0, 45)}...</div>
                    <div style="font-size:12px; color:#00ff88; font-weight:bold;">Last Sync: ${m.lastSync}</div>
                    <div class="player-log" id="plog-${m.id}">${m.logDetails || "No data yet..."}</div>
                </div>
            `;
        });
    }

    async function syncMatchData(matchObj) {
        let pLogEl = document.getElementById(`plog-${matchObj.id}`);
        
        try {
            cLog('info', `Syncing Match: ${matchObj.id}...`);
            
            // 1. Fetch Database Players
            cLog('warn', `Fetching DB Players for ${matchObj.id}...`);
            let dbSnap = await db.ref(`Game/Kalyan11/MatchPlayers/${matchObj.id}`).once('value');
            if(!dbSnap.exists()) throw new Error("Match ID not found in Firebase Database!");
            
            let dbPlayers = dbSnap.val();
            let playerIdMap = {}; 
            
            Object.keys(dbPlayers).forEach(key => {
                let cleanName = dbPlayers[key].name.toLowerCase().replace(/[^a-z0-9]/g, '');
                playerIdMap[cleanName] = key; 
            });
            cLog('success', `Found ${Object.keys(playerIdMap).length} players in Firebase DB.`);

            // 2. Fetch Cricbuzz Data using AllOrigins Proxy
            cLog('warn', `Bypassing Cricbuzz Security via AllOrigins...`);
            let proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(matchObj.link)}`;
            
            let response = await fetch(proxyUrl);
            let data = await response.json();
            
            if(!data.contents) throw new Error("Proxy failed to get HTML content.");
            let htmlText = data.contents;

            let parser = new DOMParser();
            let doc = parser.parseFromString(htmlText, "text/html");

            let playerUpdates = {}; 
            let rows = doc.querySelectorAll('.cb-scrd-itms');
            cLog('info', `Found ${rows.length} rows in Scorecard.`);

            if(rows.length === 0) {
                throw new Error("Scorecard khali hai ya match abhi start nahi hua!");
            }

            rows.forEach(row => {
                let nameElement = row.querySelector('a.cb-text-link');
                if(!nameElement) return; 
                
                let pNameRaw = nameElement.innerText;
                let cleanScrapedName = pNameRaw.toLowerCase().replace(/\(c\)/ig, '').replace(/\(wk\)/ig, '').replace(/[^a-z0-9]/g, '');

                let matchedFirebaseKey = null;
                for (let dbName in playerIdMap) {
                    if (cleanScrapedName.includes(dbName) || dbName.includes(cleanScrapedName)) {
                        matchedFirebaseKey = playerIdMap[dbName];
                        break;
                    }
                }

                if(!matchedFirebaseKey) return; 

                let boldStat = row.querySelector('.text-bold');
                let primaryNumber = boldStat ? parseInt(boldStat.innerText) : 0;
                if(isNaN(primaryNumber)) primaryNumber = 0;

                let isBowling = row.innerHTML.includes('ECO') || row.innerHTML.includes('Maiden');
                
                if (!playerUpdates[matchedFirebaseKey]) {
                    playerUpdates[matchedFirebaseKey] = { runs: 0, wickets: 0, name: dbPlayers[matchedFirebaseKey].name };
                }

                if(isBowling) {
                    playerUpdates[matchedFirebaseKey].wickets += primaryNumber;
                } else {
                    playerUpdates[matchedFirebaseKey].runs += primaryNumber;
                }
                
                playerUpdates[matchedFirebaseKey].points = (playerUpdates[matchedFirebaseKey].runs * 1) + (playerUpdates[matchedFirebaseKey].wickets * 25);
            });

            // 3. Send to Firebase
            let keysToUpdate = Object.keys(playerUpdates);
            if(keysToUpdate.length > 0) {
                let firebasePayload = {};
                let logTextStr = "";

                keysToUpdate.forEach(key => {
                    let p = playerUpdates[key];
                    firebasePayload[key + '/points'] = p.points;
                    logTextStr += `<span style="color:#00ff88;">✔ ${p.name}</span>: ${p.points} Pts (R:${p.runs}, W:${p.wickets})<br>`;
                });

                cLog('warn', `Pushing ${keysToUpdate.length} Players' Points to Firebase...`);
                await db.ref(`Game/Kalyan11/MatchPlayers/${matchObj.id}`).update(firebasePayload);
                
                let timeNow = new Date().toLocaleTimeString();
                cLog('success', `✅ POINTS UPDATED IN FIREBASE SUCCESSFULLY!`);
                pLogEl.innerHTML = logTextStr;
                
                let idx = activeMatches.findIndex(m => m.id === matchObj.id);
                if(idx > -1) { activeMatches[idx].lastSync = timeNow; activeMatches[idx].logDetails = logTextStr; saveMatches(); }
            } else {
                cLog('error', `⚠️ Players HTML mein mile, par DB ke naam se match nahi hue!`);
            }

        } catch(e) { 
            cLog('error', e.message);
            pLogEl.innerHTML = `<span style="color:#ff004c;">Error: ${e.message}</span>`;
        }
    }

    async function syncAllMatches() {
        if(activeMatches.length === 0) { cLog('info', 'No matches added to sync.'); return; }
        for(let match of activeMatches) { await syncMatchData(match); await new Promise(r => setTimeout(r, 2000)); }
    }

    renderMatches();
</script>
</body>
</html>
