<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALYAN VIP - DIRECT STRIKE ENGINE 🚀</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050510; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .header { text-align: center; border-bottom: 2px solid #00e676; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #00e676; font-size: 26px; text-transform: uppercase; text-shadow: 0 0 15px rgba(0,230,118,0.5);}
        .box { background: #1a1a2e; padding: 15px; border-radius: 10px; border: 1px solid #444; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);}
        h3 { margin-top: 0; font-size: 14px; color: #00d2d3; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 8px;}
        input { width: calc(100% - 22px); padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #555; color: #fff; border-radius: 5px; font-weight: bold; font-size: 14px;}
        .btn-start { width: 100%; padding: 14px; background: linear-gradient(90deg, #00e676, #00b0ff); color: #fff; font-weight: 900; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,230,118,0.3);}
        .btn-start:active { transform: scale(0.98); }
        .terminal { background: #000; border: 1px solid #00e676; padding: 15px; border-radius: 5px; height: 350px; overflow-y: auto; font-family: monospace; font-size: 12px; margin-bottom: 20px; line-height: 1.6;}
        .terminal p { margin: 4px 0; border-bottom: 1px dashed #222; padding-bottom: 4px;}
        .log-info { color: #00b0ff; } .log-success { color: #00e676; font-weight: bold;} .log-error { color: #ff1744; font-weight: bold;} .log-warn { color: #ffea00; } .log-scan { color: #b388ff; font-style: italic;}
        .status-badge { display: inline-block; padding: 8px 15px; border-radius: 15px; font-size: 12px; font-weight: bold; background: #333; color: #aaa; margin-top: 10px;}
        .status-badge.active { background: #00e676; color: #000; box-shadow: 0 0 10px rgba(0,230,118,0.5); animation: pulse 2s infinite;}
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .match-card { background: #111; border: 1px solid #00e676; padding: 12px; border-radius: 5px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
        .btn-stop { background: #555; color: #fff; border: none; padding: 6px 12px; border-radius: 3px; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase;}
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-bolt-lightning"></i> KALYAN DIRECT STRIKE</h1>
        <div class="status-badge" id="sync-status">SYSTEM SLEEPING...</div>
    </div>

    <div class="box">
        <h3><i class="fa-solid fa-crosshairs"></i> Target Scorecard Link</h3>
        
        <input type="hidden" id="api-url" value="https://script.google.com/macros/s/AKfycbwqmbrHUINUVTZedfBd3qe1eqwsxuALOMQB5ld_Pipy1KJZmDFaGhJ4p7_k3VnFgxNtRA/exec">
        
        <input type="text" id="m-link" placeholder="Cricbuzz Scorecard Link Paste Karein...">
        <input type="datetime-local" id="m-time">
        <button class="btn-start" onclick="saveMatchToDatabase()"><i class="fa-solid fa-rocket"></i> LAUNCH DIRECT SYNC</button>
    </div>

    <div class="box" id="active-matches-container" style="display: none;">
        <h3><i class="fa-solid fa-satellite-dish"></i> Active Targets...</h3>
        <div id="active-matches-list"></div>
    </div>

    <div class="terminal" id="console-box">
        <p class="log-info">> Direct Strike Engine Booted!</p>
        <p class="log-info">> Anti-Blocker: <span style="color:#00e676">ONLINE</span></p>
        <p class="log-info">> Waiting for Cricbuzz Link...</p>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();
    
    let activeMatches = {};
    let isFetching = false; 

    function cLog(type, msg) {
        let box = document.getElementById('console-box');
        box.innerHTML += `<p class="log-${type}">[${new Date().toLocaleTimeString()}] ${msg}</p>`;
        box.scrollTop = box.scrollHeight; 
    }

    function saveMatchToDatabase() {
        let link = document.getElementById('m-link').value.trim();
        let time = document.getElementById('m-time').value;
        if(!link || !time) return alert("Link aur Time dono dalna zaroori hai!");

        // Extract Match ID from Link (e.g. 149721)
        let matchIdMatch = link.match(/scorecard\/(\d+)/);
        let id = matchIdMatch ? matchIdMatch[1] : link; // ID na mile toh link ko hi ID maan lo
        
        if(isNaN(id)) {
            // Agar link galat hai par ID link ke andar hai (Commentary wala link)
            let altMatch = link.match(/scores\/(\d+)/);
            if(altMatch) id = altMatch[1];
        }

        let wakeTime = new Date(time).getTime() - 1200000; 
        db.ref(`Game/Kalyan11/LiveEngine/${id}`).set({ 
            matchId: id, 
            fullUrl: link.includes('http') ? link : `https://www.cricbuzz.com/live-cricket-scorecard/${id}`,
            wakeUpTime: wakeTime 
        })
        .then(() => {
            document.getElementById('m-link').value = ""; 
            cLog('success', `✅ Target Locked: Match ID ${id} using Direct Link.`);
        });
    }

    function stopMatch(id) {
        if(confirm(`Target ${id} ko abort karna hai?`)) {
            db.ref(`Game/Kalyan11/LiveEngine/${id}`).remove();
            cLog('error', `🛑 Target Aborted: ${id}`);
        }
    }

    db.ref(`Game/Kalyan11/LiveEngine`).on('value', (snapshot) => {
        activeMatches = snapshot.exists() ? snapshot.val() : {};
        let count = Object.keys(activeMatches).length;
        document.getElementById('sync-status').innerText = `ENGAGED: ${count} MATCHES`;
        document.getElementById('sync-status').className = count > 0 ? "status-badge active" : "status-badge";

        let listDiv = document.getElementById('active-matches-list');
        let container = document.getElementById('active-matches-container');
        
        if (count > 0) {
            container.style.display = "block";
            let html = "";
            for (let id in activeMatches) {
                html += `<div class="match-card"><span>Target ID: <b style="color:#00e676">${id}</b></span><button class="btn-stop" onclick="stopMatch('${id}')">ABORT</button></div>`;
            }
            listDiv.innerHTML = html;
        } else {
            container.style.display = "none";
        }
    });

    setInterval(async () => {
        if(isFetching) return; 
        let now = Date.now();
        for (let id in activeMatches) {
            if (now >= activeMatches[id].wakeUpTime) { 
                await fetchFromGoogleScript(activeMatches[id]); 
            }
        }
    }, 15000); 

    // 🔥 THE DIRECT STRIKE ATTACK 🔥
    async function fetchFromGoogleScript(matchData) {
        isFetching = true;
        let matchId = matchData.matchId;
        let targetUrl = matchData.fullUrl;

        try {
            cLog('info', `🌐 Strike 1: Fetching Direct Link for Match ${matchId}...`);
            
            let baseUrl = document.getElementById('api-url').value.trim();
            let finalUrl = `${baseUrl}?url=${encodeURIComponent(targetUrl)}`;
            
            let res = await fetch(finalUrl, { redirect: "follow" });
            let textData = await res.text();

            if (!textData || textData.includes("Exception:") || textData.includes("Error:")) {
                cLog('error', `❌ Google Script Failure. Retrying...`);
                isFetching = false; return; 
            }

            let doc = new DOMParser().parseFromString(textData, "text/html");
            let pageTitle = doc.querySelector('title') ? doc.querySelector('title').textContent : "Unknown Page";

            cLog('scan', `📄 Target Page: "${pageTitle.substring(0, 40)}..."`);
            
            // Cloudflare Detector
            if (pageTitle.includes("Just a moment") || pageTitle.includes("Cloudflare")) {
                cLog('error', `❌ Cloudflare Blocked Strike. Renewing Stealth...`);
                isFetching = false; return;
            }

            cLog('info', `🔓 Shield Broken! Extracting Score Data...`);
            await extractDataAndMatch(doc, matchId);
            
        } catch (e) { 
            cLog('error', `⚠️ Network Dead End. Retrying...`); 
        }
        isFetching = false;
    }

    function cleanName(str) {
        return str.toLowerCase().replace(/\(c\)/g,'').replace(/\(wk\)/g,'').replace(/[^a-z]/g, ' ').replace(/\s+/g, ' ').trim();
    }

    // 🔥 MASTER DATA EXTRACTION 🔥
    async function extractDataAndMatch(doc, matchId) {
        let players = {};
        try {
            let dbSnap = await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).once('value');
            if(dbSnap.exists()) players = dbSnap.val();
        } catch(e) {}

        if(Object.keys(players).length === 0) {
            cLog('error', `❌ Error: Database mein Match ${matchId} ke players nahi mile!`);
            return;
        }

        let updates = {};
        let scrapedData = {};

        // 1. Aggressive Row Selection
        doc.querySelectorAll('.cb-scrd-itms').forEach(row => {
            let nameEl = row.querySelector('a'); 
            if(!nameEl) return;
            let name = cleanName(nameEl.textContent);
            if(!scrapedData[name]) scrapedData[name] = {runs:0, wickets:0};

            let boldTexts = row.querySelectorAll('.text-bold');
            if(boldTexts.length > 0) {
                // Batsman Row
                if(row.querySelector('.cb-col-27') || row.querySelector('.cb-col-25')) {
                    scrapedData[name].runs = parseInt(boldTexts[0].textContent) || 0;
                }
                // Bowler Row
                if(row.querySelector('.cb-col-38') || row.querySelector('.cb-col-40')) {
                    scrapedData[name].wickets = parseInt(boldTexts[0].textContent) || 0;
                }
            }
        });

        let scrapedNamesList = Object.keys(scrapedData);
        if(scrapedNamesList.length === 0) {
            cLog('warn', `⚠️ Scorecard par abhi koi data nahi hai (Match shuru nahi hua).`);
            return;
        }

        cLog('scan', `🔍 Players Found: ${scrapedNamesList.length} | Match-Checking...`);

        let matchedCount = 0;

        for (let key in players) {
            let fbClean = cleanName(players[key].name || "");
            let fbParts = fbClean.split(' ');
            let fbLast = fbParts[fbParts.length - 1]; 
            
            let matchedStats = null;
            for (let sName in scrapedData) {
                let cbParts = sName.split(' ');
                let cbLast = cbParts[cbParts.length - 1];

                if (sName === fbClean || sName.includes(fbClean) || fbClean.includes(sName) || 
                   (fbLast === cbLast && fbLast.length >= 3) || 
                   (fbParts.some(p => p.length >= 4 && sName.includes(p)))) {
                    matchedStats = scrapedData[sName]; break;
                }
            }

            if (matchedStats) {
                let r = matchedStats.runs || 0;
                let w = matchedStats.wickets || 0;
                let p = (r * 1) + (w * 25) + 4; 

                updates[key + '/points'] = p;
                updates[key + '/runs'] = r;
                updates[key + '/wickets'] = w;
                updates[key + '/playingStatus'] = "playing";
                matchedCount++;
            }
        }

        if(matchedCount > 0) {
            await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).update(updates);
            cLog('success', `⚡ POINT INJECTION SUCCESS: ${matchedCount} Players updated!`);
            await updateTeamsLeaderboard(matchId);
        } else {
            cLog('error', `❌ Link sahi hai, par players ke naam match nahi ho rahe!`);
        }
    }

    async function updateTeamsLeaderboard(matchId) {
        try {
            let pSnap = await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).once('value');
            let tSnap = await db.ref(`Game/Kalyan11/Contests/${matchId}/Teams`).once('value');
            if(!pSnap.exists() || !tSnap.exists()) return;

            let livePlayersData = pSnap.val();
            let updates = {};
            
            tSnap.forEach(child => {
                let team = child.val();
                let pts = 0;
                let vcName = team.viceCaptain || team.vice_captain; 
                let cName = team.captain;

                Object.values(team.players || {}).forEach(playerId => {
                    if(livePlayersData[playerId]) {
                        let pData = livePlayersData[playerId];
                        let pName = pData.name;
                        let livePoints = parseFloat(pData.points || 0);

                        if(pName === cName) { pts += (livePoints * 2); } 
                        else if(pName === vcName) { pts += (livePoints * 1.5); } 
                        else { pts += livePoints; }
                    }
                });
                updates[child.key + '/total_points'] = parseFloat(pts.toFixed(1));
            });
            await db.ref(`Game/Kalyan11/Contests/${matchId}/Teams`).update(updates);
            cLog('success', `🏆 LEADERBOARD UPDATED via Direct Strike!`);
        } catch(e) { }
    }
</script>
</body>
</html>
