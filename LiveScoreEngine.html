<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALYAN VIP - UNIVERSAL ENGINE 🚀</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050510; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .header { text-align: center; border-bottom: 2px solid #00ff88; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #00ff88; font-size: 24px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0,255,136,0.3);}
        .box { background: #1a1a2e; padding: 15px; border-radius: 10px; border: 1px solid #444; margin-bottom: 20px; }
        h3 { margin-top: 0; font-size: 14px; color: #00d2d3; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 8px;}
        input { width: calc(100% - 22px); padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; font-weight: bold;}
        .btn-start { width: 100%; padding: 12px; background: #00ff88; color: #000; font-weight: 900; border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase;}
        .terminal { background: #000; border: 1px solid #00ff88; padding: 15px; border-radius: 5px; height: 300px; overflow-y: auto; font-family: monospace; font-size: 11px; margin-bottom: 20px;}
        .terminal p { margin: 4px 0; border-bottom: 1px dashed #111; padding-bottom: 4px;}
        .log-info { color: #00d2d3; } .log-success { color: #00ff88; } .log-error { color: #ff004c; } .log-warn { color: #ff9f43; }
        .log-leader { color: #ffd700; font-weight: bold; }
        .status-badge { display: inline-block; padding: 8px 15px; border-radius: 15px; font-size: 12px; font-weight: bold; background: #333; color: #aaa; margin-top: 10px;}
        .status-badge.active { background: #00ff88; color: #000; box-shadow: 0 0 10px rgba(0,255,136,0.5); animation: pulse 2s infinite;}
        .match-card { background: #000; border: 1px solid #00ff88; padding: 10px; border-radius: 5px; margin-bottom: 10px; position: relative; }
        .match-card strong { color: #00ff88; font-size: 14px; }
        .match-card a { color: #00d2d3; font-size: 11px; word-break: break-all; display: block; margin: 5px 0; text-decoration: none; }
        .btn-stop { background: #ff004c; color: #fff; border: none; padding: 6px 12px; border-radius: 3px; cursor: pointer; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-server"></i> VIP UNIVERSAL ENGINE</h1>
        <div class="status-badge" id="sync-status">Status: CONNECTING...</div>
    </div>

    <div class="box">
        <h3><i class="fa-solid fa-plus-circle"></i> Add New Match Sync</h3>
        <input type="text" id="m-id" placeholder="Match ID (e.g. 149673)">
        <input type="text" id="m-link" placeholder="Cricbuzz Scorecard Link Paste Karein">
        <input type="datetime-local" id="m-time">
        <button class="btn-start" onclick="saveMatchToDatabase()">SAVE & START SYNC</button>
    </div>

    <div class="box" id="active-matches-container" style="display: none;">
        <h3><i class="fa-solid fa-list"></i> Running Matches (Live Links)</h3>
        <div id="active-matches-list"></div>
    </div>

    <div class="terminal" id="console-box">
        <p class="log-info">> Universal Engine Ready. Waiting for matches...</p>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();
    
    let activeMatches = {};

    function cLog(type, msg) {
        let box = document.getElementById('console-box');
        box.innerHTML += `<p class="log-${type}">[${new Date().toLocaleTimeString()}] ${msg}</p>`;
        box.scrollTop = box.scrollHeight; 
    }

    function saveMatchToDatabase() {
        let id = document.getElementById('m-id').value.trim();
        let link = document.getElementById('m-link').value.trim();
        let time = document.getElementById('m-time').value;

        if(!id || !link || !time) return alert("Sari details bhariye!");
        let wakeTime = new Date(time).getTime() - 1200000; 
        db.ref(`Game/Kalyan11/LiveEngine/${id}`).set({ matchId: id, cricbuzzLink: link, wakeUpTime: wakeTime })
        .then(() => {
            document.getElementById('m-id').value = ""; document.getElementById('m-link').value = "";
            cLog('success', `Match ${id} Added! Niche list mein check karein.`);
        });
    }

    function stopMatch(id) {
        if(confirm(`Kya aap sach mein Match ${id} ka sync rokna chahte hain?`)) {
            db.ref(`Game/Kalyan11/LiveEngine/${id}`).remove();
            cLog('warn', `🛑 Engine Stopped for Match: ${id}`);
        }
    }

    db.ref(`Game/Kalyan11/LiveEngine`).on('value', (snapshot) => {
        activeMatches = snapshot.exists() ? snapshot.val() : {};
        let count = Object.keys(activeMatches).length;
        document.getElementById('sync-status').innerText = `Status: SYNCING ${count} MATCHES 🔥`;
        document.getElementById('sync-status').className = count > 0 ? "status-badge active" : "status-badge";

        let listDiv = document.getElementById('active-matches-list');
        let container = document.getElementById('active-matches-container');
        
        if (count > 0) {
            container.style.display = "block";
            let html = "";
            for (let id in activeMatches) {
                html += `
                <div class="match-card">
                    <strong>ID: ${id}</strong>
                    <a href="${activeMatches[id].cricbuzzLink}" target="_blank">${activeMatches[id].cricbuzzLink}</a>
                    <button class="btn-stop" onclick="stopMatch('${id}')"><i class="fa-solid fa-trash"></i> STOP SYNC</button>
                </div>`;
            }
            listDiv.innerHTML = html;
        } else {
            container.style.display = "none"; listDiv.innerHTML = "";
        }
    });

    setInterval(async () => {
        let now = Date.now();
        let ids = Object.keys(activeMatches);
        for (let id of ids) {
            let m = activeMatches[id];
            if (now >= m.wakeUpTime) { await runSync(id, m.cricbuzzLink); }
        }
    }, 45000);

    // 🌐 DUAL-PROXY BYPASS SYSTEM
    async function runSync(matchId, link) {
        try {
            cLog('info', `🌐 Fetching data for Match: ${matchId}`);
            
            if (link.includes("cricbuzz.com")) {
                link = link.replace("cricket-match-squads", "live-cricket-scorecard")
                           .replace("live-cricket-scores", "live-cricket-scorecard")
                           .replace("cricket-match-facts", "live-cricket-scorecard");
            }

            let html = "";
            try {
                let res = await fetch("https://corsproxy.io/?" + encodeURIComponent(link));
                html = await res.text();
                if(html.includes("Just a moment...") || html.includes("Cloudflare")) throw new Error("Blocked");
            } catch(e) {
                cLog('warn', `⚠️ Proxy 1 Blocked. Using Backup Proxy...`);
                let res2 = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(link));
                html = await res2.text();
            }

            if (html.includes("Just a moment...") || html.includes("Cloudflare")) {
                cLog('error', `❌ CRICBUZZ BLOCK: Scorecard nahi khula.`);
                return; 
            }

            let doc = new DOMParser().parseFromString(html, "text/html");
            if (link.includes("cricbuzz.com")) { await parseCricbuzz(doc, matchId); } 
            
        } catch (e) { cLog('error', `Sync Error: ${e.message}`); }
    }

    async function updateLiveLeaderboard(matchId) {
        try {
            let pSnap = await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).once('value');
            let tSnap = await db.ref(`Game/Kalyan11/Contests/${matchId}/Teams`).once('value');
            if(!pSnap.exists() || !tSnap.exists()) return;

            let playersObj = pSnap.val();
            let updates = {};
            let maxScore = 0;

            tSnap.forEach(child => {
                let t = child.val();
                let calculatedPoints = 0;
                let teamPlayers = t.players || {};
                
                Object.values(teamPlayers).forEach(pKey => {
                    let livePt = (playersObj[pKey] && playersObj[pKey].points) ? parseFloat(playersObj[pKey].points) : 0;
                    if(pKey === t.captain) calculatedPoints += (livePt * 2);
                    else if(pKey === t.viceCaptain) calculatedPoints += (livePt * 1.5);
                    else calculatedPoints += livePt;
                });

                let finalPts = parseFloat(calculatedPoints.toFixed(1));
                if(finalPts > maxScore) maxScore = finalPts;
                updates[child.key + '/total_points'] = finalPts;
            });

            if(Object.keys(updates).length > 0) {
                await db.ref(`Game/Kalyan11/Contests/${matchId}/Teams`).update(updates);
                cLog('leader', `🏆 LEADERBOARD UPDATED (Highest: ${maxScore} Pts)`);
            }
        } catch(e) { cLog('error', `Leaderboard Error: ${e.message}`); }
    }

    // 🔥 THE INVINCIBLE PARSER (Mobile & Desktop dono ke liye) 🔥
    async function parseCricbuzz(doc, matchId) {
        let dbSnap = await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).once('value');
        if(!dbSnap.exists() || !dbSnap.val()) {
            cLog('error', `❌ Database me match ${matchId} ke khiladi nahi mile! Pura Match Delete karke wapas add karein.`);
            return;
        }

        let players = dbSnap.val();
        let totalFbPlayers = Object.keys(players).length;
        cLog('info', `📊 Database me ${totalFbPlayers} khiladi mile. Scraping...`);

        let updates = {};
        let scrapedData = {};

        // Kisi bhi tarah ka row ho (Desktop .cb-scrd-itms ya Mobile .ui-table-row ya ESPN tr) sab uthayega
        let rows = doc.querySelectorAll('.cb-scrd-itms, .ui-table-row, tr');

        rows.forEach(row => {
            let nameEl = row.querySelector('a');
            if(!nameEl) return;

            let webClean = nameEl.innerText.toLowerCase().replace(/[^a-z]/g, ' ').replace(/\s+/g, ' ').trim();
            if(!webClean) return;

            // Row ke saare column ke text ko array mein jama karenge
            let texts = [];
            let cols = row.querySelectorAll('.cb-col, .ui-table-col, td');
            if(cols.length > 0) {
                cols.forEach(c => texts.push(c.innerText.trim()));
            }

            if(texts.length >= 5) {
                if(!scrapedData[webClean]) scrapedData[webClean] = { runs: 0, wickets: 0 };

                // SMART CHECK: Agar second column ek number hai (Jaise Overs: 4.0), matlab wo Bowling ka data hai
                let isBowling = /^[\d\.]+$/.test(texts[1]);

                if(isBowling) {
                    let w = parseInt(texts[4]); // Wickets hamesha 5th position (index 4) pe hote hain
                    if(!isNaN(w)) scrapedData[webClean].wickets = w;
                } else {
                    let r = parseInt(texts[2]); // Runs hamesha 3rd position (index 2) pe hote hain
                    if(!isNaN(r)) scrapedData[webClean].runs = r;
                }
            }
        });

        let totalMatchPoints = 0;
        let matchedCount = 0;

        for (let key in players) {
            let fbClean = players[key].name.toLowerCase().replace(/[^a-z]/g, ' ').replace(/\s+/g, ' ').trim();
            let fbLast = fbClean.split(' ').pop(); 
            
            let r = 0, w = 0, isPlaying = false;

            for (let scrapedName in scrapedData) {
                if (scrapedName.includes(fbLast) || fbClean.includes(scrapedName)) {
                    r = scrapedData[scrapedName].runs;
                    w = scrapedData[scrapedName].wickets;
                    isPlaying = true;
                    matchedCount++;
                    break;
                }
            }

            let currentStatus = isPlaying ? "playing" : (players[key].playingStatus || "unannounced");
            let totalPoints = (r * 1) + (w * 25) + (isPlaying ? 4 : 0);
            
            totalMatchPoints += totalPoints;

            updates[key + '/points'] = totalPoints;
            updates[key + '/runs'] = r;
            updates[key + '/wickets'] = w;
            updates[key + '/playingStatus'] = currentStatus;
        }

        if(Object.keys(updates).length > 0) {
            await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).update(updates);
            cLog('success', `✅ SCORE SYNC: ${matchedCount} khiladiyo ke ${totalMatchPoints} Pts jode gaye!`);
            await updateLiveLeaderboard(matchId);
        }
    }
</script>
</body>
</html>
