<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALYAN VIP - PERMANENT ENGINE 🚀</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050510; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .header { text-align: center; border-bottom: 2px solid #00ff88; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #00ff88; font-size: 24px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0,255,136,0.3);}
        .box { background: #1a1a2e; padding: 15px; border-radius: 10px; border: 1px solid #444; margin-bottom: 20px; }
        h3 { margin-top: 0; font-size: 14px; color: #00d2d3; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 8px;}
        input { width: calc(100% - 22px); padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; font-weight: bold;}
        .btn-start { width: 100%; padding: 12px; background: #00ff88; color: #000; font-weight: 900; border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase;}
        .terminal { background: #000; border: 1px solid #00ff88; padding: 15px; border-radius: 5px; height: 350px; overflow-y: auto; font-family: monospace; font-size: 11px; margin-bottom: 20px;}
        .terminal p { margin: 4px 0; border-bottom: 1px dashed #111; padding-bottom: 4px;}
        .log-info { color: #00d2d3; } .log-success { color: #00ff88; } .log-error { color: #ff004c; } .log-warn { color: #ff9f43; }
        .status-badge { display: inline-block; padding: 8px 15px; border-radius: 15px; font-size: 12px; font-weight: bold; background: #333; color: #aaa; margin-top: 10px;}
        .status-badge.active { background: #00ff88; color: #000; box-shadow: 0 0 10px rgba(0,255,136,0.5); animation: pulse 2s infinite;}
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-server"></i> VIP PERMANENT ENGINE</h1>
        <div class="status-badge" id="sync-status">Status: CONNECTING...</div>
    </div>

    <div class="box">
        <h3><i class="fa-solid fa-plus-circle"></i> Add New Match Sync</h3>
        <input type="text" id="m-id" placeholder="Match ID (e.g. 20242)">
        <input type="text" id="m-link" placeholder="Cricbuzz Scorecard Link Paste Karein">
        <input type="datetime-local" id="m-time">
        <button class="btn-start" onclick="saveMatchToDatabase()">SAVE & START SYNC</button>
        <p style="font-size: 10px; color: #aaa; margin-top: 10px;">*Note: Save karne ke baad ye refresh karne par bhi nahi hatega.</p>
    </div>

    <div class="terminal" id="console-box">
        <p class="log-info">> Engine Started. Monitoring Firebase...</p>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const API_URL = "https://script.google.com/macros/s/AKfycbyCsBcyJ7HIIBQPULR1RNQs5FU1QIzmNRKDQQ54s61c1Ni4cH_1EtFqaOlSrzLMBj0yfA/exec";

    let activeMatches = {};

    function cLog(type, msg) {
        let box = document.getElementById('console-box');
        box.innerHTML += `<p class="log-${type}">[${new Date().toLocaleTimeString()}] ${msg}</p>`;
        box.scrollTop = box.scrollHeight; 
    }

    // 💾 MATCH KO DATABASE ME SAVE KARNA (Taki Refresh pe na ude)
    function saveMatchToDatabase() {
        let id = document.getElementById('m-id').value.trim();
        let link = document.getElementById('m-link').value.trim();
        let time = document.getElementById('m-time').value;

        if(!id || !link || !time) return alert("Sari details bhariye!");

        let wakeTime = new Date(time).getTime() - 1200000; // 20 min pehle ka wake up

        db.ref(`Game/Kalyan11/LiveEngine/${id}`).set({
            matchId: id,
            cricbuzzLink: link,
            wakeUpTime: wakeTime
        }).then(() => {
            alert("Match Saved! Ye ab permanent sync hota rahega.");
            document.getElementById('m-id').value = "";
            document.getElementById('m-link').value = "";
        });
    }

    // 📡 DATABASE SE MATCHES KI LIST PADHNA
    db.ref(`Game/Kalyan11/LiveEngine`).on('value', (snapshot) => {
        activeMatches = snapshot.exists() ? snapshot.val() : {};
        let count = Object.keys(activeMatches).length;
        document.getElementById('sync-status').innerText = `Status: SYNCING ${count} MATCHES 🔥`;
        document.getElementById('sync-status').className = count > 0 ? "status-badge active" : "status-badge";
        cLog('success', `Database updated: ${count} matches found.`);
    });

    // ⏱️ HAR 3 MINUTE KA MASTER LOOP
    setInterval(async () => {
        let now = Date.now();
        let ids = Object.keys(activeMatches);

        for (let id of ids) {
            let m = activeMatches[id];
            if (now >= m.wakeUpTime) {
                cLog('info', `Running Sync for Match: ${id}`);
                await runSync(id, m.cricbuzzLink);
            } else {
                let diff = Math.floor((m.wakeUpTime - now) / 60000);
                cLog('warn', `Match ${id} wait kar raha hai (${diff} mins remaining)`);
            }
        }
    }, 180000);

    async function runSync(matchId, link) {
        try {
            let res = await fetch(API_URL + "?url=" + encodeURIComponent(link));
            let html = await res.text();
            let doc = new DOMParser().parseFromString(html, "text/html");

            // Match Finished Check
            let status = doc.querySelector('.cb-scrd-status')?.innerText || "";
            if (status.toLowerCase().includes("won by") || status.toLowerCase().includes("result")) {
                cLog('error', `🏁 Match ${matchId} Finished. Deleting from sync...`);
                await db.ref(`Game/Kalyan11/LiveEngine/${matchId}`).remove();
                return;
            }

            // 🔥 Yahan Lineup / Playing XI dhoondhne ka logic fit kiya hai 🔥
            let pageText = doc.body.innerText;
            let xiMatch = pageText.match(/(?:Playing|XI):\s*(.*?)(?:Bench|$)/i);
            let lineupNames = xiMatch ? xiMatch[1].toLowerCase() : "";

            // Scraping and Updating Firebase MatchPlayers
            let rows = doc.querySelectorAll('.cb-scrd-itms');
            let dbSnap = await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).once('value');
            if(!dbSnap.exists()) return;
            
            let players = dbSnap.val();
            let nameMap = {};
            Object.keys(players).forEach(k => { nameMap[players[k].name.toLowerCase().replace(/[^a-z0-9]/g, '')] = k; });

            let updates = {};
            rows.forEach(row => {
                let nameEl = row.querySelector('a.cb-text-link');
                if(!nameEl) return;
                let clean = nameEl.innerText.toLowerCase().replace(/\(c\)/ig, '').replace(/\(wk\)/ig, '').replace(/[^a-z0-9]/g, '');
                let key = null;
                for (let n in nameMap) { if (clean.includes(n) || n.includes(clean)) { key = nameMap[n]; break; } }

                if(key) {
                    let cols = row.querySelectorAll('.cb-col');
                    let r = 0, w = 0;
                    if(row.innerText.toUpperCase().includes('ECO')) { w = parseInt(cols[4].innerText) || 0; }
                    else { r = parseInt(cols[2].innerText) || 0; }
                    
                    // 🔥 Lineup Check: Agar khiladi lineup list mein hai tabhi "playing" warna "bench" 🔥
                    let playerStatus = "bench";
                    if (lineupNames.includes(clean.substring(0, 5))) {
                        playerStatus = "playing";
                    }

                    updates[key + '/points'] = (r * 1) + (w * 25);
                    updates[key + '/runs'] = r;
                    updates[key + '/wickets'] = w;
                    updates[key + '/playingStatus'] = playerStatus;
                }
            });

            if(Object.keys(updates).length > 0) {
                await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).update(updates);
                cLog('success', `✅ [${matchId}] Points & Lineups Updated.`);
            }
        } catch(e) { cLog('error', `Error syncing ${matchId}: ${e.message}`); }
    }
</script>
</body>
</html>
