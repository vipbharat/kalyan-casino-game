<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MULTI-MATCH CRICBUZZ ENGINE 🏏</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050510; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .header { text-align: center; border-bottom: 2px solid #00a83f; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #00a83f; font-size: 24px; text-transform: uppercase; }
        .add-box { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; }
        input { width: calc(100% - 20px); padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; }
        .btn { width: 100%; padding: 12px; background: #ffd700; color: #000; border: none; border-radius: 5px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .btn-sync { background: #00a83f; color: #fff; margin-top: 10px; box-shadow: 0 0 15px rgba(0,168,63,0.3); }
        .match-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .match-card { background: linear-gradient(145deg, #1a1a2e, #111); border: 1px solid #00a83f; padding: 15px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); position: relative; }
        .match-id { font-size: 18px; font-weight: 900; color: #ffd700; margin-bottom: 5px; }
        .status { font-size: 12px; font-weight: bold; padding: 3px 8px; border-radius: 4px; display: inline-block; }
        .status.active { background: rgba(0,168,63,0.2); color: #00a83f; border: 1px solid #00a83f; }
        .delete-btn { position: absolute; top: 15px; right: 15px; color: #ff004c; cursor: pointer; font-size: 18px; }
        .log-text { font-size: 11px; color: #ffd700; margin-top: 10px; border-top: 1px dashed #333; padding-top: 5px; font-weight: bold;}
        .player-log { font-size: 10px; color: #aaa; margin-top: 5px; max-height: 80px; overflow-y: auto; background: #000; padding: 5px; border-radius: 4px;}
        .player-log span { color: #00ff88; }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-satellite-dish fa-fade"></i> CRICBUZZ LIVE ENGINE</h1>
        <p>Engine will auto-convert URLs and match Surnames smartly!</p>
    </div>

    <div class="add-box">
        <input type="text" id="m-id" placeholder="Match ID (e.g., MATCH_1711...)">
        <input type="text" id="m-link" placeholder="Cricbuzz Link Paste Here">
        <button class="btn" onclick="addMatch()">ADD MATCH TO ENGINE</button>
        <button class="btn btn-sync" onclick="syncAllMatches()">SYNC ALL MATCHES NOW</button>
    </div>

    <div class="match-grid" id="matches-container"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    let activeMatches = JSON.parse(localStorage.getItem('kalyan_live_matches')) || [];

    function saveMatches() { localStorage.setItem('kalyan_live_matches', JSON.stringify(activeMatches)); renderMatches(); }

    function addMatch() {
        let id = document.getElementById('m-id').value.trim();
        let link = document.getElementById('m-link').value.trim();
        if(!id || !link) return alert("Details missing!");
        
        // AUTO-FIX URL: Force it to be the scorecard link
        if(link.includes('cricket-scores')) { link = link.replace('cricket-scores', 'live-cricket-scorecard'); }
        
        activeMatches.push({ id: id, link: link, lastSync: "Waiting...", logDetails: "" });
        document.getElementById('m-id').value = ""; document.getElementById('m-link').value = "";
        saveMatches();
    }

    function removeMatch(id) {
        if(confirm("Hata dein?")) { activeMatches = activeMatches.filter(m => m.id !== id); saveMatches(); }
    }

    function renderMatches() {
        const container = document.getElementById('matches-container'); container.innerHTML = "";
        activeMatches.forEach(m => {
            container.innerHTML += `
                <div class="match-card">
                    <i class="fa-solid fa-trash delete-btn" onclick="removeMatch('${m.id}')"></i>
                    <div class="match-id">${m.id}</div>
                    <div class="status active"><i class="fa-solid fa-circle-dot"></i> LIVE ENGINE</div>
                    <div class="log-text" id="log-${m.id}">${m.lastSync}</div>
                    <div class="player-log" id="plog-${m.id}">${m.logDetails || "Waiting for players..."}</div>
                </div>
            `;
        });
    }

    async function syncMatchData(matchObj) {
        let logEl = document.getElementById(`log-${matchObj.id}`);
        let pLogEl = document.getElementById(`plog-${matchObj.id}`);
        
        try {
            logEl.innerText = "Connecting DB & Cricbuzz...";
            
            // 1. Fetch from Firebase
            let dbSnap = await db.ref(`Game/Kalyan11/MatchPlayers/${matchObj.id}`).once('value');
            if(!dbSnap.exists()) throw new Error("Match ID not found in Firebase!");
            
            let dbPlayers = dbSnap.val();
            let playerIdMap = {}; 
            
            // SMART SURNAME MAPPER
            Object.keys(dbPlayers).forEach(key => {
                let fullName = dbPlayers[key].name.toLowerCase().trim();
                let nameParts = fullName.split(' ');
                // Pick the last word (Surname) and clean it
                let surName = nameParts[nameParts.length - 1].replace(/[^a-z]/g, ''); 
                playerIdMap[surName] = key; // e.g. "kohli" -> "IND_0"
            });

            // 2. Fetch from Cricbuzz
            let proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(matchObj.link)}`;
            let response = await fetch(proxyUrl);
            let data = await response.json();
            
            let parser = new DOMParser();
            let doc = parser.parseFromString(data.contents, "text/html");

            let playerUpdates = {}; 
            let matchedNamesList = [];

            let rows = doc.querySelectorAll('.cb-scrd-itms');
            
            rows.forEach(row => {
                let nameElement = row.querySelector('a.cb-text-link');
                if(!nameElement) return; 
                
                let pNameRaw = nameElement.innerText.toLowerCase();
                let scrapedNameParts = pNameRaw.replace(/\(c\)/ig, '').replace(/\(wk\)/ig, '').trim().split(' ');
                let scrapedSurName = scrapedNameParts[scrapedNameParts.length - 1].replace(/[^a-z]/g, '');

                // Match by Surname!
                let matchedFirebaseKey = playerIdMap[scrapedSurName];
                if(!matchedFirebaseKey) return; 

                // Find Runs / Wickets
                let cols = row.querySelectorAll('.cb-col');
                let runs = 0, wickets = 0;
                
                // Cricbuzz Logic: Batting row has 7 columns, Bowling has 8
                if (row.innerHTML.includes('Wickets') || row.innerHTML.includes('Overs')) return; // Ignore titles
                
                // If it's a Batting row (Usually first text-bold is runs)
                let boldText = row.querySelector('.text-bold');
                if (cols.length >= 7 && !row.innerHTML.includes('ECO')) {
                    runs = parseInt(boldText ? boldText.innerText : (cols[2].innerText || 0)); 
                } 
                // If it's a Bowling row
                else if (cols.length >= 8) {
                    wickets = parseInt(cols[4].innerText || 0); // Wickets is usually 5th column
                }

                if (!playerUpdates[matchedFirebaseKey]) {
                    playerUpdates[matchedFirebaseKey] = { runs: 0, wickets: 0, name: dbPlayers[matchedFirebaseKey].name };
                }
                
                playerUpdates[matchedFirebaseKey].runs += runs;
                playerUpdates[matchedFirebaseKey].wickets += wickets;
                playerUpdates[matchedFirebaseKey].points = (playerUpdates[matchedFirebaseKey].runs * 1) + (playerUpdates[matchedFirebaseKey].wickets * 25);
            });

            // 3. Update Firebase
            let keysToUpdate = Object.keys(playerUpdates);
            if(keysToUpdate.length > 0) {
                let firebasePayload = {};
                let logTextStr = "";

                keysToUpdate.forEach(key => {
                    let p = playerUpdates[key];
                    firebasePayload[key + '/points'] = p.points;
                    logTextStr += `<span>✔ ${p.name}</span> = ${p.points} Pts (R:${p.runs}, W:${p.wickets})<br>`;
                });

                await db.ref(`Game/Kalyan11/MatchPlayers/${matchObj.id}`).update(firebasePayload);
                
                let timeNow = new Date().toLocaleTimeString();
                logEl.innerText = `✅ Success at ${timeNow}`;
                pLogEl.innerHTML = logTextStr; // UI par dikhayega kisko kya mila
                
                let idx = activeMatches.findIndex(m => m.id === matchObj.id);
                if(idx > -1) { activeMatches[idx].lastSync = timeNow; activeMatches[idx].logDetails = logTextStr; saveMatches(); }
            } else {
                logEl.innerText = `⚠️ No matching players found on Scorecard.`;
            }

        } catch(e) { logEl.innerText = `❌ Error: ${e.message}`; }
    }

    async function syncAllMatches() {
        if(activeMatches.length === 0) return;
        for(let match of activeMatches) { await syncMatchData(match); await new Promise(r => setTimeout(r, 2000)); }
    }

    setInterval(() => { syncAllMatches(); }, 30000);
    renderMatches();
</script>
</body>
</html>
