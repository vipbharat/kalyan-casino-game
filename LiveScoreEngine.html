<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALYAN VIP - ULTIMATE ENGINE 🚀</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050510; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .header { text-align: center; border-bottom: 2px solid #00ff88; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #00ff88; font-size: 24px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0,255,136,0.3);}
        .box { background: #1a1a2e; padding: 15px; border-radius: 10px; border: 1px solid #444; margin-bottom: 20px; }
        h3 { margin-top: 0; font-size: 14px; color: #00d2d3; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 8px;}
        input { width: calc(100% - 22px); padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; font-weight: bold;}
        .btn-start { width: 100%; padding: 12px; background: #00ff88; color: #000; font-weight: 900; border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase; transition: 0.3s;}
        .btn-start:active { transform: scale(0.98); }
        .terminal { background: #000; border: 1px solid #00ff88; padding: 15px; border-radius: 5px; height: 350px; overflow-y: auto; font-family: monospace; font-size: 12px; margin-bottom: 20px; line-height: 1.5;}
        .terminal p { margin: 4px 0; border-bottom: 1px dashed #222; padding-bottom: 4px;}
        .log-info { color: #00d2d3; } .log-success { color: #00ff88; } .log-error { color: #ff004c; } .log-warn { color: #ffd700; } .log-scan { color: #a29bfe; font-style: italic;}
        .status-badge { display: inline-block; padding: 8px 15px; border-radius: 15px; font-size: 12px; font-weight: bold; background: #333; color: #aaa; margin-top: 10px;}
        .status-badge.active { background: #00ff88; color: #000; box-shadow: 0 0 10px rgba(0,255,136,0.5); }
        .match-card { background: #000; border: 1px solid #00ff88; padding: 10px; border-radius: 5px; margin-bottom: 10px; position: relative; display: flex; justify-content: space-between; align-items: center;}
        .btn-stop { background: #ff004c; color: #fff; border: none; padding: 6px 12px; border-radius: 3px; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase;}
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-bolt"></i> KALYAN VIP ENGINE</h1>
        <div class="status-badge" id="sync-status">Status: CONNECTING...</div>
    </div>

    <div class="box">
        <h3><i class="fa-solid fa-plus-circle"></i> Add Live Match</h3>
        <input type="text" id="m-id" placeholder="Match ID (Cricbuzz se lein, e.g. 149673)">
        <input type="datetime-local" id="m-time">
        <button class="btn-start" onclick="saveMatchToDatabase()">SAVE & START AUTO-SYNC</button>
    </div>

    <div class="box" id="active-matches-container" style="display: none;">
        <h3><i class="fa-solid fa-tower-broadcast"></i> Live Syncing...</h3>
        <div id="active-matches-list"></div>
    </div>

    <div class="terminal" id="console-box">
        <p class="log-info">> Ultimate Engine Ready! Waiting for command...</p>
    </div>

<script>
    // FIREBASE SETUP
    const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();
    
    let activeMatches = {};

    function cLog(type, msg) {
        let box = document.getElementById('console-box');
        box.innerHTML += `<p class="log-${type}">[${new Date().toLocaleTimeString()}] ${msg}</p>`;
        box.scrollTop = box.scrollHeight; 
    }

    function saveMatchToDatabase() {
        let id = document.getElementById('m-id').value.trim();
        let time = document.getElementById('m-time').value;
        if(!id || !time) return alert("Bhai, Match ID aur Time dono bhariye!");
        
        let wakeTime = new Date(time).getTime() - 1200000; 
        db.ref(`Game/Kalyan11/LiveEngine/${id}`).set({ matchId: id, wakeUpTime: wakeTime })
        .then(() => {
            document.getElementById('m-id').value = ""; 
            cLog('success', `✅ Match ${id} Database mein set ho gaya! System wait karega.`);
        });
    }

    function stopMatch(id) {
        if(confirm(`Match ${id} ka sync rokna hai?`)) {
            db.ref(`Game/Kalyan11/LiveEngine/${id}`).remove();
            cLog('error', `🛑 Sync Stopped: ${id}`);
        }
    }

    db.ref(`Game/Kalyan11/LiveEngine`).on('value', (snapshot) => {
        activeMatches = snapshot.exists() ? snapshot.val() : {};
        let count = Object.keys(activeMatches).length;
        document.getElementById('sync-status').innerText = `Status: ACTIVE SYNC (${count})`;
        document.getElementById('sync-status').className = count > 0 ? "status-badge active" : "status-badge";

        let listDiv = document.getElementById('active-matches-list');
        let container = document.getElementById('active-matches-container');
        
        if (count > 0) {
            container.style.display = "block";
            let html = "";
            for (let id in activeMatches) {
                html += `<div class="match-card"><span>Syncing ID: <b>${id}</b></span><button class="btn-stop" onclick="stopMatch('${id}')">STOP</button></div>`;
            }
            listDiv.innerHTML = html;
        } else {
            container.style.display = "none";
        }
    });

    // HAR 15 SECOND MEIN BROWSER SE HI DATA UTHAYEGA (RENDER SERVER BYPASS)
    setInterval(async () => {
        let now = Date.now();
        for (let id in activeMatches) {
            if (now >= activeMatches[id].wakeUpTime) { 
                await fetchDirectFromCricbuzz(id); 
            }
        }
    }, 15000); 

    // 🔥 BYPASS CLOUDFLARE FUNCTION 🔥
    async function fetchDirectFromCricbuzz(matchId) {
        try {
            cLog('info', `🌐 Bypass Engine: Fetching Match ${matchId} directly...`);
            
            // Cricbuzz URL
            let targetUrl = `https://www.cricbuzz.com/live-cricket-scores/${matchId}`;
            // Public Proxy to bypass CORS & Cloudflare
            let proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
            
            let res = await fetch(proxyUrl);
            let data = await res.json();
            let html = data.contents; // Yahan real HTML milega

            if (!html || html.includes("Just a moment...") || html.includes("Cloudflare")) {
                cLog('warn', `⚠️ Proxy Blocked. Ek minute baad auto-retry hoga...`);
                return; 
            }

            let doc = new DOMParser().parseFromString(html, "text/html");
            await parseCricbuzz(doc, matchId);
            
        } catch (e) { 
            cLog('error', `⚠️ Network Issue: Data nikalne mein dikkat. Retrying...`); 
        }
    }

    // Helper to clean names
    function cleanName(str) {
        return str.toLowerCase().replace(/\(c\)/g,'').replace(/\(wk\)/g,'').replace(/[^a-z]/g, ' ').replace(/\s+/g, ' ').trim();
    }

    // 🔥 SUPER SMART NAME & LIVE SCANNER 🔥
    async function parseCricbuzz(doc, matchId) {
        let dbSnap = await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).once('value');
        if(!dbSnap.exists()) {
            cLog('error', `❌ Match ${matchId} ke players Firebase mein nahi hain!`);
            return;
        }

        let players = dbSnap.val();
        let updates = {};
        let scrapedData = {};

        // 1. FULL SCORECARD SCAN
        doc.querySelectorAll('.cb-scrd-itms').forEach(row => {
            let nameEl = row.querySelector('a.cb-text-link');
            if(!nameEl) return;
            let name = cleanName(nameEl.textContent);
            if(!scrapedData[name]) scrapedData[name] = {runs:0, wickets:0};

            let runsCell = row.querySelector('.text-bold');
            if(runsCell && row.querySelector('.cb-col-27')) {
                scrapedData[name].runs = parseInt(runsCell.textContent) || 0;
            }
            if(runsCell && row.querySelector('.cb-col-38')) {
                scrapedData[name].wickets = parseInt(runsCell.textContent) || 0;
            }
        });

        // 2. LIVE MINI SCORECARD SCAN (For Ongoing Match like RCB vs CSK)
        // Batsmen Live
        doc.querySelectorAll('.cb-min-bat-rw').forEach(row => {
            let nameEl = row.querySelector('a.cb-text-link');
            if(!nameEl) return;
            let name = cleanName(nameEl.textContent);
            if(!scrapedData[name]) scrapedData[name] = {runs:0, wickets:0};

            // Grab the bold text which is usually runs in the mini scorecard
            let boldText = row.querySelector('.text-bold, .abtext');
            if(boldText) {
                let runs = parseInt(boldText.textContent);
                if(!isNaN(runs)) scrapedData[name].runs = runs;
            }
        });
        
        // Bowlers Live
        doc.querySelectorAll('.cb-min-bowl-rw').forEach(row => {
            let nameEl = row.querySelector('a.cb-text-link');
            if(!nameEl) return;
            let name = cleanName(nameEl.textContent);
            if(!scrapedData[name]) scrapedData[name] = {runs:0, wickets:0};

            let cols = row.querySelectorAll('.cb-col-10, .cb-col-8');
            if(cols.length >= 4) { 
                let wkts = parseInt(cols[3].textContent);
                if(!isNaN(wkts)) scrapedData[name].wickets = wkts;
            }
        });

        let scrapedNamesList = Object.keys(scrapedData);
        let scrapedCount = scrapedNamesList.length;
        
        if(scrapedCount === 0) {
            cLog('warn', `⚠️ Page khali hai ya Match abhi start nahi hua. Wait kar rahe hain...`);
            return;
        }

        cLog('scan', `🔍 Scanner Found Live Players: ${scrapedNamesList.join(', ')}`);

        let matchedCount = 0;

        for (let key in players) {
            let fbClean = cleanName(players[key].name || "");
            let fbParts = fbClean.split(' ');
            let fbLast = fbParts[fbParts.length - 1]; 
            let fbFirst = fbParts[0];

            let matchedStats = null;

            for (let sName in scrapedData) {
                let cbParts = sName.split(' ');
                let cbLast = cbParts[cbParts.length - 1];

                if (sName === fbClean || sName.includes(fbClean) || fbClean.includes(sName)) {
                    matchedStats = scrapedData[sName]; break;
                }
                else if (fbLast === cbLast && fbLast.length >= 3) {
                    matchedStats = scrapedData[sName]; break;
                }
                else if (fbParts.some(p => p.length >= 4 && sName.includes(p))) {
                    matchedStats = scrapedData[sName]; break;
                }
            }

            if (matchedStats) {
                let r = matchedStats.runs || 0;
                let w = matchedStats.wickets || 0;
                
                let p = (r * 1) + (w * 25) + 4; // Playing 11 bonus

                updates[key + '/points'] = p;
                updates[key + '/runs'] = r;
                updates[key + '/wickets'] = w;
                updates[key + '/playingStatus'] = "playing";
                
                matchedCount++;
            }
        }

        if(Object.keys(updates).length > 0) {
            await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).update(updates);
            cLog('success', `✅ FIRE SYNC: ${matchedCount} Khiladiyo ke Live Score update hue!`);
            await updateLiveLeaderboard(matchId, players);
        } else {
            cLog('error', `❌ Data toh aaya par aapke Firebase Database ke khiladiyo se match nahi hua!`);
        }
    }

    async function updateLiveLeaderboard(matchId, playersDataObj) {
        try {
            let pSnap = await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).once('value');
            let tSnap = await db.ref(`Game/Kalyan11/Contests/${matchId}/Teams`).once('value');
            if(!pSnap.exists() || !tSnap.exists()) return;

            let livePlayersData = pSnap.val();
            let updates = {};
            
            tSnap.forEach(child => {
                let team = child.val();
                let pts = 0;
                
                let vcName = team.viceCaptain || team.vice_captain; 
                let cName = team.captain;

                Object.values(team.players || {}).forEach(playerId => {
                    if(livePlayersData[playerId]) {
                        let pData = livePlayersData[playerId];
                        let pName = pData.name;
                        let livePoints = parseFloat(pData.points || 0);

                        if(pName === cName) { pts += (livePoints * 2); } 
                        else if(pName === vcName) { pts += (livePoints * 1.5); } 
                        else { pts += livePoints; }
                    }
                });

                updates[child.key + '/total_points'] = parseFloat(pts.toFixed(1));
            });

            await db.ref(`Game/Kalyan11/Contests/${matchId}/Teams`).update(updates);
            cLog('success', `🏆 Leaderboard Updated Successfully! (C=2x, VC=1.5x)`);
            
        } catch(e) { 
            cLog('error', `Leaderboard Update Error: ` + e); 
        }
    }
</script>
</body>
</html>
