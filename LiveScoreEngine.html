<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALYAN VIP - OVER-BY-OVER ENGINE 🚀</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050510; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .header { text-align: center; border-bottom: 2px solid #ffea00; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #ffea00; font-size: 26px; text-transform: uppercase; text-shadow: 0 0 15px rgba(255,234,0,0.5);}
        .box { background: #1a1a2e; padding: 15px; border-radius: 10px; border: 1px solid #444; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);}
        h3 { margin-top: 0; font-size: 14px; color: #00d2d3; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 8px;}
        input { width: calc(100% - 22px); padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #555; color: #fff; border-radius: 5px; font-weight: bold; font-size: 14px;}
        .btn-start { width: 100%; padding: 14px; background: linear-gradient(90deg, #ffea00, #ff8c00); color: #000; font-weight: 900; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase; transition: 0.3s; box-shadow: 0 4px 10px rgba(255,234,0,0.3);}
        .btn-start:active { transform: scale(0.98); }
        .terminal { background: #000; border: 1px solid #ffea00; padding: 15px; border-radius: 5px; height: 350px; overflow-y: auto; font-family: monospace; font-size: 12px; margin-bottom: 20px; line-height: 1.6;}
        .terminal p { margin: 4px 0; border-bottom: 1px dashed #222; padding-bottom: 4px;}
        .log-info { color: #00b0ff; } .log-success { color: #00ff88; font-weight: bold;} .log-error { color: #ff1744; font-weight: bold;} .log-warn { color: #ffea00; } .log-scan { color: #b388ff; font-style: italic;}
        .status-badge { display: inline-block; padding: 8px 15px; border-radius: 15px; font-size: 12px; font-weight: bold; background: #333; color: #aaa; margin-top: 10px;}
        .status-badge.active { background: #ffea00; color: #000; box-shadow: 0 0 10px rgba(255,234,0,0.5); animation: pulse 2s infinite;}
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .match-card { background: #111; border: 1px solid #ffea00; padding: 12px; border-radius: 5px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
        .btn-stop { background: #555; color: #fff; border: none; padding: 6px 12px; border-radius: 3px; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase;}
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-clock-rotate-left"></i> KALYAN OVO ENGINE</h1>
        <div class="status-badge" id="sync-status">SYSTEM SLEEPING...</div>
    </div>

    <div class="box">
        <h3><i class="fa-solid fa-link"></i> Over-by-Over Link</h3>
        
        <input type="hidden" id="api-url" value="https://script.google.com/macros/s/AKfycbwqmbrHUINUVTZedfBd3qe1eqwsxuALOMQB5ld_Pipy1KJZmDFaGhJ4p7_k3VnFgxNtRA/exec">
        
        <input type="text" id="m-link" placeholder="Cricbuzz Over-by-Over Link Paste Karein...">
        <input type="datetime-local" id="m-time">
        <button class="btn-start" onclick="saveMatchToDatabase()"><i class="fa-solid fa-bolt"></i> START OVO SYNC</button>
    </div>

    <div class="box" id="active-matches-container" style="display: none;">
        <h3><i class="fa-solid fa-tower-broadcast"></i> Active Ball Tracking...</h3>
        <div id="active-matches-list"></div>
    </div>

    <div class="terminal" id="console-box">
        <p class="log-info">> Over-by-Over Engine Booted!</p>
        <p class="log-info">> Waiting for Cricbuzz OVO Link...</p>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();
    
    let activeMatches = {};
    let isFetching = false; 

    function cLog(type, msg) {
        let box = document.getElementById('console-box');
        box.innerHTML += `<p class="log-${type}">[${new Date().toLocaleTimeString()}] ${msg}</p>`;
        box.scrollTop = box.scrollHeight; 
    }

    function saveMatchToDatabase() {
        let link = document.getElementById('m-link').value.trim();
        let time = document.getElementById('m-time').value;
        if(!link || !time) return alert("Link aur Time dalna zaroori hai!");

        let matchIdMatch = link.match(/\/(\d+)\//);
        let id = matchIdMatch ? matchIdMatch[1] : Date.now();

        let wakeTime = new Date(time).getTime() - 1200000; 
        db.ref(`Game/Kalyan11/LiveEngine/${id}`).set({ 
            matchId: id, 
            fullUrl: link,
            wakeUpTime: wakeTime 
        })
        .then(() => {
            document.getElementById('m-link').value = ""; 
            cLog('success', `✅ OVO Target Locked: Match ${id}`);
        });
    }

    function stopMatch(id) {
        if(confirm(`Sync rokna hai?`)) {
            db.ref(`Game/Kalyan11/LiveEngine/${id}`).remove();
            cLog('error', `🛑 Target Aborted: ${id}`);
        }
    }

    db.ref(`Game/Kalyan11/LiveEngine`).on('value', (snapshot) => {
        activeMatches = snapshot.exists() ? snapshot.val() : {};
        let count = Object.keys(activeMatches).length;
        document.getElementById('sync-status').innerText = `OVO TRACKING: ${count}`;
        document.getElementById('sync-status').className = count > 0 ? "status-badge active" : "status-badge";

        let listDiv = document.getElementById('active-matches-list');
        let container = document.getElementById('active-matches-container');
        
        if (count > 0) {
            container.style.display = "block";
            let html = "";
            for (let id in activeMatches) {
                html += `<div class="match-card"><span>Match ID: <b style="color:#ffea00">${id}</b></span><button class="btn-stop" onclick="stopMatch('${id}')">STOP</button></div>`;
            }
            listDiv.innerHTML = html;
        } else {
            container.style.display = "none";
        }
    });

    setInterval(async () => {
        if(isFetching) return; 
        let now = Date.now();
        for (let id in activeMatches) {
            if (now >= activeMatches[id].wakeUpTime) { 
                await fetchOVOData(activeMatches[id]); 
            }
        }
    }, 15000); 

    async function fetchOVOData(matchData) {
        isFetching = true;
        let matchId = matchData.matchId;
        let targetUrl = matchData.fullUrl;

        try {
            cLog('info', `🌐 OVO Strike: Fetching ball data for ${matchId}...`);
            let baseUrl = document.getElementById('api-url').value.trim();
            let finalUrl = `${baseUrl}?url=${encodeURIComponent(targetUrl)}`;
            
            let res = await fetch(finalUrl, { redirect: "follow" });
            let textData = await res.text();
            let doc = new DOMParser().parseFromString(textData, "text/html");
            
            let pageTitle = doc.querySelector('title') ? doc.querySelector('title').textContent : "Unknown Match";
            cLog('scan', `📄 Page Found: "${pageTitle.substring(0, 35)}..."`);

            await extractOVO(doc, matchId);
            
        } catch (e) { 
            cLog('error', `⚠️ Network Dead End. Retrying...`); 
        }
        isFetching = false;
    }

    function cleanName(str) {
        return str.toLowerCase().replace(/\(c\)/g,'').replace(/\(wk\)/g,'').replace(/[^a-z]/g, ' ').replace(/\s+/g, ' ').trim();
    }

    async function extractOVO(doc, matchId) {
        let players = {};
        let dbSnap = await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).once('value');
        if(dbSnap.exists()) players = dbSnap.val();

        if(Object.keys(players).length === 0) return cLog('error', `❌ Players not found in DB!`);

        let scrapedData = {};

        // Ball-by-ball summaries dhoondho (Is panna par data rows alag hoti hain)
        // Cricbuzz OVO page usually use elements like '.cb-ovr-flo'
        doc.querySelectorAll('.cb-col-100.cb-col.cb-scrd-itms, .cb-scrd-itms').forEach(row => {
            let nameEl = row.querySelector('a');
            if(!nameEl) return;
            let name = cleanName(nameEl.textContent);
            if(!scrapedData[name]) scrapedData[name] = {runs:0, wickets:0};

            let bolds = row.querySelectorAll('.text-bold');
            if(bolds.length > 0) {
                // Agar Scorecard sections is page par milte hain
                if(row.querySelector('.cb-col-27, .cb-col-25')) scrapedData[name].runs = parseInt(bolds[0].textContent) || 0;
                if(row.querySelector('.cb-col-38, .cb-col-40')) scrapedData[name].wickets = parseInt(bolds[0].textContent) || 0;
            }
        });

        // Backup: Live Summary Section (Top bar)
        let liveBat = doc.querySelectorAll('.cb-min-bat-rw');
        liveBat.forEach(row => {
           let name = cleanName(row.querySelector('a').textContent);
           if(!scrapedData[name]) scrapedData[name] = {runs:0, wickets:0};
           let r = row.querySelector('.text-bold, .abtext');
           if(r) scrapedData[name].runs = parseInt(r.textContent) || 0;
        });

        let matchedCount = 0;
        let updates = {};

        for (let key in players) {
            let fbClean = cleanName(players[key].name || "");
            let fbLast = fbClean.split(' ').pop();
            
            for (let sName in scrapedData) {
                if (sName.includes(fbLast) || fbClean.includes(sName)) {
                    let r = scrapedData[sName].runs;
                    let w = scrapedData[sName].wickets;
                    let p = (r * 1) + (w * 25) + 4;

                    updates[key + '/points'] = p;
                    updates[key + '/runs'] = r;
                    updates[key + '/wickets'] = w;
                    updates[key + '/playingStatus'] = "playing";
                    matchedCount++;
                    break;
                }
            }
        }

        if(matchedCount > 0) {
            await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).update(updates);
            cLog('success', `⚡ OVO SYNC SUCCESS: ${matchedCount} Players Injected!`);
            await updateLeaderboard(matchId);
        } else {
            cLog('warn', `⚠️ No player matches found on this page section.`);
        }
    }

    async function updateLeaderboard(matchId) {
        let pSnap = await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).once('value');
        let tSnap = await db.ref(`Game/Kalyan11/Contests/${matchId}/Teams`).once('value');
        if(!pSnap.exists() || !tSnap.exists()) return;

        let liveP = pSnap.val();
        let updates = {};
        
        tSnap.forEach(child => {
            let team = child.val();
            let pts = 0;
            Object.values(team.players || {}).forEach(pid => {
                if(liveP[pid]) {
                    let base = parseFloat(liveP[pid].points || 0);
                    if(liveP[pid].name === team.captain) pts += (base * 2);
                    else if(liveP[pid].name === (team.viceCaptain || team.vice_captain)) pts += (base * 1.5);
                    else pts += base;
                }
            });
            updates[child.key + '/total_points'] = parseFloat(pts.toFixed(1));
        });
        await db.ref(`Game/Kalyan11/Contests/${matchId}/Teams`).update(updates);
        cLog('success', `🏆 Leaderboard Refreshed!`);
    }
</script>
</body>
</html>
