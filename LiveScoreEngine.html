<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALYAN VIP - ULTIMATE BRAHMASTRA 🚀</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050510; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .header { text-align: center; border-bottom: 2px solid #ff004c; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #ff004c; font-size: 26px; text-transform: uppercase; text-shadow: 0 0 15px rgba(255,0,76,0.5);}
        .box { background: #1a1a2e; padding: 15px; border-radius: 10px; border: 1px solid #444; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);}
        h3 { margin-top: 0; font-size: 14px; color: #00ff88; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 8px;}
        input { width: calc(100% - 22px); padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #555; color: #fff; border-radius: 5px; font-weight: bold; font-size: 14px;}
        .btn-start { width: 100%; padding: 14px; background: linear-gradient(90deg, #ff004c, #ff8c00); color: #fff; font-weight: 900; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase; transition: 0.3s; box-shadow: 0 4px 10px rgba(255,0,76,0.3);}
        .btn-start:active { transform: scale(0.98); }
        .terminal { background: #000; border: 1px solid #ff004c; padding: 15px; border-radius: 5px; height: 350px; overflow-y: auto; font-family: monospace; font-size: 12px; margin-bottom: 20px; line-height: 1.6;}
        .terminal p { margin: 4px 0; border-bottom: 1px dashed #222; padding-bottom: 4px;}
        .log-info { color: #00d2d3; } .log-success { color: #00ff88; font-weight: bold;} .log-error { color: #ff004c; font-weight: bold;} .log-warn { color: #ffd700; } .log-scan { color: #a29bfe; font-style: italic;}
        .status-badge { display: inline-block; padding: 8px 15px; border-radius: 15px; font-size: 12px; font-weight: bold; background: #333; color: #aaa; margin-top: 10px;}
        .status-badge.active { background: #ff004c; color: #fff; box-shadow: 0 0 10px rgba(255,0,76,0.5); animation: pulse 2s infinite;}
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .match-card { background: #111; border: 1px solid #ff004c; padding: 12px; border-radius: 5px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
        .btn-stop { background: #555; color: #fff; border: none; padding: 6px 12px; border-radius: 3px; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase;}
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-fire-flame-curved"></i> KALYAN BRAHMASTRA</h1>
        <div class="status-badge" id="sync-status">SYSTEM SLEEPING...</div>
    </div>

    <div class="box">
        <h3><i class="fa-solid fa-crosshairs"></i> Target Live Match</h3>
        
        <input type="hidden" id="api-url" value="https://script.google.com/macros/s/AKfycbz-a5vjg-SJvLCbY1tSNj5QLo17lPMJpV-7Px3hA2hONT8Jfh4P7voRIxEZpOn2aDOFFA/exec">
        
        <input type="text" id="m-id" placeholder="Cricbuzz Match ID (e.g. 149673)">
        <input type="datetime-local" id="m-time">
        <button class="btn-start" onclick="saveMatchToDatabase()"><i class="fa-solid fa-rocket"></i> LAUNCH AUTO-SYNC</button>
    </div>

    <div class="box" id="active-matches-container" style="display: none;">
        <h3><i class="fa-solid fa-satellite-dish"></i> Active Targets...</h3>
        <div id="active-matches-list"></div>
    </div>

    <div class="terminal" id="console-box">
        <p class="log-info">> Brahmastra Engine Booted!</p>
        <p class="log-info">> Anti-Blocker: <span style="color:#00ff88">ONLINE</span></p>
        <p class="log-info">> Waiting for target...</p>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();
    
    let activeMatches = {};
    let isFetching = false; 

    function cLog(type, msg) {
        let box = document.getElementById('console-box');
        box.innerHTML += `<p class="log-${type}">[${new Date().toLocaleTimeString()}] ${msg}</p>`;
        box.scrollTop = box.scrollHeight; 
    }

    function saveMatchToDatabase() {
        let id = document.getElementById('m-id').value.trim();
        let time = document.getElementById('m-time').value;
        if(!id || !time) return alert("Match ID aur Time dalna zaroori hai!");
        
        let wakeTime = new Date(time).getTime() - 1200000; 
        db.ref(`Game/Kalyan11/LiveEngine/${id}`).set({ matchId: id, wakeUpTime: wakeTime })
        .then(() => {
            document.getElementById('m-id').value = ""; 
            cLog('success', `✅ Target Locked: Match ${id} is set for Auto-Sync.`);
        });
    }

    function stopMatch(id) {
        if(confirm(`Target ${id} ko abort karna hai?`)) {
            db.ref(`Game/Kalyan11/LiveEngine/${id}`).remove();
            cLog('error', `🛑 Target Aborted: ${id}`);
        }
    }

    db.ref(`Game/Kalyan11/LiveEngine`).on('value', (snapshot) => {
        activeMatches = snapshot.exists() ? snapshot.val() : {};
        let count = Object.keys(activeMatches).length;
        document.getElementById('sync-status').innerText = `ENGAGED: ${count} MATCHES`;
        document.getElementById('sync-status').className = count > 0 ? "status-badge active" : "status-badge";

        let listDiv = document.getElementById('active-matches-list');
        let container = document.getElementById('active-matches-container');
        
        if (count > 0) {
            container.style.display = "block";
            let html = "";
            for (let id in activeMatches) {
                html += `<div class="match-card"><span>Target ID: <b style="color:#00ff88">${id}</b></span><button class="btn-stop" onclick="stopMatch('${id}')">ABORT</button></div>`;
            }
            listDiv.innerHTML = html;
        } else {
            container.style.display = "none";
        }
    });

    // MASTER LOOP: Har 15 second mein attack karega
    setInterval(async () => {
        if(isFetching) return; 
        let now = Date.now();
        for (let id in activeMatches) {
            if (now >= activeMatches[id].wakeUpTime) { 
                await fetchFromGoogleScript(id); 
            }
        }
    }, 15000); 

    // 🔥 THE BYPASS ATTACK (GOOGLE SCRIPT) 🔥
    async function fetchFromGoogleScript(matchId) {
        isFetching = true;
        try {
            cLog('info', `🌐 Calling Google Server to fetch Match: ${matchId}...`);
            
            let baseUrl = document.getElementById('api-url').value.trim();
            let targetUrl = `https://www.cricbuzz.com/live-cricket-scores/${matchId}`;
            let finalUrl = `${baseUrl}?url=${encodeURIComponent(targetUrl)}`;
            
            let res = await fetch(finalUrl, { redirect: "follow" });
            let textData = await res.text();

            if (!textData || textData.includes("Exception:") || textData.includes("Error:") || textData.includes("script.google.com/a/macros/")) {
                cLog('error', `❌ Google Script Blocked/Error. Retrying in next cycle...`);
                isFetching = false;
                return; 
            }

            cLog('info', `🔓 Security Bypassed! HTML received. Running Data Extraction...`);
            let doc = new DOMParser().parseFromString(textData, "text/html");
            await extractDataAndMatch(doc, matchId);
            
        } catch (e) { 
            cLog('error', `⚠️ Network Dead End. System will retry. (${e.message})`); 
        }
        isFetching = false;
    }

    function cleanName(str) {
        return str.toLowerCase().replace(/\(c\)/g,'').replace(/\(wk\)/g,'').replace(/[^a-z]/g, ' ').replace(/\s+/g, ' ').trim();
    }

    // 🔥 DATA EXTRACTION & FUZZY MATCHING LOGIC 🔥
    async function extractDataAndMatch(doc, matchId) {
        let dbSnap = await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).once('value');
        if(!dbSnap.exists()) {
            cLog('warn', `⚠️ Match ${matchId} ke players abhi tak Firebase mein nahi dale gaye hain!`);
            return;
        }

        let players = dbSnap.val();
        let updates = {};
        let scrapedData = {};

        // 1. FULL SCORECARD SCRAPING
        doc.querySelectorAll('.cb-scrd-itms').forEach(row => {
            let nameEl = row.querySelector('a.cb-text-link');
            if(!nameEl) return;
            let name = cleanName(nameEl.textContent);
            if(!scrapedData[name]) scrapedData[name] = {runs:0, wickets:0};

            let runsCell = row.querySelector('.text-bold');
            if(runsCell && row.querySelector('.cb-col-27')) {
                scrapedData[name].runs = parseInt(runsCell.textContent) || 0;
            }
            if(runsCell && row.querySelector('.cb-col-38')) {
                scrapedData[name].wickets = parseInt(runsCell.textContent) || 0;
            }
        });

        // 2. LIVE ONGOING MATCH SCRAPING (Mini Scorecard)
        doc.querySelectorAll('.cb-min-bat-rw').forEach(row => {
            let nameEl = row.querySelector('a.cb-text-link');
            if(!nameEl) return;
            let name = cleanName(nameEl.textContent);
            if(!scrapedData[name]) scrapedData[name] = {runs:0, wickets:0};

            let boldText = row.querySelector('.text-bold, .abtext');
            if(boldText) {
                let runs = parseInt(boldText.textContent);
                if(!isNaN(runs)) scrapedData[name].runs = runs;
            }
        });
        
        doc.querySelectorAll('.cb-min-bowl-rw').forEach(row => {
            let nameEl = row.querySelector('a.cb-text-link');
            if(!nameEl) return;
            let name = cleanName(nameEl.textContent);
            if(!scrapedData[name]) scrapedData[name] = {runs:0, wickets:0};

            let cols = row.querySelectorAll('.cb-col-10, .cb-col-8');
            if(cols.length >= 4) { 
                let wkts = parseInt(cols[3].textContent);
                if(!isNaN(wkts)) scrapedData[name].wickets = wkts;
            }
        });

        let scrapedNamesList = Object.keys(scrapedData);
        if(scrapedNamesList.length === 0) {
            cLog('warn', `⚠️ Scorecard par abhi tak koi run/wicket nahi dikha (Match ya toh shuru nahi hua ya break par hai).`);
            return;
        }

        cLog('scan', `🔍 Extracted Active Players: ${scrapedNamesList.join(', ')}`);

        let matchedCount = 0;

        // 🔥 THE SMART MATCHER 🔥
        for (let key in players) {
            let fbClean = cleanName(players[key].name || "");
            let fbParts = fbClean.split(' ');
            let fbLast = fbParts[fbParts.length - 1]; 
            
            let matchedStats = null;

            for (let sName in scrapedData) {
                let cbParts = sName.split(' ');
                let cbLast = cbParts[cbParts.length - 1];

                if (sName === fbClean || sName.includes(fbClean) || fbClean.includes(sName)) {
                    matchedStats = scrapedData[sName]; break;
                }
                else if (fbLast === cbLast && fbLast.length >= 3) {
                    matchedStats = scrapedData[sName]; break;
                }
                else if (fbParts.some(p => p.length >= 4 && sName.includes(p))) {
                    matchedStats = scrapedData[sName]; break;
                }
            }

            if (matchedStats) {
                let r = matchedStats.runs || 0;
                let w = matchedStats.wickets || 0;
                
                // 💰 THE POINT FORMULA 💰
                // 1 Run = 1 Pt | 1 Wicket = 25 Pts | Playing 11 = 4 Pts
                let p = (r * 1) + (w * 25) + 4; 

                updates[key + '/points'] = p;
                updates[key + '/runs'] = r;
                updates[key + '/wickets'] = w;
                updates[key + '/playingStatus'] = "playing";
                
                matchedCount++;
            }
        }

        if(Object.keys(updates).length > 0) {
            await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).update(updates);
            cLog('success', `⚡ POINT INJECTION SUCCESS: ${matchedCount} Players updated!`);
            await updateTeamsLeaderboard(matchId);
        } else {
            cLog('error', `❌ Extract hui list aur Firebase list aapas mein match nahi huyi!`);
        }
    }

    // 🔥 LEADERBOARD RANKING ENGINE (C/VC 2x & 1.5x LOGIC) 🔥
    async function updateTeamsLeaderboard(matchId) {
        try {
            let pSnap = await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).once('value');
            let tSnap = await db.ref(`Game/Kalyan11/Contests/${matchId}/Teams`).once('value');
            if(!pSnap.exists() || !tSnap.exists()) return;

            let livePlayersData = pSnap.val();
            let updates = {};
            
            tSnap.forEach(child => {
                let team = child.val();
                let pts = 0;
                
                let vcName = team.viceCaptain || team.vice_captain; 
                let cName = team.captain;

                Object.values(team.players || {}).forEach(playerId => {
                    if(livePlayersData[playerId]) {
                        let pData = livePlayersData[playerId];
                        let pName = pData.name;
                        let livePoints = parseFloat(pData.points || 0);

                        if(pName === cName) { pts += (livePoints * 2); } 
                        else if(pName === vcName) { pts += (livePoints * 1.5); } 
                        else { pts += livePoints; }
                    }
                });

                updates[child.key + '/total_points'] = parseFloat(pts.toFixed(1));
            });

            await db.ref(`Game/Kalyan11/Contests/${matchId}/Teams`).update(updates);
            cLog('success', `🏆 LEADERBOARD LIVE: Rankings and (2x/1.5x) Multipliers updated!`);
            
        } catch(e) { 
            cLog('error', `Leaderboard Crash: ` + e); 
        }
    }
</script>
</body>
</html>
