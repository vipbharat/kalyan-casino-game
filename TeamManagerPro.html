<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Admin Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding: 10px; padding-bottom: 50px;}
        .container { max-width: 800px; margin: 0 auto; background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 5px 20px rgba(0,255,136,0.1); }
        .header { text-align: center; border-bottom: 2px dashed #444; padding-bottom: 10px; margin-bottom: 15px; }
        .header h2 { color: #00ff88; margin: 0; font-weight: 900; text-transform: uppercase; font-size: 20px;}
        .match-select-box { background: #1a1a2e; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #444;}
        .match-select-box label { font-weight: bold; color: #00ff88; display: block; margin-bottom: 5px; font-size: 12px; text-transform: uppercase;}
        select { width: 100%; padding: 10px; background: #050510; color: #fff; border: 1px solid #555; border-radius: 6px; font-size: 15px; font-weight: bold; outline: none;}
        .tabs { display: flex; border-bottom: 2px solid #333; margin-bottom: 15px; overflow-x: auto; white-space: nowrap;}
        .tab-btn { flex: 1; padding: 10px 5px; background: transparent; color: #888; border: none; font-size: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .tab-btn.active { color: #00ff88; border-bottom: 3px solid #00ff88; background: rgba(0,255,136,0.05); }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; color: #aaa; margin-bottom: 5px; font-weight: bold; text-transform: uppercase;}
        .input-group input { width: 100%; padding: 10px; background: #1a1a2e; border: 1px solid #444; border-radius: 6px; color: #fff; font-size: 14px; font-weight: bold; box-sizing: border-box; outline: none;}
        .btn-primary { width: 100%; background: linear-gradient(135deg, #00a05a, #00ff88); color: #000; border: none; padding: 12px; border-radius: 6px; font-size: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; box-shadow: 0 4px 10px rgba(0,255,136,0.2);}
        .btn-primary:active { transform: scale(0.98); }
        
        /* Players Selection Grid */
        .player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px;}
        .player-label { background: #000; border: 1px solid #333; padding: 8px; border-radius: 5px; display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 11px; font-weight: bold;}
        .player-label:hover { background: #222; }
        .player-label input { width: auto; margin: 0; }
        
        .player-stat-card { background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 10px; margin-bottom: 12px; position: relative; border-left: 4px solid #00ff88;}
        .player-stat-card .p-name { font-size: 14px; font-weight: 900; color: #fff; margin-bottom: 10px; display: flex; justify-content: space-between;}
        .stats-grid { display: flex; gap: 8px; justify-content: space-between; }
        .stat-box { flex: 1; background: #050510; padding: 5px; border-radius: 5px; border: 1px solid #444; text-align: center;}
        .stat-box label { display: block; font-size: 9px; color: #aaa; text-transform: uppercase; font-weight: bold; margin-bottom: 4px;}
        .stat-box input { width: 100%; background: transparent; border: none; color: #fff; font-size: 14px; font-weight: 900; text-align: center; outline: none; padding: 0;}
        .stat-box input.total-pts { color: #ffd700; }
        
        .loader { display: none; text-align: center; padding: 20px; color: #00ff88; font-weight: bold; font-size: 14px;}
        .success-alert { display: none; background: #00a05a; color: #fff; padding: 12px; text-align: center; border-radius: 6px; margin-top: 15px; font-weight: 900; font-size: 14px;}
    </style>
</head>
<body>

    <div class="container">
        <div class="header"><h2><i class="fa-solid fa-chess-board"></i> Ultimate Admin</h2></div>

        <div class="match-select-box">
            <label>Select Match First</label>
            <select id="master-match-select" onchange="clearData()"><option value="">-- Matches Loading --</option></select>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="btn-bot" onclick="switchTab('bot')"><i class="fa-solid fa-robot"></i> Bots</button>
            <button class="tab-btn" id="btn-pts" onclick="switchTab('pts')"><i class="fa-solid fa-chart-line"></i> Update Points</button>
        </div>

        <div id="section-bot" class="section active">
            <button class="btn-primary" style="background: #1a0033; color:#00b0ff; border:1px solid #00b0ff; margin-bottom: 15px;" onclick="fetchPlayersForBots()"><i class="fa-solid fa-users"></i> Load 22 Players</button>
            
            <div id="bot-selection-area" style="display: none;">
                <div style="font-size: 11px; color: #ffd700; margin-bottom: 10px;">Select Players (Bot inhi mein se 11 ki team banayega):</div>
                <div class="player-grid" id="bot-players-list"></div>
                <div style="text-align:right; font-size:12px; color:#00ff88; font-weight:bold; margin-bottom:15px;" id="bot-selected-count">0 Selected</div>

                <div class="input-group">
                    <label>Contest Entry Fee</label>
                    <input type="number" id="bot-fee" value="49">
                </div>
                <div class="input-group">
                    <label>Kitne Bots Daalne Hain?</label>
                    <input type="number" id="bot-count" value="10" placeholder="Jaise: 10, 50, 100">
                </div>
                <button class="btn-primary" onclick="generateBots()"><i class="fa-solid fa-bolt"></i> Inject Unique Bots</button>
            </div>
            
            <div class="loader" id="bot-loader"><i class="fa-solid fa-spinner fa-spin fa-2x"></i><br>Generating Unique Squads...</div>
            <div class="success-alert" id="bot-success"><span id="bot-success-txt"></span></div>
        </div>

        <div id="section-pts" class="section">
            <div style="font-size: 11px; color: #ffd700; margin-bottom: 10px; border: 1px dashed #ffd700; padding: 8px; border-radius: 5px;">
                <b>Magic System:</b> Points update karte hi saari Teams ka score recalculate hoga aur Leaderboard hil jayega!
            </div>
            <button class="btn-primary" style="background: #1a0033; color:#00ff88; border:1px solid #00ff88;" onclick="fetchPlayersForPoints()"><i class="fa-solid fa-cloud-arrow-down"></i> Load Scorecard</button>
            
            <div class="loader" id="pts-loader"><i class="fa-solid fa-spinner fa-spin fa-2x"></i><br>Loading Stats...</div>
            
            <div id="players-points-container" style="margin-top: 15px; display: none;">
                <div id="dynamic-players-list"></div>
                
                <button class="btn-primary" onclick="saveAllDetailedPoints()"><i class="fa-solid fa-floppy-disk"></i> Update Points & Leaderboard</button>
                <div class="success-alert" id="pts-success">Points Updated & Leaderboard Ranked Successfully!</div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        let allLoadedPlayers = []; 

        db.ref('Game/Kalyan11/VIPMatches').on('value', snapshot => {
            let select = document.getElementById('master-match-select');
            select.innerHTML = '<option value="">-- Select Match --</option>';
            if(snapshot.exists()){
                snapshot.forEach(child => { select.innerHTML += `<option value="${child.key}">${child.val().team1} vs ${child.val().team2}</option>`; });
            }
        });

        function switchTab(tab) {
            ['bot', 'pts'].forEach(t => {
                document.getElementById('btn-' + t).classList.remove('active');
                document.getElementById('section-' + t).classList.remove('active');
            });
            document.getElementById('btn-' + tab).classList.add('active');
            document.getElementById('section-' + tab).classList.add('active');
        }

        function clearData() {
            document.getElementById('bot-selection-area').style.display = 'none';
            document.getElementById('players-points-container').style.display = 'none';
            allLoadedPlayers = [];
        }

        // ================== BOTS ENGINE (100% UNIQUE SQUADS) ==================
        const botNames = ["Rahul", "Amit", "Vikram", "Pooja", "Neha", "Suresh", "Ramesh", "Deepak", "Ravi", "Sunil", "Karan", "Rohit", "Mohit", "Virat", "Sneha", "Kavita", "Sanjay", "Manoj", "Ajay", "Vijay"];

        function fetchPlayersForBots() {
            let matchId = document.getElementById('master-match-select').value;
            if(!matchId) return alert("Select Match First!");
            
            document.getElementById('bot-loader').style.display = 'block';
            db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).once('value', snap => {
                document.getElementById('bot-loader').style.display = 'none';
                if(!snap.exists()) return alert("Khiladi nahi mile! Pehle khiladi add karein.");
                
                allLoadedPlayers = [];
                snap.forEach(c => { let p = c.val(); p.id = c.key; allLoadedPlayers.push(p); });
                
                let grid = document.getElementById('bot-players-list');
                grid.innerHTML = "";
                allLoadedPlayers.forEach(p => {
                    grid.innerHTML += `
                        <label class="player-label">
                            <input type="checkbox" value="${p.id}" class="bot-p-checkbox" checked onchange="updateBotCount()">
                            <div>${p.name} <br><span style="color:#aaa; font-size:9px;">${p.team}</span></div>
                        </label>`;
                });
                
                document.getElementById('bot-selection-area').style.display = 'block';
                updateBotCount();
            });
        }

        function updateBotCount() {
            let count = document.querySelectorAll('.bot-p-checkbox:checked').length;
            document.getElementById('bot-selected-count').innerText = `${count} Players Selected`;
        }

        function generateValid11(pool) {
            while(true) {
                let shuffled = [...pool].sort(() => 0.5 - Math.random());
                let team11 = shuffled.slice(0, 11);
                
                let teamCounts = {};
                let isValid = true;
                team11.forEach(p => {
                    let tName = p.team || "UNK";
                    teamCounts[tName] = (teamCounts[tName] || 0) + 1;
                    if(teamCounts[tName] > 7) isValid = false;
                });
                if(isValid) return team11;
            }
        }

        async function generateBots() {
            let matchId = document.getElementById('master-match-select').value;
            let fee = parseInt(document.getElementById('bot-fee').value) || 49;
            let botCount = parseInt(document.getElementById('bot-count').value); 
            
            let checkedIds = Array.from(document.querySelectorAll('.bot-p-checkbox:checked')).map(cb => cb.value);
            if(checkedIds.length < 11) return alert("Kam se kam 11 khiladi select karein!");

            document.getElementById('bot-loader').style.display = "block";
            let pool = allLoadedPlayers.filter(p => checkedIds.includes(p.id));

            let targetRef = db.ref(`Game/Kalyan11/Contests/${matchId}/Teams`);
            
            // 🔥 FINGERPRINT (SIGNATURE) TRACKER: Duplicate Team rokne ke liye 🔥
            let generatedSignatures = new Set();
            let actualGenerated = 0;

            for(let i = 0; i < botCount; i++) {
                let uniqueTeamFound = false;
                let team11, captain, viceCaptain, squadIds, signature;
                let attempts = 0;

                // Jab tak unique team na mil jaye, tab tak chalta rahega (Max 1000 try karega)
                while(!uniqueTeamFound && attempts < 1000) {
                    team11 = generateValid11(pool);
                    
                    let cIdx = Math.floor(Math.random() * 11);
                    let vcIdx = Math.floor(Math.random() * 11);
                    while(cIdx === vcIdx) vcIdx = Math.floor(Math.random() * 11);

                    captain = team11[cIdx];
                    viceCaptain = team11[vcIdx];
                    squadIds = team11.map(p => p.id);

                    // 🎯 SIGNATURE GENERATION: 11 khiladiyon ko alphabetical sort karke C aur VC jodo
                    let sortedIds = [...squadIds].sort().join(",");
                    signature = `${sortedIds}_C:${captain.id}_VC:${viceCaptain.id}`;

                    // Agar ye signature (team) pehle nahi bani, toh aage badho
                    if(!generatedSignatures.has(signature)) {
                        generatedSignatures.add(signature);
                        uniqueTeamFound = true;
                    }
                    attempts++;
                }

                // Agar combinations khatam ho gaye toh aage aur bot nahi banayega
                if(!uniqueTeamFound) {
                    console.log("Maximum possible unique teams generated!");
                    break; 
                }

                let randomNum = Math.floor(100 + Math.random() * 899); 
                let fakeName = botNames[Math.floor(Math.random() * botNames.length)] + randomNum;

                // Live Points Calculate kar lo
                let totalPts = 0;
                team11.forEach(p => {
                    let pts = parseFloat(p.points || 0);
                    if(p.id === captain.id) totalPts += (pts * 2);
                    else if(p.id === viceCaptain.id) totalPts += (pts * 1.5);
                    else totalPts += pts;
                });

                let botTeamData = { 
                    phone: "BOT_" + fakeName, 
                    teamName: fakeName, 
                    userName: fakeName,
                    players: squadIds,
                    captain: captain.name, 
                    viceCaptain: viceCaptain.name, 
                    total_points: parseFloat(totalPts.toFixed(1)),
                    entry_paid: fee, 
                    timestamp: Date.now() - Math.floor(Math.random()*50000),
                    is_bot: true 
                };

                await targetRef.push(botTeamData);
                actualGenerated++;
            }

            document.getElementById('bot-loader').style.display = "none";
            document.getElementById('bot-success-txt').innerText = `SUCCESS! ${actualGenerated} 100% Unique Bots Injected!`;
            document.getElementById('bot-success').style.display = "block";
            setTimeout(() => document.getElementById('bot-success').style.display = "none", 5000);
        }

        // ================== MASTER POINTS ENGINE ==================
        function fetchPlayersForPoints() {
            let matchId = document.getElementById('master-match-select').value;
            if(!matchId) return alert("Select Match First!");
            
            document.getElementById('pts-loader').style.display = 'block';
            document.getElementById('dynamic-players-list').innerHTML = "";
            
            db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).once('value', snap => {
                document.getElementById('pts-loader').style.display = 'none';
                if(!snap.exists()) return alert("Khiladi nahi mile!");
                
                allLoadedPlayers = [];
                snap.forEach(c => { let p = c.val(); p.id = c.key; allLoadedPlayers.push(p); });
                
                allLoadedPlayers.forEach(p => {
                    addPlayerStatCard(p.id, p.name, p.team, p.runs || 0, p.wickets || 0, p.other_points || 0);
                });
                
                document.getElementById('players-points-container').style.display = 'block';
            });
        }

        function addPlayerStatCard(id, name, team, r, w, o) {
            let total = r + (w * 25) + o;
            let html = `
                <div class="player-stat-card" id="card-${id}" data-id="${id}">
                    <div class="p-name">${name} <span style="color:#aaa; font-size:10px;">${team}</span></div>
                    <div class="stats-grid">
                        <div class="stat-box"><label>Runs</label><input type="number" class="val-r" value="${r}" oninput="calcTotal('${id}')"></div>
                        <div class="stat-box"><label>Wkts (x25)</label><input type="number" class="val-w" value="${w}" oninput="calcTotal('${id}')"></div>
                        <div class="stat-box"><label>Other Pts</label><input type="number" class="val-o" value="${o}" oninput="calcTotal('${id}')"></div>
                        <div class="stat-box"><label>Total</label><input type="number" class="total-pts val-t" value="${total}" readonly></div>
                    </div>
                </div>
            `;
            document.getElementById('dynamic-players-list').innerHTML += html;
        }

        function calcTotal(id) {
            let card = document.getElementById(`card-${id}`);
            let r = parseFloat(card.querySelector('.val-r').value) || 0;
            let w = parseFloat(card.querySelector('.val-w').value) || 0;
            let o = parseFloat(card.querySelector('.val-o').value) || 0;
            card.querySelector('.val-t').value = r + (w * 25) + o;
        }

        async function saveAllDetailedPoints() {
            let matchId = document.getElementById('master-match-select').value;
            let cards = document.querySelectorAll('.player-stat-card');
            
            document.getElementById('pts-loader').style.display = 'block';
            document.getElementById('players-points-container').style.display = 'none';

            let updates = {};
            let fastPointsDict = {}; 

            cards.forEach(card => {
                let pid = card.getAttribute('data-id');
                let r = parseFloat(card.querySelector('.val-r').value) || 0;
                let w = parseFloat(card.querySelector('.val-w').value) || 0;
                let o = parseFloat(card.querySelector('.val-o').value) || 0;
                let t = parseFloat(card.querySelector('.val-t').value) || 0;

                updates[`${pid}/runs`] = r;
                updates[`${pid}/wickets`] = w;
                updates[`${pid}/other_points`] = o;
                updates[`${pid}/points`] = t;

                fastPointsDict[pid] = { name: card.querySelector('.p-name').innerText.split('\n')[0].trim(), pts: t };
            });

            await db.ref(`Game/Kalyan11/MatchPlayers/${matchId}`).update(updates);

            let teamSnap = await db.ref(`Game/Kalyan11/Contests/${matchId}/Teams`).once('value');
            if(teamSnap.exists()) {
                let teamUpdates = {};
                
                teamSnap.forEach(child => {
                    let team = child.val();
                    let teamKey = child.key;
                    let newTotal = 0;

                    if(team.players && Array.isArray(team.players)) {
                        team.players.forEach(pid => {
                            if(fastPointsDict[pid]) {
                                let pName = fastPointsDict[pid].name;
                                let pPts = fastPointsDict[pid].pts;

                                if(pName === team.captain) newTotal += (pPts * 2);
                                else if(pName === (team.viceCaptain || team.vice_captain)) newTotal += (pPts * 1.5);
                                else newTotal += pPts;
                            }
                        });
                    }
                    
                    teamUpdates[`${teamKey}/total_points`] = parseFloat(newTotal.toFixed(1));
                });

                await db.ref(`Game/Kalyan11/Contests/${matchId}/Teams`).update(teamUpdates);
            }

            document.getElementById('pts-loader').style.display = 'none';
            document.getElementById('players-points-container').style.display = 'block';
            document.getElementById('pts-success').style.display = "block";
            setTimeout(() => document.getElementById('pts-success').style.display = "none", 5000);
        }
    </script>
</body>
</html>
