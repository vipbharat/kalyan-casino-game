<div id="all-history-content" style="padding: 10px;">Loading History...</div>

<script>
    if(userPhone) {
        // Sabhi transactions (Deposit, Withdraw, Bonus) ek hi folder se aayenge
        db.ref(`user_history/${userPhone}`).orderByChild('timestamp').on('value', (snap) => {
            let html = "";
            if(snap.exists()) {
                snap.forEach((child) => {
                    let d = child.val();
                    let type = d.type.toUpperCase(); // WITHDRAWAL, DEPOSIT, BONUS, REFER
                    let status = (d.status || "Success").toUpperCase();
                    
                    // Style Settings
                    let isMinus = d.type === "Withdrawal";
                    let colorClass = isMinus ? "minus" : "plus";
                    let sign = isMinus ? "-" : "+";

                    html = `
                    <div class="card ${status.toLowerCase()}">
                        <div class="info">
                            <b>${type}</b>
                            <small>${d.date}</small><br>
                            <span class="status-badge">${status}</span>
                        </div>
                        <div class="amt ${colorClass}">${sign} ₹${d.amount}</div>
                    </div>` + html;
                });
                document.getElementById('all-history-content').innerHTML = html;
            } else {
                document.getElementById('all-history-content').innerHTML = "<center>No History Found</center>";
            }
        });
    }
</script>
