<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan Pro - All History</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b0b0b; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        
        .header { display: flex; align-items: center; margin-bottom: 25px; }
        .header i { font-size: 20px; color: gold; cursor: pointer; margin-right: 15px; }
        .header h2 { flex: 1; margin: 0; font-size: 18px; color: gold; text-transform: uppercase; }

        .history-container { margin-top: 10px; }

        /* Transaction Card Styling */
        .card { 
            background: #111; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 12px; 
            border: 1px solid #333;
            border-left: 5px solid #444; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
        }

        /* Status Border Colors */
        .card.pending { border-left-color: #ffc107; } /* Yellow */
        .card.success { border-left-color: #28a745; } /* Green */
        .card.rejected { border-left-color: #dc3545; } /* Red */

        .info { flex: 1; }
        .info b { display: block; font-size: 15px; margin-bottom: 4px; color: #fff; letter-spacing: 0.5px; }
        .info small { color: #888; font-size: 11px; }
        
        /* Amount Colors */
        .amt { font-weight: bold; font-size: 18px; text-align: right; }
        .plus { color: #28a745; } /* Green for Deposit */
        .minus { color: #dc3545; } /* Red for Withdrawal */

        /* Status Badge */
        .status-badge { 
            font-size: 10px; 
            display: inline-block; 
            margin-top: 6px; 
            text-transform: uppercase; 
            padding: 3px 8px; 
            border-radius: 4px; 
            background: rgba(255,255,255,0.05); 
            font-weight: bold; 
            letter-spacing: 1px; 
        }
        .pending .status-badge { color: #ffc107; border: 1px solid rgba(255, 193, 7, 0.3); }
        .success .status-badge { color: #28a745; border: 1px solid rgba(40, 167, 69, 0.3); }
        .rejected .status-badge { color: #dc3545; border: 1px solid rgba(220, 53, 69, 0.3); }

        .empty-msg { text-align: center; color: #666; margin-top: 60px; font-size: 14px; }
        .empty-msg i { font-size: 40px; color: #333; margin-bottom: 15px; }
        
        /* VIP Limit Notice */
        .limit-notice { text-align: center; font-size: 11px; color: #666; margin-top: 20px; font-style: italic; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa fa-arrow-left" onclick="window.history.back()"></i>
        <h2>Transaction History</h2>
    </div>

    <div id="history-content" class="history-container">
        <div class="empty-msg">
            <i class="fa-solid fa-spinner fa-spin"></i><br>Loading VIP History...
        </div>
    </div>
    
    <div id="limit-note" class="limit-notice" style="display: none;">Showing Latest 10 Transactions Only</div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo",
            databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com",
            projectId: "kalyan-casino"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let userPhone = localStorage.getItem('userPhone') || localStorage.getItem('phone');
        
        let allDeposits = [];
        let allWithdrawals = [];

        if(!userPhone) {
            document.getElementById('history-content').innerHTML = `
                <div class="empty-msg">
                    <i class="fa-solid fa-lock"></i><br>Please Login to view history.
                </div>`;
        } else {
            // Function to merge and display top 10
            function renderTop10History() {
                // Dono array ko jodo
                let combinedHistory = allDeposits.concat(allWithdrawals);
                
                // Time ke hisaab se sort karo (Sabse naya sabse upar)
                combinedHistory.sort((a, b) => b.sortTime - a.sortTime);
                
                // 🔥 VIP LOGIC: Sirf Top 10 nikal lo, 11va automatically screen se delete ho jayega 🔥
                let top10 = combinedHistory.slice(0, 10);
                
                let html = "";
                
                if(top10.length === 0) {
                    document.getElementById('history-content').innerHTML = `
                        <div class="empty-msg">
                            <i class="fa-solid fa-receipt"></i><br>No Transactions Found
                        </div>`;
                    document.getElementById('limit-note').style.display = "none";
                    return;
                }

                if(combinedHistory.length > 0) {
                    document.getElementById('limit-note').style.display = "block";
                }

                top10.forEach((d) => {
                    let type = (d.type || "Transaction").toUpperCase(); 
                    let rawStatus = (d.status || "Pending").toLowerCase();
                    let displayStatus = (d.status || "Pending").toUpperCase();
                    
                    // Status Card Color Logic
                    let statusClass = "pending"; 
                    if(rawStatus.includes("success") || rawStatus.includes("approved") || rawStatus.includes("done")) {
                        statusClass = "success";
                    } else if(rawStatus.includes("rejected") || rawStatus.includes("failed") || rawStatus.includes("cancel")) {
                        statusClass = "rejected";
                    }

                    // Amount Sign & Color Logic (+ or -)
                    let isWithdraw = type.includes("WITHDRAW");
                    let colorClass = isWithdraw ? "minus" : "plus";
                    let sign = isWithdraw ? "-" : "+";
                    let displayTime = d.date || d.time || "Recent";

                    html += `
                    <div class="card ${statusClass}">
                        <div class="info">
                            <b>${isWithdraw ? '⬆️ ' + type : '⬇️ ' + type}</b>
                            <small><i class="fa-regular fa-calendar"></i> ${displayTime}</small><br>
                            <span class="status-badge">${displayStatus}</span>
                        </div>
                        <div class="amt ${colorClass}">${sign} ₹${d.amount}</div>
                    </div>`;
                });
                
                document.getElementById('history-content').innerHTML = html;
            }

            // 1. Fetch DEPOSITS (from 'requests' folder)
            db.ref('requests').on('value', (snap) => {
                allDeposits = [];
                if(snap.exists()) {
                    snap.forEach((child) => {
                        let d = child.val();
                        if(d.phone === userPhone) {
                            allDeposits.push({
                                ...d,
                                type: "DEPOSIT",
                                sortTime: Date.parse(d.time) || Date.now()
                            });
                        }
                    });
                }
                renderTop10History();
            });

            // 2. Fetch WITHDRAWALS (from 'user_history' folder)
            db.ref(`user_history/${userPhone}`).on('value', (snap) => {
                allWithdrawals = [];
                if(snap.exists()) {
                    snap.forEach((child) => {
                        let w = child.val();
                        allWithdrawals.push({
                            ...w,
                            type: w.type || "WITHDRAWAL",
                            sortTime: w.timestamp || Date.parse(w.date || w.time) || Date.now()
                        });
                    });
                }
                renderTop10History();
            });
        }
    </script>
</body>
</html>
