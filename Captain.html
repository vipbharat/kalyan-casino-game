<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan VIP - Choose C & VC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding-bottom: 90px; user-select: none; }
        .header { background: linear-gradient(135deg, #1a0033, #00ff88); padding: 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,255,136,0.3); color: #000; }
        .back-btn { font-size: 20px; cursor: pointer; font-weight: bold; }
        .match-info { text-align: center; font-weight: 900; font-size: 16px; flex-grow: 1; }
        
        .sub-header { background: #111; padding: 12px; text-align: center; font-size: 13px; color: #aaa; border-bottom: 1px dashed #333; }
        .highlight-c { color: #ffd700; font-weight: bold; }
        .highlight-vc { color: #c0c0c0; font-weight: bold; }
        .fee-badge { display: inline-block; background: #00ff88; color: #000; padding: 2px 8px; border-radius: 4px; font-weight: bold; margin-top: 5px; font-size: 12px;}

        .p-list { padding: 15px; }
        .p-row { background: #1a1a2e; border: 1px solid #333; padding: 12px; margin-bottom: 12px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.5);}
        .p-info { display: flex; align-items: center; gap: 12px; }
        .p-img { width: 45px; height: 45px; background: #222; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 1px solid #444; font-size: 20px; color: #555;}
        .p-name { font-weight: bold; font-size: 14px; margin-bottom: 3px;}
        .p-role { font-size: 11px; color: #aaa; background: #000; padding: 2px 6px; border-radius: 4px;}

        .cvc-btns { display: flex; gap: 10px; }
        .cvc-btn { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #555; background: #111; color: #aaa; font-weight: 900; font-size: 14px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; }
        .cvc-btn.active-c { background: #ffd700; color: #000; border-color: #ffd700; box-shadow: 0 0 10px rgba(255,215,0,0.6); }
        .cvc-btn.active-vc { background: #c0c0c0; color: #000; border-color: #c0c0c0; box-shadow: 0 0 10px rgba(192,192,192,0.6); }

        .footer { position: fixed; bottom: 0; width: 100%; background: #111; padding: 15px; box-sizing: border-box; display: flex; justify-content: center; align-items: center; z-index: 100; border-top: 2px solid #333;}
        .save-btn { background: #00ff88; color: #000; padding: 14px 0; border-radius: 5px; font-weight: 900; font-size: 16px; border: none; cursor: pointer; opacity: 0.5; pointer-events: none; transition: 0.3s; width: 100%; text-transform: uppercase;}
        .save-btn.active { opacity: 1; pointer-events: auto; }
        
        .loader { text-align: center; margin-top: 50px; color: #00ff88; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-arrow-left back-btn" onclick="history.back()"></i>
        <div class="match-info">CHOOSE C & VC</div>
        <div style="width: 20px;"></div>
    </div>

    <div class="sub-header">
        <div>C gets <span class="highlight-c">2x</span> points & VC gets <span class="highlight-vc">1.5x</span> points</div>
        <div class="fee-badge" id="feeDisplay">Entry: ₹--</div>
    </div>

    <div class="p-list" id="playerContainer">
        <div class="loader"><i class="fa-solid fa-spinner fa-spin"></i> Khiladi aa rahe hain...</div>
    </div>

    <div class="footer">
        <button class="save-btn" id="saveBtn" onclick="processPaymentAndSaveTeam()">PAY & SAVE TEAM</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('matchId') || "DUMMY_MATCH";
        
        const contestFee = parseInt(localStorage.getItem('kalyan_entry_fee')) || parseInt(urlParams.get('fee')) || 49;
        
        const isEditMode = localStorage.getItem('kalyan_edit_team_key');
        if(isEditMode) {
            document.getElementById('feeDisplay').innerText = `Editing Team (Free)`;
            document.getElementById('saveBtn').innerText = `UPDATE TEAM`;
        } else {
            document.getElementById('feeDisplay').innerText = `Entry Contest: ₹${contestFee}`;
        }

        const selectedPlayersRaw = localStorage.getItem('kalyan_selected_team');
        const selectedPlayers = selectedPlayersRaw ? JSON.parse(selectedPlayersRaw) : [];

        let userPhone = localStorage.getItem('userPhone') || localStorage.getItem('phone');

        let allPlayersData = {};
        let captainId = null;
        let viceCaptainId = null;

        if(selectedPlayers.length !== 11) {
            document.getElementById('playerContainer').innerHTML = "<div style='color:#ff004c; text-align:center;'>Error: 11 Players nahi chune gaye! Wapas ja kar team banayein.</div>";
        } else {
            db.ref('Game/Kalyan11/MatchPlayers/' + matchId).once('value', snapshot => {
                if(snapshot.exists()) {
                    allPlayersData = snapshot.val();
                    renderPlayersList();
                } else {
                    document.getElementById('playerContainer').innerHTML = "<div style='color:#ff004c; text-align:center;'>Error: Khiladiyon ka data nahi mila.</div>";
                }
            });
        }

        function renderPlayersList() {
            let container = document.getElementById('playerContainer');
            container.innerHTML = "";

            selectedPlayers.forEach(pid => {
                let p = allPlayersData[pid];
                if(p) {
                    let shortName = p.name.split(' ')[0][0] + ". " + (p.name.split(' ')[1] || p.name);
                    container.innerHTML += `
                        <div class="p-row">
                            <div class="p-info">
                                <div class="p-img"><i class="fa-solid fa-user"></i></div>
                                <div><div class="p-name">${shortName}</div><div class="p-role">${p.team} | ${p.role}</div></div>
                            </div>
                            <div class="cvc-btns">
                                <div class="cvc-btn btn-c" id="c_${pid}" onclick="selectC('${pid}')">C</div>
                                <div class="cvc-btn btn-vc" id="vc_${pid}" onclick="selectVC('${pid}')">VC</div>
                            </div>
                        </div>
                    `;
                }
            });
        }

        function selectC(pid) { if(viceCaptainId === pid) return; captainId = pid; updateButtons(); }
        function selectVC(pid) { if(captainId === pid) return; viceCaptainId = pid; updateButtons(); }

        function updateButtons() {
            document.querySelectorAll('.btn-c').forEach(btn => btn.classList.remove('active-c'));
            document.querySelectorAll('.btn-vc').forEach(btn => btn.classList.remove('active-vc'));

            if(captainId) document.getElementById(`c_${captainId}`).classList.add('active-c');
            if(viceCaptainId) document.getElementById(`vc_${viceCaptainId}`).classList.add('active-vc');

            let saveBtn = document.getElementById('saveBtn');
            if(captainId && viceCaptainId) saveBtn.classList.add('active');
            else saveBtn.classList.remove('active');
        }

        function processPaymentAndSaveTeam() {
            if(!captainId || !viceCaptainId || selectedPlayers.length !== 11) return;
            if(!userPhone) { alert("Please pehle Login karein!"); return; }
            
            let btn = document.getElementById('saveBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> PROCESSING...';
            btn.classList.remove('active');

            if(isEditMode) {
                saveFinalDataToDB(true);
                return;
            }

            let walletRef = db.ref('users/' + userPhone);
            walletRef.once('value', snapshot => {
                let userData = snapshot.val();
                if(!userData) {
                    alert("⚠️ ERROR: Aapka account nahi mila. Kripya dhyan se login karein.");
                    resetBtn(btn);
                    return;
                }
                
                let currentBalance = parseFloat(userData.balance || 0);

                if (contestFee === 0 || currentBalance >= contestFee) {
                    if(contestFee > 0) {
                        let newBalance = currentBalance - contestFee;
                        db.ref('users/' + userPhone + '/balance').set(newBalance).then(() => {
                            saveFinalDataToDB(false);
                        }).catch(err => {
                            alert("Payment Error: " + err.message);
                            resetBtn(btn);
                        });
                    } else {
                        saveFinalDataToDB(false); 
                    }
                } else {
                    alert(`⚠️ INSUFFICIENT BALANCE!\nAapke wallet mein ₹${currentBalance} hain. Entry fee ₹${contestFee} hai.\nKripya apne Dashboard se deposit karein!`);
                    resetBtn(btn);
                }
            });
        }

        function resetBtn(btn) {
            btn.innerHTML = 'PAY & SAVE TEAM';
            btn.classList.add('active');
        }

        function saveFinalDataToDB(isUpdate) {
            let finalTeamData = {
                phone: userPhone,
                teamKey: userPhone, 
                players: selectedPlayers,
                captain: captainId,
                viceCaptain: viceCaptainId,
                total_points: 0,
                entry_paid: contestFee,
                timestamp: Date.now()
            };

            db.ref('Game/Kalyan11/Contests/' + matchId + '/Teams/' + userPhone).set(finalTeamData)
            .then(() => {
                localStorage.removeItem('kalyan_selected_team');
                localStorage.removeItem('kalyan_edit_team_key');
                
                if(!isUpdate && contestFee > 0) {
                    alert(`✅ TEAM SAVED! ₹${contestFee} Wallet se kat gaye hain.`);
                } else {
                    alert("✅ TEAM UPDATED!");
                }
                
                // 🚀🔥 YAHI HAI WO JAADUI LINE JO ERROR THEEK KAREGI 🔥🚀
                window.location.href = `MyTeam.html?matchId=${matchId}&teamId=${userPhone}`;
            })
            .catch(error => {
                alert("Error: " + error.message);
                resetBtn(document.getElementById('saveBtn'));
            });
        }
    </script>
</body>
</html>
