<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - Choose C & VC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding-bottom: 90px; user-select: none; }
        
        /* 👑 Header */
        .header { background: linear-gradient(135deg, #1a0033, #00ff88); padding: 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,255,136,0.3); color: #000; }
        .back-btn { font-size: 20px; cursor: pointer; font-weight: bold; }
        .match-info { text-align: center; font-weight: 900; font-size: 16px; flex-grow: 1; text-transform: uppercase; letter-spacing: 1px;}
        
        /* 📊 Info Bar */
        .info-bar { background: #111; padding: 15px; text-align: center; border-bottom: 2px solid #333; position: sticky; top: 54px; z-index: 99;}
        .info-title { font-size: 16px; font-weight: 900; color: #fff; margin-bottom: 5px;}
        .info-sub { font-size: 12px; color: #aaa; font-weight: bold;}
        .highlight-c { color: #00ff88; }
        .highlight-vc { color: #00b0ff; }

        /* 🎴 Player List */
        .player-list { padding: 15px; display: flex; flex-direction: column; gap: 10px;}
        
        /* 🧑‍🎤 List Item Card */
        .p-card { background: linear-gradient(145deg, #1a1a2e, #111); border: 1px solid #333; border-radius: 10px; padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; transition: 0.3s; box-shadow: 0 4px 8px rgba(0,0,0,0.4);}
        .p-card:active { transform: scale(0.98); }
        .p-info { flex-grow: 1; margin-left: 10px;}
        .p-name { font-size: 15px; font-weight: 900; color: #fff; margin-bottom: 3px;}
        .p-role { font-size: 11px; color: #aaa; font-weight: bold; background: #000; padding: 2px 6px; border-radius: 4px; display: inline-block;}
        
        /* 🎛️ Action Buttons (C & VC) */
        .action-btns { display: flex; gap: 10px; }
        .btn-c, .btn-vc { width: 35px; height: 35px; border-radius: 50%; font-weight: 900; font-size: 14px; border: 2px solid #555; background: #222; color: #aaa; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center;}
        
        /* Selected State */
        .btn-c.selected { background: #00ff88; color: #000; border-color: #00ff88; box-shadow: 0 0 15px rgba(0,255,136,0.5); transform: scale(1.1);}
        .btn-vc.selected { background: #00b0ff; color: #000; border-color: #00b0ff; box-shadow: 0 0 15px rgba(0,176,255,0.5); transform: scale(1.1);}
        
        /* Active Row Glow */
        .p-card.is-c { border-color: #00ff88; background: rgba(0,255,136,0.05);}
        .p-card.is-vc { border-color: #00b0ff; background: rgba(0,176,255,0.05);}

        /* 🚀 Footer & Save Button */
        .footer { position: fixed; bottom: 0; width: 100%; background: #111; padding: 15px; box-sizing: border-box; display: flex; justify-content: center; z-index: 100; border-top: 2px solid #333; box-shadow: 0 -5px 15px rgba(0,0,0,0.5);}
        .save-btn { width: 100%; background: #333; color: #888; padding: 15px; border-radius: 8px; font-weight: 900; font-size: 16px; border: none; cursor: not-allowed; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;}
        .save-btn.active { background: linear-gradient(90deg, #00ff88, #00b0ff); color: #000; cursor: pointer; box-shadow: 0 0 15px rgba(0,255,136,0.4);}
        .save-btn.active:active { transform: scale(0.95); }

        .loader { text-align: center; margin-top: 50px; color: #00ff88; font-weight: bold; font-size: 16px;}
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-arrow-left back-btn" onclick="history.back()"></i>
        <div class="match-info">CHOOSE C & VC</div>
        <div style="width: 20px;"></div>
    </div>

    <div class="info-bar">
        <div class="info-title">Choose your Captain & Vice Captain</div>
        <div class="info-sub"><span class="highlight-c">C gets 2x Points</span> & <span class="highlight-vc">VC gets 1.5x Points</span></div>
    </div>

    <div class="player-list" id="playerList">
        <div class="loader"><i class="fa-solid fa-spinner fa-spin fa-2x"></i><br><br>Setting up your 11...</div>
    </div>

    <div class="footer">
        <button class="save-btn" id="saveBtn" onclick="saveTeamToDatabase()">SAVE TEAM <i class="fa-solid fa-check"></i></button>
    </div>

    <script>
        // 🛠️ FIREBASE INITIALIZATION
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        // 🔗 URL PARAMS & LOCAL STORAGE
        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('matchId');
        const contestFee = urlParams.get('fee') || localStorage.getItem('kalyan_entry_fee');
        const editTeamKey = localStorage.getItem('kalyan_edit_team_key');
        
        let selected11Ids = JSON.parse(localStorage.getItem('kalyan_selected_team')) || [];
        let captainId = null;
        let viceCaptainId = null;
        let finalPlayersData = [];
        let isSaving = false; // 🛑 Yahi wo Jadoo hai jo double team banne se rokega

        if(selected11Ids.length !== 11) {
            alert("Aapne 11 khiladi select nahi kiye. Wapas jaiye.");
            window.location.replace(`CreateTeam.html?matchId=${matchId}`);
        }

        // 📥 FETCH PLAYERS FROM FIREBASE
        db.ref('Game/Kalyan11/MatchPlayers/' + matchId).once('value', snapshot => {
            if(snapshot.exists()) {
                let allPlayers = snapshot.val();
                selected11Ids.forEach(id => {
                    if(allPlayers[id]) {
                        let p = allPlayers[id];
                        p.id = id;
                        finalPlayersData.push(p);
                    }
                });

                if(editTeamKey) {
                    db.ref(`Game/Kalyan11/Contests/${matchId}/Teams/${editTeamKey}`).once('value', tSnap => {
                        if(tSnap.exists()) {
                            let t = tSnap.val();
                            let savedCName = t.captain;
                            let savedVCName = t.viceCaptain || t.vice_captain;

                            finalPlayersData.forEach(p => {
                                if(p.name === savedCName) captainId = p.id;
                                if(p.name === savedVCName) viceCaptainId = p.id;
                            });
                        }
                        renderList();
                    });
                } else {
                    renderList();
                }
            } else {
                alert("Match Error!");
            }
        });

        // 🖼️ RENDER PLAYER LIST
        function renderList() {
            let container = document.getElementById('playerList');
            container.innerHTML = "";

            finalPlayersData.forEach(p => {
                let isC = (captainId === p.id);
                let isVC = (viceCaptainId === p.id);

                let cardClass = "p-card";
                if(isC) cardClass += " is-c";
                if(isVC) cardClass += " is-vc";

                container.innerHTML += `
                    <div class="${cardClass}" id="card-${p.id}">
                        <div class="p-info">
                            <div class="p-name">${p.name}</div>
                            <div class="p-role">${p.team || "UNKNOWN"} | ${p.role || "PLAYER"}</div>
                        </div>
                        <div class="action-btns">
                            <div class="btn-c ${isC ? 'selected' : ''}" onclick="setCaptain('${p.id}')">C</div>
                            <div class="btn-vc ${isVC ? 'selected' : ''}" onclick="setViceCaptain('${p.id}')">VC</div>
                        </div>
                    </div>
                `;
            });
            checkSaveButton();
        }

        // 🕹️ SET CAPTAIN LOGIC
        function setCaptain(id) {
            if(viceCaptainId === id) viceCaptainId = null; 
            captainId = id;
            renderList();
        }

        // 🕹️ SET VICE CAPTAIN LOGIC
        function setViceCaptain(id) {
            if(captainId === id) captainId = null; 
            viceCaptainId = id;
            renderList();
        }

        function checkSaveButton() {
            let btn = document.getElementById('saveBtn');
            if(captainId && viceCaptainId) {
                btn.classList.add('active');
                btn.disabled = false;
            } else {
                btn.classList.remove('active');
                btn.disabled = true;
            }
        }

        // 🚀 FINAL SAVE TO FIREBASE 🚀
        async function saveTeamToDatabase() {
            if(isSaving) return; // Tala laga diya! Ek baar dabne ke baad button lock ho jayega.
            
            if(!captainId || !viceCaptainId) return;
            
            let userPhone = localStorage.getItem('userPhone') || localStorage.getItem('phone'); 
            
            if(!userPhone) {
                alert("Login missing! Pehle app me login karein.");
                return;
            }

            isSaving = true; // Button Lock active

            let btn = document.getElementById('saveBtn');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> SAVING...`;
            btn.classList.remove('active');
            btn.disabled = true;

            let cObj = finalPlayersData.find(p => p.id === captainId);
            let vcObj = finalPlayersData.find(p => p.id === viceCaptainId);

            let teamData = {
                phone: userPhone,
                entry_paid: parseInt(contestFee) || 49, 
                payment_status: "PENDING",
                total_points: 0,
                timestamp: new Date().getTime(),
                captain: cObj.name,
                viceCaptain: vcObj.name,
                players: selected11Ids
            };

            try {
                let targetRef = db.ref(`Game/Kalyan11/Contests/${matchId}/Teams`);
                
                if(editTeamKey) {
                    await targetRef.child(editTeamKey).update(teamData);
                } else {
                    await targetRef.push(teamData);
                }
                
                // Kachra saaf karo local storage se
                localStorage.removeItem('kalyan_selected_team');
                localStorage.removeItem('kalyan_edit_team_key');
                
                // Seedha MyTeam page par bhejo
                window.location.replace(`MyTeam.html?matchId=${matchId}`); 

            } catch(e) {
                alert("Error saving team: " + e.message);
                isSaving = false; // Error aaya toh lock khol do
                btn.innerHTML = "SAVE TEAM <i class='fa-solid fa-check'></i>";
                btn.classList.add('active');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
