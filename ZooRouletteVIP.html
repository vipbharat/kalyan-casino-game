<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalyan VIP - Zoo Roulette Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; user-select: none; }
        
        :root {
            --bg-dark: #050508; --gold: #ffd700;
            --neon-green: #39ff14; --neon-blue: #00e5ff; --neon-purple: #b534ff; 
            --neon-red: #ff3333; --neon-orange: #ff9900; 
            --track-bg: #0a0a0c;
        }

        body {
            background-color: #050508;
            background-image: radial-gradient(circle at center, #1a2a1a 0%, #0c1a0c 40%, var(--bg-dark) 100%);
            color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- Header & Balances --- */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; background: rgba(0,0,0,0.85);
            border-bottom: 2px solid var(--gold); height: 8vh; z-index: 100;
        }
        .logo { font-size: 20px; font-weight: 900; color: var(--gold); text-shadow: 0 0 10px rgba(255,215,0,0.8); }
        .live-status { 
            background: rgba(0,255,102,0.1); border: 1px solid var(--neon-green); 
            color: var(--neon-green); padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: 800; 
        }

        .user-info-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(90deg, #111, #000, #111);
            padding: 8px 15px; border-bottom: 1px solid var(--gold);
            font-size: 12px; font-weight: 800; z-index: 99;
        }
        .wallet-box { color: var(--gold); display: flex; align-items: center; gap: 6px; }

        /* --- Main Game Area & Timer --- */
        .game-area {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 10px; position: relative; max-width: 500px; margin: 0 auto;
        }

        /* 🔥 TIMER FIX 🔥 */
        .bg-timer {
            position: absolute; font-size: 120px; font-weight: 900;
            color: rgba(255, 255, 255, 0.15); z-index: 0; pointer-events: none;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        /* --- Track & Grid --- */
        .track-container { 
            width: 100%; display: flex; flex-direction: column; z-index: 2; 
            background: var(--track-bg); border-radius: 15px; border: 3px solid var(--gold); 
            box-shadow: 0 0 20px rgba(255,215,0,0.3); overflow: hidden; position: relative;
        }
        
        .track-row { display: flex; width: 100%; height: 50px; } 
        .track-middle { display: flex; width: 100%; flex: 1; min-height: 250px; }
        .track-col { display: flex; flex-direction: column; width: 15%; justify-content: space-between; } 

        .t-box {
            flex: 1; background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(0,0,0,0.8));
            border: 1px solid #333; display: flex; align-items: center; justify-content: center; 
            font-size: 26px; transition: all 0.1s ease;
        }
        
        /* 🔥 GLOW ANIMATION FIX 🔥 */
        .active-glow {
            transform: scale(1.1); z-index: 10;
            background: linear-gradient(to bottom, #fff, var(--gold)) !important; border-radius: 5px;
            box-shadow: 0 0 15px #fff, inset 0 0 10px var(--gold) !important;
        }

        /* --- Betting Center --- */
        .betting-center {
            width: 70%; display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px; padding: 10px; position: relative; z-index: 5;
        }

        .b-card {
            background: rgba(20, 25, 30, 0.95); border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 8px 0; position: relative; cursor: pointer;
            box-shadow: 0 5px 10px rgba(0,0,0,0.5); border: 2px solid transparent;
        }
        
        .total-pool { position: absolute; top: 3px; right: 5px; font-size: 9px; color: #ccc; background: rgba(0,0,0,0.8); padding: 2px 5px; border-radius: 4px; }
        .b-icon { font-size: 32px; filter: drop-shadow(0 4px 4px black); margin: 5px 0; }
        .b-name { font-size: 9px; font-weight: 800; text-transform: uppercase; color: white; }
        .b-multi { font-size: 11px; font-weight: 900; padding: 2px 8px; border-radius: 10px; border: 1px solid white; margin-top: 2px; }
        
        /* Card Themes */
        .theme-green { border-color: var(--neon-green); box-shadow: inset 0 0 10px rgba(0,255,102,0.1); }
        .theme-green .b-multi { background: var(--neon-green); color: #000; }
        .theme-blue { border-color: var(--neon-blue); box-shadow: inset 0 0 10px rgba(0,221,255,0.1); }
        .theme-blue .b-multi { background: var(--neon-blue); color: #000; }
        .theme-red { border-color: var(--neon-red); box-shadow: inset 0 0 10px rgba(255,51,51,0.1); }
        .theme-red .b-multi { background: var(--neon-red); color: #fff; }
        .theme-purple { border-color: var(--neon-purple); box-shadow: inset 0 0 10px rgba(181,52,255,0.1); }
        .theme-purple .b-multi { background: var(--neon-purple); color: #fff; }
        .theme-orange { border-color: var(--neon-orange); box-shadow: inset 0 0 10px rgba(255,153,0,0.1); }
        .theme-orange .b-multi { background: var(--neon-orange); color: #000; }
        .theme-jackpot { border-color: #fff; background: linear-gradient(135deg, rgba(0,229,255,0.2), rgba(181,52,255,0.2)); }
        .theme-jackpot .b-multi { background: linear-gradient(90deg, #00e5ff, #0055ff); color: #fff; }

        /* --- Footer Chips --- */
        .footer-chips {
            height: 10vh; background: rgba(0,0,0,0.9); border-top: 2px solid var(--gold);
            display: flex; justify-content: space-evenly; align-items: center; padding: 0 5px; z-index: 100;
        }
        .chip {
            width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 900; color: white; border: 2px dashed rgba(255,255,255,0.6);
            cursor: pointer; transition: 0.2s;
        }
        .chip.selected { transform: scale(1.15) translateY(-5px); border: 2px solid #fff; box-shadow: 0 0 15px var(--gold); }
        .c-10 { background: #3498db; } .c-50 { background: #9b59b6; } .c-100 { background: #2ecc71; }
        .c-500 { background: #e74c3c; } .c-1k { background: #f1c40f; color: black; border-color: black; }
        
        /* Winner Screen */
        .win-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 9999;
        }
        .win-emoji { font-size: 100px; animation: pop 0.5s infinite alternate; }
        .win-text { color: var(--gold); font-size: 30px; font-weight: 900; margin-top: 10px; }
        @keyframes pop { from { transform: scale(0.9); } to { transform: scale(1.1); } }

    </style>
</head>
<body>

    <div class="header">
        <div class="logo">KALYAN VIP ZOO</div>
        <div class="live-status" id="live-count">● LIVE 342</div>
    </div>

    <div class="user-info-bar">
        <div class="wallet-box">💰 ₹<span id="wallet-bal">10,000</span></div>
        <div id="game-status-text" style="color:#00ff66;">Betting Open</div>
    </div>

    <div class="win-overlay" id="win-screen">
        <div class="win-emoji" id="win-icon">🦁</div>
        <div class="win-text" id="win-message">WINNER</div>
    </div>

    <div class="game-area">
        
        <div class="bg-timer" id="timer-bg">15</div>

        <div class="track-container">
            <div class="track-row">
                <div class="t-box" id="t-0">🦜</div><div class="t-box" id="t-1">🐇</div><div class="t-box" id="t-2">🕊️</div>
                <div class="t-box" id="t-3">🦈</div>
                <div class="t-box" id="t-4">🦚</div><div class="t-box" id="t-5">🐼</div><div class="t-box" id="t-6">🐒</div>
            </div>

            <div class="track-middle">
                <div class="track-col">
                    <div class="t-box" id="t-23">🦜</div>
                    <div class="t-box" id="t-22">🦅</div>
                    <div class="t-box" id="t-21" style="background:#400">🏺</div>
                    <div class="t-box" id="t-20">🐼</div>
                </div>

                <div class="betting-center">
                    <div class="b-card theme-green"><div class="total-pool">₹<span>0</span></div><div class="b-icon">🐒</div><div class="b-name">Monkey</div><div class="b-multi">8x</div></div>
                    <div class="b-card theme-blue"><div class="total-pool">₹<span>0</span></div><div class="b-icon">🐼</div><div class="b-name">Panda</div><div class="b-multi">8x</div></div>
                    <div class="b-card theme-purple"><div class="total-pool">₹<span>0</span></div><div class="b-icon">🦚</div><div class="b-name">Peacock</div><div class="b-multi">8x</div></div>
                    
                    <div class="b-card theme-orange"><div class="total-pool">₹<span>0</span></div><div class="b-icon">🦁</div><div class="b-name">Lion</div><div class="b-multi">12x</div></div>
                    <div class="b-card theme-jackpot"><div class="total-pool">₹<span>0</span></div><div class="b-icon">🦈</div><div class="b-name">Jackpot</div><div class="b-multi">24x</div></div>
                    <div class="b-card theme-red"><div class="total-pool">₹<span>0</span></div><div class="b-icon">🦅</div><div class="b-name">Eagle</div><div class="b-multi">12x</div></div>
                    
                    <div class="b-card theme-green"><div class="total-pool">₹<span>0</span></div><div class="b-icon">🦜</div><div class="b-name">Parrot</div><div class="b-multi">3x</div></div>
                    <div class="b-card theme-purple"><div class="total-pool">₹<span>0</span></div><div class="b-icon">🐇</div><div class="b-name">Rabbit</div><div class="b-multi">2x</div></div>
                    <div class="b-card theme-blue"><div class="total-pool">₹<span>0</span></div><div class="b-icon">🕊️</div><div class="b-name">Dove</div><div class="b-multi">6x</div></div>
                </div>

                <div class="track-col">
                    <div class="t-box" id="t-7">🐒</div>
                    <div class="t-box" id="t-8">🐼</div>
                    <div class="t-box" id="t-9" style="background:#400">📦</div>
                    <div class="t-box" id="t-10">🦅</div>
                </div>
            </div>

            <div class="track-row">
                <div class="t-box" id="t-19">🐒</div><div class="t-box" id="t-18">🕊️</div><div class="t-box" id="t-17">🐇</div>
                <div class="t-box" id="t-16">🦚</div><div class="t-box" id="t-15">🦈</div><div class="t-box" id="t-14">🦅</div>
                <div class="t-box" id="t-13">🦁</div><div class="t-box" id="t-12">🦜</div><div class="t-box" id="t-11">🦁</div>
            </div>
        </div>
    </div>

    <div class="footer-chips">
        <div class="chip c-10 selected" onclick="selectChip(10, this)">10</div>
        <div class="chip c-50" onclick="selectChip(50, this)">50</div>
        <div class="chip c-100" onclick="selectChip(100, this)">100</div>
        <div class="chip c-500" onclick="selectChip(500, this)">500</div>
        <div class="chip c-1k" onclick="selectChip(1000, this)">1K</div>
    </div>

    <script>
        const totalBoxes = 24; 
        let currentPos = 0; 
        let timer = 15; 
        let isSpinning = false; 
        let speed = 50;
        
        const timerDisplay = document.getElementById('timer-bg');
        const statusText = document.getElementById('game-status-text');
        const winScreen = document.getElementById('win-screen');

        function selectChip(amount, element) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
            element.classList.add('selected');
        }

        function startGameLoop() {
            isSpinning = false; timer = 15;
            timerDisplay.style.color = "rgba(255, 255, 255, 0.15)";
            statusText.innerText = "Betting Open";
            statusText.style.color = "#00ff66";
            
            // Randomly clear pools for effect
            document.querySelectorAll('.total-pool span').forEach(s => s.innerText = '0');

            const countdown = setInterval(() => {
                timer--; 
                timerDisplay.innerText = timer;
                
                if(timer <= 5) timerDisplay.style.color = "rgba(255, 42, 42, 0.2)"; // Red warning

                if(timer <= 0) {
                    clearInterval(countdown);
                    timerDisplay.innerText = "SPIN";
                    statusText.innerText = "Spinning...";
                    statusText.style.color = "var(--gold)";
                    startRouletteSpin();
                }
            }, 1000); 
        }

        function startRouletteSpin() {
            isSpinning = true; speed = 30; 
            let spinTimeLeft = 8; // Wheel spins for 8 seconds
            
            const spinTimer = setInterval(() => {
                spinTimeLeft--;
                if(spinTimeLeft <= 3) speed += 50; // Slow down
                if(spinTimeLeft <= 1) speed += 150; // Stop gradually
                if(spinTimeLeft <= 0) { clearInterval(spinTimer); isSpinning = false; }
            }, 1000);
            
            moveLight(); 
        }

        function moveLight() {
            if(!isSpinning) {
                // Determine Winner
                let winningBox = document.getElementById('t-' + currentPos);
                let resultEmoji = winningBox.innerText;
                
                document.getElementById('win-icon').innerText = resultEmoji;
                winScreen.style.display = 'flex';
                
                setTimeout(() => {
                    winScreen.style.display = 'none';
                    startGameLoop(); // Restart auto-loop
                }, 3500);
                return;
            }

            // Remove glow from all, add to current
            for(let i=0; i<totalBoxes; i++) { 
                let box = document.getElementById('t-' + i);
                if(box) box.classList.remove('active-glow'); 
            }
            
            let currentBox = document.getElementById('t-' + currentPos);
            if(currentBox) currentBox.classList.add('active-glow');
            
            currentPos = (currentPos + 1) % totalBoxes; // Next box
            
            setTimeout(moveLight, speed); 
        }

        // START GAME IMMEDIATELY ON LOAD
        window.onload = startGameLoop;

    </script>
</body>
</html>
