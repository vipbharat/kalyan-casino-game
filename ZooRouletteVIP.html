<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalyan VIP Zoo - Live Players Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; user-select: none; }
        body { background: #000; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Headers */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; border-bottom: 1px solid #333; }
        .logo { font-size: 18px; font-weight: 900; color: #ffd700; text-shadow: 0 0 5px rgba(255,215,0,0.5); }
        .online-box { background: rgba(0, 255, 0, 0.1); border: 1px solid #39ff14; color: #39ff14; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 900; box-shadow: 0 0 10px rgba(57,255,20,0.2); z-index: 100;}

        .sub-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 15px; border-bottom: 1px solid #333;}
        .wallet-box { border: 1px solid #ffd700; color: #ffd700; padding: 4px 12px; border-radius: 6px; font-weight: 800; font-size: 14px; background: rgba(255,215,0,0.1);}
        
        .history-strip { width: 100%; height: 35px; display: flex; align-items: center; gap: 8px; padding: 0 10px; border-bottom: 1px solid #222; }
        .h-tag { font-size: 10px; font-weight: 900; color: #ffd700; }
        .h-list { display: flex; gap: 4px; flex: 1; overflow: hidden; }
        .h-item { min-width: 24px; height: 24px; background: #111; color: #fff; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 14px; border: 1px solid #444; }

        /* 🔥 MAIN GAME BOARD 🔥 */
        .board-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 5px 10px; position: relative; }
        
        .game-board { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            grid-template-rows: repeat(7, 1fr); 
            gap: 2px; 
            width: 100%; 
            max-width: 450px; 
            aspect-ratio: 1; 
            border: 2px solid #ffd700; 
            border-radius: 12px; 
            padding: 4px; 
            position: relative; 
            background: #0a0a0a;
        }

        .track-item { background: rgba(255,255,255,0.05); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.1s; }
        .track-item.active { background: #fff; box-shadow: 0 0 15px #fff, inset 0 0 10px #fff; transform: scale(1.1); z-index: 10; border-radius: 6px;}
        
        .huge-timer { position: absolute; top: 0; left: 50%; transform: translate(-50%, -30%); font-size: 85px; font-weight: 900; color: #39ff14; text-shadow: 0 0 30px #39ff14, 0 0 10px #000; z-index: 50; pointer-events: none; }
        
        .center-bets { grid-area: 2 / 2 / 7 / 7; display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 10px; }
        
        .bet-btn { background: #222; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid #555; position: relative; cursor: pointer; transition: 0.1s; }
        .bet-btn:active { transform: scale(0.95); }
        .bet-btn.winning { box-shadow: 0 0 20px #39ff14; border-color: #39ff14 !important; background: #003300 !important; }

        .btn-monkey { border-color: #795548; background: linear-gradient(#3e2723, #111); }
        .btn-panda { border-color: #cfd8dc; background: linear-gradient(#37474f, #111); }
        .btn-peacock { border-color: #00bcd4; background: linear-gradient(#006064, #111); }
        .btn-lion { border-color: #ff9800; background: linear-gradient(#e65100, #111); }
        .btn-shark { border-color: #03a9f4; background: linear-gradient(#01579b, #111); }
        .btn-eagle { border-color: #f44336; background: linear-gradient(#b71c1c, #111); }
        .btn-parrot { border-color: #4caf50; background: linear-gradient(#1b5e20, #111); }
        .btn-rabbit { border-color: #9c27b0; background: linear-gradient(#4a148c, #111); }
        .btn-dove { border-color: #9e9e9e; background: linear-gradient(#424242, #111); }

        .btn-icon { font-size: 32px; filter: drop-shadow(0 2px 2px #000); }
        .btn-multi { border: 1px solid #ffd700; color: #ffd700; font-size: 9px; padding: 1px 8px; border-radius: 10px; font-weight: 900; margin-top: 2px; background: #000;}
        .pool-text { position: absolute; top: 2px; right: 4px; font-size: 9px; color: #fff; font-weight: 800; background: rgba(0,0,0,0.5); padding: 0 4px; border-radius: 4px;}
        .my-bet-tag { position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); background: #ffd700; color: #000; font-size: 10px; padding: 1px 8px; border-radius: 4px; font-weight: 900; display: none; z-index: 20; white-space: nowrap;}

        /* 🔥 JANWAR AND PANCHI BETS 🔥 */
        .color-bets-container { display: flex; justify-content: space-between; gap: 10px; width: 100%; max-width: 450px; padding: 0 15px; margin: 0 auto 10px auto; }
        .color-btn { flex: 1; height: 60px; border-radius: 8px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #555; transition: 0.1s; }
        .color-btn:active { transform: scale(0.95); }
        .red-box { background: linear-gradient(145deg, #b71c1c, #4a0000); border-color: #ff5252; box-shadow: inset 0 0 10px rgba(255,82,82,0.3);}
        .black-box { background: linear-gradient(145deg, #424242, #111); border-color: #9e9e9e; box-shadow: inset 0 0 10px rgba(158,158,158,0.3);}
        .color-btn.winning { border-color: #39ff14 !important; box-shadow: 0 0 20px #39ff14, inset 0 0 15px #39ff14; }
        
        .color-title { font-size: 18px; font-weight: 900; letter-spacing: 1px; text-shadow: 0 2px 2px #000; margin-bottom: 2px; line-height: 1;}

        /* Chips Bottom */
        .footer-chips { height: 12vh; border-top: 1px solid #333; display: flex; justify-content: space-evenly; align-items: center; padding-bottom: 5px; }
        .chip { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; color: white; cursor: pointer; border: 2.5px solid rgba(255,255,255,0.5); transition: 0.2s;}
        .chip.selected { transform: translateY(-5px) scale(1.1); border-color: #fff; box-shadow: 0 0 15px #fff; }
        
        .c10 { border-color: #2196f3; box-shadow: inset 0 0 10px #2196f3; } 
        .c50 { border-color: #9c27b0; box-shadow: inset 0 0 10px #9c27b0; } 
        .c100 { border-color: #4caf50; box-shadow: inset 0 0 10px #4caf50; } 
        .c500 { border-color: #f44336; box-shadow: inset 0 0 10px #f44336; } 
        .c1k { border-color: #ffd700; color: #ffd700; box-shadow: inset 0 0 10px #ffd700; }

        .placed-chip { position: fixed; width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid white; pointer-events: none; z-index: 100; font-size: 8px; font-weight: 900; color: white; display: flex; align-items: center; justify-content: center; transition: all 0.4s ease-out; box-shadow: 2px 2px 5px rgba(0,0,0,0.8); }
    </style>
</head>
<body onclick="initAudio()">
    <audio id="soundSpin" src="https://assets.mixkit.co/active_storage/sfx/2042/2042-preview.mp3"></audio>
    <audio id="soundWin" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    <audio id="soundBet" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>

    <div class="header">
        <div class="logo">KALYAN VIP ZOO</div>
        <div class="online-box" id="online-badge">● <span id="online-count">245</span> Online</div>
    </div>

    <div class="sub-header">
        <div class="wallet-box">💰 ₹<span id="wallet-bal">0.00</span></div>
        <div id="clock" style="font-size: 11px; font-weight: 800; color: #aaa;">00:00:00</div>
    </div>

    <div class="history-strip">
        <span class="h-tag">RECORD:</span>
        <div class="h-list" id="history-list"></div>
    </div>

    <div class="board-container">
        <div class="huge-timer" id="main-timer">...</div>
        <div class="game-board" id="board">
            <div class="center-bets" id="bet-container"></div>
        </div>
    </div>

    <div class="color-bets-container">
        <div class="color-btn red-box" id="btn-JANWAR" onclick="placeBet(this, 'JANWAR', selectedChipVal, selectedChipColor, event)">
            <div class="pool-text">₹<span id="total-JANWAR">0</span></div>
            <div class="color-title">JANWAR</div>
            <div class="btn-multi">1.95x</div>
            <div class="my-bet-tag" id="my-JANWAR">₹<span>0</span></div>
        </div>
        <div class="color-btn black-box" id="btn-PANCHI" onclick="placeBet(this, 'PANCHI', selectedChipVal, selectedChipColor, event)">
            <div class="pool-text">₹<span id="total-PANCHI">0</span></div>
            <div class="color-title">PANCHI</div>
            <div class="btn-multi">1.95x</div>
            <div class="my-bet-tag" id="my-PANCHI">₹<span>0</span></div>
        </div>
    </div>

    <div class="footer-chips">
        <div class="chip selected c10" onclick="selectChip(10, this, '#2196f3')">10</div>
        <div class="chip c50" onclick="selectChip(50, this, '#9c27b0')">50</div>
        <div class="chip c100" onclick="selectChip(100, this, '#4caf50')">100</div>
        <div class="chip c500" onclick="selectChip(500, this, '#f44336')">500</div>
        <div class="chip c1k" onclick="selectChip(1000, this, '#ffd700')">1K</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const currentUserId = localStorage.getItem('userPhone') || localStorage.getItem('phone');
        
        let userBalance = 0, depBal = 0, winBal = 0, bonBal = 0;
        let selectedChipVal = 10; let selectedChipColor = '#2196f3';
        let isBettingOpen = false, isSpinningLocal = false, spinInterval, liveBettingInterval;
        let myBets = { 'JANWAR': 0, 'PANCHI': 0 };

        // 🟢 JANWAR = Beasts, PANCHI = Birds Logic 🟢
        const janwarAnimals = ['🐒', '🐼', '🦁', '🐇'];
        const panchiAnimals = ['🦚', '🦅', '🦜', '🕊️'];

        const betData = [
            {id:'🐒', m:8, cls:'btn-monkey'}, {id:'🐼', m:8, cls:'btn-panda'}, {id:'🦚', m:8, cls:'btn-peacock'}, 
            {id:'🦁', m:12, cls:'btn-lion'}, {id:'🦈', m:24, cls:'btn-shark'}, {id:'🦅', m:12, cls:'btn-eagle'}, 
            {id:'🦜', m:3, cls:'btn-parrot'}, {id:'🐇', m:2, cls:'btn-rabbit'}, {id:'🕊️', m:6, cls:'btn-dove'}
        ];

        const betContainer = document.getElementById('bet-container');
        betData.forEach(item => {
            myBets[item.id] = 0;
            const div = document.createElement('div');
            div.className = `bet-btn ${item.cls}`; div.id = `btn-${item.id}`;
            div.onclick = (e) => placeBet(div, item.id, selectedChipVal, selectedChipColor, e);
            div.innerHTML = `
                <div class="pool-text">₹<span id="total-${item.id}">0</span></div>
                <div class="btn-icon">${item.id}</div>
                <div class="btn-multi">${item.m}x</div>
                <div class="my-bet-tag" id="my-${item.id}">₹<span>0</span></div>
            `;
            betContainer.appendChild(div);
        });

        // Track Generation
        const trackSequence = ['🦜','🦁','🐇','🦈','🐒','🐼','🕊️', '🦅','🦜','📦','🐼','🦁', '🕊️','🦚','🦈','🐇','🐒','🦅','🦜', '🦁','🐼','🏺','🦚','🦅'];
        let trackElements = [];
        const board = document.getElementById('board');
        
        for(let i=1; i<=7; i++) createTrackItem(trackSequence[trackElements.length], 1, i);
        for(let i=2; i<=6; i++) createTrackItem(trackSequence[trackElements.length], i, 7);
        for(let i=7; i>=1; i--) createTrackItem(trackSequence[trackElements.length], 7, i);
        for(let i=6; i>=2; i--) createTrackItem(trackSequence[trackElements.length], i, 1);

        function createTrackItem(emoji, row, col) {
            let div = document.createElement('div');
            div.className = 'track-item'; div.style.gridArea = `${row} / ${col}`; div.innerText = emoji;
            board.appendChild(div); trackElements.push(div);
        }

        let isAudioInit = false;
        function initAudio() { isAudioInit = true; }
        function playSound(obj, vol) { try { if(!isAudioInit) return; let c = obj.cloneNode(); c.volume = vol; c.play().catch(e=>{}); } catch(e){} }

        if (currentUserId) {
            db.ref(`users/${currentUserId}`).on('value', (s) => {
                const d = s.val() || {}; 
                depBal = parseFloat(d.balance||0); winBal = parseFloat(d.winning_balance||0); bonBal = parseFloat(d.bonus_balance||0);
                userBalance = depBal + winBal + bonBal; 
                document.getElementById('wallet-bal').innerText = userBalance.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            });
        }

        // 🔥 LIVE PLAYER FAKE CHIPS ANIMATION 🔥
        function startLivePlayerBets() {
            if (liveBettingInterval) clearInterval(liveBettingInterval);
            liveBettingInterval = setInterval(() => {
                if (!isBettingOpen) return;
                
                const onlineBox = document.getElementById('online-badge').getBoundingClientRect();
                const startX = onlineBox.left + (onlineBox.width / 2);
                const startY = onlineBox.top + (onlineBox.height / 2);

                const targets = ['🐒', '🐼', '🦚', '🦁', '🦈', '🦅', '🦜', '🐇', '🕊️', 'JANWAR', 'PANCHI'];
                const randomTargetId = targets[Math.floor(Math.random() * targets.length)];
                let targetBox = document.getElementById(`btn-${randomTargetId}`);
                if (!targetBox) return;

                const fakeChips = [
                    { val: 10, color: '#2196f3' }, { val: 50, color: '#9c27b0' },
                    { val: 100, color: '#4caf50' }, { val: 500, color: '#f44336' }, { val: 1000, color: '#ffd700' }
                ];
                const rChip = fakeChips[Math.floor(Math.random() * fakeChips.length)];

                let flyChip = document.createElement('div');
                flyChip.className = 'placed-chip'; flyChip.style.background = rChip.color; flyChip.style.zIndex = '40';
                flyChip.innerText = rChip.val >= 1000 ? (rChip.val/1000)+'K' : rChip.val;
                if (rChip.val === 10 || rChip.val === 1000) flyChip.style.color = '#000';

                flyChip.style.left = startX + 'px'; flyChip.style.top = startY + 'px';
                document.body.appendChild(flyChip);
                playSound(document.getElementById('soundBet'), 0.02); // Halke sound ke sath

                let dest = targetBox.getBoundingClientRect();
                setTimeout(() => {
                    flyChip.style.left = (dest.left + 15 + Math.random() * (dest.width - 30)) + 'px';
                    flyChip.style.top = (dest.top + 15 + Math.random() * (dest.height - 30)) + 'px';
                }, 50);
            }, 300); // Har 0.3 second mein ek chip udegi
        }

        function stopLivePlayerBets() {
            clearInterval(liveBettingInterval);
        }

        let lastWinner = '';
        db.ref('Game/ZooRoulette/Status').on('value', (s) => {
            let st = s.val(); if(!st) return;

            if(st.state === 'betting') {
                clearInterval(spinInterval); isSpinningLocal = false;
                document.getElementById('main-timer').innerText = st.timer;
                document.getElementById('main-timer').style.display = 'block';
                document.getElementById('main-timer').style.color = st.timer <= 5 ? "#ff3333" : "#39ff14";
                
                trackElements.forEach(el => el.classList.remove('active'));
                document.querySelectorAll('.bet-btn, .color-btn').forEach(b => b.classList.remove('winning'));
                
                if(!isBettingOpen) { 
                    isBettingOpen = true; 
                    resetTable(); 
                    startLivePlayerBets(); // Betting start toh fake chips start
                }
            } 
            else if (st.state === 'spinning' || st.state === 'result') {
                if(isBettingOpen && !isSpinningLocal) {
                    isBettingOpen = false; isSpinningLocal = true;
                    stopLivePlayerBets(); // Betting band, chips udna band
                    document.getElementById('main-timer').style.display = 'none'; 
                    if(st.winner) runTrackSpin(st.winner);
                }
            }
        });

        db.ref('Game/ZooRoulette/Bets').on('value', s => {
            let allB = s.val() || {};
            let tp = {'🐒':0, '🐼':0, '🦚':0, '🦁':0, '🦅':0, '🦈':0, '🕊️':0, '🐇':0, '🦜':0, 'JANWAR':0, 'PANCHI':0};
            for(let u in allB) { if(!u.includes('bot')) for(let c in allB[u]) if(tp[c] !== undefined) tp[c] += allB[u][c]; }
            for(let c in tp) {
                let elem = document.getElementById(`total-${c}`);
                if(elem) elem.innerText = tp[c].toLocaleString();
            }
        });

        function runTrackSpin(wId) {
            let sSnd = document.getElementById('soundSpin'); sSnd.currentTime = 0; sSnd.loop = true; sSnd.volume = 0.8; sSnd.play().catch(e=>{});
            let targetIndices = trackSequence.reduce((acc, el, i) => { if (el === wId) acc.push(i); return acc; }, []);
            if(targetIndices.length === 0) targetIndices = [0]; 
            let targetIdx = targetIndices[Math.floor(Math.random() * targetIndices.length)];
            
            let currentIdx = 0, totalSteps = 48 + targetIdx, step = 0, speed = 50;

            function nextStep() {
                trackElements.forEach(el => el.classList.remove('active'));
                trackElements[currentIdx].classList.add('active');
                if (step >= totalSteps) { sSnd.pause(); showWinner(wId); return; }
                step++; currentIdx = (currentIdx + 1) % 24;
                if(totalSteps - step < 10) speed += 30;
                setTimeout(nextStep, speed);
            }
            nextStep();
        }

        function showWinner(wId) {
            playSound(document.getElementById('soundWin'), 1.0); 
            
            let winBtn = document.getElementById(`btn-${wId}`);
            if(winBtn) winBtn.classList.add('winning');

            if(janwarAnimals.includes(wId)) document.getElementById('btn-JANWAR').classList.add('winning');
            if(panchiAnimals.includes(wId)) document.getElementById('btn-PANCHI').classList.add('winning');

            if (lastWinner !== wId) { lastWinner = wId; updateHistory(wId); }

            if(currentUserId) {
                let totalWin = 0;
                let winObj = betData.find(z => z.id === wId);
                if(winObj && myBets[wId] > 0) totalWin += myBets[wId] * winObj.m;
                
                if(janwarAnimals.includes(wId) && myBets['JANWAR'] > 0) totalWin += myBets['JANWAR'] * 1.95;
                if(panchiAnimals.includes(wId) && myBets['PANCHI'] > 0) totalWin += myBets['PANCHI'] * 1.95;

                if(totalWin > 0) {
                    db.ref(`users/${currentUserId}/winning_balance`).set(winBal + totalWin);
                }
            }
        }

        function updateHistory(winId) {
            const list = document.getElementById('history-list');
            const newItem = document.createElement('div');
            newItem.className = 'h-item'; newItem.innerText = winId;
            list.insertBefore(newItem, list.firstChild);
            if(list.children.length > 8) list.removeChild(list.lastChild); 
        }

        function resetTable() {
            document.querySelectorAll('.placed-chip').forEach(c => c.remove()); 
            
            betData.forEach(z => { myBets[z.id] = 0; document.getElementById(`my-${z.id}`).style.display = 'none'; document.getElementById(`my-${z.id}`).querySelector('span').innerText = '0'; });
            
            myBets['JANWAR'] = 0; myBets['PANCHI'] = 0;
            document.getElementById(`my-JANWAR`).style.display = 'none'; document.getElementById(`my-JANWAR`).querySelector('span').innerText = '0';
            document.getElementById(`my-PANCHI`).style.display = 'none'; document.getElementById(`my-PANCHI`).querySelector('span').innerText = '0';
            
            lastWinner = '';
        }

        function placeBet(el, targetId, val, color, e) {
            if (!isBettingOpen) return;
            if (!currentUserId) { alert("Login Error!"); return; } 
            if (userBalance < val) { alert("Insufficient Balance!"); return; }
            
            playSound(document.getElementById('soundBet'), 1.0); 
            
            let nDep = depBal, nWin = winBal, rem = val;
            if(nDep >= rem) { nDep -= rem; } else { rem -= nDep; nDep = 0; nWin -= rem; }
            db.ref('users/'+currentUserId).update({ balance: Math.max(0, nDep), winning_balance: Math.max(0, nWin) });
            db.ref(`Game/ZooRoulette/Bets/${currentUserId}/${targetId}`).set(firebase.database.ServerValue.increment(val));

            myBets[targetId] += val;
            let myTag = document.getElementById(`my-${targetId}`);
            myTag.style.display = 'block'; myTag.querySelector('span').innerText = myBets[targetId];

            var fly = document.createElement('div'); fly.className = 'placed-chip'; fly.style.background = color; 
            fly.innerText = val >= 1000 ? (val/1000)+'K' : val; 
            fly.style.left = e.clientX + 'px'; fly.style.top = e.clientY + 'px'; document.body.appendChild(fly);
            
            var tB = el.getBoundingClientRect();
            setTimeout(() => { fly.style.left = (tB.left + 15 + Math.random()*(tB.width-30))+'px'; fly.style.top = (tB.top + 15 + Math.random()*(tB.height-30))+'px'; }, 50);
        }

        function selectChip(v, el, color) { 
            selectedChipVal = v; selectedChipColor = color;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected')); 
            el.classList.add('selected'); playSound(document.getElementById('soundBet'), 0.5);
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        setInterval(() => { document.getElementById('online-count').innerText = Math.floor(Math.random() * 20) + 230; }, 5000); // Random online counter
    </script>
</body>
</html>
