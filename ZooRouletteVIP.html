<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalyan VIP - Zoo Roulette 7x7</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; user-select: none; }
        :root { --bg-dark: #050508; --gold: #ffd700; --neon-green: #39ff14; --neon-blue: #00e5ff; --neon-purple: #b534ff; --neon-red: #ff3333; --neon-orange: #ff9900; --neon-pink: #ff00ff; --track-bg: #0a0a0c; }
        body { background-color: #050508; background-image: radial-gradient(circle at center, #1a2a1a 0%, #0c1a0c 40%, var(--bg-dark) 100%); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; perspective: 1000px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: rgba(0,0,0,0.85); border-bottom: 2px solid var(--gold); height: 8vh; z-index: 100; }
        .logo { font-size: 20px; font-weight: 900; color: var(--gold); text-shadow: 0 0 15px rgba(255,215,0,0.8); }
        .user-info-bar { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 8px 15px; border-bottom: 2px solid var(--gold); font-size: 12px; font-weight: 800; }
        .wallet-box { color: var(--gold); border: 1px solid var(--gold); padding: 5px 10px; border-radius: 8px; }

        .win-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .win-emoji { font-size: 120px; filter: drop-shadow(0 0 30px var(--gold)); }
        
        .game-area { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px; position: relative; max-width: 500px; margin: 0 auto; transform: rotateX(5deg); }
        .bg-timer { position: absolute; font-size: 120px; font-weight: 900; color: rgba(57, 255, 20, 0.08); top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 0; }

        /* 🔥 SYMMETRIC 7x7 TRACK LAYOUT 🔥 */
        .track-container { width: 100%; display: flex; flex-direction: column; background: var(--track-bg); border: 3px solid var(--gold); border-radius: 15px; overflow: hidden; z-index: 2; }
        .track-row { display: flex; width: 100%; height: 45px; }
        .track-middle { display: flex; width: 100%; height: 220px; }
        .track-col { display: flex; flex-direction: column; width: 14.28%; }
        
        .t-box { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 0.1px solid rgba(255,215,0,0.1); background: rgba(255,255,255,0.02); position: relative; }
        .active-glow { transform: scale(1.1); z-index: 10; background: white !important; box-shadow: 0 0 20px white; border-radius: 5px; }

        /* Betting Grid */
        .betting-center { width: 71.44%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; }
        .b-card { background: rgba(255,255,255,0.05); border-radius: 10px; display: flex; flex-direction: column; align-items: center; padding: 5px; border: 1.5px solid #333; position: relative; }
        .total-pool { position: absolute; top: 2px; right: 4px; font-size: 9px; color: #aaa; }
        .b-icon { font-size: 28px; margin-top: 5px; }
        .b-multi { font-size: 10px; background: var(--gold); color: black; padding: 1px 8px; border-radius: 10px; font-weight: 900; margin-top: 2px; }
        .my-bet-tag { position: absolute; bottom: -5px; background: var(--neon-blue); color: black; font-size: 9px; padding: 2px 5px; border-radius: 5px; display: none; }

        .footer-chips { height: 10vh; background: #000; border-top: 2px solid var(--gold); display: flex; justify-content: space-evenly; align-items: center; }
        .chip { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 2px dashed #fff; cursor: pointer; }
        .chip.selected { transform: scale(1.2); border: 2px solid #fff; box-shadow: 0 0 15px var(--gold); }
    </style>
</head>
<body onclick="initAudio()">
    <div class="header">
        <div class="logo">KALYAN VIP ZOO</div>
        <div class="live-status">● LIVE</div>
    </div>
    <div class="user-info-bar">
        <div class="wallet-box">💰 ₹<span id="wallet-bal">10,000</span></div>
        <div id="clock-display">00:00:00</div>
    </div>

    <div class="win-overlay" id="win-screen">
        <div class="win-emoji" id="win-icon">🦁</div>
        <div id="win-message" style="font-weight:900; font-size:25px; margin-top:10px;">WINNER</div>
    </div>

    <div class="game-area">
        <div class="bg-timer" id="timer-bg">15</div>
        <div class="track-container">
            <div class="track-row">
                <div class="t-box" id="t-0">🦜</div><div class="t-box" id="t-1">🐇</div><div class="t-box" id="t-2">🕊️</div>
                <div class="t-box" id="t-3" style="background:rgba(0,221,255,0.1)">🦈</div>
                <div class="t-box" id="t-4">🦚</div><div class="t-box" id="t-5">🐼</div><div class="t-box" id="t-6">🐒</div>
            </div>
            <div class="track-middle">
                <div class="track-col">
                    <div class="t-box" id="t-23">🦜</div><div class="t-box" id="t-22">🦅</div>
                    <div class="t-box" id="t-21" style="background:#400">🏺</div>
                    <div class="t-box" id="t-20">🐼</div><div class="t-box" id="t-19">🐒</div>
                </div>
                <div class="betting-center">
                    <div class="b-card" onclick="placeRealBet('🐒', this)"><div class="total-pool">₹<span>0</span></div><div class="b-icon">🐒</div><div class="b-multi">8x</div><div class="my-bet-tag">₹<span>0</span></div></div>
                    <div class="b-card" onclick="placeRealBet('🐼', this)"><div class="total-pool">₹<span>0</span></div><div class="b-icon">🐼</div><div class="b-multi">8x</div><div class="my-bet-tag">₹<span>0</span></div></div>
                    <div class="b-card" onclick="placeRealBet('🦚', this)"><div class="total-pool">₹<span>0</span></div><div class="b-icon">🦚</div><div class="b-multi">8x</div><div class="my-bet-tag">₹<span>0</span></div></div>
                    <div class="b-card" onclick="placeRealBet('🦁', this)"><div class="total-pool">₹<span>0</span></div><div class="b-icon">🦁</div><div class="b-multi">12x</div><div class="my-bet-tag">₹<span>0</span></div></div>
                    <div class="b-card" style="border-color:cyan" onclick="placeRealBet('🦈', this)"><div class="total-pool">₹<span>0</span></div><div class="b-icon">🦈</div><div class="b-multi">24x</div><div class="my-bet-tag">₹<span>0</span></div></div>
                    <div class="b-card" onclick="placeRealBet('🦅', this)"><div class="total-pool">₹<span>0</span></div><div class="b-icon">🦅</div><div class="b-multi">12x</div><div class="my-bet-tag">₹<span>0</span></div></div>
                    <div class="b-card" onclick="placeRealBet('🦜', this)"><div class="total-pool">₹<span>0</span></div><div class="b-icon">🦜</div><div class="b-multi">3x</div><div class="my-bet-tag">₹<span>0</span></div></div>
                    <div class="b-card" onclick="placeRealBet('🐇', this)"><div class="total-pool">₹<span>0</span></div><div class="b-icon">🐇</div><div class="b-multi">2x</div><div class="my-bet-tag">₹<span>0</span></div></div>
                    <div class="b-card" onclick="placeRealBet('🕊️', this)"><div class="total-pool">₹<span>0</span></div><div class="b-icon">🕊️</div><div class="b-multi">6x</div><div class="my-bet-tag">₹<span>0</span></div></div>
                </div>
                <div class="track-col">
                    <div class="t-box" id="t-7">🐒</div><div class="t-box" id="t-8">🐼</div>
                    <div class="t-box" id="t-9" style="background:#400">📦</div>
                    <div class="t-box" id="t-10">🦅</div><div class="t-box" id="t-11">🦁</div>
                </div>
            </div>
            <div class="track-row">
                <div class="t-box" id="t-18">🕊️</div><div class="t-box" id="t-17">🐇</div><div class="t-box" id="t-16">🦚</div>
                <div class="t-box" id="t-15" style="background:rgba(0,221,255,0.1)">🦈</div>
                <div class="t-box" id="t-14">🦅</div><div class="t-box" id="t-13">🦁</div><div class="t-box" id="t-12">🦜</div>
            </div>
        </div>
    </div>

    <div class="footer-chips">
        <div class="chip selected" style="background:#3498db" onclick="selectChip(10, this)">10</div>
        <div class="chip" style="background:#9b59b6" onclick="selectChip(50, this)">50</div>
        <div class="chip" style="background:#2ecc71" onclick="selectChip(100, this)">100</div>
        <div class="chip" style="background:#e74c3c" onclick="selectChip(500, this)">500</div>
    </div>

    <script>
        const FIREBASE_URL = "https://kalyan-casino-default-rtdb.firebaseio.com";
        let walletBalance = 10000; let canBet = true; let isSpinning = false; let currentPos = 0;
        let serverResultEmoji = '🐒'; let selectedChip = 10;

        // Sync Clock
        setInterval(() => { document.getElementById('clock-display').innerText = new Date().toLocaleTimeString(); }, 1000);

        function selectChip(v, el) { 
            selectedChip = v; 
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
        }

        async function placeRealBet(animal, el) {
            if(!canBet || walletBalance < selectedChip) return;
            walletBalance -= selectedChip;
            document.getElementById('wallet-bal').innerText = walletBalance.toLocaleString();
            let myBet = el.querySelector('.my-bet-tag');
            myBet.style.display = 'block';
            let span = myBet.querySelector('span');
            span.innerText = (parseInt(span.innerText) + selectedChip);
            // Firebase Update (Aapki index.js ke hisab se path)
            await fetch(`${FIREBASE_URL}/Game/ZooRoulette/Bets/player1/${animal}.json`, { method: 'PUT', body: span.innerText });
        }

        // Firebase Listener Loop
        setInterval(async () => {
            try {
                let res = await fetch(`${FIREBASE_URL}/Game/ZooRoulette/Status.json`);
                let data = await res.json();
                if(data.state === 'betting') {
                    if(isSpinning || winScreen.style.display === 'flex') resetBoard();
                    document.getElementById('timer-bg').innerText = data.timer;
                } else if(data.state === 'spinning' && !isSpinning) {
                    serverResultEmoji = data.winner;
                    startSpin();
                }
            } catch(e) {}
        }, 1000);

        function resetBoard() {
            isSpinning = false; canBet = true;
            document.getElementById('win-screen').style.display = 'none';
            document.querySelectorAll('.b-card').forEach(c => {
                c.classList.remove('winner-pop');
                c.querySelector('.my-bet-tag').style.display = 'none';
                c.querySelector('.my-bet-tag span').innerText = '0';
            });
        }

        function startSpin() {
            canBet = false; isSpinning = true;
            let speed = 40;
            let possible = [];
            // Winner dhoondho track par
            for(let i=0; i<24; i++) { if(document.getElementById('t-'+i).innerText === serverResultEmoji) possible.push(i); }
            let target = possible[Math.floor(Math.random()*possible.length)];

            function move() {
                if(!isSpinning) {
                    currentPos = target; 
                    showWinner(document.getElementById('t-'+target).innerText);
                    return;
                }
                document.querySelectorAll('.t-box').forEach(b => b.classList.remove('active-glow'));
                document.getElementById('t-'+currentPos).classList.add('active-glow');
                currentPos = (currentPos + 1) % 24;
                setTimeout(move, speed);
            }
            move();
            setTimeout(() => { isSpinning = false; }, 4000); // 4 sec spin
        }

        function showWinner(emoji) {
            document.getElementById('win-icon').innerText = emoji;
            document.getElementById('win-screen').style.display = 'flex';
        }

        function initAudio() { /* Sound code yahan dal sakte hain */ }
    </script>
</body>
</html>
