<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalyan VIP - Zoo Roulette (Dashboard Wallet)</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; user-select: none; }
        body { background: radial-gradient(circle at 50% 50%, #1a0f00 0%, #000 100%); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; border-bottom: 2px solid #ffd700; background: rgba(0,0,0,0.9); height: 7vh; }
        .logo { font-size: 18px; font-weight: 900; color: #ffd700; }
        .online-box { background: rgba(57, 255, 20, 0.2); border: 1.5px solid #39ff14; color: #39ff14; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 800; }

        /* Wallet Section */
        .sub-header { display: flex; justify-content: space-between; align-items: center; padding: 5px 15px; background: rgba(34, 34, 34, 0.9); font-size: 13px; border-bottom: 1px solid #444;}
        .wallet-box { color: #ffd700; font-weight: 800; }

        /* Game Status */
        .game-status-area { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 110px; position: relative; }
        #main-timer { font-size: 60px; font-weight: 900; color: #ffd700; text-shadow: 0 0 20px #ffae00; }
        #status-text { font-size: 14px; font-weight: 800; color: #fff; text-transform: uppercase; margin-top: -10px; }
        
        /* 🦁 Zoo Grid 🦅 */
        .zoo-grid { width: 100%; max-width: 480px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 10px; margin: 0 auto; }
        .animal-box { background: linear-gradient(145deg, #333, #111); border-radius: 12px; height: 95px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid #444; position: relative; cursor: pointer; transition: all 0.2s; }
        .animal-box.winning { border-color: #39ff14; box-shadow: 0 0 20px #39ff14; transform: scale(1.05); }
        .animal-icon { font-size: 35px; margin-bottom: 2px; }
        .multi-tag { font-size: 10px; background: #ffd700; color: #000; padding: 1px 6px; border-radius: 5px; font-weight: 900; }
        .pool-text { position: absolute; top: 3px; right: 5px; font-size: 9px; color: #888; font-weight: 700; }

        /* 🟢 My Bet Tag 🟢 */
        .my-bet-tag { position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); background: #00e5ff; color: #000; font-size: 10px; padding: 1px 8px; border-radius: 10px; font-weight: 900; display: none; z-index: 20; box-shadow: 0 0 5px #00e5ff; border: 1px solid #fff; }

        /* Chips Section */
        .footer-chips { height: 14vh; background: rgba(0,0,0,0.9); border-top: 2px solid #ffd700; display: flex; justify-content: space-evenly; align-items: center; padding-bottom: 5px; }
        .chip { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: white; cursor: pointer; border: 3px dashed rgba(255,255,255,0.4); }
        .chip.selected { transform: scale(1.15); border: 3px solid #fff; box-shadow: 0 0 15px #fff; }
        .c10 { background: #3498db; } .c50 { background: #9b59b6; } .c100 { background: #2ecc71; } .c500 { background: #e74c3c; } .c1000 { background: #f1c40f; color: #000; }

        .placed-chip { position: fixed; width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid white; pointer-events: none; z-index: 100; font-size: 8px; font-weight: 900; color: white; display: flex; align-items: center; justify-content: center; transition: all 0.4s ease-out; }

        .alert-box { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: #e74c3c; color: white; padding: 10px 20px; border-radius: 8px; font-weight: 900; z-index: 9999; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body onclick="initAudio()">
    <div class="alert-box" id="low-bal-alert">⚠️ Low Balance!</div>

    <div class="header">
        <div class="logo">KALYAN ROYAL - ZOO</div>
        <div class="online-box">● <span id="online-count">500</span> Online</div>
    </div>

    <div class="sub-header">
        <div class="wallet-box">💰 ₹<span id="wallet-bal">0.00</span></div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="game-status-area">
        <div id="main-timer">...</div>
        <div id="status-text">CONNECTING...</div>
    </div>

    <div class="zoo-grid" id="zoo-container"></div>

    <div class="footer-chips">
        <div class="chip selected c10" onclick="selectChip(10, this, '#3498db')">10</div>
        <div class="chip c50" onclick="selectChip(50, this, '#9b59b6')">50</div>
        <div class="chip c100" onclick="selectChip(100, this, '#2ecc71')">100</div>
        <div class="chip c500" onclick="selectChip(500, this, '#e74c3c')">500</div>
        <div class="chip c1000" onclick="selectChip(1000, this, '#f1c40f')">1K</div>
    </div>

    <script>
        const FIREBASE_URL = "https://kalyan-casino-default-rtdb.firebaseio.com";
        const USER_ID = "player1"; // Aapke hisaab se ise change kar lijiyega jo aapka login function id dega
        
        let walletBalance = 0.00;
        let selectedChipVal = 10;
        let selectedChipColor = '#3498db';
        let canBet = false;
        let userBets = {};

        const zooData = [
            {id:'🐒', m:8}, {id:'🐼', m:8}, {id:'🦚', m:8}, {id:'🦁', m:12},
            {id:'🦅', m:12}, {id:'🦈', m:24}, {id:'🕊️', m:6}, {id:'🐇', m:2},
            {id:'🦜', m:3}, {id:'📦', m:0}, {id:'🏺', m:0}
        ];

        const container = document.getElementById('zoo-container');
        zooData.forEach(item => {
            const div = document.createElement('div');
            div.className = 'animal-box';
            div.id = `box-${item.id}`;
            div.onclick = () => placeBet(div, item.id, selectedChipVal, selectedChipColor, true);
            div.innerHTML = `
                <div class="pool-text">₹<span>0</span></div>
                <div class="animal-icon">${item.id}</div>
                <div class="multi-tag">${item.m}x</div>
                <div class="my-bet-tag">₹<span>0</span></div>
            `;
            container.appendChild(div);
        });

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function initAudio() { if(audioCtx.state === 'suspended') audioCtx.resume(); }

        function playCoinSound() {
            if(audioCtx.state === 'suspended') return;
            const n = audioCtx.currentTime;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = 'sine'; o.frequency.setValueAtTime(3000, n);
            o.frequency.exponentialRampToValueAtTime(800, n + 0.1);
            g.gain.setValueAtTime(0.1, n); g.gain.exponentialRampToValueAtTime(0.01, n + 0.1);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(n + 0.1);
        }

        // 🟢 DASHBOARD WALLET REAL-TIME SYNC 🟢
        async function syncDashboardWallet() {
            try {
                let res = await fetch(`${FIREBASE_URL}/Users/${USER_ID}/wallet.json`);
                let balance = await res.json();
                if (balance !== null) {
                    walletBalance = parseFloat(balance);
                    document.getElementById('wallet-bal').innerText = walletBalance.toLocaleString(undefined, {
                        minimumFractionDigits: 2, maximumFractionDigits: 2
                    });
                }
            } catch (e) { console.error("Wallet Sync Error:", e); }
        }
        setInterval(syncDashboardWallet, 2500);

        // 🚀 GAME SERVER SYNC 🚀
        setInterval(async () => {
            try {
                let res = await fetch(`${FIREBASE_URL}/Game/ZooRoulette/Status.json`);
                let data = await res.json();
                
                if (data.state === 'betting') {
                    document.getElementById('main-timer').innerText = data.timer;
                    document.getElementById('status-text').innerText = "BETS OPEN";
                    canBet = true;
                    if (data.timer === 15) resetUI();
                } else if (data.state === 'spinning' || data.state === 'result') {
                    document.getElementById('main-timer').innerText = "!!!";
                    document.getElementById('status-text').innerText = "SPINNING...";
                    canBet = false;
                    highlightWinner(data.winner);
                }
            } catch(e) {}
        }, 1000);

        function highlightWinner(winnerId) {
            document.querySelectorAll('.animal-box').forEach(b => b.classList.remove('winning'));
            const winBox = document.getElementById(`box-${winnerId}`);
            if (winBox) winBox.classList.add('winning');
        }

        function resetUI() {
            document.querySelectorAll('.animal-box').forEach(b => b.classList.remove('winning'));
            document.querySelectorAll('.pool-text span').forEach(s => s.innerText = '0');
            document.querySelectorAll('.my-bet-tag').forEach(t => { t.style.display = 'none'; t.querySelector('span').innerText = '0'; });
            document.querySelectorAll('.placed-chip').forEach(c => c.remove());
            userBets = {};
        }

        // 💸 BET PLACE LOGIC 💸
        async function placeBet(el, targetId, val, color, isUser) {
            if (!canBet) return;
            
            if (isUser) {
                if(walletBalance < val) {
                    const alertBox = document.getElementById('low-bal-alert');
                    alertBox.style.display = 'block';
                    setTimeout(() => alertBox.style.display = 'none', 2000);
                    return; 
                }
                
                // Paisa katega aur local UI update hoga
                walletBalance -= val;
                document.getElementById('wallet-bal').innerText = walletBalance.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
                
                userBets[targetId] = (userBets[targetId] || 0) + val;
                let myTag = el.querySelector('.my-bet-tag');
                myTag.style.display = 'block';
                let current = parseInt(myTag.querySelector('span').innerText) || 0;
                myTag.querySelector('span').innerText = (current + val);
                
                try {
                    // Update Game Bets Node
                    await fetch(`${FIREBASE_URL}/Game/ZooRoulette/Bets/${USER_ID}/${targetId}.json`, { 
                        method: 'PUT', body: (userBets[targetId]).toString() 
                    });
                    // Original Dashboard Wallet minus karna database mein
                    await fetch(`${FIREBASE_URL}/Users/${USER_ID}/wallet.json`, { 
                        method: 'PUT', body: walletBalance.toString() 
                    });
                } catch(e) {}
            }

            // UI Coin Animation
            const chip = document.createElement('div');
            chip.className = 'placed-chip';
            chip.style.backgroundColor = color;
            chip.innerText = val >= 1000 ? '1K' : val;
            let sX = window.innerWidth/2, sY = window.innerHeight;
            chip.style.left = sX + 'px'; chip.style.top = sY + 'px';
            document.body.appendChild(chip);
            
            let dest = el.getBoundingClientRect();
            setTimeout(() => {
                chip.style.left = (dest.left + dest.width/2 + (Math.random()*30-15)) + 'px';
                chip.style.top = (dest.top + dest.height/2 + (Math.random()*30-15)) + 'px';
                playCoinSound();
            }, 50);

            let pool = el.querySelector('.pool-text span');
            pool.innerText = (parseInt(pool.innerText) + val);
        }

        function selectChip(v, el, color) { 
            selectedChipVal = v; selectedChipColor = color;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected')); 
            el.classList.add('selected'); 
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        syncDashboardWallet(); // Page reload par directly balance lana
    </script>
</body>
</html>
