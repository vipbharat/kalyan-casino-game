<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7 Up Down - Kalyan Casino Admin Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        :root { --gold: #ffcc00; --blue: #00e5ff; --pink: #ff007f; --green: #00ff88; }
        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; color:white; font-family: 'Segoe UI', sans-serif; perspective: 1000px; background: linear-gradient(45deg, #1a0033, #001f3f, #3a0028, #002b2b); background-size: 400% 400%; animation: gradientBG 12s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .top-status { width: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border-bottom: 2px solid var(--gold); padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; box-sizing: border-box; }
        .total-money { font-size: 1.1rem; font-weight: bold; color: #fff; }
        .total-money span { color: var(--gold); font-size: 1.3rem; font-weight: 900; text-shadow: 0 0 10px var(--gold); }
        .hist-container { display: flex; gap: 5px; }
        .h-ank { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; border: 1px solid rgba(255,255,255,0.8); }
        .game-area { height: calc(100% - 200px); display:flex; flex-direction:column; align-items:center; justify-content:space-evenly; position: relative; }
        .table-center { position: relative; width: 150px; height: 150px; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 20px; margin-top: 30px; }
        .center-timer { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); font-size: 2.2rem; color: #fff; text-shadow: 0 0 20px #ff007f; font-weight: 900; z-index: 60; background: rgba(0,0,0,0.6); padding: 2px 20px; border-radius: 12px; border: 2px solid #ff007f; }
        .casino-cup { position: absolute; width: 130px; height: 120px; background: linear-gradient(to right, #4a00e0, #8e2de2, #4a00e0); border-bottom: 4px solid var(--gold); border-radius: 10px 10px 15px 15px; bottom: 10px; z-index: 50; transition: transform 0.8s; transform: translateY(-160px); }
        .casino-cup::before { content: ''; position: absolute; top: -15px; left: 0; width: 100%; height: 30px; background: #2a006e; border-radius: 50%; border: 2px solid #b266ff; }
        .dice-wrapper { display: flex; gap: 15px; z-index: 10; perspective: 600px; }
        .scene { width: 40px; height: 40px; }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s; }
        .face { position: absolute; width: 40px; height: 40px; background: #fff; border-radius: 5px; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); padding: 4px; border: 1px solid #ddd; }
        .pip { width: 8px; height: 8px; background: #111; border-radius: 50%; margin: auto; }
        .front { transform: rotateY(0deg) translateZ(20px); } .right { transform: rotateY(90deg) translateZ(20px); }
        .back { transform: rotateY(180deg) translateZ(20px); } .left { transform: rotateY(-90deg) translateZ(20px); }
        .top { transform: rotateX(90deg) translateZ(20px); } .bottom { transform: rotateX(-90deg) translateZ(20px); }
        .show-1 { transform: translateZ(-20px) rotateY(0deg); } .show-2 { transform: translateZ(-20px) rotateY(-90deg); }
        .show-3 { transform: translateZ(-20px) rotateY(-180deg); } .show-4 { transform: translateZ(-20px) rotateY(90deg); }
        .show-5 { transform: translateZ(-20px) rotateX(-90deg); } .show-6 { transform: translateZ(-20px) rotateX(90deg); }
        .rolling-dice { animation: roll3D 0.4s linear infinite; }
        @keyframes roll3D { 0% { transform: translateZ(-20px) rotateX(0deg) rotateY(0deg); } 100% { transform: translateZ(-20px) rotateX(360deg) rotateY(360deg); } }
        .shake-cup { animation: shakeAction 0.15s infinite; }
        @keyframes shakeAction { 0%{transform:translateY(0) rotate(0)} 25%{transform:translateY(-5px) rotate(5deg)} 75%{transform:translateY(-5px) rotate(-5deg)} 100%{transform:translateY(0) rotate(0)} }
        
        .board { display:flex; gap:10px; width:98%; max-width: 500px; }
        .bet-col { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .box { height:130px; border-radius:15px; border:2px solid; background:rgba(0,0,0,0.4); display:flex; flex-direction:column; align-items:center; padding-top: 5px; cursor:pointer; position: relative; transition: 0.3s; }
        #low { border-color: var(--blue); } #seven { border-color: var(--gold); } #high { border-color: var(--pink); }
        .box-num { font-size: 1.6rem; font-weight: 900; line-height: 1; text-shadow: 0 0 15px currentColor; }
        .box-title { font-size: 0.8rem; font-weight: bold; }
        .payout-rate { font-size: 0.75rem; background: rgba(255,255,255,0.1); padding: 3px 10px; border-radius: 5px; margin-top: 3px; }
        .box b { position:absolute; bottom:5px; font-size:1.1rem; background: rgba(0,0,0,0.8); padding: 4px 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); pointer-events: none; }
        .win-glow { transform:scale(1.08); background: rgba(255,255,255,0.2) !important; box-shadow: 0 0 40px currentColor !important; }
        
        .my-bet-text { font-size: 0.85rem; color: #fff; background: rgba(0,0,0,0.7); padding: 6px; border-radius: 8px; text-align: center; border: 1px dashed var(--green); font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        
        .chip-visual { pointer-events: none; position: absolute; width: 20px; height: 20px; border-radius: 50%; border: 2px dashed rgba(255,255,255,0.9); z-index: 15; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 900; color: white; transition: 0.4s; }
        
        .chips-bar { display:flex; gap:8px; margin-top: 10px; }
        .chip-btn { width:45px; height:45px; border-radius:50%; border:2px dashed #fff; display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:bold; cursor:pointer; }
        .chip-btn.active { transform:scale(1.2); border-style:solid; box-shadow: 0 0 15px #fff; }
        .c10 { background: linear-gradient(135deg, #1e3c72, #2a5298, #00d2ff); } .c100 { background: linear-gradient(135deg, #e65c00, #F9D423); } .c500 { background: linear-gradient(135deg, #1D976C, #93F9B9); color: black; } .c1k { background: linear-gradient(135deg, #cb2d3e, #ef473a); } .c5k { background: linear-gradient(135deg, #11998e, #38ef7d); color: black; }
        .footer { height: auto; min-height: 85px; background:rgba(0,0,0,0.8); border-top:2px solid var(--green); display:grid; grid-template-columns: repeat(4, 1fr); gap:6px; padding:6px; box-sizing: border-box; }
        .p-card { background:linear-gradient(to bottom, #111, #222); padding:4px; border-radius:6px; text-align:center; border: 1px solid rgba(255,255,255,0.2); font-size:0.6rem; height: 35px; }
        .win-popup { pointer-events: none; position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 2.5rem; color: #00ff88; font-weight: 900; text-shadow: 0 0 20px #00ff88; z-index: 200; opacity: 0; transition: 0.5s; }
        .win-popup.show { opacity: 1; transform: translate(-50%, -80%); }
    </style>
</head>
<body onload="initGame()">
    <div class="bg"></div>
    <div class="top-status">
        <div class="total-money">Wallet: <span id="user-balance">₹0.00</span></div>
        <div class="hist-container" id="hist-row"></div>
    </div>
    <div id="win-popup" class="win-popup">+₹0</div>
    <div class="game-area">
        <div class="table-center">
            <div class="center-timer" id="timer">15s</div>
            <div class="casino-cup" id="cup"></div>
            <div class="dice-wrapper">
                <div class="scene"><div class="cube show-3" id="d1"></div></div>
                <div class="scene"><div class="cube show-4" id="d2"></div></div>
            </div>
        </div>
        <div class="board">
            <div class="bet-col">
                <div class="box" id="low" onclick="userBet('low', event)" style="color:var(--blue)">
                    <div class="box-num">2 - 6</div><div class="box-title">DOWN</div><div class="payout-rate">1:1</div><b id="a-low">₹0</b>
                </div>
                <div class="my-bet-text" id="my-low">My Bet: ₹0</div>
            </div>
            
            <div class="bet-col">
                <div class="box" id="seven" onclick="userBet('seven', event)" style="color:var(--gold)">
                    <div class="box-num">7</div><div class="box-title">LUCKY 7</div><div class="payout-rate">1:5</div><b id="a-seven">₹0</b>
                </div>
                <div class="my-bet-text" id="my-seven">My Bet: ₹0</div>
            </div>
            
            <div class="bet-col">
                <div class="box" id="high" onclick="userBet('high', event)" style="color:var(--pink)">
                    <div class="box-num">8 - 12</div><div class="box-title">UP</div><div class="payout-rate">1:1</div><b id="a-high">₹0</b>
                </div>
                <div class="my-bet-text" id="my-high">My Bet: ₹0</div>
            </div>
        </div>
        <div class="chips-bar">
            <div class="chip-btn c10" onclick="sel(10, this)">10</div><div class="chip-btn c100" onclick="sel(100, this)">100</div>
            <div class="chip-btn c500" onclick="sel(500, this)">500</div><div class="chip-btn c1k active" onclick="sel(1000, this)">1K</div>
            <div class="chip-btn c5k" onclick="sel(5000, this)">5K</div>
        </div>
    </div>
    <div class="footer" id="plist"></div>

<script>
    // Asli API key daal di gayi hai
    const firebaseConfig = {
        apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", 
        databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com",
        projectId: "kalyan-casino"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let serverTimeOffset = 0; 
    db.ref('.info/serverTimeOffset').on('value', snap => {
        serverTimeOffset = snap.val() || 0;
    });

    const pips = { 1:[5], 2:[3,7], 3:[3,5,7], 4:[1,3,7,9], 5:[1,3,5,7,9], 6:[1,3,4,6,7,9] };
    const faceOrder = ['front', 'right', 'back', 'left', 'top', 'bottom'];
    const chipColors = { 10:'#00d2ff', 100:'#e65c00', 500:'#1D976C', 1000:'#ef473a', 5000:'#38ef7d' };

    // WALLET FIX: Dashboard ki tarah Deposit, Winning, Bonus add kiye
    let totalBal = 0, depBal = 0, winBal = 0, bonBal = 0; 
    let userID = localStorage.getItem('userPhone') || "user_1"; 
    
    let players = [], historyAnk = [];
    let myBets = { low:0, seven:0, high:0 }, botTotal = { low:0, seven:0, high:0 }, globalRealBets = { low:0, seven:0, high:0 };
    let botTarget = { low:0, seven:0, high:0 }; 
    let currentChip = 1000, isRolling = false, currentCycleId = -1;
    let botSimulationInterval;

    function generateBot() {
        // High roller balance: 8 Lakh se 20 Lakh tak
        let b = 800000 + Math.floor(Math.random() * 1200000);
        return { name: "ID_"+Math.floor(1000+Math.random()*9000), bal: b, startBal: b };
    }

    // WALLET FIX: Dashboard wala SyncWallet Function
    function syncWallet() {
        db.ref(`users/${userID}`).on('value', (snap) => {
            const data = snap.val() || {};
            depBal = parseFloat(data.balance || 0);
            winBal = parseFloat(data.winning_balance || 0);
            bonBal = parseFloat(data.bonus_balance || 0);
            
            totalBal = depBal + winBal + bonBal; 
            document.getElementById('user-balance').innerText = "₹" + totalBal.toFixed(2);
        });
    }

    function initGame() {
        syncWallet();
        build3DDice('d1'); 
        build3DDice('d2');
        
        for(let i=0; i<8; i++) { players.push(generateBot()); }
        renderFooter();

        setInterval(() => {
            let exactGlobalTime = Date.now() + serverTimeOffset; 
            let cycleId = Math.floor(exactGlobalTime / 20000);
            let phase = exactGlobalTime % 20000;

            if(cycleId !== currentCycleId) {
                currentCycleId = cycleId; 
                isRolling = false; 
                resetTable();
                
                // Bot simulation ka naya interval set karna
                clearInterval(botSimulationInterval);
                botSimulationInterval = setInterval(() => {
                    if (!isRolling) simulateBots();
                }, 400); // 400ms delay, bahut tez bets aayengi

                db.ref(`game_7updown/rounds/${cycleId}/bets`).on('value', snap => {
                    globalRealBets = snap.val() || { low:0, seven:0, high:0 };
                });
            }

            if(phase < 15000) {
                let left = Math.ceil((15000 - phase) / 1000);
                document.getElementById('timer').innerText = left + "s";
                
                if(phase % 500 < 100) { renderFooter(); }

            } else if(!isRolling) {
                isRolling = true;
                clearInterval(botSimulationInterval); // Timer khatam toh bot band
                calculateAndRoll(cycleId);
            }
        }, 100);
    }

    function calculateAndRoll(cycleId) {
        // 100% Profit Logic (Bots Ignored)
        let realLowBet = Math.max(myBets.low, (globalRealBets.low || 0));
        let realSevenBet = Math.max(myBets.seven, (globalRealBets.seven || 0));
        let realHighBet = Math.max(myBets.high, (globalRealBets.high || 0));

        let liability = [
            { id: 'low', payout: realLowBet * 2 },
            { id: 'seven', payout: realSevenBet * 6 },
            { id: 'high', payout: realHighBet * 2 }
        ];

        liability.sort((a, b) => a.payout - b.payout);
        let winSide = liability[0].id; 

        let v1, v2, total;
        if (winSide === 'low') {
            total = Math.floor(Math.random() * 5) + 2; 
            v1 = Math.floor(Math.random() * (total - 1)) + 1; v2 = total - v1;
        } else if (winSide === 'high') {
            total = Math.floor(Math.random() * 5) + 8; 
            v1 = Math.floor(Math.random() * 5) + (total > 10 ? 5 : 2); v2 = total - v1;
            if(v1 > 6 || v2 > 6 || v1 < 1 || v2 < 1) { v1 = 6; v2 = total - 6; }
        } else {
            let pairs = [[1,6],[2,5],[3,4],[4,3],[5,2],[6,1]];
            let p = pairs[Math.floor(Math.random()*pairs.length)];
            v1 = p[0]; v2 = p[1];
        }

        db.ref(`game_7updown/rounds/${cycleId}/result`).set({ winSide: winSide, v1: v1, v2: v2 });
        startRoll(v1, v2, winSide);
    }

    function startRoll(v1, v2, winId) {
        document.getElementById('timer').innerText = "ROLL";
        const cup = document.getElementById('cup'), d1 = document.getElementById('d1'), d2 = document.getElementById('d2');
        cup.style.transform = 'translateY(0)';
        setTimeout(() => {
            cup.classList.add('shake-cup'); d1.className = 'cube rolling-dice'; d2.className = 'cube rolling-dice';
            setTimeout(() => {
                cup.classList.remove('shake-cup'); cup.style.transform = 'translateY(-160px)';
                d1.className = 'cube show-' + v1; d2.className = 'cube show-' + v2;
                document.getElementById(winId).classList.add('win-glow');
                updateHistory(v1 + v2);
                checkPayout(winId);
                updateBotWallets(); 
            }, 2500);
        }, 500);
    }

    // WALLET FIX: Bet katega Dashboard ke Deposit Balance se
    function userBet(side, e) {
        if(isRolling) return;
        if(totalBal < currentChip) { alert("Balance Kam hai!"); return; }
        
        // Paisa direct database ke deposit(balance) me se minus hoga
        db.ref(`users/${userID}/balance`).set(depBal - currentChip);
        
        myBets[side] += currentChip;
        document.getElementById('a-'+side).innerText = "₹" + (myBets[side] + botTotal[side]).toLocaleString();
        document.getElementById('my-'+side).innerText = "My Bet: ₹" + myBets[side].toLocaleString();
        
        spawnChip(side, currentChip, false, e.clientX, e.clientY);
        
        db.ref(`game_7updown/rounds/${currentCycleId}/bets/${side}`).set(firebase.database.ServerValue.increment(currentChip));
    }

    // WALLET FIX: Jeetne par Dashboard ke Winning Balance mein paisa jayega
    function checkPayout(winId) {
        if(myBets[winId] > 0) {
            let winAmt = (winId === 'seven') ? myBets[winId] * 6 : myBets[winId] * 2;
            
            // Paisa direct database ke winning_balance mein plus hoga
            db.ref(`users/${userID}/winning_balance`).set(winBal + winAmt);
            
            let p = document.getElementById('win-popup'); p.innerText = "+₹"+winAmt.toLocaleString(); p.classList.add('show');
            setTimeout(() => p.classList.remove('show'), 2000);
        }
    }

    function build3DDice(id) {
        const cube = document.getElementById(id); cube.innerHTML = '';
        for(let i=1; i<=6; i++) {
            let face = document.createElement('div'); face.className = `face ${faceOrder[i-1]}`;
            for(let j=1; j<=9; j++) {
                let slot = document.createElement('div'); if(pips[i].includes(j)) slot.innerHTML = '<div class="pip"></div>';
                face.appendChild(slot);
            }
            cube.appendChild(face);
        }
    }

    function sel(v, el) { currentChip = v; document.querySelectorAll('.chip-btn').forEach(c => c.classList.remove('active')); el.classList.add('active'); }
    function renderFooter() { document.getElementById('plist').innerHTML = players.map(p => `<div class="p-card"><div style="color:var(--gold)">${p.name}</div><b>₹${Math.floor(p.bal/1000).toLocaleString()}K</b></div>`).join(''); }
    
    function updateBotWallets() { 
        players.forEach((p, index) => { 
            p.bal += (Math.random() > 0.5 ? 20000 : -5000); 
            if(Math.abs(p.bal - p.startBal) >= 500000) { players[index] = generateBot(); }
        }); 
        renderFooter(); 
    }
    
    function updateHistory(v) {
        let col = v < 7 ? 'var(--blue)' : (v > 7 ? 'var(--pink)' : 'var(--gold)');
        historyAnk.unshift({v, col}); if(historyAnk.length > 8) historyAnk.pop();
        document.getElementById('hist-row').innerHTML = historyAnk.map(h => `<div class="h-ank" style="background:${h.col}">${h.v}</div>`).join('');
    }

    function spawnChip(side, val, isBot, x, y) {
        let chip = document.createElement('div'); chip.className = 'chip-visual';
        chip.style.backgroundColor = chipColors[val]; chip.innerText = val >= 1000 ? (val/1000)+'K' : val;
        let rect = document.getElementById(side).getBoundingClientRect();
        chip.style.left = (isBot ? Math.random()*window.innerWidth : x) + 'px';
        chip.style.top = (isBot ? window.innerHeight : y) + 'px';
        document.body.appendChild(chip);
        setTimeout(() => {
            chip.style.left = (rect.left + 20 + Math.random()*(rect.width-40)) + 'px';
            chip.style.top = (rect.top + 40 + Math.random()*(rect.height-80)) + 'px';
        }, 50);
    }
    
    function resetTable() {
        document.querySelectorAll('.chip-visual').forEach(c => c.remove());
        document.querySelectorAll('.box').forEach(b => b.classList.remove('win-glow'));
        
        myBets = {low:0,seven:0,high:0}; 
        botTotal = {low:0,seven:0,high:0};
        
        // High roller bot targets (Bade targets taaki jyada bets aayein)
        botTarget = {
            low: Math.floor(Math.random() * 51) * 10000 + 300000, 
            high: Math.floor(Math.random() * 51) * 10000 + 300000,
            seven: Math.floor(Math.random() * 11) * 10000 + 50000 
        };

        document.querySelectorAll('.box b').forEach(b => b.innerText = "₹0");
        document.getElementById('my-low').innerText = "My Bet: ₹0";
        document.getElementById('my-seven').innerText = "My Bet: ₹0";
        document.getElementById('my-high').innerText = "My Bet: ₹0";
    }
    
    function simulateBots() {
        let sides = [];
        if (botTotal.low < botTarget.low) sides.push('low');
        if (botTotal.high < botTarget.high) sides.push('high');
        if (botTotal.seven < botTarget.seven) sides.push('seven');
        
        if (sides.length === 0) return; 

        // Ek baar mein 1 se 3 jagah bet
        let numBets = Math.floor(Math.random() * 3) + 1;
        
        for (let i = 0; i < numBets; i++) {
            let s = sides[Math.floor(Math.random() * sides.length)];
            
            // High Roller Chips: 1K, 5K
            let amt = [1000, 5000][Math.floor(Math.random() * 2)];
            
            if (botTotal[s] + amt > botTarget[s]) {
                amt = botTarget[s] - botTotal[s];
            }
            
            if (amt > 0) { botBet(s, amt); }
        }
    }

    function botBet(side, val) {
        botTotal[side] += val;
        document.getElementById('a-'+side).innerText = "₹" + (myBets[side] + botTotal[side]).toLocaleString();
        spawnChip(side, val, true);
        let randBot = players[Math.floor(Math.random()*players.length)];
        randBot.bal -= val; 
    }
</script>
</body>
</html>
