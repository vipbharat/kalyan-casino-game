<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7 Up Down - Kalyan VIP Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        :root { --gold: #ffcc00; --blue: #00e5ff; --pink: #ff007f; --green: #00ff88; }
        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; color:white; font-family: 'Segoe UI', sans-serif; perspective: 1000px; background: linear-gradient(45deg, #1a0033, #001f3f, #3a0028, #002b2b); background-size: 400% 400%; animation: gradientBG 12s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .top-status { width: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border-bottom: 2px solid var(--gold); padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; box-sizing: border-box; }
        .total-money { font-size: 1.1rem; font-weight: bold; color: #fff; }
        .total-money span { color: var(--gold); font-size: 1.3rem; font-weight: 900; text-shadow: 0 0 10px var(--gold); }
        
        .hist-container { display: flex; gap: 5px; }
        .h-ank { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 900; border: 1px solid rgba(255,255,255,0.8); text-shadow: 1px 1px 2px #000;}
        
        .game-area { height: calc(100% - 200px); display:flex; flex-direction:column; align-items:center; justify-content:space-evenly; position: relative; }
        .table-center { position: relative; width: 150px; height: 150px; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 20px; margin-top: 30px; }
        .center-timer { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); font-size: 2.2rem; color: #fff; text-shadow: 0 0 20px #ff007f; font-weight: 900; z-index: 60; background: rgba(0,0,0,0.6); padding: 2px 20px; border-radius: 12px; border: 2px solid #ff007f; }
        .casino-cup { position: absolute; width: 130px; height: 120px; background: linear-gradient(to right, #4a00e0, #8e2de2, #4a00e0); border-bottom: 4px solid var(--gold); border-radius: 10px 10px 15px 15px; bottom: 10px; z-index: 50; transition: transform 0.8s; transform: translateY(-160px); }
        .casino-cup::before { content: ''; position: absolute; top: -15px; left: 0; width: 100%; height: 30px; background: #2a006e; border-radius: 50%; border: 2px solid #b266ff; }
        
        /* 3D Dice */
        .dice-wrapper { display: flex; gap: 15px; z-index: 10; perspective: 600px; }
        .scene { width: 40px; height: 40px; }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s; }
        .face { position: absolute; width: 40px; height: 40px; background: #fff; border-radius: 5px; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); padding: 4px; border: 1px solid #ddd; }
        .pip { width: 8px; height: 8px; background: #111; border-radius: 50%; margin: auto; }
        .front { transform: rotateY(0deg) translateZ(20px); } .right { transform: rotateY(90deg) translateZ(20px); }
        .back { transform: rotateY(180deg) translateZ(20px); } .left { transform: rotateY(-90deg) translateZ(20px); }
        .top { transform: rotateX(90deg) translateZ(20px); } .bottom { transform: rotateX(-90deg) translateZ(20px); }
        .show-1 { transform: translateZ(-20px) rotateY(0deg); } .show-2 { transform: translateZ(-20px) rotateY(-90deg); }
        .show-3 { transform: translateZ(-20px) rotateY(-180deg); } .show-4 { transform: translateZ(-20px) rotateY(90deg); }
        .show-5 { transform: translateZ(-20px) rotateX(-90deg); } .show-6 { transform: translateZ(-20px) rotateX(90deg); }
        .rolling-dice { animation: roll3D 0.4s linear infinite; }
        @keyframes roll3D { 0% { transform: translateZ(-20px) rotateX(0deg) rotateY(0deg); } 100% { transform: translateZ(-20px) rotateX(360deg) rotateY(360deg); } }
        .shake-cup { animation: shakeAction 0.15s infinite; }
        @keyframes shakeAction { 0%{transform:translateY(0) rotate(0)} 25%{transform:translateY(-5px) rotate(5deg)} 75%{transform:translateY(-5px) rotate(-5deg)} 100%{transform:translateY(0) rotate(0)} }
        
        .board { display:flex; gap:10px; width:98%; max-width: 500px; }
        .bet-col { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .box { height:130px; border-radius:15px; border:2px solid; background:rgba(0,0,0,0.4); display:flex; flex-direction:column; align-items:center; padding-top: 5px; cursor:pointer; position: relative; transition: 0.3s; }
        #low { border-color: var(--blue); } #tie { border-color: var(--gold); } #high { border-color: var(--pink); }
        .box-num { font-size: 1.6rem; font-weight: 900; line-height: 1; text-shadow: 0 0 15px currentColor; }
        .box-title { font-size: 0.8rem; font-weight: bold; }
        .payout-rate { font-size: 0.75rem; background: rgba(255,255,255,0.1); padding: 3px 10px; border-radius: 5px; margin-top: 3px; }
        .box b { position:absolute; bottom:5px; font-size:1.1rem; background: rgba(0,0,0,0.8); padding: 4px 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); pointer-events: none; }
        .win-glow { transform:scale(1.08); background: rgba(255,255,255,0.2) !important; box-shadow: 0 0 40px currentColor !important; z-index: 20;}
        
        .my-bet-text { font-size: 0.85rem; color: #fff; background: rgba(0,0,0,0.7); padding: 6px; border-radius: 8px; text-align: center; border: 1px dashed var(--green); font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        
        .chip-visual { pointer-events: none; position: absolute; width: 22px; height: 22px; border-radius: 50%; border: 2.5px dashed rgba(255,255,255,0.8); z-index: 15; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 900; color: white; transition: 0.4s ease-out; box-shadow: 2px 2px 5px rgba(0,0,0,0.8);}
        
        .chips-bar { display:flex; gap:8px; margin-top: 10px; }
        .chip-btn { width:45px; height:45px; border-radius:50%; border:2px dashed #fff; display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:bold; cursor:pointer; }
        .chip-btn.active { transform:scale(1.2); border-style:solid; box-shadow: 0 0 15px #fff; }
        .c10 { background: linear-gradient(135deg, #1e3c72, #2a5298); } .c100 { background: linear-gradient(135deg, #e65c00, #F9D423); } .c500 { background: linear-gradient(135deg, #1D976C, #93F9B9); color: black; } .c1k { background: linear-gradient(135deg, #cb2d3e, #ef473a); } .c5k { background: linear-gradient(135deg, #11998e, #38ef7d); color: black; }
        
        .footer { height: auto; min-height: 85px; background:rgba(0,0,0,0.8); border-top:2px solid var(--green); display:grid; grid-template-columns: repeat(4, 1fr); gap:6px; padding:6px; box-sizing: border-box; }
        .p-card { background:linear-gradient(to bottom, #111, #222); padding:4px; border-radius:6px; text-align:center; border: 1px solid rgba(255,255,255,0.2); font-size:0.6rem; height: 35px; }
        .win-popup { pointer-events: none; position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 2.5rem; color: #00ff88; font-weight: 900; text-shadow: 0 0 20px #00ff88; z-index: 200; opacity: 0; transition: 0.5s; }
        .win-popup.show { opacity: 1; transform: translate(-50%, -80%); }
    </style>
</head>
<body onload="initGame()">
    <div class="top-status">
        <div class="total-money">💰 <span id="user-balance">₹0.00</span></div>
        <div class="hist-container" id="hist-row"></div>
    </div>
    <div id="win-popup" class="win-popup">+₹0</div>
    <div class="game-area">
        <div class="table-center">
            <div class="center-timer" id="timer">15s</div>
            <div class="casino-cup" id="cup"></div>
            <div class="dice-wrapper">
                <div class="scene"><div class="cube show-3" id="d1"></div></div>
                <div class="scene"><div class="cube show-4" id="d2"></div></div>
            </div>
        </div>
        <div class="board">
            <div class="bet-col">
                <div class="box" id="low" onclick="userBet('low', event)" style="color:var(--blue)">
                    <div class="box-num">2 - 6</div><div class="box-title">DOWN</div><div class="payout-rate">1:1</div><b id="a-low">₹0</b>
                </div>
                <div class="my-bet-text" id="my-low">My Bet: ₹0</div>
            </div>
            
            <div class="bet-col">
                <div class="box" id="tie" onclick="userBet('tie', event)" style="color:var(--gold)">
                    <div class="box-num">7</div><div class="box-title">TIE (LUCKY)</div><div class="payout-rate">1:4</div><b id="a-tie">₹0</b>
                </div>
                <div class="my-bet-text" id="my-tie">My Bet: ₹0</div>
            </div>
            
            <div class="bet-col">
                <div class="box" id="high" onclick="userBet('high', event)" style="color:var(--pink)">
                    <div class="box-num">8 - 12</div><div class="box-title">UP</div><div class="payout-rate">1:1</div><b id="a-high">₹0</b>
                </div>
                <div class="my-bet-text" id="my-high">My Bet: ₹0</div>
            </div>
        </div>
        <div class="chips-bar">
            <div class="chip-btn c10" onclick="sel(10, this, '#2a5298')">10</div>
            <div class="chip-btn c100" onclick="sel(100, this, '#e65c00')">100</div>
            <div class="chip-btn c500" onclick="sel(500, this, '#1D976C')">500</div>
            <div class="chip-btn c1k active" onclick="sel(1000, this, '#ef473a')">1K</div>
            <div class="chip-btn c5k" onclick="sel(5000, this, '#11998e')">5K</div>
        </div>
    </div>
    <div class="footer" id="plist"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let totalBal = 0, depBal = 0, winBal = 0, bonBal = 0; 
    let userID = localStorage.getItem('userPhone') || localStorage.getItem('phone'); 
    
    let players = [], historyAnk = [];
    let myBets = { low:0, tie:0, high:0 }, botTotal = { low:0, tie:0, high:0 };
    let currentChip = 1000, currentChipColor = '#ef473a';
    let isRolling = false, lastState = '';
    let botSimulationInterval;

    const pips = { 1:[5], 2:[3,7], 3:[3,5,7], 4:[1,3,7,9], 5:[1,3,5,7,9], 6:[1,3,4,6,7,9] };
    const faceOrder = ['front', 'right', 'back', 'left', 'top', 'bottom'];

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playCoinSound() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        try {
            const n = audioCtx.currentTime; const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = 'sine'; o.frequency.setValueAtTime(2000, n); o.frequency.exponentialRampToValueAtTime(500, n + 0.1);
            g.gain.setValueAtTime(0.05, n); g.gain.exponentialRampToValueAtTime(0.01, n + 0.1);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(n + 0.1);
        } catch(e){}
    }

    function initGame() {
        build3DDice('d1'); build3DDice('d2');
        for(let i=0; i<8; i++) players.push({ name: "ID_"+Math.floor(1000+Math.random()*9000), bal: 500000 + Math.floor(Math.random() * 500000) });
        renderFooter();

        if (userID) {
            db.ref(`users/${userID}`).on('value', (snap) => {
                const data = snap.val() || {};
                depBal = parseFloat(data.balance || 0); winBal = parseFloat(data.winning_balance || 0); bonBal = parseFloat(data.bonus_balance || 0);
                totalBal = depBal + winBal + bonBal; 
                document.getElementById('user-balance').innerText = totalBal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            });

            // 🔥 1. AUTO BET RECOVERY 🔥
            db.ref(`Game/7UpDown/Bets/${userID}`).once('value', snap => {
                let saved = snap.val();
                if(saved) {
                    setTimeout(() => {
                        Object.keys(saved).forEach(side => {
                            let val = saved[side];
                            if(val > 0 && myBets[side] !== undefined) {
                                myBets[side] = val;
                                document.getElementById('my-'+side).innerText = "My Bet: ₹" + val;
                                document.getElementById('a-'+side).innerText = "₹" + val;
                                
                                let box = document.getElementById(side);
                                if(box) {
                                    let rect = box.getBoundingClientRect();
                                    let c = document.createElement('div'); c.className = 'chip-visual';
                                    c.style.background = '#e74c3c'; // Recovery Chip Color
                                    c.innerText = val >= 1000 ? (val/1000)+'K' : val;
                                    c.style.left = (rect.left + rect.width/2 - 11) + 'px';
                                    c.style.top = (rect.top + rect.height/2 - 11) + 'px';
                                    document.body.appendChild(c);
                                }
                            }
                        });
                    }, 500);
                }
            });
        }

        // 🔥 2. PERMANENT HISTORY LOADER 🔥
        db.ref('Game/7UpDown/History').once('value', snap => {
            let hist = snap.val();
            if(hist && Array.isArray(hist)) {
                [...hist].reverse().forEach(w => updateHistory(w));
            }
        });

        // 🔥 3. SERVER SYNC (MASTER ENGINE CONNECTED) 🔥
        db.ref('Game/7UpDown/Status').on('value', snap => {
            let data = snap.val(); if(!data) return;

            if(data.state === 'betting') {
                document.getElementById('timer').innerText = data.timer + "s";
                document.getElementById('timer').style.color = data.timer <= 5 ? '#ff007f' : '#fff';
                
                if(lastState !== 'betting') {
                    isRolling = false;
                    resetTable();
                    startBotAnimation();
                }
                lastState = 'betting';
            } 
            else if(data.state === 'rolling' || data.state === 'result') {
                if(lastState === 'betting') {
                    isRolling = true;
                    stopBotAnimation();
                    startRoll(data.v1, data.v2, data.winner);
                }
                lastState = 'rolling';
            }
        });
        
        // Sync Real-Time Total Pool
        db.ref('Game/7UpDown/Bets').on('value', snap => {
            let allB = snap.val() || {};
            let tPool = {low:0, tie:0, high:0};
            for(let u in allB) { if(!u.includes('bot')) { tPool.low += (allB[u].low||0); tPool.tie += (allB[u].tie||0); tPool.high += (allB[u].high||0); } }
            document.getElementById('a-low').innerText = "₹" + tPool.low.toLocaleString();
            document.getElementById('a-tie').innerText = "₹" + tPool.tie.toLocaleString();
            document.getElementById('a-high').innerText = "₹" + tPool.high.toLocaleString();
        });
    }

    function startRoll(v1, v2, winId) {
        document.getElementById('timer').innerText = "ROLL";
        const cup = document.getElementById('cup'), d1 = document.getElementById('d1'), d2 = document.getElementById('d2');
        cup.style.transform = 'translateY(0)'; // Cup neeche aata hai
        
        setTimeout(() => {
            cup.classList.add('shake-cup'); d1.className = 'cube rolling-dice'; d2.className = 'cube rolling-dice';
            setTimeout(() => {
                cup.classList.remove('shake-cup'); cup.style.transform = 'translateY(-160px)'; // Cup upar gaya
                d1.className = 'cube show-' + v1; d2.className = 'cube show-' + v2;
                
                let winBox = document.getElementById(winId);
                if(winBox) winBox.classList.add('win-glow');
                
                updateHistory(winId);
                checkPayout(winId);
                
                players.forEach(p => { p.bal += (Math.random() > 0.5 ? 20000 : -10000); }); 
                renderFooter();
            }, 2500);
        }, 500);
    }

    function updateHistory(winId) {
        let col = winId === 'low' ? 'var(--blue)' : (winId === 'high' ? 'var(--pink)' : 'var(--gold)');
        let txt = winId === 'low' ? 'D' : (winId === 'high' ? 'U' : '7');
        historyAnk.unshift({v: txt, col: col}); 
        if(historyAnk.length > 8) historyAnk.pop();
        document.getElementById('hist-row').innerHTML = historyAnk.map(h => `<div class="h-ank" style="background:${h.col}">${h.v}</div>`).join('');
    }

    function userBet(side, e) {
        if(isRolling) return;
        if(!userID) { alert("Login Error!"); return; }
        if(totalBal < currentChip) { alert("Balance Kam hai!"); return; }
        
        let nDep = depBal, nWin = winBal, rem = currentChip;
        if(nDep >= rem) { nDep -= rem; } else { rem -= nDep; nDep = 0; nWin -= rem; }
        db.ref(`users/${userID}`).update({ balance: Math.max(0, nDep), winning_balance: Math.max(0, nWin) });
        
        db.ref(`Game/7UpDown/Bets/${userID}/${side}`).set(firebase.database.ServerValue.increment(currentChip));
        
        myBets[side] += currentChip;
        document.getElementById('my-'+side).innerText = "My Bet: ₹" + myBets[side].toLocaleString();
        document.getElementById('my-'+side).style.display = 'block';
        
        spawnChip(side, currentChip, currentChipColor, e.clientX, e.clientY);
    }

    function checkPayout(winId) {
        if(myBets[winId] > 0 && userID) {
            let winAmt = (winId === 'tie') ? myBets[winId] * 5 : myBets[winId] * 2;
            db.ref(`users/${userID}/winning_balance`).set(winBal + winAmt);
            
            let p = document.getElementById('win-popup'); 
            p.innerText = "+₹"+winAmt.toLocaleString(); p.classList.add('show');
            setTimeout(() => p.classList.remove('show'), 3000);
        }
    }

    function spawnChip(side, val, color, x, y) {
        let chip = document.createElement('div'); chip.className = 'chip-visual';
        chip.style.background = color; chip.innerText = val >= 1000 ? (val/1000)+'K' : val;
        if(val === 10) chip.style.color = '#fff'; else if(val === 500 || val === 5000) chip.style.color = '#000';
        
        let rect = document.getElementById(side).getBoundingClientRect();
        chip.style.left = x + 'px'; chip.style.top = y + 'px';
        document.body.appendChild(chip);
        
        setTimeout(() => {
            chip.style.left = (rect.left + 15 + Math.random()*(rect.width-30)) + 'px';
            chip.style.top = (rect.top + 15 + Math.random()*(rect.height-40)) + 'px';
            playCoinSound();
        }, 30);
    }

    function resetTable() {
        document.querySelectorAll('.chip-visual').forEach(c => c.remove());
        document.querySelectorAll('.box').forEach(b => b.classList.remove('win-glow'));
        myBets = {low:0,tie:0,high:0}; 
        ['low','tie','high'].forEach(s => {
            document.getElementById('my-'+s).innerText = "My Bet: ₹0";
            document.getElementById('my-'+s).style.display = 'none';
        });
        document.getElementById('cup').style.transform = 'translateY(-160px)';
    }

    function startBotAnimation() {
        botSimulationInterval = setInterval(() => {
            if(isRolling) return;
            const sides = ['low', 'high', 'tie'];
            const target = sides[Math.floor(Math.random()*3)];
            const vals = [{v:10,c:'#2a5298'}, {v:100,c:'#e65c00'}, {v:500,c:'#1D976C'}, {v:1000,c:'#ef473a'}];
            const ch = vals[Math.floor(Math.random()*vals.length)];
            
            let startX = Math.random() * window.innerWidth;
            let startY = window.innerHeight + 50; // Bots bottom se fekte hain
            spawnChip(target, ch.v, ch.c, startX, startY);
        }, 400); // Fast bot betting
    }
    
    function stopBotAnimation() { clearInterval(botSimulationInterval); }

    function build3DDice(id) {
        const cube = document.getElementById(id); cube.innerHTML = '';
        for(let i=1; i<=6; i++) {
            let face = document.createElement('div'); face.className = `face ${faceOrder[i-1]}`;
            for(let j=1; j<=9; j++) {
                let slot = document.createElement('div'); if(pips[i].includes(j)) slot.innerHTML = '<div class="pip"></div>';
                face.appendChild(slot);
            }
            cube.appendChild(face);
        }
    }

    function sel(v, el, color) { currentChip = v; currentChipColor = color; document.querySelectorAll('.chip-btn').forEach(c => c.classList.remove('active')); el.classList.add('active'); playCoinSound(); }
    function renderFooter() { document.getElementById('plist').innerHTML = players.map(p => `<div class="p-card"><div style="color:var(--gold)">${p.name}</div><b>₹${Math.floor(p.bal/1000).toLocaleString()}K</b></div>`).join(''); }
</script>
</body>
</html>
