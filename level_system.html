<div id="vip-panel" style="background: #000; border: 2px solid #ffd700; border-radius: 15px; padding: 10px; color: white; font-family: sans-serif; max-width: 500px; margin: 20px auto; box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);">
    
    <div style="text-align: center; padding: 10px; background: linear-gradient(180deg, #ffd700, #b8860b); color: #000; border-radius: 10px 10px 0 0; font-weight: bold;">
        <h2 style="margin: 0; font-size: 20px;">🏆 VIP RANKING (LEVEL 1-50)</h2>
        <p style="margin: 0; font-size: 11px;">Level 1 hamara Sabse Bada Khiladi!</p>
    </div>

    <div id="player-list-scroll" style="max-height: 600px; overflow-y: auto; padding: 10px; background: #0a0a0a; display: flex; flex-direction: column;">
        </div>
</div>

<style>
    #player-list-scroll::-webkit-scrollbar { width: 6px; }
    #player-list-scroll::-webkit-scrollbar-thumb { background: #ffd700; border-radius: 10px; }
</style>

<script>
function renderDashboard() {
    const listContainer = document.getElementById('player-list-scroll');
    listContainer.innerHTML = "";
    
    // Loop 1 se 50 tak (Taaki Level 1 upar rahe)
    for (let i = 1; i <= 50; i++) {
        let level = i; 
        
        // PAISA LOGIC: Jitna chota level number (1), utna zyada paisa.
        // Level 1: ~5,00,000 | Level 50: ~50,000
        let baseWithdrawal = 500000 - ((level - 1) * 9100); 
        let bonus = 45000 - ((level - 1) * 870);
        let refer = 85000 - ((level - 1) * 1700);
        
        // Safety check taaki minus mein na jaye
        if (baseWithdrawal < 50000) baseWithdrawal = 50000;
        if (bonus < 2000) bonus = 2000;
        if (refer < 1500) refer = 1500;

        let total = bonus + refer;

        let tier = "BRONZE STAR";
        let badge = "🥉";
        let color = "#444";

        // Tiers Level ke hisaab se
        if (level <= 5) { tier = "GOLDEN EMPEROR"; badge = "🔱"; color = "#ffd700"; }
        else if (level <= 15) { tier = "SILVER ELITE"; badge = "🥈"; color = "#c0c0c0"; }
        else if (level <= 30) { tier = "PLATINUM KING"; badge = "💎"; color = "#e5e4e2"; }

        let card = `
            <div style="background: #151515; border: 1px solid #222; border-radius: 10px; padding: 12px; margin-bottom: 10px; border-left: 4px solid ${color};">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-weight: bold; color: ${level <= 5 ? '#ffd700' : '#fff'};">#${level} ${badge} Player_${level}</span>
                    <span style="font-size: 11px; background: #333; padding: 2px 8px; border-radius: 4px; color: #ffd700;">LVL ${level}</span>
                </div>
                
                <div style="font-size: 10px; color: #888; margin: 4px 0;">${tier}</div>

                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 8px; text-align: center;">
                    <div style="background: #000; padding: 5px; border-radius: 5px;">
                        <div style="font-size: 9px; color: #aaa;">Withdrawal</div>
                        <div style="font-size: 11px; color: #fff; font-weight:bold;">₹${baseWithdrawal.toLocaleString()}</div>
                    </div>
                    <div style="background: #000; padding: 5px; border-radius: 5px;">
                        <div style="font-size: 9px; color: #aaa;">Bonus</div>
                        <div style="font-size: 11px; color: #00ff00; font-weight:bold;">₹${bonus.toLocaleString()}</div>
                    </div>
                    <div style="background: #000; padding: 5px; border-radius: 5px;">
                        <div style="font-size: 9px; color: #aaa;">Refer</div>
                        <div style="font-size: 11px; color: #00e5ff; font-weight:bold;">₹${refer.toLocaleString()}</div>
                    </div>
                </div>

                <div style="text-align: right; margin-top: 8px; font-size: 12px; color: #ffd700; border-top: 1px solid #222; padding-top: 5px;">
                   <span style="color:#888; font-size:10px;">Total Piche:</span> ₹${total.toLocaleString()}
                </div>
            </div>
        `;
        listContainer.innerHTML += card;
    }
}

renderDashboard();
</script>
