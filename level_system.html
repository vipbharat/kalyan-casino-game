<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalyan VIP Ranking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Body ko full screen karne ka code */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505; /* Deep black background */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden; /* Side scroll band */
        }

        /* Top Header (Sticky) */
        .vip-header {
            background: linear-gradient(180deg, #ffd700, #b8860b);
            color: #000;
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            text-align: center;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-btn {
            position: absolute;
            left: 15px;
            font-size: 22px;
            color: #000;
            cursor: pointer;
            padding: 5px;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        .header-titles h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-titles p {
            margin: 2px 0 0;
            font-size: 11px;
            font-weight: bold;
        }

        /* List Container */
        #player-list-scroll {
            padding: 15px;
            padding-bottom: 50px;
        }

        /* Player Card Design */
        .player-card {
            background: linear-gradient(145deg, #151515, #0a0a0a);
            border: 1px solid #222;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            position: relative;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            border-bottom: 1px solid #222;
            padding-bottom: 8px;
        }

        .player-name {
            font-size: 17px;
            font-weight: 900;
        }

        .level-badge {
            font-size: 11px;
            background: #ffd700;
            color: #000;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 900;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
        }

        .tier-name {
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            text-align: center;
        }

        .stat-box {
            background: rgba(255,255,255,0.03);
            padding: 8px 5px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .stat-title {
            font-size: 10px;
            color: #aaa;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 12px;
            font-weight: 900;
        }

        .total-kamai {
            text-align: right;
            margin-top: 12px;
            font-size: 14px;
            color: #ffd700;
            border-top: 1px dashed #333;
            padding-top: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="vip-header">
        <div class="back-btn" onclick="window.history.back()">
            <i class="fa-solid fa-arrow-left"></i>
        </div>
        
        <div class="header-titles">
            <h2>🏆 VIP RANKING (1-50)</h2>
            <p>Level 1 Hamara Sabse Bada Khiladi!</p>
        </div>
    </div>

    <div id="player-list-scroll">
        </div>

    <script>
        function renderDashboard() {
            const listContainer = document.getElementById('player-list-scroll');
            listContainer.innerHTML = "";
            
            // Loop 1 se 50 tak
            for (let i = 1; i <= 50; i++) {
                let level = i; 
                
                // Paisa calculation (Level 1 sabse zyada)
                let baseWithdrawal = 500000 - ((level - 1) * 9100); 
                let bonus = 45000 - ((level - 1) * 870);
                let refer = 85000 - ((level - 1) * 1700);
                
                if (baseWithdrawal < 50000) baseWithdrawal = 50000;
                if (bonus < 2000) bonus = 2000;
                if (refer < 1500) refer = 1500;
                let total = bonus + refer;

                let tier = "BRONZE STAR";
                let badge = "🥉";
                let borderColor = "#444";
                let nameColor = "#fff";

                // Top Levels Styling
                if (level <= 5) { 
                    tier = "GOLDEN EMPEROR"; 
                    badge = "🔱"; 
                    borderColor = "#ffd700"; 
                    nameColor = "#ffd700"; 
                }
                else if (level <= 15) { 
                    tier = "SILVER ELITE"; 
                    badge = "🥈"; 
                    borderColor = "#c0c0c0"; 
                }
                else if (level <= 30) { 
                    tier = "PLATINUM KING"; 
                    badge = "💎"; 
                    borderColor = "#00e5ff"; 
                }

                let card = `
                    <div class="player-card" style="border-left: 5px solid ${borderColor};">
                        <div class="card-header">
                            <span class="player-name" style="color: ${nameColor};">#${level} ${badge} Player_${level}</span>
                            <span class="level-badge">LVL ${level}</span>
                        </div>
                        
                        <div class="tier-name" style="color: ${borderColor};">${tier}</div>

                        <div class="stats-grid">
                            <div class="stat-box">
                                <div class="stat-title">Withdrawal</div>
                                <div class="stat-value" style="color: #fff;">₹${baseWithdrawal.toLocaleString()}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-title">Bonus</div>
                                <div class="stat-value" style="color: #00ff88;">₹${bonus.toLocaleString()}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-title">Refer</div>
                                <div class="stat-value" style="color: #00d2d3;">₹${refer.toLocaleString()}</div>
                            </div>
                        </div>

                        <div class="total-kamai">
                           <span style="color:#888; font-size:11px;">Total Piche:</span> ₹${total.toLocaleString()}
                        </div>
                    </div>
                `;
                listContainer.innerHTML += card;
            }
        }

        // Script Load hote hi list banayega
        renderDashboard();
    </script>
</body>
</html>
