<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan VIP - Master Control Room</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #050510; color: #fff; overflow: hidden; }
        .sidebar { width: 260px; background: #111; border-right: 2px solid #00ff88; display: flex; flex-direction: column; }
        .logo { padding: 20px; text-align: center; font-size: 18px; font-weight: 900; color: #00ff88; border-bottom: 1px dashed #333; text-transform: uppercase; }
        .menu-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #1a1a2e; color: #888; display: flex; align-items: center; gap: 12px; font-size: 13px; font-weight: bold; transition: 0.3s; }
        .menu-item:hover { background: #1a1a2e; color: #fff; }
        .menu-item.active { background: #1a1a2e; color: #00ff88; border-left: 5px solid #00ff88; }
        .content { flex-grow: 1; background: #050510; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; flex-direction: row; overflow-x: auto; height: 65px; border-right: none; border-bottom: 2px solid #00ff88; }
            .logo { display: none; }
            .menu-item { border-bottom: none; border-right: 1px solid #1a1a2e; white-space: nowrap; padding: 10px 15px; font-size: 11px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo"><i class="fa-solid fa-gears"></i> KALYAN MASTER</div>
        
        <div class="menu-item active" onclick="loadPage('FantasyAdmin.html', this)">
            <i class="fa-solid fa-calendar-plus"></i> Add New Match
        </div>
        <div class="menu-item" onclick="loadPage('TeamManagerPro.html', this)">
            <i class="fa-solid fa-robot"></i> Bots & Points Edit
        </div>
        <div class="menu-item" onclick="loadPage('LiveScoreEngine.html', this)">
            <i class="fa-solid fa-bolt"></i> Live Score Engine
        </div>

        <div class="menu-item" onclick="loadPage('AutoEngine.html', this)">
            <i class="fa-solid fa-wand-magic-sparkles"></i> Auto Engine
        </div>
        <div class="menu-item" onclick="loadPage('Freepenal.html', this)">
            <i class="fa-solid fa-gamepad"></i> TDM & Market Control
        </div>

    </div>

    <div class="content">
        <iframe id="admin-frame" src="FantasyAdmin.html"></iframe>
    </div>

    <script>
        function loadPage(url, element) {
            document.getElementById('admin-frame').src = url;
            document.querySelectorAll('.menu-item').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
