<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Kalyan VIP - Master Control Room</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0d0d0d; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .header { background: #000000; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #FFD700; border-top: 2px solid #FFD700; border-radius: 10px; margin: 5px; }
        .header-title-info { display: flex; flex-direction: column; }
        .header-title { color: #FFD700; font-size: 18px; font-weight: 700; text-transform: uppercase; margin-bottom: 2px; }
        .header-id { color: #aaa; font-size: 11px; }

        .navbar { display: flex; background: #1a1a1a; padding: 10px; border-bottom: 1px solid #333; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .navbar::-webkit-scrollbar { display: none; }
        
        .nav-item { flex: 0 0 110px; margin-right: 10px; text-align: center; display: flex; flex-direction: column; align-items: center; cursor: pointer; text-decoration: none; border-radius: 8px; background: #333333; transition: all 0.2s ease; padding: 10px 5px; border: 1px solid #444; }
        .nav-item:active { transform: scale(0.95); }
        .nav-item.active { background-color: #FFD700; color: #000; border-color: #FFD700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }

        .nav-item .icon { font-size: 18px; margin-bottom: 5px; color: #00FF00; }
        .nav-item.active .icon { color: #000; }
        .nav-item .text { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #fff; }
        .nav-item.active .text { color: #000; }

        .content-frame { flex: 1; overflow: hidden; position: relative; background: #0d0d0d; }
        .safe-iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title-info">
            <div class="header-title">KALYAN VIP - CONTROL ROOM</div>
            <div class="header-id">ID: KP8590 | MASTER ACCESS</div>
        </div>
        <div style="color:#FFD700;"><i class="fa-solid fa-crown"></i></div>
    </div>

    <div class="navbar">
        <a href="javascript:void(0)" class="nav-item active" onclick="loadPage('FantasyAdmin.html', this)">
            <div class="icon"><i class="fa-solid fa-calendar-plus"></i></div>
            <div class="text">Add Match</div>
        </a>
        
        <a href="javascript:void(0)" class="nav-item" onclick="loadPage('TeamManagerPro.html', this)">
            <div class="icon"><i class="fa-solid fa-robot"></i></div>
            <div class="text">Bots Edit</div>
        </a>
        
        <a href="javascript:void(0)" class="nav-item" onclick="loadPage('LiveScoreEngine.html', this)">
            <div class="icon"><i class="fa-solid fa-bolt"></i></div>
            <div class="text">Live Engine</div>
        </a>
        
        <a href="javascript:void(0)" class="nav-item" onclick="loadPage('AutoEngine.html', this)">
            <div class="icon"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
            <div class="text">Auto Engine</div>
        </a>
        
        <a href="javascript:void(0)" class="nav-item" onclick="loadPage('Freepenal.html', this)">
            <div class="icon"><i class="fa-solid fa-gamepad"></i></div>
            <div class="text">TDM & Market</div>
        </a>
    </div>

    <div class="content-frame">
        <iframe src="FantasyAdmin.html" class="safe-iframe" id="admin-frame"></iframe>
    </div>

    <script>
        function loadPage(pageName, element) {
            // Iframe ka source update karna
            document.getElementById('admin-frame').src = pageName;

            // Saare buttons se color hatana
            var navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(function(item) {
                item.classList.remove('active');
            });

            // Sirf click kiye hue button par color lagana
            element.classList.add('active');
        }
    </script>
</body>
</html>
