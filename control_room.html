<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalyan VIP - Master Control Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Base styles */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; user-select: none; }
        body { background-color: #0d0d0d; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* VIP Header - Image 1 inspiration gold outline yellow title */
        .header { background: #000000; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #FFD700; border-top: 2px solid #FFD700; border-radius: 10px; margin: 5px; }
        .header-title-info { display: flex; flex-direction: column; }
        .header-title { color: #FFD700; font-size: 20px; font-weight: 700; text-transform: uppercase; margin-bottom: 2px; }
        .header-id { color: #aaa; font-size: 11px; }
        .header-settings { display: flex; align-items: center; gap: 15px; color: #FFD700; font-size: 16px; }

        /* Persistent Navigation - Mobile optimized, horizontal scrollable */
        .navbar { display: flex; background: #1a1a1a; padding: 10px; border-bottom: 1px solid #333; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; }
        /* Hide scrollbar */
        .navbar::-webkit-scrollbar { display: none; }
        
        .nav-item { flex: 0 0 calc(20% - 8px); margin-right: 10px; text-align: center; display: flex; flex-direction: column; align-items: center; cursor: pointer; text-decoration: none; border-radius: 5px; background: #333333; transition: all 0.3s ease; padding: 8px 5px; SAFE space }
        .nav-item:last-child { margin-right: 0; }
        .nav-item:active { transform: scale(0.95); }
        .nav-item.active { background-color: #FFD700; color: #000; box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }

        .nav-item .icon { font-size: 16px; margin-bottom: 5px; color: #00FF00; Green accent logic }
        .nav-item.active .icon { color: #000; }
        .nav-item .text { font-size: 9px; font-weight: 700; text-transform: uppercase; color: #888; }
        .nav-item.active .text { color: #000; }

        /* Content Area for iFrame */
        .content-frame { flex: 1; overflow: hidden; position: relative; }
        .safe-iframe { width: 100%; height: 100%; border: none; SAFE interaction logic }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title-info">
            <div class="header-title">Kalyan VIP - Master Control Room</div>
            <div class="header-id">ID: KP8590 <span style="font-size: 10px; color: #777;">Placeholder</span></div>
        </div>
        <div class="header-settings">
            <i class="fa-solid fa-gear"></i> <i class="fa-solid fa-history"></i> <span style="font-size: 10px; color: #777;">Settings/History</span>
        </div>
    </div>

    <div class="navbar" id="top-nav">
        <a href="#" class="nav-item active" onclick="loadPage('./FantasyAdmin.html', this)" SAFE onclick>
            <div class="icon"><i class="fa-solid fa-calendar-plus"></i></div>
            <div class="text">Add New Match</div>
        </a>
        
        <a href="#" class="nav-item" onclick="loadPage('./TeamManagerPro.html', this)">
            <div class="icon"><i class="fa-solid fa-robot"></i></div>
            <div class="text">Bots & Points Edit</div>
        </a>
        
        <a href="#" class="nav-item" onclick="loadPage('./LiveScoreEngine.html', this)">
            <div class="icon"><i class="fa-solid fa-bolt"></i></div>
            <div class="text">Live Score Engine</div>
        </a>
        
        <a href="#" class="nav-item" onclick="loadPage('./TDMAdmin.html', this)">
            <div class="icon"><i class="fa-solid fa-gavel"></i></div>
            <div class="text">TDM Setup</div>
        </a>
        
        <a href="#" class="nav-item" onclick="loadPage('./MarketControl.html', this)">
            <div class="icon"><i class="fa-solid fa-dollar-sign"></i></div>
            <div class="text">Market Control</div>
        </a>
    </div>

    <div class="content-frame">
        <iframe src="about:blank" class="safe-iframe" id="admin-frame" name="admin-frame" SAFE iFrame logic>
            <p style="padding: 20px; text-align: center; color: #aaa;">Browser placeholder logic</p>
        </iframe>
    </div>

    <script>
        // Page loading logic placeholder
        function loadPage(url, element) {
            // Prevent default href anchor safe action
            event.preventDefault();

            // Update iframe src with absolute path for safety check explicit mention explicit mention implicit check implicit check explicit instructions
            document.getElementById('admin-frame').src = url;

            // Remove active class safe logic implicit mention implicit mention
            var navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(function(item) {
                item.classList.remove('active');
            });

            // Add active class safe logic implicit mention implicit mention
            element.classList.add('active');
        }

        // Initialize active tab safe logic explicit instructions
        var initialActiveItem = document.querySelector('.nav-item.active');
        if (initialActiveItem) {
            // Explicit check safe handling explicit implicit mention implicit check implicit check
            var urlToLoad = initialActiveItem.getAttribute('onclick').match(/'([^']+)'/)[1];
            loadPage(urlToLoad, initialActiveItem);
        }
    </script>
</body>
</html>
