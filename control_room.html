<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan VIP - Master Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; height: 100vh; background: #050510; color: #fff; overflow: hidden; }
        
        /* Left Sidebar Menu */
        .sidebar { width: 250px; background: #111; border-right: 2px solid #00ff88; display: flex; flex-direction: column; z-index: 10; box-shadow: 2px 0 15px rgba(0,255,136,0.1);}
        .logo { padding: 20px; text-align: center; font-size: 22px; font-weight: 900; color: #00ff88; border-bottom: 1px dashed #333; text-transform: uppercase; letter-spacing: 1px;}
        
        .menu-item { padding: 16px 20px; cursor: pointer; border-bottom: 1px solid #1a1a2e; font-weight: bold; color: #888; transition: all 0.3s ease; display: flex; align-items: center; gap: 12px; font-size: 14px; text-transform: uppercase;}
        .menu-item:hover { background: #1a1a2e; color: #fff; }
        .menu-item.active { background: #1a1a2e; color: #00ff88; border-left: 5px solid #00ff88; padding-left: 15px;}
        
        /* Right Side Content Area */
        .content { flex-grow: 1; display: flex; flex-direction: column; background: #050510; }
        
        /* Iframe jo doosre pages ko load karega */
        iframe { width: 100%; height: 100%; border: none; background: #050510; }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; flex-direction: row; overflow-x: auto; border-right: none; border-bottom: 2px solid #00ff88; }
            .logo { display: none; } /* Hide logo on small mobile screens to save space */
            .menu-item { border-bottom: none; border-right: 1px solid #1a1a2e; white-space: nowrap; padding: 15px; }
            .menu-item.active { border-left: none; border-bottom: 4px solid #00ff88; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo"><i class="fa-solid fa-crown"></i> Kalyan Admin</div>
        
        <div class="menu-item active" onclick="loadPage('ultimate_admin.html', this)">
            <i class="fa-solid fa-robot"></i> Bots & Points
        </div>
        <div class="menu-item" onclick="loadPage('live_engine.html', this)">
            <i class="fa-solid fa-bolt"></i> Live Engine
        </div>
        <div class="menu-item" onclick="loadPage('add_match.html', this)">
            <i class="fa-solid fa-calendar-plus"></i> Add Matches
        </div>
        <div class="menu-item" onclick="loadPage('withdraw_requests.html', this)">
            <i class="fa-solid fa-money-bill-transfer"></i> Withdrawals
        </div>
    </div>

    <div class="content">
        <iframe id="admin-frame" src="ultimate_admin.html"></iframe>
    </div>

    <script>
        function loadPage(url, element) {
            // Iframe ka source change karo
            document.getElementById('admin-frame').src = url;
            
            // Saare buttons se 'active' class hatao
            document.querySelectorAll('.menu-item').forEach(btn => btn.classList.remove('active'));
            
            // Jis button par click kiya hai uspar 'active' class lagao
            element.classList.add('active');
        }
    </script>
</body>
</html>
