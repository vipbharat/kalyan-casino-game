<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
</head>
<body style="background: #111; color: white; font-family: sans-serif; padding: 20px;">

    <h2>RapidAPI Live Test</h2>
    <button onclick="testAPI()" style="padding: 15px; background: gold; color: black; font-weight: bold; border: none; border-radius: 5px;">Test API Now</button>
    
    <p id="status" style="color: #aaa; margin-top: 15px;">Waiting for click...</p>
    <pre id="result" style="background: #222; padding: 10px; color: #0f0; overflow: auto; max-height: 400px; font-size: 12px; border: 1px solid #444;"></pre>

    <script>
        function testAPI() {
            document.getElementById('status').innerText = "Fetching data...";
            document.getElementById('result').innerText = "";

            const matchId = "40381"; 
            const url = `https://cricbuzz-cricket.p.rapidapi.com/mcenter/v1/${matchId}/hscard`;

            const options = {
                method: 'GET',
                headers: {
                    'x-rapidapi-host': 'cricbuzz-cricket.p.rapidapi.com',
                    'x-rapidapi-key': 'e5a57f16d8mshbfff1d06e203673p1032e5jsn6d2c4b2dfa43'
                }
            };

            fetch(url, options)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('status').innerText = "✅ Success! Data aa gaya:";
                    // Data ko screen par dikhane ke liye format kar rahe hain
                    document.getElementById('result').innerText = JSON.stringify(data, null, 2); 
                })
                .catch(error => {
                    document.getElementById('status').innerText = "❌ Error aaya!";
                    document.getElementById('result').innerText = error.message;
                });
        }
    </script>
</body>
</html>
