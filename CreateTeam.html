<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - Create Your Team</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --d11-red: #d0021b; --d11-green: #00a05a; --bg-grey: #f2f2f2; --card-white: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-grey); color: #000; margin: 0; padding-bottom: 90px; user-select: none; }
        
        /* 👑 Header */
        .header { background: #fff; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #ddd;}
        .back-btn { font-size: 20px; cursor: pointer; color: #000; margin-right: 15px;}
        .match-info { font-weight: 900; font-size: 15px; flex-grow: 1; text-transform: uppercase;}

        /* 📊 Stats Bar */
        .stats-bar { background: #1a0033; color: #fff; padding: 15px; position: sticky; top: 52px; z-index: 99;}
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 12px;}
        .progress-container { display: flex; gap: 4px; }
        .p-box { width: 15px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 2px;}
        .p-box.active { background: var(--d11-green); box-shadow: 0 0 5px var(--d11-green);}

        /* 📑 Role Tabs */
        .role-tabs { display: flex; background: #fff; border-bottom: 1px solid #ddd; overflow-x: auto;}
        .role-tab { flex: 1; text-align: center; padding: 12px 0; font-size: 11px; font-weight: 900; color: #666; cursor: pointer; text-transform: uppercase;}
        .role-tab.active { color: var(--d11-red); border-bottom: 3px solid var(--d11-red);}

        /* 👥 Players List */
        .player-list { padding: 10px; }
        .p-card { background: #fff; display: flex; align-items: center; padding: 12px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #eee; position: relative;}
        .p-card.selected { background: #fff9e6; border-color: #ffd700; }
        
        /* 🔥 BENCHED PLAYERS KA LOOK 🔥 */
        .p-card.benched { background: #fafafa; opacity: 0.6; border-color: #ddd; }
        .p-card.disabled { opacity: 0.4; filter: grayscale(1); pointer-events: none;}
        
        .p-img { width: 45px; height: 45px; background: #eee; border-radius: 50%; margin-right: 12px;}
        .p-info { flex-grow: 1; }
        .p-name { font-size: 14px; font-weight: 900; color: #000; }
        .p-team-role { font-size: 10px; color: #777; margin-top: 2px;}
        
        .playing-status { font-size: 9px; margin-top: 4px; display: flex; align-items: center; font-weight: bold;}
        .dot { width: 6px; height: 6px; border-radius: 50%; margin-right: 4px;}
        .dot-green { background: var(--d11-green); }
        .dot-red { background: var(--d11-red); }

        .p-creds { font-weight: 900; font-size: 14px; margin-right: 40px;}
        .add-icon { position: absolute; right: 15px; font-size: 20px; color: var(--d11-green); }
        .p-card.selected .add-icon { color: var(--d11-red); transform: rotate(45deg); }
        .p-card.benched .add-icon { color: #aaa; }

        /* 🚀 Footer & Ground Preview Button */
        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #ddd; z-index: 100;}
        .preview-btn { background: #333; color: #fff; padding: 10px 15px; border-radius: 5px; font-weight: 900; font-size: 12px; border: none;}
        .next-btn { background: #ccc; color: #888; padding: 12px 35px; border-radius: 5px; font-weight: 900; border: none; cursor: not-allowed; transition: 0.3s;}
        .next-btn.active { background: var(--d11-green); color: #fff; cursor: pointer; }

        /* 🏟️ GROUND PREVIEW MODAL */
        .ground-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://i.ibb.co/Xz9t0hY/ground.jpg') no-repeat center center; background-size: cover; z-index: 2000; overflow-y: auto;}
        .close-preview { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 30px; z-index: 2001;}
        .field-area { position: relative; height: 100%; display: flex; flex-direction: column; justify-content: space-around; padding: 50px 10px; box-sizing: border-box;}
        .ground-row { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;}
        .player-jersey { text-align: center; width: 60px;}
        .jersey-img { width: 35px; margin: 0 auto; display: block;}
        .jersey-name { background: #000; color: #fff; font-size: 8px; padding: 2px 4px; border-radius: 2px; margin-top: 3px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-arrow-left back-btn" onclick="history.back()"></i>
        <div class="match-info" id="matchHeader">Loading...</div>
    </div>

    <div class="stats-bar">
        <div class="top-row">
            <div>Players: <span id="pCount">0</span>/11</div>
            <div id="teamCountDisplay">IND 0 : 0 AUS</div>
            <div>Credits: <span id="cCount">100.0</span></div>
        </div>
        <div class="progress-container" id="p-indicators">
            </div>
    </div>

    <div class="role-tabs">
        <div class="role-tab active" onclick="switchRole('WK', this)">WK (0)</div>
        <div class="role-tab" onclick="switchRole('BAT', this)">BAT (0)</div>
        <div class="role-tab" onclick="switchRole('AR', this)">AR (0)</div>
        <div class="role-tab" onclick="switchRole('BOWL', this)">BOWL (0)</div>
    </div>

    <div class="player-list" id="player-list-container">
        </div>

    <div class="footer">
        <button class="preview-btn" onclick="togglePreview()"><i class="fa-solid fa-eye"></i> TEAM PREVIEW</button>
        <button class="next-btn" id="nextBtn" onclick="goToCaptain()">NEXT</button>
    </div>

    <div class="ground-modal" id="groundModal">
        <span class="close-preview" onclick="togglePreview()">&times;</span>
        <div class="field-area" id="field-area">
            </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('matchId');
        const contestFee = urlParams.get('fee') || 49;

        let allPlayers = [];
        let selectedIds = [];
        let currentRole = "WK";
        let creditsLeft = 100.0;
        let t1 = "T1", t2 = "T2";

        // Draw Progress Indicators
        const indicators = document.getElementById('p-indicators');
        for(let i=0; i<11; i++) indicators.innerHTML += `<div class="p-box" id="dot-${i}"></div>`;

        // 🔥 FETCH PLAYERS 🔥
        db.ref('Game/Kalyan11/MatchPlayers/' + matchId).on('value', snapshot => {
            allPlayers = [];
            if(snapshot.exists()) {
                snapshot.forEach(c => {
                    let p = c.val(); p.id = c.key;
                    allPlayers.push(p);
                });
                let teams = [...new Set(allPlayers.map(x => x.team))];
                t1 = teams[0] || "T1"; t2 = teams[1] || "T2";
                document.getElementById('matchHeader').innerText = `${t1} VS ${t2}`;
                updateTabsCount();
                renderList();
            }
        });

        function switchRole(role, el) {
            currentRole = role;
            document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderList();
        }

        function renderList() {
            let container = document.getElementById('player-list-container');
            container.innerHTML = "";
            
            let filtered = allPlayers.filter(p => p.role === currentRole);
            
            // 🔥 MASTER SORTING LOGIC 🔥
            // Priority: Playing(2) -> Unannounced(1) -> Benched(0)
            filtered.sort((a, b) => {
                let getPriority = (status) => {
                    if (status === 'playing') return 2;
                    if (status === 'benched') return 0;
                    return 1; // Unannounced / Default
                };
                
                let priA = getPriority(a.playingStatus);
                let priB = getPriority(b.playingStatus);
                
                if (priA !== priB) {
                    return priB - priA; // High priority sabse upar
                } else {
                    // Agar dono ka status same hai, toh jiske Credits zyada hain wo upar aayega
                    return parseFloat(b.credits || 9.0) - parseFloat(a.credits || 9.0);
                }
            });

            filtered.forEach(p => {
                let isSelected = selectedIds.includes(p.id);
                let cred = parseFloat(p.credits || 9.0);
                
                let isAnnounced = p.playingStatus === 'playing';
                let isBenched = p.playingStatus === 'benched';
                
                let statusHtml = isAnnounced ? `<div class="playing-status"><span class="dot dot-green"></span> Annouced Playing</div>` : 
                                 isBenched ? `<div class="playing-status" style="color:var(--d11-red);"><span class="dot dot-red"></span> Not Playing</div>` : 
                                 `<div class="playing-status"><span class="dot" style="background:#aaa;"></span> Unannounced</div>`;

                let cardClass = isSelected ? "p-card selected" : "p-card";
                if(isBenched) cardClass += " benched";

                container.innerHTML += `
                    <div class="${cardClass}" onclick="togglePlayer('${p.id}', ${cred})">
                        <div class="p-img"></div>
                        <div class="p-info">
                            <div class="p-name">${p.name}</div>
                            <div class="p-team-role">${p.team} | ${p.role}</div>
                            ${statusHtml}
                        </div>
                        <div class="p-creds">${cred}</div>
                        <i class="fa-solid fa-circle-plus add-icon"></i>
                    </div>`;
            });
        }

        function togglePlayer(id, cred) {
            let idx = selectedIds.indexOf(id);
            if(idx > -1) {
                selectedIds.splice(idx, 1);
                creditsLeft += cred;
            } else {
                if(selectedIds.length >= 11) return alert("11 Players ho gaye!");
                if(creditsLeft - cred < 0) return alert("Credits khatam!");
                
                // Rule Check: Max 7 from one team
                let pObj = allPlayers.find(p => p.id === id);
                let teamCount = allPlayers.filter(p => selectedIds.includes(p.id) && p.team === pObj.team).length;
                if(teamCount >= 7) return alert(`Aap ek team se max 7 players hi le sakte hain!`);

                selectedIds.push(id);
                creditsLeft -= cred;
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('pCount').innerText = selectedIds.length;
            document.getElementById('cCount').innerText = creditsLeft.toFixed(1);
            
            // Progress Dots
            for(let i=0; i<11; i++) {
                document.getElementById(`dot-${i}`).classList.toggle('active', i < selectedIds.length);
            }

            let t1c = allPlayers.filter(p => selectedIds.includes(p.id) && p.team === t1).length;
            let t2c = allPlayers.filter(p => selectedIds.includes(p.id) && p.team === t2).length;
            document.getElementById('teamCountDisplay').innerText = `${t1} ${t1c} : ${t2c} ${t2} `;

            let btn = document.getElementById('nextBtn');
            btn.classList.toggle('active', selectedIds.length === 11);
            btn.disabled = selectedIds.length !== 11;
            
            updateTabsCount();
            renderList();
        }

        function updateTabsCount() {
            const getC = (r) => allPlayers.filter(p => selectedIds.includes(p.id) && p.role === r).length;
            document.querySelectorAll('.role-tab')[0].innerText = `WK (${getC('WK')})`;
            document.querySelectorAll('.role-tab')[1].innerText = `BAT (${getC('BAT')})`;
            document.querySelectorAll('.role-tab')[2].innerText = `AR (${getC('AR')})`;
            document.querySelectorAll('.role-tab')[3].innerText = `BOWL (${getC('BOWL')})`;
        }

        function togglePreview() {
            let modal = document.getElementById('groundModal');
            let area = document.getElementById('field-area');
            if(modal.style.display === 'block') {
                modal.style.display = 'none';
            } else {
                modal.style.display = 'block';
                area.innerHTML = "";
                ['WK', 'BAT', 'AR', 'BOWL'].forEach(role => {
                    let players = allPlayers.filter(p => selectedIds.includes(p.id) && p.role === role);
                    let row = `<div class="ground-row">`;
                    players.forEach(p => {
                        row += `<div class="player-jersey">
                            <img src="https://i.ibb.co/YyYh0kF/jersey.png" class="jersey-img">
                            <div class="jersey-name">${p.name.split(' ')[0]}</div>
                        </div>`;
                    });
                    row += `</div>`;
                    area.innerHTML += row;
                });
            }
        }

        function goToCaptain() {
            localStorage.setItem('kalyan_selected_team', JSON.stringify(selectedIds));
            window.location.href = `Captain.html?matchId=${matchId}&fee=${contestFee}`;
        }
    </script>
</body>
</html>
