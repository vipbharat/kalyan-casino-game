<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - Create Team</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding-bottom: 80px; user-select: none; }
        .header { background: linear-gradient(135deg, #1a0033, #4a00e0); padding: 15px; display: flex; align-items: center; border-bottom: 2px solid #ffd700; position: sticky; top:0; z-index:100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .back-btn { font-size: 20px; margin-right: 15px; cursor: pointer; color: #ffd700; }
        
        .status-bar { background: #111; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; font-weight: bold; font-size: 14px; }
        .wallet-bal { color: #00ff88; }
        .player-count { color: #ffd700; }
        
        .player-list { padding: 10px; }
        .player-card { background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .player-card.selected { border-color: #00ff88; background: rgba(0,255,136,0.1); }
        
        .p-info { display: flex; align-items: center; gap: 15px; }
        .p-img { width: 45px; height: 45px; background: #333; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; color: #aaa; border: 2px solid #555; }
        .p-name { font-weight: bold; font-size: 15px; }
        .p-team { font-size: 11px; color: #aaa; margin-top: 3px; }
        
        .select-btn { background: none; border: 2px solid #555; color: #aaa; width: 30px; height: 30px; border-radius: 50%; font-size: 18px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; }
        .player-card.selected .select-btn { background: #00ff88; border-color: #00ff88; color: #000; }
        
        .footer { position: fixed; bottom: 0; width: 100%; background: #111; padding: 15px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #333; z-index: 100; }
        .join-btn { background: #00ff88; color: #000; padding: 12px 30px; border-radius: 8px; font-weight: 900; border:none; cursor: pointer; font-size: 16px; box-shadow: 0 0 15px rgba(0,255,136,0.4); flex: 1; margin-left: 15px; transition: 0.2s; }
        .join-btn:disabled { background: #555; color: #222; box-shadow: none; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-arrow-left back-btn" onclick="history.back()"></i>
        <div>
            <div style="font-weight: 900; font-size: 18px;">CREATE TEAM</div>
            <div style="font-size: 11px; color: #aaa; margin-top: 2px;">Select exactly <span id="max-players-text">11</span> players</div>
        </div>
    </div>

    <div class="status-bar">
        <div class="player-count">Selected: <span id="selected-count">0</span>/<span id="max-allowed">11</span></div>
        <div class="wallet-bal"><i class="fa-solid fa-wallet"></i> ₹<span id="my-wallet">0.00</span></div>
    </div>

    <div class="player-list" id="player-container">
        </div>

    <div class="footer">
        <div style="font-size: 12px; color: #aaa;">Entry Fee:<br><b style="font-size: 20px; color: #fff;" id="fee-display">₹49</b></div>
        <button id="join-btn" class="join-btn" onclick="joinContest()" disabled>SELECT PLAYERS</button>
    </div>

    <script>
        // 1. 🔥 Firebase Setup
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        const phone = localStorage.getItem('userPhone') || localStorage.getItem('phone');

        // 2. 🌐 URL Data
        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('matchId') || "DEMO_MATCH";
        const entryFee = parseInt(urlParams.get('fee')) || 0; 
        const maxPlayers = parseInt(urlParams.get('maxPlayers')) || 11; 

        // Variables
        let selectedPlayers = [];
        let userWalletBalance = 0;

        // 3. 🎨 UI Update & Balance Fetch
        document.getElementById('max-players-text').innerText = maxPlayers;
        document.getElementById('max-allowed').innerText = maxPlayers;
        document.getElementById('fee-display').innerText = entryFee === 0 ? "FREE" : `₹${entryFee}`;

        if(phone) {
            db.ref('users/'+phone).on('value', s => { 
                let d = s.val() || {};
                let depBal = parseFloat(d.balance || 0); let winBal = parseFloat(d.winning_balance || 0);
                userWalletBalance = depBal + winBal;
                document.getElementById('my-wallet').innerText = userWalletBalance.toFixed(2); 
            });
        }

        // 4. 🏏 Generate Demo Players List (Aap isko baad me API se replace kar sakte ho)
        const demoPlayers = ["Virat Kohli", "Rohit Sharma", "Babar Azam", "Shaheen Afridi", "Jasprit Bumrah", "MS Dhoni", "Hardik Pandya", "Rashid Khan", "Glenn Maxwell", "David Warner", "Trent Boult", "KL Rahul", "Shadab Khan", "R Jadeja", "Steve Smith"];
        const container = document.getElementById('player-container');

        demoPlayers.forEach((playerName, index) => {
            container.innerHTML += `
                <div class="player-card" id="card-${index}" onclick="togglePlayer('${playerName}', ${index})">
                    <div class="p-info">
                        <div class="p-img"><i class="fa-solid fa-user"></i></div>
                        <div>
                            <div class="p-name">${playerName}</div>
                            <div class="p-team">BATSMAN | IND</div>
                        </div>
                    </div>
                    <div class="select-btn" id="btn-${index}"><i class="fa-solid fa-plus"></i></div>
                </div>
            `;
        });

        // 5. 🛑 Selection Logic (Smart Limiter)
        function togglePlayer(playerName, index) {
            let card = document.getElementById(`card-${index}`);
            let btn = document.getElementById(`btn-${index}`);

            // Agar pehle se selected hai toh hata do
            if(selectedPlayers.includes(playerName)) {
                selectedPlayers = selectedPlayers.filter(p => p !== playerName);
                card.classList.remove('selected');
                btn.innerHTML = `<i class="fa-solid fa-plus"></i>`;
            } 
            // Agar select karna hai toh limit check karo
            else {
                if(selectedPlayers.length >= maxPlayers) {
                    alert(`⚠️ Aap is contest me sirf ${maxPlayers} players hi chun sakte hain!`);
                    return;
                }
                selectedPlayers.push(playerName);
                card.classList.add('selected');
                btn.innerHTML = `<i class="fa-solid fa-minus"></i>`;
            }

            // Update Counter & Button Status
            document.getElementById('selected-count').innerText = selectedPlayers.length;
            
            let joinBtn = document.getElementById('join-btn');
            if(selectedPlayers.length === maxPlayers) {
                joinBtn.disabled = false;
                joinBtn.innerHTML = entryFee === 0 ? "JOIN FREE" : `PAY ₹${entryFee} & JOIN`;
            } else {
                joinBtn.disabled = true;
                joinBtn.innerHTML = `SELECT ${maxPlayers - selectedPlayers.length} MORE`;
            }
        }

        // 6. 💸 Final Join & Wallet Deduction
        function joinContest() {
            if (!phone) { alert("Bhai, pehle login kijiye!"); return; }
            if (selectedPlayers.length !== maxPlayers) { alert(`Poore ${maxPlayers} players select kijiye!`); return; }

            // Balance Check
            if (userWalletBalance < entryFee) {
                alert(`❌ Wallet mein paise kam hain! Entry Fee ₹${entryFee} hai. Aapka balance ₹${userWalletBalance.toFixed(2)} hai.`);
                return;
            }

            let btn = document.getElementById("join-btn");
            btn.innerHTML = "Joining... <i class='fa-solid fa-spinner fa-spin'></i>"; 
            btn.disabled = true;

            // Paise Kaatne Ka Logic (Database Fetch fir update)
            db.ref('users/' + phone).once('value', snapshot => {
                let d = snapshot.val();
                let depBal = parseFloat(d.balance || 0);
                let winBal = parseFloat(d.winning_balance || 0);

                if (depBal >= entryFee) {
                    depBal -= entryFee;
                } else {
                    let bachaHua = entryFee - depBal;
                    depBal = 0;
                    winBal -= bachaHua;
                }

                // Team Data
                let myTeamData = {
                    players: selectedPlayers,
                    captain: selectedPlayers[0], // Abhi pehla player default captain
                    vice_captain: selectedPlayers[1], 
                    total_points: 0,
                    rank: 0,
                    fee_paid: entryFee,
                    joinedAt: firebase.database.ServerValue.TIMESTAMP
                };

                // Firebase Save: Pehle Paise Kato, Fir Team Save Karo
                db.ref('users/' + phone).update({ balance: depBal, winning_balance: winBal })
                .then(() => {
                    return db.ref('Game/Kalyan11/Contests/' + matchId + '/Teams/' + phone).set(myTeamData);
                })
                .then(() => {
                    alert(`✅ MUBARAK HO! Aapne ₹${entryFee} wala contest join kar liya hai!`);
                    window.location.href = "Matches.html"; // Wapas Home
                })
                .catch(err => {
                    alert("Error: " + err.message);
                    btn.innerHTML = `PAY ₹${entryFee} & JOIN`; 
                    btn.disabled = false;
                });
            });
        }
    </script>
</body>
</html>
