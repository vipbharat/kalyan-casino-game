<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - Create Your Team</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --d11-red: #d0021b; --d11-green: #00a05a; --bg-main: #fff; --text-dark: #111; --text-grey: #777;}
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f0f0; color: var(--text-dark); margin: 0; padding: 0; padding-bottom: 90px; user-select: none; }
        
        /* 👑 Header (Dark like Dream11) */
        .header { background: #111; color: #fff; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100;}
        .back-btn { font-size: 20px; cursor: pointer; color: #fff; margin-right: 15px;}
        .header-info { flex-grow: 1; }
        .match-title { font-weight: 900; font-size: 16px; margin: 0;}
        .time-left { font-size: 11px; color: #ccc; margin-top: 2px;}

        /* 📊 Stats Bar (White Background) */
        .stats-bar { background: #fff; padding: 12px 15px; position: sticky; top: 54px; z-index: 99; border-bottom: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05);}
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; font-weight: bold;}
        .team-vs-lbl { font-size: 15px; font-weight: 900; color: #333;}
        .c-count { color: #d0021b; }
        
        /* Progress Bar (11 steps) */
        .progress-container { display: flex; gap: 3px; justify-content: space-between; align-items: center;}
        .p-text { font-size: 11px; font-weight: bold; color: #555; margin-right: 5px; width: 35px;}
        .p-box { flex: 1; height: 6px; background: #eee; border-radius: 2px; transform: skewX(-15deg);}
        .p-box.active { background: var(--d11-green); }

        /* 📑 Tab Bar */
        .tab-bar { display: flex; background: #fff; border-bottom: 1px solid #ddd;}
        .tab-item { flex: 1; text-align: center; padding: 10px 0; font-size: 12px; font-weight: 900; color: #888; text-transform: uppercase;}
        .tab-item.active { color: var(--d11-red); border-bottom: 3px solid var(--d11-red);}

        /* 👥 SPLIT VIEW CONTAINER (Strictly Side-by-Side) */
        .split-view { display: flex; flex-direction: row; flex-wrap: nowrap; background: #fff; width: 100%; box-sizing: border-box; align-items: flex-start;}
        
        /* Columns locked to 50% */
        .team-column { flex: 0 0 50%; max-width: 50%; box-sizing: border-box; overflow: hidden;}
        .team-column.left { border-right: 1px dashed #ccc; } /* The middle line */
        
        .team-col-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: #fafafa; border-bottom: 1px solid #eee; font-size: 11px; font-weight: bold; color: #555;}

        /* 🎴 List Style Player Row (Exact D11 Match) */
        .p-row { display: flex; align-items: center; padding: 10px 5px; border-bottom: 1px solid #f5f5f5; cursor: pointer; transition: 0.1s;}
        .p-row:active { background: #f9f9f9; }
        .p-row.selected { background: #f0fff4; }
        .p-row.disabled { opacity: 0.4; pointer-events: none; filter: grayscale(1);}
        
        .p-role { font-size: 9px; color: #888; font-weight: bold; width: 25px; text-align: center; text-transform: uppercase;}
        
        /* Player Image/Avatar */
        .p-img-box { position: relative; margin: 0 5px; }
        .p-img { width: 35px; height: 35px; border-radius: 50%; background: #eee; object-fit: cover;}
        .playing-dot { position: absolute; bottom: 0; right: 0; width: 8px; height: 8px; border-radius: 50%; background: var(--d11-green); border: 1.5px solid #fff; display: none;}
        .p-row.is-playing .playing-dot { display: block; }
        .p-row.is-benched .playing-dot { display: block; background: var(--d11-red); }

        /* Player Details */
        .p-details { flex-grow: 1; overflow: hidden; }
        .p-name { font-size: 12px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #222;}
        .p-creds { font-size: 11px; color: #555; font-weight: bold; margin-top: 2px;}

        /* Add/Remove Action Icon */
        .p-action { width: 25px; text-align: center; font-size: 16px; color: var(--d11-green); }
        .p-row.selected .p-action { color: var(--d11-red); } /* Red minus when selected */

        /* 🚀 Bottom Footer Bar */
        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 10px 15px; box-sizing: border-box; display: flex; justify-content: center; align-items: center; border-top: 1px solid #ddd; z-index: 100; gap: 10px;}
        
        .preview-btn { background: #1a1a2e; color: #fff; padding: 12px 25px; border-radius: 25px; font-weight: 900; font-size: 12px; border: none; flex: 1;}
        .next-btn { background: #f0f0f0; color: #aaa; padding: 12px 25px; border-radius: 25px; font-weight: 900; font-size: 12px; border: none; flex: 1; transition: 0.3s; cursor: not-allowed;}
        .next-btn.active { background: #fff; color: #111; border: 1px solid #ccc; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1);}
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-arrow-left back-btn" onclick="history.back()"></i>
        <div class="header-info">
            <div class="match-title">Create Team</div>
            <div class="time-left" id="matchHeader">Loading Teams...</div>
        </div>
        <div style="font-weight: 900; font-size: 12px; border: 1px solid #555; padding: 4px 8px; border-radius: 15px;">PTS</div>
    </div>

    <div class="stats-bar">
        <div class="top-row">
            <div class="team-vs-lbl" id="teamCountDisplay">TEAM A 0 - 0 TEAM B</div>
            <div style="font-size: 11px; color: #555;">Credits <span class="c-count" id="cCount">100.0</span></div>
        </div>
        <div class="progress-container">
            <div class="p-text"><span id="pCount">0</span>/11</div>
            <div id="p-indicators" style="display: flex; gap: 3px; flex: 1;">
                </div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active">Teams Lineup</div>
    </div>

    <div class="split-view" id="mainSplitView">
        <div style="text-align: center; width: 100%; padding: 50px; color:#888;">
            <i class="fa-solid fa-spinner fa-spin fa-2x"></i><br><br>Loading Players...
        </div>
    </div>

    <div class="footer">
        <button class="preview-btn" onclick="togglePreview()"><i class="fa-solid fa-eye"></i> PREVIEW</button>
        <button class="next-btn" id="nextBtn" onclick="goToCaptain()">NEXT</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('matchId');
        const contestFee = urlParams.get('fee') || 49;

        let allPlayers = [];
        let selectedIds = [];
        let creditsLeft = 100.0;
        let t1 = "T1", t2 = "T2";

        // Progress indicators setup
        const indicators = document.getElementById('p-indicators');
        for(let i=0; i<11; i++) indicators.innerHTML += `<div class="p-box" id="dot-${i}"></div>`;

        // Fetch Players
        db.ref('Game/Kalyan11/MatchPlayers/' + matchId).on('value', snapshot => {
            allPlayers = [];
            if(snapshot.exists()) {
                snapshot.forEach(c => {
                    let p = c.val(); p.id = c.key;
                    allPlayers.push(p);
                });
                
                let teams = [...new Set(allPlayers.map(x => x.team))];
                t1 = teams[0] || "T1"; t2 = teams[1] || "T2";
                
                document.getElementById('matchHeader').innerText = `${t1} vs ${t2}`;
                renderSplitView();
            }
        });

        // 🔥 SORTING LOGIC: Playing > Unannounced > Benched, then by Role 🔥
        const roleOrder = { "WK": 1, "BAT": 2, "AR": 3, "BOWL": 4 };
        const sortPlayers = (a, b) => {
            let getPriority = (status) => {
                if (status === 'playing') return 2;
                if (status === 'benched') return 0;
                return 1;
            };
            let priA = getPriority(a.playingStatus);
            let priB = getPriority(b.playingStatus);
            if (priA !== priB) return priB - priA;

            let roleA = a.role ? a.role.toUpperCase() : "BAT";
            let roleB = b.role ? b.role.toUpperCase() : "BAT";
            let orderA = roleOrder[roleA] || 5; 
            let orderB = roleOrder[roleB] || 5;
            if(orderA !== orderB) return orderA - orderB;

            return parseFloat(b.credits || 9.0) - parseFloat(a.credits || 9.0);
        };

        function renderSplitView() {
            let container = document.getElementById('mainSplitView');
            
            let t1List = allPlayers.filter(p => p.team === t1).sort(sortPlayers);
            let t2List = allPlayers.filter(p => p.team === t2).sort(sortPlayers);

            // Left Column (Team 1)
            let t1HTML = `<div class="team-column left">
                            <div class="team-col-header">
                                <div><i class="fa-solid fa-shield"></i> ${t1}</div>
                                <div>Credits</div>
                            </div>`;
            t1List.forEach(p => { t1HTML += createPlayerRow(p, t1, t2); });
            t1HTML += `</div>`;

            // Right Column (Team 2)
            let t2HTML = `<div class="team-column">
                            <div class="team-col-header">
                                <div>${t2} <i class="fa-solid fa-shield"></i></div>
                                <div>Credits</div>
                            </div>`;
            t2List.forEach(p => { t2HTML += createPlayerRow(p, t1, t2); });
            t2HTML += `</div>`;

            container.innerHTML = t1HTML + t2HTML;
            updateUI();
        }

        // 🔥 LIST STYLE PLAYER ROW 🔥
        function createPlayerRow(p, team1, team2) {
            let isSelected = selectedIds.includes(p.id);
            let cred = parseFloat(p.credits || 9.0);
            
            let t1c = allPlayers.filter(x => selectedIds.includes(x.id) && x.team === team1).length;
            let t2c = allPlayers.filter(x => selectedIds.includes(x.id) && x.team === team2).length;

            let isDisabled = false;
            if(!isSelected) {
                if(selectedIds.length >= 11 || creditsLeft - cred < 0) isDisabled = true;
                if(p.team === team1 && t1c >= 7) isDisabled = true;
                if(p.team === team2 && t2c >= 7) isDisabled = true;
            }

            let playClass = p.playingStatus === 'playing' ? 'is-playing' : (p.playingStatus === 'benched' ? 'is-benched' : '');
            let rowClass = `p-row ${playClass}`;
            if(isSelected) rowClass += " selected";
            if(isDisabled) rowClass += " disabled";

            let safeId = p.id.replace(/'/g, "\\'");
            let displayRole = p.role ? p.role.toUpperCase() : "BAT";
            
            // Icon toggle: Green plus if not selected, Red minus if selected
            let iconHtml = isSelected ? `<i class="fa-solid fa-circle-minus" style="color:var(--d11-red);"></i>` : `<i class="fa-regular fa-circle-check"></i>`;

            // Default image placeholder
            let defaultImg = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

            return `
                <div class="${rowClass}" onclick="togglePlayer('${safeId}', ${cred})">
                    <div class="p-role">${displayRole}</div>
                    <div class="p-img-box">
                        <img src="${defaultImg}" class="p-img">
                        <div class="playing-dot"></div>
                    </div>
                    <div class="p-details">
                        <div class="p-name">${p.name}</div>
                        <div class="p-creds">${cred}</div>
                    </div>
                    <div class="p-action">${iconHtml}</div>
                </div>`;
        }

        function togglePlayer(id, cred) {
            let idx = selectedIds.indexOf(id);
            if(idx > -1) {
                selectedIds.splice(idx, 1);
                creditsLeft += cred;
            } else {
                let pObj = allPlayers.find(p => p.id === id);
                let teamCount = allPlayers.filter(p => selectedIds.includes(p.id) && p.team === pObj.team).length;
                if(selectedIds.length >= 11 || creditsLeft - cred < 0 || teamCount >= 7) return;
                selectedIds.push(id);
                creditsLeft -= cred;
            }
            renderSplitView();
        }

        function updateUI() {
            document.getElementById('pCount').innerText = selectedIds.length;
            document.getElementById('cCount').innerText = creditsLeft.toFixed(1);
            
            for(let i=0; i<11; i++) {
                document.getElementById(`dot-${i}`).classList.toggle('active', i < selectedIds.length);
            }

            let t1c = allPlayers.filter(p => selectedIds.includes(p.id) && p.team === t1).length;
            let t2c = allPlayers.filter(p => selectedIds.includes(p.id) && p.team === t2).length;
            
            document.getElementById('teamCountDisplay').innerHTML = `<img src="https://cdn-icons-png.flaticon.com/512/532/532835.png" style="width:15px; vertical-align:middle; margin-right:5px;"> ${t1} <span style="color:#000;">${t1c} - ${t2c}</span> ${t2} <img src="https://cdn-icons-png.flaticon.com/512/532/532835.png" style="width:15px; vertical-align:middle; margin-left:5px;">`;

            let btn = document.getElementById('nextBtn');
            btn.classList.toggle('active', selectedIds.length === 11);
            btn.disabled = selectedIds.length !== 11;
        }

        function togglePreview() {
            alert("Team Preview (Ground view) was removed as requested! Please verify lineup here.");
        }

        function goToCaptain() {
            localStorage.setItem('kalyan_selected_team', JSON.stringify(selectedIds));
            window.location.href = `Captain.html?matchId=${matchId}&fee=${contestFee}`;
        }
    </script>
</body>
</html>
