<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - Create Team</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding-bottom: 80px; user-select: none; }
        .header { background: linear-gradient(135deg, #1a0033, #4a00e0); padding: 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        .back-btn { font-size: 20px; cursor: pointer; color: #ffd700; }
        .match-info { text-align: center; font-weight: 900; font-size: 16px; flex-grow: 1; }
        .status-bar { display: flex; justify-content: space-between; background: #111; padding: 10px 15px; border-bottom: 1px solid #333; font-size: 12px; font-weight: bold; }
        .credits { color: #ffd700; }
        .player-count { color: #00ff88; }
        .tabs { display: flex; background: #1a1a2e; border-bottom: 2px solid #333; }
        .tab { flex: 1; text-align: center; padding: 12px 0; font-weight: bold; cursor: pointer; color: #aaa; transition: 0.3s; font-size: 14px; }
        .tab.active { color: #ffd700; border-bottom: 3px solid #ffd700; background: rgba(255,215,0,0.1); }
        .player-list { padding: 10px; }
        .player-card { background: #111; border: 1px solid #333; padding: 12px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .player-card.selected { border-color: #00ff88; background: rgba(0, 255, 136, 0.1); }
        .player-left { display: flex; align-items: center; gap: 15px; }
        .p-img { width: 45px; height: 45px; background: #222; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; color: #555; border: 2px solid #444; }
        .p-name { font-weight: 900; font-size: 14px; margin-bottom: 3px; }
        .p-team { font-size: 11px; color: #aaa; font-weight: bold; }
        .player-right { text-align: right; }
        .p-credits { font-weight: bold; color: #ffd700; font-size: 14px; margin-bottom: 5px; }
        .add-btn { background: #333; color: #fff; border: 1px solid #555; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 18px; transition: 0.3s; }
        .player-card.selected .add-btn { background: #ff004c; border-color: #ff004c; transform: rotate(45deg); }
        .footer { position: fixed; bottom: 0; width: 100%; background: #111; padding: 15px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .next-btn { background: #00ff88; color: #000; padding: 12px 30px; border-radius: 5px; font-weight: 900; font-size: 16px; border: none; cursor: pointer; opacity: 0.5; pointer-events: none; transition: 0.3s; }
        .next-btn.active { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-arrow-left back-btn" onclick="history.back()"></i>
        <div class="match-info" id="matchHeader">Loading Players...</div>
        <div style="width: 20px;"></div>
    </div>

    <div class="status-bar">
        <div class="player-count">Players: <span id="pCount">0</span>/11</div>
        <div class="credits">Credits Left: <span id="cCount">100</span></div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('WK')">WK</div>
        <div class="tab" onclick="switchTab('BAT')">BAT</div>
        <div class="tab" onclick="switchTab('AR')">AR</div>
        <div class="tab" onclick="switchTab('BOWL')">BOWL</div>
    </div>

    <div id="playerContainer" class="player-list">
        <div style="text-align: center; margin-top: 50px; color: #ffd700;"><i class="fa-solid fa-spinner fa-spin"></i> Loading Squad...</div>
    </div>

    <div class="footer">
        <div style="font-size: 12px; color: #aaa;">Team preview</div>
        <button class="next-btn" id="nextBtn" onclick="goToCaptain()">NEXT <i class="fa-solid fa-arrow-right"></i></button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('matchId');
        const urlT1 = urlParams.get('t1') || "Team 1";
        const urlT2 = urlParams.get('t2') || "Team 2";

        document.getElementById('matchHeader').innerText = `${urlT1} vs ${urlT2}`;

        let allPlayers = [];
        let selectedPlayers = [];
        let totalCredits = 100;
        let currentTab = 'WK';

        // 🟢 Seedha Firebase se Players aayenge jo aapne daale the!
        db.ref('Game/Kalyan11/MatchPlayers/' + matchId).once('value', snapshot => {
            if(snapshot.exists()) {
                snapshot.forEach(child => {
                    allPlayers.push(child.val());
                });
                renderPlayers();
            } else {
                document.getElementById('playerContainer').innerHTML = "<div style='text-align:center; padding:20px; color:#ff004c;'>Is match ke khiladi Database me nahi mile!</div>";
            }
        });

        function renderPlayers() {
            let container = document.getElementById('playerContainer');
            container.innerHTML = "";
            let filteredPlayers = allPlayers.filter(p => p.role === currentTab);
            
            if(filteredPlayers.length === 0) {
                container.innerHTML = "<div style='text-align:center; padding:20px; color:#aaa;'>Is category me koi khiladi nahi hai.</div>";
                return;
            }

            filteredPlayers.forEach(p => {
                let isSelected = selectedPlayers.includes(p.id);
                let cardClass = isSelected ? "player-card selected" : "player-card";
                container.innerHTML += `
                    <div class="${cardClass}" onclick="togglePlayer('${p.id}', ${p.credits})">
                        <div class="player-left">
                            <div class="p-img"><i class="fa-solid fa-user"></i></div>
                            <div>
                                <div class="p-name">${p.name}</div>
                                <div class="p-team">${p.team} | ${p.role}</div>
                            </div>
                        </div>
                        <div class="player-right">
                            <div class="p-credits">${p.credits} Cr</div>
                            <button class="add-btn">+</button>
                        </div>
                    </div>
                `;
            });
        }

        function switchTab(role) {
            currentTab = role;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderPlayers();
        }

        function togglePlayer(id, credits) {
            let index = selectedPlayers.indexOf(id);
            if (index > -1) {
                selectedPlayers.splice(index, 1);
                totalCredits += credits;
            } else {
                if (selectedPlayers.length >= 11) { alert("Maximum 11 players!"); return; }
                if (totalCredits - credits < 0) { alert("Credits limit reached!"); return; }
                selectedPlayers.push(id);
                totalCredits -= credits;
            }
            document.getElementById('pCount').innerText = selectedPlayers.length;
            document.getElementById('cCount').innerText = totalCredits.toFixed(1);
            
            let nextBtn = document.getElementById('nextBtn');
            if(selectedPlayers.length === 11) { nextBtn.classList.add('active'); } else { nextBtn.classList.remove('active'); }
            renderPlayers();
        }

        function goToCaptain() {
            localStorage.setItem('kalyan_selected_team', JSON.stringify(selectedPlayers));
            window.location.href = `Captain.html?matchId=${matchId}`;
        }
    </script>
</body>
</html>
