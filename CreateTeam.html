<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan VIP - Create Team</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding-bottom: 90px; user-select: none; }
        .header { background: linear-gradient(135deg, #1a0033, #00ff88); padding: 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,255,136,0.3); color: #000; }
        .back-btn { font-size: 20px; cursor: pointer; font-weight: bold; }
        .match-info { text-align: center; font-weight: 900; font-size: 16px; flex-grow: 1; text-transform: uppercase; letter-spacing: 1px;}
        .status-bar { display: flex; justify-content: space-between; background: #111; padding: 10px 15px; border-bottom: 1px solid #333; font-size: 13px; font-weight: bold; position: sticky; top: 54px; z-index: 99;}
        .credits { color: #ffd700; }
        .player-count { color: #00ff88; }
        
        .split-view { display: flex; gap: 10px; padding: 10px; }
        .team-column { flex: 1; background: #0a0a14; border-radius: 8px; border: 1px solid #333; overflow: hidden; }
        .team-title { text-align: center; font-weight: 900; background: #222; padding: 10px; margin-bottom: 10px; color: #fff; font-size: 15px; border-bottom: 2px solid #555;}
        
        .player-list { padding: 0 5px; }
        .mini-card { background: #1a1a2e; border: 1px solid #444; padding: 10px; margin-bottom: 8px; border-radius: 6px; position: relative; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.5);}
        .mini-card.selected { border-color: #00ff88; background: rgba(0, 255, 136, 0.1); box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }
        
        .p-name { font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 15px;}
        .p-role { font-size: 10px; color: #aaa; margin-top: 3px;}
        
        /* 🟢🔴 Lineup Status Styles */
        .play-status { font-size: 9px; margin-top: 4px; display: flex; align-items: center; font-weight: bold; text-transform: uppercase;}
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
        .dot-green { background: #00ff88; box-shadow: 0 0 5px #00ff88; }
        .txt-green { color: #00ff88; }
        .dot-red { background: #ff004c; box-shadow: 0 0 5px #ff004c; }
        .txt-red { color: #ff004c; }
        .dot-grey { background: #777; }
        .txt-grey { color: #999; }

        .p-credits { font-size: 12px; color: #ffd700; font-weight: bold; margin-top: 5px; text-align: left;}
        
        .check-icon { position: absolute; top: 8px; right: 8px; color: #00ff88; font-size: 16px; display: none; }
        .mini-card.selected .check-icon { display: block; }
        
        .footer { position: fixed; bottom: 0; width: 100%; background: #111; padding: 15px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; z-index: 100; border-top: 2px solid #333;}
        .next-btn { background: #00ff88; color: #000; padding: 12px 30px; border-radius: 5px; font-weight: 900; font-size: 16px; border: none; cursor: pointer; opacity: 0.5; pointer-events: none; transition: 0.3s; }
        .next-btn.active { opacity: 1; pointer-events: auto; }
        
        .loader { text-align: center; margin-top: 50px; color: #00ff88; font-weight: bold; font-size: 16px; width: 100%;}
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-arrow-left back-btn" onclick="history.back()"></i>
        <div class="match-info" id="matchHeader">Loading Match...</div>
        <div style="width: 20px;"></div>
    </div>

    <div class="status-bar">
        <div class="player-count">Selected: <span id="pCount" style="font-size:16px;">0</span>/11</div>
        <div class="credits">Credits: <span id="cCount" style="font-size:16px;">100</span></div>
    </div>

    <div class="split-view" id="mainSplitView">
        <div class="loader"><i class="fa-solid fa-spinner fa-spin"></i> Khiladi aa rahe hain...</div>
    </div>

    <div class="footer">
        <div style="font-size: 12px; color: #aaa;">Team preview</div>
        <button class="next-btn" id="nextBtn" onclick="goToCaptain()">NEXT <i class="fa-solid fa-arrow-right"></i></button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('matchId') || "DUMMY_MATCH";
        const urlT1 = urlParams.get('t1') || "TEAM 1";
        const urlT2 = urlParams.get('t2') || "TEAM 2";
        const contestFee = urlParams.get('fee') || 49; 
        const isEditMode = urlParams.get('edit') === 'true'; // Check if user clicked Edit Team

        document.getElementById('matchHeader').innerText = `${urlT1} vs ${urlT2}`;

        let allPlayers = [];
        let selectedPlayers = [];
        let totalCredits = 100;
        let initialLoadDone = false;

        // Firebase Listener
        db.ref('Game/Kalyan11/MatchPlayers/' + matchId).on('value', snapshot => {
            allPlayers = []; 
            if(snapshot.exists()) {
                snapshot.forEach(child => { 
                    let pData = child.val();
                    pData.id = child.key; // Ensure ID is correct
                    allPlayers.push(pData); 
                });
            } else {
                for(let i=1; i<=11; i++) {
                    allPlayers.push({ id: urlT1+"_"+i, name: urlT1+" Player "+i, team: urlT1, role: "PLAYER", credits: 8.5 });
                    allPlayers.push({ id: urlT2+"_"+i, name: urlT2+" Player "+i, team: urlT2, role: "PLAYER", credits: 8.5 });
                }
            }

            // 🛠️ EDIT TEAM AUTO-LOAD LOGIC
            if(isEditMode && !initialLoadDone) {
                let savedTeam = JSON.parse(localStorage.getItem('kalyan_selected_team')) || [];
                savedTeam.forEach(savedId => {
                    let pObj = allPlayers.find(p => p.id === savedId);
                    if(pObj) {
                        selectedPlayers.push(savedId);
                        totalCredits -= (pObj.credits || 8.5);
                    }
                });
                updateCounters();
                initialLoadDone = true;
            }

            renderSplitPlayers();
        });

        function renderSplitPlayers() {
            let container = document.getElementById('mainSplitView');
            container.innerHTML = "";

            let uniqueTeams = [...new Set(allPlayers.map(p => p.team))];
            let team1Name = uniqueTeams[0] || urlT1;
            let team2Name = uniqueTeams[1] || urlT2;

            let t1List = allPlayers.filter(p => p.team === team1Name);
            let t2List = allPlayers.filter(p => p.team === team2Name);

            let t1HTML = `<div class="team-column">
                            <div class="team-title" style="border-bottom-color:#ffd700;">${team1Name}</div>
                            <div class="player-list">`;
            t1List.forEach(p => { t1HTML += createPlayerCard(p); });
            t1HTML += `</div></div>`;

            let t2HTML = `<div class="team-column">
                            <div class="team-title" style="border-bottom-color:#00ff88;">${team2Name}</div>
                            <div class="player-list">`;
            t2List.forEach(p => { t2HTML += createPlayerCard(p); });
            t2HTML += `</div></div>`;

            container.innerHTML = t1HTML + t2HTML;
            checkNextButton();
        }

        function createPlayerCard(p) {
            let isSelected = selectedPlayers.includes(p.id);
            let cardClass = isSelected ? "mini-card selected" : "mini-card";
            
            // 🟢🔴 STATUS LOGIC
            let sClass = "dot-grey", tClass = "txt-grey", sText = "Unannounced";
            if(p.playingStatus === "playing") { sClass = "dot-green"; tClass = "txt-green"; sText = "Playing"; }
            else if(p.playingStatus === "benched") { sClass = "dot-red"; tClass = "txt-red"; sText = "Benched"; }

            let cred = p.credits || 8.5;

            return `
                <div class="${cardClass}" onclick="togglePlayer('${p.id}', ${cred})">
                    <i class="fa-solid fa-circle-check check-icon"></i>
                    <div class="p-name">${p.name}</div>
                    <div class="p-role">${p.role || "PLAYER"}</div>
                    
                    <div class="play-status ${tClass}">
                        <span class="status-dot ${sClass}"></span> ${sText}
                    </div>

                    <div class="p-credits">${cred} Cr</div>
                </div>
            `;
        }

        function togglePlayer(id, credits) {
            let index = selectedPlayers.indexOf(id);
            if (index > -1) {
                selectedPlayers.splice(index, 1);
                totalCredits += credits;
            } else {
                if (selectedPlayers.length >= 11) { alert("Aap maximum 11 players hi chun sakte hain!"); return; }
                if (totalCredits - credits < 0) { alert("Aapke Credits khatam ho gaye hain!"); return; }
                selectedPlayers.push(id);
                totalCredits -= credits;
            }
            
            updateCounters();
            renderSplitPlayers();
        }

        function updateCounters() {
            document.getElementById('pCount').innerText = selectedPlayers.length;
            document.getElementById('cCount').innerText = totalCredits.toFixed(1);
            checkNextButton();
        }

        function checkNextButton() {
            let nextBtn = document.getElementById('nextBtn');
            if(selectedPlayers.length === 11) { 
                nextBtn.classList.add('active'); 
                nextBtn.innerHTML = 'NEXT <i class="fa-solid fa-arrow-right fa-beat"></i>';
            } else { 
                nextBtn.classList.remove('active'); 
                nextBtn.innerHTML = 'NEXT <i class="fa-solid fa-arrow-right"></i>';
            }
        }

        function goToCaptain() {
            if(selectedPlayers.length !== 11) return;
            localStorage.setItem('kalyan_selected_team', JSON.stringify(selectedPlayers));
            localStorage.setItem('kalyan_entry_fee', contestFee); 
            
            window.location.href = `Captain.html?matchId=${matchId}&t1=${urlT1}&t2=${urlT2}&fee=${contestFee}`;
        }
    </script>
</body>
</html>
