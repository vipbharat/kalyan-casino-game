<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - Create Team</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding-bottom: 90px; user-select: none; }
        .header { background: linear-gradient(135deg, #1a0033, #4a00e0); padding: 15px; display: flex; align-items: center; border-bottom: 2px solid #ffd700; position: sticky; top:0; z-index:100; }
        .back-btn { font-size: 20px; margin-right: 15px; cursor: pointer; color: #ffd700; }
        
        .status-bar { background: #111; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; font-weight: bold; font-size: 13px; }
        .team-count { color: #00ff88; }
        .backup-count { color: #ffd700; }

        /* Tabs for WK, BAT, AR, BOWL */
        .tabs { display: flex; background: #1a1a2e; border-bottom: 2px solid #333; position: sticky; top: 60px; z-index: 90; }
        .tab { flex: 1; text-align: center; padding: 12px 0; font-weight: bold; color: #aaa; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .tab.active { color: #ffd700; border-bottom: 3px solid #ffd700; background: rgba(255,215,0,0.1); }

        /* Player List */
        .player-list { padding: 10px; }
        .player-card { background: #111; border: 1px solid #333; border-radius: 8px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        
        /* Selection Colors */
        .player-card.selected-main { border-color: #00ff88; background: rgba(0,255,136,0.1); }
        .player-card.selected-backup { border-color: #ffd700; background: rgba(255,215,0,0.1); }
        
        .p-info { display: flex; align-items: center; gap: 15px; }
        .p-img { width: 45px; height: 45px; background: #222; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; color: #aaa; border: 2px solid #555; }
        .p-name { font-weight: bold; font-size: 14px; color: #fff; }
        .p-team { font-size: 11px; color: #aaa; margin-top: 3px; background: #222; padding: 2px 6px; border-radius: 4px; display: inline-block; }
        
        .select-btn { border: 2px solid #555; color: #aaa; width: 30px; height: 30px; border-radius: 50%; font-size: 16px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .selected-main .select-btn { background: #00ff88; border-color: #00ff88; color: #000; }
        .selected-backup .select-btn { background: #ffd700; border-color: #ffd700; color: #000; }
        
        .footer { position: fixed; bottom: 0; width: 100%; background: #111; padding: 15px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #333; z-index: 100; }
        .join-btn { background: #00ff88; color: #000; padding: 12px 20px; border-radius: 8px; font-weight: 900; border:none; cursor: pointer; font-size: 15px; flex: 1; margin-left: 15px; transition: 0.2s; }
        .join-btn:disabled { background: #444; color: #888; cursor: not-allowed; }

        .loader { text-align: center; margin-top: 50px; color: #ffd700; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-arrow-left back-btn" onclick="history.back()"></i>
        <div>
            <div style="font-weight: 900; font-size: 16px;">CREATE TEAM</div>
            <div style="font-size: 11px; color: #aaa; margin-top: 2px;">Pick 11 Players + 4 Backups</div>
        </div>
    </div>

    <div class="status-bar">
        <div class="team-count">Team: <span id="main-count">0</span>/<span id="max-allowed">11</span></div>
        <div class="backup-count">Backups: <span id="backup-count">0</span>/4</div>
        <div style="color: #aaa;">Fee: <span id="fee-display" style="color:#fff; font-weight:bold;">₹0</span></div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="showTab('WK')">WK</div>
        <div class="tab" onclick="showTab('BAT')">BAT</div>
        <div class="tab" onclick="showTab('AR')">AR</div>
        <div class="tab" onclick="showTab('BOWL')">BOWL</div>
    </div>

    <div class="player-list" id="player-container">
        <div class="loader"><i class="fa-solid fa-spinner fa-spin"></i> Fetching Real Squads...</div>
    </div>

    <div class="footer">
        <button id="join-btn" class="join-btn" onclick="joinContest()" disabled>SELECT 11 PLAYERS</button>
    </div>

    <script>
        // 1. 🔥 Firebase Setup
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        const phone = localStorage.getItem('userPhone') || localStorage.getItem('phone');

        // 2. 🌐 URL Data & API
        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('matchId');
        const entryFee = parseInt(urlParams.get('fee')) || 0; 
        const maxPlayers = parseInt(urlParams.get('maxPlayers')) || 11; 
        const CRICKET_API_KEY = "eceba419-2e6c-4d23-8f6b-b7cf3edf5bd1"; // Aapki Key

        document.getElementById('max-allowed').innerText = maxPlayers;
        document.getElementById('fee-display').innerText = entryFee === 0 ? "FREE" : `₹${entryFee}`;

        // Variables
        let allPlayers = []; 
        let mainTeam = []; 
        let backupTeam = [];
        let currentTab = 'WK';
        let userWalletBalance = 0;

        // Fetch Wallet Balance
        if(phone) {
            db.ref('users/'+phone).once('value', s => { 
                let d = s.val() || {};
                userWalletBalance = parseFloat(d.balance || 0) + parseFloat(d.winning_balance || 0);
            });
        }

        // 3. 🏏 FETCH REAL SQUADS FROM CRICAPI
        async function fetchRealSquads() {
            if(!matchId) { alert("Match Error!"); return; }
            
            try {
                const response = await fetch(`https://api.cricapi.com/v1/match_squad?apikey=${CRICKET_API_KEY}&id=${matchId}`);
                const data = await response.json();
                
                if(data.data && data.data.length > 0) {
                    allPlayers = [];
                    // Extract players from both teams
                    data.data.forEach(team => {
                        let tName = team.teamName.substring(0,3).toUpperCase();
                        team.players.forEach(p => {
                            // API Roles: Wicketkeeper, Batsman, Allrounder, Bowler
                            let role = "BAT";
                            if(p.role.toLowerCase().includes("keeper")) role = "WK";
                            else if(p.role.toLowerCase().includes("all")) role = "AR";
                            else if(p.role.toLowerCase().includes("bowl")) role = "BOWL";
                            
                            allPlayers.push({ id: p.id, name: p.name, role: role, team: tName });
                        });
                    });
                    showTab('WK'); // Pehle WK dikhao
                } else {
                    document.getElementById('player-container').innerHTML = "<div class='loader'>⚠️ Squads not announced yet for this match!</div>";
                }
            } catch(e) {
                document.getElementById('player-container').innerHTML = "<div class='loader'>Failed to load players. Refresh page.</div>";
            }
        }

        fetchRealSquads(); // Load hote hi API call

        // 4. 🎨 SHOW PLAYERS BY TAB
        function showTab(role) {
            currentTab = role;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');

            const container = document.getElementById('player-container');
            container.innerHTML = "";
            
            let filteredPlayers = allPlayers.filter(p => p.role === role);
            
            if(filteredPlayers.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:20px; color:#888;">No players found in this category.</div>`;
                return;
            }

            filteredPlayers.forEach((p) => {
                let cardClass = "";
                let iconHTML = `<i class="fa-solid fa-plus"></i>`;
                
                // Check color
                if(mainTeam.includes(p.name)) { cardClass = "selected-main"; iconHTML = `<i class="fa-solid fa-check"></i>`; }
                else if(backupTeam.includes(p.name)) { cardClass = "selected-backup"; iconHTML = `B`; }

                container.innerHTML += `
                    <div class="player-card ${cardClass}" id="card-${p.id}" onclick="togglePlayer('${p.id}', '${p.name}')">
                        <div class="p-info">
                            <div class="p-img"><i class="fa-solid fa-user"></i></div>
                            <div>
                                <div class="p-name">${p.name}</div>
                                <div class="p-team">${p.team} | ${p.role}</div>
                            </div>
                        </div>
                        <div class="select-btn" id="btn-${p.id}">${iconHTML}</div>
                    </div>
                `;
            });
        }

        // 5. 🛑 SMART SELECTION LOGIC (MAIN + BACKUP)
        function togglePlayer(id, name) {
            let card = document.getElementById(`card-${id}`);
            let btn = document.getElementById(`btn-${id}`);

            // A. Agar Main Team mein hai, toh hata do
            if(mainTeam.includes(name)) {
                mainTeam = mainTeam.filter(p => p !== name);
                card.classList.remove('selected-main');
                btn.innerHTML = `<i class="fa-solid fa-plus"></i>`;
            } 
            // B. Agar Backup Team mein hai, toh hata do
            else if(backupTeam.includes(name)) {
                backupTeam = backupTeam.filter(p => p !== name);
                card.classList.remove('selected-backup');
                btn.innerHTML = `<i class="fa-solid fa-plus"></i>`;
            } 
            // C. Agar Naya player select kiya...
            else {
                // Pehle Main Team bharo (11 players)
                if(mainTeam.length < maxPlayers) {
                    mainTeam.push(name);
                    card.classList.add('selected-main');
                    btn.innerHTML = `<i class="fa-solid fa-check"></i>`;
                } 
                // Agar Main Team full hai, toh Backups bharo (Max 4)
                else if(backupTeam.length < 4) {
                    backupTeam.push(name);
                    card.classList.add('selected-backup');
                    btn.innerHTML = `B`; // 'B' for Backup
                } 
                else {
                    alert(`⚠️ Limit Reached! 11 Players + 4 Backups pure ho gaye hain.`);
                    return;
                }
            }

            updateStatusAndButton();
        }

        function updateStatusAndButton() {
            document.getElementById('main-count').innerText = mainTeam.length;
            document.getElementById('backup-count').innerText = backupTeam.length;
            
            let joinBtn = document.getElementById('join-btn');
            
            // Jab tak Main team puri nahi hoti
            if(mainTeam.length < maxPlayers) {
                joinBtn.disabled = true;
                joinBtn.innerHTML = `SELECT ${maxPlayers - mainTeam.length} MORE PLAYERS`;
                joinBtn.style.background = "#444";
                joinBtn.style.color = "#888";
            } 
            // Jab Main team puri ho jaye (Backups optional hain)
            else {
                joinBtn.disabled = false;
                let btnText = entryFee === 0 ? "JOIN FREE" : `PAY ₹${entryFee} & JOIN`;
                if(backupTeam.length < 4) { btnText = "ADD BACKUPS OR " + btnText; }
                
                joinBtn.innerHTML = btnText;
                joinBtn.style.background = "#00ff88";
                joinBtn.style.color = "#000";
            }
        }

        // 6. 💸 FINAL JOIN & DEDUCTION
        function joinContest() {
            if (!phone) { alert("Pehle login kijiye!"); return; }
            if (userWalletBalance < entryFee) { alert(`❌ Wallet mein paise kam hain! Entry Fee ₹${entryFee} hai.`); return; }

            let btn = document.getElementById("join-btn");
            btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Processing..."; btn.disabled = true;

            db.ref('users/' + phone).once('value', snapshot => {
                let d = snapshot.val();
                let depBal = parseFloat(d.balance || 0); let winBal = parseFloat(d.winning_balance || 0);

                if (depBal >= entryFee) { depBal -= entryFee; } 
                else { let bachaHua = entryFee - depBal; depBal = 0; winBal -= bachaHua; }

                // Saving Both Teams
                let myTeamData = {
                    players: mainTeam,
                    backups: backupTeam,
                    captain: mainTeam[0] || "", 
                    total_points: 0,
                    fee_paid: entryFee,
                    joinedAt: firebase.database.ServerValue.TIMESTAMP
                };

                db.ref('users/' + phone).update({ balance: depBal, winning_balance: winBal })
                .then(() => db.ref('Game/Kalyan11/Contests/' + matchId + '/Teams/' + phone).set(myTeamData))
                .then(() => {
                    alert(`✅ MUBARAK HO! Aapne ₹${entryFee} wala contest join kar liya hai!`);
                    window.location.href = "Matches.html"; 
                })
                .catch(err => { alert("Error: " + err.message); location.reload(); });
            });
        }
    </script>
</body>
</html>
