<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan VIP - Master Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: #fff; padding: 20px; }
        .container { background: #1e1e1e; padding: 20px; border-radius: 10px; max-width: 600px; margin: auto; border: 1px solid #333;}
        h2 { color: #00ff88; text-align: center; border-bottom: 1px dashed #555; padding-bottom: 10px;}
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; color: #aaa; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; box-sizing: border-box; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 5px; font-size: 14px; }
        textarea { height: 100px; resize: vertical; }
        .row { display: flex; gap: 15px; }
        .row .input-group { flex: 1; }
        button { background: #00ff88; color: #000; font-weight: bold; padding: 15px; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-size: 16px; margin-top: 10px;}
        .note { font-size: 12px; color: #ffeb3b; margin-top: -10px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏏 MANUAL MATCH LAUNCHER</h2>

    <div class="input-group">
        <label>🔗 Cricbuzz Live Match Link (Engine Ke Liye)</label>
        <input type="text" id="engineUrl" placeholder="Yahan link paste karein taaki engine points update kare...">
    </div>

    <div class="input-group">
        <label>Match Title</label>
        <input type="text" id="matchName" placeholder="Jaise: QTG vs KRK, PSL 2026">
    </div>

    <div class="row">
        <div class="input-group">
            <label>Team 1 Name</label>
            <input type="text" id="t1Name" placeholder="QTG">
        </div>
        <div class="input-group">
            <label>Team 2 Name</label>
            <input type="text" id="t2Name" placeholder="KRK">
        </div>
    </div>

    <div class="input-group">
        <label>🧑‍🤝‍🧑 Team 1 Players (Manual Entry)</label>
        <span class="note">Har khiladi ka naam Enter daba kar nayi line mein likhein ya Comma (,) lagayein.</span>
        <textarea id="t1Players" placeholder="Khiladi 1&#10;Khiladi 2&#10;Khiladi 3..."></textarea>
    </div>

    <div class="input-group">
        <label>🧑‍🤝‍🧑 Team 2 Players (Manual Entry)</label>
        <span class="note">Har khiladi ka naam Enter daba kar nayi line mein likhein ya Comma (,) lagayein.</span>
        <textarea id="t2Players" placeholder="Khiladi 1&#10;Khiladi 2&#10;Khiladi 3..."></textarea>
    </div>

    <button onclick="launchManualMatch()">🚀 LAUNCH MATCH TO APP</button>
</div>

<script>
    // Apni Firebase configuration yahan check kar lena
    const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    function getSmartRole(n) {
        n = n.toLowerCase();
        if (n.includes("bumrah") || n.includes("shami") || n.includes("siraj") || n.includes("amir") || n.includes("rashid") || n.includes("zampa")) return "BOWL";
        if (n.includes("dhoni") || n.includes("pant") || n.includes("rizwan") || n.includes("de kock") || n.includes("buttler")) return "WK";
        if (n.includes("jadeja") || n.includes("pandya") || n.includes("maxwell") || n.includes("shadab") || n.includes("narine")) return "AR";
        return "BAT";
    }

    function processPlayers(text) {
        if(!text) return [];
        return text.split(/[,\n]+/).map(n => n.trim()).filter(n => n.length > 0);
    }

    function launchManualMatch() {
        let eUrl = document.getElementById('engineUrl').value.trim();
        let mName = document.getElementById('matchName').value.trim();
        let t1 = document.getElementById('t1Name').value.trim().toUpperCase();
        let t2 = document.getElementById('t2Name').value.trim().toUpperCase();
        let p1Text = document.getElementById('t1Players').value.trim();
        let p2Text = document.getElementById('t2Players').value.trim();

        if(!eUrl || !mName || !t1 || !t2 || !p1Text || !p2Text) {
            alert("⚠️ Kripya saari details (Link aur Khiladiyon ke naam) bharein!"); return;
        }

        let p1List = processPlayers(p1Text);
        let p2List = processPlayers(p2Text);
        
        let mId = "MATCH_" + Date.now();
        let pData = {};
        
        p1List.forEach((cn, i) => { pData[t1+"_"+i] = { id: t1+"_"+i, name: cn, team: t1.substring(0,3), role: getSmartRole(cn), credits: 8.5, points: 0 }; });
        p2List.forEach((cn, i) => { pData[t2+"_"+i] = { id: t2+"_"+i, name: cn, team: t2.substring(0,3), role: getSmartRole(cn), credits: 8.5, points: 0 }; });

        // Link ko 'engineUrl' mein save kiya taaki live score chal sake
        db.ref('Game/Kalyan11/LiveMatches/' + mId).set({ 
            engineUrl: eUrl, 
            name: mName, 
            team1: t1, 
            team2: t2, 
            status: "Upcoming" 
        });

        db.ref('Game/Kalyan11/MatchPlayers/' + mId).set(pData).then(() => {
            alert("✅ BOMB! Match App me live ho gaya hai!");
            window.location.reload();
        });
    }
</script>
</body>
</html>
