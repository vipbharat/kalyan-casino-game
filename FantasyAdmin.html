<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - VIP Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding: 20px; }
        .header { background: linear-gradient(135deg, #ffd700, #ffaa00); padding: 15px; text-align: center; font-weight: 900; font-size: 20px; border-radius: 10px; margin-bottom: 20px; color: #000; box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); text-transform: uppercase; }
        .admin-box { background: #111; border: 2px solid #00ff88; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.6); position: relative; }
        .badge { background: #00ff88; color: #000; padding: 4px 12px; font-size: 12px; font-weight: bold; border-radius: 20px; position: absolute; top: -12px; right: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.5);}
        .admin-box h3 { color: #fff; margin-top: 0; border-bottom: 1px dashed #444; padding-bottom: 10px; font-size: 18px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #ffd700; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; box-sizing: border-box; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; font-size: 14px; }
        input:focus { border-color: #00ff88; outline: none; }
        .row { display: flex; gap: 15px; }
        .row .input-group { flex: 1; }
        .btn-live { background: #00ff88; color: #000; font-weight: 900; padding: 15px; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-size: 16px; text-transform: uppercase; margin-top: 10px;}
        .btn-live:hover { background: #fff; box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4); }
        #statusBox { text-align: center; font-weight: bold; margin-top: 15px; font-size: 15px; padding: 12px; border-radius: 8px; display: none; }
        .success { color: #00ff88; border: 1px solid #00ff88; background: #002211;}
        .error { color: #ff004c; border: 1px solid #ff004c; background: #220011;}
    </style>
</head>
<body>

    <div class="header"><i class="fa-solid fa-crown"></i> Kalyan Master Admin</div>

    <div class="admin-box">
        <div class="badge"><i class="fa-solid fa-bolt"></i> Super Fast Tracker</div>
        <h3>Add Live Match + Link</h3>
        <p style="font-size: 12px; color: #aaa; margin-top: -5px; margin-bottom: 15px;">Sirf details aur link dalo, baaki engine khud sambhalega!</p>
        
        <div class="input-group">
            <input type="text" id="mName" placeholder="Match Title (e.g., IND vs AUS T20)">
        </div>
        <div class="row">
            <div class="input-group">
                <input type="text" id="t1" placeholder="Team 1 (e.g., IND)">
            </div>
            <div class="input-group">
                <input type="text" id="t2" placeholder="Team 2 (e.g., AUS)">
            </div>
        </div>
        <div class="input-group">
            <label><i class="fa-solid fa-link"></i> Cricbuzz / Google Live Score Link</label>
            <input type="text" id="liveLink" placeholder="https://www.cricbuzz.com/...">
        </div>
        <button class="btn-live" onclick="createMatch()"><i class="fa-solid fa-rocket"></i> Launch Match</button>
        <div id="statusBox"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        function showMsg(msg, type) {
            let sb = document.getElementById('statusBox');
            sb.style.display = "block"; sb.innerHTML = msg; sb.className = type;
            setTimeout(() => { sb.style.display = "none"; }, 5000);
        }

        function createMatch() {
            let mName = document.getElementById('mName').value.trim();
            let t1 = document.getElementById('t1').value.trim().toUpperCase();
            let t2 = document.getElementById('t2').value.trim().toUpperCase();
            let link = document.getElementById('liveLink').value.trim();

            if(!mName || !t1 || !t2 || !link) return showMsg("⚠️ Saare dabbe bharna zaroori hai!", "error");
            showMsg("<i class='fa-solid fa-spinner fa-spin'></i> Match app me jaa raha hai...", "success");

            let matchId = "MATCH_" + new Date().getTime();
            let allPlayers = [];

            // Dummy Players auto-generate taaki turant start ho
            for(let i=1; i<=11; i++){
                let pRole = i===1 ? "WK" : (i<6 ? "BAT" : (i<9 ? "AR" : "BOWL"));
                allPlayers.push({ id: t1 + "_" + i, name: t1 + " Player " + i, team: t1.substring(0,3), role: pRole, credits: 8.5 });
                allPlayers.push({ id: t2 + "_" + i, name: t2 + " Player " + i, team: t2.substring(0,3), role: pRole, credits: 8.5 });
            }

            let playersData = {};
            allPlayers.forEach(p => { playersData[p.id] = p; });

            let matchData = { 
                name: mName, team1: t1, team2: t2, 
                dateTimeGMT: new Date().toISOString(), 
                status: "Live", // Status Live rahega taaki engine track kare
                googleLiveLink: link 
            };

            db.ref('Game/Kalyan11/LiveMatches/' + matchId).set(matchData);
            db.ref('Game/Kalyan11/MatchPlayers/' + matchId).set(playersData)
            .then(() => {
                showMsg("✅ BOMB! Match aur Tracker dono shuru ho gaye!", "success");
                document.getElementById('mName').value = ""; document.getElementById('t1').value = "";
                document.getElementById('t2').value = ""; document.getElementById('liveLink').value = "";
            })
            .catch(err => showMsg("⚠️ Error: " + err.message, "error"));
        }
    </script>
</body>
</html>
