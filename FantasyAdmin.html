<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan VIP - Master Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding: 20px; }
        .header { background: linear-gradient(135deg, #1a0033, #00ff88); padding: 15px; text-align: center; font-weight: 900; font-size: 20px; border-radius: 10px; margin-bottom: 20px; color: #000; box-shadow: 0 0 15px rgba(0,255,136,0.4); }
        .btn-db { background: #8e2de2; color: #fff; font-weight: bold; padding: 12px; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-size: 16px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(142, 45, 226, 0.4);}
        .admin-box { background: #111; border: 1px solid #333; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .admin-box h3 { color: #ffd700; margin-top: 0; border-bottom: 1px dashed #444; padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #aaa; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; box-sizing: border-box; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; font-size: 14px;}
        textarea { height: 90px; resize: vertical; }
        .row { display: flex; gap: 15px; }
        .row .input-group { flex: 1; }
        .btn-live { background: #00ff88; color: #000; font-weight: 900; padding: 15px; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .dashboard-card { background: #1a1a2e; border: 1px solid #4a00e0; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .action-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn-edit { background: #ffd700; color: #000; border: none; padding: 10px; font-weight: bold; border-radius: 4px; cursor: pointer; flex: 1; }
        .btn-delete { background: #ff004c; color: #fff; border: none; padding: 10px; font-weight: bold; border-radius: 4px; cursor: pointer; flex: 1; }
        .edit-box { background: #050510; padding: 15px; border: 1px dashed #ffd700; border-radius: 5px; margin-top: 15px; display: none; }
        .btn-save-lineup { background: #00ff88; width: 100%; padding: 12px; border: none; font-weight: 900; cursor: pointer; border-radius: 5px; color: #000; margin-top: 10px;}
        #statusBox { text-align: center; font-weight: bold; margin-bottom: 15px; font-size: 16px; margin-top: 10px;}
        .success { color: #00ff88; } .error { color: #ff004c; }
    </style>
</head>
<body>

    <div class="header">👑 KALYAN VIP MASTER ADMIN</div>

    <button class="btn-db" onclick="window.location.href='allteam.html'">
        <i class="fa-solid fa-database"></i> Open All Teams Database (Free Time Entry)
    </button>

    <div class="admin-box">
        <h3>1. Launch Match To Engine</h3>
        <div class="input-group"><label>🔗 Engine Live URL</label><input type="text" id="engineUrl" placeholder="Paste link for engine to scrape..."></div>
        <div class="input-group"><label>Match Title</label><input type="text" id="matchName" placeholder="e.g., Final T20 Match"></div>
        
        <p style="font-size: 11px; color: #ffd700; margin-top:-5px;">💡 Tip: Team ka naam daalkar bahar click karein, purane khiladi apne aap aa jayenge!</p>
        <div class="row">
            <div class="input-group"><label>Team 1 Name</label><input type="text" id="t1Name" placeholder="e.g., IND" onblur="fetchSavedSquad('t1Name', 't1Players', 'msg1')"></div>
            <div class="input-group"><label>Team 2 Name</label><input type="text" id="t2Name" placeholder="e.g., AUS" onblur="fetchSavedSquad('t2Name', 't2Players', 'msg2')"></div>
        </div>
        <div class="input-group"><label>Match Start Time</label><input type="datetime-local" id="matchTime"></div>

        <h3 style="margin-top:20px;">2. Match Squads</h3>
        <p style="font-size: 11px; color: #00ff88; margin-top:-10px;">Yahan nayi team likhenge toh wo automatically Database me hamesha ke liye save ho jayegi.</p>
        <div class="input-group">
            <label>Team 1 Players <span id="msg1" style="color:#00ff88; font-size:11px; display:none; float:right;">✨ Database se aa gaye!</span></label>
            <textarea id="t1Players" placeholder="Yahan khiladiyon ke naam aayenge..."></textarea>
        </div>
        <div class="input-group">
            <label>Team 2 Players <span id="msg2" style="color:#00ff88; font-size:11px; display:none; float:right;">✨ Database se aa gaye!</span></label>
            <textarea id="t2Players" placeholder="Yahan khiladiyon ke naam aayenge..."></textarea>
        </div>
        
        <button class="btn-live" onclick="launchSmartMatch()">🚀 LAUNCH MATCH & SAVE TO DATABASE</button>
        <div id="statusBox"></div>
    </div>

    <div class="admin-box">
        <h3>📊 Active Matches (Engine Dashboard)</h3>
        <div id="dashboardList"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        function getSmartRole(n) {
            n = n.toLowerCase();
            if (n.includes("bumrah") || n.includes("shami") || n.includes("siraj") || n.includes("boult") || n.includes("starc") || n.includes("cummins") || n.includes("chahal") || n.includes("kuldeep") || n.includes("rashid") || n.includes("nortje") || n.includes("rabada")) return "BOWL";
            if (n.includes("dhoni") || n.includes("pant") || n.includes("rahul") || n.includes("samson") || n.includes("de kock") || n.includes("buttler") || n.includes("ishan")) return "WK";
            if (n.includes("jadeja") || n.includes("pandya") || n.includes("maxwell") || n.includes("stoinis") || n.includes("axar") || n.includes("russell") || n.includes("narine") || n.includes("curran")) return "AR";
            return "BAT";
        }

        function fetchSavedSquad(inputId, textAreaId, msgId) {
            let teamName = document.getElementById(inputId).value.trim().toUpperCase();
            if(!teamName) return;

            db.ref('Game/Kalyan11/SavedSquads/' + teamName).once('value', snap => {
                if(snap.exists()) {
                    document.getElementById(textAreaId).value = snap.val(); 
                    let msg = document.getElementById(msgId);
                    msg.style.display = "block"; 
                    setTimeout(() => { msg.style.display = "none"; }, 4000);
                }
            });
        }

        function launchSmartMatch() {
            let eUrl = document.getElementById('engineUrl').value.trim();
            let mName = document.getElementById('matchName').value.trim();
            let t1 = document.getElementById('t1Name').value.trim().toUpperCase();
            let t2 = document.getElementById('t2Name').value.trim().toUpperCase();
            let mTime = document.getElementById('matchTime').value;
            let p1Text = document.getElementById('t1Players').value.trim();
            let p2Text = document.getElementById('t2Players').value.trim();
            let status = document.getElementById('statusBox');

            if(!eUrl || !mName || !t1 || !t2 || !p1Text || !p2Text) {
                status.innerHTML = "⚠️ Kripya upar ki saari details aur khiladi bharein!"; status.className = "error"; return;
            }

            status.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Engine aur Database update ho raha hai..."; status.className = "success";

            // 🔥 YAHAN HOTA HAI JADOO: Nayi team ko 'allteam' database me permanent save kar dena!
            db.ref('Game/Kalyan11/SavedSquads/' + t1).set(p1Text);
            db.ref('Game/Kalyan11/SavedSquads/' + t2).set(p2Text);

            let mId = "MATCH_" + Date.now();
            let pData = {};
            
            p1Text.split(',').forEach((name, i) => { let cn = name.trim(); if(cn) pData[t1+"_"+i] = { id: t1+"_"+i, name: cn, team: t1.substring(0,3), role: getSmartRole(cn), credits: 8.5 }; });
            p2Text.split(',').forEach((name, i) => { let cn = name.trim(); if(cn) pData[t2+"_"+i] = { id: t2+"_"+i, name: cn, team: t2.substring(0,3), role: getSmartRole(cn), credits: 8.5 }; });

            db.ref('Game/Kalyan11/LiveMatches/' + mId).set({ engineUrl: eUrl, name: mName, team1: t1, team2: t2, dateTimeGMT: new Date(mTime).toISOString(), status: "Upcoming" });
            db.ref('Game/Kalyan11/MatchPlayers/' + mId).set(pData).then(() => {
                status.innerHTML = "✅ BOMB! Match Live Ho Gaya Aur Nayi Teams Database Me Save Ho Gayi!";
                
                document.getElementById('engineUrl').value = ""; document.getElementById('matchName').value = "";
                document.getElementById('t1Name').value = ""; document.getElementById('t2Name').value = "";
                document.getElementById('t1Players').value = ""; document.getElementById('t2Players').value = "";
            });
        }

        db.ref('Game/Kalyan11/LiveMatches').on('value', snap => {
            let dash = document.getElementById('dashboardList');
            dash.innerHTML = snap.exists() ? "" : "<div style='text-align:center; color:#aaa;'>Koi match live nahi hai.</div>";
            snap.forEach(child => {
                let m = child.val(); let mId = child.key;
                dash.innerHTML += `
                    <div class="dashboard-card">
                        <h4 style="margin:0 0 5px; color:#00ff88;">${m.team1} vs ${m.team2}</h4>
                        <div style="font-size:12px; color:#aaa; margin-bottom:10px;">${m.name}</div>
                        <div class="action-btns">
                            <button class="btn-edit" onclick="openEditBox('${mId}', '${m.team1}', '${m.team2}')">Edit Lineup</button>
                            <button class="btn-delete" onclick="deleteMatch('${mId}')">Delete Match</button>
                        </div>
                        <div id="editBox_${mId}" class="edit-box">
                            <label style="color:#ffd700; font-size:12px;">${m.team1} Players</label><textarea id="editT1_${mId}"></textarea>
                            <label style="color:#ffd700; font-size:12px; margin-top:10px;">${m.team2} Players</label><textarea id="editT2_${mId}"></textarea>
                            <button class="btn-save-lineup" onclick="updateLineup('${mId}', '${m.team1}', '${m.team2}')">✅ Update Lineup in App</button>
                        </div>
                    </div>`;
            });
        });

        function openEditBox(mId, t1, t2) {
            let box = document.getElementById(`editBox_${mId}`);
            if(box.style.display === "block") { box.style.display = "none"; return; }
            box.style.display = "block";
            db.ref('Game/Kalyan11/MatchPlayers/' + mId).once('value', snap => {
                let t1N = []; let t2N = [];
                if(snap.exists()) snap.forEach(c => { let p = c.val(); if(p.team===t1||p.team===t1.substring(0,3)) t1N.push(p.name); else t2N.push(p.name); });
                document.getElementById(`editT1_${mId}`).value = t1N.join(", "); document.getElementById(`editT2_${mId}`).value = t2N.join(", ");
            });
        }

        function updateLineup(mId, t1, t2) {
            let p1Text = document.getElementById(`editT1_${mId}`).value.trim(); let p2Text = document.getElementById(`editT2_${mId}`).value.trim();
            if(!p1Text || !p2Text) { alert("Dono team ke khiladi daalein!"); return; }
            
            // Edit Lineup karne par bhi database me latest squad save ho jayega
            db.ref('Game/Kalyan11/SavedSquads/' + t1).set(p1Text);
            db.ref('Game/Kalyan11/SavedSquads/' + t2).set(p2Text);

            let pData = {};
            p1Text.split(',').forEach((name, i) => { let cn = name.trim(); if(cn) pData[t1+"_"+i] = { id: t1+"_"+i, name: cn, team: t1.substring(0,3), role: getSmartRole(cn), credits: 8.5 }; });
            p2Text.split(',').forEach((name, i) => { let cn = name.trim(); if(cn) pData[t2+"_"+i] = { id: t2+"_"+i, name: cn, team: t2.substring(0,3), role: getSmartRole(cn), credits: 8.5 }; });
            db.ref('Game/Kalyan11/MatchPlayers/' + mId).set(pData).then(() => {
                alert("✅ Lineup Successfully Updated in App!"); document.getElementById(`editBox_${mId}`).style.display = "none";
            });
        }

        function deleteMatch(mId) { if(confirm("Pakka is match ko delete karna hai? Engine band ho jayega.")) { db.ref('Game/Kalyan11/LiveMatches/'+mId).remove(); db.ref('Game/Kalyan11/MatchPlayers/'+mId).remove(); } }
    </script>
</body>
</html>
