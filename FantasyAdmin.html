<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan VIP - Auto Engine Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #050510; color: #fff; margin: 0; padding: 20px; }
        .header { background: linear-gradient(135deg, #1a0033, #00ff88); padding: 15px; text-align: center; font-weight: 900; font-size: 20px; border-radius: 10px; margin-bottom: 20px; color: #000; box-shadow: 0 0 15px rgba(0,255,136,0.4); }
        .admin-box { background: #111; border: 1px solid #333; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .admin-box h3 { color: #00ff88; margin-top: 0; border-bottom: 1px dashed #444; padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #aaa; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; box-sizing: border-box; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; font-size: 14px;}
        textarea { height: 60px; resize: vertical; font-size: 11px; color: #888; }
        .row { display: flex; gap: 15px; }
        .row .input-group { flex: 1; }
        .btn-live { background: #00ff88; color: #000; font-weight: 900; padding: 15px; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-size: 18px; transition: 0.3s; margin-bottom: 10px; box-shadow: 0 0 15px rgba(0,255,136,0.3);}
        
        .split-move-container { display: flex; gap: 15px; width: 100%; margin-bottom: 15px; align-items: flex-start;}
        .move-col-wrap { flex: 1; display: flex; flex-direction: column; width: 50%; }
        .move-col { background: #0a0a14; border: 1px dashed #555; border-radius: 8px; padding: 8px; display: flex; flex-direction: column; gap: 6px; min-height: 150px; max-height: 300px; overflow-y: auto;}
        
        .move-card { background: #1a1a2e; border: 1px solid #333; padding: 8px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: bold; }
        .t1-move-card { border-left: 3px solid #00ff88; }
        .t2-move-card { border-left: 3px solid #ffd700; }
        
        .move-btn { background: #222; border: 1px solid #444; color: #fff; padding: 5px 12px; border-radius: 4px; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .move-btn:active { transform: scale(0.8); background: #333;}
        .move-btn.to-right { color: #ffd700; }
        .move-btn.to-left { color: #00ff88; }

        .match-row { background: #1a1a2e; border: 1px solid #4a00e0; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;}
        .match-info h4 { margin: 0 0 5px; font-size: 16px; color: #ffd700; text-transform: uppercase;}
        .match-info p { margin: 0; font-size: 12px; color: #aaa;}
        
        .action-btns { display: flex; gap: 8px; flex-direction: column;}
        .btn-delete { background: #ff004c; color: #fff; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 11px;}
        .btn-toss { background: #ffd700; color: #000; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: 900; font-size: 11px; }
        .btn-payout { background: #00ff88; color: #000; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: 900; font-size: 11px; }
        
        #statusBox { text-align: center; font-weight: bold; margin-bottom: 15px; font-size: 14px; margin-top: 10px;}
        .success { color: #00ff88; } .error { color: #ff004c; } .loading { color: #ffd700; }
        .clear-btn { background: #ff004c; border: none; color: white; padding: 0 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* 🔥 SQUAD & TOSS MODAL STYLES 🔥 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #111; width: 95%; max-width: 600px; max-height: 85vh; border-radius: 15px; border: 2px solid #00ff88; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 30px rgba(0,255,136,0.2);}
        .modal-header { padding: 15px; background: #1a1a2e; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { margin: 0; color: #ffd700; font-size: 18px; text-transform: uppercase;}
        .close-btn { color: #ff004c; font-size: 24px; font-weight: bold; cursor: pointer; }
        
        .modal-body { padding: 15px; overflow-y: auto; flex: 1; display: flex; gap: 15px; align-items: flex-start;} 
        
        .team-col { flex: 1; display: flex; flex-direction: column; gap: 8px; width: 100%;}
        .team-col h3 { margin: 0 0 10px 0; text-align: center; font-size: 14px; padding-bottom: 5px; border-bottom: 1px dashed #555; text-transform: uppercase; }
        .t1-header { color: #00ff88; }
        .t2-header { color: #ffd700; }

        /* NAYA PLAYER CARD DESIGN (EYE TOGGLE) */
        .player-edit-card { flex-shrink: 0; background: #222; border: 1px solid #444; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s;}
        .player-edit-card.dimmed { opacity: 0.4; border-color: #555; filter: grayscale(50%); }
        .p-top-row { display: flex; align-items: stretch; border-bottom: 1px solid #444; }
        
        .vis-btn { background: #111; border: none; border-right: 1px solid #444; color: #fff; padding: 0 12px; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .vis-btn:active { transform: scale(0.8); }
        .vis-btn.app-visible { color: #00ff88; }
        .vis-btn.app-hidden { color: #ff004c; }

        .p-toggle { flex-grow: 1; padding: 10px; cursor: pointer; text-align: center; font-size: 11px; font-weight: bold; transition: 0.2s; user-select: none; }
        .p-toggle.playing { background: rgba(0,255,136,0.2); color: #00ff88; }
        .p-toggle.benched { background: rgba(255,0,76,0.2); color: #ff004c; }
        .p-toggle.unannounced { color: #fff; }
        
        .role-select { background: #111; color: #ffd700; border: none; padding: 6px; font-size: 10px; font-weight: bold; text-align: center; outline: none; cursor: pointer; width: 100%;}
        
        .add-p-btn { background: #222; border: 1px dashed #00ff88; color: #00ff88; padding: 8px; border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: bold; margin-bottom: 5px; width: 100%; transition: 0.2s;}
        .add-p-btn:active { background: #00ff88; color: #000; }

        .modal-footer { padding: 15px; background: #1a1a2e; border-top: 1px solid #333; }
        .btn-save-lineup { width: 100%; background: #00ff88; color: #000; font-weight: 900; padding: 12px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer;}
        #payoutLoader { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; flex-direction:column; justify-content:center; align-items:center; color:#00ff88; font-size:20px; font-weight:900; }
    </style>
</head>
<body>

    <div class="header">👑 KALYAN VIP AUTO ENGINE</div>

    <div class="admin-box">
        <h3><i class="fa-solid fa-plus"></i> 1. Add New Match</h3>
        <div class="input-group">
            <label>🔗 Engine Live URL</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="engineUrl" placeholder="Cricbuzz link paste karein..." oninput="autoFetchPlayersFromLink()">
                <button class="clear-btn" onclick="clearLink()"><i class="fa-solid fa-xmark"></i></button>
            </div>
        </div>
        <div id="statusBox"></div>
        <div class="input-group"><label>Match Title</label><input type="text" id="matchName" placeholder="Auto Fill Hoga..."></div>
        <div class="row">
            <div class="input-group"><label>Team 1 Name</label><input type="text" id="t1Name" placeholder="Auto"></div>
            <div class="input-group"><label>Team 2 Name</label><input type="text" id="t2Name" placeholder="Auto"></div>
        </div>
        <div class="input-group"><label>⏱️ Match Start Time</label><input type="datetime-local" id="matchTime"></div>
        
        <h3 style="margin-top:20px;"><i class="fa-solid fa-wand-magic-sparkles"></i> 2. Fix Squads (Move Players)</h3>
        <p style="font-size: 11px; color: #aaa; margin-top: 0; margin-bottom: 15px;">Dono teams ke khiladi check karein, agar koi galat team mein hai toh arrow se use dusri team mein bhej dein.</p>
        
        <textarea id="t1Players" style="display:none;"></textarea> 
        <textarea id="t2Players" style="display:none;"></textarea> 

        <div class="split-move-container">
            <div class="move-col-wrap">
                <label id="lblT1Move" style="color: #00ff88; text-align: center; text-transform: uppercase;">1 Team</label>
                <div class="move-col" id="t1MoveCol" style="border-color: #00ff88;"></div>
            </div>

            <div class="move-col-wrap">
                <label id="lblT2Move" style="color: #ffd700; text-align: center; text-transform: uppercase;">2 Team</label>
                <div class="move-col" id="t2MoveCol" style="border-color: #ffd700;"></div>
            </div>
        </div>

        <button class="btn-live" onclick="launchSmartMatch()">🚀 LAUNCH VIP MATCH</button>
    </div>

    <div class="admin-box">
        <h3><i class="fa-solid fa-gamepad"></i> 3. Manage Matches & Squads</h3>
        <div id="activeMatchesList"><div style="text-align:center; color:#ffd700;"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div></div>
    </div>

    <div id="lineupModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🟢 SQUAD & TOSS MANAGER</h2>
                <div class="close-btn" onclick="closeLineupModal()">&times;</div>
            </div>
            <div class="modal-body" id="modalPlayerList">
                </div>
            <div class="modal-footer">
                <button class="btn-save-lineup" onclick="saveLineupToFirebase()"><i class="fa-solid fa-cloud-arrow-up"></i> PUBLISH TO APP</button>
            </div>
        </div>
    </div>

    <div id="payoutLoader">
        <i class="fa-solid fa-cog fa-spin" style="font-size:50px; margin-bottom:20px; color:#ffd700;"></i>
        <div id="payoutText">Calculating Exact Ranks...</div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        let globalApiMatchId = "";
        let currentEditingMatchId = "";
        let currentPlayersData = {};

        function clearLink() { document.getElementById('engineUrl').value = ''; document.getElementById('statusBox').innerHTML = ''; }

        function parsePlayers(text) {
            if (text.includes(',')) return text.replace(/\n/g, ' ').split(',').map(n=>n.trim()).filter(n=>n);
            else return text.split('\n').map(n=>n.trim()).filter(n=>n);
        }

        async function autoFetchPlayersFromLink() {
            let urlInput = document.getElementById('engineUrl').value.trim();
            let status = document.getElementById('statusBox');
            if(!urlInput) return;
            let matchIdMatch = urlInput.match(/\/(\d+)\//) || urlInput.match(/\d{4,}/);
            if(!matchIdMatch) { status.innerHTML = "⚠️ Match ID nahi mili!"; return; }
            globalApiMatchId = matchIdMatch[1] || matchIdMatch[0];
            status.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Fetching..."; status.className = "loading";
            try {
                let response = await fetch(`https://kalyan-point-enginee-rjkh.vercel.app/api/scout`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ apiMatchId: globalApiMatchId }) });
                let data = await response.json();
                if(data.success) {
                    document.getElementById('t1Name').value = data.t1Name; 
                    document.getElementById('t2Name').value = data.t2Name;
                    document.getElementById('t1Players').value = data.t1Players; 
                    document.getElementById('t2Players').value = data.t2Players;
                    document.getElementById('matchName').value = `${data.t1Name} vs ${data.t2Name} Live Match`;
                    status.innerHTML = "✅ Data Loaded!"; status.className = "success";
                    renderMoveSystem(); 
                }
            } catch(e) { status.innerHTML = "⚠️ Error"; status.className = "error"; }
        }

        function renderMoveSystem() {
            let t1Arr = parsePlayers(document.getElementById('t1Players').value);
            let t2Arr = parsePlayers(document.getElementById('t2Players').value);
            let t1Name = document.getElementById('t1Name').value || "Team 1";
            let t2Name = document.getElementById('t2Name').value || "Team 2";
            
            document.getElementById('lblT1Move').innerText = `1 ${t1Name} (${t1Arr.length})`;
            document.getElementById('lblT2Move').innerText = `2 ${t2Name} (${t2Arr.length})`;
            
            let t1Html = ""; 
            t1Arr.forEach((p, i) => { 
                t1Html += `<div class="move-card t1-move-card"><span>${p}</span><button class="move-btn to-right" onclick="movePlayer(1, ${i})"><i class="fa-solid fa-arrow-right-long"></i></button></div>`; 
            }); 
            document.getElementById('t1MoveCol').innerHTML = t1Html;
            
            let t2Html = ""; 
            t2Arr.forEach((p, i) => { 
                t2Html += `<div class="move-card t2-move-card"><button class="move-btn to-left" onclick="movePlayer(2, ${i})"><i class="fa-solid fa-arrow-left-long"></i></button><span>${p}</span></div>`; 
            }); 
            document.getElementById('t2MoveCol').innerHTML = t2Html;
        }

        function movePlayer(fromTeam, index) {
            let t1Arr = parsePlayers(document.getElementById('t1Players').value);
            let t2Arr = parsePlayers(document.getElementById('t2Players').value);
            if (fromTeam === 1) { t2Arr.push(t1Arr.splice(index, 1)[0]); } 
            else { t1Arr.push(t2Arr.splice(index, 1)[0]); }
            document.getElementById('t1Players').value = t1Arr.join(', ');
            document.getElementById('t2Players').value = t2Arr.join(', ');
            renderMoveSystem();
        }

        function getSmartRole(name) {
            let n = name.toLowerCase();
            const wk = ["dhoni", "pant", "rahul", "samson", "kishan", "saha", "karthik", "de kock", "buttler", "pooran"];
            if (wk.some(w => n.includes(w))) return "WK";
            const ar = ["jadeja", "pandya", "maxwell", "narine", "russell", "stoinis", "curran", "moeen"];
            if (ar.some(a => n.includes(a))) return "AR";
            const bowl = ["bumrah", "shami", "siraj", "rashid", "chahal", "boult", "rabada", "nortje", "starc", "cummins"];
            if (bowl.some(b => n.includes(b))) return "BOWL";
            return "BAT";
        }

        function launchSmartMatch() {
            let eUrl = document.getElementById('engineUrl').value.trim();
            let mName = document.getElementById('matchName').value.trim();
            let t1 = document.getElementById('t1Name').value.trim().toUpperCase();
            let t2 = document.getElementById('t2Name').value.trim().toUpperCase();
            
            let t1Arr = parsePlayers(document.getElementById('t1Players').value);
            let t2Arr = parsePlayers(document.getElementById('t2Players').value);
            let rawTime = document.getElementById('matchTime').value; 
            
            if(!mName || !t1 || !t2 || t1Arr.length === 0 || t2Arr.length === 0 || !rawTime) return alert("⚠️ Details bhariye!");

            let msTime = new Date(rawTime).getTime();
            let mId = globalApiMatchId ? globalApiMatchId : "MATCH_" + Date.now();
            let pData = {};
            let safeT1 = t1.replace(/[^a-zA-Z0-9]/g, '');
            let safeT2 = t2.replace(/[^a-zA-Z0-9]/g, '');

            // Naya Feature: inApp = true (By default sabhi app mein dikhenge jab tak admin hide na kare)
            t1Arr.forEach((cn, i) => { pData[safeT1 + "_" + i] = { name: cn, team: safeT1.substring(0,3), role: getSmartRole(cn), credits: 8.5, points: 0, playingStatus: "unannounced", inApp: true }; });
            t2Arr.forEach((cn, i) => { pData[safeT2 + "_" + i] = { name: cn, team: safeT2.substring(0,3), role: getSmartRole(cn), credits: 8.5, points: 0, playingStatus: "unannounced", inApp: true }; });

            db.ref('Game/Kalyan11/VIPMatches/' + mId).set({ engineUrl: eUrl, name: mName, team1: t1, team2: t2, timestamp: msTime, status: "Upcoming" });
            
            // App ko list bhejo aur Admin ke paas ek Ghost Copy bana lo
            db.ref('Game/Kalyan11/AdminFullSquads/' + mId).set(pData);
            db.ref('Game/Kalyan11/MatchPlayers/' + mId).set(pData);
            
            db.ref('Game/Kalyan11/LiveEngine/' + mId).set({ matchId: mId, cricbuzzLink: eUrl, wakeUpTime: msTime - 1200000 })
            .then(() => { alert("✅ Match Launched Successfully!"); location.reload(); });
        }

        db.ref('Game/Kalyan11/VIPMatches').on('value', snapshot => {
            let container = document.getElementById('activeMatchesList'); container.innerHTML = "";
            snapshot.forEach(child => {
                let match = child.val();
                container.innerHTML += `<div class="match-row">
                    <div class="match-info"><h4>${match.team1} vs ${match.team2}</h4><p>${match.name}</p></div>
                    <div class="action-btns">
                        <button class="btn-toss" onclick="openLineupModal('${child.key}')">SQUAD & TOSS</button>
                        <button class="btn-payout" onclick="processPerfectPayout('${child.key}')">PAY WINNERS</button>
                        <button class="btn-delete" onclick="deleteMatch('${child.key}')">DELETE</button>
                    </div>
                </div>`;
            });
        });

        function deleteMatch(mId) { 
            if(confirm("Delete this match?")) { 
                db.ref('Game/Kalyan11/VIPMatches/'+mId).remove(); 
                db.ref('Game/Kalyan11/LiveEngine/'+mId).remove(); 
                db.ref('Game/Kalyan11/MatchPlayers/'+mId).remove();
                db.ref('Game/Kalyan11/AdminFullSquads/'+mId).remove();
            } 
        }

        // 🔥 GHOST SQUAD LOGIC 🔥
        function openLineupModal(matchId) {
            currentEditingMatchId = matchId;
            document.getElementById('lineupModal').style.display = 'flex';
            
            // Pehle Admin ka Ghost data check karega, nahi mila toh App ka data uthayega
            db.ref('Game/Kalyan11/AdminFullSquads/' + matchId).once('value', snap => {
                if(snap.exists()) {
                    currentPlayersData = snap.val();
                    renderModalList();
                } else {
                    db.ref('Game/Kalyan11/MatchPlayers/' + matchId).once('value', snap2 => {
                        currentPlayersData = snap2.val() || {};
                        Object.values(currentPlayersData).forEach(p => p.inApp = true); // Purane matches ko support dene ke liye
                        renderModalList();
                    });
                }
            });
        }
        
        function renderModalList() {
            let container = document.getElementById('modalPlayerList'); 
            container.innerHTML = "";
            
            let teams = [...new Set(Object.values(currentPlayersData).map(p => p.team))];
            let team1 = teams[0] || "Team 1";
            let team2 = teams[1] || "Team 2";

            let t1Html = `<div class="team-col"><h3 class="t1-header">1 ${team1}</h3>
                          <button class="add-p-btn" onclick="addNewPlayerToTeam('${team1}')">+ Add Naya Player</button>`;
            let t2Html = `<div class="team-col"><h3 class="t2-header">2 ${team2}</h3>
                          <button class="add-p-btn" onclick="addNewPlayerToTeam('${team2}')">+ Add Naya Player</button>`;

            Object.keys(currentPlayersData).forEach(pKey => {
                let p = currentPlayersData[pKey];
                let isAppVisible = p.inApp !== false;
                let s = p.playingStatus === 'playing' ? 'playing' : (p.playingStatus === 'benched' ? 'benched' : 'unannounced');
                let r = p.role || 'BAT'; 
                
                let cardHtml = `
                <div class="player-edit-card ${!isAppVisible ? 'dimmed' : ''}">
                    <div class="p-top-row">
                        <button class="vis-btn ${isAppVisible ? 'app-visible' : 'app-hidden'}" onclick="toggleVisibility('${pKey}')" title="${isAppVisible ? 'App mein dikh raha hai' : 'App se chupaya gaya hai'}">
                            <i class="fa-solid ${isAppVisible ? 'fa-eye' : 'fa-eye-slash'}"></i>
                        </button>
                        <div class="p-toggle ${s}" onclick="toggleStatus('${pKey}')">${p.name}</div>
                    </div>
                    <select class="role-select" onchange="changeRole('${pKey}', this.value)">
                        <option value="WK" ${r === 'WK' ? 'selected' : ''}>WK</option>
                        <option value="BAT" ${r === 'BAT' ? 'selected' : ''}>BAT</option>
                        <option value="AR" ${r === 'AR' ? 'selected' : ''}>AR</option>
                        <option value="BOWL" ${r === 'BOWL' ? 'selected' : ''}>BOWL</option>
                    </select>
                </div>`;

                if(p.team === team1) { t1Html += cardHtml; } else { t2Html += cardHtml; }
            });

            t1Html += `</div>`; t2Html += `</div>`;
            container.innerHTML = t1Html + t2Html; 
        }

        // Player HIDE/SHOW Function
        function toggleVisibility(k) {
            currentPlayersData[k].inApp = !(currentPlayersData[k].inApp !== false);
            renderModalList();
        }

        // NEW PLAYER ADD Function
        function addNewPlayerToTeam(teamName) {
            let pName = prompt(`Naye khiladi ka naam likhein (${teamName} ke liye):`);
            if(pName && pName.trim() !== "") {
                let safeTeam = teamName.substring(0,3).replace(/[^a-zA-Z0-9]/g, '');
                let pKey = safeTeam + "_NEW_" + Math.floor(Math.random()*10000);
                currentPlayersData[pKey] = {
                    name: pName.trim(), team: safeTeam, role: "BAT", credits: 8.5, points: 0,
                    playingStatus: "playing", // Naya hai toh by default playing kar do
                    inApp: true
                };
                renderModalList();
            }
        }

        function toggleStatus(k) {
            let p = currentPlayersData[k];
            p.playingStatus = p.playingStatus === "playing" ? "benched" : "playing";
            renderModalList(); 
        }

        function changeRole(k, newRole) { currentPlayersData[k].role = newRole; }
        
        function saveLineupToFirebase() {
            let appVisiblePlayers = {};
            // Jo chhupaye nahi gaye hain, unhe App ki list mein daalo
            Object.keys(currentPlayersData).forEach(k => {
                if(currentPlayersData[k].inApp !== false) {
                    appVisiblePlayers[k] = currentPlayersData[k];
                }
            });

            // Pura Data Admin Ghost memory mein daalo, aur Chhanta hua Data App mein daalo
            db.ref('Game/Kalyan11/AdminFullSquads/' + currentEditingMatchId).set(currentPlayersData);
            db.ref('Game/Kalyan11/MatchPlayers/' + currentEditingMatchId).set(appVisiblePlayers).then(() => { 
                alert("✅ App mein sirf chune hue players Update ho gaye hain!"); 
                closeLineupModal(); 
            });
        }
        function closeLineupModal() { document.getElementById('lineupModal').style.display = 'none'; }
        
        function calculatePrizeLogic(rank, entry, totalSpots) { if(entry === 0) return 0; if(entry === 99) { if(rank === 1) return 50000; if(rank <= 10) return 1000; return 0; } if(rank === 1) return Math.floor(entry * totalSpots * 0.4); if(rank <= Math.floor(totalSpots * 0.4)) return entry; return 0; }

        async function processPerfectPayout(matchId) {
            if(!confirm("⚠️ PAYOUT KAREIN?")) return;
            const loader = document.getElementById('payoutLoader'); loader.style.display = 'flex';
            try {
                let pSnap = await db.ref('Game/Kalyan11/MatchPlayers/' + matchId).once('value');
                let playersObj = pSnap.val() || {};
                let tSnap = await db.ref('Game/Kalyan11/Contests/' + matchId + '/Teams').once('value');
                let allRealTeams = [];

                if(tSnap.exists()) {
                    tSnap.forEach(child => {
                        let t = child.val();
                        let calculatedPoints = 0;
                        Object.values(t.players || {}).forEach(pKey => {
                            let livePt = parseFloat(playersObj[pKey]?.points || 0);
                            if(pKey === t.captain) calculatedPoints += (livePt * 2);
                            else if(pKey === t.viceCaptain) calculatedPoints += (livePt * 1.5);
                            else calculatedPoints += livePt;
                        });
                        allRealTeams.push({ teamKey: child.key, phone: t.phone, entry_paid: parseInt(t.entry_paid || 99), points: parseFloat(calculatedPoints.toFixed(1)), payment_status: t.payment_status || "PENDING" });
                        db.ref(`Game/Kalyan11/Contests/${matchId}/Teams/${child.key}`).update({total_points: calculatedPoints});
                    });
                }
                allRealTeams.sort((a,b) => b.points - a.points);
                let totalPaidUsers = 0;
                for(let r = 0; r < allRealTeams.length; r++) {
                    let currentTeam = allRealTeams[r];
                    let rank = r + 1;
                    let prize = calculatePrizeLogic(rank, currentTeam.entry_paid, 100); 
                    if(prize > 0 && currentTeam.payment_status !== "PAID") {
                        await db.ref(`Game/Kalyan11/Contests/${matchId}/Teams/${currentTeam.teamKey}`).update({ payment_status: "PAID" });
                        let wSnap = await db.ref(`users/${currentTeam.phone}`).once('value');
                        let currentWinBal = parseFloat(wSnap.val()?.winning_balance || 0);
                        await db.ref(`users/${currentTeam.phone}`).update({ winning_balance: currentWinBal + prize });
                        totalPaidUsers++;
                    }
                }
                await db.ref(`Game/Kalyan11/VIPMatches/${matchId}`).update({ timestamp: new Date().getTime() - 15000000 });
                loader.style.display = 'none'; alert(`✅ PAYOUT SUCCESSFUL!\nTotal Winners Paid: ${totalPaidUsers}`);
            } catch (error) { loader.style.display = 'none'; alert("❌ ERROR: " + error.message); }
        }
    </script>
