<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - Master Match Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding: 20px; }
        .header { background: linear-gradient(135deg, #1a0033, #00ff88); padding: 15px; text-align: center; font-weight: 900; font-size: 20px; border-radius: 10px; margin-bottom: 20px; color: #000; box-shadow: 0 0 15px rgba(0, 255, 136, 0.4); }
        
        .admin-box { background: #111; border: 1px solid #333; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.6); margin-bottom: 20px; }
        .admin-box h3 { color: #ffd700; margin-top: 0; border-bottom: 1px dashed #444; padding-bottom: 10px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #aaa; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; box-sizing: border-box; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; font-size: 14px; }
        textarea { height: 90px; resize: vertical; }
        input:focus, textarea:focus { border-color: #00ff88; outline: none; }
        
        .row { display: flex; gap: 15px; }
        .row .input-group { flex: 1; }

        .btn-live { background: #ff004c; color: #fff; font-weight: 900; padding: 15px; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-size: 18px; transition: 0.3s; box-shadow: 0 4px 10px rgba(255, 0, 76, 0.3); }
        .btn-live:hover { background: #00ff88; color: #000; }
        
        #statusBox { text-align: center; font-weight: bold; margin-top: 15px; font-size: 16px; }
        .success { color: #00ff88; }
        .error { color: #ff004c; }
    </style>
</head>
<body>

    <div class="header">👑 KALYAN 11 MASTER GENERATOR</div>

    <div class="admin-box">
        <h3>1. Match Details</h3>
        <div class="input-group">
            <label>Match Title (e.g., IPL T20 Match)</label>
            <input type="text" id="matchName" placeholder="Enter Match Name">
        </div>
        
        <div class="row">
            <div class="input-group">
                <label>Team 1 Name</label>
                <input type="text" id="t1Name" placeholder="e.g., CSK">
            </div>
            <div class="input-group">
                <label>Team 2 Name</label>
                <input type="text" id="t2Name" placeholder="e.g., RCB">
            </div>
        </div>

        <div class="input-group">
            <label>Match Start Time</label>
            <input type="datetime-local" id="matchTime">
        </div>

        <div class="input-group">
            <label>Google Live Score Link (Optional)</label>
            <input type="text" id="liveScoreLink" placeholder="Paste Google Search URL here (e.g., Malawi vs Ghana)">
        </div>
    </div>

    <div class="admin-box">
        <h3>2. Paste Squad (Comma Separated)</h3>
        <p style="font-size: 11px; color: #aaa; margin-top: -10px;">Khiladiyon ke naam Google se copy karein aur comma (,) laga kar paste karein.</p>
        
        <div class="input-group">
            <label>Team 1 Players (11-15 Khiladi)</label>
            <textarea id="t1Players" placeholder="M S Dhoni, Ruturaj Gaikwad, Ravindra Jadeja, Deepak Chahar..."></textarea>
        </div>

        <div class="input-group">
            <label>Team 2 Players (11-15 Khiladi)</label>
            <textarea id="t2Players" placeholder="Virat Kohli, Faf du Plessis, Glenn Maxwell, Mohammed Siraj..."></textarea>
        </div>
    </div>

    <button class="btn-live" onclick="generateMyOwnMatch()">🔥 CREATE ASALI MATCH</button>
    
    <div id="statusBox"></div>

    <script>
        // 🔥 Aapka Firebase
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        function generateMyOwnMatch() {
            let mName = document.getElementById('matchName').value.trim();
            let t1 = document.getElementById('t1Name').value.trim().toUpperCase();
            let t2 = document.getElementById('t2Name').value.trim().toUpperCase();
            let mTime = document.getElementById('matchTime').value;
            let liveLink = document.getElementById('liveScoreLink').value.trim(); // Naya Google Link
            let p1Text = document.getElementById('t1Players').value.trim();
            let p2Text = document.getElementById('t2Players').value.trim();
            let status = document.getElementById('statusBox');

            if(!mName || !t1 || !t2 || !mTime || !p1Text || !p2Text) {
                status.innerHTML = "⚠️ Kripya saare zaroori dabbe (boxes) bharein!";
                status.className = "error";
                return;
            }

            status.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Aapka match ban raha hai...";
            status.className = "success";

            // 1. Players ko Comma se alag karna
            let t1Array = p1Text.split(',').map(n => n.trim()).filter(n => n !== "");
            let t2Array = p2Text.split(',').map(n => n.trim()).filter(n => n !== "");

            // Match ID banana
            let matchId = "CUSTOM_" + new Date().getTime();
            let allPlayers = [];

            // Team 1 Khiladi setup
            t1Array.forEach((name, index) => {
                let pRole = index === 0 ? "WK" : (index < 5 ? "BAT" : (index < 8 ? "AR" : "BOWL")); 
                let creds = (Math.floor(Math.random() * 5) * 0.5) + 8.0; 
                allPlayers.push({ id: t1 + "_" + index, name: name, team: t1.substring(0,3), role: pRole, credits: creds });
            });

            // Team 2 Khiladi setup
            t2Array.forEach((name, index) => {
                let pRole = index === 0 ? "WK" : (index < 5 ? "BAT" : (index < 8 ? "AR" : "BOWL"));
                let creds = (Math.floor(Math.random() * 5) * 0.5) + 8.0;
                allPlayers.push({ id: t2 + "_" + index, name: name, team: t2.substring(0,3), role: pRole, credits: creds });
            });

            let playersData = {};
            allPlayers.forEach(p => { playersData[p.id] = p; });

            // 🔥 Yahan liveLink database mein save ho jayega
            let matchData = {
                name: mName, team1: t1, team2: t2, 
                dateTimeGMT: new Date(mTime).toISOString(), status: "Upcoming", source: "CustomAdmin",
                googleLiveLink: liveLink 
            };

            // Firebase Save
            db.ref('Game/Kalyan11/LiveMatches/' + matchId).set(matchData);
            db.ref('Game/Kalyan11/MatchPlayers/' + matchId).set(playersData)
            .then(() => {
                status.innerHTML = "✅ BOMB! Match aur Players App me LIVE ho gaye hain!";
                // Form saaf kar do
                document.getElementById('matchName').value = "";
                document.getElementById('t1Name').value = "";
                document.getElementById('t2Name').value = "";
                document.getElementById('matchTime').value = "";
                document.getElementById('liveScoreLink').value = "";
                document.getElementById('t1Players').value = "";
                document.getElementById('t2Players').value = "";
            })
            .catch(error => {
                status.innerHTML = "⚠️ Firebase Error: " + error.message;
                status.className = "error";
            });
        }
    </script>
</body>
</html>
