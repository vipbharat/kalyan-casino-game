<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - Master Match Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding: 20px; }
        .header { background: linear-gradient(135deg, #1a0033, #00ff88); padding: 15px; text-align: center; font-weight: 900; font-size: 20px; border-radius: 10px; margin-bottom: 20px; color: #000; box-shadow: 0 0 15px rgba(0, 255, 136, 0.4); }
        
        .admin-box { background: #111; border: 1px solid #333; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.6); margin-bottom: 20px; }
        .box-quick { border: 2px solid #00ff88; position: relative; }
        .badge { background: #00ff88; color: #000; padding: 3px 10px; font-size: 11px; font-weight: bold; border-radius: 20px; position: absolute; top: -10px; right: 10px; }
        
        .admin-box h3 { color: #ffd700; margin-top: 0; border-bottom: 1px dashed #444; padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #aaa; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; box-sizing: border-box; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; font-size: 14px; }
        textarea { height: 70px; resize: vertical; }
        input:focus, textarea:focus { border-color: #00ff88; outline: none; }
        
        .row { display: flex; gap: 15px; }
        .row .input-group { flex: 1; }

        .btn-live { background: #ff004c; color: #fff; font-weight: 900; padding: 15px; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-size: 18px; transition: 0.3s; box-shadow: 0 4px 10px rgba(255, 0, 76, 0.3); margin-top: 10px; }
        .btn-live:hover { background: #00ff88; color: #000; }
        .btn-quick { background: #00ff88; color: #000; box-shadow: 0 4px 10px rgba(0, 255, 136, 0.3); }
        .btn-quick:hover { background: #fff; }
        
        #statusBox { text-align: center; font-weight: bold; margin-top: 15px; font-size: 16px; position: sticky; bottom: 10px; background: #000; padding: 10px; border-radius: 8px;}
        .success { color: #00ff88; border: 1px solid #00ff88;}
        .error { color: #ff004c; border: 1px solid #ff004c;}
    </style>
</head>
<body>

    <div class="header">👑 KALYAN 11 ADMIN PANEL</div>

    <div class="admin-box box-quick">
        <div class="badge">Super Fast</div>
        <h3>⚡ 1. Quick Live Match (Sirf Link Se)</h3>
        <p style="font-size: 12px; color: #aaa; margin-top: -5px;">Isme khiladiyon ke naam likhne ki zaroorat nahi hai. Dummy khiladi apne aap ban jayenge.</p>
        
        <div class="row">
            <div class="input-group">
                <input type="text" id="qMatchName" placeholder="Match Name (e.g. IND vs AUS)">
            </div>
        </div>
        <div class="row">
            <div class="input-group">
                <input type="text" id="qT1" placeholder="Team 1 (e.g. IND)">
            </div>
            <div class="input-group">
                <input type="text" id="qT2" placeholder="Team 2 (e.g. AUS)">
            </div>
        </div>
        <div class="input-group">
            <label>Live Score Link (Cricbuzz/Google)</label>
            <input type="text" id="qLink" placeholder="Paste Link Here...">
        </div>
        <button class="btn-live btn-quick" onclick="createQuickMatch()">🚀 START QUICK LIVE MATCH</button>
    </div>

    <div class="admin-box">
        <h3>🛠️ 2. Full Match (Asali Khiladiyon ke sath)</h3>
        <p style="font-size: 12px; color: #aaa; margin-top: -5px;">Ise tab use karein jab aapko saare 22 asali naam khud dalne hon.</p>
        
        <div class="input-group">
            <input type="text" id="matchName" placeholder="Enter Match Name">
        </div>
        <div class="row">
            <div class="input-group">
                <input type="text" id="t1Name" placeholder="Team 1">
            </div>
            <div class="input-group">
                <input type="text" id="t2Name" placeholder="Team 2">
            </div>
        </div>
        <div class="input-group">
            <textarea id="t1Players" placeholder="Team 1 Players (Comma separated)"></textarea>
        </div>
        <div class="input-group">
            <textarea id="t2Players" placeholder="Team 2 Players (Comma separated)"></textarea>
        </div>
        <button class="btn-live" onclick="generateMyOwnMatch()">🔥 CREATE FULL MATCH</button>
    </div>

    <div id="statusBox" style="display:none;"></div>

    <script>
        // 🔥 Aapka Firebase
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        const status = document.getElementById('statusBox');

        function showStatus(msg, type) {
            status.style.display = "block";
            status.innerHTML = msg;
            status.className = type;
            setTimeout(() => { status.style.display = "none"; }, 5000);
        }

        // 🚀 NAYA FUNCTION (Sirf Link Ke Liye)
        function createQuickMatch() {
            let mName = document.getElementById('qMatchName').value.trim();
            let t1 = document.getElementById('qT1').value.trim().toUpperCase();
            let t2 = document.getElementById('qT2').value.trim().toUpperCase();
            let liveLink = document.getElementById('qLink').value.trim();

            if(!mName || !t1 || !t2 || !liveLink) {
                return showStatus("⚠️ Upar ke 4 dabbe zaroor bharein!", "error");
            }

            showStatus("<i class='fa-solid fa-spinner fa-spin'></i> Quick Match ban raha hai...", "success");

            let matchId = "QUICK_" + new Date().getTime();
            let allPlayers = [];

            // Dummy Khiladi apne aap banana
            for(let i=1; i<=11; i++){
                let pRole = i===1 ? "WK" : (i<6 ? "BAT" : (i<9 ? "AR" : "BOWL"));
                allPlayers.push({ id: t1 + "_" + i, name: t1 + " Player " + i, team: t1.substring(0,3), role: pRole, credits: 8.5 });
                allPlayers.push({ id: t2 + "_" + i, name: t2 + " Player " + i, team: t2.substring(0,3), role: pRole, credits: 8.5 });
            }

            let playersData = {};
            allPlayers.forEach(p => { playersData[p.id] = p; });

            let matchData = { name: mName, team1: t1, team2: t2, dateTimeGMT: new Date().toISOString(), status: "Live", source: "QuickAdmin", googleLiveLink: liveLink };

            db.ref('Game/Kalyan11/LiveMatches/' + matchId).set(matchData);
            db.ref('Game/Kalyan11/MatchPlayers/' + matchId).set(playersData)
            .then(() => {
                showStatus("✅ BOMB! Quick Match aur Link LIVE ho gaye!", "success");
                document.getElementById('qMatchName').value = ""; document.getElementById('qT1').value = "";
                document.getElementById('qT2').value = ""; document.getElementById('qLink').value = "";
            })
            .catch(error => showStatus("⚠️ Error: " + error.message, "error"));
        }

        // 🛠️ PURANA FUNCTION (Full details ke liye)
        function generateMyOwnMatch() {
            let mName = document.getElementById('matchName').value.trim();
            let t1 = document.getElementById('t1Name').value.trim().toUpperCase();
            let t2 = document.getElementById('t2Name').value.trim().toUpperCase();
            let p1Text = document.getElementById('t1Players').value.trim();
            let p2Text = document.getElementById('t2Players').value.trim();

            if(!mName || !t1 || !t2 || !p1Text || !p2Text) {
                return showStatus("⚠️ Kripya saare dabbe bharein!", "error");
            }

            showStatus("<i class='fa-solid fa-spinner fa-spin'></i> Full Match ban raha hai...", "success");

            let t1Array = p1Text.split(',').map(n => n.trim()).filter(n => n !== "");
            let t2Array = p2Text.split(',').map(n => n.trim()).filter(n => n !== "");
            let matchId = "CUSTOM_" + new Date().getTime();
            let allPlayers = [];

            t1Array.forEach((name, index) => {
                let pRole = index === 0 ? "WK" : (index < 5 ? "BAT" : (index < 8 ? "AR" : "BOWL")); 
                allPlayers.push({ id: t1 + "_" + index, name: name, team: t1.substring(0,3), role: pRole, credits: 8.5 });
            });
            t2Array.forEach((name, index) => {
                let pRole = index === 0 ? "WK" : (index < 5 ? "BAT" : (index < 8 ? "AR" : "BOWL"));
                allPlayers.push({ id: t2 + "_" + index, name: name, team: t2.substring(0,3), role: pRole, credits: 8.5 });
            });

            let playersData = {};
            allPlayers.forEach(p => { playersData[p.id] = p; });

            let matchData = { name: mName, team1: t1, team2: t2, dateTimeGMT: new Date().toISOString(), status: "Upcoming", source: "CustomAdmin" };

            db.ref('Game/Kalyan11/LiveMatches/' + matchId).set(matchData);
            db.ref('Game/Kalyan11/MatchPlayers/' + matchId).set(playersData)
            .then(() => {
                showStatus("✅ BOMB! Full Match App me LIVE ho gaya!", "success");
                document.getElementById('matchName').value = ""; document.getElementById('t1Name').value = "";
                document.getElementById('t2Name').value = ""; document.getElementById('t1Players').value = ""; document.getElementById('t2Players').value = "";
            })
            .catch(error => showStatus("⚠️ Error: " + error.message, "error"));
        }
    </script>
</body>
</html>
