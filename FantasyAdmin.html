<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - Master Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding: 20px; }
        .header { background: linear-gradient(135deg, #ffd700, #ffaa00); padding: 15px; text-align: center; font-weight: 900; font-size: 20px; border-radius: 10px; margin-bottom: 20px; color: #000; box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); text-transform: uppercase; }
        
        .admin-box { background: #111; border: 1px solid #333; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.6); margin-bottom: 25px; position: relative; }
        .box-quick { border: 2px solid #00ff88; }
        .badge { background: #00ff88; color: #000; padding: 4px 12px; font-size: 12px; font-weight: bold; border-radius: 20px; position: absolute; top: -12px; right: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.5);}
        
        .admin-box h3 { color: #fff; margin-top: 0; border-bottom: 1px dashed #444; padding-bottom: 10px; font-size: 18px; }
        .admin-box p { font-size: 12px; color: #aaa; margin-top: -5px; margin-bottom: 15px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #ffd700; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; box-sizing: border-box; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; font-size: 14px; transition: 0.3s;}
        textarea { height: 80px; resize: vertical; }
        input:focus, textarea:focus { border-color: #00ff88; outline: none; box-shadow: 0 0 8px rgba(0,255,136,0.2); }
        
        .row { display: flex; gap: 15px; }
        .row .input-group { flex: 1; }

        .btn-live { background: #ff004c; color: #fff; font-weight: 900; padding: 15px; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-size: 16px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;}
        .btn-live:hover { background: #ff3366; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255, 0, 76, 0.4); }
        
        .btn-quick { background: #00ff88; color: #000; }
        .btn-quick:hover { background: #00cc6a; box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4); }
        
        #statusBox { text-align: center; font-weight: bold; margin-top: 15px; font-size: 15px; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #000; padding: 12px 25px; border-radius: 30px; z-index: 1000; display: none; white-space: nowrap; box-shadow: 0 4px 15px rgba(0,0,0,0.8);}
        .success { color: #00ff88; border: 1px solid #00ff88; }
        .error { color: #ff004c; border: 1px solid #ff004c; }
    </style>
</head>
<body>

    <div class="header"><i class="fa-solid fa-crown"></i> Kalyan Master Admin</div>

    <div class="admin-box box-quick">
        <div class="badge"><i class="fa-solid fa-bolt"></i> Super Fast</div>
        <h3>1. Quick Match (Dummy Players)</h3>
        <p>Bina khiladiyon ke naam likhe, turant match start karein. Dummy khiladi apne aap ban jayenge.</p>
        
        <div class="input-group">
            <input type="text" id="qMatchName" placeholder="Match Title (e.g., IND vs AUS Live)">
        </div>
        <div class="row">
            <div class="input-group">
                <input type="text" id="qT1" placeholder="Team 1 (e.g., IND)">
            </div>
            <div class="input-group">
                <input type="text" id="qT2" placeholder="Team 2 (e.g., AUS)">
            </div>
        </div>
        <div class="input-group">
            <label><i class="fa-solid fa-link"></i> Live Score Link (Cricbuzz/ESPN)</label>
            <input type="text" id="qLink" placeholder="Paste link here...">
        </div>
        <button class="btn-live btn-quick" onclick="createQuickMatch()"><i class="fa-solid fa-rocket"></i> Launch Quick Match</button>
    </div>

    <div class="admin-box">
        <h3>2. Full VIP Match (Asali Khiladi)</h3>
        <p>Ise tab use karein jab aapko saare 22 asali naam khud dalne hon. (Link option bhi hai)</p>
        
        <div class="input-group">
            <input type="text" id="matchName" placeholder="Match Title (e.g., IPL Final: CSK vs MI)">
        </div>
        <div class="row">
            <div class="input-group">
                <input type="text" id="t1Name" placeholder="Team 1 (CSK)">
            </div>
            <div class="input-group">
                <input type="text" id="t2Name" placeholder="Team 2 (MI)">
            </div>
        </div>
        <div class="input-group">
            <label><i class="fa-solid fa-users"></i> Team 1 Players (Comma Separated)</label>
            <textarea id="t1Players" placeholder="M S Dhoni, R Gaikwad, R Jadeja..."></textarea>
        </div>
        <div class="input-group">
            <label><i class="fa-solid fa-users"></i> Team 2 Players (Comma Separated)</label>
            <textarea id="t2Players" placeholder="Rohit Sharma, Suryakumar Yadav, J Bumrah..."></textarea>
        </div>
        <div class="input-group">
            <label><i class="fa-solid fa-link"></i> Live Score Link (Optional)</label>
            <input type="text" id="fLink" placeholder="Paste link here...">
        </div>
        <button class="btn-live" onclick="createFullMatch()"><i class="fa-solid fa-fire"></i> Launch VIP Match</button>
    </div>

    <div id="statusBox"></div>

    <script>
        // 🔐 Aapka Firebase Setup
        const firebaseConfig = { 
            apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", 
            databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", 
            projectId: "kalyan-casino" 
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        const statusBox = document.getElementById('statusBox');

        function showMsg(msg, type) {
            statusBox.style.display = "block";
            statusBox.innerHTML = msg;
            statusBox.className = type;
            setTimeout(() => { statusBox.style.display = "none"; }, 5000);
        }

        // 🚀 QUICK MATCH FUNCTION
        function createQuickMatch() {
            let mName = document.getElementById('qMatchName').value.trim();
            let t1 = document.getElementById('qT1').value.trim().toUpperCase();
            let t2 = document.getElementById('qT2').value.trim().toUpperCase();
            let liveLink = document.getElementById('qLink').value.trim();

            if(!mName || !t1 || !t2) return showMsg("⚠️ Match Name aur dono Teams zaroori hain!", "error");

            showMsg("<i class='fa-solid fa-spinner fa-spin'></i> Match ban raha hai...", "success");

            let matchId = "MATCH_" + new Date().getTime();
            let allPlayers = [];

            // Dummy Khiladi auto-generate
            for(let i=1; i<=11; i++){
                let pRole = i===1 ? "WK" : (i<6 ? "BAT" : (i<9 ? "AR" : "BOWL"));
                let creds = 8.5;
                allPlayers.push({ id: t1 + "_" + i, name: t1 + " Player " + i, team: t1.substring(0,3), role: pRole, credits: creds });
                allPlayers.push({ id: t2 + "_" + i, name: t2 + " Player " + i, team: t2.substring(0,3), role: pRole, credits: creds });
            }

            let playersData = {};
            allPlayers.forEach(p => { playersData[p.id] = p; });

            let matchData = { 
                name: mName, team1: t1, team2: t2, 
                dateTimeGMT: new Date().toISOString(), status: "Live", 
                googleLiveLink: liveLink || "" 
            };

            db.ref('Game/Kalyan11/LiveMatches/' + matchId).set(matchData);
            db.ref('Game/Kalyan11/MatchPlayers/' + matchId).set(playersData)
            .then(() => {
                showMsg("✅ BOMB! Quick Match LIVE ho gaya!", "success");
                document.getElementById('qMatchName').value = ""; document.getElementById('qT1').value = "";
                document.getElementById('qT2').value = ""; document.getElementById('qLink').value = "";
            })
            .catch(err => showMsg("⚠️ Error: " + err.message, "error"));
        }

        // 🛠️ FULL MATCH FUNCTION
        function createFullMatch() {
            let mName = document.getElementById('matchName').value.trim();
            let t1 = document.getElementById('t1Name').value.trim().toUpperCase();
            let t2 = document.getElementById('t2Name').value.trim().toUpperCase();
            let p1Text = document.getElementById('t1Players').value.trim();
            let p2Text = document.getElementById('t2Players').value.trim();
            let liveLink = document.getElementById('fLink').value.trim();

            if(!mName || !t1 || !t2 || !p1Text || !p2Text) return showMsg("⚠️ Kripya saare box bharein!", "error");

            showMsg("<i class='fa-solid fa-spinner fa-spin'></i> VIP Match ban raha hai...", "success");

            let t1Array = p1Text.split(',').map(n => n.trim()).filter(n => n !== "");
            let t2Array = p2Text.split(',').map(n => n.trim()).filter(n => n !== "");
            let matchId = "MATCH_" + new Date().getTime();
            let allPlayers = [];

            // Asali Khiladi setup
            t1Array.forEach((name, index) => {
                let pRole = index === 0 ? "WK" : (index < 5 ? "BAT" : (index < 8 ? "AR" : "BOWL")); 
                allPlayers.push({ id: t1 + "_" + index, name: name, team: t1.substring(0,3), role: pRole, credits: 8.5 });
            });
            t2Array.forEach((name, index) => {
                let pRole = index === 0 ? "WK" : (index < 5 ? "BAT" : (index < 8 ? "AR" : "BOWL"));
                allPlayers.push({ id: t2 + "_" + index, name: name, team: t2.substring(0,3), role: pRole, credits: 8.5 });
            });

            let playersData = {};
            allPlayers.forEach(p => { playersData[p.id] = p; });

            let matchData = { 
                name: mName, team1: t1, team2: t2, 
                dateTimeGMT: new Date().toISOString(), status: "Live",
                googleLiveLink: liveLink || "" 
            };

            db.ref('Game/Kalyan11/LiveMatches/' + matchId).set(matchData);
            db.ref('Game/Kalyan11/MatchPlayers/' + matchId).set(playersData)
            .then(() => {
                showMsg("✅ VIP Match App me LIVE ho gaya!", "success");
                document.getElementById('matchName').value = ""; document.getElementById('t1Name').value = "";
                document.getElementById('t2Name').value = ""; document.getElementById('t1Players').value = ""; 
                document.getElementById('t2Players').value = ""; document.getElementById('fLink').value = "";
            })
            .catch(err => showMsg("⚠️ Error: " + err.message, "error"));
        }
    </script>
</body>
</html>
