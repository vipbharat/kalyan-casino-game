<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DRAGON TIGER VIP PRO - Auto Recovery Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>

    <style>
        :root { --dragon: #ff1a1a; --tiger: #1a8cff; --gold: #ffd700; --tie: #2ecc71; --gold-glow: #ffae42; }
        
        body { margin: 0; background: #000; font-family: 'Arial Black', sans-serif; overflow: hidden; color: white; user-select: none; padding-bottom: 160px; }
        
        /* 🔥 BACKGROUND VIDEO CSS 🔥 */
        #bg-video { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -3; opacity: 0.35; pointer-events: none; }
        
        body::after { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at top, rgba(51, 0, 0, 0.5), #000000 90%); z-index: -1; pointer-events: none; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: rgba(0,0,0,0.85); border-bottom: 2px solid var(--gold); position: relative; z-index: 10; box-shadow: 0 2px 15px rgba(255, 215, 0, 0.3); backdrop-filter: blur(5px); }
        .bal-box { background: linear-gradient(to bottom, #333, #111); border: 1.5px solid var(--gold); padding: 6px 18px; border-radius: 25px; color: #0f0; font-size: 15px; font-weight: bold; box-shadow: 0 0 10px rgba(0, 255, 0, 0.3); }
        
        .admin-msg-bar { background: linear-gradient(to right, #800, #b00, #800); color: #fff; font-size: 12px; height: 26px; line-height: 26px; overflow: hidden; white-space: nowrap; border-bottom: 2px solid var(--gold); font-weight: bold; letter-spacing: 1.5px; position: relative; z-index: 10; text-shadow: 1px 1px 2px #000;}
        
        .history-bar { display: flex; gap: 5px; padding: 5px 10px; background: rgba(0,0,0,0.6); border-bottom: 2px solid var(--gold); overflow-x: auto; height: 28px; align-items: center; justify-content: flex-end; position: relative; z-index: 10; box-shadow: inset 0 -5px 10px rgba(0,0,0,0.8); }
        .history-bead { width: 22px; height: 22px; border-radius: 50%; font-size: 11px; font-weight: bold; display: flex; align-items: center; justify-content: center; color: white; flex-shrink: 0; box-shadow: 0 0 5px #000; border: 2px solid #fff; }
        .bead-D { background: var(--dragon); } .bead-T { background: var(--tiger); } .bead-Tie { background: var(--tie); }
        
        .timer-sec { text-align: center; font-size: 50px; color: var(--gold); margin: 5px 0; position: relative; z-index: 10; text-shadow: 0 0 15px var(--gold); font-weight: 900; transition: color 0.3s; }
        
        .table { display: flex; justify-content: center; gap: 40px; align-items: center; height: 110px; margin-bottom: 15px; position: relative; z-index: 10;}
        .card { width: 75px; height: 105px; border-radius: 8px; border: 3px solid var(--gold); background: #222; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.8), 0 0 15px var(--gold-glow); transition: transform 0.3s; }
        .card-back { background: url('https://deckofcardsapi.com/static/img/back.png') center/cover; position: absolute; width: 100%; height: 100%; z-index: 10; border-radius: 6px; }
        
        #d-v, #t-v { width: 100%; height: 100%; position: absolute; top: 0; left: 0; border-radius: 6px; overflow: hidden; }

        .bet-table { display: flex; justify-content: center; gap: 15px; position: relative; z-index: 10; padding: 0 10px; }
        
        /* 🔥 BOX VIDEO CSS 🔥 */
        .zone-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; pointer-events: none; border-radius: 10px; }
        
        .box { width: 120px; height: 170px; border: 4px solid rgba(255,255,255,0.4); border-radius: 15px; position: relative; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 20px; font-weight: 900; transition: all 0.2s; box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 5px 15px rgba(0,0,0,0.5); cursor: pointer; }
        .box:active { transform: scale(0.95); }
        
        /* Removed URLs from background to let the video show through the gradient */
        .dragon-box { border-color: var(--dragon); color: #fff; background: linear-gradient(rgba(255,0,0,0.4), rgba(0,0,0,0.8)); box-shadow: 0 0 15px rgba(255,0,0,0.4), inset 0 0 20px rgba(255,0,0,0.3); text-shadow: 2px 2px 5px #000; } 
        .tiger-box { border-color: var(--tiger); color: #fff; background: linear-gradient(rgba(0,170,255,0.4), rgba(0,0,0,0.8)); box-shadow: 0 0 15px rgba(0,170,255,0.4), inset 0 0 20px rgba(0,170,255,0.3); text-shadow: 2px 2px 5px #000;}
        .tie-box { border-color: var(--tie); color: #fff; background: radial-gradient(circle, rgba(46, 204, 113, 0.4) 0%, rgba(0,0,0,0.8) 100%); text-shadow: 2px 2px 5px #000; }
        
        .pool-amt { color:#0f0; font-size:14px; font-weight:bold; margin-bottom: 5px; text-shadow: 0 0 5px #0f0; background: rgba(0,0,0,0.8); padding: 2px 8px; border-radius: 10px; border: 1px solid #0f0; position: relative; z-index: 5;}
        .my-box-bet { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #000; background: var(--gold); padding: 4px 10px; border-radius: 12px; border: 2px solid #fff; z-index: 30; display: none; font-weight: 900; box-shadow: 0 2px 5px rgba(0,0,0,0.8); white-space: nowrap; }
        
        .glow-win { background-image: url('https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExc2phNmRnaXkzMmd5Mmd5Mmd5Mmd5Mmd5Mmd5Mmd5Mmd5Mmd5Mmd5Zy&ep=v1_gifs_search&rid=giphy.gif&ct=g'); background-size: cover; border: 4px solid var(--gold) !important; box-shadow: 0 0 40px var(--gold), inset 0 0 20px var(--gold) !important; transform: scale(1.05); }
        
        .chip { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid #fff; position: absolute; z-index: 20; font-size: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; transition: all 0.4s ease-out; box-shadow: 2px 2px 5px rgba(0,0,0,0.8); pointer-events: none; }
        
        .recovery-chip { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 26px; height: 26px; border-radius: 50%; border: 2px dashed #fff; background: #e74c3c; z-index: 25; font-size: 9px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: white; box-shadow: 0 0 10px #e74c3c, 2px 2px 5px rgba(0,0,0,0.8); pointer-events: none; }

        .live-players { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 8px 0; background: rgba(0,0,0,0.9); position: fixed; bottom: 85px; width: 100%; border-top: 2px solid var(--gold); box-shadow: 0 -5px 15px rgba(0,0,0,0.5); z-index: 1050; }
        .player { text-align: center; transition: 0.5s; }
        .p-avatar { width: 28px; height: 28px; background: linear-gradient(45deg, #444, #222); border: 2px solid var(--gold); border-radius: 50%; margin: 0 auto; line-height: 26px; font-size: 12px; color: #fff; box-shadow: 0 0 8px var(--gold); }

        .chip-footer { position: fixed; bottom: 0; width: 100%; background: linear-gradient(to top, #000, #1a1a1a); display: flex; justify-content: center; gap: 6px; padding: 15px 0; border-top: 3px solid var(--gold); z-index: 1100; box-shadow: 0 -10px 30px rgba(0,0,0,0.8); }
        .c-btn { width: 44px; height: 44px; border-radius: 50%; border: 2.5px solid rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 13px; cursor: pointer; transition: 0.2s; color: white; text-shadow: 1px 1px 2px #000; box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 5px 10px rgba(0,0,0,0.5); flex-shrink: 0; }
        
        .c10 { background: radial-gradient(circle, #ffffff, #cccccc); color: #000; text-shadow: none; }
        .c100 { background: radial-gradient(circle, #4fc3f7, #0288d1); }
        .c500 { background: radial-gradient(circle, #81c784, #388e3c); }
        .c1k { background: radial-gradient(circle, #e57373, #d32f2f); }
        .c5k { background: radial-gradient(circle, #ba68c8, #7b1fa2); }
        .c10k { background: radial-gradient(circle, #ffd54f, #f57f17); color: #000; text-shadow: none; }
        
        .selected { border-color: var(--gold) !important; transform: scale(1.15) translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.8), 0 0 20px var(--gold); }
    </style>
</head>
<body onclick="unlockAudio()">

<video id="bg-video" autoplay loop muted playsinline>
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
</video>

<audio id="bgMusic" src="https://assets.mixkit.co/active_storage/sfx/135/135-preview.mp3" loop></audio>

<div class="top-bar">
    <div><div style="font-size:12px; color:var(--gold); font-weight:900;">KALYAN ULTRA VIP</div><div style="font-size:10px; color:#0f0; font-weight:bold; letter-spacing:1px;"><span id="online-count">1,248</span> VIP ONLINE</div></div>
    <div class="bal-box">₹ <span id="balance">0.00</span></div>
</div>

<div class="table">

    <div style="font-size:25px; font-weight:900; color:var(--gold); text-shadow: 0 0 10px #ff3333;">VS</div>
    <div id="card-t" class="card"><div class="card-back" id="back-t"></div><div id="t-v"></div></div>
</div>

<div class="bet-table">
    <div style="text-align:center;">
        <div class="pool-amt" id="m-dragon">₹0</div>
        <div class="box dragon-box" id="box-dragon" onclick="placeBet('dragon')">
            <video class="zone-video" autoplay loop muted playsinline><source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4"></video>
            <span style="position:relative; z-index:2;">DRAGON</span>
            <div style="font-size:12px; color:var(--gold); margin-top:2px; position:relative; z-index:2;">1 : 2</div>
            <div class="my-box-bet" id="my-bet-dragon">MY BET: ₹0</div>
            <div id="chips-dragon"></div>
        </div>
    </div>
    
    <div style="text-align:center;">
        <div class="pool-amt" id="m-tie">₹0</div>
        <div class="box tie-box" id="box-tie" style="width:90px; height:130px; margin-top:20px;" onclick="placeBet('tie')">
            <video class="zone-video" autoplay loop muted playsinline><source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4"></video>
            <span style="position:relative; z-index:2;">TIE</span>
            <div style="font-size:12px; color:var(--gold); margin-top:2px; position:relative; z-index:2;">1 : 9</div>
            <div class="my-box-bet" id="my-bet-tie">MY BET: ₹0</div>
            <div id="chips-tie"></div>
        </div>
    </div>
    
    <div style="text-align:center;">
        <div class="pool-amt" id="m-tiger">₹0</div>
        <div class="box tiger-box" id="box-tiger" onclick="placeBet('tiger')">
            <video class="zone-video" autoplay loop muted playsinline><source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4"></video>
            <span style="position:relative; z-index:2;">TIGER</span>
            <div style="font-size:12px; color:var(--gold); margin-top:2px; position:relative; z-index:2;">1 : 2</div>
            <div class="my-box-bet" id="my-bet-tiger">MY BET: ₹0</div>
            <div id="chips-tiger"></div>
        </div>
    </div>
</div>

<div class="live-players" id="player-row"></div>

<div class="chip-footer">
    <div style="display: flex; gap: 6px;">
        <div class="c-btn c10" id="btn10" onclick="setChip(10, this)">10</div>
        <div class="c-btn c100" id="btn100" onclick="setChip(100, this)">100</div>
        <div class="c-btn c500" id="btn500" onclick="setChip(500, this)">500</div>
        <div class="c-btn c1k selected" id="btn1000" onclick="setChip(1000, this)">1K</div>
        <div class="c-btn c5k" id="btn5000" onclick="setChip(5000, this)">5K</div>
        <div class="c-btn c10k" id="btn10000" onclick="setChip(10000, this)">10K</div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); 
    const db = firebase.database();
    const phone = localStorage.getItem('userPhone') || localStorage.getItem('phone');

    let isBettingOpen=false, currentChip=1000, currentChipColor='radial-gradient(circle, #e57373, #d32f2f)';
    let totalBal=0, depBal=0, winBal=0, bonBal=0;
    let myBets={dragon:0, tiger:0, tie:0}, pool={dragon:0, tiger:0, tie:0};
    let botInterval;
    let isAudioInit = false;
    let isDealing = false;
    
    function unlockAudio() {
        if(!isAudioInit) {
            let ids = ['bgMusic', 'betSound', 'cardSound', 'dragonSound', 'tigerSound'];
            ids.forEach(id => {
                let el = document.getElementById(id);
                if(el) { el.play().catch(e=>{}); if(id !== 'bgMusic') { el.pause(); el.currentTime = 0; } }
            });
            document.getElementById('bgMusic').volume = 0.25;
            isAudioInit = true;
        }
    }

    function playSound(id, vol) {
        try { let s = document.getElementById(id); s.currentTime = 0; s.volume = vol; s.play().catch(e=>{}); } catch(e){}
    }

    setInterval(() => { document.getElementById('online-count').innerText = Math.floor(Math.random() * 50) + 1200; }, 4000);

    if(phone) {
        db.ref('users/'+phone).on('value', s => { 
            let d = s.val() || {};
            depBal = parseFloat(d.balance || 0); winBal = parseFloat(d.winning_balance || 0); bonBal = parseFloat(d.bonus_balance || 0);
            totalBal = Math.max(0, depBal + winBal + bonBal);
            document.getElementById('balance').innerText = totalBal.toFixed(2); 
        });

        // 🔥 1. AUTO BET RECOVERY 🔥
        db.ref(`Game/DragonTiger/Bets/${phone}`).once('value', snap => {
            let saved = snap.val();
            if(saved) {
                setTimeout(() => {
                    ['dragon', 'tiger', 'tie'].forEach(side => {
                        let val = saved[side];
                        if(val > 0) {
                            myBets[side] = val;
                            let myTag = document.getElementById('my-bet-' + side);
                            myTag.innerText = "MY BET: ₹" + val.toLocaleString();
                            myTag.style.display = 'block';

                            let box = document.getElementById('box-' + side);
                            if(box) {
                                let rc = document.createElement('div');
                                rc.className = 'recovery-chip';
                                rc.innerText = val >= 1000 ? (val/1000)+'K' : val;
                                box.appendChild(rc);
                            }
                        }
                    });
                }, 500);
            }
        });
    }

    // 🔥 2. PERMANENT HISTORY LOADER 🔥
    db.ref('Game/DragonTiger/History').once('value', snap => {
        let hist = snap.val();
        if(hist && Array.isArray(hist)) {
            let hHtml = '';
            [...hist].reverse().forEach(win => {
                let char = win === 'dragon' ? 'D' : (win === 'tiger' ? 'T' : 'Tie');
                hHtml += `<div class="history-bead bead-${char}">${char}</div>`;
            });
            document.getElementById('history-row').innerHTML = hHtml;
        }
    });

    let botsList = [];
    function generateBots() {
        botsList = [];
        for(let i=0; i<5; i++) { botsList.push({id: Math.floor(Math.random()*8999)+1000, bal: Math.floor(Math.random() * 100000) + 50000}); }
        renderBotsUI();
    }
    
    setInterval(() => {
        let numToChange = Math.floor(Math.random() * 2) + 1;
        for(let i=0; i<numToChange; i++) {
            let idx = Math.floor(Math.random() * botsList.length);
            botsList[idx] = { id: Math.floor(Math.random()*8999)+1000, bal: Math.floor(Math.random() * 100000) + 50000 };
        }
        botsList.forEach(b => { b.bal += (Math.random() > 0.5 ? 2500 : -1500); if(b.bal > 150000) b.bal = 140000; if(b.bal < 10000) b.bal = 60000; });
        renderBotsUI();
    }, 3500);

    function renderBotsUI() {
        let h = "";
        botsList.forEach(b => {
            let displayBal = b.bal >= 100000 ? (b.bal/100000).toFixed(2) + "L" : (b.bal/1000).toFixed(1) + "K";
            h += `<div class="player"><div class="p-avatar">👑</div><div style="font-size:9px;color:#fff;font-weight:bold;margin-top:2px;">VIP_${b.id}</div><div style="font-size:10px;color:var(--gold);font-weight:900;">₹${displayBal}</div></div>`;
        });
        document.getElementById('player-row').innerHTML = h;
    }
    generateBots();

    window.placeBet = function(side) {
        if(!isBettingOpen) return;
        if(!phone) { alert("Login Error!"); return; }
        if(totalBal < currentChip) { alert("Insufficient Balance!"); return; }

        let nDep = depBal, nWin = winBal, rem = currentChip;
        if(nDep >= rem) { nDep -= rem; } else { rem -= nDep; nDep = 0; nWin -= rem; }
        db.ref('users/'+phone).update({ balance: Math.max(0, nDep), winning_balance: Math.max(0, nWin) });
        
        db.ref(`Game/DragonTiger/Bets/${phone}/${side}`).set(firebase.database.ServerValue.increment(currentChip));
        myBets[side] += currentChip; 
        
        let myTag = document.getElementById('my-bet-' + side);
        myTag.innerText = "MY BET: ₹" + myBets[side].toLocaleString();
        myTag.style.display = 'block';
        
        spawnChip(side, currentChip, currentChipColor); 
        playSound('betSound', 1.0);
    };

    function spawnChip(side, amt, color) {
        let box = document.getElementById('chips-'+side);
        let chip = document.createElement('div');
        chip.className = 'chip'; chip.innerText = amt >= 1000 ? (amt/1000)+'K' : amt;
        chip.style.background = color; chip.style.color = (amt === 10000 || amt === 10) ? '#000' : '#fff';
        
        chip.style.top = "150%"; chip.style.left = side === 'dragon' ? "-100px" : "150px";
        chip.style.opacity = "0";
        box.appendChild(chip);
        
        setTimeout(() => { 
            chip.style.left = (Math.random()*60+20)+"%"; 
            chip.style.top = (Math.random()*60+20)+"%"; 
            chip.style.opacity = "1";
        }, 50);
        
        if(box.children.length > 55) box.firstChild.remove();
    }

    function getBotChipColor(amt) {
        if(amt === 10) return 'radial-gradient(circle, #ffffff, #cccccc)';
        if(amt === 100) return 'radial-gradient(circle, #4fc3f7, #0288d1)';
        if(amt === 500) return 'radial-gradient(circle, #81c784, #388e3c)';
        if(amt === 1000) return 'radial-gradient(circle, #e57373, #d32f2f)';
        if(amt === 5000) return 'radial-gradient(circle, #ba68c8, #7b1fa2)';
        return 'radial-gradient(circle, #ffd54f, #f57f17)'; 
    }

    function botBetAction() {
        if(!isBettingOpen) return;
        
        let sides = ['dragon', 'tiger'];
        let botBetted = false;

        sides.forEach(s => {
            let amt = [10, 100, 500, 1000, 5000][Math.floor(Math.random()*5)];
            let randomBot = botsList[Math.floor(Math.random() * botsList.length)];
            
            if(randomBot.bal >= amt) {
                randomBot.bal -= amt;
                spawnChip(s, amt, getBotChipColor(amt));
                botBetted = true;
            }
        });
        
        if(Math.random() > 0.7) {
            let tieAmt = [10, 100][Math.floor(Math.random()*2)];
            spawnChip('tie', tieAmt, getBotChipColor(tieAmt)); 
            botBetted = true;
        }
    }
</script>
</body>
</html>
