<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DRAGON TIGER VIP - KALYAN CASINO</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --dragon: #ff3333; --tiger: #33aaff; --gold: #ffd700; --tie: #2ecc71; }
        body { margin: 0; background: #000; font-family: 'Arial Black', sans-serif; overflow: hidden; color: white; user-select: none; padding-bottom: 160px; }
        
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3E5azgwN2s5azZ6ZnVwZ2s5azZ6ZnVwZ2s5azZ6ZnVwZ2s5azZ6ZnU&ep=v1_gifs_search&rid=giphy.gif&ct=g') center/cover no-repeat;
            opacity: 0.25; z-index: -2;
        }

        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 80%);
            z-index: -1;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(0,0,0,0.8); border-bottom: 1px solid #333; position: relative; z-index: 10; }
        .bal-box { background: #222; border: 1.5px solid var(--gold); padding: 5px 15px; border-radius: 20px; color: var(--gold); font-weight: bold; }
        .admin-msg-bar { background: #800; color: #fff; font-size: 13px; height: 24px; line-height: 24px; overflow: hidden; white-space: nowrap; border-bottom: 2px solid var(--gold); font-weight: bold; letter-spacing: 1px; position: relative; z-index: 10;}
        .history-bar { display: flex; gap: 5px; padding: 5px 10px; background: rgba(0,0,0,0.6); border-bottom: 2px solid var(--gold); overflow-x: auto; height: 25px; align-items: center; justify-content: flex-end; position: relative; z-index: 10;}
        .history-bead { width: 18px; height: 18px; border-radius: 50%; font-size: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; color: white; flex-shrink: 0; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .bead-D { background: var(--dragon); border: 1px solid #fff; }
        .bead-T { background: var(--tiger); border: 1px solid #fff; }
        .bead-Tie { background: var(--tie); border: 1px solid #fff; }
        .timer-sec { text-align: center; font-size: 45px; color: var(--gold); margin: 10px 0; position: relative; z-index: 10; text-shadow: 0 0 10px var(--gold); }
        .table { display: flex; justify-content: center; gap: 30px; align-items: center; height: 100px; margin-bottom: 15px; position: relative; z-index: 10;}
        .card { width: 65px; height: 90px; border-radius: 6px; border: 2px solid var(--gold); background: #222; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .card-back { background: url('https://deckofcardsapi.com/static/img/back.png') center/cover; position: absolute; width: 100%; height: 100%; z-index: 10; border-radius: 4px; }
        #d-v img, #t-v img { width: 100%; height: 100%; border-radius: 4px; }

        .box { 
            width: 110px; height: 160px; border: 3px solid rgba(255,255,255,0.4); border-radius: 15px; 
            position: relative; background: rgba(0,0,0,0.6); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; font-size: 18px; font-weight: 900; 
            transition: all 0.3s; overflow: hidden; box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .dragon-box { border-color: var(--dragon); color: #fff; background: linear-gradient(rgba(255,0,0,0.4), rgba(0,0,0,0.8)), url('https://img.freepik.com/premium-vector/red-fire-dragon-head-mascot-vector-illustration-isolated_1013753-41.jpg') center/cover; } 
        .tiger-box { border-color: var(--tiger); color: #fff; background: linear-gradient(rgba(0,170,255,0.4), rgba(0,0,0,0.8)), url('https://img.freepik.com/premium-vector/angry-tiger-head-logo-gaming-mascot-isolated-vector_1013753-5.jpg') center/cover; }
        .tie-box { border-color: var(--tie); color: #fff; background: radial-gradient(circle, rgba(46, 204, 113, 0.5) 0%, rgba(0,0,0,0.9) 100%); }

        .my-box-bet { position: absolute; top: 5px; right: 5px; font-size: 10px; color: var(--gold); background: rgba(0,0,0,0.8); padding: 3px 6px; border-radius: 4px; border: 1px solid var(--gold); z-index: 30; display: none; }
        .glow-win { background-image: url('https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExc2phNmRnaXkzMmd5Mmd5Mmd5Mmd5Mmd5Mmd5Mmd5Mmd5Mmd5Mmd5Zy&ep=v1_gifs_search&rid=giphy.gif&ct=g'); background-size: cover; border: 3px solid var(--gold) !important; box-shadow: 0 0 30px var(--gold); }

        .chip { width: 20px; height: 20px; border-radius: 50%; border: 1px solid #fff; position: absolute; z-index: 20; font-size: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .live-players { display: flex; gap: 8px; overflow-x: auto; padding: 10px; background: rgba(0,0,0,0.8); position: fixed; bottom: 85px; width: 100%; border-top: 1px solid #333; z-index: 10;}
        .player { min-width: 60px; text-align: center; }
        .p-avatar { width: 35px; height: 35px; background: #333; border: 1.5px solid gold; border-radius: 50%; margin: 0 auto; line-height: 33px; font-size: 10px; }
        .chip-footer { position: fixed; bottom: 0; width: 100%; background: rgba(17,17,17,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px 0; border-top: 2px solid var(--gold); z-index: 20; }
        .c-btn { width: 45px; height: 45px; border-radius: 50%; border: 2px dashed #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; cursor: pointer; transition: 0.2s;}
        .selected { border: 3px solid var(--gold) !important; transform: scale(1.1); box-shadow: 0 0 15px var(--gold); }
    </style>
</head>
<body onclick="unlockAudio()">

<div class="top-bar">
    <div>
        <div style="font-size:12px; color:var(--gold)">KALYAN VIP</div>
        <div style="font-size:10px; color:#0f0; font-weight:bold;"><span id="online-count">1,248</span> Online</div>
    </div>
    <div class="bal-box">₹ <span id="balance">0.00</span></div>
</div>
<div class="admin-msg-bar"><marquee id="admin-note">Welcome to KALYAN VIP CASINO!</marquee></div>
<div class="history-bar" id="history-row"></div>
<div class="timer-sec" id="timer">15</div>
<div class="table">
    <div id="card-d" class="card"><div class="card-back" id="back-d"></div><div id="d-v"></div></div>
    <div style="font-size:20px; font-weight:bold; color:var(--gold);">VS</div>
    <div id="card-t" class="card"><div class="card-back" id="back-t"></div><div id="t-v"></div></div>
</div>

<div style="display: flex; justify-content: center; gap: 10px; position: relative; z-index: 10;">
    <div style="text-align:center;">
        <div id="m-dragon" style="color:#0f0; font-size:12px; font-weight:bold;">₹0</div>
        <div class="box dragon-box" id="box-dragon" onclick="placeBet('dragon')">
            <div class="my-box-bet" id="my-bet-dragon">₹0</div>
            DRAGON<div style="font-size:12px">1.1</div><div id="chips-dragon"></div>
        </div>
    </div>
    <div style="text-align:center;">
        <div id="m-tie" style="color:#0f0; font-size:12px; font-weight:bold;">₹0</div>
        <div class="box tie-box" id="box-tie" style="width:80px; height:120px; margin-top:20px;" onclick="placeBet('tie')">
            <div class="my-box-bet" id="my-bet-tie" style="font-size: 8px;">₹0</div>
            TIE<div style="font-size:10px">9.0</div><div id="chips-tie"></div>
        </div>
    </div>
    <div style="text-align:center;">
        <div id="m-tiger" style="color:#0f0; font-size:12px; font-weight:bold;">₹0</div>
        <div class="box tiger-box" id="box-tiger" onclick="placeBet('tiger')">
            <div class="my-box-bet" id="my-bet-tiger">₹0</div>
            TIGER<div style="font-size:12px">1.1</div><div id="chips-tiger"></div>
        </div>
    </div>
</div>

<div class="live-players" id="player-row"></div>
<div class="chip-footer">
    <div style="display: flex; gap: 8px;">
        <div class="c-btn" id="btn10" style="background:white; color:#000" onclick="setChip(10, this)">10</div>
        <div class="c-btn" id="btn100" style="background:#2196f3; color:#fff" onclick="setChip(100, this)">100</div>
        <div class="c-btn" id="btn500" style="background:#4caf50; color:#fff" onclick="setChip(500, this)">500</div>
        <div class="c-btn" id="btn1000" style="background:#f44336; color:#fff" onclick="setChip(1000, this)">1K</div>
        <div class="c-btn" id="btn5000" style="background:gold; color:#000" onclick="setChip(5000, this)">5K</div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const phone = localStorage.getItem('userPhone');
    let adminCommand = null;

    db.ref('admin_settings/notification').on('value', s => { if(s.val()) document.getElementById('admin-note').innerText = s.val(); });
    db.ref('game_settings/dvt').on('value', s => { adminCommand = s.val(); });

    var tigerAudio = new Audio('https://files.catbox.moe/396ke9.mp3');
    var dragonAudio = new Audio('https://files.catbox.moe/8in4qi.mp3'); 
    function unlockAudio() { tigerAudio.play().then(()=>tigerAudio.pause()); dragonAudio.play().then(()=>dragonAudio.pause()); }

    let currentOnline = 1248;
    setInterval(() => {
        currentOnline += Math.floor(Math.random() * 21) - 10;
        if(currentOnline < 300) currentOnline = 500;
        document.getElementById('online-count').innerText = currentOnline.toLocaleString();
    }, 4000);

    let isBetting=false, currentChip=10, currentChipColor='white', totalBal=0;
    let pool={dragon:0, tiger:0, tie:0}, myBets={dragon:0, tiger:0, tie:0};
    const deckCodes = ["A","2","3","4","5","6","7","8","9","0","J","Q","K"];
    let gameHistory = []; 
    let bots = [];

    // ✅ BOT BALANCE LIMIT SET TO 1 LAKH (MAX)
    function changeBots() {
        bots = [];
        for(let i=0; i<15; i++) {
            let randomId = Math.floor(Math.random() * 8999) + 1000;
            // Initial balance between 10k and 1 Lakh
            bots.push({ name: "ID-" + randomId, bal: Math.floor(Math.random() * 90000) + 10000 });
        }
        renderBots();
    }
    
    function renderBots() {
        let h = "";
        bots.forEach(b => h += `<div class="player"><div class="p-avatar">👤</div><div style="font-size:8px">${b.name}</div><div style="font-size:7px;color:gold">₹${b.bal.toLocaleString()}</div></div>`);
        document.getElementById('player-row').innerHTML = h;
    }
    
    changeBots();
    setInterval(changeBots, 120000);

    function startEngine() {
        setInterval(() => {
            const cycle = Date.now() % 22000;
            const remaining = Math.floor((15000 - cycle) / 1000);
            if (cycle < 15000) {
                if(!isBetting) { isBetting = true; resetUI(); }
                document.getElementById('timer').innerText = remaining > 0 ? remaining : "0";
                if(remaining > 1) simulateBotBets();
            } else if (isBetting) {
                isBetting = false;
                document.getElementById('timer').innerText = "0";
                processResultSync();
            }
        }, 1000);
    }

    function simulateBotBets() {
        bots.forEach(bot => {
            if(bot.bal > 5000 && Math.random() > 0.3) {
                let side; let amt;
                if (pool.dragon < 50000 && Math.random() > 0.4) { side = 'dragon'; amt = 5000; }
                else if (pool.tiger < 50000 && Math.random() > 0.4) { side = 'tiger'; amt = 5000; }
                else {
                    let opts = ['dragon', 'tiger'];
                    if (pool.tie < 4500) opts.push('tie');
                    side = opts[Math.floor(Math.random() * opts.length)];
                    amt = side === 'tie' ? [10, 100, 500][Math.floor(Math.random() * 3)] : [100, 500, 1000, 5000][Math.floor(Math.random() * 4)];
                }
                if(bot.bal >= amt) {
                    let colors = {10:'white', 100:'#2196f3', 500:'#4caf50', 1000:'#f44336', 5000:'gold'};
                    bot.bal -= amt; pool[side] += amt;
                    spawnChip(side, amt, colors[amt]);
                }
            }
        });
        updatePoolUI(); renderBots();
    }

    function placeBet(side) {
        if(!isBetting || totalBal < currentChip) return;
        db.ref('users/'+phone).update({balance: totalBal - currentChip});
        myBets[side] += currentChip; pool[side] += currentChip;
        document.getElementById('my-bet-' + side).innerText = "₹" + myBets[side].toLocaleString();
        document.getElementById('my-bet-' + side).style.display = "block";
        updatePoolUI(); spawnChip(side, currentChip, currentChipColor); 
    }

    function spawnChip(side, amt, color) {
        const box = document.getElementById('chips-'+side);
        const chip = document.createElement('div');
        chip.className = 'chip'; chip.innerText = amt >= 1000 ? (amt/1000)+'K' : amt;
        chip.style.background = color; chip.style.color = (color === 'white' || color === 'gold') ? '#000' : '#fff';
        chip.style.top = "50%"; chip.style.left = side === 'dragon' ? "-120px" : "250px";
        box.appendChild(chip);
        setTimeout(() => { chip.style.left = (Math.random()*60+20)+"%"; chip.style.top = (Math.random()*60+20)+"%"; }, 50);
    }

    function processResultSync() {
        let totalRealBet = myBets.dragon + myBets.tiger + myBets.tie;
        let win;
        if (adminCommand && adminCommand.mode === 'manual') win = adminCommand.result;
        else if (totalRealBet > 0) {
            let pD = myBets.dragon * 1.95; let pT = myBets.tiger * 1.95;
            let pTie = (myBets.tie * 9) + (myBets.dragon * 0.5) + (myBets.tiger * 0.5);
            win = (pD <= pT && pD <= pTie) ? 'dragon' : (pT <= pD && pT <= pTie ? 'tiger' : 'tie');
        } else {
            win = Math.random() > 0.5 ? 'dragon' : 'tiger';
            if(Math.random() < 0.05) win = 'tie';
        }

        let d_v = Math.floor(Math.random() * 13); let t_v;
        if (win === 'dragon') { t_v = d_v > 0 ? Math.floor(Math.random() * d_v) : 0; if (d_v === t_v && d_v < 12) d_v++; }
        else if (win === 'tiger') { t_v = d_v < 12 ? Math.floor(Math.random() * (12 - d_v)) + d_v + 1 : 12; }
        else t_v = d_v;

        if(win === 'dragon') { dragonAudio.play(); document.getElementById('box-dragon').classList.add('glow-win'); }
        else if(win === 'tiger') { tigerAudio.play(); document.getElementById('box-tiger').classList.add('glow-win'); }
        else document.getElementById('box-tie').classList.add('glow-win');

        document.getElementById('back-d').style.display='none'; document.getElementById('back-t').style.display='none';
        document.getElementById('d-v').innerHTML=`<img src="https://deckofcardsapi.com/static/img/${deckCodes[d_v]}S.png">`;
        document.getElementById('t-v').innerHTML=`<img src="https://deckofcardsapi.com/static/img/${deckCodes[t_v]}D.png">`;

        let winAmt = win === 'dragon' ? myBets.dragon * 1.95 : (win === 'tiger' ? myBets.tiger * 1.95 : (myBets.tie * 9) + (myBets.dragon * 0.5) + (myBets.tiger * 0.5));
        if(winAmt > 0 && phone) { db.ref('users/'+phone).once('value').then(s => { db.ref('users/'+phone).update({balance: (s.val() ? s.val().balance : 0) + winAmt}); }); }

        // ✅ BOT WALLET LIMIT ENFORCED: Max 1 Lakh
        bots.forEach(b => { 
            if(Math.random() > 0.5) b.bal += Math.floor(Math.random()*10000); 
            else b.bal -= Math.floor(Math.random()*5000); 
            if(b.bal > 100000) b.bal = 100000; // Cap at 1 Lakh
        });
        renderBots(); gameHistory.push(win); if(gameHistory.length > 20) gameHistory.shift(); updateHistoryUI();
    }

    function updateHistoryUI() {
        let hHtml = "";
        gameHistory.forEach(res => { hHtml += `<div class="history-bead bead-${res === 'dragon' ? 'D' : (res === 'tiger' ? 'T' : 'Tie')}">${res === 'dragon' ? 'D' : (res === 'tiger' ? 'T' : 'Tie')}</div>`; });
        document.getElementById('history-row').innerHTML = hHtml;
    }

    function resetUI() {
        ['box-dragon', 'box-tiger', 'box-tie'].forEach(id => document.getElementById(id).classList.remove('glow-win'));
        ['my-bet-dragon', 'my-bet-tiger', 'my-bet-tie'].forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById('back-d').style.display = 'block'; document.getElementById('back-t').style.display = 'block';
        document.querySelectorAll('.chip').forEach(c => c.remove());
        pool={dragon:0, tiger:0, tie:0}; myBets={dragon:0, tiger:0, tie:0}; updatePoolUI();
    }

    function updatePoolUI() { document.getElementById('m-dragon').innerText = "₹" + pool.dragon.toLocaleString(); document.getElementById('m-tiger').innerText = "₹" + pool.tiger.toLocaleString(); document.getElementById('m-tie').innerText = "₹" + pool.tie.toLocaleString(); }
    function setChip(v, el) { currentChip = v; currentChipColor = window.getComputedStyle(el).backgroundColor; document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('selected')); el.classList.add('selected'); }
    if(phone) db.ref('users/'+phone).on('value', s => { totalBal = s.val() ? s.val().balance : 0; document.getElementById('balance').innerText = totalBal.toFixed(2); });
    document.getElementById('btn10').classList.add('selected'); startEngine();
</script>
</body>
</html>
