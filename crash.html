<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalyan VIP - Crash Game</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        :root { --neon-green: #00ff88; --bg-dark: #0f0f13; --red: #ff3333; --gold: #ffd700; --panel-bg: #1a1a24; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background-color: var(--bg-dark); color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header { background: var(--panel-bg); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon-green); box-shadow: 0 4px 15px rgba(0, 255, 136, 0.2); z-index: 10; }
        .rules-btn { background: rgba(255,255,255,0.1); border: 1px solid #aaa; color: #fff; padding: 6px 12px; border-radius: 15px; font-size: 12px; cursor: pointer; font-weight: bold; margin-right: 15px;}
        .wallet { font-weight: 900; font-size: 16px; color: var(--gold); background: rgba(255, 215, 0, 0.1); padding: 6px 15px; border-radius: 20px; border: 1px solid var(--gold); text-shadow: 0 0 5px rgba(255,215,0,0.5);}

        .game-area { flex: 1; position: relative; background: radial-gradient(circle at center, #1e222d 0%, #0b0e14 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; border-bottom: 3px solid #333; }
        .multiplier-text { font-size: 80px; font-weight: 900; z-index: 5; text-shadow: 0 5px 20px rgba(0,0,0,0.9); transition: color 0.1s;}
        
        .status-box { position: absolute; top: 20px; z-index: 10; display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.7); padding: 10px 25px; border-radius: 30px; border: 1px solid var(--neon-green); box-shadow: 0 0 15px rgba(0,255,136,0.2);}
        .status-text { font-size: 16px; font-weight: 900; color: #fff; letter-spacing: 1px; text-transform: uppercase;}
        .progress-bar-bg { width: 100%; height: 4px; background: #333; border-radius: 2px; margin-top: 5px; overflow: hidden; display: none;}
        .progress-bar-fill { height: 100%; background: var(--neon-green); width: 100%; transition: width 0.1s linear;}

        #crashCanvas { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .controls { padding: 15px; background: var(--panel-bg); z-index: 10; border-top-left-radius: 20px; border-top-right-radius: 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
        .bet-display-row { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 10px 15px; border-radius: 12px; border: 1px solid #444; margin-bottom: 10px; }
        .bet-display-row span { color: #aaa; font-size: 12px; font-weight: bold; text-transform: uppercase;}
        .bet-amount-text { color: #fff; font-size: 22px; font-weight: 900; }
        .clear-btn { background: #333; color: #fff; border: none; padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer;}

        .chips-container { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none;}
        .chips-container::-webkit-scrollbar { display: none; }
        .chip { flex: 1; min-width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 14px; font-weight: 900; color: #fff; cursor: pointer; border: 2px dashed rgba(255,255,255,0.4); box-shadow: 0 4px 10px rgba(0,0,0,0.4); transition: transform 0.1s;}
        .chip:active { transform: scale(0.9); }
        .chip-10 { background: radial-gradient(circle, #ff4b4b, #b30000); }
        .chip-50 { background: radial-gradient(circle, #4b7bff, #002db3); }
        .chip-100 { background: radial-gradient(circle, #4bff4b, #00b300); color: #000;}
        .chip-500 { background: radial-gradient(circle, #b84bff, #6b00b3); }
        .chip-1000 { background: radial-gradient(circle, #ffd700, #b38f00); color: #000;}

        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 22px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.2s; white-space: pre-line; line-height: 1.2; letter-spacing: 1px;}
        .btn-bet { background: linear-gradient(to right, #00b09b, #96c93d); color: #000; box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4); border: 2px solid #fff;}
        .btn-cashout { background: linear-gradient(to right, #f5af19, #f12711); color: #fff; box-shadow: 0 5px 15px rgba(255, 51, 51, 0.4); border: 2px solid var(--gold); animation: pulse 1s infinite alternate;}
        .btn-disabled { background: #2a2a35; color: #666; cursor: not-allowed; border: 2px solid #444; }

        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.02); } }

        #winMsg { position: absolute; top: 40%; background: linear-gradient(90deg, #00b09b, #96c93d); border: 2px solid #fff; color: #000; padding: 15px 40px; border-radius: 30px; font-weight: 900; font-size: 26px; display: none; z-index: 20; text-align: center; box-shadow: 0 10px 40px rgba(0,255,136,0.6); animation: popIn 0.3s ease-out;}
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body onclick="initAudio()">

    <audio id="sndChip" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="sndCashout" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    <audio id="soundFly" src="https://assets.mixkit.co/active_storage/sfx/1271/1271-preview.mp3" loop></audio>
    <audio id="soundBlast" src="https://assets.mixkit.co/active_storage/sfx/1702/1702-preview.mp3"></audio>

    <div class="header">
        <div style="font-weight: 900; font-size: 18px; color: #fff;">CRASH <span style="color:var(--neon-green)">X</span></div>
        <div class="wallet">₹<span id="balance">0.00</span></div>
    </div>

    <div class="game-area">
        <canvas id="crashCanvas"></canvas>
        
        <div class="status-box">
            <div class="status-text" id="statusText">CONNECTING...</div>
            <div class="progress-bar-bg" id="progBg"><div class="progress-bar-fill" id="progFill"></div></div>
        </div>
        
        <div class="multiplier-text" id="multiplierDisplay">1.00x</div>
        <div id="winMsg">YOU WIN!<br>₹0.00</div>
    </div>

    <div class="controls">
        <div class="bet-display-row">
            <span>Bet Amount</span>
            <div class="bet-amount-text">₹<span id="betAmountDisplay">10</span></div>
            <button class="clear-btn" onclick="clearBet()">CLEAR</button>
        </div>

        <div class="chips-container">
            <div class="chip chip-10" onclick="addBet(10)">10</div>
            <div class="chip chip-50" onclick="addBet(50)">50</div>
            <div class="chip chip-100" onclick="addBet(100)">100</div>
            <div class="chip chip-500" onclick="addBet(500)">500</div>
            <div class="chip chip-1000" onclick="addBet(1000)">1K</div>
        </div>

        <button class="btn-action btn-disabled" id="mainBtn" onclick="handleAction()">
            CONNECTING...
        </button>
    </div>

    <script>
        // --- 1. FIREBASE SETUP ---
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const phone = localStorage.getItem('userPhone') || localStorage.getItem('phone');

        // --- 2. AUDIO ENGINE (FIXED KHATARA SOUND) ---
        let isAudioInit = false;
        function initAudio() { if(!isAudioInit) { isAudioInit = true; } }
        
        function playSnd(audioEl, vol = 1.0) {
            if(!isAudioInit) return;
            try { audioEl.volume = vol; audioEl.currentTime = 0; audioEl.play().catch(e=>{}); } catch(e){}
        }

        // --- 3. PERFECT WALLET LOGIC ---
        let depBal = 0, winBal = 0, bonBal = 0, currentBalance = 0;
        let selectedBetAmount = 10;

        if (phone) {
            db.ref('users/' + phone).on('value', (snapshot) => {
                const d = snapshot.val() || {};
                depBal = parseFloat(d.balance || 0); 
                winBal = parseFloat(d.winning_balance || 0); 
                bonBal = parseFloat(d.bonus_balance || 0);
                currentBalance = Math.max(0, depBal + winBal + bonBal);
                document.getElementById('balance').innerText = currentBalance.toFixed(2);
            });
        } else {
            document.getElementById('balance').innerText = "0.00 (Guest)";
        }

        function addBet(val) {
            if(gameState !== "WAITING" || isBetPlaced) return;
            selectedBetAmount += val;
            document.getElementById('betAmountDisplay').innerText = selectedBetAmount;
            playSnd(document.getElementById('sndChip'), 0.8); // Nayi Chip Awaaz
        }
        function clearBet() {
            if(gameState !== "WAITING" || isBetPlaced) return;
            selectedBetAmount = 10;
            document.getElementById('betAmountDisplay').innerText = selectedBetAmount;
        }

        // --- 4. GAME VARIABLES ---
        let gameState = "WAITING"; 
        let previousState = ""; // Ye khatara sound rokne ke liye hai
        let currentMultiplier = 1.00;
        let finalCrashPoint = 1.00;
        let isBetPlaced = false;
        let isCashedOut = false;
        let flightStartTime = 0;
        let waitEndTime = 0;

        const btn = document.getElementById('mainBtn');
        const display = document.getElementById('multiplierDisplay');
        const statusTxt = document.getElementById('statusText');
        const progBg = document.getElementById('progBg');
        const progFill = document.getElementById('progFill');
        const winMsg = document.getElementById('winMsg');

        function updateBtn(txt, cls) { btn.innerText = txt; btn.className = "btn-action " + cls; }

        // --- 5. FIREBASE SYNC (Audio Glitch Fixed) ---
        db.ref('game_loop').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            gameState = data.state;

            // Audio & UI Trigger (Sirf ek baar chalega jab state badlegi)
            if(gameState !== previousState) {
                let sFly = document.getElementById('soundFly');
                let sBlast = document.getElementById('soundBlast');

                if (gameState === "WAITING") {
                    waitEndTime = data.waitEndTime;
                    currentMultiplier = 1.00;
                    winMsg.style.display = "none";
                    progBg.style.display = "block";
                    sFly.pause(); sFly.currentTime = 0;
                    isCashedOut = false;
                    if (!isBetPlaced) updateBtn("PLACE BET", "btn-bet");
                    else updateBtn("WAITING FOR ROCKET", "btn-disabled");
                } 
                else if (gameState === "FLYING") {
                    flightStartTime = data.startTime;
                    progBg.style.display = "none";
                    playSnd(sFly, 0.4); // Smooth Jet Sound
                    if (isBetPlaced && !isCashedOut) updateBtn("CASH OUT", "btn-cashout");
                    else updateBtn("ROUND STARTED", "btn-disabled");
                } 
                else if (gameState === "CRASHED") {
                    finalCrashPoint = data.crashMultiplier;
                    currentMultiplier = finalCrashPoint;
                    progBg.style.display = "none";
                    sFly.pause(); playSnd(sBlast, 1.0); // Smooth Blast
                    
                    if (isBetPlaced && !isCashedOut) {
                        updateBtn("YOU LOST", "btn-disabled");
                        isBetPlaced = false; 
                    } else if (!isBetPlaced) {
                        updateBtn("CRASHED", "btn-disabled");
                    }
                }
                previousState = gameState; // Lock kar diya
            }
        });

        // --- 6. 100% PERFECT BET DEDUCTION LOGIC ---
        function handleAction() {
            if(!phone) return alert("Please Login!");

            if (gameState === "WAITING" && !isBetPlaced) {
                if (selectedBetAmount > currentBalance) return alert("Low Balance!");
                
                // Real Deduction Logic
                let nDep = depBal, nWin = winBal, rem = selectedBetAmount;
                if(nDep >= rem) { nDep -= rem; } else { rem -= nDep; nDep = 0; nWin -= rem; }

                db.ref('users/' + phone).update({ balance: Math.max(0, nDep), winning_balance: Math.max(0, nWin) }).then(() => {
                    isBetPlaced = true;
                    updateBtn("WAITING FOR ROCKET", "btn-disabled");
                });

            } else if (gameState === "FLYING" && isBetPlaced && !isCashedOut) {
                isCashedOut = true;
                let winAmount = (selectedBetAmount * currentMultiplier).toFixed(2);
                
                // Real Winning Add Logic
                db.ref('users/' + phone).update({ winning_balance: firebase.database.ServerValue.increment(parseFloat(winAmount)) }).then(() => {
                    playSnd(document.getElementById('sndCashout'), 1.0); // Real Win Sound
                    updateBtn("CASHED OUT ✅", "btn-disabled");
                    winMsg.innerHTML = `YOU WIN!<br>₹${winAmount}`;
                    winMsg.style.display = 'block';
                    isBetPlaced = false; 
                });
            }
        }

        // --- 7. COLORFUL CANVAS ENGINE ---
        const canvas = document.getElementById('crashCanvas');
        const ctx = canvas.getContext('2d');
        let canvasW, canvasH, particles = [], bgOffset = 0;

        function resize() { canvasW = canvas.parentElement.clientWidth; canvasH = canvas.parentElement.clientHeight; canvas.width = canvasW; canvas.height = canvasH; }
        window.addEventListener('resize', resize); resize();

        function renderFrame() {
            ctx.clearRect(0, 0, canvasW, canvasH);
            
            if (gameState === "WAITING") {
                let msLeft = waitEndTime - Date.now();
                if(msLeft < 0) msLeft = 0;
                let secLeft = (msLeft / 1000).toFixed(1);
                
                statusTxt.innerText = `BETTING OPEN: ${secLeft}s`;
                statusTxt.style.color = "var(--neon-green)";
                display.innerText = "1.00x";
                display.style.color = "#fff";
                
                let pct = (msLeft / 15000) * 100;
                progFill.style.width = `${pct}%`;
                progFill.style.background = (pct < 30) ? "var(--red)" : "var(--neon-green)";
                
            } else if (gameState === "FLYING") {
                statusTxt.innerText = "ROCKET FLYING!";
                statusTxt.style.color = "#fff";
                
                let elapsedMs = Date.now() - flightStartTime;
                if(elapsedMs < 0) elapsedMs = 0;
                
                currentMultiplier = Math.pow(Math.E, 0.00006 * elapsedMs); // Smooth speed
                display.innerText = currentMultiplier.toFixed(2) + "x";
                
                // Color change based on multiplier
                if(currentMultiplier > 10) display.style.color = "#ff33ff";
                else if(currentMultiplier > 5) display.style.color = "#ff3333";
                else if(currentMultiplier > 2) display.style.color = "#ffd700";
                else display.style.color = "#00ff88";
                
                if(isBetPlaced && !isCashedOut) {
                    let liveWin = (selectedBetAmount * currentMultiplier).toFixed(2);
                    updateBtn(`CASH OUT\n₹${liveWin}`, "btn-cashout");
                }
                drawGraphEngine(elapsedMs);
                
            } else if (gameState === "CRASHED") {
                statusTxt.innerText = "FLEW AWAY!";
                statusTxt.style.color = "var(--red)";
                display.innerText = finalCrashPoint.toFixed(2) + "x";
                display.style.color = "var(--red)";
                
                let finalElapsed = Math.log(finalCrashPoint) / 0.00006;
                drawGraphEngine(finalElapsed);
            }
            requestAnimationFrame(renderFrame);
        }
        requestAnimationFrame(renderFrame);

        function drawGraphEngine(elapsedMs) {
            ctx.strokeStyle = "rgba(255, 255, 255, 0.05)"; ctx.lineWidth = 1;
            bgOffset += (gameState === "FLYING" ? 2 : 0);
            if (bgOffset > 50) bgOffset = 0;
            for(let i = 40; i < canvasW; i += 50) { ctx.beginPath(); ctx.moveTo(i - bgOffset, 0); ctx.lineTo(i - bgOffset, canvasH - 30); ctx.stroke(); }
            for(let i = canvasH - 30; i > 0; i -= 50) { ctx.beginPath(); ctx.moveTo(40, i); ctx.lineTo(canvasW, i); ctx.stroke(); }

            let maxSec = Math.max(5, elapsedMs / 1000);
            let maxMult = Math.max(2.0, currentMultiplier); 
            
            ctx.fillStyle = "rgba(255, 255, 255, 0.5)"; ctx.font = "bold 11px Arial";
            ctx.textAlign = "right"; 
            for(let i=0; i<=4; i++) {
                let v = 1 + ((maxMult-1)*(i/4)); 
                let yp = canvasH - 30 - (i/4)*(canvasH*0.7);
                if(i===0) yp = canvasH - 35;
                ctx.fillText(v.toFixed(1)+"x", 35, yp+4);
            }

            let xMap = (elapsedMs / 1000) / maxSec; 
            let yMap = (currentMultiplier - 1) / (maxMult - 1); 
            if(maxMult === 1) yMap = 0;

            let startX = 40, startY = canvasH - 30;
            let x = startX + (xMap * canvasW * 0.8); 
            let y = startY - (yMap * canvasH * 0.7);

            if (gameState === "FLYING") { x += (Math.random()-0.5)*4; y += (Math.random()-0.5)*4; }

            ctx.beginPath(); ctx.moveTo(startX, startY); ctx.quadraticCurveTo(x * 0.5, startY, x, y);
            ctx.lineWidth = 6; 
            
            // 🔥 NAYI RANGEEN (COLORFUL) LINE 🔥
            let lineColor = "#00ff88"; // Default Green
            if(currentMultiplier > 10) lineColor = "#ff33ff"; // Purple
            else if(currentMultiplier > 5) lineColor = "#ff3333"; // Red
            else if(currentMultiplier > 2) lineColor = "#ffd700"; // Yellow
            if(gameState === "CRASHED") lineColor = "#ff3333"; // Crash pe Red
            
            ctx.strokeStyle = lineColor; 
            ctx.stroke();

            ctx.lineTo(x, startY); ctx.lineTo(startX, startY);
            let fillGrad = ctx.createLinearGradient(0, y, 0, startY);
            fillGrad.addColorStop(0, gameState === "CRASHED" ? "rgba(255, 51, 51, 0.4)" : "rgba(0, 255, 136, 0.4)");
            fillGrad.addColorStop(1, "rgba(0, 255, 136, 0.0)");
            ctx.fillStyle = fillGrad; ctx.fill();

            if (gameState === "FLYING") particles.push({ px: x - 20, py: y + 20, life: 1.0 });
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.px, p.py, 5 * p.life, 0, Math.PI * 2);
                ctx.fillStyle = gameState === "CRASHED" ? "#555" : "#ffd700"; ctx.fill();
                p.life -= 0.05; p.px -= 4; p.py += 4;
                if (p.life <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1.0;

            ctx.save(); ctx.translate(x, y);
            if (gameState === "CRASHED") { ctx.font = "55px Arial"; ctx.fillText("💥", -30, 25); } 
            else { ctx.font = "45px Arial"; ctx.rotate(-Math.PI / 8); ctx.fillText("🚀", -20, 15); }
            ctx.restore();
        }

        // --- 8. SMART AUTO-SERVER (Fix Random Crash Logic) ---
        let isServer = false; 

        setInterval(() => {
            if (isServer) return; 
            db.ref('game_loop/lastHeartbeat').once('value', (snap) => {
                let lastTime = snap.val() || 0;
                if (Date.now() - lastTime > 18000) { isServer = true; runServerLoop(); }
            });
        }, 5000);

        setInterval(() => { if(isServer) db.ref('game_loop/lastHeartbeat').set(Date.now()); }, 5000);

        function runServerLoop() {
            if (!isServer) return;
            db.ref('game_loop').update({ state: 'WAITING', waitEndTime: Date.now() + 15000, lastHeartbeat: Date.now() });

            setTimeout(() => {
                if (!isServer) return;
                
                // 🔥 NAYA ADVANCED RANDOM LOGIC (Har baar alag jageh udatega) 🔥
                let chance = Math.random();
                let cVal = 1.00;
                if(chance < 0.10) cVal = 1.00; // 10% chance of instant blast
                else if (chance < 0.50) cVal = 1.01 + Math.random() * 0.99; // 1x - 2x
                else if (chance < 0.85) cVal = 2.00 + Math.random() * 3.00; // 2x - 5x
                else if (chance < 0.95) cVal = 5.00 + Math.random() * 5.00; // 5x - 10x
                else cVal = 10.00 + Math.random() * 15.00; // 10x - 25x Jackpot

                let fTime = Math.log(cVal) / 0.00006; 
                db.ref('game_loop').update({ state: 'FLYING', startTime: Date.now(), lastHeartbeat: Date.now() });

                setTimeout(() => {
                    if (!isServer) return;
                    db.ref('game_loop').update({ state: 'CRASHED', crashMultiplier: cVal, lastHeartbeat: Date.now() });
                    setTimeout(runServerLoop, 4000); 
                }, fTime);
            }, 15000);
        }
    </script>
</body>
</html>
