<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crash Game - K-VIP Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        :root { --neon-green: #00ff88; --bg-dark: #0f0f13; --red: #ff3333; --gold: #ffd700; --aviator-red: #e91e63; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        body { background-color: var(--bg-dark); color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header */
        .header { background: #1a1a24; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon-green); box-shadow: 0 4px 15px rgba(0, 255, 136, 0.2); z-index: 10; }
        .back-btn { color: #fff; font-size: 20px; text-decoration: none; }
        .wallet { font-weight: 900; font-size: 18px; color: var(--neon-green); background: rgba(0, 255, 136, 0.1); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--neon-green); }

        /* History Bar */
        .history-bar { display: flex; gap: 10px; padding: 10px; overflow-x: auto; background: #111; border-bottom: 1px solid #333; white-space: nowrap; scrollbar-width: none; }
        .history-bar::-webkit-scrollbar { display: none; }
        .hist-pill { padding: 4px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; background: #222; }
        .hist-green { color: var(--neon-green); border: 1px solid var(--neon-green); }
        .hist-red { color: var(--red); border: 1px solid var(--red); }
        .hist-gold { color: var(--gold); border: 1px solid var(--gold); background: rgba(255, 215, 0, 0.1); }

        /* Main Game Area */
        .game-area { flex: 1; position: relative; background: radial-gradient(circle at center, #1e222d, #0b0e14); display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; border-bottom: 2px solid #333; }
        .multiplier-text { font-size: 75px; font-weight: 900; z-index: 5; transition: color 0.2s; text-shadow: 0 5px 15px rgba(0,0,0,0.8); font-variant-numeric: tabular-nums; }
        .status-text { position: absolute; top: 20px; font-size: 16px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,255,255,0.5); background: rgba(0,0,0,0.4); padding: 5px 15px; border-radius: 20px;}
        #crashCanvas { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* Controls Area */
        .controls { padding: 15px 20px 25px; background: #1a1a24; border-top: 1px solid #333; z-index: 10; }
        .bet-inputs { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-box { flex: 1; background: #000; border: 1px solid #444; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; }
        .input-box label { font-size: 10px; color: #aaa; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .input-box input { background: transparent; border: none; color: #fff; font-size: 20px; font-weight: bold; outline: none; width: 100%; }
        
        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 22px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1.2; }
        .btn-action:active { transform: scale(0.97); }
        .btn-bet { background: linear-gradient(135deg, #00b09b, #96c93d); color: #000; box-shadow: 0 4px 15px rgba(150, 201, 61, 0.4); border: 2px solid #fff; }
        .btn-cashout { background: linear-gradient(135deg, #f5af19, #f12711); color: #fff; border: 2px solid #ffd700; animation: pulseCashout 1s infinite alternate; }
        .btn-disabled { background: #2a2a35; color: #555; cursor: not-allowed; border: 2px solid #444; }
        .btn-subtext { font-size: 14px; font-weight: bold; opacity: 0.9; }

        @keyframes pulseCashout { 0% { transform: scale(1); } 100% { transform: scale(1.02); } }

        #winMsg { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(90deg, #00b09b, #96c93d); border: 2px solid #fff; color: #000; padding: 10px 25px; border-radius: 30px; font-weight: 900; font-size: 22px; display: none; z-index: 20; box-shadow: 0 10px 30px rgba(0,255,136,0.5); }
    </style>
</head>
<body>

    <audio id="soundFly" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" loop></audio>
    <audio id="soundBlast" src="https://assets.mixkit.co/active_storage/sfx/2004/2004-preview.mp3"></audio>

    <div class="header">
        <a href="Dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <div style="font-weight: 900; font-size: 18px; color: #fff;">CRASH <span style="color:var(--neon-green)">X</span></div>
        <div class="wallet">₹<span id="balance">0.00</span></div>
    </div>

    <div class="history-bar" id="historyBar"></div>

    <div class="game-area">
        <canvas id="crashCanvas"></canvas>
        <div class="status-text" id="statusText">Loading...</div>
        <div class="multiplier-text" id="multiplierDisplay">1.00x</div>
        <div id="winMsg">YOU WIN!<br>₹0.00</div>
    </div>

    <div class="controls">
        <div class="bet-inputs">
            <div class="input-box">
                <label>Amount (₹)</label>
                <input type="number" id="betAmount" value="100" min="10">
            </div>
            <div class="input-box" style="opacity: 0.5;">
                <label>Auto Cashout</label>
                <input type="text" value="Disabled" disabled>
            </div>
        </div>
        <button class="btn-action btn-bet" id="mainBtn" onclick="handleAction()">
            <span>PLACE BET</span>
        </button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo",
            databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com",
            projectId: "kalyan-casino"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const phone = localStorage.getItem('userPhone') || "Guest";

        let currentBalance = 0;
        db.ref('users/' + phone).on('value', (snapshot) => {
            const data = snapshot.val() || {};
            currentBalance = (parseFloat(data.balance||0) + parseFloat(data.winning_balance||0) + parseFloat(data.bonus_balance||0));
            document.getElementById('balance').innerText = currentBalance.toFixed(2);
        });

        let gameState = "WAITING"; 
        let currentMultiplier = 1.00;
        let crashPoint = 1.00;
        let isBetPlaced = false;
        let isCashedOut = false;
        let myBetAmount = 0;
        
        const btn = document.getElementById('mainBtn');
        const display = document.getElementById('multiplierDisplay');
        const statusTxt = document.getElementById('statusText');
        const winMsg = document.getElementById('winMsg');
        const sFly = document.getElementById('soundFly');
        const sBlast = document.getElementById('soundBlast');

        const canvas = document.getElementById('crashCanvas');
        const ctx = canvas.getContext('2d');
        let canvasW, canvasH, particles = [];

        function resizeCanvas() {
            canvasW = canvas.parentElement.clientWidth;
            canvasH = canvas.parentElement.clientHeight;
            canvas.width = canvasW; canvas.height = canvasH;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function drawGraph() {
            ctx.clearRect(0, 0, canvasW, canvasH);
            if(gameState === "WAITING") return;
            let progress = Math.min((currentMultiplier - 1) / 4, 1); 
            let startX = 20, startY = canvasH - 20;
            let x = progress * canvasW * 0.8 + 40, y = canvasH - (progress * canvasH * 0.7) - 40;

            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.quadraticCurveTo(x/2, startY, x, y);
            ctx.lineWidth = 6; ctx.strokeStyle = gameState === "CRASHED" ? "#ff3333" : "#e91e63";
            ctx.stroke();

            if (gameState === "FLYING") particles.push({ px: x - 15, py: y + 15, life: 1.0 });
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.px, p.py, 6 * p.life, 0, Math.PI * 2);
                ctx.fillStyle = gameState === "CRASHED" ? "#555" : "#ff9900"; ctx.fill();
                p.life -= 0.04; p.px -= 3; p.py += 3;
                if (p.life <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1.0;
            ctx.save(); ctx.translate(x, y);
            if (gameState === "CRASHED") { ctx.font = "50px Arial"; ctx.fillText("💥", -25, 20); }
            else { ctx.font = "45px Arial"; ctx.fillText("🚀", -20, 15); }
            ctx.restore();
        }

        function startGameLoop() {
            gameState = "WAITING"; currentMultiplier = 1.00;
            crashPoint = (Math.random() < 0.03) ? 1.00 : (100 / (100 - Math.random() * 98));
            isCashedOut = false; particles = [];
            display.innerText = "1.00x"; display.style.color = "#fff";
            sFly.pause(); sFly.currentTime = 0;

            if (isBetPlaced) { btn.innerHTML = `<span>WAITING...</span>`; btn.className = "btn-action btn-disabled"; }
            else { btn.innerHTML = `<span>PLACE BET</span>`; btn.className = "btn-action btn-bet"; }

            let waitTime = 500;
            let waitInterval = setInterval(() => {
                waitTime -= 10; statusTxt.innerText = `STARTING IN ${(waitTime/100).toFixed(1)}s`;
                if (waitTime <= 0) { clearInterval(waitInterval); startFlying(); }
            }, 100);
        }

        function startFlying() {
            gameState = "FLYING"; statusTxt.innerText = "ROCKET FLYING!";
            startTime = performance.now();
            sFly.play(); // 🚀 Engine Sound On
            if (isBetPlaced) btn.className = "btn-action btn-cashout";
            else { btn.innerHTML = `<span>ROUND STARTED</span>`; btn.className = "btn-action btn-disabled"; }
            requestAnimationFrame(updateMultiplier);
        }

        function updateMultiplier(time) {
            if (gameState !== "FLYING") return;
            let elapsed = time - startTime;
            currentMultiplier = Math.pow(Math.E, 0.00008 * elapsed);
            if (currentMultiplier >= crashPoint) crashRocket();
            else {
                display.innerText = currentMultiplier.toFixed(2) + "x";
                drawGraph();
                if(isBetPlaced && !isCashedOut) {
                    let liveWin = (myBetAmount * currentMultiplier).toFixed(2);
                    btn.innerHTML = `<span>CASH OUT</span><span class="btn-subtext">₹${liveWin}</span>`;
                }
                requestAnimationFrame(updateMultiplier);
            }
        }

        function crashRocket() {
            gameState = "CRASHED"; statusTxt.innerText = "FLEW AWAY!";
            sFly.pause(); sBlast.play(); // 💥 Explosion Sound
            drawGraph();
            if (isBetPlaced && !isCashedOut) { btn.innerHTML = `<span>YOU LOST</span>`; btn.className = "btn-action btn-disabled"; isBetPlaced = false; }
            addToHistory(currentMultiplier);
            setTimeout(() => { winMsg.style.display = 'none'; startGameLoop(); }, 3000);
        }

        function handleAction() {
            if (gameState === "WAITING" && !isBetPlaced) {
                let amtInput = document.getElementById('betAmount').value;
                myBetAmount = parseFloat(amtInput);
                if (isNaN(myBetAmount) || myBetAmount < 10) return alert("Min ₹10");
                if (myBetAmount > currentBalance) return alert("Low Balance!");
                db.ref('users/' + phone).update({ balance: firebase.database.ServerValue.increment(-myBetAmount) }).then(() => {
                    isBetPlaced = true; btn.className = "btn-action btn-disabled";
                });
            } else if (gameState === "FLYING" && isBetPlaced && !isCashedOut) {
                isCashedOut = true; let winAmount = (myBetAmount * currentMultiplier).toFixed(2);
                db.ref('users/' + phone).update({ balance: firebase.database.ServerValue.increment(parseFloat(winAmount)) }).then(() => {
                    isBetPlaced = false; btn.innerHTML = `<span>CASHED OUT ✅</span>`;
                    winMsg.innerHTML = `YOU WIN!<br>₹${winAmount}`; winMsg.style.display = 'block';
                });
            }
        }

        function addToHistory(val) {
            let hist = document.getElementById('historyBar');
            let el = `<div class="hist-pill ${val<2?'hist-red':(val>10?'hist-gold':'hist-green')}">${val.toFixed(2)}x</div>`;
            hist.insertAdjacentHTML('afterbegin', el);
        }
        setTimeout(startGameLoop, 500);
    </script>
</body>
</html>
