<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Admin - Result Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #0a0a0b; color: #fff; font-family: sans-serif; padding: 15px; margin: 0; }
        .header { background: linear-gradient(45deg, #b21f1f, #1a2a6c); padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 20px; border-bottom: 3px solid #ffd700; }
        .m-card { background: #1a1a1e; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 5px solid #00ff88; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .m-name { font-weight: 900; color: #ffd700; font-size: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; }
        .inputs { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; background: #000; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 16px; outline: none; }
        input:focus { border-color: #ffd700; }
        .btn-pay { width: 100%; background: #00ff88; color: #000; border: none; padding: 12px; border-radius: 6px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .live-tag { font-size: 12px; color: #00ffff; background: #000; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="header"><h1>👑 RESULT ADMIN</h1></div>

    <div id="panel-container">
        <p style="text-align:center;">Connecting to Firebase...</p>
    </div>

    <script>
        // 🔥 Aapka Firebase Config 🔥
        const firebaseConfig = { 
            apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", 
            databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", 
            projectId: "kalyan-casino" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const markets = {
            "time_day": "TIME BAZAR",
            "madhur_day": "MADHUR DAY",
            "milan_day": "MILAN DAY",
            "kalyan_day": "KALYAN",
            "time_night": "TIME BAZAR NIGHT",
            "madhur_night": "MADHUR NIGHT",
            "milan_night": "MILAN NIGHT",
            "kalyan_night": "KALYAN NIGHT"
        };

        const container = document.getElementById('panel-container');

        // Panel UI generate karna
        function loadPanel() {
            container.innerHTML = '';
            Object.keys(markets).forEach(id => {
                container.innerHTML += `
                    <div class="m-card">
                        <div class="m-name">
                            ${markets[id]} <span class="live-tag" id="live_${id}">***-**-***</span>
                        </div>
                        <div class="inputs">
                            <input type="number" id="op_${id}" placeholder="Open">
                            <input type="number" id="jo_${id}" placeholder="Jodi">
                            <input type="number" id="cl_${id}" placeholder="Close">
                        </div>
                        <button class="btn-pay" onclick="sendResult('${id}')">Publish Ank</button>
                    </div>
                `;
            });
        }
        loadPanel();

        // Live update dikhane ke liye
        db.ref('market').on('value', snap => {
            const data = snap.val() || {};
            Object.keys(markets).forEach(id => {
                if(data[id] && data[id].result) {
                    document.getElementById('live_'+id).innerText = data[id].result;
                }
            });
        });

        // 🔥 Result bhejne ka logic 🔥
        function sendResult(id) {
            let op = document.getElementById('op_'+id).value || "***";
            let jo = document.getElementById('jo_'+id).value || "**";
            let cl = document.getElementById('cl_'+id).value || "***";
            
            let final = `${op}-${jo}-${cl}`;

            db.ref('market/' + id).update({ result: final }).then(() => {
                alert("✅ Live: " + final);
                document.getElementById('op_'+id).value = '';
                document.getElementById('jo_'+id).value = '';
                document.getElementById('cl_'+id).value = '';
            });
        }
    </script>
</body>
</html>
