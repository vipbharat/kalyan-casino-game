<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan Pro - Deposit VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b0b0b; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .header { display: flex; align-items: center; margin-bottom: 25px; }
        .header i { font-size: 20px; color: gold; cursor: pointer; }
        .header h2 { flex: 1; margin: 0; font-size: 18px; color: gold; text-transform: uppercase; }

        /* 🚀 DYNAMIC QR SECTION 🚀 */
        .qr-card { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid gold; margin-bottom: 20px; box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); position: relative; }
        .qr-wrapper { position: relative; display: inline-block; }
        .qr-card img { width: 200px; height: 200px; background: #fff; border-radius: 10px; padding: 5px; transition: 0.3s; filter: blur(5px); }
        .qr-lock { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 10px; color: gold; font-weight: bold; font-size: 14px; z-index: 2; }
        .qr-lock i { font-size: 30px; margin-bottom: 10px; color: #ff4b2b; }
        .qr-text { margin-top: 10px; font-size: 14px; color: #aaa; font-weight: bold; }
        
        /* TIMER CSS */
        .timer-text { font-size: 16px; font-weight: bold; color: #ff4b2b; margin-top: 10px; display: none; }
        .timer-blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        /* 🌈 COLORFUL BUTTONS 🌈 */
        .amount-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .amt-btn { border: 2px solid transparent; color: #fff; padding: 8px 2px; border-radius: 8px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.4); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .amt-btn .btn-pct { font-size: 10px; font-weight: bold; background: rgba(0,0,0,0.4); padding: 2px 6px; border-radius: 10px; margin-bottom: 4px; pointer-events: none; }
        .amt-btn .btn-val { font-size: 14px; font-weight: 900; pointer-events: none; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
        .amt-btn:active { transform: scale(0.9); }
        .amt-btn.active { border-color: #fff; box-shadow: 0 0 15px #fff; transform: scale(1.05); }

        .amt-btn:nth-child(1) { background: linear-gradient(45deg, #ff416c, #ff4b2b); } 
        .amt-btn:nth-child(2) { background: linear-gradient(45deg, #36d1dc, #5b86e5); } 
        .amt-btn:nth-child(3) { background: linear-gradient(45deg, #11998e, #38ef7d); } 
        .amt-btn:nth-child(4) { background: linear-gradient(45deg, #b224ef, #7579ff); } 
        .amt-btn:nth-child(5) { background: linear-gradient(45deg, #f12711, #f5af19); } 
        .amt-btn:nth-child(6) { background: linear-gradient(45deg, #fc00ff, #00dbde); } 
        .amt-btn:nth-child(7) { background: linear-gradient(45deg, #00b09b, #96c93d); } 
        .amt-btn:nth-child(8) { background: linear-gradient(45deg, #f7971e, #ffd200); color: #000; } 
        .amt-btn:nth-child(8) .btn-val { text-shadow: none; }

        .bonus-msg { background: rgba(0, 255, 136, 0.1); color: #00ff88; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: bold; margin-bottom: 15px; display: none; border: 1px dashed #00ff88; }

        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #151515; border: 1px solid #333; border-radius: 8px; color: #fff; box-sizing: border-box; font-weight: bold; }
        input:focus { outline: none; border-color: gold; }
        
        /* 🚀 GENERATE & PAY BUTTONS 🚀 */
        .btn-generate { width: 100%; padding: 15px; background: linear-gradient(45deg, #00c6ff, #0072ff); color: #fff; border: none; border-radius: 8px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4); display: none; }
        .btn-direct-pay { width: 100%; padding: 15px; background: linear-gradient(45deg, #11998e, #38ef7d); color: #000; border: none; border-radius: 8px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(56, 239, 125, 0.4); display: none; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        
        .btn-submit { width: 100%; padding: 15px; background: linear-gradient(90deg, #b38728, #fbf5b7, #b38728); color: #000; border: none; border-radius: 8px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        .btn-submit:disabled { background: #555; color: #888; cursor: not-allowed; }
        
        .upload-btn { background: #222; border: 1px dashed gold; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: block; cursor: pointer; color: gold; font-size: 13px; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa fa-arrow-left" onclick="window.location.href='dashboard.html'"></i>
        <h2>Add Money VIP</h2>
    </div>

    <div class="qr-card">
        <div class="qr-wrapper">
            <img id="display-qr" src="https://via.placeholder.com/200x200?text=LOCKED" alt="Payment QR">
            <div id="qr-lock-overlay" class="qr-lock">
                <i class="fa fa-lock"></i>
                Enter Amount to Unlock QR
            </div>
        </div>
        <div class="qr-text" id="payee-name-display">SECURE PAYMENT</div>
        <div id="qr-timer" class="timer-text timer-blink">⏳ Expires in: 05:00</div>
    </div>

    <div class="amount-grid">
        <button class="amt-btn" onclick="setAmt(100, this)"><span class="btn-pct">+5%</span><span class="btn-val">₹100</span></button>
        <button class="amt-btn" onclick="setAmt(200, this)"><span class="btn-pct">+5%</span><span class="btn-val">₹200</span></button>
        <button class="amt-btn" onclick="setAmt(500, this)"><span class="btn-pct">+5%</span><span class="btn-val">₹500</span></button>
        <button class="amt-btn" onclick="setAmt(1000, this)"><span class="btn-pct">+5%</span><span class="btn-val">₹1000</span></button>
        <button class="amt-btn" onclick="setAmt(5000, this)"><span class="btn-pct">+5%</span><span class="btn-val">₹5000</span></button>
        <button class="amt-btn" onclick="setAmt(10000, this)"><span class="btn-pct">+7%</span><span class="btn-val">₹10K</span></button>
        <button class="amt-btn" onclick="setAmt(20000, this)"><span class="btn-pct">+7%</span><span class="btn-val">₹20K</span></button>
        <button class="amt-btn" onclick="setAmt(50000, this)"><span class="btn-pct">+9%</span><span class="btn-val">₹50K</span></button>
    </div>

    <div id="bonus-banner" class="bonus-msg"></div>

    <div style="text-align: left;">
        <label style="font-size: 11px; color: gold; margin-left: 5px;">ENTER AMOUNT:</label>
        <input type="number" id="dep-amount" oninput="handleAmountInput(this.value)" placeholder="Enter Amount">
        
        <button id="btn-generate" class="btn-generate" onclick="generateDynamicQR()">🔲 GENERATE QR CODE</button>
        
        <button id="direct-pay-btn" class="btn-direct-pay" onclick="payDirectly()">💳 PAY VIA UPI APP</button>

        <label style="font-size: 11px; color: gold; margin-left: 5px;">UTR / TRANSACTION ID:</label>
        <input type="text" id="dep-utr" placeholder="12 Digit UTR Number">

        <label class="upload-btn" id="ss-label" onclick="document.getElementById('file-input').click()">
            <i class="fa fa-camera"></i> Upload Screenshot
        </label>
        <input type="file" id="file-input" style="display: none;" onchange="ssSelected()">
    </div>

    <button class="btn-submit" id="submitBtn" onclick="submitDeposit()">SUBMIT REQUEST</button>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const phone = localStorage.getItem('userPhone') || localStorage.getItem('phone') || "Unknown User";

        let baseUpiUrl = ""; 
        let payeeNameStr = "Kalyan VIP";
        let countdownTimer;

        // Fetch UPI ID
        db.ref('admin_settings/payment').on('value', (snap) => {
            const data = snap.val();
            if(data && data.upi_id) {
                const names = ["Bharat Pay", "VIP Services", "Kalyan Digital", "Game Hub", "Super Payments"];
                payeeNameStr = names[Math.floor(Math.random() * names.length)];
                baseUpiUrl = `upi://pay?pa=${data.upi_id}&pn=${encodeURIComponent(payeeNameStr)}&cu=INR`;
                document.getElementById('payee-name-display').innerText = `Select Amount to Pay: ${payeeNameStr}`;
            }
        });

        function setAmt(val, btnElement) {
            document.getElementById('dep-amount').value = val;
            handleAmountInput(val);
            
            let btns = document.querySelectorAll('.amt-btn');
            btns.forEach(b => b.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
        }

        function handleAmountInput(val) {
            let amount = parseFloat(val);
            let genBtn = document.getElementById('btn-generate');
            let payBtn = document.getElementById('direct-pay-btn');
            calcBonus(amount);

            if (amount > 0) {
                genBtn.style.display = "block";
                genBtn.innerText = `🔲 GENERATE QR FOR ₹${amount}`;
                payBtn.style.display = "block";
                payBtn.innerText = `💳 PAY ₹${amount} VIA UPI APP`;
                lockQR();
            } else {
                genBtn.style.display = "none";
                payBtn.style.display = "none";
                lockQR();
            }
        }

        function lockQR() {
            clearInterval(countdownTimer);
            document.getElementById('qr-lock-overlay').style.display = "flex";
            document.getElementById('display-qr').style.filter = "blur(5px)";
            document.getElementById('qr-timer').style.display = "none";
            document.getElementById('payee-name-display').innerText = `Select Amount to Pay: ${payeeNameStr}`;
        }

        function generateDynamicQR() {
            let amount = parseFloat(document.getElementById('dep-amount').value);
            if(amount > 0 && baseUpiUrl !== "") {
                let finalUpiLink = baseUpiUrl + `&am=${amount}`;
                let qrImg = document.getElementById('display-qr');
                qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(finalUpiLink)}`;
                qrImg.style.filter = "none";
                document.getElementById('qr-lock-overlay').style.display = "none";
                document.getElementById('payee-name-display').innerText = `Scan to Pay ₹${amount} to ${payeeNameStr}`;
                startTimer(300); 
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                alert("⚠️ Kripya pehle sahi amount select karein!");
            }
        }

        function startTimer(durationInSeconds) {
            clearInterval(countdownTimer);
            let timerDisplay = document.getElementById('qr-timer');
            timerDisplay.style.display = "block";
            timerDisplay.style.color = "#00ff88"; 
            timerDisplay.classList.remove('timer-blink');

            let timer = durationInSeconds;
            
            countdownTimer = setInterval(function () {
                let minutes = parseInt(timer / 60, 10);
                let seconds = parseInt(timer % 60, 10);

                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;

                timerDisplay.innerText = `⏳ QR Expires in: ${minutes}:${seconds}`;

                if(timer < 60) {
                    timerDisplay.style.color = "#ff4b2b";
                    timerDisplay.classList.add('timer-blink');
                }

                if (--timer < 0) {
                    clearInterval(countdownTimer);
                    lockQR();
                    document.getElementById('qr-lock-overlay').innerHTML = "<i class='fa fa-times-circle'></i> QR CODE EXPIRED<br><span style='font-size:10px; margin-top:5px;'>Generate Again</span>";
                    document.getElementById('qr-lock-overlay').style.color = "#ff4b2b";
                }
            }, 1000);
        }

        function payDirectly() {
            let amount = parseFloat(document.getElementById('dep-amount').value);
            if(amount > 0 && baseUpiUrl !== "") {
                let finalUpiLink = baseUpiUrl + `&am=${amount}`;
                window.location.href = finalUpiLink; 
            } else {
                alert("⚠️ Kripya pehle sahi amount select karein!");
            }
        }

        function calcBonus(amount) {
            let bonus = 0;
            let percent = 0;
            let banner = document.getElementById('bonus-banner');

            if (isNaN(amount) || amount <= 0) {
                banner.style.display = "none"; return;
            }

            if (amount > 0 && amount <= 5000) { percent = 5; } 
            else if (amount > 5000 && amount <= 20000) { percent = 7; } 
            else if (amount > 20000) { percent = 9; } 

            if (percent > 0) {
                bonus = (amount * percent) / 100;
                banner.style.display = "block";
                banner.innerHTML = `🎁 VIP BONUS ALERT! <br> Get ₹${bonus.toFixed(2)} Extra (${percent}% Bonus)`;
            } else {
                banner.style.display = "none";
            }
        }

        function ssSelected() { 
            document.getElementById('ss-label').innerHTML = "✅ SCREENSHOT ADDED"; 
            document.getElementById('ss-label').style.color = "#00ff88";
            document.getElementById('ss-label').style.borderColor = "#00ff88";
        }

        // 🔥 YAHAN HUA ASLI JADU (Saving direct to user_history) 🔥
        function submitDeposit() {
            const amt = document.getElementById('dep-amount').value;
            const utr = document.getElementById('dep-utr').value;
            const btn = document.getElementById('submitBtn');

            if(!amt || !utr) { alert("Please enter Amount and 12-Digit UTR Number!"); return; }

            btn.innerText = "PROCESSING...";
            btn.disabled = true;

            const time = new Date().toLocaleString('en-IN');

            // 1. Database mein Deposit aur Withdrawal dono ek hi jagah (user_history) save honge
            db.ref('user_history/' + phone).push({
                type: 'DEPOSIT',
                amount: amt,
                utr: utr,
                status: 'PENDING',
                date: time,
                timestamp: Date.now()
            }).then(() => {
                
                // 2. Telegram par alert bhejna
                const botToken = "8728052311:AAGa9hj7yZ2skBT5krMYsHshazsi03LCOJM";
                const chatId = "7061035346";
                const msg = `🚨 *NEW DEPOSIT* 🚨%0A👤 Player: ${phone}%0A💰 Amount: ₹${amt}%0A🧾 UTR: ${utr}%0A🕒 Time: ${time}%0A👉 *Admin Panel se PENDING clear karein!*`;
                
                fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${msg}&parse_mode=Markdown`)
                .then(() => {
                    alert("✅ Request Sent! Check your History.");
                    window.location.href = "history.html";
                }).catch(() => {
                    alert("✅ Request Sent! Check your History.");
                    window.location.href = "history.html";
                });

            }).catch(err => {
                // Agar kabhi error aaya toh bata dega
                alert("Error: " + err.message);
                btn.innerText = "SUBMIT REQUEST";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
