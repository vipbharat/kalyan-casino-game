<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan Pro - Deposit VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b0b0b; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .header { display: flex; align-items: center; margin-bottom: 25px; }
        .header i { font-size: 20px; color: gold; cursor: pointer; }
        .header h2 { flex: 1; margin: 0; font-size: 18px; color: gold; text-transform: uppercase; }

        /* QR Code Box */
        .qr-card { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid gold; margin-bottom: 20px; box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }
        .qr-card img { width: 200px; height: 200px; background: #fff; border-radius: 10px; padding: 5px; transition: 0.3s; }
        .qr-text { margin-top: 10px; font-size: 12px; color: #aaa; font-weight: bold; letter-spacing: 1px; }

        /* UPI Box */
        .upi-box { background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .upi-id { color: gold; font-weight: bold; font-size: 14px; margin-top: 2px;}
        .copy-btn { background: gold; color: #000; border: none; padding: 6px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .copy-btn:active { transform: scale(0.95); }

        /* Form */
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #151515; border: 1px solid #333; border-radius: 8px; color: #fff; box-sizing: border-box; font-size: 14px; font-weight: bold; }
        input:focus { outline: none; border-color: gold; box-shadow: 0 0 8px rgba(255, 215, 0, 0.3); }
        .btn-submit { width: 100%; padding: 15px; background: linear-gradient(90deg, #b38728, #fbf5b7, #b38728); color: #000; border: none; border-radius: 8px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .upload-btn { background: #222; border: 1px dashed gold; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: block; cursor: pointer; color: gold; font-size: 13px; transition: 0.3s; }
        .upload-btn:active { background: #333; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa fa-arrow-left" onclick="window.history.back()"></i>
        <h2>Add Money</h2>
    </div>

    <div class="qr-card">
        <img id="display-qr" src="https://via.placeholder.com/200x200?text=Loading+QR..." alt="Payment QR">
        <div class="qr-text" id="payee-name-display">Loading SECURE QR...</div>
    </div>

    <div class="upi-box">
        <div style="text-align: left;">
            <div style="font-size: 10px; color: #888;">UPI ID:</div>
            <div class="upi-id" id="display-upi">Loading...</div>
        </div>
        <button class="copy-btn" onclick="copyUPI()">COPY</button>
    </div>

    <div style="text-align: left; margin-bottom: 20px;">
        <label style="font-size: 12px; color: gold; font-weight: bold; margin-left: 5px;">Amount (₹):</label>
        <input type="number" id="dep-amount" placeholder="Minimum ₹100">
        
        <label style="font-size: 12px; color: gold; font-weight: bold; margin-left: 5px;">Transaction ID / UTR:</label>
        <input type="text" id="dep-utr" placeholder="12 Digit UTR Number">

        <label class="upload-btn" id="ss-label" onclick="document.getElementById('file-input').click()">
            <i class="fa fa-camera"></i> Upload Payment Screenshot
        </label>
        <input type="file" id="file-input" style="display: none;" onchange="handleFile(this)">
    </div>

    <button class="btn-submit" id="submitBtn" onclick="submitDeposit()">SUBMIT REQUEST</button>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo",
            databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com",
            projectId: "kalyan-casino"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const phone = localStorage.getItem('userPhone') || localStorage.getItem('phone') || "Unknown Player";
        let ssUrl = "";

        // 🔥 VIP FEATURE 1: RANDOM NAME LIVE QR GENERATOR 🔥
        db.ref('admin_settings/payment').on('value', (snap) => {
            const data = snap.val();
            if(data && data.upi_id) {
                const myUpiID = data.upi_id;
                document.getElementById('display-upi').innerText = myUpiID;

                // Random Naam Ki List
                const randomNames = ["Bharat Pay", "VIP Services", "Game Hub", "Kalyan Digital", "Online Recharge", "Super Payments"];
                const selectedName = randomNames[Math.floor(Math.random() * randomNames.length)];
                
                // UPI URL Banaya jisme Random Naam hoga
                const upiURL = `upi://pay?pa=${myUpiID}&pn=${encodeURIComponent(selectedName)}&cu=INR`;
                
                // Live QR API se Photo Banayi
                document.getElementById('display-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upiURL)}`;
                document.getElementById('payee-name-display').innerText = `Scan to Pay: ${selectedName}`;
            }
        });

        function copyUPI() {
            const upi = document.getElementById('display-upi').innerText;
            navigator.clipboard.writeText(upi);
            alert("UPI ID Copied! Ab payment app mein paste karein.");
        }

        function handleFile(input) {
            // Yahan ImgBB ya Firebase storage ka code aayega
            alert("Screenshot Selected!");
            ssUrl = "IMAGE_LINK_HERE"; 
            document.getElementById('ss-label').innerHTML = "✅ Screenshot Attached";
            document.getElementById('ss-label').style.borderColor = "#00ff88";
            document.getElementById('ss-label').style.color = "#00ff88";
        }

        function submitDeposit() {
            const amt = document.getElementById('dep-amount').value;
            const utr = document.getElementById('dep-utr').value;
            const btn = document.getElementById('submitBtn');

            if(!amt || !utr) { alert("Amount aur UTR dono daalna zaroori hai!"); return; }

            // Button ko lock kar do taaki double submit na ho
            btn.innerText = "PROCESSING...";
            btn.disabled = true;

            const timeNow = new Date().toLocaleString('en-IN');

            db.ref('requests').push({
                phone: phone,
                amount: amt,
                utr: utr,
                image: ssUrl,
                type: 'DEPOSIT',
                status: 'PENDING',
                time: timeNow
            }).then(() => {
                
                // 🔥 VIP FEATURE 2: TELEGRAM AUTO-ALERT 🔥
                const botToken = "8728052311:AAGa9hj7yZ2skBT5krMYsHshazsi03LCOJM";
                const chatId = "7061035346";
                const message = `🚨 *NEW DEPOSIT REQUEST* 🚨%0A%0A👤 *Player:* ${phone}%0A💰 *Amount:* ₹${amt}%0A🧾 *UTR:* ${utr}%0A🕒 *Time:* ${timeNow}%0A%0A👉 *Jaldi Admin Panel Check Karein!*`;
                
                const telegramUrl = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${message}&parse_mode=Markdown`;

                // Chup-chaap background mein message bhej do
                fetch(telegramUrl)
                    .then(() => {
                        alert("✅ Request Bhej Di Gayi Hai! 5-10 minute intezar karein.");
                        window.location.href = "dashboard.html"; // Wapas dashboard par
                    })
                    .catch(err => {
                        // Agar Telegram network fail bhi hua, request save ho gayi hai
                        alert("✅ Request Bhej Di Gayi Hai! 5-10 minute intezar karein.");
                        window.location.href = "dashboard.html";
                    });

            }).catch(error => {
                alert("Error: " + error.message);
                btn.innerText = "SUBMIT REQUEST";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
