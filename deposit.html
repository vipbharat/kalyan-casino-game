<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan Pro - Deposit VIP Bonus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b0b0b; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .header { display: flex; align-items: center; margin-bottom: 25px; }
        .header i { font-size: 20px; color: gold; cursor: pointer; }
        .header h2 { flex: 1; margin: 0; font-size: 18px; color: gold; text-transform: uppercase; }

        .qr-card { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid gold; margin-bottom: 20px; box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }
        .qr-card img { width: 200px; height: 200px; background: #fff; border-radius: 10px; padding: 5px; }
        .qr-text { margin-top: 10px; font-size: 12px; color: #aaa; font-weight: bold; }

        /* 🌈 COLORFUL BUTTONS CSS 🌈 */
        .amount-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .amt-btn { 
            border: 2px solid transparent; 
            color: #fff; 
            padding: 10px 5px; 
            border-radius: 8px; 
            font-weight: 900; 
            cursor: pointer; 
            font-size: 13px; 
            transition: 0.2s; 
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
        }
        .amt-btn:active { transform: scale(0.9); }
        .amt-btn.active { border-color: #fff; box-shadow: 0 0 15px #fff; transform: scale(1.05); }

        .amt-btn:nth-child(1) { background: linear-gradient(45deg, #ff416c, #ff4b2b); } /* Red Glow */
        .amt-btn:nth-child(2) { background: linear-gradient(45deg, #36d1dc, #5b86e5); } /* Blue Glow */
        .amt-btn:nth-child(3) { background: linear-gradient(45deg, #11998e, #38ef7d); } /* Green Glow */
        .amt-btn:nth-child(4) { background: linear-gradient(45deg, #b224ef, #7579ff); } /* Purple Glow */
        .amt-btn:nth-child(5) { background: linear-gradient(45deg, #f12711, #f5af19); } /* Fire Orange */
        .amt-btn:nth-child(6) { background: linear-gradient(45deg, #fc00ff, #00dbde); } /* Pink Cyan */
        .amt-btn:nth-child(7) { background: linear-gradient(45deg, #00b09b, #96c93d); } /* Lime Glow */
        .amt-btn:nth-child(8) { background: linear-gradient(45deg, #f7971e, #ffd200); color: #000; text-shadow: none; } /* Pure Gold */

        .bonus-msg { background: rgba(0, 255, 136, 0.1); color: #00ff88; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: bold; margin-bottom: 15px; display: none; border: 1px dashed #00ff88; }

        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #151515; border: 1px solid #333; border-radius: 8px; color: #fff; box-sizing: border-box; font-weight: bold; }
        input:focus { outline: none; border-color: gold; }
        
        .btn-submit { width: 100%; padding: 15px; background: linear-gradient(90deg, #b38728, #fbf5b7, #b38728); color: #000; border: none; border-radius: 8px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        .btn-submit:disabled { background: #555; color: #888; cursor: not-allowed; }
        
        .upload-btn { background: #222; border: 1px dashed gold; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: block; cursor: pointer; color: gold; font-size: 13px; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa fa-arrow-left" onclick="window.history.back()"></i>
        <h2>Add Money</h2>
    </div>

    <div class="qr-card">
        <img id="display-qr" src="https://via.placeholder.com/200x200?text=QR+Loading..." alt="Payment QR">
        <div class="qr-text" id="payee-name-display">SECURE PAYMENT</div>
    </div>

    <div class="amount-grid">
        <button class="amt-btn" onclick="setAmt(2, this)">₹2</button>
        <button class="amt-btn" onclick="setAmt(5, this)">₹5</button>
        <button class="amt-btn" onclick="setAmt(10, this)">₹10</button>
        <button class="amt-btn" onclick="setAmt(15, this)">₹15</button>
        <button class="amt-btn" onclick="setAmt(20, this)">₹20</button>
        <button class="amt-btn" onclick="setAmt(30, this)">₹30</button>
        <button class="amt-btn" onclick="setAmt(100, this)">₹100</button>
        <button class="amt-btn" onclick="setAmt(500, this)">₹500</button>
    </div>

    <div id="bonus-banner" class="bonus-msg"></div>

    <div style="text-align: left;">
        <label style="font-size: 11px; color: gold; margin-left: 5px;">ENTER AMOUNT:</label>
        <input type="number" id="dep-amount" oninput="calcBonus(this.value)" placeholder="Enter Amount">
        
        <label style="font-size: 11px; color: gold; margin-left: 5px;">UTR / TRANSACTION ID:</label>
        <input type="text" id="dep-utr" placeholder="12 Digit UTR Number">

        <label class="upload-btn" id="ss-label" onclick="document.getElementById('file-input').click()">
            <i class="fa fa-camera"></i> Upload Screenshot
        </label>
        <input type="file" id="file-input" style="display: none;" onchange="ssSelected()">
    </div>

    <button class="btn-submit" id="submitBtn" onclick="submitDeposit()">SUBMIT REQUEST</button>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const phone = localStorage.getItem('userPhone') || localStorage.getItem('phone') || "Unknown User";

        // QR Sync
        db.ref('admin_settings/payment').on('value', (snap) => {
            const data = snap.val();
            if(data && data.upi_id) {
                const names = ["Bharat Pay", "VIP Services", "Kalyan Digital", "Game Hub", "Super Payments"];
                const name = names[Math.floor(Math.random() * names.length)];
                const upi = `upi://pay?pa=${data.upi_id}&pn=${encodeURIComponent(name)}&cu=INR`;
                document.getElementById('display-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upi)}`;
                document.getElementById('payee-name-display').innerText = `Scan to Pay: ${name}`;
            }
        });

        // Amount Set and Button Highlight
        function setAmt(val, btnElement) {
            document.getElementById('dep-amount').value = val;
            calcBonus(val);
            
            let btns = document.querySelectorAll('.amt-btn');
            btns.forEach(b => b.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
        }

        // Bonus Logic
        function calcBonus(val) {
            let amount = parseFloat(val);
            let bonus = 0;
            let percent = 0;
            let banner = document.getElementById('bonus-banner');

            if (isNaN(amount) || amount <= 0) {
                banner.style.display = "none";
                return;
            }

            if (amount > 0 && amount < 10) { percent = 5; }
            else if (amount >= 10 && amount < 30) { percent = 7; }
            else if (amount >= 30) { percent = 9; }

            if (percent > 0) {
                bonus = (amount * percent) / 100;
                banner.style.display = "block";
                banner.innerHTML = `🎁 BONUS ALERT! <br> Get ₹${bonus.toFixed(2)} Extra (${percent}% Bonus)`;
            } else {
                banner.style.display = "none";
            }
        }

        // Screenshot logic
        function ssSelected() { 
            document.getElementById('ss-label').innerHTML = "✅ SCREENSHOT ADDED"; 
            document.getElementById('ss-label').style.color = "#00ff88";
            document.getElementById('ss-label').style.borderColor = "#00ff88";
        }

        // Submit to Firebase and Telegram
        function submitDeposit() {
            const amt = document.getElementById('dep-amount').value;
            const utr = document.getElementById('dep-utr').value;
            const btn = document.getElementById('submitBtn');

            if(!amt || !utr) { alert("Please enter Amount and UTR!"); return; }

            // Lock the button
            btn.innerText = "PROCESSING...";
            btn.disabled = true;

            const botToken = "8728052311:AAGa9hj7yZ2skBT5krMYsHshazsi03LCOJM";
            const chatId = "7061035346";
            const time = new Date().toLocaleString('en-IN');

            db.ref('requests').push({ phone, amount: amt, utr, type: 'DEPOSIT', status: 'PENDING', time }).then(() => {
                const msg = `🚨 *NEW DEPOSIT* 🚨%0A👤 Player: ${phone}%0A💰 Amount: ₹${amt}%0A🧾 UTR: ${utr}%0A🕒 Time: ${time}%0A👉 *Admin Panel Check Karein!*`;
                
                fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${msg}&parse_mode=Markdown`)
                .then(() => {
                    alert("✅ Request Sent Successfully!");
                    window.location.href = "dashboard.html";
                }).catch(() => {
                    alert("✅ Request Sent Successfully!");
                    window.location.href = "dashboard.html";
                });
            }).catch(err => {
                alert("Error: " + err.message);
                btn.innerText = "SUBMIT REQUEST";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
