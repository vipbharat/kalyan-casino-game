<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Game Record</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Roboto', sans-serif; }
        body { background-color:#0d0518; color:#fff; padding-bottom:70px; }
        .header { background:linear-gradient(90deg, #2a0845, #6441A5); padding:15px; text-align: center; position:sticky; top:0; z-index:100; border-bottom: 3px solid #ffd700; box-shadow: 0 4px 15px rgba(255,215,0,0.2); }
        .header h1 { font-size: 20px; color: #ffd700; letter-spacing: 2px; margin-bottom: 5px; font-weight: 900; text-transform: uppercase; }
        
        .tab-container { display: flex; background: #160a2c; border-bottom: 2px solid #3d1b63; }
        .tab-btn { flex: 1; padding: 15px; text-align: center; font-weight: 900; color: #b39ddb; background: transparent; border: none; cursor: pointer; text-transform: uppercase; transition: 0.3s; font-size: 14px; }
        .tab-btn.active { color: #ffd700; border-bottom: 4px solid #ffd700; background: rgba(255,215,0,0.1); }
        
        .content-section { display: none; padding: 15px; }
        .content-section.active { display: block; }

        .card { background:#150727; border-radius:12px; padding:15px; margin-bottom:15px; border: 1px solid #3d1b63; box-shadow: 0 5px 15px rgba(0,0,0,0.8); border-left: 5px solid #00ff88; }
        .card.pending { border-left-color: #ffd700; }
        .card.win { border-left-color: #00ff88; }
        .card.loss { border-left-color: #ff3333; }
        
        .c-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .c-title { font-size: 16px; font-weight: 900; color: #ffd700; text-transform: uppercase; }
        .c-status { font-size: 12px; font-weight: bold; background: #000; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; }
        .c-status.pending { color: #ffd700; border: 1px solid #ffd700; }
        .c-status.win { color: #00ff88; border: 1px solid #00ff88; }
        .c-status.loss { color: #ff3333; border: 1px solid #ff3333; }
        .c-info { font-size: 13px; color: #ccc; }
        .c-amt { font-size: 18px; font-weight: 900; color: #fff; }
        
        .date-header { background: #2a0845; padding: 10px; border-radius: 6px; font-weight: bold; color: #ffd700; margin-top: 15px; margin-bottom: 10px; border-left: 4px solid #ffd700; }
        .hist-table { width: 100%; border-collapse: collapse; background: #0a0312; border-radius: 8px; overflow: hidden; }
        .hist-table th, .hist-table td { padding: 12px; text-align: left; border-bottom: 1px solid #3d1b63; font-size: 14px; }
        .hist-table th { background: #160a2c; color: #b39ddb; font-weight: 900; }
        .hist-table td { color: #00ffff; font-weight: bold; letter-spacing: 1px; }
        .hist-table tr:last-child td { border-bottom: none; }
        .m-name-td { color: #fff !important; font-weight: normal !important; letter-spacing: 0 !important; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #160a2c; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #3d1b63; z-index: 90; }
        .nav-btn { color: #b39ddb; text-decoration: none; font-weight: bold; font-size: 12px; text-align: center; }
        .nav-btn i { font-size: 18px; display: block; margin-bottom: 4px; }
        .nav-btn.active { color: #ffd700; }
    </style>
</head>
<body>

    <header class="header">
        <h1>👑 VIP GAME RECORD</h1>
    </header>

    <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab('bets')">📝 My Bets</button>
        <button class="tab-btn" onclick="switchTab('market')">📊 7-Day Chart</button>
    </div>

    <div id="betsSection" class="content-section active">
        <div id="betsContainer">
            <p style="text-align:center; color:#6441A5; margin-top:20px;"><i class="fa-solid fa-spinner fa-spin"></i> Loading your bets...</p>
        </div>
    </div>

    <div id="marketSection" class="content-section">
        <div id="historyContainer">
            <p style="text-align:center; color:#6441A5; margin-top:20px;"><i class="fa-solid fa-spinner fa-spin"></i> Loading market records...</p>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="Market.html" class="nav-btn"><i class="fa-solid fa-gamepad"></i>Play</a>
        <a href="GameRecord.html" class="nav-btn active"><i class="fa-solid fa-clock-rotate-left"></i>History</a>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 🔥 NUMBER FETCH FIX 🔥
        const userPhone = localStorage.getItem('userPhone') || localStorage.getItem('phone');

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            if(tab === 'bets') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('betsSection').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('marketSection').classList.add('active');
            }
        }

        if(userPhone) {
            db.ref('BetHistory/' + userPhone).orderByChild('timestamp').limitToLast(50).on('value', snap => {
                const container = document.getElementById('betsContainer');
                container.innerHTML = '';
                if(!snap.exists()) {
                    container.innerHTML = '<p style="text-align:center; color:#888;">No bets placed yet.</p>';
                    return;
                }
                
                let betsHtml = '';
                let betsArray = [];
                snap.forEach(child => { betsArray.push(child.val()); });
                betsArray.reverse();

                betsArray.forEach(bet => {
                    let d = new Date(bet.timestamp).toLocaleString('en-IN', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
                    let statClass = bet.status === 'pending' ? 'pending' : (bet.status === 'win' ? 'win' : 'loss');
                    
                    betsHtml += `
                        <div class="card ${statClass}">
                            <div class="c-row">
                                <div class="c-title">${bet.marketName} <span style="font-size:10px; color:#aaa;">(${bet.session})</span></div>
                                <div class="c-status ${statClass}">${bet.status}</div>
                            </div>
                            <div class="c-row c-info">
                                <div>Game: <span style="color:#fff;">${bet.gameType}</span></div>
                                <div>Date: ${d}</div>
                            </div>
                            <div class="c-row" style="margin-top:10px; align-items:flex-end;">
                                <div class="c-info">Number: <span style="font-size:20px; color:#00ffff; font-weight:bold;">${bet.bidNumber}</span></div>
                                <div class="c-amt">₹${bet.betAmount}</div>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = betsHtml;
            });
        } else {
            document.getElementById('betsContainer').innerHTML = '<p style="text-align:center; color:#ff3333; margin-top:20px; font-weight:bold;">Please Login to see your bets.</p>';
        }

        db.ref('MarketHistory').limitToLast(7).on('value', snap => {
            const container = document.getElementById('historyContainer');
            container.innerHTML = '';
            if(!snap.exists()) {
                container.innerHTML = '<p style="text-align:center; color:#888;">No chart data available.</p>';
                return;
            }

            let histHtml = '';
            let datesArray = [];
            snap.forEach(child => { datesArray.push({ date: child.key, data: child.val() }); });
            datesArray.reverse();

            datesArray.forEach(day => {
                histHtml += `<div class="date-header">📅 ${day.date}</div>`;
                histHtml += `<table class="hist-table"><tr><th>Market</th><th>Result Ank</th></tr>`;
                
                for (const [marketId, result] of Object.entries(day.data)) {
                    let mName = marketId.replace('_day', ' DAY').replace('_night', ' NIGHT').replace('time', 'TIME BAZAR').toUpperCase();
                    histHtml += `<tr><td class="m-name-td">${mName}</td><td>${result}</td></tr>`;
                }
                histHtml += `</table>`;
            });
            container.innerHTML = histHtml;
        });
    </script>
</body>
</html>
