<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan VIP - ESPN Auto Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #050a15; color: #fff; margin: 0; padding: 20px; }
        
        /* 🔥 ESPN BLUE THEME 🔥 */
        .header { background: linear-gradient(135deg, #021b3a, #03a9f4); padding: 15px; text-align: center; font-weight: 900; font-size: 20px; border-radius: 10px; margin-bottom: 20px; color: #fff; box-shadow: 0 0 15px rgba(3,169,244,0.4); text-transform: uppercase; letter-spacing: 1px;}
        .admin-box { background: #0b1320; border: 1px solid #1a2c4a; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .admin-box h3 { color: #03a9f4; margin-top: 0; border-bottom: 1px dashed #1a2c4a; padding-bottom: 10px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #aaa; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; box-sizing: border-box; background: #111e30; border: 1px solid #2a4066; color: #fff; border-radius: 5px; font-size: 14px;}
        textarea { height: 70px; resize: vertical; font-size: 12px; color: #888; }
        .row { display: flex; gap: 15px; }
        .row .input-group { flex: 1; }
        
        .btn-live { background: #03a9f4; color: #000; font-weight: 900; padding: 15px; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-size: 18px; transition: 0.3s; margin-bottom: 10px; box-shadow: 0 0 15px rgba(3,169,244,0.3);}
        .btn-clean { background: #ffd700; color: #000; font-weight: bold; padding: 8px; border: none; border-radius: 5px; width: 100%; cursor: pointer; margin-top: 5px;}
        
        /* 🔥 TAP TO MOVE CHIPS 🔥 */
        .chip-box { background: #070d17; border: 1px dashed #03a9f4; min-height: 120px; border-radius: 8px; padding: 10px; display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start; margin-bottom: 8px;}
        .chip { background: #111e30; border: 1px solid #03a9f4; color: #03a9f4; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s; user-select: none;}
        .chip:active { transform: scale(0.9); }
        .chip.t2 { border-color: #ff5722; color: #ff5722; }
        
        .match-row { background: #111e30; border: 1px solid #03a9f4; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;}
        .match-info h4 { margin: 0 0 5px; font-size: 16px; color: #03a9f4; text-transform: uppercase;}
        .match-info p { margin: 0; font-size: 12px; color: #aaa;}
        
        .action-btns { display: flex; gap: 8px; flex-direction: column;}
        .btn-delete { background: #ff1744; color: #fff; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 11px;}
        .btn-toss { background: #ffea00; color: #000; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: 900; font-size: 11px; }
        .btn-payout { background: #00e676; color: #000; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: 900; font-size: 11px; }
        
        /* 🔥 SPLIT MODAL STYLES 🔥 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #0b1320; width: 95%; max-width: 600px; max-height: 85vh; border-radius: 15px; border: 2px solid #03a9f4; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 30px rgba(3,169,244,0.2);}
        .modal-header { padding: 15px; background: #021b3a; border-bottom: 1px solid #1a2c4a; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { margin: 0; color: #03a9f4; font-size: 18px; text-transform: uppercase;}
        .close-btn { color: #ff1744; font-size: 24px; font-weight: bold; cursor: pointer; }
        
        .modal-body { padding: 15px; overflow-y: auto; flex: 1; display: flex; gap: 15px; align-items: flex-start;} 
        
        .team-col { flex: 1; display: flex; flex-direction: column; gap: 8px; width: 100%;}
        .team-col h3 { margin: 0 0 10px 0; text-align: center; font-size: 14px; padding-bottom: 5px; border-bottom: 1px dashed #2a4066; text-transform: uppercase; }
        .t1-header { color: #03a9f4; }
        .t2-header { color: #ff5722; }

        .player-edit-card { flex-shrink: 0; background: #111e30; border: 1px solid #2a4066; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column;}
        .p-toggle { padding: 10px; cursor: pointer; text-align: center; font-size: 11px; font-weight: bold; border-bottom: 1px solid #2a4066; transition: 0.2s; user-select: none; }
        .p-toggle.playing { background: rgba(0,230,118,0.2); color: #00e676; }
        .p-toggle.benched { background: rgba(255,23,68,0.2); color: #ff1744; }
        .p-toggle.unannounced { color: #fff; }
        
        .role-select { background: #0b1320; color: #ffd700; border: none; padding: 6px; font-size: 10px; font-weight: bold; text-align: center; outline: none; cursor: pointer; width: 100%;}
        
        .modal-footer { padding: 15px; background: #021b3a; border-top: 1px solid #1a2c4a; }
        .btn-save-lineup { width: 100%; background: #03a9f4; color: #000; font-weight: 900; padding: 12px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer;}
        #payoutLoader { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; flex-direction:column; justify-content:center; align-items:center; color:#03a9f4; font-size:20px; font-weight:900; }
    </style>
</head>
<body>

    <div class="header">🏏 KALYAN VIP - ESPN ENGINE</div>

    <div class="admin-box">
        <h3><i class="fa-solid fa-bolt"></i> 1. Match Details (ESPN Manual)</h3>
        <p style="font-size:11px; color:#aaa; margin-top:0;">ESPN ki website se dono teams ki List copy karein aur niche paste kar dein.</p>
        
        <div class="input-group"><label>Match Title</label><input type="text" id="matchName" placeholder="Jaise: RR vs MI Live Match"></div>
        <div class="row">
            <div class="input-group"><label>Team 1 Name</label><input type="text" id="t1Name" placeholder="RR"></div>
            <div class="input-group"><label>Team 2 Name</label><input type="text" id="t2Name" placeholder="MI"></div>
        </div>
        <div class="input-group"><label>⏱️ Match Start Time</label><input type="datetime-local" id="matchTime"></div>
        
        <h3 style="margin-top:20px;"><i class="fa-solid fa-copy"></i> 2. Paste ESPN Squads</h3>
        
        <div class="row" style="flex-direction: column;">
            <div class="input-group" style="margin-bottom: 5px;">
                <label id="lblT1" style="color: #03a9f4;">1 Team</label>
                <div id="t1ChipBox" class="chip-box"></div>
                <textarea id="t1Players" oninput="syncChips()" placeholder="ESPN se T1 ke players copy karke yahan paste karein..."></textarea> 
            </div>
            
            <div style="text-align: center; color: #888; font-size: 20px; margin: 10px 0;"><i class="fa-solid fa-arrows-up-down"></i></div>

            <div class="input-group">
                <label id="lblT2" style="color: #ff5722;">2 Team</label>
                <div id="t2ChipBox" class="chip-box" style="border-color: #ff5722;"></div>
                <textarea id="t2Players" oninput="syncChips()" placeholder="ESPN se T2 ke players copy karke yahan paste karein..."></textarea> 
            </div>
        </div>

        <button class="btn-clean" onclick="cleanESPNData()"><i class="fa-solid fa-broom"></i> CLEAN (c) & (wk) TAGS</button>
        <br><br>
        <button class="btn-live" onclick="launchSmartMatch()">🚀 LAUNCH ESPN MATCH</button>
    </div>

    <div class="admin-box">
        <h3><i class="fa-solid fa-gamepad"></i> 3. Manage Matches & Payouts</h3>
        <div id="activeMatchesList"><div style="text-align:center; color:#03a9f4;"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div></div>
    </div>

    <div id="lineupModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🟢 TOSS: Select Playing 11</h2>
                <div class="close-btn" onclick="closeLineupModal()">&times;</div>
            </div>
            <div class="modal-body" id="modalPlayerList">
                </div>
            <div class="modal-footer">
                <button class="btn-save-lineup" onclick="saveLineupToFirebase()"><i class="fa-solid fa-cloud-arrow-up"></i> PUBLISH LINEUP & ROLES</button>
            </div>
        </div>
    </div>

    <div id="payoutLoader">
        <i class="fa-solid fa-cog fa-spin" style="font-size:50px; margin-bottom:20px; color:#03a9f4;"></i>
        <div id="payoutText">Calculating Exact Ranks...</div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        let currentEditingMatchId = "";
        let currentPlayersData = {};

        function parsePlayers(text) {
            if (text.includes(',')) {
                return text.replace(/\n/g, ' ').split(',').map(n=>n.trim()).filter(n=>n);
            } else {
                return text.split('\n').map(n=>n.trim()).filter(n=>n);
            }
        }

        // 🔥 ESPN CLEANER TOOL 🔥
        function cleanESPNData() {
            const cleanText = (txt) => {
                return txt.replace(/\(c & wk\)/gi, '').replace(/\(c\)/gi, '').replace(/\(wk\)/gi, '').replace(/†/g, '').replace(/\s+/g, ' ').trim();
            };
            document.getElementById('t1Players').value = cleanText(document.getElementById('t1Players').value);
            document.getElementById('t2Players').value = cleanText(document.getElementById('t2Players').value);
            syncChips();
            alert("✅ Khiladiyon ke naam saaf ho gaye!");
        }

        function syncChips() {
            let t1Arr = parsePlayers(document.getElementById('t1Players').value);
            let t2Arr = parsePlayers(document.getElementById('t2Players').value);
            
            let t1Name = document.getElementById('t1Name').value || "Team 1";
            let t2Name = document.getElementById('t2Name').value || "Team 2";
            
            document.getElementById('lblT1').innerText = `1 ${t1Name} (${t1Arr.length})`;
            document.getElementById('lblT2').innerText = `2 ${t2Name} (${t2Arr.length})`;
            
            let t1Html = ""; t1Arr.forEach((p, i) => { t1Html += `<div class="chip" onclick="movePlayer(1, ${i})">${p} <i class="fa-solid fa-turn-down"></i></div>`; }); 
            document.getElementById('t1ChipBox').innerHTML = t1Html;
            
            let t2Html = ""; t2Arr.forEach((p, i) => { t2Html += `<div class="chip t2" onclick="movePlayer(2, ${i})"><i class="fa-solid fa-turn-up"></i> ${p}</div>`; }); 
            document.getElementById('t2ChipBox').innerHTML = t2Html;
        }

        function movePlayer(fromTeam, index) {
            let t1Arr = parsePlayers(document.getElementById('t1Players').value);
            let t2Arr = parsePlayers(document.getElementById('t2Players').value);
            if (fromTeam === 1) { let p = t1Arr.splice(index, 1)[0]; t2Arr.push(p); } 
            else { let p = t2Arr.splice(index, 1)[0]; t1Arr.push(p); }
            document.getElementById('t1Players').value = t1Arr.join(', ');
            document.getElementById('t2Players').value = t2Arr.join(', ');
            syncChips();
        }

        function getSmartRole(name) {
            let n = name.toLowerCase();
            const wk = ["dhoni", "pant", "rahul", "samson", "kishan", "saha", "karthik", "de kock", "buttler", "pooran", "klaasen", "bairstow", "salt", "jurel"];
            if (wk.some(w => n.includes(w))) return "WK";
            const ar = ["jadeja", "pandya", "maxwell", "narine", "russell", "stoinis", "curran", "marsh", "moeen", "axar", "tewatia", "washington"];
            if (ar.some(a => n.includes(a))) return "AR";
            const bowl = ["bumrah", "shami", "siraj", "rashid", "chahal", "boult", "rabada", "nortje", "arshdeep", "pathirana", "cummins", "starc", "kuldeep"];
            if (bowl.some(b => n.includes(b))) return "BOWL";
            return "BAT";
        }

        function launchSmartMatch() {
            let eUrl = "ESPN_MANUAL_" + Date.now(); // Custom ID for manual
            let mName = document.getElementById('matchName').value.trim();
            let t1 = document.getElementById('t1Name').value.trim().toUpperCase();
            let t2 = document.getElementById('t2Name').value.trim().toUpperCase();
            
            let t1Arr = parsePlayers(document.getElementById('t1Players').value);
            let t2Arr = parsePlayers(document.getElementById('t2Players').value);
            let rawTime = document.getElementById('matchTime').value; 
            
            if(!mName || !t1 || !t2 || t1Arr.length === 0 || t2Arr.length === 0 || !rawTime) return alert("⚠️ Details bhariye!");

            let msTime = new Date(rawTime).getTime();
            let engineWakeUp = msTime - 1200000; 
            let mId = "MATCH_" + Date.now();
            let pData = {};
            let safeT1 = t1.replace(/[^a-zA-Z0-9]/g, '');
            let safeT2 = t2.replace(/[^a-zA-Z0-9]/g, '');

            t1Arr.forEach((cn, i) => { pData[safeT1 + "_" + i] = { name: cn, team: safeT1.substring(0,3), role: getSmartRole(cn), credits: 8.5, points: 0, playingStatus: "unannounced" }; });
            t2Arr.forEach((cn, i) => { pData[safeT2 + "_" + i] = { name: cn, team: safeT2.substring(0,3), role: getSmartRole(cn), credits: 8.5, points: 0, playingStatus: "unannounced" }; });

            db.ref('Game/Kalyan11/VIPMatches/' + mId).set({ engineUrl: eUrl, name: mName, team1: t1, team2: t2, timestamp: msTime, status: "Upcoming" });
            db.ref('Game/Kalyan11/MatchPlayers/' + mId).set(pData);
            db.ref('Game/Kalyan11/LiveEngine/' + mId).set({ matchId: mId, cricbuzzLink: eUrl, wakeUpTime: engineWakeUp })
            .then(() => { alert("✅ ESPN Match Launched!"); location.reload(); });
        }

        db.ref('Game/Kalyan11/VIPMatches').on('value', snapshot => {
            let container = document.getElementById('activeMatchesList'); container.innerHTML = "";
            snapshot.forEach(child => {
                let match = child.val();
                container.innerHTML += `<div class="match-row">
                    <div class="match-info"><h4>${match.team1} vs ${match.team2}</h4><p>${match.name}</p></div>
                    <div class="action-btns">
                        <button class="btn-toss" onclick="openLineupModal('${child.key}')">UPDATE TOSS</button>
                        <button class="btn-payout" onclick="processPerfectPayout('${child.key}')">PAY WINNERS</button>
                        <button class="btn-delete" onclick="deleteMatch('${child.key}')">DELETE</button>
                    </div>
                </div>`;
            });
        });

        function deleteMatch(mId) { if(confirm("Delete?")) { db.ref('Game/Kalyan11/VIPMatches/'+mId).remove(); db.ref('Game/Kalyan11/LiveEngine/'+mId).remove(); } }

        function openLineupModal(matchId) {
            currentEditingMatchId = matchId;
            document.getElementById('lineupModal').style.display = 'flex';
            db.ref('Game/Kalyan11/MatchPlayers/' + matchId).once('value', snap => {
                currentPlayersData = snap.val();
                renderModalList();
            });
        }
        
        function renderModalList() {
            let container = document.getElementById('modalPlayerList'); 
            container.innerHTML = "";
            
            let teams = [...new Set(Object.values(currentPlayersData).map(p => p.team))];
            let team1 = teams[0] || "Team 1";
            let team2 = teams[1] || "Team 2";

            let t1Html = `<div class="team-col"><h3 class="t1-header">1 ${team1}</h3>`;
            let t2Html = `<div class="team-col"><h3 class="t2-header">2 ${team2}</h3>`;

            Object.keys(currentPlayersData).forEach(pKey => {
                let p = currentPlayersData[pKey];
                let s = p.playingStatus === 'playing' ? 'playing' : (p.playingStatus === 'benched' ? 'benched' : 'unannounced');
                let r = p.role || 'BAT'; 
                
                let cardHtml = `
                <div class="player-edit-card">
                    <div class="p-toggle ${s}" onclick="toggleStatus('${pKey}')">${p.name}</div>
                    <select class="role-select" onchange="changeRole('${pKey}', this.value)">
                        <option value="WK" ${r === 'WK' ? 'selected' : ''}>WK</option>
                        <option value="BAT" ${r === 'BAT' ? 'selected' : ''}>BAT</option>
                        <option value="AR" ${r === 'AR' ? 'selected' : ''}>AR</option>
                        <option value="BOWL" ${r === 'BOWL' ? 'selected' : ''}>BOWL</option>
                    </select>
                </div>`;

                if(p.team === team1) { t1Html += cardHtml; } 
                else { t2Html += cardHtml; }
            });

            t1Html += `</div>`;
            t2Html += `</div>`;

            container.innerHTML = t1Html + t2Html; 
        }

        function toggleStatus(k) {
            let p = currentPlayersData[k];
            p.playingStatus = p.playingStatus === "playing" ? "benched" : "playing";
            renderModalList(); 
        }

        function changeRole(k, newRole) { currentPlayersData[k].role = newRole; }
        
        function saveLineupToFirebase() {
            db.ref('Game/Kalyan11/MatchPlayers/' + currentEditingMatchId).update(currentPlayersData).then(() => { 
                alert("✅ Lineup Saved!"); closeLineupModal(); 
            });
        }
        function closeLineupModal() { document.getElementById('lineupModal').style.display = 'none'; }
        function calculatePrizeLogic(rank, entry, totalSpots) { if(entry === 0) return 0; if(entry === 99) { if(rank === 1) return 50000; if(rank <= 10) return 1000; return 0; } if(rank === 1) return Math.floor(entry * totalSpots * 0.4); if(rank <= Math.floor(totalSpots * 0.4)) return entry; return 0; }

        async function processPerfectPayout(matchId) {
            if(!confirm("⚠️ PAYOUT KAREIN?")) return;
            const loader = document.getElementById('payoutLoader'); loader.style.display = 'flex';
            try {
                let pSnap = await db.ref('Game/Kalyan11/MatchPlayers/' + matchId).once('value');
                let playersObj = pSnap.val() || {};
                let tSnap = await db.ref('Game/Kalyan11/Contests/' + matchId + '/Teams').once('value');
                let allRealTeams = [];

                if(tSnap.exists()) {
                    tSnap.forEach(child => {
                        let t = child.val();
                        let calculatedPoints = 0;
                        Object.values(t.players || {}).forEach(pKey => {
                            let livePt = parseFloat(playersObj[pKey]?.points || 0);
                            if(pKey === t.captain) calculatedPoints += (livePt * 2);
                            else if(pKey === t.viceCaptain) calculatedPoints += (livePt * 1.5);
                            else calculatedPoints += livePt;
                        });
                        allRealTeams.push({ teamKey: child.key, phone: t.phone, entry_paid: parseInt(t.entry_paid || 99), points: parseFloat(calculatedPoints.toFixed(1)), payment_status: t.payment_status || "PENDING" });
                        db.ref(`Game/Kalyan11/Contests/${matchId}/Teams/${child.key}`).update({total_points: calculatedPoints});
                    });
                }
                allRealTeams.sort((a,b) => b.points - a.points);
                let totalPaidUsers = 0;
                for(let r = 0; r < allRealTeams.length; r++) {
                    let currentTeam = allRealTeams[r];
                    let rank = r + 1;
                    let prize = calculatePrizeLogic(rank, currentTeam.entry_paid, 100); 
                    if(prize > 0 && currentTeam.payment_status !== "PAID") {
                        await db.ref(`Game/Kalyan11/Contests/${matchId}/Teams/${currentTeam.teamKey}`).update({ payment_status: "PAID" });
                        let wSnap = await db.ref(`users/${currentTeam.phone}`).once('value');
                        let currentWinBal = parseFloat(wSnap.val()?.winning_balance || 0);
                        await db.ref(`users/${currentTeam.phone}`).update({ winning_balance: currentWinBal + prize });
                        await db.ref(`users/${currentTeam.phone}/Transactions`).push({ title: `🏆 Rank ${rank} Winnings`, amount: prize, type: "credit", date: new Date().toLocaleString() });
                        totalPaidUsers++;
                    }
                }
                await db.ref(`Game/Kalyan11/VIPMatches/${matchId}`).update({ timestamp: new Date().getTime() - 15000000 });
                loader.style.display = 'none'; alert(`✅ PAYOUT SUCCESSFUL!\nTotal Winners Paid: ${totalPaidUsers}`);
            } catch (error) { loader.style.display = 'none'; alert("❌ ERROR: " + error.message); }
        }
    </script>
</body>
</html>
