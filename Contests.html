<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - Contests Market</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding-bottom: 20px; user-select: none; }
        .header { background: linear-gradient(135deg, #1a0033, #4a00e0); padding: 15px; display: flex; align-items: center; border-bottom: 2px solid #ffd700; position: sticky; top:0; z-index:100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .back-btn { font-size: 20px; margin-right: 15px; cursor: pointer; color: #ffd700; }
        
        .timer-box { background: #ff004c; color: #fff; font-size: 11px; font-weight: 900; padding: 3px 8px; border-radius: 4px; margin-top: 3px; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }

        .section-header { padding: 20px 15px 5px; color: #ffd700; font-size: 14px; text-transform: uppercase; font-weight: 900; display: flex; align-items: center; gap: 8px; }
        
        .contest-card { background: #111; margin: 10px 15px; border-radius: 8px; border: 1px solid #333; overflow: hidden; display: flex; flex-direction: column; }
        .c-top { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .prize-label { font-size: 11px; color: #aaa; }
        .prize-amt { font-size: 18px; font-weight: bold; color: #fff; display: block; }
        
        .join-btn { background: #00ff88; color: #000; padding: 8px 20px; border-radius: 5px; font-weight: bold; border:none; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .join-btn:disabled { background: #444; color: #888; cursor: not-allowed; }
        
        .progress-container { padding: 0 15px 10px; }
        .progress-text { display: flex; justify-content: space-between; font-size: 11px; color: #aaa; margin-bottom: 4px; }
        .spots-left { color: #ff004c; font-weight: bold; }
        .progress-bar { width: 100%; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: #ff004c; width: 5%; transition: width 1s ease-in-out; }

        .c-footer { padding: 10px 15px; background: #1a1a2e; display: flex; justify-content: space-between; font-size: 11px; color: #aaa; border-top: 1px dashed #333; }
        .tag { background: #ffd700; color: #000; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-arrow-left back-btn" onclick="window.location.href='Matches.html'"></i>
        <div>
            <div style="font-weight: 900; font-size: 16px;">SELECT CONTEST</div>
            <div class="timer-box" id="match-timer"><i class="fa-regular fa-clock"></i> Loading Time...</div>
        </div>
    </div>

    <div class="section-header"><i class="fa-solid fa-trophy"></i> Mega Contests</div>
    
    <div class="contest-card" data-spots="5000">
        <div class="c-top">
            <div><span class="prize-label">Prize Pool</span><span class="prize-amt">₹1,00,000</span></div>
            <button class="join-btn" onclick="join(49, 11)">₹49</button>
        </div>
        <div class="progress-container">
            <div class="progress-text"><span class="spots-left"><span class="dynamic-spots">5000</span> spots left</span><span>5000 Spots</span></div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>
        <div class="c-footer"><div>Win Big!</div><div class="tag">11 PLAYERS</div></div>
    </div>

    <div class="section-header"><i class="fa-solid fa-user-ninja"></i> Head To Head (H2H)</div>
    
    <div class="contest-card" data-spots="2">
        <div class="c-top">
            <div><span class="prize-label">Winnings</span><span class="prize-amt">₹1,000</span></div>
            <button class="join-btn" onclick="join(575, 11)">₹575</button>
        </div>
        <div class="progress-container">
            <div class="progress-text"><span class="spots-left"><span class="dynamic-spots">2</span> spots left</span><span>2 Spots</span></div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>
        <div class="c-footer"><div>Winner Takes All</div><div class="tag">H2H Battle</div></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('matchId');
        let matchStartTime = 0; let isMatchStarted = false;

        if(matchId) {
            db.ref('Game/Kalyan11/LiveMatches/' + matchId).once('value', snapshot => {
                let mData = snapshot.val();
                if(mData && mData.date) {
                    matchStartTime = new Date(mData.date).getTime();
                    startCountdown();
                } else {
                    document.getElementById('match-timer').innerText = "Live / Started"; lockAllContests();
                }
            });
        }

        function startCountdown() {
            setInterval(() => {
                let now = new Date().getTime(); let distance = matchStartTime - now;
                if (distance <= 0) {
                    document.getElementById('match-timer').innerText = "MATCH STARTED 🔴";
                    document.getElementById('match-timer').style.background = "#333";
                    if(!isMatchStarted) lockAllContests(); return;
                }

                let h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                let m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                let s = Math.floor((distance % (1000 * 60)) / 1000);
                document.getElementById('match-timer').innerHTML = `<i class="fa-regular fa-clock"></i> Starts in: ${h}h ${m}m ${s}s`;

                let totalHoursLeft = distance / (1000 * 60 * 60); let fillPercentage = 0;
                if(totalHoursLeft > 24) fillPercentage = 20; else if(totalHoursLeft > 12) fillPercentage = 45; 
                else if(totalHoursLeft > 2) fillPercentage = 75; else if(totalHoursLeft > 0.5) fillPercentage = 92; else fillPercentage = 98;

                document.querySelectorAll('.contest-card').forEach(card => {
                    let totalSpots = parseInt(card.getAttribute('data-spots'));
                    let filledSpots = Math.floor((fillPercentage / 100) * totalSpots);
                    let spotsLeft = totalSpots - filledSpots; if(spotsLeft < 1 && totalSpots > 1) spotsLeft = 1; 
                    let displayFill = (filledSpots / totalSpots) * 100;

                    card.querySelector('.dynamic-spots').innerText = spotsLeft;
                    card.querySelector('.progress-fill').style.width = displayFill + "%";
                });
            }, 1000);
        }

        function lockAllContests() {
            isMatchStarted = true;
            document.querySelectorAll('.contest-card').forEach(card => {
                card.querySelector('.dynamic-spots').innerText = "0"; card.querySelector('.progress-fill').style.width = "100%";
                let btn = card.querySelector('.join-btn'); btn.innerHTML = "FULL / CLOSED"; btn.disabled = true; btn.style.background = "#333"; btn.style.color = "#888";
            });
        }

        // 🟢 DIRECT JOIN: Click karte hi Create Team khulega Fee ke sath
        function join(fee, maxPlayers) {
            if(isMatchStarted) { alert("Match start ho chuka hai!"); return; }
            if(!matchId) { alert("Match Error!"); return; }
            window.location.href = `CreateTeam.html?matchId=${matchId}&fee=${fee}&maxPlayers=${maxPlayers}`;
        }
    </script>
</body>
</html>
