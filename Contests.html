<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - Contests VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; color: #fff; margin: 0; background: #050510; user-select: none; overflow-x: hidden; }
        .head { padding: 12px 15px; background: linear-gradient(135deg, #1a0033, #4a00e0); border-bottom: 2px solid #ffd700; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .head-title { color: #fff; font-weight: 900; font-size: 22px; text-shadow: 0 0 10px rgba(255,215,0,0.8); }
        .head-title span { color: #ffd700; }
        .wal { background: rgba(0,0,0,0.6); border: 1.5px solid #00ff88; color: #00ff88; padding: 6px 15px; border-radius: 20px; font-weight: 900; }
        .view-container { padding: 15px; padding-bottom: 50px; }
        .section-nav { display:flex; align-items:center; gap:10px; color:#aaa; font-size:14px; cursor:pointer; font-weight:bold; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px;}
        .section-nav i { color: #ffd700; }
        .contest-card { background: linear-gradient(135deg, #111, #1a1a24); border: 1px solid #ffd700; border-radius: 12px; padding: 18px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(255,215,0,0.1); position: relative;}
        .c-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px dashed #444; padding-bottom: 15px; }
        .prize-pool { font-size: 24px; font-weight: 900; color: #fff; }
        .entry-fee { background: linear-gradient(90deg, #00ff88, #00cc6a); color: #000; padding: 8px 20px; border-radius: 8px; font-weight: 900; font-size: 18px; cursor: pointer; }
        .joined-badge { display: none; background: #4a00e0; color: #fff; font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 10px; position: absolute; top: 10px; right: 10px; }
        .joined .joined-badge { display: block; }
        .joined .entry-fee { background: #333; color: #888; border-color: #555; }
        #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #00ff88; color: #000; padding: 12px 25px; border-radius: 25px; font-weight: 900; font-size: 14px; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 1000; white-space: nowrap;}
        #toast.show { opacity: 1; bottom: 60px; }
    </style>
</head>
<body>

    <div class="head">
        <div class="head-title">KALYAN <span>11</span></div>
        <div class="wal">🪙 ₹<span id="user-balance">0.00</span></div>
    </div>

    <div class="view-container">
        <div class="section-nav" onclick="window.location.href='Matches.html'"><i class="fa-solid fa-house"></i> Back to Home</div>

        <h3 style="color:#ffd700;"><i class="fa-solid fa-bolt"></i> Mega Contests</h3>

        <div class="contest-card" id="c1">
            <div class="joined-badge"><i class="fa-solid fa-check"></i> Joined</div>
            <div class="c-header">
                <div><div style="font-size:12px; color:#aaa;">Prize Pool</div><div class="prize-pool">₹10 Lakhs</div></div>
                <div class="entry-fee" onclick="joinContest(49, 'c1')">₹49</div>
            </div>
            <div style="font-size:13px; color:#00d2d3; margin-top:10px; font-weight:bold;"><i class="fa-solid fa-trophy" style="color:#ffd700;"></i> 1st Prize: ₹1 Lakh</div>
        </div>

        <div class="contest-card" id="c2" style="border-color:#00d2d3;">
            <div class="joined-badge"><i class="fa-solid fa-check"></i> Joined</div>
            <div class="c-header">
                <div><div style="font-size:12px; color:#aaa;">Prize Pool</div><div class="prize-pool" style="color:#00d2d3;">₹10,000</div></div>
                <div class="entry-fee" style="background:#00d2d3;" onclick="joinContest(5750, 'c2')">₹5,750</div>
            </div>
            <div style="font-size:13px; color:#fff; margin-top:10px; font-weight:bold;"><i class="fa-solid fa-medal" style="color:#ffd700;"></i> Head to Head - Winner takes all</div>
        </div>
    </div>

    <div id="toast">Message</div>

    <script>
        // 🔥 Asli Firebase Database Logic
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const phone = localStorage.getItem('userPhone') || localStorage.getItem('phone');

        let depBal = 0, winBal = 0, bonBal = 0, totalBal = 0;

        if(phone) {
            db.ref('users/'+phone).on('value', s => { 
                let d = s.val() || {};
                depBal = parseFloat(d.balance || 0); winBal = parseFloat(d.winning_balance || 0); bonBal = parseFloat(d.bonus_balance || 0);
                totalBal = Math.max(0, depBal + winBal + bonBal);
                document.getElementById('user-balance').innerText = totalBal.toFixed(2); 
            });
        }

        function showToast(msg, isError = false) { 
            let t = document.getElementById('toast'); t.innerHTML = msg; 
            t.style.background = isError ? "#ff004c" : "#00ff88";
            t.style.color = isError ? "#fff" : "#000";
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); 
        }

        // 💸 REAL MONEY DEDUCTION LOGIC
        function joinContest(fee, cardId) {
            if(!phone) { showToast("⚠️ Login Error!", true); return; }
            
            let card = document.getElementById(cardId);
            if(card.classList.contains('joined')) return;

            if (totalBal >= fee) {
                // Katoti (Deduction) Logic: Pehle Deposit se kategi, phir Winning se
                let nDep = depBal, nWin = winBal, rem = fee;
                if(nDep >= rem) { nDep -= rem; } else { rem -= nDep; nDep = 0; nWin -= rem; }
                
                // Update Firebase
                db.ref('users/'+phone).update({ 
                    balance: Math.max(0, nDep), 
                    winning_balance: Math.max(0, nWin) 
                });
                
                card.classList.add('joined');
                card.querySelector('.entry-fee').innerText = "JOINED";
                showToast(`<i class="fa-solid fa-check-circle"></i> Joined for ₹${fee}!`);
            } else {
                showToast(`<i class="fa-solid fa-circle-exclamation"></i> Low Balance!`, true);
            }
        }
    </script>
</body>
</html>
