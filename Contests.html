<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - Contests Market</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding-bottom: 80px; user-select: none; }
        .header { background: linear-gradient(135deg, #1a0033, #4a00e0); padding: 15px; display: flex; align-items: center; border-bottom: 2px solid #ffd700; position: sticky; top:0; z-index:100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .back-btn { font-size: 20px; margin-right: 15px; cursor: pointer; color: #ffd700; }
        
        .section-header { padding: 20px 15px 5px; color: #ffd700; font-size: 14px; text-transform: uppercase; font-weight: 900; display: flex; align-items: center; gap: 8px; }
        
        /* Contest Card */
        .contest-card { background: #111; margin: 10px 15px; border-radius: 8px; border: 1px solid #333; overflow: hidden; display: flex; flex-direction: column; }
        .c-top { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #333; }
        .prize-label { font-size: 11px; color: #aaa; }
        .prize-amt { font-size: 18px; font-weight: bold; color: #fff; display: block; }
        
        .join-btn { background: #00ff88; color: #000; padding: 8px 20px; border-radius: 5px; font-weight: bold; border:none; cursor: pointer; font-size: 14px; transition: 0.3s; }
        
        .c-footer { padding: 10px 15px; background: #1a1a2e; display: flex; justify-content: space-between; font-size: 11px; color: #aaa; }
        .tag { background: #ffd700; color: #000; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 10px; }

        /* 🔥 FIXED FOOTER (DREAM11 STYLE) */
        .bottom-footer { position: fixed; bottom: 0; width: 100%; background: #111; padding: 15px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #333; z-index: 100; }
        .action-btn { background: #222; color: #fff; padding: 12px 20px; border-radius: 8px; font-weight: 900; border: 1px solid #555; cursor: pointer; font-size: 14px; flex: 1; text-align: center; margin: 0 5px; }
        .action-btn.primary { background: #00ff88; color: #000; border: none; box-shadow: 0 0 10px rgba(0,255,136,0.3); }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-arrow-left back-btn" onclick="window.location.href='Matches.html'"></i>
        <div style="font-weight: 900; font-size: 16px;">SELECT CONTEST</div>
    </div>

    <div class="section-header"><i class="fa-solid fa-trophy"></i> Mega Contests</div>
    
    <div class="contest-card">
        <div class="c-top">
            <div><span class="prize-label">Prize Pool</span><span class="prize-amt">₹1,00,000</span></div>
            <button class="join-btn" onclick="smartJoin(49, 11)">₹49</button>
        </div>
        <div class="c-footer"><div>Win Big!</div><div class="tag">11 PLAYERS</div></div>
    </div>

    <div class="section-header"><i class="fa-solid fa-user-ninja"></i> Head To Head (H2H)</div>
    
    <div class="contest-card">
        <div class="c-top">
            <div><span class="prize-label">Winnings</span><span class="prize-amt">₹1,000</span></div>
            <button class="join-btn" onclick="smartJoin(575, 11)">₹575</button>
        </div>
        <div class="c-footer"><div>Winner Takes All</div><div class="tag">H2H Battle</div></div>
    </div>

    <div class="bottom-footer">
        <div class="action-btn" onclick="goToMyTeams()">MY TEAMS <span id="team-count-badge" style="background:#ff004c; padding:2px 6px; border-radius:10px; font-size:10px; display:none;">0</span></div>
        <div class="action-btn primary" onclick="createDraftTeam()">CREATE TEAM <i class="fa-solid fa-plus"></i></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        const phone = localStorage.getItem('userPhone') || localStorage.getItem('phone');

        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('matchId');
        let mySavedTeam = null;

        // 1. Check if user already created a team for this match
        if(phone && matchId) {
            db.ref(`users/${phone}/MyDraftTeams/${matchId}`).on('value', snap => {
                if(snap.exists()) {
                    mySavedTeam = snap.val();
                    let badge = document.getElementById('team-count-badge');
                    badge.style.display = "inline-block";
                    badge.innerText = "1"; // User ne team bana li hai
                }
            });
        }

        // 2. Direct CREATE TEAM button (No Entry Fee required yet)
        function createDraftTeam() {
            if(!matchId) return alert("Match ID missing!");
            // Action = draft bhejna matlab user sirf team bana raha hai, abhi paise nahi dega
            window.location.href = `CreateTeam.html?matchId=${matchId}&action=draft`;
        }

        // 3. SMART JOIN LOGIC (Checking if team exists before payment)
        function smartJoin(fee, maxPlayers) {
            if(!phone) return alert("Please Login First!");
            if(!matchId) return alert("Match Error!");

            // Agar user ne pehle se team bana rakhi hai, toh sidha paise kato aur join karwao!
            if(mySavedTeam) {
                let confirmJoin = confirm(`Aapne team pehle se bana rakhi hai. Kya aap ₹${fee} dekar ye contest join karna chahte hain?`);
                if(confirmJoin) {
                    processPaymentAndJoin(fee, mySavedTeam);
                }
            } 
            // Agar team nahi banayi, toh usko Create Team page par bhejo Fee ke sath
            else {
                window.location.href = `CreateTeam.html?matchId=${matchId}&fee=${fee}&maxPlayers=${maxPlayers}`;
            }
        }

        // 4. Background Payment Processing (Agar team pehle se bani hui hai)
        function processPaymentAndJoin(fee, teamData) {
            db.ref('users/' + phone).once('value', snapshot => {
                let d = snapshot.val();
                let depBal = parseFloat(d.balance || 0); let winBal = parseFloat(d.winning_balance || 0);
                let totalBal = depBal + winBal;

                if (totalBal < fee) {
                    alert(`❌ Wallet mein paise kam hain! Entry Fee ₹${fee} hai.`); return;
                }

                if (depBal >= fee) { depBal -= fee; } 
                else { let bachaHua = fee - depBal; depBal = 0; winBal -= bachaHua; }

                // Add tracking data
                teamData.fee_paid = fee;
                teamData.joinedAt = firebase.database.ServerValue.TIMESTAMP;

                db.ref('users/' + phone).update({ balance: depBal, winning_balance: winBal })
                .then(() => db.ref(`Game/Kalyan11/Contests/${matchId}/Teams/${phone}`).set(teamData))
                .then(() => {
                    // Record in User's "My Joined Matches" history
                    db.ref(`users/${phone}/MyJoinedMatches/${matchId}`).set({
                        matchId: matchId,
                        fee: fee,
                        joinedAt: firebase.database.ServerValue.TIMESTAMP
                    });
                    alert(`✅ MUBARAK HO! Aapne ₹${fee} wala contest join kar liya hai!`);
                    window.location.href = "Matches.html"; 
                });
            });
        }

        function goToMyTeams() {
            alert("Aapki banayi hui team aur joined contests 'My Matches' tab mein dikhenge!");
            // In future, redirect to MyTeams.html
        }
    </script>
</body>
</html>
