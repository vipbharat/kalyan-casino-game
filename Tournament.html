<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esports Tournament Board</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        
        /* App Header */
        .header { display: flex; justify-content: space-between; align-items: center; background: #1e1e1e; padding: 15px; border-radius: 10px; border-bottom: 2px solid #FFD700; margin-bottom: 20px; }
        .wallet { color: #00FF00; font-weight: bold; font-size: 18px; }
        
        /* Game Selection Box */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; text-align: center; background: #333; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .tab.active { background: #FFD700; color: #000; }

        /* Create Challenge Section */
        .create-box { background: #1e1e1e; padding: 15px; border-radius: 10px; border: 1px dashed #777; margin-bottom: 20px; text-align: center; }
        .create-input { padding: 10px; border-radius: 5px; border: none; width: 60%; background: #333; color: white; margin-bottom: 10px; }
        .btn-create { background: #FFD700; color: #000; padding: 10px 25px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; }

        /* Live Challenges List */
        .section-title { font-size: 14px; color: #aaa; margin-bottom: 10px; text-transform: uppercase; }
        .card { display: flex; justify-content: space-between; align-items: center; background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #333; }
        
        .player-info { display: flex; flex-direction: column; }
        .name-row { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: bold; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .online { background: #00FF00; }
        .offline { background: #888; }
        .stats { color: #888; font-size: 12px; margin-top: 5px; }

        .action-area { text-align: right; }
        .amount { color: #FFD700; font-size: 18px; font-weight: bold; display: block; margin-bottom: 5px; }
        .btn-accept { background: #00FF00; color: #000; padding: 8px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-decoration: none; }
        .btn-waiting { background: #444; color: #888; border-radius: 5px; padding: 8px 15px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 20px; font-weight: bold; color: #FFD700;">PRO TOURNAMENT</div>
        <div class="wallet">💰 ₹500</div>
    </div>

    <div class="tabs">
        <div class="tab active">Free Fire</div>
        <div class="tab">BGMI</div>
    </div>

    <div class="create-box">
        <input type="number" class="create-input" placeholder="Amount (e.g. 100)" id="amt">
        <button class="btn-create" onclick="alert('Challenge Created! Waiting for opponent...')">CREATE CHALLENGE</button>
    </div>

    <div class="section-title">🔴 Live Board</div>

    <div id="board">
        
        <div class="card">
            <div class="player-info">
                <div class="name-row">
                    <span class="status-dot online"></span>
                    <span>Rahul_Pro_Gamer</span>
                </div>
                <div class="stats">Matches: 82 | Won: 50</div>
            </div>
            <div class="action-area">
                <span class="amount">₹100</span>
                <button class="btn-accept" onclick="goToMatch()">ACCEPT</button>
            </div>
        </div>

        <div class="card">
            <div class="player-info">
                <div class="name-row">
                    <span class="status-dot online"></span>
                    <span>Sniper_King_Bot</span>
                </div>
                <div class="stats">Matches: 150 | Won: 120</div>
            </div>
            <div class="action-area">
                <span class="amount">₹500</span>
                <span class="btn-waiting">MATCHING...</span>
            </div>
        </div>

        <div class="card" style="opacity: 0.6;">
            <div class="player-info">
                <div class="name-row">
                    <span class="status-dot offline"></span>
                    <span>OldPlayer_99</span>
                </div>
                <div class="stats">Matches: 12 | Won: 2</div>
            </div>
            <div class="action-area">
                <span class="amount">₹20</span>
                <span class="btn-waiting">OFFLINE</span>
            </div>
        </div>

    </div>

    <script>
        function goToMatch() {
            let confirmPlay = confirm("Kya aap ₹100 lagakar Match join karna chahte hain?");
            if(confirmPlay) {
                // Yeh seedha aapki purani file par bhej dega
                window.location.href = "MatchRoom.html";
            }
        }
    </script>

</body>
</html>
