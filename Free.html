<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan Pro - Admin Master Panel</title>
    <style>
        body { background: #0f0f13; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        
        /* Header & Tabs */
        .header { display: flex; justify-content: space-between; align-items: center; background: #1e1e24; padding: 15px 20px; border-radius: 10px; border-bottom: 3px solid #FFD700; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2); }
        .header h1 { margin: 0; font-size: 24px; color: #FFD700; letter-spacing: 1px; text-transform: uppercase; text-shadow: 0 2px 5px #000; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; font-size: 16px; font-weight: bold; background: #222; color: #888; border: 1px solid #444; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: #FFD700; color: #000; border-color: #FFD700; box-shadow: 0 0 10px rgba(255,215,0,0.4); }

        /* Sections */
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* PLAYERS TABLE */
        .table-container { background: #1e1e24; border-radius: 10px; overflow-x: auto; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #FFD700; color: #000; padding: 12px; font-size: 14px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #333; font-size: 14px; }
        tr:hover { background: #2a2a35; }
        
        .status-active { color: #00FF00; font-weight: bold; }
        .status-banned { color: #ff3333; font-weight: bold; }
        
        /* Action Buttons */
        .btn-sm { padding: 6px 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; margin-right: 5px; }
        .btn-add { background: #00FF00; color: #000; }
        .btn-cut { background: #ffae00; color: #000; }
        .btn-history { background: #3498db; color: #fff; box-shadow: 0 0 8px rgba(52, 152, 219, 0.5); }

        .search-box { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #111; color: #fff; margin-bottom: 15px; box-sizing: border-box; }

        /* KUNDLI (HISTORY) POPUP MODAL */
        #kundliModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #1e1e24; border: 2px solid #FFD700; border-radius: 12px; padding: 20px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; box-shadow: 0 0 30px rgba(255,215,0,0.2); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 15px; }
        .close-btn { background: #ff3333; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* Kundli Table */
        .kundli-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; text-align: center;}
        .kundli-table th { background: #333; color: #FFD700; padding: 8px; border: 1px solid #555; }
        .kundli-table td { padding: 8px; border: 1px solid #444; }
        .txt-win { color: #00FF00; font-weight: bold; }
        .txt-loss { color: #ff3333; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>👑 KALYAN PRO - MASTER CONTROL</h1>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('playersTab', this)">👥 All Players List</button>
        <button class="tab-btn" onclick="alert('Dispute Panel Abhi Hide Hai. Yahan baaki settings aayengi.')">⚙️ Settings</button>
    </div>

    <div id="playersTab" class="section active">
        <input type="text" id="searchInput" class="search-box" placeholder="Search Player ID or Phone..." onkeyup="searchPlayer()">
        
        <div class="table-container">
            <table id="playersTable">
                <thead>
                    <tr>
                        <th>Phone No.</th>
                        <th>Player ID</th>
                        <th>Balance</th>
                        <th>Status</th>
                        <th>Admin Actions</th>
                    </tr>
                </thead>
                <tbody id="playerData">
                    <tr><td colspan="5" style="text-align: center; color: #888;">Loading Players from Firebase...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="kundliModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 style="margin: 0; color: #FFD700;">📜 Janm Kundli: <span id="kundliPlayerId" style="color: #fff;">Loading...</span></h2>
                <button class="close-btn" onclick="closeKundli()">X CLOSE</button>
            </div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <div style="background: #111; padding: 10px; border-radius: 5px; flex: 1; text-align: center; border: 1px solid #00FF00;">
                    <div style="color: #888; font-size: 12px;">Total Wins</div>
                    <div style="color: #00FF00; font-size: 20px; font-weight: bold;" id="k-wins">0</div>
                </div>
                <div style="background: #111; padding: 10px; border-radius: 5px; flex: 1; text-align: center; border: 1px solid #ff3333;">
                    <div style="color: #888; font-size: 12px;">Total Losses</div>
                    <div style="color: #ff3333; font-size: 20px; font-weight: bold;" id="k-losses">0</div>
                </div>
            </div>

            <table class="kundli-table">
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>Opponent</th>
                        <th>Amount</th>
                        <th>Result</th>
                    </tr>
                </thead>
                <tbody id="kundliData">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo",
            databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com",
            projectId: "kalyan-casino"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }

        // --- LOAD PLAYERS ---
        db.ref('users').on('value', (snapshot) => {
            const tbody = document.getElementById('playerData');
            tbody.innerHTML = ""; 
            
            snapshot.forEach((childSnapshot) => {
                let phone = childSnapshot.key;
                let data = childSnapshot.val();
                
                let playerId = data.playerId || "KP" + phone.slice(-4);
                let totalBal = (parseFloat(data.balance||0) + parseFloat(data.winning_balance||0) + parseFloat(data.bonus_balance||0)).toFixed(2);
                let status = data.isBanned ? "<span class='status-banned'>BANNED 🚫</span>" : "<span class='status-active'>ACTIVE 🟢</span>";

                let row = `
                <tr>
                    <td>${phone}</td>
                    <td style="font-weight: bold; color: #FFD700;">${playerId}</td>
                    <td style="color: #00FF00; font-weight: bold;">₹${totalBal}</td>
                    <td>${status}</td>
                    <td>
                        <button class="btn-sm btn-add" onclick="addMoney('${phone}')">➕</button>
                        <button class="btn-sm btn-cut" onclick="cutMoney('${phone}')">➖</button>
                        <button class="btn-sm btn-history" onclick="openKundli('${phone}', '${playerId}')">📜 KUNDLI</button>
                    </td>
                </tr>`;
                tbody.innerHTML += row;
            });
        });

        // --- WALLET CONTROLS ---
        function addMoney(phone) {
            let amount = prompt("Kitne paise ADD karne hain?");
            if(amount && !isNaN(amount)) {
                db.ref('users/' + phone).update({ balance: firebase.database.ServerValue.increment(parseFloat(amount)) });
            }
        }
        function cutMoney(phone) {
            let amount = prompt("Kitne paise kaatne hain?");
            if(amount && !isNaN(amount)) {
                db.ref('users/' + phone).update({ balance: firebase.database.ServerValue.increment(-parseFloat(amount)) });
            }
        }

        // --- KUNDLI (HISTORY) ENGINE ---
        function openKundli(phone, playerId) {
            document.getElementById('kundliModal').style.display = 'flex';
            document.getElementById('kundliPlayerId').innerText = playerId;
            
            const tbody = document.getElementById('kundliData');
            tbody.innerHTML = "<tr><td colspan='4'>Searching Database...</td></tr>";

            let wins = 0, losses = 0;

            // Database se 'match_history' fetch karna
            db.ref('match_history').orderByChild('playerPhone').equalTo(phone).once('value', (snapshot) => {
                tbody.innerHTML = "";
                
                if(!snapshot.exists()) {
                    tbody.innerHTML = "<tr><td colspan='4' style='color:#888;'>Is player ne abhi tak koi match nahi khela!</td></tr>";
                    document.getElementById('k-wins').innerText = 0;
                    document.getElementById('k-losses').innerText = 0;
                    return;
                }

                snapshot.forEach((child) => {
                    let match = child.val();
                    let dateStr = new Date(match.timestamp).toLocaleString();
                    
                    let resultHtml = "";
                    if(match.result === "WIN") {
                        resultHtml = "<span class='txt-win'>🏆 WIN</span>";
                        wins++;
                    } else if(match.result === "LOSS") {
                        resultHtml = "<span class='txt-loss'>💀 LOSS</span>";
                        losses++;
                    } else {
                        resultHtml = "<span style='color:#ffae00'>⏳ PENDING</span>";
                    }

                    tbody.innerHTML += `
                    <tr>
                        <td style="font-size: 11px;">${dateStr}</td>
                        <td style="color: #FFD700;">${match.opponentName || "Unknown"}</td>
                        <td>₹${match.amount}</td>
                        <td>${resultHtml}</td>
                    </tr>`;
                });

                document.getElementById('k-wins').innerText = wins;
                document.getElementById('k-losses').innerText = losses;
            });
        }

        function closeKundli() {
            document.getElementById('kundliModal').style.display = 'none';
        }

        function searchPlayer() {
            let input = document.getElementById("searchInput").value.toUpperCase();
            let table = document.getElementById("playersTable");
            let tr = table.getElementsByTagName("tr");
            for (let i = 1; i < tr.length; i++) { 
                let textPhone = tr[i].getElementsByTagName("td")[0].innerText;
                let textId = tr[i].getElementsByTagName("td")[1].innerText;
                tr[i].style.display = (textPhone.toUpperCase().indexOf(input) > -1 || textId.toUpperCase().indexOf(input) > -1) ? "" : "none";
            }
        }
    </script>
</body>
</html>
