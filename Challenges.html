<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Tournament Lobby</title>
    <style>
        body { background: #121212; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; }
        
        /* Header / Wallet */
        .header { display: flex; justify-content: space-between; align-items: center; background: #1e1e1e; padding: 15px; border-radius: 10px; border-bottom: 2px solid #FFD700; margin-bottom: 20px; }
        .wallet { color: #00FF00; font-weight: bold; font-size: 18px; }
        
        /* Game Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; text-align: center; background: #333; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .tab.active { background: #FFD700; color: #000; }

        /* Create Challenge Box */
        .create-box { background: #1e1e1e; padding: 15px; border-radius: 10px; border: 1px dashed #777; margin-bottom: 20px; text-align: center; }
        .create-input { padding: 10px; border-radius: 5px; border: none; width: 60%; background: #333; color: white; margin-right: 10px; }
        .btn-create { background: #FFD700; color: #000; padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* Leaderboard / Live Board */
        .section-title { font-size: 14px; color: #aaa; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .card { display: flex; justify-content: space-between; align-items: center; background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #333; transition: 0.2s; }
        .card:hover { border-left-color: #FFD700; background: #252525; }
        
        .player-info { display: flex; flex-direction: column; }
        .name-row { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: bold; }
        .dot-online { color: #00FF00; font-size: 12px; }
        .dot-offline { color: #888; font-size: 12px; }
        .stats { color: #888; font-size: 12px; margin-top: 5px; }

        .action-area { text-align: right; }
        .amount { color: #FFD700; font-size: 18px; font-weight: bold; display: block; margin-bottom: 5px; }
        .btn-accept { background: #00FF00; color: #000; padding: 8px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-disabled { background: #555; color: #888; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 20px; font-weight: bold; color: #FFD700;">PRO ESPORTS</div>
        <div class="wallet">💰 ₹500</div>
    </div>

    <div class="tabs">
        <div class="tab active">Free Fire MAX</div>
        <div class="tab">BGMI</div>
    </div>

    <div class="create-box">
        <h3 style="margin-top: 0;">Create Your Challenge</h3>
        <input type="number" class="create-input" placeholder="Amount (e.g. 100)" id="betAmount">
        <button class="btn-create" onclick="createChallenge()">CREATE</button>
    </div>

    <div class="section-title">🔴 Live Challenges (Tap to Play)</div>

    <div id="liveBoard">
        <div class="card">
            <div class="player-info">
                <div class="name-row">
                    <span>Rahul_Gamer</span>
                    <span class="dot-online">🟢</span> </div>
                <div class="stats">Matches: 45 | Win Rate: 60%</div>
            </div>
            <div class="action-area">
                <span class="amount">₹100</span>
                <button class="btn-accept" onclick="acceptChallenge(100, 'Rahul_Gamer')">ACCEPT</button>
            </div>
        </div>

        <div class="card">
            <div class="player-info">
                <div class="name-row">
                    <span>SniperKing99</span>
                    <span class="dot-online">🟢</span> 
                </div>
                <div class="stats">Matches: 142 | Win Rate: 85%</div>
            </div>
            <div class="action-area">
                <span class="amount">₹500</span>
                <button class="btn-accept btn-disabled" onclick="alert('This challenge is already full or matching in progress.')">WAITING...</button>
            </div>
        </div>

        <div class="card" style="opacity: 0.7;">
            <div class="player-info">
                <div class="name-row">
                    <span>NoobMaster</span>
                    <span class="dot-offline">⚪</span> </div>
                <div class="stats">Matches: 12 | Win Rate: 20%</div>
            </div>
            <div class="action-area">
                <span class="amount">₹50</span>
                <button class="btn-accept btn-disabled">OFFLINE</button>
            </div>
        </div>
    </div>

    <script>
        function createChallenge() {
            let amount = document.getElementById('betAmount').value;
            if(amount === "" || amount <= 0) {
                alert("Bhai, amount daalo pehle!");
                return;
            }
            alert("Challenge set for ₹" + amount + "! Waiting for opponent...");
            // Asli app me yeh code database me data bhejega
        }

        function acceptChallenge(amount, opponentName) {
            let confirmAccept = confirm("Confirm Match: ₹" + amount + " will be deducted from your wallet to play against " + opponentName + ".");
            if(confirmAccept) {
                alert("Match Accepted! Paise wallet se hold par chale gaye. Redirecting to Match Room...");
                // YEH RAHA JAADU: Yeh player ko seedha aapke banaye hue MatchRoom par bhej dega!
                window.location.href = "MatchRoom.html"; 
            }
        }
    </script>

</body>
</html>
