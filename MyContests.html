<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - My Joined Contests</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding-bottom: 30px; }
        .header { background: linear-gradient(135deg, #1a0033, #00ff88); padding: 15px; display: flex; align-items: center; border-bottom: 2px solid #333; position: sticky; top:0; z-index:100; box-shadow: 0 4px 15px rgba(0,255,136,0.3); color: #000; }
        .back-btn { font-size: 20px; margin-right: 15px; cursor: pointer; font-weight: bold; }
        .title { font-weight: 900; font-size: 18px; text-transform: uppercase; }
        
        .contest-card { background: linear-gradient(145deg, #1a1a2e, #111); margin: 15px; padding: 15px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border-left: 4px solid #ffd700;}
        .c-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #444; padding-bottom: 10px; margin-bottom: 10px; }
        .c-type { font-size: 14px; font-weight: 900; color: #ffd700; }
        .c-fee { font-size: 14px; font-weight: bold; background: #222; padding: 4px 10px; border-radius: 6px; border: 1px solid #444; color: #fff; }
        
        .c-body { display: flex; justify-content: space-between; align-items: center; }
        .pts-box { text-align: left; }
        .pts-val { font-size: 24px; font-weight: 900; color: #00ff88; }
        .pts-lbl { font-size: 11px; color: #aaa; text-transform: uppercase; }
        
        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        .edit-team-btn { background: linear-gradient(90deg, #ffd700, #ff8c00); color: #000; font-weight: 900; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.3s; flex: 1; text-transform: uppercase;}
        .view-team-btn { background: linear-gradient(90deg, #3498db, #2980b9); color: #fff; font-weight: 900; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.3s; flex: 1; text-transform: uppercase;}
        .view-btn { background: linear-gradient(90deg, #00ff88, #00c366); color: #000; font-weight: 900; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.3s; flex: 1; text-transform: uppercase;}
        
        .loader { text-align: center; margin-top: 50px; color: #00ff88; font-weight: bold; }
        .no-data { text-align: center; margin-top: 50px; color: #aaa; font-weight: bold; padding: 20px; background: #111; margin: 20px; border-radius: 10px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-arrow-left back-btn" onclick="window.location.href='Matches.html'"></i>
        <div class="title">MY CONTESTS</div>
    </div>

    <div id="myContestsList">
        <div class="loader"><i class="fa-solid fa-spinner fa-spin fa-2x"></i><br><br>Searching your teams...</div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        const matchId = new URLSearchParams(window.location.search).get('matchId') || "DUMMY";
        let myPhone = localStorage.getItem('userPhone') || localStorage.getItem('phone');
        const container = document.getElementById('myContestsList');

        if(!matchId) {
            container.innerHTML = "<div class='no-data'>Match ID missing!</div>";
        } else {
            db.ref('Game/Kalyan11/VIPMatches/' + matchId).once('value', mSnap => {
                let matchTimeMs = mSnap.val()?.timestamp || 0;
                let isMatchLive = new Date().getTime() >= matchTimeMs; // Check agar match start ho gaya

                db.ref('Game/Kalyan11/Contests/' + matchId + '/Teams').on('value', snap => {
                    container.innerHTML = "";
                    let hasTeams = false;

                    if(snap.exists()) {
                        snap.forEach(child => {
                            let team = child.val();
                            if((team.phone || child.key.split('_')[0]) === myPhone) {
                                hasTeams = true;
                                let entry = parseInt(team.entry_paid || 49);
                                let points = team.total_points ? parseFloat(team.total_points).toFixed(1) : "0.0";

                                let actionBtn = isMatchLive ? 
                                    `<button class="view-team-btn" onclick="alert('View Team UI Pending')"><i class="fa-solid fa-users"></i> VIEW 11</button>` :
                                    `<button class="edit-team-btn" onclick="editMyTeam('${matchId}', '${child.key}', '${team.players}')"><i class="fa-solid fa-pen"></i> EDIT</button>`;

                                container.innerHTML += `
                                    <div class="contest-card">
                                        <div class="c-header"><div class="c-type"><i class="fa-solid fa-trophy"></i> Mega Contest</div><div class="c-fee">${entry === 0 ? 'FREE' : '₹'+entry}</div></div>
                                        <div class="c-body"><div class="pts-box"><div class="pts-val">${points}</div><div class="pts-lbl">Total Points</div></div></div>
                                        <div class="btn-row">
                                            ${actionBtn}
                                            <button class="view-btn" onclick="window.location.href='leader.html?matchId=${matchId}&entry=${entry}'"><i class="fa-solid fa-bolt"></i> RANKS</button>
                                        </div>
                                    </div>`;
                            }
                        });
                    }
                    if(!hasTeams) container.innerHTML = `<div class="no-data"><i class="fa-solid fa-face-frown fa-2x"></i><br><br>Aapne abhi tak koi team nahi banayi hai.</div>`;
                });
            });
        }

        function editMyTeam(mId, teamKey, playersData) {
            localStorage.setItem('kalyan_selected_team', JSON.stringify(playersData.split(',')));
            localStorage.setItem('kalyan_edit_team_key', teamKey);
            window.location.href = `CreateTeam.html?matchId=${mId}`;
        }
    </script>
</body>
</html>
