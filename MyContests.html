<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan 11 - My Joined Contests</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #050510; color: #fff; margin: 0; padding-bottom: 30px; }
        .header { background: linear-gradient(135deg, #1a0033, #4a00e0); padding: 15px; display: flex; align-items: center; border-bottom: 2px solid #00ff88; position: sticky; top:0; z-index:100; box-shadow: 0 4px 15px rgba(0,255,136,0.3); }
        .back-btn { font-size: 20px; margin-right: 15px; cursor: pointer; color: #00ff88; }
        .title { font-weight: 900; font-size: 18px; text-transform: uppercase; }
        
        .contest-card { background: linear-gradient(145deg, #1e1e2e, #111); margin: 15px; padding: 15px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border-left: 4px solid #ffd700;}
        .c-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #444; padding-bottom: 10px; margin-bottom: 10px; }
        .c-type { font-size: 14px; font-weight: 900; color: #ffd700; }
        .c-fee { font-size: 16px; font-weight: bold; background: #222; padding: 4px 10px; border-radius: 6px; border: 1px solid #444; }
        
        .c-body { display: flex; justify-content: space-between; align-items: center; }
        .pts-box { text-align: left; }
        .pts-val { font-size: 24px; font-weight: 900; color: #00ff88; }
        .pts-lbl { font-size: 11px; color: #aaa; text-transform: uppercase; }
        
        /* 🚀 Naye Buttons ka Style (Edit aur View Live) */
        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        .edit-btn { background: linear-gradient(90deg, #3498db, #2980b9); color: #fff; font-weight: 900; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; transition: 0.3s; flex: 1; box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-transform: uppercase;}
        .edit-btn:active { transform: scale(0.95); }
        .view-btn { background: linear-gradient(90deg, #00ff88, #00d2d3); color: #000; font-weight: 900; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; transition: 0.3s; flex: 1; box-shadow: 0 4px 10px rgba(0,255,136,0.3); text-transform: uppercase;}
        .view-btn:active { transform: scale(0.95); }

        .loader { text-align: center; margin-top: 50px; color: #00ff88; font-weight: bold; }
        .no-data { text-align: center; margin-top: 50px; color: #ff004c; font-weight: bold; padding: 20px; background: #111; margin: 20px; border-radius: 10px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-arrow-left back-btn" onclick="window.location.href='Matches.html'"></i>
        <div class="title">MY CONTESTS</div>
    </div>

    <div id="myContestsList">
        <div class="loader"><i class="fa-solid fa-spinner fa-spin fa-2x"></i><br><br>Searching your teams...</div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('matchId') || "DUMMY_MATCH";
        
        let myPhone = localStorage.getItem('userPhone') || localStorage.getItem('phone');

        const container = document.getElementById('myContestsList');

        if(!matchId) {
            container.innerHTML = "<div class='no-data'>Match ID missing!</div>";
        } else {
            db.ref('Game/Kalyan11/Contests/' + matchId + '/Teams').on('value', snap => {
                container.innerHTML = "";
                let hasTeams = false;

                if(snap.exists()) {
                    snap.forEach(child => {
                        let team = child.val();
                        let teamPhone = team.phone || child.key.split('_')[0];
                        
                        if(teamPhone === myPhone) {
                            hasTeams = true;
                            let entryPaid = team.entry_paid || 49;
                            let points = team.total_points ? team.total_points.toFixed(1) : "0.0";
                            
                            let contestName = "Mega Contest (1.5 Lakh Spots)";
                            if(entryPaid > 49 && entryPaid <= 199) contestName = "Hot Contest (10,000 Spots)";
                            else if(entryPaid >= 575) contestName = "H2H Battle (2 Spots)";

                            container.innerHTML += `
                                <div class="contest-card">
                                    <div class="c-header">
                                        <div class="c-type"><i class="fa-solid fa-trophy"></i> ${contestName}</div>
                                        <div class="c-fee">₹${entryPaid}</div>
                                    </div>
                                    <div class="c-body">
                                        <div class="pts-box">
                                            <div class="pts-val">${points}</div>
                                            <div class="pts-lbl">Total Points</div>
                                        </div>
                                    </div>
                                    <div class="btn-row">
                                        <button class="edit-btn" id="edit-btn-${matchId}" onclick="editMyTeam('${matchId}')">
                                            <i class="fa-solid fa-pen"></i> EDIT TEAM
                                        </button>
                                        <button class="view-btn" onclick="window.location.href='leader.html?matchId=${matchId}&entry=${entryPaid}'">
                                            VIEW LIVE <i class="fa-solid fa-bolt"></i>
                                        </button>
                                    </div>
                                </div>
                            `;
                        }
                    });
                }

                if(!hasTeams) {
                    container.innerHTML = `
                        <div class="no-data">
                            <i class="fa-solid fa-face-frown fa-2x"></i><br><br>
                            Aapne is match mein abhi tak koi contest join nahi kiya hai.
                        </div>`;
                }
            });
        }

        // 🚀 THE EDIT TEAM MAGIC FUNCTION 🚀
        function editMyTeam(mId) {
            let btn = document.getElementById(`edit-btn-${mId}`);
            if(btn) btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> LOADING...';

            // 1. Pehle Live match se Team1 aur Team2 ka naam nikalo
            db.ref('Game/Kalyan11/LiveMatches/' + mId).once('value', matchSnap => {
                let mData = matchSnap.val();
                let t1 = mData ? mData.team1 : "T1";
                let t2 = mData ? mData.team2 : "T2";

                // 2. Phir user ki bani hui team Firebase se nikalo
                db.ref('Game/Kalyan11/Contests/' + mId + '/Teams/' + myPhone).once('value', teamSnap => {
                    if(teamSnap.exists()) {
                        let teamData = teamSnap.val();
                        
                        // 3. User ke purane khiladiyon ko memory mein save karo
                        if(teamData.players) {
                            localStorage.setItem('kalyan_selected_team', JSON.stringify(teamData.players));
                        }
                        
                        // 4. CreateTeam page par bhej do (Edit mode mein)
                        window.location.href = `CreateTeam.html?matchId=${mId}&t1=${t1}&t2=${t2}`;
                    } else {
                        alert("Team data nahi mila!");
                        if(btn) btn.innerHTML = '<i class="fa-solid fa-pen"></i> EDIT TEAM';
                    }
                });
            });
        }
    </script>
</body>
</html>
