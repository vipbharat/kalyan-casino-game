<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyan Pro - Master Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f0f13; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #1e1e24; padding: 15px 20px; border-radius: 10px; border-bottom: 3px solid #FFD700; margin-bottom: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; }
        .tab-btn { flex: 1; min-width: 150px; padding: 15px; font-weight: 900; background: #222; color: #888; border: 1px solid #444; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { background: #FFD700; color: #000; border-color: #FFD700; }
        .section { display: none; }
        .section.active { display: block; }
        .table-container { background: #1e1e24; border-radius: 10px; overflow-x: auto; border: 1px solid #333; margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #333; color: #FFD700; padding: 12px; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #2a2a35; font-size: 13px; }
        .ank-box { width: 50px; padding: 8px; text-align: center; background: #111; color: #fff; border: 1px solid #FFD700; border-radius: 4px; }
        .btn-publish { background: #00FF00; color: #000; border: none; padding: 10px 15px; border-radius: 5px; font-weight: 900; cursor: pointer; }
        .rules-textarea { width: 100%; height: 200px; background: #111; color: #fff; border: 1px solid #FFD700; border-radius: 8px; padding: 15px; font-size: 15px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="header"><h1>👑 MASTER PANEL</h1></div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('marketTab', this)">🎰 Matka Control</button>
        <button class="tab-btn" onclick="switchTab('settingsTab', this)">⚙️ Settings & Rules</button>
    </div>

    <div id="marketTab" class="section active">
        <div class="table-container">
            <table>
                <thead><tr><th>Market Name</th><th>Live Result</th><th>Set Open-Jodi-Close</th><th>Action</th></tr></thead>
                <tbody id="marketControlData"></tbody>
            </table>
        </div>
        <h3 style="color:#00FF00;">ALL MATKA BETS</h3>
        <div class="table-container">
            <table>
                <thead><tr><th>Phone</th><th>Market</th><th>Game</th><th>Bid</th><th>Amt</th><th>Status</th></tr></thead>
                <tbody id="marketBetsData"></tbody>
            </table>
        </div>
    </div>

    <div id="settingsTab" class="section">
        <div class="table-container" style="padding: 20px;">
            <h3>Update Rules</h3>
            <textarea id="rulesInput" class="rules-textarea" placeholder="Type rules here..."></textarea>
            <button class="btn-publish" onclick="saveRules()" style="width: 100%;">SAVE & PUBLISH RULES</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function switchTab(tabId, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        db.ref('settings/game_rules').on('value', snap => { if(snap.exists()) document.getElementById('rulesInput').value = snap.val(); });
        function saveRules() { db.ref('settings/game_rules').set(document.getElementById('rulesInput').value).then(() => alert("Rules Updated on App!")); }

        const defaultVIPMarkets = {
            "m1": { name: "TIME BAZAR" }, "m2": { name: "MADHUR DAY" }, "m3": { name: "MILAN DAY" }, "m4": { name: "KALYAN" },
            "m5": { name: "TIME BAZAR NIGHT" }, "m6": { name: "MADHUR NIGHT" }, "m7": { name: "MILAN NIGHT" }, "m8": { name: "KALYAN NIGHT" }
        };

        function init() {
            const tbody = document.getElementById('marketControlData');
            Object.keys(defaultVIPMarkets).forEach(id => {
                tbody.innerHTML += `<tr>
                    <td>${defaultVIPMarkets[id].name}</td>
                    <td id="res_${id}">***-**-***</td>
                    <td><input id="op_${id}" class="ank-box"> - <input id="jo_${id}" class="ank-box"> - <input id="cl_${id}" class="ank-box"></td>
                    <td><button class="btn-publish" onclick="publish('${id}', '${defaultVIPMarkets[id].name}')">PAY</button></td>
                </tr>`;
            });
        }
        init();

        db.ref('LiveMarkets').on('value', snap => {
            snap.forEach(c => { if(document.getElementById('res_'+c.key) && c.val().result) document.getElementById('res_'+c.key).innerText = c.val().result; });
        });

        function publish(id, name) {
            let op = document.getElementById('op_'+id).value, jo = document.getElementById('jo_'+id).value, cl = document.getElementById('cl_'+id).value;
            if(jo.length !== 2) return alert("Jodi must be exactly 2 digits!");
            let res = `${op||'***'}-${jo}-${cl||'***'}`;
            
            // Only update Result. Does not break other DB items.
            db.ref('LiveMarkets/'+id).update({result: res}).then(() => {
                alert("Result Live! Payout starting...");
                payout(name, op, jo, cl);
            });
        }

        function payout(mName, op, jo, cl) {
            let oA = jo.charAt(0), cA = jo.charAt(1);
            db.ref('AdminPanel/AllActiveBets').orderByChild('marketName').equalTo(mName).once('value', snap => {
                snap.forEach(c => {
                    let b = c.val(); if(b.status !== "pending") return;
                    let win = false, rate = 0;
                    if(b.gameType === "Single Ank") { if(b.session==="OPEN" && b.bidNumber===oA) {win=true; rate=9.5;} else if(b.session==="CLOSE" && b.bidNumber===cA) {win=true; rate=9.5;} }
                    else if(b.gameType === "Jodi Digit" && b.bidNumber===jo) {win=true; rate=95;}
                    else if(b.gameType === "Single Panna") { if(b.session==="OPEN" && b.bidNumber===op) {win=true; rate=150;} else if(b.session==="CLOSE" && b.bidNumber===cl) {win=true; rate=150;} }
                    else if(b.gameType === "Double Panna") { if(b.session==="OPEN" && b.bidNumber===op) {win=true; rate=300;} else if(b.session==="CLOSE" && b.bidNumber===cl) {win=true; rate=300;} }
                    else if(b.gameType === "Triple Panna") { if(b.session==="OPEN" && b.bidNumber===op) {win=true; rate=800;} else if(b.session==="CLOSE" && b.bidNumber===cl) {win=true; rate=800;} }
                    else if(b.gameType === "Half Sangam") { let p1=`${op}-${cA}`, p2=`${oA}-${cl}`; if(b.bidNumber===p1 || b.bidNumber===p2) {win=true; rate=1000;} }

                    if(win) {
                        let amt = b.betAmount * rate;
                        db.ref('AdminPanel/AllActiveBets/'+c.key).update({status: "WIN", winAmount: amt});
                        db.ref('users/'+b.userPhone+'/balance').set(firebase.database.ServerValue.increment(amt));
                    } else {
                        db.ref('AdminPanel/AllActiveBets/'+c.key).update({status: "LOSS"});
                    }
                });
                alert("Payout Finished successfully!");
            });
        }

        db.ref('AdminPanel/AllActiveBets').limitToLast(20).on('value', snap => {
            const tbody = document.getElementById('marketBetsData'); tbody.innerHTML = "";
            let arr = []; snap.forEach(c => arr.push(c.val()));
            arr.reverse().forEach(b => {
                let statColor = b.status === "WIN" ? "#00FF00" : (b.status === "LOSS" ? "#ff004c" : "#ffae00");
                tbody.innerHTML += `<tr><td>${b.userPhone}</td><td>${b.marketName}</td><td>${b.gameType}</td><td>${b.bidNumber}</td><td>₹${b.betAmount}</td><td style="color:${statColor};font-weight:bold;">${b.status}</td></tr>`;
            });
        });
    </script>
</body>
</html>
