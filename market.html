<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-VIP Live Markets</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; user-select: none; }
        body { background-color: #0d0d0d; color: #fff; padding-bottom: 30px; }
        
        /* VIP Header */
        .header { background: linear-gradient(90deg, #1a2a6c, #b21f1f, #fdbb2d); padding: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); position: sticky; top: 0; z-index: 50;}
        .header h1 { font-size: 22px; font-weight: 900; letter-spacing: 1px; margin: 0; }
        .header p { font-size: 10px; color: #fff; margin: 0; }

        /* Wallet */
        .wallet-bar { background: #1e1e1e; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; }
        .bal-amt { color: #2ecc71; font-size: 20px; font-weight: 900; }

        /* Payout Rates Chart */
        .payout-card { background: #1a1a1a; margin: 10px; border-radius: 10px; border: 1px solid #f1c40f; overflow: hidden; }
        .payout-header { background: #f1c40f; color: #000; padding: 8px; font-weight: 900; text-align: center; text-transform: uppercase; font-size: 13px; }
        .payout-row { display: flex; justify-content: space-between; padding: 8px 15px; border-bottom: 1px solid #222; font-size: 12px; }
        .payout-rate { color: #2ecc71; font-weight: bold; }

        /* Markets List */
        .market-list { padding: 10px; }
        .m-card { background: #222; border-radius: 10px; padding: 15px; margin-bottom: 15px; border-left: 5px solid #f1c40f; box-shadow: 0 4px 6px rgba(0,0,0,0.4); }
        .m-card.open { border-left-color: #2ecc71; }
        .m-card.running { border-left-color: #f1c40f; }
        .m-card.closed { border-left-color: #e74c3c; opacity: 0.8; }
        
        .m-title { font-size: 18px; font-weight: 900; color: #f1c40f; text-transform: uppercase; }
        .m-res { font-size: 26px; font-weight: bold; margin: 12px 0; font-family: 'Courier New', monospace; text-align: center; letter-spacing: 3px; background: #111; padding: 8px; border-radius: 5px; color: #fff; }
        
        .btn-bet { width: 100%; background: linear-gradient(180deg, #3498db, #2980b9); color: #fff; border: none; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 0 #1a5276; cursor: pointer; transition: 0.2s;}
        .btn-bet:active { transform: translateY(2px); box-shadow: 0 2px 0 #1a5276; }
        .btn-bet:disabled { background: #444; color: #888; box-shadow: none; cursor: not-allowed; }

        /* Betting Bottom Modal */
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 99; }
        #betModal { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; z-index: 100; border-top-left-radius: 20px; border-top-right-radius: 20px; padding: 20px; border-top: 3px solid #f1c40f; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px dashed #444; padding-bottom: 10px;}
        .modal-title { color: #f1c40f; font-weight: 900; font-size: 18px; text-transform: uppercase; }
        .close-modal { color: #ff004c; font-size: 24px; font-weight: bold; cursor: pointer; }
        
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .game-btn { background: #222; color: #fff; padding: 15px 10px; border-radius: 8px; border: 1px solid #444; text-align: center; font-weight: bold; font-size: 13px; cursor: pointer; transition: 0.2s;}
        .game-btn:active { background: #f1c40f; color: #000; border-color: #f1c40f; }

        /* Custom Input Section (New) */
        #inputSection { display: none; animation: slideUp 0.2s ease-out; }
        .bet-input { width: 100%; padding: 15px; margin-bottom: 15px; background: #111; border: 1px solid #444; color: #fff; border-radius: 8px; font-size: 16px; outline: none; }
        .bet-input:focus { border-color: #f1c40f; }
        .btn-confirm { background: #2ecc71; color: #000; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: 900; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
        .btn-back { background: #444; color: #fff; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; }
        
        #loader { text-align: center; color: #aaa; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <header class="header">
        <h1>👑 K-VIP CASINO</h1>
        <p>Live Secure Market Engine</p>
    </header>

    <div class="wallet-bar">
        <span style="font-size:12px; font-weight:bold; color:#aaa;"><i class="fa-solid fa-wallet"></i> VIP WALLET</span>
        <div class="bal-amt">₹ <span id="balance">0.00</span></div>
    </div>

    <div class="payout-card">
        <div class="payout-header">Market Winning Rates</div>
        <div class="payout-row"><span>Single Ank</span><span class="payout-rate">1 : 9.5</span></div>
        <div class="payout-row"><span>Jodi Digit</span><span class="payout-rate">1 : 95</span></div>
        <div class="payout-row"><span>Single Panna</span><span class="payout-rate">1 : 150</span></div>
        <div class="payout-row"><span>Double Panna</span><span class="payout-rate">1 : 300</span></div>
        <div class="payout-row"><span>Triple Panna</span><span class="payout-rate">1 : 800</span></div>
        <div class="payout-row"><span>Half Sangam</span><span class="payout-rate">1 : 1000</span></div>
    </div>

    <div class="market-list" id="markets-container">
        <div id="loader"><i class="fa-solid fa-spinner fa-spin"></i> Loading VIP Markets...</div>
    </div>

    <div id="modalOverlay" onclick="closeBetModal()"></div>
    <div id="betModal">
        <div class="modal-header">
            <div class="modal-title" id="modalMarketName">SELECT GAME</div>
            <div class="close-modal" onclick="closeBetModal()"><i class="fa-solid fa-circle-xmark"></i></div>
        </div>
        
        <div class="game-grid" id="gameGrid">
            <button class="game-btn" onclick="selectGame('Single Ank')">SINGLE ANK</button>
            <button class="game-btn" onclick="selectGame('Jodi Digit')">JODI DIGIT</button>
            <button class="game-btn" onclick="selectGame('Single Panna')">SINGLE PANNA</button>
            <button class="game-btn" onclick="selectGame('Double Panna')">DOUBLE PANNA</button>
            <button class="game-btn" onclick="selectGame('Triple Panna')">TRIPLE PANNA</button>
            <button class="game-btn" onclick="selectGame('Half Sangam')">HALF SANGAM</button>
        </div>

        <div id="inputSection">
            <div style="color: #2ecc71; font-weight: bold; margin-bottom: 15px; font-size: 14px;" id="selectedGameLabel">Game: Single Ank</div>
            
            <input type="number" id="betNumber" class="bet-input" placeholder="Enter Bidding Number (e.g. 5, 45, 120)">
            <input type="number" id="betAmount" class="bet-input" placeholder="Enter Amount (₹)">
            
            <button class="btn-confirm" onclick="submitFinalBet()">✔️ PLACE BET</button>
            <button class="btn-back" onclick="backToGames()">⬅️ BACK</button>
        </div>
    </div>

    <script>
        // 1. FIREBASE CONFIG
        const firebaseConfig = { 
            apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", 
            databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", 
            projectId: "kalyan-casino" 
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        const container = document.getElementById('markets-container');
        const userPhone = localStorage.getItem('userPhone') || localStorage.getItem('phone');
        let activeMarket = null;
        let selectedGameType = "";

        // 2. OFFLINE MEMORY
        function loadOffline() {
            const cached = localStorage.getItem('kvip_markets_cache');
            return cached ? JSON.parse(cached) : null;
        }
        function saveOffline(data) {
            localStorage.setItem('kvip_markets_cache', JSON.stringify(data));
        }

        // 3. WALLET SYNC
        if (userPhone) {
            db.ref('Users/' + userPhone + '/balance').on('value', snapshot => {
                document.getElementById('balance').innerText = parseFloat(snapshot.val() || 0).toFixed(2);
            });
        }

        // 4. MARKET RENDER ENGINE
        function parseTime(t) {
            if(!t) return 1440;
            let p = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
            if(!p) return 1440;
            let h = parseInt(p[1]), m = parseInt(p[2]), mod = p[3].toUpperCase();
            if(h === 12) h = (mod === 'PM') ? 12 : 0;
            else if(mod === 'PM') h += 12;
            return h * 60 + m;
        }

        function renderMarkets(markets) {
            if(!markets) return;
            container.innerHTML = '';
            let now = new Date();
            let currentMins = now.getHours() * 60 + now.getMinutes();
            let marketArray = Array.isArray(markets) ? markets : Object.keys(markets).map(key => ({...markets[key], id: key}));

            marketArray.forEach(m => {
                let openT = parseTime(m.open);
                let closeT = parseTime(m.close);
                let status = (currentMins < openT) ? 'open' : (currentMins < closeT ? 'running' : 'closed');
                
                let btnState = (status === 'closed') ? 'disabled' : '';
                let btnText = (status === 'closed') ? 'MARKET CLOSED' : 'PLAY NOW';

                container.innerHTML += `
                    <div class="m-card ${status}">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div class="m-title">${m.name}</div>
                            <div style="font-size:10px; color:#aaa; font-weight:bold;">${m.open} - ${m.close}</div>
                        </div>
                        <div class="m-res">${m.result || '***-**-***'}</div>
                        <button class="btn-bet" ${btnState} onclick="openBetModal('${m.id}', '${m.name}')">
                            ${btnText}
                        </button>
                    </div>`;
            });
        }

        const offlineData = loadOffline();
        if(offlineData) renderMarkets(offlineData);

        const defaultVIPMarkets = {
            "m1": { name: "TIME BAZAR", open: "01:00 PM", close: "02:00 PM", result: "***-**-***" },
            "m2": { name: "MADHUR DAY", open: "01:15 PM", close: "02:15 PM", result: "***-**-***" },
            "m3": { name: "MILAN DAY", open: "03:00 PM", close: "05:00 PM", result: "***-**-***" },
            "m4": { name: "KALYAN", open: "04:00 PM", close: "06:00 PM", result: "***-**-***" },
            "m5": { name: "TIME BAZAR NIGHT", open: "08:00 PM", close: "09:00 PM", result: "***-**-***" },
            "m6": { name: "MADHUR NIGHT", open: "08:30 PM", close: "10:30 PM", result: "***-**-***" },
            "m7": { name: "MILAN NIGHT", open: "09:00 PM", close: "11:00 PM", result: "***-**-***" },
            "m8": { name: "KALYAN NIGHT", open: "09:30 PM", close: "11:30 PM", result: "***-**-***" }
        };

        db.ref('LiveMarkets').on('value', snap => {
            if(!snap.exists()) { db.ref('LiveMarkets').set(defaultVIPMarkets); } 
            else { const data = snap.val(); saveOffline(data); renderMarkets(data); }
        });

        // 5. NEW BETTING LOGIC (Custom UI + Firebase History)
        function openBetModal(id, name) {
            if(!userPhone) { alert("Pehle Dashboard mein Login karein!"); return; }
            activeMarket = { id: id, name: name };
            document.getElementById('modalMarketName').innerText = name + " - PLAY";
            backToGames(); // Reset modal view
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('betModal').style.display = 'block';
        }

        function closeBetModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('betModal').style.display = 'none';
        }

        // Step 1: Game chuna (Single, Jodi etc)
        function selectGame(gameType) {
            selectedGameType = gameType;
            document.getElementById('gameGrid').style.display = 'none';
            document.getElementById('inputSection').style.display = 'block';
            document.getElementById('selectedGameLabel').innerText = "Selected Game: " + gameType;
            
            // Purana input clear karo
            document.getElementById('betNumber').value = "";
            document.getElementById('betAmount').value = "";
        }

        // Wapas game list par jana
        function backToGames() {
            document.getElementById('gameGrid').style.display = 'grid';
            document.getElementById('inputSection').style.display = 'none';
        }

        // Step 2: Final Submit
        function submitFinalBet() {
            let number = document.getElementById('betNumber').value.trim();
            let amount = document.getElementById('betAmount').value.trim();

            if(!number || number === "") return alert("Please enter a valid bidding number!");
            if(!amount || isNaN(amount) || parseFloat(amount) < 10) return alert("Minimum bet amount is ₹10!");

            let betAmt = parseFloat(amount);
            let bal = parseFloat(document.getElementById('balance').innerText);

            if(betAmt > bal) {
                alert("Wallet mein balance kam hai! Kripya recharge karein.");
                return;
            }

            // A: Paise kaato
            db.ref('Users/' + userPhone + '/balance').set(bal - betAmt).then(() => {
                
                // B: Bet History Save Karo (Aapke (Admin) ke liye)
                let betDetails = {
                    marketId: activeMarket.id,
                    marketName: activeMarket.name,
                    gameType: selectedGameType,
                    bidNumber: number,
                    betAmount: betAmt,
                    status: "pending",
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                };

                // Player ke account mein history save
                db.ref('BetHistory/' + userPhone).push(betDetails);
                
                // Admin Panel (All Bets) folder mein save
                db.ref('AdminPanel/AllActiveBets').push({
                    userPhone: userPhone,
                    ...betDetails
                });

                alert(`✅ BET PLACED SUCCESSFULLY!\n\nMarket: ${activeMarket.name}\nGame: ${selectedGameType}\nNumber: ${number}\nAmount: ₹${betAmt}`);
                closeBetModal();
            }).catch(err => {
                alert("Server Error! Bet Failed.");
            });
        }

        setInterval(() => { let data = loadOffline(); if(data) renderMarkets(data); }, 30000);
    </script>
</body>
</html>
