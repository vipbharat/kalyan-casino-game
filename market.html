<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-VIP Live Markets</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; user-select: none; }
        body { background-color: #0d0d0d; color: #fff; padding-bottom: 30px; }
        
        /* VIP Header - Ab ekdum saaf hai */
        .header { background: linear-gradient(90deg, #1a2a6c, #b21f1f, #fdbb2d); padding: 20px 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); position: sticky; top: 0; z-index: 50;}
        .header h1 { font-size: 24px; font-weight: 900; letter-spacing: 2px; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        .wallet-bar { background: #1e1e1e; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; }
        .bal-amt { color: #2ecc71; font-size: 20px; font-weight: 900; }

        .market-list { padding: 10px; }
        .m-card { background: #222; border-radius: 10px; padding: 15px; margin-bottom: 15px; border-left: 5px solid #2ecc71; box-shadow: 0 4px 6px rgba(0,0,0,0.4); }
        .m-card.closed { border-left-color: #e74c3c; opacity: 0.8; }
        .m-card.half-closed { border-left-color: #f39c12; }
        
        .m-title { font-size: 18px; font-weight: 900; color: #f1c40f; text-transform: uppercase; }
        .m-res { font-size: 28px; font-weight: bold; margin: 12px 0; font-family: 'Courier New', monospace; text-align: center; letter-spacing: 4px; background: #111; padding: 10px; border-radius: 5px; color: #00ffff; border: 1px solid #333; }
        
        .btn-bet { width: 100%; background: linear-gradient(180deg, #2ecc71, #27ae60); color: #000; border: none; padding: 14px; border-radius: 8px; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.2s;}
        .btn-bet:disabled { background: #444; color: #888; cursor: not-allowed; border: 1px solid #555; }
        .btn-bet.btn-close-only { background: linear-gradient(180deg, #f39c12, #d35400); color: #fff; }

        /* Modal aur baki styles */
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 99; }
        #betModal { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; z-index: 100; border-top-left-radius: 20px; border-top-right-radius: 20px; padding: 20px; border-top: 3px solid #f1c40f; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px dashed #444; padding-bottom: 10px;}
        .modal-title { color: #f1c40f; font-weight: 900; font-size: 18px; text-transform: uppercase; }
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .game-btn { background: #222; color: #fff; padding: 15px 10px; border-radius: 8px; border: 1px solid #444; text-align: center; font-weight: bold; font-size: 13px; }
        .game-btn:disabled { opacity: 0.3; text-decoration: line-through; }
        .session-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .session-lbl { flex: 1; background: #222; color: #fff; padding: 12px; text-align: center; border-radius: 8px; border: 2px solid #444; font-weight: bold; }
        .session-lbl.active { border-color: #f1c40f; background: #333; color: #f1c40f; }
        .session-lbl.disabled { opacity: 0.3; border-color: #ff004c; }
        .bet-input { width: 100%; padding: 15px; margin-bottom: 15px; background: #111; border: 1px solid #444; color: #fff; border-radius: 8px; font-size: 16px; outline: none; }
        .btn-confirm { background: #2ecc71; color: #000; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: 900; font-size: 16px; }
        .btn-back { background: #444; color: #fff; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <header class="header">
        <h1>👑 K-VIP CASINO</h1>
    </header>

    <div class="wallet-bar">
        <span style="font-size:12px; font-weight:bold; color:#aaa;"><i class="fa-solid fa-wallet"></i> VIP WALLET</span>
        <div class="bal-amt">₹ <span id="balance">0.00</span></div>
    </div>

    <div class="market-list" id="markets-container">
        </div>

    <div id="modalOverlay" onclick="closeBetModal()"></div>
    <div id="betModal">
        <div class="modal-header">
            <div class="modal-title" id="modalMarketName">SELECT GAME</div>
            <div class="close-modal" onclick="closeBetModal()"><i class="fa-solid fa-circle-xmark" style="color:#ff004c; font-size:24px;"></i></div>
        </div>
        <div class="game-grid" id="gameGrid">
            <button class="game-btn" id="btnAnk" onclick="selectGame('Single Ank')">SINGLE ANK</button>
            <button class="game-btn" id="btnJodi" onclick="selectGame('Jodi Digit')">JODI DIGIT</button>
            <button class="game-btn" id="btnSP" onclick="selectGame('Single Panna')">SINGLE PANNA</button>
            <button class="game-btn" id="btnDP" onclick="selectGame('Double Panna')">DOUBLE PANNA</button>
            <button class="game-btn" id="btnTP" onclick="selectGame('Triple Panna')">TRIPLE PANNA</button>
            <button class="game-btn" id="btnSangam" onclick="selectGame('Half Sangam')">HALF SANGAM</button>
        </div>
        <div id="inputSection" style="display:none;">
            <div style="color: #2ecc71; font-weight: bold; margin-bottom: 10px; font-size: 14px;" id="selectedGameLabel">Game</div>
            <div class="session-selector" id="sessionBox">
                <label class="session-lbl" id="lblOpen"><input type="radio" name="betSession" value="OPEN" id="radioOpen" style="display:none;" onchange="updateSessionUI()">OPEN</label>
                <label class="session-lbl" id="lblClose"><input type="radio" name="betSession" value="CLOSE" id="radioClose" style="display:none;" onchange="updateSessionUI()">CLOSE</label>
            </div>
            <input type="number" id="betNumber" class="bet-input" placeholder="Enter Number">
            <input type="number" id="betAmount" class="bet-input" placeholder="Enter Amount (₹)">
            <button class="btn-confirm" onclick="submitFinalBet()">✔️ PLACE BET</button>
            <button class="btn-back" onclick="backToGames()">⬅️ BACK</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const container = document.getElementById('markets-container');
        const userPhone = localStorage.getItem('userPhone') || localStorage.getItem('phone');
        let activeMarket = null;
        let selectedGameType = "";
        let serverTimeOffset = 0;
        
        // Server time sync background mein chalta rahega par dikhega nahi
        db.ref('.info/serverTimeOffset').on('value', snap => { serverTimeOffset = snap.val() || 0; });

        function getStrictFirebaseISTMinutes() {
            let exactServerTimeMs = new Date().getTime() + serverTimeOffset;
            let d = new Date(exactServerTimeMs); 
            let istMinutesTotal = (d.getUTCHours() * 60) + d.getUTCMinutes() + 330;
            if (istMinutesTotal >= 1440) istMinutesTotal -= 1440; 
            return istMinutesTotal;
        }

        if (userPhone) {
            db.ref('Users/' + userPhone + '/balance').on('value', snap => {
                document.getElementById('balance').innerText = parseFloat(snap.val() || 0).toFixed(2);
            });
        }

        function parseTime(t) {
            let p = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
            if(!p) return 1440;
            let h = parseInt(p[1]), m = parseInt(p[2]), mod = p[3].toUpperCase();
            if(h === 12) h = (mod === 'PM') ? 12 : 0;
            else if(mod === 'PM') h += 12;
            return h * 60 + m;
        }

        function renderMarkets(markets) {
            container.innerHTML = '';
            let currentMins = getStrictFirebaseISTMinutes(); 
            let marketArray = Object.keys(markets).map(key => ({...markets[key], id: key}));

            marketArray.forEach(m => {
                let openT = parseTime(m.open), closeT = parseTime(m.close);
                let isOC = currentMins >= openT, isFC = currentMins >= closeT;
                let status = isFC ? 'closed' : (isOC ? 'half-closed' : 'running');
                let btnT = isFC ? 'MARKET CLOSED' : (isOC ? 'PLAY CLOSE ONLY' : 'PLAY NOW');
                let btnC = isFC ? 'btn-bet' : (isOC ? 'btn-bet btn-close-only' : 'btn-bet');

                container.innerHTML += `
                    <div class="m-card ${status}">
                        <div style="display:flex; justify-content:space-between;">
                            <div class="m-title">${m.name}</div>
                            <div style="font-size:10px; color:#aaa;">${m.open} - ${m.close}</div>
                        </div>
                        <div class="m-res">${m.result || '***-**-***'}</div>
                        <button class="${btnC}" ${isFC?'disabled':''} onclick="openBetModal('${m.id}','${m.name}','${m.open}','${m.close}')">${btnT}</button>
                    </div>`;
            });
        }

        db.ref('LiveMarkets').on('value', snap => { if(snap.exists()) renderMarkets(snap.val()); });

        function openBetModal(id, name, ot, ct) {
            let cm = getStrictFirebaseISTMinutes(), om = parseTime(ot), clm = parseTime(ct);
            activeMarket = { id, name, openMins: om, closeMins: clm };
            document.getElementById('modalMarketName').innerText = name;
            document.getElementById('btnJodi').disabled = cm >= om;
            document.getElementById('btnSangam').disabled = cm >= om;
            let rO = document.getElementById('radioOpen'), rC = document.getElementById('radioClose');
            if(cm >= om) { rO.disabled = true; rC.checked = true; } else { rO.disabled = false; rO.checked = true; }
            updateSessionUI();
            backToGames();
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('betModal').style.display = 'block';
        }

        function updateSessionUI() {
            let isO = document.getElementById('radioOpen').checked;
            document.getElementById('lblOpen').className = "session-lbl " + (isO ? "active" : "");
            document.getElementById('lblClose').className = "session-lbl " + (!isO ? "active" : "");
            if(document.getElementById('radioOpen').disabled) document.getElementById('lblOpen').classList.add('disabled');
        }

        function selectGame(gt) {
            if((gt==='Jodi Digit'||gt==='Half Sangam') && getStrictFirebaseISTMinutes()>=activeMarket.openMins) return alert("Open time out!");
            document.getElementById('sessionBox').style.display = (gt==='Jodi Digit'||gt==='Half Sangam') ? 'none' : 'flex';
            selectedGameType = gt;
            document.getElementById('gameGrid').style.display = 'none';
            document.getElementById('inputSection').style.display = 'block';
            document.getElementById('selectedGameLabel').innerText = "Game: " + gt;
        }

        function backToGames() { document.getElementById('gameGrid').style.display = 'grid'; document.getElementById('inputSection').style.display = 'none'; }
        function closeBetModal() { document.getElementById('modalOverlay').style.display = 'none'; document.getElementById('betModal').style.display = 'none'; }

        function submitFinalBet() {
            let num = document.getElementById('betNumber').value, amt = document.getElementById('betAmount').value;
            if(!num || !amt || amt < 10) return alert("Enter valid details!");
            let cm = getStrictFirebaseISTMinutes(), isJS = (selectedGameType==='Jodi Digit'||selectedGameType==='Half Sangam');
            let sess = isJS ? "FULL" : (document.getElementById('radioOpen').checked ? "OPEN" : "CLOSE");
            if((sess==="OPEN"||isJS) && cm>=activeMarket.openMins) return alert("Open closed!");
            if(cm >= activeMarket.closeMins) return alert("Market closed!");
            let bal = parseFloat(document.getElementById('balance').innerText);
            if(amt > bal) return alert("Low balance!");

            db.ref('Users/'+userPhone+'/balance').set(bal-amt).then(() => {
                let bet = { marketId: activeMarket.id, marketName: activeMarket.name, gameType: selectedGameType, session: sess, bidNumber: num, betAmount: parseFloat(amt), status: "pending", timestamp: Date.now() };
                db.ref('BetHistory/'+userPhone).push(bet);
                db.ref('AdminPanel/AllActiveBets').push({ userPhone, ...bet });
                alert("✅ Bet Placed!"); closeBetModal();
            });
        }
        setInterval(() => { db.ref('LiveMarkets').once('value', snap => { if(snap.exists()) renderMarkets(snap.val()); }); }, 15000);
    </script>
</body>
</html>
