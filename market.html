<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-VIP Live Markets</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Roboto', sans-serif; user-select:none; }
        body { background-color:#0d0d0d; color:#fff; padding-bottom:30px; }
        .header { background:linear-gradient(90deg, #1a2a6c, #b21f1f, #fdbb2d); padding:15px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
        .rules-btn { background:rgba(0,0,0,0.5); border:1px solid #fff; color:#fff; padding:6px 12px; border-radius:15px; font-size:12px; font-weight:bold; cursor:pointer; }
        .wallet-bar { background:#1e1e1e; padding:15px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #333; }
        .bal-amt { color:#2ecc71; font-size:20px; font-weight:900; }
        .market-list { padding:10px; }
        .m-card { background:#222; border-radius:10px; padding:15px; margin-bottom:15px; border-left:5px solid #2ecc71; box-shadow: 0 4px 6px rgba(0,0,0,0.4); }
        .m-card.closed { border-left-color:#e74c3c; opacity:0.8; }
        .m-card.half-closed { border-left-color:#f39c12; }
        .m-title { font-size:18px; font-weight:900; color:#f1c40f; text-transform:uppercase; }
        .m-res { font-size:28px; font-weight:bold; margin:12px 0; text-align:center; letter-spacing:4px; background:#111; padding:10px; border-radius:5px; color:#00ffff; border:1px solid #333; }
        .btn-bet { width:100%; background:linear-gradient(180deg, #2ecc71, #27ae60); color:#000; border:none; padding:14px; border-radius:8px; font-weight:900; font-size:16px; cursor:pointer; }
        .btn-bet:disabled { background:#444; color:#888; cursor:not-allowed; }
        .btn-bet.btn-close-only { background:linear-gradient(180deg, #f39c12, #d35400); color:#fff; }
        #modalOverlay, #rulesModalOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:998; }
        #betModal, #rulesModal { display:none; position:fixed; bottom:0; left:0; width:100%; background:#1a1a1a; z-index:999; border-top:3px solid #f1c40f; padding:20px; border-top-left-radius:20px; border-top-right-radius:20px; }
        #rulesModal { top:20%; bottom:auto; width:90%; left:5%; border-radius:15px; }
        .game-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:10px; }
        .game-btn { background:#222; color:#fff; padding:15px 10px; border-radius:8px; border:1px solid #444; font-weight:bold; font-size:13px; cursor:pointer; }
        .session-selector { display:flex; gap:10px; margin-bottom:15px; }
        .session-lbl { flex:1; background:#222; padding:12px; text-align:center; border-radius:8px; border:2px solid #444; font-weight:bold; }
        .session-lbl.active { border-color:#f1c40f; color:#f1c40f; }
        .bet-input { width:100%; padding:15px; margin-bottom:15px; background:#111; border:1px solid #444; color:#fff; border-radius:8px; outline:none; }
        .btn-confirm { background:#2ecc71; color:#000; width:100%; padding:15px; border:none; border-radius:8px; font-weight:900; cursor:pointer; }
    </style>
</head>
<body>
    <header class="header">
        <button class="rules-btn" onclick="openRules()">RULES</button>
        <h1 style="color:#fff; font-size:18px;">👑 K-VIP CASINO</h1>
        <div style="width:50px;"></div>
    </header>

    <div class="wallet-bar">
        <span style="font-size:12px; font-weight:bold; color:#aaa;">VIP WALLET</span>
        <div class="bal-amt">₹ <span id="balance">0.00</span></div>
    </div>

    <div class="market-list" id="markets-container">
        <div style="text-align: center; color: #888; padding: 20px;">Loading Markets...</div>
    </div>

    <div id="rulesModalOverlay" onclick="closeRules()"></div>
    <div id="rulesModal">
        <h2 style="color:#f1c40f; margin-bottom:10px;">GAME RULES</h2>
        <div id="rulesText" style="white-space:pre-wrap; color:#ddd; font-size:14px;">Loading rules...</div>
        <button onclick="closeRules()" style="width:100%; margin-top:15px; padding:12px; background:#444; color:#fff; border:none; border-radius:8px; font-weight:bold;">CLOSE</button>
    </div>

    <div id="modalOverlay" onclick="closeBetModal()"></div>
    <div id="betModal">
        <h3 id="modalMarketName" style="color:#f1c40f; margin-bottom:15px;">SELECT GAME</h3>
        <div class="game-grid" id="gameGrid">
            <button class="game-btn" onclick="selectGame('Single Ank')">SINGLE ANK</button>
            <button class="game-btn" onclick="selectGame('Jodi Digit')">JODI DIGIT</button>
            <button class="game-btn" onclick="selectGame('Single Panna')">SINGLE PANNA</button>
            <button class="game-btn" onclick="selectGame('Double Panna')">DOUBLE PANNA</button>
            <button class="game-btn" onclick="selectGame('Triple Panna')">TRIPLE PANNA</button>
            <button class="game-btn" onclick="selectGame('Half Sangam')">HALF SANGAM</button>
        </div>
        <div id="inputSection" style="display:none;">
            <div id="selectedGameLabel" style="color:#2ecc71; margin-bottom:10px; font-weight:bold;"></div>
            <div class="session-selector" id="sessionBox">
                <label class="session-lbl" id="lblOpen"><input type="radio" name="betSession" id="radioOpen" onchange="updateUI()" checked style="display:none;">OPEN</label>
                <label class="session-lbl" id="lblClose"><input type="radio" name="betSession" id="radioClose" onchange="updateUI()" style="display:none;">CLOSE</label>
            </div>
            <input type="number" id="betNumber" class="bet-input" placeholder="Enter Number">
            <input type="number" id="betAmount" class="bet-input" placeholder="Amount (Min ₹10)">
            <button class="btn-confirm" id="confirmBtn" onclick="submitFinalBet()">PLACE BET</button>
            <button onclick="backToGames()" style="width:100%; margin-top:10px; background:none; color:#888; border:none; cursor:pointer;">⬅️ BACK</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userPhone = localStorage.getItem('userPhone') || 'Guest';

        let activeMarket = null, selectedGameType = "", serverTimeOffset = 0, currentBalance = 0;

        // Default Markets (Safety Net)
        const defaultVIPMarkets = {
            "m1": { name: "TIME BAZAR", open: "01:00 PM", close: "02:00 PM", result: "***-**-***" },
            "m2": { name: "MADHUR DAY", open: "01:15 PM", close: "02:15 PM", result: "***-**-***" },
            "m3": { name: "MILAN DAY", open: "03:00 PM", close: "05:00 PM", result: "***-**-***" },
            "m4": { name: "KALYAN", open: "04:00 PM", close: "06:00 PM", result: "***-**-***" },
            "m5": { name: "TIME BAZAR NIGHT", open: "08:00 PM", close: "09:00 PM", result: "***-**-***" },
            "m6": { name: "MADHUR NIGHT", open: "08:30 PM", close: "10:30 PM", result: "***-**-***" },
            "m7": { name: "MILAN NIGHT", open: "09:00 PM", close: "11:00 PM", result: "***-**-***" },
            "m8": { name: "KALYAN NIGHT", open: "09:30 PM", close: "11:30 PM", result: "***-**-***" }
        };

        // Balance Sync
        db.ref('users/' + userPhone).on('value', snap => {
            const d = snap.val() || {};
            currentBalance = (parseFloat(d.balance)||0) + (parseFloat(d.winning_balance)||0) + (parseFloat(d.bonus_balance)||0);
            document.getElementById('balance').innerText = currentBalance.toFixed(2);
        });

        // Rules Sync
        db.ref('settings/game_rules').on('value', snap => { document.getElementById('rulesText').innerText = snap.val() || "Rules loading..."; });

        db.ref('.info/serverTimeOffset').on('value', snap => { serverTimeOffset = snap.val() || 0; });

        function getISTMinutes() {
            let d = new Date(new Date().getTime() + serverTimeOffset);
            let ist = (d.getUTCHours() * 60) + d.getUTCMinutes() + 330;
            return ist >= 1440 ? ist - 1440 : ist;
        }

        // Safe Time Parser
        function parseTime(t) {
            if (!t || typeof t !== 'string') return 0;
            let p = t.match(/(\d+):(\d+)\s*(AM|PM)/i); 
            if(!p) return 0;
            let h = parseInt(p[1]), m = parseInt(p[2]), mod = p[3].toUpperCase();
            if(h === 12) h = (mod === 'PM') ? 12 : 0; else if(mod === 'PM') h += 12;
            return h * 60 + m;
        }

        function renderMarkets(markets) {
            const container = document.getElementById('markets-container');
            container.innerHTML = '';
            let cm = getISTMinutes();
            
            Object.keys(markets).forEach(k => {
                let m = markets[k];
                // Safety check for missing time
                let openT = m.open || "12:00 AM";
                let closeT = m.close || "11:59 PM";
                
                let ot = parseTime(openT), ct = parseTime(closeT);
                let isFC = cm >= ct, isOC = cm >= ot;
                let status = isFC ? 'closed' : (isOC ? 'half-closed' : 'running');
                let btnT = isFC ? 'MARKET CLOSED' : (isOC ? 'CLOSE ONLY' : 'PLAY NOW');
                
                container.innerHTML += `
                    <div class="m-card ${status}">
                        <div style="display:flex; justify-content:space-between;">
                            <div class="m-title">${m.name}</div>
                            <div style="font-size:10px; color:#aaa;">${openT} - ${closeT}</div>
                        </div>
                        <div class="m-res">${m.result || '***-**-***'}</div>
                        <button class="btn-bet ${isOC?'btn-close-only':''}" ${isFC?'disabled':''} onclick="openBetModal('${k}','${m.name}','${openT}','${closeT}')">${btnT}</button>
                    </div>`;
            });
        }

        // Fetch Live Markets data securely
        db.ref('LiveMarkets').on('value', snap => { 
            if(snap.exists()) {
                renderMarkets(snap.val()); 
            } else {
                db.ref('LiveMarkets').set(defaultVIPMarkets);
                renderMarkets(defaultVIPMarkets);
            }
        });

        function openBetModal(id, name, ot, ct) {
            activeMarket = { id, name, ot: parseTime(ot), ct: parseTime(ct) };
            document.getElementById('modalMarketName').innerText = name;
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('betModal').style.display = 'block';
            backToGames();
        }

        function selectGame(gt) {
            selectedGameType = gt;
            document.getElementById('gameGrid').style.display = 'none';
            document.getElementById('inputSection').style.display = 'block';
            document.getElementById('selectedGameLabel').innerText = "Game: " + gt;
            document.getElementById('sessionBox').style.display = (gt.includes('Jodi') || gt.includes('Sangam')) ? 'none' : 'flex';
            updateUI();
        }

        function updateUI() {
            let isO = document.getElementById('radioOpen').checked;
            document.getElementById('lblOpen').className = "session-lbl " + (isO ? "active" : "");
            document.getElementById('lblClose').className = "session-lbl " + (!isO ? "active" : "");
        }

        function backToGames() { document.getElementById('gameGrid').style.display='grid'; document.getElementById('inputSection').style.display='none'; }
        function closeBetModal() { document.getElementById('modalOverlay').style.display='none'; document.getElementById('betModal').style.display='none'; document.getElementById('betNumber').value=''; document.getElementById('betAmount').value=''; }
        function openRules() { document.getElementById('rulesModalOverlay').style.display='block'; document.getElementById('rulesModal').style.display='block'; }
        function closeRules() { document.getElementById('rulesModalOverlay').style.display='none'; document.getElementById('rulesModal').style.display='none'; }

        function submitFinalBet() {
            if (userPhone === 'Guest') return alert("Please Login!");
            let num = document.getElementById('betNumber').value, amt = parseFloat(document.getElementById('betAmount').value);
            
            if(!num || isNaN(amt) || amt < 10) return alert("Valid Number & Amount (Min ₹10) bhariye!");
            if(amt > currentBalance) return alert("Low Balance!");

            // Strict Validation
            let numStr = num.toString();
            if (selectedGameType === 'Single Ank' && numStr.length !== 1) return alert("Single Ank 1 digit hona chahiye!");
            if (selectedGameType === 'Jodi Digit' && numStr.length !== 2) return alert("Jodi 2 digit honi chahiye!");
            if (selectedGameType.includes('Panna') && numStr.length !== 3) return alert("Panna 3 digit hona chahiye!");

            let cm = getISTMinutes();
            let isJS = (selectedGameType.includes('Jodi') || selectedGameType.includes('Sangam'));
            let sess = isJS ? "FULL" : (document.getElementById('radioOpen').checked ? "OPEN" : "CLOSE");
            
            // Anti-Cheat Time Check
            if ((sess === "OPEN" || isJS) && cm >= activeMarket.ot) return alert("⏳ Open market band ho gaya hai!");
            if (sess === "CLOSE" && cm >= activeMarket.ct) return alert("⏳ Market poora band ho gaya hai!");

            document.getElementById('confirmBtn').disabled = true;
            document.getElementById('confirmBtn').innerText = "PROCESSING...";

            db.ref('users/' + userPhone + '/balance').set(firebase.database.ServerValue.increment(-amt)).then(() => {
                let b = { marketName: activeMarket.name, gameType: selectedGameType, session: sess, bidNumber: numStr, betAmount: amt, status: "pending", timestamp: Date.now() };
                db.ref('BetHistory/' + userPhone).push(b);
                db.ref('AdminPanel/AllActiveBets').push({ userPhone, ...b });
                alert("✅ Bet Placed Successfully!"); 
                closeBetModal();
                document.getElementById('confirmBtn').disabled = false;
                document.getElementById('confirmBtn').innerText = "PLACE BET";
            }).catch(() => {
                alert("❌ Transaction failed!");
                document.getElementById('confirmBtn').disabled = false;
                document.getElementById('confirmBtn').innerText = "PLACE BET";
            });
        }
    </script>
</body>
</html>
