<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Kalyan VIP - Live Markets</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Roboto', sans-serif; user-select:none; }
        body { background-color:#0d0d0d; color:#fff; padding-bottom:30px; }
        
        /* 🔥 Header & Wallet 🔥 */
        .header { background:linear-gradient(90deg, #1a2a6c, #b21f1f, #fdbb2d); padding:15px; text-align: center; position:sticky; top:0; z-index:100; border-bottom: 2px solid #ffd700; }
        .header h1 { font-size: 18px; color: #fff; letter-spacing: 1px; margin-bottom: 5px; font-weight: 900; }
        .date-box { font-size: 12px; color: #000; background: #ffd700; display: inline-block; padding: 3px 12px; border-radius: 20px; font-weight: 900; text-transform: uppercase; }
        
        .wallet-bar { background:#1e1e1e; padding:15px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #333; }
        .bal-amt { color:#2ecc71; font-size:20px; font-weight:900; }

        /* 🔥 Cards & UI 🔥 */
        .market-list { padding:10px; }
        .m-card { background:#1a1a1a; border-radius:12px; padding:15px; margin-bottom:15px; border: 1px solid #333; position: relative; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.8); }
        .m-card::before { content: ""; position: absolute; left: 0; top: 0; width: 5px; height: 100%; background: #2ecc71; }
        .m-card.closed::before { background: #e74c3c; }
        
        .m-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .m-title { font-size:16px; font-weight:900; color:#f1c40f; text-transform:uppercase; }
        .m-time-text { font-size: 11px; color: #aaa; margin-top: 2px; font-weight: bold; }
        
        .timer-box { font-size: 11px; font-weight: 900; background: #000; padding: 5px 10px; border-radius: 5px; border: 1px solid #444; color: #fff; text-transform: uppercase; }
        .timer-box.running { color: #00ff88; border-color: #00ff88; }
        .timer-box.closed { color: #ff3333; border-color: #ff3333; }
        
        .m-res { font-size:34px; font-weight:900; margin:10px 0; text-align:center; letter-spacing:6px; background: #000; padding:18px; border-radius:10px; border:1px solid #222; transition: all 0.4s ease; }
        .res-default { color:#00ffff; text-shadow: 0 0 10px rgba(0,255,255,0.4); }
        .res-active { color:#ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.6); border-color: #ffd700; }

        .btn-play { width:100%; background:linear-gradient(180deg, #2ecc71, #27ae60); color:#000; border:none; padding:14px; border-radius:8px; font-weight:900; font-size:15px; cursor:pointer; text-transform: uppercase; }
        .btn-play.btn-close-only { background:linear-gradient(180deg, #f39c12, #d35400); color:#fff; }
        .btn-play:disabled { background: #333; color: #666; cursor: not-allowed; }

        /* 🔥 Bet Modal System 🔥 */
        #modalOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:998; }
        #betModal { display:none; position:fixed; bottom:0; left:0; width:100%; background:#1a1a1a; z-index:999; border-top:3px solid #f1c40f; padding:20px; border-top-left-radius:20px; border-top-right-radius:20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.9); }
        .game-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:10px; }
        .game-btn { background:#222; color:#fff; padding:15px 10px; border-radius:8px; border:1px solid #444; font-weight:bold; font-size:13px; cursor:pointer; transition:0.2s; }
        .session-selector { display:flex; gap:10px; margin-bottom:15px; }
        .session-lbl { flex:1; background:#222; padding:12px; text-align:center; border-radius:8px; border:2px solid #444; font-weight:bold; cursor:pointer; }
        .session-lbl.active { border-color:#f1c40f; color:#f1c40f; }
        .session-lbl.disabled { opacity: 0.3; cursor: not-allowed; pointer-events:none; }
        .bet-input { width:100%; padding:15px; margin-bottom:15px; background:#111; border:1px solid #444; color:#fff; border-radius:8px; outline:none; font-size: 16px; font-weight: bold; }
        .bet-input:focus { border-color: #f1c40f; }
        .btn-confirm { background:#2ecc71; color:#000; width:100%; padding:15px; border:none; border-radius:8px; font-weight:900; cursor:pointer; font-size: 16px; text-transform: uppercase; }
    </style>
</head>
<body>

    <header class="header">
        <h1>👑 KALYAN VIP MARKETS</h1>
        <div class="date-box" id="todayDate">Loading...</div>
    </header>

    <div class="wallet-bar">
        <span style="font-size:12px; font-weight:bold; color:#aaa;">VIP WALLET</span>
        <div class="bal-amt">₹ <span id="balance">0.00</span></div>
    </div>

    <div class="market-list" id="markets-container">
        <p style="text-align: center; color: #888; padding: 20px;">Loading Live Casino...</p>
    </div>

    <div id="modalOverlay" onclick="closeBetModal()"></div>
    <div id="betModal">
        <h3 id="modalMarketName" style="color:#f1c40f; margin-bottom:15px; text-transform:uppercase; text-align:center;">SELECT GAME</h3>
        <div class="game-grid" id="gameGrid">
            <button class="game-btn" onclick="selectGame('Single Ank')">SINGLE ANK</button>
            <button class="game-btn" id="btnJodi" onclick="selectGame('Jodi Digit')">JODI DIGIT</button>
            <button class="game-btn" onclick="selectGame('Single Panna')">SINGLE PANNA</button>
            <button class="game-btn" onclick="selectGame('Double Panna')">DOUBLE PANNA</button>
            <button class="game-btn" onclick="selectGame('Triple Panna')">TRIPLE PANNA</button>
            <button class="game-btn" id="btnSangam" onclick="selectGame('Half Sangam')">HALF SANGAM</button>
        </div>
        
        <div id="inputSection" style="display:none;">
            <div id="selectedGameLabel" style="color:#2ecc71; margin-bottom:10px; font-weight:bold; text-align:center; font-size: 18px;"></div>
            <div class="session-selector" id="sessionBox">
                <label class="session-lbl" id="lblOpen"><input type="radio" name="betSession" id="radioOpen" onchange="updateUI()" checked style="display:none;">OPEN</label>
                <label class="session-lbl" id="lblClose"><input type="radio" name="betSession" id="radioClose" onchange="updateUI()" style="display:none;">CLOSE</label>
            </div>
            <input type="number" id="betNumber" class="bet-input" placeholder="Enter Number">
            <input type="number" id="betAmount" class="bet-input" placeholder="Enter Amount (Min ₹10)">
            <button class="btn-confirm" id="confirmBtn" onclick="submitFinalBet()">PLACE BET</button>
            <button onclick="backToGames()" style="width:100%; margin-top:10px; padding:10px; background:none; color:#888; border:none; cursor:pointer; font-weight: bold;">⬅️ BACK TO GAMES</button>
        </div>
    </div>

    <script>
        // 1. Firebase System setup
        const firebaseConfig = { apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", projectId: "kalyan-casino" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const userPhone = localStorage.getItem('userPhone') || 'Guest';
        let activeMarket = null, selectedGameType = "", currentBalance = 0;

        const markets = {
            "time_day": { name: "TIME BAZAR", open: "01:00 PM", close: "02:00 PM" },
            "madhur_day": { name: "MADHUR DAY", open: "01:15 PM", close: "02:15 PM" },
            "milan_day": { name: "MILAN DAY", open: "03:00 PM", close: "05:00 PM" },
            "kalyan_day": { name: "KALYAN", open: "04:00 PM", close: "06:00 PM" },
            "time_night": { name: "TIME BAZAR NIGHT", open: "08:00 PM", close: "09:00 PM" },
            "madhur_night": { name: "MADHUR NIGHT", open: "08:30 PM", close: "10:30 PM" },
            "milan_night": { name: "MILAN NIGHT", open: "09:00 PM", close: "11:00 PM" },
            "kalyan_night": { name: "KALYAN NIGHT", open: "09:30 PM", close: "11:30 PM" }
        };

        document.getElementById('todayDate').innerText = new Date().toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });

        // 🔥 Wallet Balance Fetching 🔥
        db.ref('users/' + userPhone).on('value', snap => {
            const d = snap.val() || {};
            // Ab single wallet system hai jaisa pehle set kiya tha
            currentBalance = parseFloat(d.balance || 0);
            document.getElementById('balance').innerText = currentBalance.toFixed(2);
        });

        // 2. Generate UI Cards
        const container = document.getElementById('markets-container');
        container.innerHTML = '';
        Object.keys(markets).forEach(id => {
            const m = markets[id];
            container.innerHTML += `
                <div class="m-card" id="card_${id}">
                    <div class="m-top">
                        <div>
                            <div class="m-title">${m.name}</div>
                            <div class="m-time-text">${m.open} - ${m.close}</div>
                        </div>
                        <div class="timer-box" id="timer_${id}">Syncing...</div>
                    </div>
                    <div class="m-res res-default" id="res_${id}">***-**-***</div>
                    <button class="btn-play" id="btn_${id}" onclick="openBetModal('${id}', '${m.name}', '${m.open}', '${m.close}')">PLAY NOW</button>
                </div>
            `;
        });

        // 3. 🔥 Live Number Sync 🔥
        db.ref('market').on('value', snap => {
            const data = snap.val() || {};
            Object.keys(markets).forEach(id => {
                let resBox = document.getElementById('res_' + id);
                if (resBox) {
                    let ank = (data[id] && data[id].result) ? data[id].result : "***-**-***";
                    resBox.innerText = ank;
                    if(ank !== "***-**-***") {
                        resBox.classList.remove('res-default'); resBox.classList.add('res-active');
                    } else {
                        resBox.classList.remove('res-active'); resBox.classList.add('res-default');
                    }
                }
            });
        });

        // 4. Timer Logic
        function parseTime(timeStr) {
            let [time, modifier] = timeStr.split(' '); let [hours, minutes] = time.split(':');
            hours = parseInt(hours, 10); if (hours === 12) hours = 0; if (modifier === 'PM') hours += 12;
            let d = new Date(); d.setHours(hours, parseInt(minutes, 10), 0, 0); return d;
        }

        setInterval(() => {
            let now = new Date().getTime();
            Object.keys(markets).forEach(id => {
                let timerElem = document.getElementById('timer_' + id); let cardElem = document.getElementById('card_' + id); let btnElem = document.getElementById('btn_' + id);
                if(!timerElem) return;
                let openTime = parseTime(markets[id].open).getTime(); let closeTime = parseTime(markets[id].close).getTime();

                if (now < openTime) {
                    timerElem.innerText = "OPEN"; timerElem.className = "timer-box running";
                    cardElem.classList.remove('closed'); btnElem.disabled = false; btnElem.innerText = "PLAY NOW"; btnElem.className = "btn-play";
                } else if (now >= openTime && now < closeTime) {
                    timerElem.innerText = "OPEN CLOSED"; timerElem.className = "timer-box closed";
                    cardElem.classList.remove('closed'); btnElem.disabled = false; btnElem.innerText = "PLAY CLOSE ONLY"; btnElem.className = "btn-play btn-close-only";
                } else {
                    timerElem.innerText = "CLOSED"; timerElem.className = "timer-box closed";
                    cardElem.classList.add('closed'); btnElem.disabled = true; btnElem.innerText = "MARKET CLOSED"; btnElem.className = "btn-play";
                }
            });
        }, 1000);

        // 🔥 BETTING LOGIC FUNCTIONS 🔥
        function openBetModal(id, name, ot, ct) {
            let openTime = parseTime(ot).getTime();
            let now = new Date().getTime();
            activeMarket = { id, name, openTime: openTime };
            
            document.getElementById('modalMarketName').innerText = name;
            let isOpenClosed = now >= openTime; 
            
            // Jodi aur Sangam band kar do agar open time nikal gaya
            document.getElementById('btnJodi').style.display = isOpenClosed ? 'none' : 'block';
            document.getElementById('btnSangam').style.display = isOpenClosed ? 'none' : 'block';
            
            let rO = document.getElementById('radioOpen'); let rC = document.getElementById('radioClose'); let lblO = document.getElementById('lblOpen');
            
            if(isOpenClosed) { 
                rO.disabled = true; rC.checked = true; lblO.classList.add('disabled');
            } else { 
                rO.disabled = false; rO.checked = true; lblO.classList.remove('disabled');
            }
            
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('betModal').style.display = 'block';
            updateUI(); backToGames();
        }

        function selectGame(gt) {
            let now = new Date().getTime();
            if((gt === 'Jodi Digit' || gt === 'Half Sangam') && now >= activeMarket.openTime) {
                return alert("Time Over! Aap ab Jodi ya Sangam nahi khel sakte.");
            }
            selectedGameType = gt;
            document.getElementById('gameGrid').style.display = 'none';
            document.getElementById('inputSection').style.display = 'block';
            document.getElementById('selectedGameLabel').innerText = "GAME: " + gt;
            document.getElementById('sessionBox').style.display = (gt.includes('Jodi') || gt.includes('Sangam')) ? 'none' : 'flex';
            updateUI();
        }

        function updateUI() {
            let isO = document.getElementById('radioOpen').checked;
            if (isO) { document.getElementById('lblOpen').classList.add('active'); document.getElementById('lblClose').classList.remove('active'); } 
            else { document.getElementById('lblClose').classList.add('active'); document.getElementById('lblOpen').classList.remove('active'); }
        }

        function backToGames() { document.getElementById('gameGrid').style.display='grid'; document.getElementById('inputSection').style.display='none'; }
        function closeBetModal() { document.getElementById('modalOverlay').style.display='none'; document.getElementById('betModal').style.display='none'; document.getElementById('betNumber').value=''; document.getElementById('betAmount').value=''; }

        function submitFinalBet() {
            if (userPhone === 'Guest') return alert("Please Login First!");
            let num = document.getElementById('betNumber').value;
            let amt = parseFloat(document.getElementById('betAmount').value);
            
            if(!num || isNaN(amt) || amt < 10) return alert("Valid Number aur Amount (Min ₹10) bhariye!");
            if(amt > currentBalance) return alert("Insufficient Wallet Balance!");

            let numStr = num.toString();
            if (selectedGameType === 'Single Ank' && numStr.length !== 1) return alert("Single Ank 1 digit hona chahiye!");
            if (selectedGameType === 'Jodi Digit' && numStr.length !== 2) return alert("Jodi 2 digit honi chahiye!");
            if (selectedGameType.includes('Panna') && numStr.length !== 3) return alert("Panna 3 digit hona chahiye!");
            if (selectedGameType === 'Half Sangam' && numStr.length !== 4) return alert("Half Sangam 4 digit hona chahiye!");

            let isJS = (selectedGameType.includes('Jodi') || selectedGameType.includes('Sangam'));
            let sess = isJS ? "FULL" : (document.getElementById('radioOpen').checked ? "OPEN" : "CLOSE");

            document.getElementById('confirmBtn').disabled = true;
            document.getElementById('confirmBtn').innerText = "PROCESSING...";

            // Deduct Balance and Place Bet
            db.ref('users/' + userPhone + '/balance').set(currentBalance - amt).then(() => {
                let b = { marketName: activeMarket.name, gameType: selectedGameType, session: sess, bidNumber: numStr, betAmount: amt, status: "pending", timestamp: Date.now() };
                db.ref('BetHistory/' + userPhone).push(b);
                db.ref('AdminPanel/AllActiveBets').push({ userPhone, ...b });
                
                alert("✅ Bet Placed Successfully!"); 
                closeBetModal();
                document.getElementById('confirmBtn').disabled = false;
                document.getElementById('confirmBtn').innerText = "PLACE BET";
            }).catch(() => {
                alert("❌ Transaction failed! Check your internet connection.");
                document.getElementById('confirmBtn').disabled = false;
                document.getElementById('confirmBtn').innerText = "PLACE BET";
            });
        }
    </script>
</body>
</html>
