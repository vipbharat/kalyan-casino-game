<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalyan VIP - Live Markets</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Roboto', sans-serif; user-select:none; }
        body { background-color:#0d0d0d; color:#fff; padding-bottom:30px; }
        
        /* Header & Date Styling */
        .header { background:linear-gradient(90deg, #1a2a6c, #b21f1f, #fdbb2d); padding:15px; text-align: center; position:sticky; top:0; z-index:100; border-bottom: 2px solid #ffd700; }
        .header h1 { font-size: 18px; color: #fff; letter-spacing: 1px; margin-bottom: 5px; font-weight: 900; }
        .date-box { font-size: 12px; color: #000; background: #ffd700; display: inline-block; padding: 3px 12px; border-radius: 20px; font-weight: 900; text-transform: uppercase; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        .market-list { padding:10px; }
        .m-card { background:#1a1a1a; border-radius:12px; padding:15px; margin-bottom:15px; border: 1px solid #333; position: relative; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.8); }
        
        /* Side Indicator */
        .m-card::before { content: ""; position: absolute; left: 0; top: 0; width: 5px; height: 100%; background: #2ecc71; }
        .m-card.closed::before { background: #e74c3c; }
        
        .m-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .m-title { font-size:16px; font-weight:900; color:#f1c40f; text-transform:uppercase; }
        .m-time-text { font-size: 11px; color: #aaa; margin-top: 2px; font-weight: bold; }
        
        /* Countdown Timer */
        .timer-box { font-size: 11px; font-weight: 900; background: #000; padding: 5px 10px; border-radius: 5px; border: 1px solid #444; color: #fff; text-transform: uppercase; }
        .timer-box.running { color: #00ff88; border-color: #00ff88; background: rgba(0,255,136,0.1); }
        .timer-box.closed { color: #ff3333; border-color: #ff3333; background: rgba(255,51,51,0.1); }
        
        /* Result Display Area */
        .m-res { font-size:34px; font-weight:900; margin:10px 0; text-align:center; letter-spacing:6px; background: #000; padding:18px; border-radius:10px; border:1px solid #222; transition: all 0.4s ease; }
        .res-default { color:#00ffff; text-shadow: 0 0 10px rgba(0,255,255,0.4); }
        .res-active { color:#ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.6); border-color: #ffd700; }

        .btn-play { width:100%; background:linear-gradient(180deg, #2ecc71, #27ae60); color:#000; border:none; padding:14px; border-radius:8px; font-weight:900; font-size:15px; cursor:pointer; text-transform: uppercase; box-shadow: 0 4px 0 #1b6336; transition: 0.2s; }
        .btn-play:active { transform: translateY(2px); box-shadow: 0 2px 0 #1b6336; }
        .btn-play:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }
    </style>
</head>
<body>

    <header class="header">
        <h1>👑 KALYAN VIP MARKETS</h1>
        <div class="date-box" id="todayDate">Loading...</div>
    </header>

    <div class="market-list" id="markets-container">
        </div>

    <script>
        // 1. Firebase Configuration (Wahi jo aapne di thi)
        const firebaseConfig = { 
            apiKey: "AIzaSyCy2zsDDJeVTQEbHCenkLIlz3lWWyo-Pqo", 
            databaseURL: "https://kalyan-casino-default-rtdb.firebaseio.com", 
            projectId: "kalyan-casino" 
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. Market Timings Configuration
        const markets = {
            "time_day": { name: "TIME BAZAR", open: "01:00 PM", close: "02:00 PM" },
            "madhur_day": { name: "MADHUR DAY", open: "01:15 PM", close: "02:15 PM" },
            "milan_day": { name: "MILAN DAY", open: "03:00 PM", close: "05:00 PM" },
            "kalyan_day": { name: "KALYAN", open: "04:00 PM", close: "06:00 PM" },
            "time_night": { name: "TIME BAZAR NIGHT", open: "08:00 PM", close: "09:00 PM" },
            "madhur_night": { name: "MADHUR NIGHT", open: "08:30 PM", close: "10:30 PM" },
            "milan_night": { name: "MILAN NIGHT", open: "09:00 PM", close: "11:00 PM" },
            "kalyan_night": { name: "KALYAN NIGHT", open: "09:30 PM", close: "11:30 PM" }
        };

        // Display Current Date
        document.getElementById('todayDate').innerText = new Date().toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });

        // 3. Generate HTML Cards once
        const container = document.getElementById('markets-container');
        container.innerHTML = '';
        Object.keys(markets).forEach(id => {
            const m = markets[id];
            container.innerHTML += `
                <div class="m-card" id="card_${id}">
                    <div class="m-top">
                        <div>
                            <div class="m-title">${m.name}</div>
                            <div class="m-time-text">${m.open} - ${m.close}</div>
                        </div>
                        <div class="timer-box" id="timer_${id}">Syncing...</div>
                    </div>
                    <div class="m-res res-default" id="res_${id}">***-**-***</div>
                    <button class="btn-play" id="btn_${id}">PLAY NOW</button>
                </div>
            `;
        });

        // 4. 🔥 SMART REAL-TIME SYNC (Zero Mistake) 🔥
        db.ref('market').on('value', snap => {
            const data = snap.val() || {};
            Object.keys(markets).forEach(id => {
                let resBox = document.getElementById('res_' + id);
                if (resBox) {
                    let ank = (data[id] && data[id].result) ? data[id].result : "***-**-***";
                    resBox.innerText = ank;

                    // Result aate hi style change karo
                    if(ank !== "***-**-***") {
                        resBox.classList.remove('res-default');
                        resBox.classList.add('res-active');
                    } else {
                        resBox.classList.remove('res-active');
                        resBox.classList.add('res-default');
                    }
                }
            });
        });

        // 5. Time Helper Functions
        function parseTime(timeStr) {
            let [time, modifier] = timeStr.split(' ');
            let [hours, minutes] = time.split(':');
            hours = parseInt(hours, 10);
            if (hours === 12) hours = 0;
            if (modifier === 'PM') hours += 12;
            let d = new Date();
            d.setHours(hours, parseInt(minutes, 10), 0, 0);
            return d;
        }

        function formatDiff(diff) {
            let h = Math.floor(diff / (1000 * 60 * 60));
            let m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            let s = Math.floor((diff % (1000 * 60)) / 1000);
            return `${h}h ${m}m ${s}s`;
        }

        // 6. Countdown Timer Engine
        setInterval(() => {
            let now = new Date().getTime();
            Object.keys(markets).forEach(id => {
                let timerElem = document.getElementById('timer_' + id);
                let cardElem = document.getElementById('card_' + id);
                let btnElem = document.getElementById('btn_' + id);
                if(!timerElem) return;

                let openTime = parseTime(markets[id].open).getTime();
                let closeTime = parseTime(markets[id].close).getTime();

                if (now < openTime) {
                    timerElem.innerText = "Opens in: " + formatDiff(openTime - now);
                    timerElem.className = "timer-box";
                    cardElem.classList.remove('closed');
                    btnElem.disabled = false; btnElem.innerText = "PLAY NOW";
                } 
                else if (now >= openTime && now < closeTime) {
                    timerElem.innerText = "Closes in: " + formatDiff(closeTime - now);
                    timerElem.className = "timer-box running";
                    cardElem.classList.remove('closed');
                    btnElem.disabled = false; btnElem.innerText = "PLAY CLOSE ONLY";
                } 
                else {
                    timerElem.innerText = "CLOSED";
                    timerElem.className = "timer-box closed";
                    cardElem.classList.add('closed');
                    btnElem.disabled = true; btnElem.innerText = "MARKET CLOSED";
                }
            });
        }, 1000);

    </script>
</body>
</html>
